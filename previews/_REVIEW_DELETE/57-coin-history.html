<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script>
    (function() {
      try {
        var p = new URLSearchParams(location.search);
        var local = location.protocol === 'file:';
        if (local && p.get('preview') === '1') { localStorage.setItem('coreDevBypass','1'); window.__coreDemoMode = true; return; }
        if (local && localStorage.getItem('coreDevBypass') === '1') { window.__coreDemoMode = true; return; }
        try{(function(){var h=location.hostname;window.__corePreview=window.__corePreview||(location.protocol==='file:'||h==='localhost'||h==='127.0.0.1'||/[?&]preview=1/.test(location.search));})();}catch(e){}if(!window.__corePreview){if (localStorage.getItem('coreOnboardComplete') !== '1') location.replace('01-index.html');
      }} catch(e){}

  <style>
    :root {
      --bg-base: #02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
      --border: rgba(255,255,255,0.06); --border-strong: rgba(255,255,255,0.10);
      --gold:#FFD05C; --success:#34D399; --danger:#F87171;
      --accent:#4A8FFF; --accent-hi:#6BA9FF;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;height:100%;}
    body{min-height:100vh;background:#0A0A14;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;color:var(--text);padding:24px;overflow:hidden;}
    .phone{position:relative;width:390px;height:844px;background:var(--bg-base);border-radius:56px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
    .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:30;}
    .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:30;}
    .bg{position:absolute;inset:0;z-index:0;background:radial-gradient(70% 35% at 50% 5%,rgba(255,208,92,0.10) 0%,transparent 60%),linear-gradient(180deg,#0F0A0A 0%,#02020A 55%,#050510 100%);}

    .header{position:absolute;top:56px;left:0;right:0;padding:8px 18px 12px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
    .icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .icon-btn svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.2px;}

    .scroll{position:absolute;top:108px;left:0;right:0;bottom:0;overflow-y:auto;padding:12px 18px 28px;z-index:5;}
    .scroll::-webkit-scrollbar{display:none;}

    .balance-mini { padding: 12px 14px; border-radius:16px; background: linear-gradient(135deg, rgba(255,208,92,0.14) 0%, rgba(255,122,69,0.06) 100%); border:1px solid rgba(255,208,92,0.32); display:flex; align-items:center; gap:11px; margin-bottom:18px; }
    .bm-coin { width:36px; height:36px; border-radius:50%; background: radial-gradient(circle at 32% 28%, #FFF1C2 0%, var(--gold) 60%, #876619 100%); box-shadow: 0 0 14px rgba(255,208,92,0.45); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:800; font-size:15px; color:#3D2A05; }
    .bm-num { font-size:24px; font-weight:800; letter-spacing:-0.8px; color:#fff; line-height:1; }
    .bm-sub { font-size:11px; color:var(--muted); letter-spacing:0.04em; margin-top:3px; }

    .stat-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .stat-tile { padding:11px 12px; border-radius:14px; background:rgba(255,255,255,0.03); border:1px solid var(--border-strong); }
    .stat-tile .lbl { font-size:9.5px; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); font-weight:700; }
    .stat-tile .val { font-size:18px; font-weight:800; letter-spacing:-0.4px; margin-top:4px; }
    .stat-tile.earned .val { color: var(--success); }
    .stat-tile.spent  .val { color: var(--danger); }

    .section-title{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:16px 4px 8px;display:flex;align-items:center;gap:8px;}
    .section-title::after{content:"";flex:1;height:1px;background:var(--border);}

    .ledger-row{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);margin-bottom:6px;}
    .ledger-ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .ledger-ico svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
    .ledger-ico.earn{background:var(--success);box-shadow:0 0 10px rgba(52,211,153,0.45);}
    .ledger-ico.spend{background:var(--danger);box-shadow:0 0 10px rgba(248,113,113,0.45);}
    .ledger-body{flex:1;min-width:0;}
    .ledger-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:-0.1px;}
    .ledger-sub{font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:-0.05px;}
    .ledger-delta{font-size:13px;font-weight:700;letter-spacing:-0.2px;flex-shrink:0;}
    .ledger-delta.earn{color:var(--success);}
    .ledger-delta.spend{color:var(--danger);}

    .empty{padding:60px 20px;text-align:center;color:var(--muted);}
    .empty .t{font-size:14px;font-weight:700;color:#fff;letter-spacing:-0.15px;}
    .empty .s{font-size:12px;margin-top:6px;}
    .empty .cta{display:inline-block;margin-top:14px;padding:9px 16px;border-radius:999px;background:#fff;color:#050510;font-size:12px;font-weight:700;cursor:pointer;}

    .preview-watermark{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:#4A5060;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-family:ui-monospace,"SF Mono",Menlo,monospace;}
    @media (max-width:460px){body{padding:0;}.phone{width:100vw;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}.notch,.home-indicator,.preview-watermark{display:none;}}
  
    /* core-tabbar-clearance */
    .scroll { padding-bottom: 110px !important; }
  </style>
  <script src="_lib/core-state.js"></script>
  <script src="_lib/analytics.js"></script>
  <script src="_lib/core-back.js"></script>
  <script src="_lib/core-toast.js"></script>

  <link rel="stylesheet" href="_lib/core-theme.css">
  <script src="_lib/core-theme.js" defer></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="header">
      <div class="icon-btn" data-fallback="58-shop.html" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M15 18L9 12l6-6"/></svg></div>
      <div class="title">Coin history</div>
      <div style="width:36px;"></div>
    </div>

    <div class="scroll">
      <div class="balance-mini">
        <div class="bm-coin">C</div>
        <div>
          <div class="bm-num" id="balAmount">0</div>
          <div class="bm-sub">Current balance</div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-tile earned"><div class="lbl">Earned · 30d</div><div class="val" id="earned30">+0</div></div>
        <div class="stat-tile spent"><div class="lbl">Spent · 30d</div><div class="val" id="spent30">0</div></div>
      </div>

      <div class="section-title">Recent activity</div>
      <div id="ledgerList"></div>

      <div class="empty" id="emptyState" style="display:none;">
        <div class="t">No transactions yet</div>
        <div class="s">Earn coins from honest logs, streak milestones, and posts.</div>
        <div class="cta" onclick="window.location.href='58-shop.html'">Open Shop</div>
      </div>
    </div>
  </div>
  <div class="preview-watermark">core · coin history · v1</div>

<script>
  const LABEL = {
    honest_slip: 'Honest slip log',
    post_to_feed: 'Posted to feed',
    restore_streak: 'Streak restore',
    buy_freeze_extra: 'Bought · +1 freeze',
    'buy_double-xp': 'Bought · Double-XP day',
    'buy_restore-streak': 'Bought · Streak restore',
  };
  function labelFor(reason) {
    if (LABEL[reason]) return LABEL[reason];
    if (reason && reason.startsWith('stat_quiz_')) return 'Stat quiz · ' + reason.slice(10);
    if (reason && reason.startsWith('milestone_')) return 'Streak milestone · day ' + reason.slice(10);
    if (reason && reason.startsWith('gift_')) return 'Gift sent';
    if (reason && reason.startsWith('transfer_to_')) return 'Sent to ' + reason.slice(12);
    return (reason || 'earn').replace(/_/g, ' ');
  }
  function friendlyAgo(ts) {
    const diff = Date.now() - ts;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    if (diff < 30*86400000) return Math.floor(diff/86400000) + 'd ago';
    const d = new Date(ts);
    return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] + ' ' + d.getDate();
  }
  function render() {
    try {
      const s = coreState.read();
      document.getElementById('balAmount').textContent = s.coins || 0;
      const ledger = s.coinLedger || [];
      const thirty = Date.now() - 30*86400000;
      let earned = 0, spent = 0;
      ledger.forEach(e => {
        if (e.ts < thirty) return;
        if (e.delta > 0) earned += e.delta;
        else spent += Math.abs(e.delta);
      });
      document.getElementById('earned30').textContent = '+' + earned;
      document.getElementById('spent30').textContent = '−' + spent;

      const list = document.getElementById('ledgerList');
      list.innerHTML = '';
      if (!ledger.length) { document.getElementById('emptyState').style.display = 'block'; return; }
      ledger.slice(0, 50).forEach(e => {
        const isEarn = e.delta > 0;
        const row = document.createElement('div');
        row.className = 'ledger-row';
        row.innerHTML =
          '<div class="ledger-ico ' + (isEarn ? 'earn' : 'spend') + '">' +
            (isEarn
              ? '<svg viewBox="0 0 24 24"><path d="M7 17l5-5 5 5M7 11l5-5 5 5"/></svg>'
              : '<svg viewBox="0 0 24 24"><path d="M7 7l5 5 5-5M7 13l5 5 5-5"/></svg>') +
          '</div>' +
          '<div class="ledger-body">' +
            '<div class="ledger-name">' + labelFor(e.reason) + '</div>' +
            '<div class="ledger-sub">' + friendlyAgo(e.ts) + '</div>' +
          '</div>' +
          '<div class="ledger-delta ' + (isEarn ? 'earn' : 'spend') + '">' + (isEarn ? '+' : '−') + Math.abs(e.delta) + '</div>';
        list.appendChild(row);
      });
    } catch(e) { console.error(e); }
  }
  render();
  window.addEventListener('coreStateChange', render);
  if (window.coreTrack) coreTrack('screen_view', { screen: 'coin-history' });
</script>
