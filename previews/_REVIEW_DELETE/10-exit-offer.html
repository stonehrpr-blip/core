<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CORE — Wait, before you go</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="stylesheet" href="_lib/core-responsive.css">
<script src="_lib/analytics.js" defer></script>
<style>
  :root {
    --bg-base:#02020A;
    --text:#F8FAFE;
    --muted:#9AA1B7;
    --dim:#4F5570;
    --accent:#4A8FFF;
    --grad-a:#2F8FFF;
    --grad-b:#6F70FF;
    --grad-c:#B388FF;
    --gold:#FFD05C;
    --pink:#FF6BAA;
    --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    min-height:100vh; background:#0A0A14;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--apple-font);
    color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden;
  }
  .phone {
    position:relative; width:390px; height:844px; background:var(--bg-base);
    border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38;
  }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }

  /* Atmosphere */
  .bg {
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(60% 35% at 50% 38%, rgba(255,208,92,0.16) 0%, transparent 60%),
      radial-gradient(60% 35% at 50% 92%, rgba(179,136,255,0.12) 0%, transparent 65%),
      linear-gradient(180deg, #08081C 0%, #02020A 55%, #050510 100%);
  }
  .aurora { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.55; mix-blend-mode: screen; }
  .aurora::before, .aurora::after {
    content:""; position:absolute; border-radius:50%; filter: blur(70px);
    animation: auroraDrift 22s ease-in-out infinite; will-change: transform;
  }
  .aurora::before {
    width: 70%; height: 40%; left: -10%; top: 14%;
    background: radial-gradient(circle, rgba(255,208,92,0.32), transparent 65%);
  }
  .aurora::after {
    width: 60%; height: 35%; right: -8%; bottom: 16%;
    background: radial-gradient(circle, rgba(179,136,255,0.30), transparent 65%);
    animation-delay: -11s;
  }
  @keyframes auroraDrift {
    0%,100% { transform: translate(0,0) scale(1); opacity: 0.55; }
    50%     { transform: translate(18px,-14px) scale(1.07); opacity: 0.85; }
  }
  .stars { position:absolute; inset:0; pointer-events:none; z-index:2; }
  .star { position:absolute; border-radius:50%; background:#fff; animation: twinkle var(--d,4s) ease-in-out var(--del,0s) infinite; }
  .star.s1 { width:1px;   height:1px;   opacity:0.4; }
  .star.s2 { width:1.5px; height:1.5px; opacity:0.55; }
  .star.s3 { width:2px;   height:2px;   opacity:0.7;  box-shadow: 0 0 4px rgba(255,255,255,0.6); }
  .star.s4 { width:2.5px; height:2.5px; opacity:0.85; box-shadow: 0 0 8px rgba(255,255,255,0.7); }
  @keyframes twinkle {
    0%,100% { opacity: var(--min, 0.15); transform: scale(0.7); }
    50%     { opacity: var(--max, 0.85); transform: scale(1.15); }
  }

  .frame {
    position:absolute; inset:0; z-index:10;
    display:flex; flex-direction:column;
    padding: 70px 28px 36px;
  }

  /* Top bar — minimal, just brand + close */
  .topbar { display:flex; align-items:center; justify-content:space-between; }
  .brand { display:flex; align-items:center; gap:8px; }
  .brand .dot {
    width: 8px; height: 8px; border-radius:50%;
    background: var(--accent); box-shadow:0 0 12px var(--accent);
    animation: brandDot 2.5s ease-in-out infinite;
  }
  @keyframes brandDot { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.3); opacity:0.85; } }
  .brand .wm { font-size: 13px; font-weight: 600; letter-spacing: 0.30em; color: rgba(255,255,255,0.92); }
  .close {
    width: 38px !important; height: 38px !important;
    min-width: 38px !important; min-height: 38px !important;
    max-width: 38px !important; max-height: 38px !important;
    flex: 0 0 38px; box-sizing: border-box; aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition: background .2s; padding: 0; align-self: center;
  }
  .close:hover { background: rgba(255,255,255,0.08); }
  .close svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
  .close svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* Header copy */
  .head {
    margin-top: 18px; text-align:center;
    opacity: 0; animation: fadeUp 700ms 100ms cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .kicker {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 8px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .kicker .gold-dot {
    width: 5px; height: 5px; border-radius:50%;
    background: var(--gold); box-shadow: 0 0 8px var(--gold);
  }
  .head h1 {
    font-size: 28px; font-weight: 700; letter-spacing: -0.7px;
    line-height: 1.1; margin: 0;
  }
  .head h1 .g {
    background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 50%, var(--grad-c) 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .head p {
    font-size: 14px; color: var(--muted); line-height: 21px;
    margin: 10px auto 0; max-width: 280px;
  }

  /* Gift box — CSS art, animated */
  .gift-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .gift {
    position: relative;
    width: 180px; height: 180px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    animation: giftBob 3.4s ease-in-out infinite;
    transition: transform 200ms cubic-bezier(0.22,1,0.36,1);
  }
  .gift.open { animation: none; pointer-events: none; }
  .gift:active { transform: scale(0.97); }
  @keyframes giftBob {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50%     { transform: translateY(-8px) rotate(1deg); }
  }
  /* Halo glow behind the gift */
  .gift::before {
    content: ""; position: absolute;
    width: 240px; height: 240px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,208,92,0.40) 0%, rgba(179,136,255,0.18) 35%, transparent 70%);
    filter: blur(20px);
    animation: haloPulse 3.4s ease-in-out infinite;
    z-index: -1;
    pointer-events: none;
  }
  @keyframes haloPulse {
    0%,100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%     { opacity: 1.0; transform: translate(-50%, -50%) scale(1.15); }
  }
  /* Box body */
  .gift-body {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 150px; height: 110px;
    background: linear-gradient(180deg, #FF6BAA 0%, #B388FF 50%, #6F70FF 100%);
    border-radius: 10px;
    box-shadow:
      0 18px 40px rgba(179,136,255,0.35),
      0 0 0 1px rgba(255,255,255,0.10) inset,
      0 -10px 20px rgba(0,0,0,0.20) inset;
  }
  /* Vertical ribbon on body */
  .gift-body::before {
    content: ""; position: absolute;
    top: 0; bottom: 0; left: 50%;
    width: 18px; margin-left: -9px;
    background: linear-gradient(180deg, #FFD05C 0%, #FFB142 100%);
    box-shadow: 0 0 12px rgba(255,208,92,0.4);
  }
  /* Box lid */
  .gift-lid {
    position: absolute; bottom: 100px; left: 50%;
    transform: translateX(-50%);
    width: 168px; height: 28px;
    background: linear-gradient(180deg, #FF6BAA 0%, #D85B96 100%);
    border-radius: 8px 8px 4px 4px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12) inset,
      0 -2px 0 rgba(255,255,255,0.18) inset,
      0 6px 16px rgba(216,91,150,0.30);
    transform-origin: 50% 100%;
    transition: transform 700ms cubic-bezier(0.22,1.4,0.36,1), opacity 800ms;
    z-index: 2;
  }
  /* Bow */
  .gift-bow {
    position: absolute; bottom: 116px; left: 50%;
    transform: translateX(-50%) translateY(0);
    width: 60px; height: 38px;
    transition: transform 800ms cubic-bezier(0.22,1.4,0.36,1), opacity 800ms;
    z-index: 3;
  }
  .gift-bow::before,
  .gift-bow::after {
    content: ""; position: absolute;
    top: 0; width: 28px; height: 32px;
    background: linear-gradient(135deg, #FFD05C 0%, #FFB142 100%);
    border-radius: 50% 50% 50% 8px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.16) inset, 0 4px 10px rgba(255,176,66,0.30);
  }
  .gift-bow::before { left: 0; transform: rotate(-18deg); }
  .gift-bow::after  { right: 0; transform: rotate(18deg) scaleX(-1); }
  .gift-bow-knot {
    position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 16px;
    background: linear-gradient(180deg, #FFB142 0%, #E89A2E 100%);
    border-radius: 50%;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.10) inset;
    z-index: 1;
  }
  /* Inner glow that explodes from the box on open */
  .gift-glow {
    position: absolute; bottom: 30px; left: 50%;
    transform: translateX(-50%) scale(0);
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,208,92,0.85) 0%, rgba(255,107,170,0.40) 35%, transparent 70%);
    filter: blur(8px);
    opacity: 0;
    transition: transform 900ms cubic-bezier(0.22,1,0.36,1), opacity 900ms;
    pointer-events: none;
    z-index: 1;
  }
  /* Sparkles inside box that fly up */
  .sparkle {
    position: absolute; bottom: 60px; left: 50%;
    width: 6px; height: 6px;
    background: radial-gradient(circle, #fff 0%, rgba(255,208,92,0.6) 60%, transparent 80%);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,255,255,0.9);
    opacity: 0;
    pointer-events: none;
    z-index: 4;
  }
  /* Open state */
  .gift.open .gift-lid {
    transform: translateX(-50%) translateY(-30px) rotate(-12deg);
    opacity: 0;
  }
  .gift.open .gift-bow {
    transform: translateX(-50%) translateY(-180px) rotate(-22deg);
    opacity: 0;
  }
  .gift.open .gift-glow {
    transform: translateX(-50%) scale(1.8);
    opacity: 1;
  }
  .gift.open .sparkle { animation: sparkleFly 1.2s ease-out forwards; }
  @keyframes sparkleFly {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.4); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--dx,0), var(--dy,-180px)) scale(1.4); }
  }
  /* Tap-to-open prompt below box */
  .open-hint {
    position: absolute; bottom: -42px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); font-weight: 700;
    opacity: 0.85;
    animation: hintPulse 1.6s ease-in-out infinite;
    white-space: nowrap;
    pointer-events: none;
  }
  .gift.open .open-hint { display: none; }
  @keyframes hintPulse {
    0%,100% { opacity: 0.50; transform: translateX(-50%) translateY(0); }
    50%     { opacity: 1.00; transform: translateX(-50%) translateY(-2px); }
  }

  /* Offer reveal — appears after box opens */
  .offer {
    margin-top: 0;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 700ms 700ms cubic-bezier(0.22,1,0.36,1),
                transform 700ms 700ms cubic-bezier(0.22,1,0.36,1);
    pointer-events: none;
  }
  .offer.show {
    opacity: 1; transform: translateY(0);
    pointer-events: auto;
  }
  .offer-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 100%);
    color: #1A0B00; font-size: 12px; font-weight: 800;
    letter-spacing: 0.16em; text-transform: uppercase;
    margin: 0 auto 12px;
    box-shadow: 0 8px 22px rgba(255,107,170,0.30);
  }
  .offer-prices {
    display: flex; align-items: baseline; justify-content: center; gap: 12px;
    margin-top: 4px;
  }
  .offer-old {
    font-size: 16px; color: var(--muted);
    text-decoration: line-through; font-weight: 500;
  }
  .offer-new {
    font-size: 40px; font-weight: 800; letter-spacing: -1.4px;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .offer-unit {
    font-size: 14px; color: var(--muted); font-weight: 500;
  }
  .offer-sub {
    font-size: 13px; color: rgba(255,255,255,0.78);
    margin-top: 6px; text-align: center;
    line-height: 18px;
  }

  /* CTAs at the bottom */
  .ctas {
    margin-top: auto; padding-top: 18px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 600ms 1100ms cubic-bezier(0.22,1,0.36,1),
                transform 600ms 1100ms cubic-bezier(0.22,1,0.36,1);
  }
  .ctas.show { opacity: 1; transform: translateY(0); }
  .cta {
    width: 100%; padding: 18px 24px;
    border-radius: 999px; border: none;
    color: #1A0B00;
    font-family: inherit; font-size: 17px; font-weight: 800;
    letter-spacing: -0.32px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 50%, var(--grad-c) 100%);
    background-size: 200% 200%;
    animation: gradShift 4.5s ease infinite;
    box-shadow:
      0 14px 36px rgba(255,107,170,0.40),
      0 0 0 1px rgba(255,255,255,0.30) inset,
      0 1px 0 rgba(255,255,255,0.50) inset;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 120ms cubic-bezier(0.4, 0, 0.2, 1), filter .2s;
  }
  .cta:hover { filter: brightness(1.05); }
  .cta:active { transform: scale(0.985); filter: brightness(0.92); }
  .cta svg { width:18px; height:18px; stroke:#1A0B00; fill:none; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }
  @keyframes gradShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  .leave {
    width: 100%; margin-top: 10px; padding: 12px;
    background: transparent; border: none;
    color: var(--muted); font-family: inherit;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: color .15s;
  }
  .leave:hover { color: rgba(255,255,255,0.9); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Confetti — drifts up + away after open */
  .confetti {
    position: absolute; inset: 0; pointer-events: none; z-index: 5;
    overflow: hidden;
  }
  .confetti i {
    position: absolute;
    width: 8px; height: 12px;
    border-radius: 2px;
    opacity: 0;
    transform-origin: center;
    will-change: transform, opacity;
  }
  .gift.open ~ .confetti i,
  .confetti.go i {
    animation: confettiFly 2.4s ease-out forwards;
  }
  @keyframes confettiFly {
    0%   { opacity: 0; transform: translate(0, 0) rotate(0deg); }
    10%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--cx,0), var(--cy,-400px)) rotate(var(--cr,720deg)); }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .gift, .aurora::before, .aurora::after, .star,
    .gift::before, .gift-lid, .gift-bow, .gift-glow,
    .sparkle, .open-hint, .ctas, .offer, .head,
    .cta { animation: none !important; transition: none !important; }
    .gift { animation: none !important; }
  }
</style>
</head>
<body>
<div class="phone">
  <div class="bg"></div>
  <div class="aurora" aria-hidden="true"></div>
  <div class="stars" id="stars"></div>
  <div class="notch"></div>
  <div class="home-indicator"></div>

  <div class="frame">
    <div class="topbar">
      <div class="brand"><span class="dot"></span><span class="wm">CORE</span></div>
      <button class="close" id="closeBtn" aria-label="Leave"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>

    <div class="head">
      <div class="kicker"><span class="gold-dot"></span> A gift before you go</div>
      <h1>One last thing<br/><span class="g">we'd love you to see.</span></h1>
      <p id="headCopy">Tap the box. There's something inside for you.</p>
    </div>

    <div class="gift-wrap">
      <div class="gift" id="gift" role="button" aria-label="Open the gift" tabindex="0">
        <div class="gift-glow"></div>
        <div class="gift-body"></div>
        <div class="gift-lid"></div>
        <div class="gift-bow"><div class="gift-bow-knot"></div></div>
        <span class="sparkle" style="--dx:-60px;--dy:-180px;"></span>
        <span class="sparkle" style="--dx:60px;--dy:-200px;"></span>
        <span class="sparkle" style="--dx:0;--dy:-220px;"></span>
        <span class="sparkle" style="--dx:-90px;--dy:-140px;"></span>
        <span class="sparkle" style="--dx:90px;--dy:-160px;"></span>
        <span class="sparkle" style="--dx:-30px;--dy:-260px;"></span>
        <span class="sparkle" style="--dx:30px;--dy:-260px;"></span>
        <div class="open-hint" id="openHint">Tap to open</div>
      </div>
      <div class="confetti" id="confetti" aria-hidden="true"></div>
    </div>

    <div class="offer" id="offer">
      <div style="text-align:center;">
        <div class="offer-badge">50% off your first month</div>
        <div class="offer-prices">
          <div class="offer-old">$7.99</div>
          <div class="offer-new">$3.99</div>
          <div class="offer-unit">/mo · 30 days</div>
        </div>
        <div class="offer-sub">Still 7 days free first. Then 50% off for a full month while you build the habit. Cancel any time.</div>
      </div>
    </div>

    <div class="ctas" id="ctas">
      <button class="cta" id="claimBtn">
        Claim my 50% off
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
      <button class="leave" id="leaveBtn">No thanks · leave anyway</button>
    </div>
  </div>
</div>

<script>
  // Star field
  (function () {
    const sl = document.getElementById('stars');
    for (let i = 0; i < 70; i++) {
      const s = document.createElement('div');
      const r = Math.random();
      const tier = r < 0.55 ? 's1' : r < 0.82 ? 's2' : r < 0.96 ? 's3' : 's4';
      s.className = 'star ' + tier;
      s.style.left = (Math.random()*100) + '%';
      s.style.top  = (Math.random()*100) + '%';
      s.style.setProperty('--d',   (2.5 + Math.random()*5) + 's');
      s.style.setProperty('--del', (Math.random()*5) + 's');
      s.style.setProperty('--min', (0.10 + Math.random()*0.20).toFixed(2));
      s.style.setProperty('--max', (0.55 + Math.random()*0.40).toFixed(2));
      sl.appendChild(s);
    }
  })();

  // Build confetti pieces — colors from the brand gradient
  (function () {
    const wrap = document.getElementById('confetti');
    const colors = ['#FFD05C','#FF6BAA','#B388FF','#6F70FF','#2F8FFF','#5CE1E6'];
    for (let i = 0; i < 28; i++) {
      const c = document.createElement('i');
      c.style.background = colors[i % colors.length];
      c.style.left = (44 + Math.random() * 12) + '%';
      c.style.top  = '55%';
      c.style.setProperty('--cx', (Math.random() * 320 - 160) + 'px');
      c.style.setProperty('--cy', (-(180 + Math.random() * 320)) + 'px');
      c.style.setProperty('--cr', (Math.random() * 1080 + 360) + 'deg');
      c.style.animationDelay = (Math.random() * 0.25) + 's';
      wrap.appendChild(c);
    }
  })();

  function track(name, props) {
    try { if (window.coreTrack) window.coreTrack(name, props || {}); } catch (e) {}
  }
  window.addEventListener('load', () => track('exit_offer_viewed', {}));

  // Read the trial state so we can personalize copy
  try {
    const t = JSON.parse(localStorage.getItem('coreOnboardTrial') || '{}');
    if (t.name) {
      document.getElementById('headCopy').textContent =
        'Tap the box, ' + t.name + '. There\'s something inside for you.';
    }
  } catch (e) {}

  // Open the box on tap (or keyboard activation)
  const gift = document.getElementById('gift');
  const offer = document.getElementById('offer');
  const ctas = document.getElementById('ctas');
  let opened = false;
  function openGift() {
    if (opened) return;
    opened = true;
    gift.classList.add('open');
    track('exit_offer_opened', {});
    // Stagger reveal copy + CTAs
    setTimeout(() => { offer.classList.add('show'); }, 220);
    setTimeout(() => { ctas.classList.add('show'); }, 700);
  }
  gift.addEventListener('click', openGift);
  gift.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openGift(); }
  });

  // Claim: write discount + send to trial step 20 (the pay step) so user can finish at the discounted rate
  document.getElementById('claimBtn').addEventListener('click', () => {
    if (!opened) { openGift(); return; }
    try {
      localStorage.setItem('coreInviteDiscount', JSON.stringify({
        pct: 50, ref: 'EXIT-INTENT', ts: Date.now(),
      }));
    } catch (e) {}
    track('exit_offer_claimed', {});
    // Back to the exact step they left off on (set by 07-trial's exitConfirm).
    let backStep = 0;
    try { backStep = parseInt(localStorage.getItem('coreTrialStep') || '0', 10) || 0; } catch (e) {}
    window.location.href = './07-trial.html?step=' + backStep;
  });

  // Leave: bounce to launch index
  document.getElementById('leaveBtn').addEventListener('click', () => {
    track('exit_offer_declined', {});
    window.location.href = '01-index.html';
  });

  // Close X — same as decline
  document.getElementById('closeBtn').addEventListener('click', () => {
    track('exit_offer_closed', {});
    window.location.href = '01-index.html';
  });
</script>
</body>
</html>
