<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>Core — Deep life intake</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<script src="_lib/core-back.js"></script>
<script src="_lib/core-theme.js" defer></script>
<script src="_lib/core-ai.js" defer></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{min-height:100vh;background:#0A0A14;color:var(--text);font-family:'Chakra Petch',-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;-webkit-font-smoothing:antialiased;}
  .phone{position:relative;width:390px;height:844px;background:var(--bg-void);border-radius:56px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:30;}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:30;}

  .topbar { position:absolute; top:54px; left:0; right:0; padding: 0 16px; display:flex; align-items:center; gap:8px; z-index: 20; }
  .icon-btn { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .icon-btn svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }
  .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; margin: 0 4px; }
  .progress-fill { height:100%; background: linear-gradient(90deg, #0A84FF, #6BA9FF); transition: width 0.32s cubic-bezier(.32,.72,0,1); }
  .progress-count { font-size: 12px; color: rgba(235,235,245,0.60); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }

  .scroll { position:absolute; top: 100px; left: 0; right: 0; bottom: 120px; padding: 8px 22px 16px; overflow-y: auto; z-index: 10; }
  .scroll::-webkit-scrollbar { display: none; }

  .kicker { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color: rgba(235,235,245,0.50); font-weight:600; margin-top: 4px; }
  .title { font-size:26px; font-weight:700; letter-spacing:-0.5px; line-height:1.12; color: #fff; margin-top: 8px; }
  .copy { font-size: 14px; color: rgba(235,235,245,0.65); margin-top: 8px; line-height: 1.45; }

  /* Inputs */
  .field {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.06); border: none; border-radius: 12px;
    color: #fff; font-family: inherit; font-size: 16px; letter-spacing: -0.2px;
    margin-top: 14px; transition: background 0.15s;
  }
  .field:focus { outline: none; background: rgba(255,255,255,0.10); }
  textarea.field { resize: none; min-height: 120px; }
  .enhance-btn {
    margin-top: 6px;
    background: rgba(10,132,255,0.10); border: 0.5px solid rgba(10,132,255,0.40);
    color: #6BA9FF; padding: 6px 12px; border-radius: 999px;
    font-family: inherit; font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; cursor: pointer;
  }
  .enhance-btn:disabled { opacity: 0.45; }

  /* Options as Apple-list rows */
  .opt-list { margin-top: 14px; background: rgba(255,255,255,0.04); border-radius: 14px; overflow: hidden; }
  .opt-row { display:flex; align-items:center; gap: 12px; padding: 14px 16px; min-height: 44px; border-bottom: 0.5px solid rgba(255,255,255,0.08); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .opt-row:last-child { border-bottom: none; }
  .opt-row:active { background: rgba(255,255,255,0.06); }
  .opt-row .opt-label { flex: 1; font-size: 16px; color: #fff; letter-spacing: -0.2px; }
  .opt-row .opt-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.22); flex-shrink: 0;
    position: relative; transition: all 0.18s;
  }
  .opt-row.sel { background: rgba(10,132,255,0.10); }
  .opt-row.sel .opt-check { background: #0A84FF; border-color: #0A84FF; }
  .opt-row.sel .opt-check::after { content:""; position:absolute; top:6px; left:5px; width:9px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform: rotate(-45deg); }

  /* Slider */
  .slider-wrap { margin-top: 18px; }
  .slider { width: 100%; -webkit-appearance: none; appearance: none; height: 8px; background: rgba(255,255,255,0.10); border-radius: 999px; outline: none; }
  .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #0A84FF, #5B6AE6); cursor: pointer; box-shadow: 0 4px 12px rgba(10,132,255,0.45); }
  .slider-meta { display:flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: rgba(235,235,245,0.60); }
  .slider-value { text-align: center; font-size: 32px; font-weight: 700; color: #fff; margin-top: 14px; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }

  /* CTA */
  .footer { position: absolute; bottom: 0; left:0; right:0; padding: 16px 22px calc(28px + env(safe-area-inset-bottom,0px)); background: linear-gradient(180deg, transparent 0%, rgba(2,2,10,0.85) 30%, #02020A 100%); z-index: 20; }
  .cta { width: 100%; padding: 15px; border: none; border-radius: 14px; background: linear-gradient(180deg, #fff, #e8ecf4); color: #050510; font-family: inherit; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; cursor: pointer; box-shadow: 0 14px 32px rgba(255,255,255,0.10); display: flex; align-items: center; justify-content: center; gap: 6px; }
  .cta:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
  .cta svg { width: 16px; height: 16px; stroke: #050510; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  .footer-note { text-align: center; font-size: 11px; color: rgba(235,235,245,0.50); margin-top: 10px; }

  /* Plan-output screen */
  .plan-card { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 16px; margin-top: 12px; }
  .plan-h { font-size: 13px; font-weight: 400; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(235,235,245,0.60); margin-bottom: 10px; }
  .plan-row { display:flex; gap: 10px; padding: 8px 0; align-items: flex-start; }
  .plan-row .num { width: 24px; height: 24px; border-radius: 50%; background: rgba(10,132,255,0.18); color: #6BA9FF; font-size: 12px; font-weight: 700; display:flex; align-items:center; justify-content:center; flex-shrink: 0; margin-top: 1px; font-variant-numeric: tabular-nums; }
  .plan-row .body { font-size: 14px; color: #fff; line-height: 1.4; }
  .plan-row .body .when { color: rgba(235,235,245,0.50); font-size: 11px; display:block; margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
  .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .analysis-cell { padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.04); }
  .analysis-cell h4 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(235,235,245,0.60); margin-bottom: 6px; font-weight: 600; }
  .analysis-cell li { font-size: 12px; color: #fff; line-height: 1.4; margin-left: 12px; }
  .analysis-cell.strengths   h4 { color: #30D158; }
  .analysis-cell.weaknesses  h4 { color: #FF453A; }
  .analysis-cell.opportunities h4 { color: #FFD60A; }
  .analysis-cell.risks       h4 { color: #FF9F0A; }

  .loading { text-align: center; padding: 40px 20px; }
  .spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.10); border-top-color: #0A84FF; border-radius: 50%; animation: spin 0.85s linear infinite; margin: 0 auto 18px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width:460px){body{padding:0;}.phone{width:100vw;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}.notch,.home-indicator{display:none;}}
</style>
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="topbar">
      <div class="icon-btn" id="backBtn" role="button" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M15 18L9 12l6-6"/></svg>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div class="progress-count" id="progressCount">1/15</div>
    </div>

    <div class="scroll" id="scroll"></div>

    <div class="footer">
      <button class="cta" id="cta" disabled>Continue <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
      <div class="footer-note" id="footerNote">Be honest — the more accurate, the better the plan.</div>
    </div>
  </div>

<script>
  // ── 15-question intake schema ─────────────────────────────────────────
  const QUESTIONS = [
    { id: 'dream',     title: 'What does your dream life look like?',          copy: 'Paint the picture. One year out, five years out — both work.', type: 'textarea', placeholder: 'I want to...' },
    { id: 'success',   title: 'What does success mean to you?',                copy: 'Money, freedom, family, respect — define it in your words.', type: 'textarea', placeholder: 'Success looks like...' },
    { id: 'biggest_problem', title: 'What\'s the biggest problem in your life right now?', copy: 'The one that, if solved, unlocks everything else.', type: 'textarea', placeholder: 'My biggest problem is...' },
    { id: 'worst_habit', title: 'What habit is hurting you most?',             copy: 'You already know. Name it.', type: 'textarea', placeholder: 'I waste too much time on...' },
    { id: 'avoiding',  title: 'What are you avoiding?',                        copy: 'The thing you keep pushing to tomorrow.', type: 'textarea', placeholder: 'I keep avoiding...' },
    { id: 'twelve_month', title: 'What would change your life in 12 months?',  copy: 'The single thing that would matter most.', type: 'textarea', placeholder: 'In 12 months I want to...' },
    { id: 'income_goal', title: 'What\'s your income goal — monthly?',          copy: 'Be specific. Numbers force action.', type: 'options',
      options: [
        { id: 'lt-3k',     label: 'Less than $3k / mo' },
        { id: '3-5k',      label: '$3k–$5k / mo' },
        { id: '5-10k',     label: '$5k–$10k / mo' },
        { id: '10-25k',    label: '$10k–$25k / mo' },
        { id: '25k-plus',  label: '$25k+ / mo' },
        { id: 'not-money', label: 'Money isn\'t my main goal' },
      ]
    },
    { id: 'fitness_level', title: 'How fit do you want to be?',                copy: 'Honest answer, not the fantasy.', type: 'slider', min: 1, max: 10, value: 7,
      labels: { 1: 'Just healthy', 5: 'Strong + lean', 10: 'Athlete-level' } },
    { id: 'legacy',    title: 'What do you want people to remember you for?',  copy: 'The line on your tombstone.', type: 'textarea', placeholder: 'I want to be remembered as...' },
    { id: 'distractions', title: 'What are your biggest distractions?',        copy: 'Pick all that apply.', type: 'multi',
      options: ['Phone / social', 'TV / streaming', 'Gaming', 'Food', 'Alcohol', 'Porn', 'Other people\'s drama', 'My own thoughts']
    },
    { id: 'skill_gap', title: 'What skill would change your future?',          copy: 'If you mastered it in 12 months — life looks different.', type: 'textarea', placeholder: 'If I could master...' },
    { id: 'wish_better', title: 'What do you wish you were better at?',        copy: 'No filter. First thing that comes to mind.', type: 'textarea', placeholder: 'I wish I was better at...' },
    { id: 'sleep_hours', title: 'How many hours do you sleep on average?',     copy: 'Last 7 days, not your goal.', type: 'slider', min: 4, max: 11, value: 7,
      labels: { 4: 'Too little', 7: 'Normal', 11: 'A lot' }, unit: 'h' },
    { id: 'energy_level', title: 'Daily energy level?',                        copy: 'Average across the day.', type: 'slider', min: 1, max: 10, value: 6,
      labels: { 1: 'Burned out', 5: 'Okay', 10: 'Locked in' } },
    { id: 'commitment', title: 'How seriously will you take this?',            copy: 'Honest. Your coach calibrates to your answer.', type: 'options',
      options: [
        { id: 'casual',    label: 'Curious — let\'s see' },
        { id: 'serious',   label: 'Serious — show up daily' },
        { id: 'all-in',    label: 'All in — I want hard pushback' }
      ]
    },
  ];

  const state = { idx: 0, answers: {} };
  const $scroll = document.getElementById('scroll');
  const $progress = document.getElementById('progress');
  const $progressCount = document.getElementById('progressCount');
  const $cta = document.getElementById('cta');
  const $back = document.getElementById('backBtn');

  function render() {
    const q = QUESTIONS[state.idx];
    if (!q) return renderResult();
    $progress.style.width = (state.idx / QUESTIONS.length * 100) + '%';
    $progressCount.textContent = (state.idx + 1) + '/' + QUESTIONS.length;
    $scroll.scrollTop = 0;

    let html = `
      <div class="kicker">Question ${state.idx + 1} of ${QUESTIONS.length}</div>
      <h1 class="title">${q.title}</h1>
      <p class="copy">${q.copy}</p>
    `;
    if (q.type === 'textarea') {
      html += `<textarea class="field" id="qInput" placeholder="${q.placeholder || ''}" autocapitalize="sentences"></textarea>`;
      html += `<button class="enhance-btn" id="enhanceBtn">✨ Enhance with AI</button>`;
    } else if (q.type === 'options') {
      html += `<div class="opt-list">` +
        q.options.map(o => `<div class="opt-row" data-id="${o.id}"><span class="opt-label">${o.label}</span><span class="opt-check"></span></div>`).join('') +
        `</div>`;
    } else if (q.type === 'multi') {
      html += `<div class="opt-list">` +
        q.options.map(o => `<div class="opt-row" data-id="${o}"><span class="opt-label">${o}</span><span class="opt-check"></span></div>`).join('') +
        `</div>`;
    } else if (q.type === 'slider') {
      const cur = state.answers[q.id] ?? q.value;
      html += `<div class="slider-wrap">
        <div class="slider-value" id="qSliderVal">${cur}${q.unit || ''}</div>
        <input type="range" class="slider" id="qSlider" min="${q.min}" max="${q.max}" value="${cur}" />
        <div class="slider-meta">
          <span>${q.labels[q.min] || q.min}</span>
          <span>${q.labels[q.max] || q.max}</span>
        </div>
      </div>`;
    }
    $scroll.innerHTML = html;
    wireQuestion(q);
    refreshCTA();
  }

  function wireQuestion(q) {
    const prev = state.answers[q.id];

    if (q.type === 'textarea') {
      const el = document.getElementById('qInput');
      if (prev) el.value = prev;
      el.addEventListener('input', () => { state.answers[q.id] = el.value.trim(); refreshCTA(); });
      document.getElementById('enhanceBtn').addEventListener('click', async () => {
        const btn = document.getElementById('enhanceBtn');
        const val = el.value.trim();
        if (!val) return;
        btn.disabled = true; btn.textContent = '✨ Enhancing…';
        const r = await coreAI.enhancePrompt(val);
        btn.disabled = false; btn.textContent = '✨ Enhance with AI';
        if (r.ok && r.text) { el.value = r.text; state.answers[q.id] = r.text; refreshCTA(); }
      });
    } else if (q.type === 'options') {
      if (prev) {
        const sel = document.querySelector(`.opt-row[data-id="${prev}"]`);
        if (sel) sel.classList.add('sel');
      }
      document.querySelectorAll('.opt-row').forEach(row => {
        row.addEventListener('click', () => {
          document.querySelectorAll('.opt-row').forEach(r => r.classList.remove('sel'));
          row.classList.add('sel');
          state.answers[q.id] = row.dataset.id;
          refreshCTA();
        });
      });
    } else if (q.type === 'multi') {
      const arr = Array.isArray(prev) ? prev : [];
      arr.forEach(id => {
        const sel = document.querySelector(`.opt-row[data-id="${CSS.escape(id)}"]`);
        if (sel) sel.classList.add('sel');
      });
      document.querySelectorAll('.opt-row').forEach(row => {
        row.addEventListener('click', () => {
          row.classList.toggle('sel');
          state.answers[q.id] = Array.from(document.querySelectorAll('.opt-row.sel')).map(r => r.dataset.id);
          refreshCTA();
        });
      });
    } else if (q.type === 'slider') {
      const sl = document.getElementById('qSlider');
      const lbl = document.getElementById('qSliderVal');
      state.answers[q.id] = state.answers[q.id] ?? q.value;
      sl.addEventListener('input', () => {
        state.answers[q.id] = +sl.value;
        lbl.textContent = sl.value + (q.unit || '');
      });
    }
  }

  function refreshCTA() {
    const q = QUESTIONS[state.idx];
    if (!q) return;
    const v = state.answers[q.id];
    let ready = false;
    if (q.type === 'textarea') ready = v && v.length >= 4;
    else if (q.type === 'options') ready = !!v;
    else if (q.type === 'multi') ready = Array.isArray(v) && v.length > 0;
    else if (q.type === 'slider') ready = true;
    $cta.disabled = !ready;
    $cta.firstChild.textContent = (state.idx === QUESTIONS.length - 1 ? 'Generate plan ' : 'Continue ');
  }

  $cta.addEventListener('click', () => {
    if ($cta.disabled) return;
    if (state.idx < QUESTIONS.length - 1) { state.idx++; render(); }
    else { generate(); }
  });

  $back.addEventListener('click', () => {
    if (state.idx > 0) { state.idx--; render(); }
    else { window.history.length > 1 ? window.history.back() : (window.location.href = '80-settings.html'); }
  });

  // ── Generate the plan via OpenAI ─────────────────────────────────────
  async function generate() {
    try { localStorage.setItem('coreDeepProfile', JSON.stringify(state.answers)); } catch(e){}
    $scroll.innerHTML = `<div class="loading">
      <div class="spinner"></div>
      <div style="color:#fff;font-size:17px;font-weight:600;letter-spacing:-0.3px;">Analyzing your intake…</div>
      <div style="color:rgba(235,235,245,0.60);font-size:13px;margin-top:8px;">Building your 12mo / 90d / 30d / today plan.</div>
    </div>`;
    $cta.disabled = true; $cta.firstChild.textContent = 'Generating… ';
    document.getElementById('footerNote').textContent = 'This takes ~15 seconds.';
    document.getElementById('progress').style.width = '100%';
    document.getElementById('progressCount').textContent = QUESTIONS.length + '/' + QUESTIONS.length;

    const r = await coreAI.generatePlan(state.answers);
    if (!r.ok) {
      // Fallback: build a hand-curated plan from answers
      const fallback = buildFallbackPlan(state.answers);
      try { localStorage.setItem('coreLifePlan', JSON.stringify(fallback)); } catch(e){}
      coreAI.logActivity('deep_intake_complete', { mode: 'fallback', reason: r.error });
      renderResult(fallback);
    } else {
      try { localStorage.setItem('coreLifePlan', JSON.stringify(r.plan)); } catch(e){}
      coreAI.logActivity('deep_intake_complete', { mode: 'ai' });
      renderResult(r.plan);
    }
  }

  // Hand-curated fallback so the page is always useful without an API key.
  function buildFallbackPlan(a) {
    return {
      analysis: {
        strengths:     ['You\'re being honest here', 'You named your worst habit'],
        weaknesses:    [a.worst_habit ? a.worst_habit.slice(0, 80) : 'Avoidance pattern', 'Energy isn\'t where it could be'],
        opportunities: ['Compound a 1% daily habit', 'Anchor one new skill'],
        risks:         ['Doing too much at once', 'Quitting after week 2'],
      },
      year: [
        { title: a.twelve_month ? a.twelve_month.slice(0, 70) : 'Hit your biggest goal', when: 'month-12', why: 'The thing you said matters most.' },
        { title: 'Build the daily routine that supports it', when: 'month-3', why: 'Goal without routine fails.' },
      ],
      quarter: [
        { title: 'Replace ' + (a.worst_habit ? 'your worst habit' : 'one bad pattern'), when: 'week-2', why: 'Drop the anchor.' },
        { title: 'Add 1 keystone habit (sleep / workout / read)', when: 'week-4', why: 'Compound starts.' },
        { title: 'Hit a measurable milestone', when: 'week-12', why: 'Proof of progress.' },
      ],
      month: [
        { title: 'Daily check-in, no skips', when: 'day-1', why: 'Honesty habit.' },
        { title: 'One workout this week', when: 'day-3', why: 'Energy lifts everything.' },
        { title: 'Phone out of bedroom', when: 'day-7', why: 'Sleep + focus win.' },
      ],
      today: [
        { title: 'Sign your daily contract',      category: 'mind',    xp: 5,  difficulty: 1 },
        { title: '10 minutes of focused work',    category: 'business', xp: 10, difficulty: 1 },
        { title: 'Drink 1L water before lunch',   category: 'health',  xp: 5,  difficulty: 1 },
        { title: '5 min reflection at bedtime',   category: 'mind',    xp: 5,  difficulty: 1 },
      ],
    };
  }

  function renderResult(plan) {
    const a = plan.analysis || {};
    $scroll.innerHTML = `
      <div class="kicker">Your life analysis</div>
      <h1 class="title">Here's where you stand.</h1>
      <p class="copy">Built from your answers. We'll iterate on this every week.</p>

      <div class="analysis-grid">
        <div class="analysis-cell strengths"><h4>Strengths</h4><ul>${(a.strengths||[]).map(x=>`<li>${escape(x)}</li>`).join('')}</ul></div>
        <div class="analysis-cell weaknesses"><h4>Weaknesses</h4><ul>${(a.weaknesses||[]).map(x=>`<li>${escape(x)}</li>`).join('')}</ul></div>
        <div class="analysis-cell opportunities"><h4>Opportunities</h4><ul>${(a.opportunities||[]).map(x=>`<li>${escape(x)}</li>`).join('')}</ul></div>
        <div class="analysis-cell risks"><h4>Risks</h4><ul>${(a.risks||[]).map(x=>`<li>${escape(x)}</li>`).join('')}</ul></div>
      </div>

      ${planSection('12 months', plan.year)}
      ${planSection('90 days', plan.quarter)}
      ${planSection('30 days', plan.month)}
      ${planSection('Today', plan.today, true)}
    `;
    $cta.disabled = false;
    $cta.firstChild.textContent = "Add today's tasks ";
    $cta.onclick = () => seedTodayTasks(plan.today || []);
  }

  function planSection(label, list, isToday) {
    if (!Array.isArray(list) || !list.length) return '';
    return `<div class="plan-card">
      <div class="plan-h">${label}</div>
      ${list.map((it, i) => `
        <div class="plan-row">
          <div class="num">${i+1}</div>
          <div class="body">${escape(it.title || '')}
            <span class="when">${escape(it.when || it.category || '')}${it.xp ? ' · '+it.xp+' XP' : ''}</span>
          </div>
        </div>
      `).join('')}
    </div>`;
  }

  function escape(s){ return String(s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  // Seed today's plan items as actionable tasks then route to 34-tasks.html
  function seedTodayTasks(today) {
    try {
      const cur = JSON.parse(localStorage.getItem('coreTasks.v1') || '[]');
      today.forEach(t => {
        cur.push({
          id: 'tk_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
          title: t.title,
          category: t.category || 'mind',
          xp: t.xp || 5,
          difficulty: t.difficulty || 1,
          status: 'pending',
          createdAt: Date.now(),
          proofRequired: !!t.proofRequired,
          source: 'deep-intake'
        });
      });
      localStorage.setItem('coreTasks.v1', JSON.stringify(cur));
    } catch(e){}
    window.location.href = '34-tasks.html?fromPlan=1';
  }

  render();
</script>
</body>
</html>
