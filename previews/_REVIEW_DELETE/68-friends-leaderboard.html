<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Friends leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="stylesheet" href="_lib/core-buttons.css" />
<script src="_lib/core-state.js"></script>
<script src="_lib/analytics.js"></script>
  <script src="_lib/core-back.js"></script>
<style>
  :root { --bg-base:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --accent:#4A8FFF; --border:rgba(255,255,255,0.08); }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }
  .bg { position:absolute; inset:0; background: radial-gradient(60% 30% at 50% 14%, rgba(159,143,255,0.18), transparent 65%), linear-gradient(180deg, #100828 0%, #02020A 60%); }

  .frame { position:absolute; inset:0; z-index:10; padding: 60px 0 24px; display:flex; flex-direction:column; }
  .topbar { padding: 0 22px 12px; display:flex; align-items:center; gap:14px; }
    .back {
      width: 38px !important; height: 38px !important;
      min-width: 38px !important; min-height: 38px !important;
      max-width: 38px !important; max-height: 38px !important;
      aspect-ratio: 1 / 1;
      flex: 0 0 38px;
      align-self: center;
      border-radius: 50% !important;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      display: flex !important; align-items: center !important; justify-content: center !important;
      cursor: pointer; padding: 0;
      font-family: inherit;
      box-sizing: border-box;
      transition: background .15s, border-color .15s, transform .12s;
    }
    .back:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
    .back:active { transform: scale(0.94); }
    .back svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink: 0; }
  .title { font-size:22px; font-weight:700; letter-spacing:-0.5px; flex:1; }
  @media (max-width: 380px) {
    .topbar { padding: 0 16px 10px; gap: 10px; }
    .title { font-size: 16px; letter-spacing: -0.3px; }
    .seg-opt { padding: 5px 10px; font-size: 10.5px; }
  }
  @media (max-width: 340px) {
    .title { font-size: 14px; }
    .seg-opt { padding: 4px 8px; font-size: 10px; }
  }
  .seg { display:flex; padding:4px; background: rgba(255,255,255,0.04); border:1px solid var(--border); border-radius: 999px; }
  .seg-opt { padding:6px 12px; border-radius:999px; font-size:11px; color:var(--muted); font-family:inherit; background:none; border:none; cursor:pointer; font-weight:600; letter-spacing:0.04em; }
  .seg-opt.on { background:#fff; color:#050510; }

  .scroll { flex:1; overflow-y:auto; padding: 0 20px 24px; }
  .scroll::-webkit-scrollbar { display:none; }

  /* week header */
  .wk { padding: 14px 16px; border-radius: 16px; background: rgba(255,255,255,0.03); border:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 14px; }
  .wk-l { font-size:10px; letter-spacing:0.18em; color:var(--muted); font-weight:700; text-transform:uppercase; }
  .wk-num { font-size:20px; font-weight:800; letter-spacing:-0.4px; color:#fff; }
  .wk-delta { font-size:11px; color:#34D399; letter-spacing:0.04em; font-weight:700; }

  /* rows */
  .row {
    display:flex; align-items:center; gap:14px; padding: 12px 14px;
    border-radius:14px; background: rgba(255,255,255,0.03);
    border:1px solid var(--border); margin-bottom: 6px;
    cursor:pointer; transition: background .15s, border-color .15s;
  }
  .row:hover { background: rgba(255,255,255,0.06); }
  .row.you { background: linear-gradient(135deg, rgba(74,143,255,0.10), rgba(91,106,230,0.08)); border-color: rgba(74,143,255,0.45); }
  .pos { width: 22px; text-align:center; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; color: var(--muted); font-weight: 700; }
  .pos.gold { color: #FFC857; }
  .pos.silver { color: #C7D0DE; }
  .pos.bronze { color: #FF7A45; }
  .av { width: 36px; height: 36px; border-radius: 50%; background: radial-gradient(circle at 32% 28%, var(--cl), var(--c) 55%, var(--cd)); box-shadow: 0 0 12px var(--c); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:14px; font-weight:700; color:#fff; position:relative; }
  .av::after { content:""; position:absolute; inset:0; border-radius:50%; background:linear-gradient(160deg, rgba(255,255,255,0.30), transparent 45%); }
  .info { flex:1; }
  .nm { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: -0.1px; display:flex; align-items:center; gap:6px; }
  .nm .rk { font-size: 9px; letter-spacing: 1.6px; padding: 2px 6px; border-radius: 4px; font-weight:700; text-transform: uppercase; }
  .rk.flow  { color: #B388FF; background: rgba(179,136,255,0.12); }
  .rk.forge { color: #FF7A45; background: rgba(255,122,69,0.12); }
  .rk.spark { color: #5CE1E6; background: rgba(92,225,230,0.12); }
  .rk.focus { color: #9AA1B7; background: rgba(255,255,255,0.05); }
  .sub { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }
  .xp { text-align:right; }
  .xp-now { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .xp-d { font-size: 10px; font-weight: 700; letter-spacing:0.06em; margin-top:2px; }
  .xp-d.up { color: #34D399; }
  .xp-d.down { color: #FF4F6B; }
  .xp-d.flat { color: var(--muted); }

    /* core-tabbar-clearance */
    .scroll { padding-bottom: 110px !important; }
  </style>
  <link rel="stylesheet" href="_lib/core-responsive.css">
  <link rel="stylesheet" href="_lib/core-theme.css">
  <script src="_lib/core-theme.js" defer></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="frame">
      <div class="topbar">
        <button class="back" type="button" onclick="window.location.href='66-leaderboard.html'" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="title">Friends · weekly XP</div>
        <div class="seg">
          <button class="seg-opt on" data-period="week" onclick="setPeriod(this)">Week</button>
          <button class="seg-opt" data-period="alltime" onclick="setPeriod(this)">All time</button>
        </div>
      </div>

      <div class="scroll">
        <div class="wk">
          <div>
            <div class="wk-l">Week 21 · Mon → Sun</div>
            <div class="wk-num" id="wkNum">+184 XP</div>
          </div>
          <div class="wk-delta" id="wkDelta">▲ moved 1 spot · #3 → #2</div>
        </div>

        <div id="rows"></div>
      </div>
    </div>
  </div>

<script>
  const FRIENDS = [
    { you: false, name: 'Aisha',  pos: 1, av: 'A', c: '#5CE1E6', cl: '#C2F3F5', cd: '#1F7478', rank: { name: 'Forge II', cls: 'forge' }, days: 47, xpWeek: 412, xpTotal: 2580, deltaPct: '▲ +30%' },
    { you: true,  name: 'You',    pos: 2, av: 'S', c: '#4A8FFF', cl: '#DCE9FF', cd: '#1453A8', rank: { name: 'Flow III', cls: 'flow' },  days: 14, xpWeek: 184, xpTotal: 1140, deltaPct: '▲ +18%' },
    { you: false, name: 'Mia',    pos: 3, av: 'M', c: '#FF6BAA', cl: '#FFD3E4', cd: '#832D50', rank: { name: 'Flow III', cls: 'flow' },  days: 21, xpWeek: 168, xpTotal: 1075, deltaPct: '▲ +12%' },
    { you: false, name: 'Jordan', pos: 4, av: 'J', c: '#B388FF', cl: '#E6D7FF', cd: '#4F3A8A', rank: { name: 'Spark II', cls: 'spark' }, days:  7, xpWeek: 124, xpTotal:  410, deltaPct: '▲ +24%' },
    { you: false, name: 'Sam',    pos: 5, av: 'S', c: '#FFD05C', cl: '#FFEEBF', cd: '#876619', rank: { name: 'Focus III', cls: 'focus' }, days:  2, xpWeek:  58, xpTotal:  170, deltaPct: '▼ −44%' },
  ];

  function render(period) {
    const rows = document.getElementById('rows');
    rows.innerHTML = '';
    const data = FRIENDS.slice().sort((a,b) => period === 'week' ? b.xpWeek - a.xpWeek : b.xpTotal - a.xpTotal);
    data.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'row' + (f.you ? ' you' : '');
      const posCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const xpShow = period === 'week' ? '+' + f.xpWeek : f.xpTotal.toLocaleString();
      const dCls = f.deltaPct.startsWith('▲') ? 'up' : f.deltaPct.startsWith('▼') ? 'down' : 'flat';
      div.innerHTML =
        '<div class="pos ' + posCls + '">' + (i + 1) + '</div>' +
        '<div class="av" style="--c:' + f.c + ';--cl:' + f.cl + ';--cd:' + f.cd + '">' + f.av + '</div>' +
        '<div class="info"><div class="nm">' + f.name + ' <span class="rk ' + f.rank.cls + '">' + f.rank.name + '</span></div><div class="sub">' + f.days + 'd clean</div></div>' +
        '<div class="xp"><div class="xp-now">' + xpShow + (period === 'week' ? ' XP' : '') + '</div><div class="xp-d ' + dCls + '">' + f.deltaPct + '</div></div>';
      div.onclick = () => location.href = f.you ? '62-profile.html' : '63-user-profile.html';
      rows.appendChild(div);
    });
    // header copy reflects "your" delta
    const me = data.find(f => f.you);
    const meIdx = data.indexOf(me);
    const wkN = document.getElementById('wkNum');
    const wkD = document.getElementById('wkDelta');
    wkN.textContent = period === 'week' ? '+' + me.xpWeek + ' XP' : me.xpTotal.toLocaleString() + ' XP total';
    wkD.textContent = '#' + (meIdx + 1) + ' of ' + data.length + ' friends';
  }
  function setPeriod(btn) {
    document.querySelectorAll('.seg-opt').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    if (window.coreTrack) coreTrack('friends_leaderboard_period', { period: btn.dataset.period });
    render(btn.dataset.period);
  }
  (function() {
    let me;
    try {
      const xp = coreState.read().xp;
      const days = coreState.read().streak.days;
      me = FRIENDS.find(f => f.you);
      me.xpTotal = xp;
      me.days = days;
    } catch(e){}
    try {
      const t = JSON.parse(localStorage.getItem('coreOnboardTrial')||'{}');
      if (t.name) FRIENDS.find(f => f.you).name = t.name;
    } catch(e){}
    render('week');
    if (window.coreTrack) coreTrack('friends_leaderboard_viewed', {});
  })();
</script>
<div class="tabbar"></div>
<script src="_lib/core-tabbar.js"></script>
</body>
</html>
