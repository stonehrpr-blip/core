<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>Core — Build your routine</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#02020A" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<style>
  :root {
    --bg-void:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
    --accent:#4A8FFF; --accent-hi:#6BA9FF;
    --border:rgba(255,255,255,0.06);
    --ease:cubic-bezier(0.22,1,0.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    min-height:100vh; background:#0A0A14; color:var(--text);
    font-family:'Chakra Petch',-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:24px; overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  .phone{
    position:relative; width:390px; height:844px; background:var(--bg-void);
    border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;
  }
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:30;}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:30;}
  .bg{position:absolute;inset:0;z-index:0;background:radial-gradient(60% 30% at 50% 6%, rgba(74,143,255,0.16), transparent 55%),linear-gradient(180deg,#050518 0%,#02020A 55%,#050510 100%);}

  .frame { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding: 56px 22px 24px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .back {
      width: 38px !important; height: 38px !important;
      min-width: 38px !important; min-height: 38px !important;
      max-width: 38px !important; max-height: 38px !important;
      aspect-ratio: 1 / 1;
      flex: 0 0 38px;
      align-self: center;
      border-radius: 50% !important;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      display: flex !important; align-items: center !important; justify-content: center !important;
      cursor: pointer; padding: 0;
      font-family: inherit;
      box-sizing: border-box;
      transition: background .15s, border-color .15s, transform .12s;
    }
    .back:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
    .back:active { transform: scale(0.94); }
    .back svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink: 0; }
  .progress-bar { flex:1; height:4px; border-radius:999px; background:rgba(255,255,255,0.08); overflow:hidden; }
  .progress-fill { height:100%; background: var(--accent); box-shadow: 0 0 8px var(--accent); border-radius:999px; transition: width 0.5s var(--ease); width: 14%; }
  .step-meta { font-size:11px; color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; }

  .step { padding: 24px 4px 0; flex: 1; display: flex; flex-direction: column; }
  .step .eye { font-size:11px; letter-spacing:0.04em; color: var(--accent-hi); font-weight: 600; }
  .step h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.1; margin: 8px 0 6px; color: #fff; }
  .step .sub { font-size: 14px; color: var(--muted); line-height: 20px; letter-spacing: -0.05px; margin-bottom: 24px; }

  /* Answer options */
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    padding: 14px 16px; border-radius: 14px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: #fff; font-size: 14.5px; font-weight: 500; letter-spacing: -0.1px;
    cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: background 0.15s, border-color 0.15s, transform 0.12s;
  }
  .opt:hover { background: rgba(255,255,255,0.06); }
  .opt:active { transform: scale(0.99); }
  .opt.sel { background: rgba(74,143,255,0.10); border-color: rgba(74,143,255,0.45); }
  .opt-tick { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .opt.sel .opt-tick { background: var(--accent); border-color: var(--accent); }
  .opt.sel .opt-tick::after { content:""; width: 7px; height: 4px; border-left: 1.8px solid #fff; border-bottom: 1.8px solid #fff; transform: rotate(-45deg) translate(0px, -1px); }
  .opt .body { flex: 1; min-width: 0; }
  .opt .title { font-size: 14.5px; font-weight: 600; }
  .opt .sub2 { font-size: 12px; color: var(--muted); margin-top: 2px; letter-spacing: -0.05px; }

  /* Time picker */
  .time-picker { display: flex; gap: 8px; }
  .time-input {
    flex: 1; padding: 14px; border-radius: 14px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: #fff; font-family: inherit; font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
    text-align: center; outline: none;
    font-variant-numeric: tabular-nums;
  }
  .time-input:focus { border-color: var(--accent); background: rgba(74,143,255,0.06); }

  /* Slider for sleep hours */
  .slider-wrap { padding: 18px; border-radius: 14px; background: rgba(255,255,255,0.04); border:1px solid var(--border); }
  .slider-val { text-align: center; font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -0.8px; font-variant-numeric: tabular-nums; }
  .slider-unit { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.10); outline: none; }
  .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 10px var(--accent); }
  .slider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; box-shadow: 0 0 10px var(--accent); }

  /* CTA footer */
  .footer { margin-top: auto; }
  .cta {
    width: 100%; padding: 16px; border: none; border-radius: 16px;
    background: linear-gradient(180deg, #fff, #e8ecf4); color: #050510;
    font-family: inherit; font-size: 15px; font-weight: 700; letter-spacing: -0.2px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; box-shadow: 0 14px 32px rgba(255,255,255,0.18);
    transition: transform 0.12s, opacity 0.2s;
  }
  .cta:active { transform: scale(0.985); }
  .cta:disabled { opacity: 0.5; cursor: not-allowed; }
  .cta svg { width: 16px; height: 16px; stroke: #050510; fill:none; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }
  .skip { text-align:center; margin-top: 10px; font-size: 12px; color: var(--muted); cursor: pointer; padding: 8px; }
  .skip:hover { color: #fff; }

  /* Final summary screen */
  .summary { padding: 16px 0; }
  .summary-card { padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.04); border:1px solid var(--border); margin-bottom: 8px; display:flex; gap: 10px; align-items: center; }
  .summary-card .t { flex-shrink: 0; font-size: 12px; font-weight: 700; color: var(--accent-hi); width: 52px; font-variant-numeric: tabular-nums; }
  .summary-card .b { flex: 1; min-width: 0; }
  .summary-card .b .name { font-size: 14px; font-weight: 600; color: #fff; }
  .summary-card .b .sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

  @media (max-width: 460px) {
    body { padding: 0; }
    .phone { width: 100vw; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
    .notch, .home-indicator { display: none; }
  }
  @media (max-width: 380px), (max-height: 720px) {
    .frame { padding: 50px 18px 18px; }
    .step h1 { font-size: 24px; }
    .step .sub { font-size: 13px; line-height: 18px; margin-bottom: 18px; }
    .opt { padding: 12px 14px; font-size: 13.5px; }
  }
</style>
<link rel="stylesheet" href="_lib/core-responsive.css">
<link rel="stylesheet" href="_lib/core-theme.css">
<script src="_lib/core-state.js"></script>
<script src="_lib/analytics.js"></script>
<script src="_lib/core-back.js"></script>
<script src="_lib/core-theme.js" defer></script>
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="frame">
      <div class="topbar">
        <button class="back" type="button" onclick="window.location.href='20-dashboard.html'" aria-label="Back">
          <svg viewBox="0 0 24 24"><path d="M15 18L9 12l6-6"/></svg>
        </button>
        <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
        <div class="step-meta" id="pMeta">1 / 7</div>
      </div>

      <div class="step" id="step">
        <!-- Step content rendered by JS -->
      </div>

      <div class="footer">
        <button class="cta" id="cta" onclick="next()">
          <span id="ctaText">Continue</span>
          <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
        <div class="skip" id="skip" onclick="skip()">Skip this step</div>
      </div>
    </div>
  </div>

<script>
  // 7-step quiz that builds a personalized routine
  const STEPS = [
    {
      id: 'wake',
      eye: 'Step 1',
      title: 'What time do you wake up?',
      sub: 'We use this to anchor your morning check-in and first nudge.',
      type: 'time',
      default: '07:00',
    },
    {
      id: 'work',
      eye: 'Step 2',
      title: 'When does your work day start?',
      sub: 'So Coach can avoid pinging during deep-focus hours.',
      type: 'time',
      default: '09:00',
    },
    {
      id: 'risk',
      eye: 'Step 3',
      title: 'When are you most likely to slip?',
      sub: 'Be honest — this is the window Coach will protect.',
      type: 'choice',
      options: [
        { value: 'mid-afternoon', title: 'Mid-afternoon', sub: '2pm – 5pm · post-lunch dip' },
        { value: 'after-work',    title: 'After work',    sub: '5pm – 8pm · the comedown' },
        { value: 'late-night',    title: 'Late night',    sub: '10pm – 1am · doom-scroll zone' },
        { value: 'unpredictable', title: 'Unpredictable', sub: 'Comes out of nowhere' },
      ],
    },
    {
      id: 'gym',
      eye: 'Step 4',
      title: 'How often do you train?',
      sub: 'We\'ll slot gym sessions into your routine.',
      type: 'choice',
      options: [
        { value: '0', title: 'Not at the moment', sub: 'Skip the gym slot' },
        { value: '3', title: '3× a week',         sub: 'Mon · Wed · Fri' },
        { value: '4', title: '4× a week',         sub: 'Mon · Tue · Thu · Sat' },
        { value: '5', title: '5× a week',         sub: 'Daily except weekends' },
        { value: '6', title: '6× a week',         sub: 'One rest day' },
      ],
    },
    {
      id: 'gym_time',
      eye: 'Step 5',
      title: 'When do you train?',
      sub: 'Time of day for your gym session.',
      type: 'time',
      default: '17:30',
      skipIf: (a) => a.gym === '0',
    },
    {
      id: 'sleep',
      eye: 'Step 6',
      title: 'Sleep target?',
      sub: 'Hours per night you\'re aiming for.',
      type: 'slider',
      min: 5, max: 10, step: 0.5, default: 7.5, unit: 'hours of sleep',
    },
    {
      id: 'bedtime',
      eye: 'Step 7',
      title: 'When\'s lights out?',
      sub: 'Triggers your bedtime reflection nudge.',
      type: 'time',
      default: '22:30',
    },
  ];

  const state = { idx: 0, answers: {} };
  const stepEl = document.getElementById('step');
  const ctaEl  = document.getElementById('cta');
  const ctaTxt = document.getElementById('ctaText');
  const pFill  = document.getElementById('pFill');
  const pMeta  = document.getElementById('pMeta');
  const skipEl = document.getElementById('skip');

  function visibleSteps() {
    return STEPS.filter(s => !s.skipIf || !s.skipIf(state.answers));
  }

  function renderStep() {
    const all = visibleSteps();
    const s = all[state.idx];
    if (!s) return renderSummary();
    const pct = ((state.idx) / all.length) * 100;
    pFill.style.width = Math.max(8, pct) + '%';
    pMeta.textContent = (state.idx + 1) + ' / ' + all.length;
    skipEl.style.display = '';
    ctaTxt.textContent = state.idx === all.length - 1 ? 'Build my routine' : 'Continue';

    let body = `<div class="eye">${s.eye}</div><h1>${s.title}</h1><div class="sub">${s.sub}</div>`;
    if (s.type === 'choice') {
      body += '<div class="opts">' + s.options.map(o => `
        <div class="opt" data-v="${o.value}">
          <div class="opt-tick"></div>
          <div class="body">
            <div class="title">${o.title}</div>
            <div class="sub2">${o.sub}</div>
          </div>
        </div>
      `).join('') + '</div>';
    } else if (s.type === 'time') {
      const val = state.answers[s.id] || s.default;
      body += `<div class="time-picker">
        <input class="time-input" type="time" value="${val}" id="qInput" />
      </div>`;
    } else if (s.type === 'slider') {
      const val = state.answers[s.id] || s.default;
      body += `<div class="slider-wrap">
        <div class="slider-val" id="slVal">${val}</div>
        <div class="slider-unit">${s.unit}</div>
        <input type="range" class="slider" id="qInput" min="${s.min}" max="${s.max}" step="${s.step}" value="${val}" />
      </div>`;
    }
    stepEl.innerHTML = body;

    // Wire option clicks for choice steps
    if (s.type === 'choice') {
      const saved = state.answers[s.id];
      stepEl.querySelectorAll('.opt').forEach(o => {
        if (o.dataset.v === saved) o.classList.add('sel');
        o.addEventListener('click', () => {
          stepEl.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
          o.classList.add('sel');
          state.answers[s.id] = o.dataset.v;
        });
      });
    }
    if (s.type === 'slider') {
      const inp = document.getElementById('qInput');
      const val = document.getElementById('slVal');
      inp.addEventListener('input', () => {
        val.textContent = inp.value;
        state.answers[s.id] = parseFloat(inp.value);
      });
    }
    if (s.type === 'time') {
      const inp = document.getElementById('qInput');
      inp.addEventListener('input', () => { state.answers[s.id] = inp.value; });
    }
  }

  function captureCurrent() {
    const all = visibleSteps();
    const s = all[state.idx];
    if (!s) return;
    if (s.type === 'time' || s.type === 'slider') {
      const inp = document.getElementById('qInput');
      if (inp) state.answers[s.id] = s.type === 'slider' ? parseFloat(inp.value) : inp.value;
    }
    if (s.type === 'choice' && state.answers[s.id] === undefined) {
      state.answers[s.id] = (s.default || (s.options && s.options[0].value));
    }
    if (state.answers[s.id] === undefined && s.default) {
      state.answers[s.id] = s.default;
    }
  }

  function next() {
    captureCurrent();
    const all = visibleSteps();
    if (state.idx >= all.length - 1) {
      buildAndSave();
      renderSummary();
    } else {
      state.idx++;
      renderStep();
    }
  }
  function skip() {
    state.answers[visibleSteps()[state.idx].id] = null;
    next();
  }

  // ── Build a routine from answers + save to coreRoutine ────────────────
  function buildAndSave() {
    const a = state.answers;
    const items = [];
    // Format helpers
    function plus(time, mins) {
      if (!time) return null;
      const [h, m] = time.split(':').map(Number);
      const d = new Date(); d.setHours(h, m + mins, 0, 0);
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
    function add(time, title, sub) { items.push({ time, title, sub }); }

    if (a.wake)     add(a.wake,           'Morning check-in', '30s — how did you sleep?');
    if (a.wake)     add(plus(a.wake, 14), "Coach's headline",  'Today\'s pattern callout');
    if (a.work)     add(a.work,           'Deep work block',  'Coach pauses nudges');
    // Risk-window pre-decide nudge
    const RISK_TIMES = { 'mid-afternoon':'14:30', 'after-work':'17:30', 'late-night':'22:00', 'unpredictable':'15:00' };
    if (a.risk)     add(RISK_TIMES[a.risk] || '15:00', 'Pre-slip nudge', 'Pre-decide before the window');
    if (a.gym_time && a.gym !== '0') add(a.gym_time, 'Gym session', a.gym + '× / week · tap for today\'s workout');
    if (a.bedtime)  add(a.bedtime,        'Bedtime reflection', 'One honest line before sleep');
    if (a.sleep && a.bedtime) {
      const [h, m] = a.bedtime.split(':').map(Number);
      const wake = new Date(); wake.setHours(h + Math.floor(a.sleep), m + (a.sleep % 1) * 60, 0, 0);
      add(String(wake.getHours()).padStart(2,'0') + ':' + String(wake.getMinutes()).padStart(2,'0'),
          'Sleep target', a.sleep + 'h tracked');
    }
    // Sort by time
    items.sort((x, y) => (x.time || '99:99').localeCompare(y.time || '99:99'));

    try {
      localStorage.setItem('coreRoutine', JSON.stringify(items));
      localStorage.setItem('coreRoutineAnswers', JSON.stringify(a));
    } catch (e) {}
    if (window.coreTrack) coreTrack('routine_built', { items: items.length });
  }

  function renderSummary() {
    const items = JSON.parse(localStorage.getItem('coreRoutine') || '[]');
    pFill.style.width = '100%';
    pMeta.textContent = 'Done';
    skipEl.style.display = 'none';
    ctaTxt.textContent = 'Open dashboard';
    ctaEl.onclick = () => { window.location.href = '20-dashboard.html'; };

    let body = `<div class="eye">Your routine</div><h1>Built. Tuned to you.</h1><div class="sub">${items.length} events anchor your day. You can edit any time from the dashboard.</div>`;
    body += '<div class="summary">' + items.map(i => `
      <div class="summary-card">
        <div class="t">${i.time || '—'}</div>
        <div class="b">
          <div class="name">${i.title}</div>
          <div class="sub">${i.sub || ''}</div>
        </div>
      </div>
    `).join('') + '</div>';
    stepEl.innerHTML = body;
  }

  renderStep();
  if (window.coreTrack) coreTrack('screen_view', { screen: 'routine-builder' });
</script>
</body>
</html>
