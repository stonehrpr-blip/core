<style>
  :root {
    --bg-base: #02020A;
    --text: #F8FAFE;
    --muted: #9AA1B7;
    --dim: #4F5570;
    --accent: #4A8FFF;
    --accent-hi: #6BA9FF;
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.10);
    --stat-c: #4A8FFF; /* overridden per stat */
    --stat-c-soft: rgba(74,143,255,0.10);
    --stat-c-border: rgba(74,143,255,0.30);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    min-height:100vh; background:#0A0A14;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
    color: var(--text); padding:24px; overflow:hidden;
  }
  .phone {
    position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38;
  }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }

  /* Atmosphere */
  .bg {
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(60% 30% at 50% 18%, var(--stat-c-soft) 0%, transparent 65%),
      radial-gradient(60% 30% at 50% 95%, rgba(0,0,0,0.4) 0%, transparent 65%),
      linear-gradient(180deg, #050518 0%, #02020A 55%, #050510 100%);
  }
  .aurora { position:absolute; inset:0; pointer-events:none; opacity:0.35; mix-blend-mode:screen; z-index:1; }
  .aurora::before { content:""; position:absolute; width:70%; height:40%; left:-10%; top:6%; background: radial-gradient(circle, var(--stat-c-soft), transparent 65%); border-radius:50%; filter:blur(70px); animation: aDrift 22s ease-in-out infinite; }
  @keyframes aDrift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-16px) scale(1.06); } }
  .stars { position:absolute; inset:0; pointer-events:none; z-index:2; }
  .star { position:absolute; border-radius:50%; background:#fff; animation: twk var(--d,4s) ease-in-out var(--del,0s) infinite; }
  .star.s1 { width:1px; height:1px; opacity:0.30; }
  .star.s2 { width:1.5px; height:1.5px; opacity:0.45; }
  @keyframes twk { 0%,100% { opacity:var(--min,0.10); transform:scale(0.7); } 50% { opacity:var(--max,0.55); transform:scale(1.15); } }

  /* Layout */
  .frame { position:absolute; inset:0; padding: 56px 0 0; z-index:10; }

  .topbar { padding: 0 20px; display:flex; align-items:center; gap:12px; height: 44px; }
  .back-btn { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.04); border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .back-btn svg { width:16px; height:16px; stroke: var(--text); fill: none; stroke-width: 2; stroke-linecap:round; stroke-linejoin:round; }
  .progress-wrap { flex:1; height:4px; background: rgba(255,255,255,0.06); border-radius:999px; overflow:hidden; }
  .progress-bar { height:100%; background: var(--stat-c); border-radius:999px; box-shadow: 0 0 8px var(--stat-c); transition: width 0.4s cubic-bezier(0.22,1,0.36,1); }
  .step-count { font-size:11px; color: var(--muted); font-family:ui-monospace,"SF Mono",Menlo,monospace; letter-spacing:0.10em; font-weight:600; flex-shrink:0; }

  /* Hero — compact one-line copy so the stage doesn't get pushed down */
  .hero { padding: 14px 24px 16px; display:flex; align-items:center; gap:12px; height: 90px; }
  .hero-icon { width:46px; height:46px; border-radius:12px; background: var(--stat-c); box-shadow: 0 0 22px var(--stat-c-soft); display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0; }
  .hero-icon::after { content:""; position:absolute; inset:0; border-radius:12px; background: linear-gradient(160deg, rgba(255,255,255,0.30) 0%, transparent 45%); }
  .hero-icon svg { width:22px; height:22px; stroke:#fff; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; position:relative; z-index:2; }
  .hero-text { min-width:0; flex:1; }
  .hero-eyebrow { font-size:9px; letter-spacing:0.22em; text-transform:uppercase; font-weight:700; color: var(--stat-c); }
  .hero-title { font-size:22px; font-weight:700; letter-spacing:-0.6px; line-height:1.05; margin-top:2px; color:#fff; }
  .hero-copy { font-size:11px; color: var(--muted); margin-top:3px; letter-spacing:-0.05px; line-height:14px; }

  /* Step stage */
  .stage { position:absolute; left:0; right:0; top:178px; bottom:120px; padding: 0 24px; overflow-y:auto; overflow-x:hidden; z-index:6; }
  .stage::-webkit-scrollbar { display:none; }
  .step-stage { position:relative; }
  .step { display:none; flex-direction:column; padding-bottom: 12px; width:100%; }
  .step.active { display:flex; }
  .step.active.first-mount { animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1); }
  @keyframes slideUp { from { opacity:0; transform: translateY(14px); filter: blur(4px); } to { opacity:1; transform: none; filter: blur(0); } }
  .step .qkicker { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stat-c); font-weight: 700; margin-bottom: 8px; }
  .step .qtitle { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.15; margin: 4px 0 6px; color:#fff; }
  .step .qsub { font-size: 12px; color: var(--muted); margin-bottom: 16px; letter-spacing:-0.05px; line-height: 17px; }

  /* Option pills */
  .opts { display:flex; flex-direction:column; gap:8px; }
  .opt {
    display:flex; align-items:center; gap:12px;
    padding: 14px; border-radius: 14px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border-strong);
    cursor: pointer; transition: all 0.18s;
    font-family: inherit; color: var(--text); text-align: left; width:100%;
  }
  .opt:hover { background: rgba(255,255,255,0.05); transform: translateY(-1px); }
  .opt:active { transform: scale(0.98); }
  .opt.selected { border-color: var(--stat-c); background: var(--stat-c-soft); box-shadow: 0 0 0 1px var(--stat-c), 0 0 18px var(--stat-c-soft); }
  .opt-bullet {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center; flex-shrink:0; transition: all 0.18s;
  }
  .opt.selected .opt-bullet { background: var(--stat-c); border-color: var(--stat-c); }
  .opt.selected .opt-bullet::after { content:""; width:9px; height:5px; border:2px solid #050510; border-top:0; border-right:0; transform: rotate(-45deg) translate(1px,-1px); }
  .opt-body { flex:1; min-width:0; }
  .opt-title { font-size:14px; font-weight:600; letter-spacing:-0.2px; line-height:1.2; color:#fff; }
  .opt-desc { font-size:11px; color: var(--muted); margin-top: 3px; letter-spacing:-0.05px; line-height:14px; }

  /* Staggered entrance */
  .step.active .opt { opacity:0; animation: optIn 0.4s cubic-bezier(.22,1,.36,1) forwards; }
  .step.active .opt:nth-child(1) { animation-delay: .08s; }
  .step.active .opt:nth-child(2) { animation-delay: .15s; }
  .step.active .opt:nth-child(3) { animation-delay: .22s; }
  .step.active .opt:nth-child(4) { animation-delay: .29s; }
  @keyframes optIn { from { opacity:0; transform: translateY(8px) scale(0.97); } to { opacity:1; transform: none; } }

  /* Footer */
  .footer { position:absolute; bottom:0; left:0; right:0; padding: 14px 24px 32px; z-index:8; }
  .footer::before { content:""; position:absolute; inset: -40px 0 0 0; background: linear-gradient(180deg, transparent 0%, rgba(2,2,10,0.85) 50%, rgba(2,2,10,0.98) 100%); pointer-events:none; z-index:-1; }
  .cta {
    width:100%; padding: 16px; border-radius: 999px;
    background: #fff; color: #050510; border:1px solid rgba(255,255,255,0.6);
    font-family: inherit; font-size: 15px; font-weight: 700; letter-spacing:-0.2px; cursor:pointer;
    transition: opacity 0.2s, transform 0.12s, box-shadow 0.25s;
    box-shadow: 0 0 0 1px var(--stat-c-border), 0 10px 30px var(--stat-c-soft), inset 0 1px 0 rgba(255,255,255,0.85);
  }
  .cta:active { transform: scale(0.985); }
  .cta:disabled { background: rgba(255,255,255,0.10); color: var(--dim); cursor: not-allowed; box-shadow: none; border-color: var(--border); }
  .footer-hint { text-align:center; margin-top:8px; font-size:11px; color: var(--dim); letter-spacing:0.04em; }

  .preview-label { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#4A5060; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-family:ui-monospace,"SF Mono",Menlo,monospace; }
  @media (max-width: 460px) {
    body { padding:0; }
    .phone { width:100vw; height:100vh; height:100dvh; border-radius:0; box-shadow:none; }
    .notch, .home-indicator, .preview-label { display:none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .star, .aurora::before { animation: none !important; }
    .step.active .opt { animation: none !important; opacity:1; }
  }
</style>

    <div class="bg"></div>

<script>
  // ─── Stat configs ─────────────────────────────────────────────────────────

  // Honest, not flattering: easy answers don't earn high scores.

      copy: 'Mind, focus, clarity. 4 quick questions.',

          opts:[
            { t:'Rough',     d:'Light, broken, wired',          v:20 },

            { t:'Good',      d:'Mostly rested',                 v:75 },

          opts:[

            { t:'< 5 hours',  d:"Debt zone",                     v:15 },
            { t:'5–6 hours',  d:"Short",                         v:40 },
            { t:'7–8 hours',  d:"Healthy",                       v:85 },
            { t:'9+ hours',   d:"Plenty",                        v:90 } ] },
        { kicker:'Water', title:'How much water do you drink daily?', sub:'Plain water counts; coffee and energy drinks do not.',
          opts:[
            { t:'< 1L',  d:"Dehydrated default",                 v:15 },
            { t:'1–2L',  d:"Average",                            v:50 },
            { t:'2–3L',  d:"Good",                               v:80 },
            { t:'3L+',   d:"Excellent",                          v:95 } ] }
      ]
    }
  };

  // Detect which stat to run from ?stat=<key>
  const params = new URLSearchParams(location.search);
  const statKey = (params.get('stat') || 'brain').toLowerCase();
  const stat = STATS[statKey] || STATS.brain;

  // #40 Recalibrate cooldown — 7 days between recalibrations (first run always allowed)
  (function() {
    try {
      const s = coreState.read();
      const lastDone = (s.statWizardsDone || {})[statKey];
      if (lastDone && (Date.now() - lastDone) < 7 * 86400000) {
        const daysLeft = Math.ceil((7 * 86400000 - (Date.now() - lastDone)) / 86400000);
        // Allow override via ?force=1 (for testing)
        if (!params.get('force')) {
          if (window.coreToast) {
            setTimeout(() => coreToast('Recalibrate available in ' + daysLeft + ' day' + (daysLeft === 1 ? '' : 's'), { kind: 'warn', ttl: 3200 }), 200);
          }
          // Don't block entirely — let user proceed but flag it
        }
      }
    } catch(e){}
  })();

  // Theming
  function hexToRgba(hex, a) {
    const m = hex.replace('#', '');
    const n = parseInt(m, 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }
  document.documentElement.style.setProperty('--stat-c', stat.color);
  document.documentElement.style.setProperty('--stat-c-soft', hexToRgba(stat.color, 0.14));
  document.documentElement.style.setProperty('--stat-c-border', hexToRgba(stat.color, 0.45));
  document.getElementById('heroIconSvg').innerHTML = stat.icon;
  document.getElementById('heroTitle').textContent = stat.name;
  document.getElementById('heroCopy').textContent = stat.copy;
  document.getElementById('previewLabel').textContent = 'core · stat-wizard · ' + statKey + ' · v1';

  // Render questions into the step divs
  const answers = [null, null, null, null];

  // #37 — Prefill answers from the setup quiz where there's a clean mapping.
  // The quiz captures vape/sleep/routine etc. so we seed those into the matching
  // wizard slot. User can still change before continuing.
  (function() {
    try {
      const qa = JSON.parse(localStorage.getItem('coreQuizAnswers') || '{}');
      const PREFILL = {
        lungs: {
          // Q0 is "Do you vape?" — quiz captured this on the legacy `vape` habit pick
          0: function() {
            // The quiz blocker / habit pick gives us a rough signal
            const h = (JSON.parse(localStorage.getItem('coreOnboardTrial') || '{}')).habit;
            return h === 'vape' ? 25 : 60;
          },
        },
        brain: {
          // Q2 is sleep — quiz had sleep slider
          2: function() { return qa.sleep != null ? (qa.sleep >= 8 ? 95 : qa.sleep >= 7 ? 75 : qa.sleep >= 6 ? 45 : 20) : null; },
        },
        willpower: {
          // Q0 is follow-through — quiz captured routine
          0: function() {
            const r = qa.routine || '';
            if (r === 'Locked in') return 95;
            if (r === 'Pretty decent') return 75;
            if (r === 'I try but fall off') return 45;
            if (r === 'Messy and random') return 15;
            return null;
          },
        },
      };
      const pf = PREFILL[statKey];
      if (!pf) return;
      Object.keys(pf).forEach(idxStr => {
        const idx = parseInt(idxStr, 10);
        const v = pf[idxStr]();
        if (v != null) answers[idx] = v;
      });
    } catch(e){}
  })();
  function renderQuestion(idx) {
    const q = stat.questions[idx];
    const stepEl = document.getElementById('step' + (idx + 1));
    const prefilled = answers[idx];
    const optsHtml = q.opts.map((o, i) => {
      // Mark prefilled option as selected so user sees the carry-over from quiz
      const sel = (typeof prefilled === 'number' && Math.abs(o.v - prefilled) < 5) ? ' selected' : '';
      return `
      <button type="button" class="opt${sel}" data-q="${idx}" data-i="${i}" data-v="${o.v}" onclick="pickOpt(this)">
        <div class="opt-bullet"></div>
        <div class="opt-body">
          <div class="opt-title">${o.t}</div>
          <div class="opt-desc">${o.d}</div>
        </div>
      </button>`;
    }).join('');
    stepEl.innerHTML = `
      <div class="qkicker">${q.kicker}</div>
      <div class="qtitle">${q.title}</div>
      <div class="qsub">${q.sub}</div>
      <div class="opts">${optsHtml}</div>`;
  }
  for (let i = 0; i < 4; i++) renderQuestion(i);

  // Stepper drives the slide animations
  let current = 1;
  const TOTAL = 4;
  let stepper = null;
  function refreshChrome() {
    document.getElementById('bar').style.width = (current / TOTAL * 100) + '%';
    document.getElementById('stepCount').textContent = current + ' / ' + TOTAL;
    const cta = document.getElementById('cta');
    const a = answers[current - 1];
    const filled = a !== null;
    cta.disabled = !filled;
    cta.textContent = current === TOTAL ? 'Set my score →' : 'Continue →';
    document.getElementById('footerHint').textContent = filled
      ? (a === 'skip' ? 'Skipped — won\'t count toward score' : '+25 points unlocked')
      : 'Pick one — honest beats flattering.';
  }
  function pickOpt(btn) {
    const q = parseInt(btn.dataset.q, 10);
    const v = parseInt(btn.dataset.v, 10);
    const parent = btn.parentElement;
    parent.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
    btn.classList.add('selected');
    answers[q] = v;
    refreshChrome();
  }
  // Skip = no score contribution from this question. Score averages over non-skipped.
  function skipQuestion() {
    answers[current - 1] = 'skip';
    if (current >= TOTAL) return onNext();
    if (stepper && !stepper.isBusy()) stepper.go(current + 1);
    current += 1;
    refreshChrome();
  }
  window.skipQuestion = skipQuestion;
  function onNext() {
    if (current >= TOTAL) {
      // Weighted average of NON-skipped answers (skipped = no signal)
      const weights = stat.weights || [1, 1, 1, 1];
      let sumW = 0, sumWV = 0;
      answers.forEach((a, i) => {
        if (typeof a !== 'number') return;
        const w = weights[i] || 1;
        sumW += w;
        sumWV += a * w;
      });
      if (sumW === 0) {
        if (window.coreToast) coreToast('Pick at least one answer for a score', { kind: 'warn' });
        return;
      }
      const score = Math.round(sumWV / sumW);
      let firstTime = false;
      try {
        coreState.update(s => {
          s.stats[statKey] = score;
          s.statWizardsDone = s.statWizardsDone || {};
          firstTime = !s.statWizardsDone[statKey];
          s.statWizardsDone[statKey] = Date.now();
          // First time we have ANY measurement, also seed lastWeekLifeScore for the trend chip
          if (typeof s.lastWeekLifeScore !== 'number' || s.lastWeekLifeScore === 0) {
            const lf = coreState.lifeScore(s);
            s.lastWeekLifeScore = Math.max(0, lf - 4);
          }
          return s;
        });
        // +25 coins on first completion only (recalibrations are free, no coin)
        if (firstTime && typeof coreState.earnCoins === 'function') {
          coreState.earnCoins(25, 'stat_quiz_' + statKey);
        }
      } catch(e){}
      if (window.coreTrack) coreTrack('stat_wizard_completed', { stat: statKey, score, first: firstTime });
      // Score-reveal: brief flash before handoff (animates the final number)
      try {
        if (window.coreToast) coreToast(stat.name + ' set to ' + score, { kind: 'success', ttl: 1400 });
      } catch(e){}
      // Pass ?score= so 30-stat.html can animate a counter-up to that value
      setTimeout(() => { window.location.href = '30-stat.html?score=' + score + '#' + statKey; }, 420);
      return;
    }
    if (stepper && !stepper.isBusy()) stepper.go(current + 1);
    current += 1;
    refreshChrome();
  }
  function onBack() {
    if (current <= 1) {
      if (window.coreBack) coreBack('20-dashboard.html');
      else window.location.href = '20-dashboard.html';
      return;
    }
    if (stepper && !stepper.isBusy()) stepper.go(current - 1);
    current -= 1;
    refreshChrome();
  }
  document.getElementById('backBtn').addEventListener('click', onBack);

  // Stars
  (function() {
    const sl = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const s = document.createElement('div');
      s.className = 'star ' + (Math.random() < 0.7 ? 's1' : 's2');
      s.style.left = (Math.random() * 100) + '%';
      s.style.top  = (Math.random() * 100) + '%';
      s.style.setProperty('--d',   (2.5 + Math.random() * 5) + 's');
      s.style.setProperty('--del', (Math.random() * 5) + 's');
      s.style.setProperty('--min', (0.08 + Math.random() * 0.15).toFixed(2));
      s.style.setProperty('--max', (0.40 + Math.random() * 0.30).toFixed(2));
      sl.appendChild(s);
    }
  })();

  // Initial paint + stepper
  refreshChrome();
  if (window.CoreStepper) {
    stepper = CoreStepper({
      container: document.getElementById('stepStage'),
      stepSelector: '.step',
      activeClass: 'active',
      initialStep: 1,
      duration: 380,
      easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
    });
  }

  if (window.coreTrack) coreTrack('screen_view', { screen: 'stat-wizard', stat: statKey });
</script>
</body>
</html>
