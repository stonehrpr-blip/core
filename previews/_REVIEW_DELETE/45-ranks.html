<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* canonical tokens come from core-theme.css */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    min-height:100vh; background:#0A0A14;
    font-family:'Chakra Petch',-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    padding:24px; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .phone{
    position:relative; width:390px; height:844px;
    background:var(--bg-void);
    border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;
  }
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:30;}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:30;}

  /* ─── Atmosphere ─── */
  .bg{
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(70% 35% at 50% 0%, rgba(74,143,255,0.14) 0%, transparent 60%),
      radial-gradient(50% 25% at 30% 100%, rgba(132,100,255,0.08) 0%, transparent 65%),
      linear-gradient(180deg,#050518 0%,#02020A 55%,#050510 100%);
  }
  .aurora{position:absolute;inset:0;pointer-events:none;opacity:0.35;mix-blend-mode:screen;z-index:1;}
  .aurora::before,.aurora::after{content:"";position:absolute;border-radius:50%;filter:blur(70px);animation:aDrift 22s ease-in-out infinite;}
  .aurora::before{width:70%;height:40%;left:-10%;top:6%;background:radial-gradient(circle,rgba(74,143,255,0.30),transparent 65%);}
  .aurora::after{width:60%;height:35%;right:-8%;bottom:18%;background:radial-gradient(circle,rgba(91,106,230,0.28),transparent 65%);animation-delay:-11s;}
  @keyframes aDrift{0%,100%{transform:translate(0,0) scale(1);opacity:0.45;}50%{transform:translate(20px,-16px) scale(1.06);opacity:0.75;}}
  .stars{position:absolute;inset:0;pointer-events:none;z-index:2;}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twk var(--d,4s) ease-in-out var(--del,0s) infinite;}
  .star.s1{width:1px;height:1px;opacity:0.30;}
  .star.s2{width:1.5px;height:1.5px;opacity:0.45;}
  @keyframes twk{0%,100%{opacity:var(--min,0.10);transform:scale(0.7);}50%{opacity:var(--max,0.55);transform:scale(1.15);}}
  .mesh{
    position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;
    background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(ellipse at center,#000 30%,transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse at center,#000 30%,transparent 80%);
  }
  /* Scan sweep — confined to hero region */
  .scan-line{
    position:absolute; left:14px; right:14px; height:1.5px; pointer-events:none; z-index:6;
    background:linear-gradient(90deg,transparent 4%,rgba(255,255,255,.4) 22%,var(--scan) 42%,var(--scan) 60%,rgba(255,255,255,.35) 80%,transparent 96%);
    filter:drop-shadow(0 0 6px var(--scan));
    animation:scanY 5s ease-in-out infinite;
    opacity:0;
  }
  @keyframes scanY{
    0%{top:100px;opacity:0;}
    15%{opacity:1;}
    85%{opacity:1;}
    100%{top:380px;opacity:0;}
  }

  /* ─── Status bar (faked iOS chrome) ─── */
  .statusbar{
    position:absolute; top:0; left:0; right:0; height:50px; z-index:25;
    padding:18px 32px 0; display:flex; justify-content:space-between; align-items:flex-start;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px; font-weight:600; color:var(--text);
    pointer-events:none;
  }
  .sb-time{letter-spacing:-0.2px;}
  .sb-icons{display:flex;gap:5px;align-items:center;}
  .sb-icons svg{fill:var(--text);}

  /* ─── Scroll ─── */
  .scroll{
    position:absolute; inset:0; padding:56px 16px 110px; z-index:10;
    overflow-y:auto; overflow-x:hidden;
  }
  .scroll::-webkit-scrollbar{display:none;}

  /* ─── Header ─── */
  .header{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 4px 14px;}
  .eyebrow{
    font-family:'Chakra Petch',sans-serif;
    font-size:10px;font-weight:600;letter-spacing:0.22em;
    color:var(--muted);text-transform:uppercase;
  }
  .header h1{
    font-family:'Russo One',sans-serif;
    font-size:32px;font-weight:400;color:var(--text);
    letter-spacing:-0.5px;line-height:1;margin-top:6px;
  }
  .header-actions{display:flex;gap:8px;padding-top:6px;}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    background:var(--glass);border:1px solid var(--hairline-hi);
    display:grid;place-items:center;color:var(--text);
    cursor:pointer;transition:background .15s var(--ease),transform .12s var(--ease);
    font-family:inherit;
  }
  .icon-btn:hover{background:var(--glass-hi);}
  .icon-btn:active{transform:scale(0.95);}
  .icon-btn:focus-visible{outline:2px solid var(--accent-hi);outline-offset:2px;}
  .icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

  /* ─── Section eyebrow ─── */
  .section-eyebrow{
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;font-weight:600;letter-spacing:0.22em;
    color:var(--muted);margin:22px 4px 10px;
    text-transform:uppercase;
  }

  /* ─── Hero stage ─── */
  .hero{
    position:relative; padding:22px 18px 24px; margin:0 0 4px;
    border-radius:24px; overflow:hidden;
    background:linear-gradient(180deg,rgba(74,143,255,0.06) 0%,rgba(132,100,255,0.04) 100%);
    border:1px solid var(--hairline-hi);
    text-align:center;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .hero::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 24%, var(--hero-glow,var(--accent)) 0%, transparent 55%);
    opacity:0.16;
  }
  .hero-eyebrow{
    font-family:'Chakra Petch',sans-serif;
    font-size:10px;font-weight:600;letter-spacing:0.24em;color:var(--muted);
    text-transform:uppercase; position:relative; z-index:2;
    font-variant-numeric:tabular-nums;
  }
  .hero-crest-wrap{position:relative;z-index:2;margin:14px auto 6px;display:flex;justify-content:center;}
  .hero-name{
    font-family:'Russo One',sans-serif;
    font-size:30px;letter-spacing:4px;color:var(--text);
    margin-top:8px;text-transform:uppercase; position:relative; z-index:2;
    text-shadow:0 0 24px var(--hero-glow,var(--accent-hi));
  }
  .hero-meta{
    font-family:'Chakra Petch',sans-serif;
    font-size:13px;color:var(--muted);margin-top:4px;
    letter-spacing:0.04em; position:relative; z-index:2;
    font-variant-numeric:tabular-nums;
  }
  .hero-bar{
    display:grid; grid-template-columns:repeat(10,1fr); gap:4px;
    margin-top:18px; padding:0 4px; position:relative; z-index:2;
  }
  .pip{
    height:6px; border-radius:3px;
    background:rgba(255,255,255,0.07);
    transition:background .4s var(--ease),box-shadow .4s var(--ease);
  }
  .pip.filled{
    background:var(--hero-glow,var(--accent));
    box-shadow:0 0 8px var(--hero-glow,var(--accent));
  }
  .pip.partial{
    background:linear-gradient(90deg,var(--hero-glow,var(--accent)) var(--pct,50%),rgba(255,255,255,0.07) var(--pct,50%));
    box-shadow:0 0 6px var(--hero-glow,var(--accent));
  }
  .hero-progress-label{
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;font-weight:600;letter-spacing:0.12em;
    color:var(--text); margin-top:14px; text-transform:uppercase;
    position:relative; z-index:2;
    font-variant-numeric:tabular-nums;
  }
  .hero-progress-label b{color:var(--hero-glow,var(--accent-hi));font-weight:700;}
  .hero-rate{
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;color:var(--muted); margin-top:6px;
    letter-spacing:0.06em; position:relative; z-index:2;
    font-variant-numeric:tabular-nums;
    display:inline-flex; align-items:center; gap:5px;
  }
  .hero-rate-dot{width:5px;height:5px;border-radius:50%;background:var(--success);box-shadow:0 0 6px var(--success);}

  /* ─── Ladder ─── */
  .ladder{position:relative;padding-left:0;}
  .rung{
    position:relative; z-index:1;
    display:flex; align-items:center; gap:14px;
    padding:12px 14px; margin-bottom:8px;
    border-radius:18px;
    cursor:pointer;
    transition:background .15s var(--ease),border-color .15s var(--ease),transform .12s var(--ease),opacity .2s var(--ease);
    background:transparent;
    border:1px solid transparent;
  }
  .rung.locked{opacity:0.50;}
  .rung.locked:hover{opacity:0.72;}
  .rung.achieved{
    background:var(--glass);
    border:1px solid var(--hairline-hi);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .rung.achieved:hover{background:var(--glass-hi);}
  .rung.current{
    background:linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02));
    border:1px solid var(--rg);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 12px 32px rgba(0,0,0,0.5);
    padding:16px;
    animation:currentPulse 2800ms ease-in-out infinite;
  }
  @keyframes currentPulse{
    0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 12px 28px rgba(0,0,0,0.5),0 0 18px color-mix(in srgb,var(--rg) 22%,transparent);}
    50%{box-shadow:inset 0 1px 0 rgba(255,255,255,0.10),0 12px 32px rgba(0,0,0,0.55),0 0 38px color-mix(in srgb,var(--rg) 42%,transparent);}
  }
  .rung:active{transform:scale(0.985);}
  .rung:focus-visible{outline:2px solid var(--accent-hi);outline-offset:3px;}

  .rung-crest{flex-shrink:0;position:relative;}
  .rung-info{min-width:0;flex:1;}
  .rung-line1{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .rung-name{
    font-family:'Russo One',sans-serif;
    font-size:16px;letter-spacing:3px;color:var(--text);
    text-transform:uppercase;
  }
  .rung.locked .rung-name{color:var(--muted);}
  .rung-tier-num{
    font-family:'Chakra Petch',sans-serif;
    font-size:10px;font-weight:600;color:var(--dim);
    letter-spacing:0.10em;
    font-variant-numeric:tabular-nums;
  }
  .rung-meta{
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;color:var(--muted);margin-top:3px;
    letter-spacing:0.04em;
    font-variant-numeric:tabular-nums;
  }
  .rung-right{
    flex-shrink:0; text-align:right;
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;color:var(--muted);
    letter-spacing:0.04em;
    font-variant-numeric:tabular-nums;
    display:flex; align-items:center; gap:6px;
  }
  .rung-right .chev{font-size:14px;color:var(--dim);line-height:1;}
  .rung.current .rung-right{display:none;}

  .current-tag{
    display:inline-block;
    padding:3px 8px;border-radius:999px;
    background:var(--rg); color:#000;
    font-family:'Chakra Petch',sans-serif;
    font-size:9px;font-weight:700;letter-spacing:0.20em;
    text-transform:uppercase;
    box-shadow:0 0 10px var(--rg);
  }
  .achieved-stamp{
    font-family:'Chakra Petch',sans-serif;
    font-size:9px;font-weight:700;letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--rg);
    opacity:0.85;
  }
  .achieved-stamp::before{content:"✓ ";letter-spacing:0;}

  /* Reward tile */
  .reward-tile{
    display:flex; align-items:center; gap:8px;
    margin-top:10px; padding:8px 10px;
    border-radius:10px;
    background:rgba(0,0,0,0.28);
    border:1px solid rgba(255,255,255,0.05);
  }
  .rung.locked .reward-tile{opacity:0.7;}
  .reward-icon{
    width:24px;height:24px;border-radius:7px;
    background:color-mix(in srgb,var(--rg) 18%,transparent);
    display:grid; place-items:center;
    color:var(--rg);
    flex-shrink:0;
  }
  .rung.locked .reward-icon{color:var(--muted);background:rgba(255,255,255,0.05);}
  .reward-icon svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .reward-text{
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;color:var(--text);flex:1;
    letter-spacing:0.02em;
    line-height:1.35;
  }
  .rung.locked .reward-text{color:var(--muted);}

  /* Inline mini bar on locked rungs */
  .rung-progress-mini{
    width:60px; height:3px; border-radius:999px;
    background:rgba(255,255,255,0.05); overflow:hidden;
  }
  .rung-progress-mini-fill{
    height:100%; border-radius:999px;
    background:var(--rg); box-shadow:0 0 6px var(--rg);
    transition:width .5s var(--ease);
  }

  /* ─── Week rail ─── */
  .weekrail{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:0;
    padding:14px 6px;
    border-radius:18px;
    background:var(--glass);
    border:1px solid var(--hairline-hi);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
    margin-bottom:10px;
  }
  .wr-stat{
    text-align:center; padding:8px 4px;
    border-right:1px solid var(--hairline);
  }
  .wr-stat:last-child{border-right:none;}
  .wr-num{
    font-family:'Russo One',sans-serif;
    font-size:22px;color:var(--text);
    letter-spacing:-0.5px; line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .wr-num .unit{font-size:11px;color:var(--muted);font-family:'Chakra Petch',sans-serif;letter-spacing:0;margin-left:2px;}
  .wr-label{
    font-family:'Chakra Petch',sans-serif;
    font-size:9px;color:var(--muted);
    margin-top:6px; letter-spacing:0.16em;
    text-transform:uppercase;
  }
  .wr-zone{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(52,211,153,0.06);
    border:1px solid rgba(52,211,153,0.24);
    margin-bottom:10px;
  }
  .wr-zone.demote{background:rgba(248,113,113,0.06);border-color:rgba(248,113,113,0.24);}
  .wr-zone.neutral{background:rgba(255,255,255,0.03);border-color:var(--hairline-hi);}
  .wr-zone-left{min-width:0;display:flex;flex-direction:column;gap:2px;}
  .wr-zone-label{
    font-family:'Chakra Petch',sans-serif;
    font-size:9px;font-weight:700;letter-spacing:0.18em;
    color:var(--success); text-transform:uppercase;
    display:inline-flex; align-items:center; gap:5px;
  }
  .wr-zone.demote .wr-zone-label{color:var(--danger);}
  .wr-zone.neutral .wr-zone-label{color:var(--muted);}
  .wr-zone-text{
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;color:var(--text);
    letter-spacing:0.02em;
  }
  .wr-zone-icon{
    width:30px;height:30px;border-radius:9px;
    background:rgba(52,211,153,0.12);
    display:grid;place-items:center;
    color:var(--success); flex-shrink:0;
  }
  .wr-zone.demote .wr-zone-icon{background:rgba(248,113,113,0.12);color:var(--danger);}
  .wr-zone.neutral .wr-zone-icon{background:rgba(255,255,255,0.05);color:var(--muted);}
  .wr-zone-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .wr-cta{
    display:flex; align-items:center; justify-content:center; gap:6px;
    width:100%; padding:13px;
    border-radius:14px;
    background:rgba(74,143,255,0.10);
    border:1px solid rgba(74,143,255,0.32);
    color:var(--accent-hi);
    font-family:'Chakra Petch',sans-serif;
    font-size:12px;font-weight:600;letter-spacing:0.12em;
    text-transform:uppercase;
    cursor:pointer;
    transition:background .15s var(--ease),transform .12s var(--ease);
  }
  .wr-cta:hover{background:rgba(74,143,255,0.18);}
  .wr-cta:active{transform:scale(0.99);}
  .wr-cta:focus-visible{outline:2px solid var(--accent-hi);outline-offset:2px;}
  .wr-cta svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* ─── History drawer ─── */
  .drawer{
    position:absolute; inset:0; z-index:100;
    display:none;
  }
  .drawer.open{display:block;}
  .drawer-backdrop{
    position:absolute; inset:0;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    animation:dFade 220ms var(--ease);
  }
  @keyframes dFade{from{opacity:0;}to{opacity:1;}}
  .drawer-sheet{
    position:absolute; bottom:0; left:0; right:0;
    max-height:74%; overflow-y:auto;
    background:var(--bg-deep);
    border-top:1px solid var(--hairline-hi);
    border-radius:28px 28px 0 0;
    padding:14px 20px 36px;
    box-shadow:0 -20px 60px rgba(0,0,0,0.6);
    animation:dSlide 320ms var(--ease);
  }
  .drawer-sheet::-webkit-scrollbar{display:none;}
  @keyframes dSlide{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .drawer-handle{
    width:40px;height:4px;border-radius:999px;
    background:rgba(255,255,255,0.16);
    margin:0 auto 18px;
  }
  .drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .drawer h3{
    font-family:'Russo One',sans-serif;
    font-size:20px;font-weight:400;color:var(--text);
    letter-spacing:2px; text-transform:uppercase;
  }
  .drawer-close{
    width:32px;height:32px;border-radius:50%;
    background:var(--glass);border:1px solid var(--hairline-hi);
    display:grid;place-items:center;color:var(--text);
    cursor:pointer;font-family:inherit;
  }
  .drawer-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .history-item{
    display:flex;align-items:center;gap:14px;
    padding:14px 0;
    border-bottom:1px solid var(--hairline);
  }
  .history-item:last-child{border-bottom:none;}
  .hi-info{flex:1;min-width:0;}
  .hi-name{
    font-family:'Russo One',sans-serif;
    font-size:14px;letter-spacing:2px;color:var(--text);
    text-transform:uppercase;
  }
  .hi-meta{
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;color:var(--muted);
    margin-top:3px; letter-spacing:0.04em;
    font-variant-numeric:tabular-nums;
  }
  .hi-xp{
    font-family:'Chakra Petch',sans-serif;
    font-size:11px;font-weight:700;color:var(--accent-hi);
    letter-spacing:0.04em;
    font-variant-numeric:tabular-nums;
  }
  .hi-empty{
    text-align:center; padding:32px 12px 12px;
    color:var(--muted);
    font-family:'Chakra Petch',sans-serif;
    font-size:12px;

  }
  .hi-empty-icon{
    width:56px;height:56px;margin:0 auto 14px;
    border-radius:50%; background:var(--glass);
    border:1px solid var(--hairline-hi);
    display:grid;place-items:center;
    color:var(--muted);
  }
  .hi-empty-icon svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

  /* ─── Tab bar ─── */
  .tabbar{
    position:absolute; bottom:0; left:0; right:0;
    padding:10px 14px 28px; z-index:20;
    display:flex; justify-content:space-around; align-items:flex-end; gap:4px;
    background:linear-gradient(180deg,transparent 0%,rgba(2,2,10,0.85) 35%,rgba(2,2,10,0.95) 100%);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--hairline);
  }
  .tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; cursor:pointer; padding:4px 0;
    font-family:inherit; color:var(--muted);
    transition:color .15s var(--ease);
  }
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .tab span{
    font-family:'Chakra Petch',sans-serif;
    font-size:10px;font-weight:600;letter-spacing:0.02em;
  }
  .tab.active{color:var(--accent-hi);}
  .tab.active svg{filter:drop-shadow(0 0 6px var(--accent));}
  .tab:focus-visible{outline:2px solid var(--accent-hi);outline-offset:2px;border-radius:8px;}

  .preview-watermark{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    color:#4A5060;
    font-size:11px;letter-spacing:0.16em;text-transform:uppercase;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
  }

  /* Stagger entrance */
  .rung{opacity:0;transform:translateY(8px);animation:rungIn .4s var(--ease) forwards;}
  .rung:nth-child(1){animation-delay:60ms;}
  .rung:nth-child(2){animation-delay:100ms;}
  .rung:nth-child(3){animation-delay:140ms;}
  .rung:nth-child(4){animation-delay:180ms;}
  .rung:nth-child(5){animation-delay:220ms;}
  .rung:nth-child(6){animation-delay:260ms;}
  .rung:nth-child(7){animation-delay:300ms;}
  .rung:nth-child(8){animation-delay:340ms;}
  .rung:nth-child(9){animation-delay:380ms;}
  .rung:nth-child(10){animation-delay:420ms;}
  @keyframes rungIn{to{opacity:1;transform:translateY(0);}}

  @media (max-width:460px){
    body{padding:0;}
    .phone{width:100vw;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
    .notch,.home-indicator,.preview-watermark{display:none;}

  @media (prefers-reduced-motion: reduce){
    .star,.aurora::before,.aurora::after,.scan-line,.rung.current,.rung,.pip{animation:none !important;}
    .rung{opacity:1 !important;transform:none !important;}
  }

<script>
  /* ════════════════════════════════════════════════════════════════════
     Crest system — 4-layer SVG, banded by tier index.

     Bands:
       0–2 (Iron/Bronze/Silver)        → hexagon outer
       3–5 (Gold/Emerald/Platinum)     → shield outer
       6–7 (Diamond/Master)            → sunburst outer
       8–9 (Grandmaster/Legend)        → radiant w/ orbital ring

     Each crest is: outer ring → field (gradient) → specular → bezel → glyph.
     Variants: heroSize (96), rungSize (52), historySize (40).
     `dim=true` desaturates for locked tiers.
     ════════════════════════════════════════════════════════════════════ */

  const TIER_BAND = ['hex','hex','hex','shield','shield','shield','sunburst','sunburst','radiant','radiant'];

  const TIER_GLYPH = {
    'Iron':        '<path d="M50 32 L60 50 L50 68 L40 50 Z"/>',
    'Bronze':      '<path d="M34 36 L66 36 L60 64 L40 64 Z"/><path d="M40 44 L60 44" stroke="rgba(0,0,0,0.18)" stroke-width="1.5" fill="none"/>',
    'Silver':      '<path d="M50 30 L68 50 L50 70 L32 50 Z"/><circle cx="50" cy="50" r="5" fill="rgba(255,255,255,0.5)"/>',
    'Gold':        '<path d="M50 30 L55 44 L70 45 L59 54 L62 68 L50 60 L38 68 L41 54 L30 45 L45 44 Z"/>',
    'Emerald':     '<path d="M40 32 L60 32 L68 50 L60 68 L40 68 L32 50 Z"/><path d="M40 32 L50 50 L40 68 M60 32 L50 50 L60 68" stroke="rgba(0,0,0,0.18)" stroke-width="1" fill="none"/>',
    'Platinum':    '<path d="M50 26 L57 40 L72 42 L61 52 L64 67 L50 60 L36 67 L39 52 L28 42 L43 40 Z"/><circle cx="50" cy="52" r="3" fill="rgba(255,255,255,0.55)"/>',
    'Diamond':     '<path d="M50 28 L70 46 L60 70 L40 70 L30 46 Z"/><path d="M50 28 L40 46 L50 70 L60 46 Z" fill="rgba(255,255,255,0.18)"/>',
    'Master':      '<path d="M50 26 L58 38 L72 40 L62 50 L65 66 L50 58 L35 66 L38 50 L28 40 L42 38 Z"/><circle cx="50" cy="50" r="7" fill="rgba(0,0,0,0.18)"/><circle cx="50" cy="50" r="3" fill="rgba(255,255,255,0.6)"/>',
    'Grandmaster': '<path d="M50 26 L56 38 L70 36 L65 48 L76 56 L62 58 L60 72 L50 64 L40 72 L38 58 L24 56 L35 48 L30 36 L44 38 Z"/>',
    'Legend':      '<path d="M50 22 L57 34 L72 30 L66 44 L80 50 L66 56 L72 70 L57 66 L50 78 L43 66 L28 70 L34 56 L20 50 L34 44 L28 30 L43 34 Z"/><circle cx="50" cy="50" r="5" fill="rgba(255,255,255,0.55)"/>',
  };

  /* Each band's outer ring + field/bezel inset paths. Drawn on a 100×100 viewBox. */
  const BANDS = {
    hex: {
      outer: '<polygon points="50,4 88,26 88,74 50,96 12,74 12,26"/>',
      field: '<polygon points="50,12 80,28 80,72 50,88 20,72 20,28"/>',
      bezel: '<polygon points="50,15 78,29 78,71 50,85 22,71 22,29"/>',
    },
    shield: {
      outer: '<path d="M14 14 L86 14 L86 56 Q86 80 50 96 Q14 80 14 56 Z"/>',
      field: '<path d="M22 22 L78 22 L78 56 Q78 76 50 88 Q22 76 22 56 Z"/>',
      bezel: '<path d="M25 24 L75 24 L75 56 Q75 74 50 85 Q25 74 25 56 Z"/>',
    },
    sunburst: {
      outer: '<path d="M50 4 L56 30 L80 14 L68 36 L94 42 L72 50 L94 58 L68 64 L80 86 L56 70 L50 96 L44 70 L20 86 L32 64 L6 58 L28 50 L6 42 L32 36 L20 14 L44 30 Z"/>',
      field: '<circle cx="50" cy="50" r="28"/>',
      bezel: '<circle cx="50" cy="50" r="26"/>',
    },
    radiant: {
      outer: '<path d="M50 2 L57 22 L77 10 L70 32 L92 26 L80 46 L98 50 L80 54 L92 74 L70 68 L77 90 L57 78 L50 98 L43 78 L23 90 L30 68 L8 74 L20 54 L2 50 L20 46 L8 26 L30 32 L23 10 L43 22 Z"/>',
      field: '<circle cx="50" cy="50" r="26"/>',
      bezel: '<circle cx="50" cy="50" r="24"/>',
    },
  };

  /* Build a crest SVG. */
  let _crestId = 0;
  function buildCrest(rank, size, opts){
    opts = opts || {};
    const idx = (typeof rank.idx === 'number') ? rank.idx : 0;
    const bandName = TIER_BAND[idx] || 'hex';
    const band = BANDS[bandName];
    const glyph = TIER_GLYPH[rank.name] || '<circle cx="50" cy="50" r="14"/>';
    const dim = !!opts.dim;
    const fid = 'cf' + (++_crestId);
    const sid = 'cs' + _crestId;

    const ringColor = dim ? 'rgba(255,255,255,0.10)' : rank.glow;
    const ringStroke = bandName === 'sunburst' || bandName === 'radiant' ? '1.4' : '2';
    const c1 = rank.c1;
    const c2 = rank.c2;
    const fieldOp = dim ? 0.35 : 1;
    const specOp = dim ? 0.10 : 0.32;
    const glyphFill = dim ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.94)';
    const dropShadow = dim ? 'none' : 'drop-shadow(0 0 ' + (size > 80 ? 18 : 10) + 'px ' + rank.glow + ')';

    // Optional orbital ring on radiant tier (subtle, dashed)
    const orbital = (bandName === 'radiant' && !dim)
      ? '<circle cx="50" cy="50" r="44" fill="none" stroke="' + rank.glow + '" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.55"/>'
      : '';

    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 100 100" style="filter:' + dropShadow + ';overflow:visible;">' +
      '<defs>' +
        '<linearGradient id="' + fid + '" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0" stop-color="' + c1 + '" stop-opacity="' + fieldOp + '"/>' +
          '<stop offset="1" stop-color="' + c2 + '" stop-opacity="' + fieldOp + '"/>' +
        '</linearGradient>' +
        '<radialGradient id="' + sid + '" cx="0.4" cy="0.3" r="0.5">' +
          '<stop offset="0" stop-color="#ffffff" stop-opacity="' + specOp + '"/>' +
          '<stop offset="1" stop-color="#ffffff" stop-opacity="0"/>' +
        '</radialGradient>' +
      '</defs>' +
      orbital +
      // Outer ring
      '<g fill="none" stroke="' + ringColor + '" stroke-width="' + ringStroke + '" stroke-linejoin="round">' + band.outer + '</g>' +
      // Field
      '<g fill="url(#' + fid + ')">' + band.field + '</g>' +
      // Specular highlight (clipped roughly to field with a soft ellipse)
      '<ellipse cx="42" cy="34" rx="22" ry="14" fill="url(#' + sid + ')"/>' +
      // Inner bezel hairline
      '<g fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.8" stroke-linejoin="round">' + band.bezel + '</g>' +
      // Glyph
      '<g fill="' + glyphFill + '" stroke="none">' + glyph + '</g>' +
    '</svg>';
  }

  /* ────────────────────────────────────────────────────────────────────
     Reward tiles — single Lucide-style icon set, one per tier.
     ──────────────────────────────────────────────────────────────────── */
  const TIER_REWARDS = {
    'Iron':        { icon: 'check',      text: 'Honest logging unlocked' },
    'Bronze':      { icon: 'snowflake',  text: '+1 streak freeze / week' },
    'Silver':      { icon: 'sparkle',    text: 'Coach insights on dashboard' },
    'Gold':        { icon: 'user',       text: 'Custom profile icons · 50% off Shop' },
    'Emerald':     { icon: 'send',       text: 'Post to feed · advanced sections' },
    'Platinum':    { icon: 'shield',     text: '+2 freezes · daily Coach tips' },
    'Diamond':     { icon: 'gift',       text: 'Send gifts to friends · rank crown' },
    'Master':      { icon: 'compass',    text: 'Mentor mode · help newer members' },
    'Grandmaster': { icon: 'flag',       text: 'Founder badge · early features' },
    'Legend':      { icon: 'crown',      text: 'All cosmetics · forever free Shop' },
  };
  const REWARD_ICON_SVG = {
    check:     '<path d="M5 12l5 5L19 7"/>',
    snowflake: '<path d="M12 2v20M2 12h20M5 5l14 14M5 19L19 5"/>',
    sparkle:   '<path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>',
    user:      '<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/>',
    send:      '<path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/>',
    shield:    '<path d="M12 3l8 3v5c0 5-3 9-8 11-5-2-8-6-8-11V6z"/>',
    gift:      '<rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8v13M3 12h18M7 8a3 3 0 1 1 5-2 3 3 0 1 1 5 2"/>',
    compass:   '<circle cx="12" cy="12" r="9"/><path d="M16 8l-3 7-5 1 3-7z"/>',
    flag:      '<path d="M4 22V4l14 4-14 6"/>',
    crown:     '<path d="M3 8l4 5 5-7 5 7 4-5-2 13H5z"/>',
  };

  /* ────────────────────────────────────────────────────────────────────
     XP rate heuristic. We have no XP ledger in core-state.js, so derive
     from current XP + best-effort start signal (or fall back to demo).
     ──────────────────────────────────────────────────────────────────── */
  function deriveWeeklyXp(s){
    const xp = s.xp || 0;
    // Real path: sum positive deltas in the last 7 days from xpLedger.
    if (s.xpLedger && s.xpLedger.length) {
      const weekStart = Date.now() - 7 * 86400000;
      let earned = 0;
      for (let i = 0; i < s.xpLedger.length; i++) {
        const e = s.xpLedger[i];
        if (e.ts < weekStart) break; // ledger is reverse-chronological
        if (e.delta > 0) earned += e.delta;
      }
      return { xpThisWeek: earned, daily: Math.round(earned / 7) };
    }
    // Heuristic fallback for users with no ledger yet (pre-ledger accounts / demo).
    if (xp <= 0) return { xpThisWeek: 0, daily: 0 };
    let startMs = null;
    try {
      const t = JSON.parse(localStorage.getItem('coreOnboardTrial') || '{}');
      if (t && t.trialStartedAt) {
        startMs = typeof t.trialStartedAt === 'number' ? t.trialStartedAt : Date.parse(t.trialStartedAt);
      }
    } catch(e){}
    let days = 7;
    if (startMs && !Number.isNaN(startMs)) {
      const elapsedDays = Math.max(1, (Date.now() - startMs) / 86400000);
      days = Math.min(7, elapsedDays);
    }
    const daily = Math.max(1, Math.round(xp / Math.max(1, days)));
    const xpThisWeek = Math.min(xp, Math.round(daily * 7));
    return { xpThisWeek, daily };
  }

  /* ────────────────────────────────────────────────────────────────────
     Promote / demote zone state from weekly XP relative to next tier.
     ──────────────────────────────────────────────────────────────────── */
  function deriveZone(s, me, nextR, weeklyXp){
    if (!nextR) {
      return { state: 'apex', label: 'APEX TIER', text: 'You hold the top tier.', icon: 'crown' };
    }
    const toNext = Math.max(0, nextR.min - (s.xp || 0));
    if (toNext === 0) return { state: 'promote', label: 'PROMOTE ZONE', text: 'You unlock ' + nextR.name + ' on next earn.', icon: 'up' };
    if (weeklyXp.xpThisWeek >= toNext) return { state: 'promote', label: 'PROMOTE ZONE', text: 'On pace to reach ' + nextR.name + ' this week.', icon: 'up' };
    if (weeklyXp.xpThisWeek >= toNext * 0.5) return { state: 'neutral', label: 'KEEP CLIMBING', text: toNext + ' XP to ' + nextR.name + ' · stay consistent.', icon: 'up' };
    if (weeklyXp.daily < 5 && (s.xp || 0) > 0) return { state: 'demote', label: 'COOL ZONE', text: 'XP rate dipping — log honestly to recover.', icon: 'down' };
    return { state: 'neutral', label: 'KEEP CLIMBING', text: 'Earn XP this week to enter the promote zone.', icon: 'up' };
  }

  /* ────────────────────────────────────────────────────────────────────
     Tier-history reconstruction. We don't persist rank-up timestamps, so
     synthesize achieved-tier entries from current XP. If history exists
     in localStorage 'coreRankHistory' use that (real timestamps).
     ──────────────────────────────────────────────────────────────────── */
  function deriveHistory(s){
    // Real path: rank-ups captured by _xpDelta in core-state.js live on state.rankHistory.
    if (s.rankHistory && s.rankHistory.length) return s.rankHistory;
    // Fallback: synthesize achieved tiers from current XP so the drawer isn't empty
    // for pre-ledger accounts. Timestamps are null and shown as "Achieved".
    const xp = s.xp || 0;
    const out = [];
    coreState.RANKS.forEach((r, i) => {
      if (xp >= r.min && i > 0) out.push({ rankName: r.name, ts: null, xp: r.min });
    });
    return out.reverse();
  }

  /* ════════════════════════════════════════════════════════════════════
     Main render
     ════════════════════════════════════════════════════════════════════ */
  function renderRanks(){
    try {
      const s = coreState.read();
      const xp = s.xp || 0;
      const me = coreState.rankFor(xp);
      const nextR = coreState.RANKS[me.idx + 1] || null;

      /* ── Hero stage ─── */
      document.getElementById('hero').style.setProperty('--hero-glow', me.glow);
      document.getElementById('heroEyebrow').textContent = 'CURRENT TIER · ' + String(me.idx + 1).padStart(2,'0') + '/10';
      document.getElementById('heroCrest').innerHTML = buildCrest(me, 96);
      document.getElementById('heroName').textContent = me.name.toUpperCase();
      document.getElementById('heroMeta').textContent = nextR
        ? (xp.toLocaleString() + ' XP · ' + nextR.min.toLocaleString() + ' to enter ' + nextR.name)
        : (xp.toLocaleString() + ' XP · Top of the ladder');

      // 10 pips — fill achieved tiers fully, the current tier partially by % into the tier
      const bar = document.getElementById('heroBar');
      bar.innerHTML = '';
      coreState.RANKS.forEach((r, i) => {
        const pip = document.createElement('div');
        pip.className = 'pip';
        if (i < me.idx) pip.classList.add('filled');
        else if (i === me.idx) {
          if (nextR) {
            const span = nextR.min - me.min;
            const into = xp - me.min;
            const pct = Math.max(8, Math.min(100, Math.round((into / span) * 100)));
            pip.classList.add('partial');
            pip.style.setProperty('--pct', pct + '%');
          } else {
            pip.classList.add('filled');
          }
        }
        bar.appendChild(pip);
      });

      const heroLabel = document.getElementById('heroProgressLabel');
      if (nextR) {
        const toNext = Math.max(0, nextR.min - xp);
        heroLabel.innerHTML = toNext.toLocaleString() + ' XP to <b>' + nextR.name.toUpperCase() + '</b>';
      } else {
        heroLabel.innerHTML = '<b>APEX TIER REACHED</b>';
      }

      // Weekly XP rate
      const weekly = deriveWeeklyXp(s);
      const rateEl = document.getElementById('heroRateText');
      if (weekly.daily > 0) rateEl.textContent = '+' + weekly.daily + ' XP / day this week';
      else rateEl.textContent = 'Start logging to earn XP';

      /* ── Ladder ─── */
      const list = document.getElementById('ladder');
      list.innerHTML = '';
      coreState.RANKS.forEach((r, i) => {
        const isCurrent = i === me.idx;
        const isAchieved = i < me.idx;
        const isLocked = i > me.idx;
        const state = isCurrent ? 'current' : isAchieved ? 'achieved' : 'locked';
        const rew = TIER_REWARDS[r.name] || { icon:'sparkle', text:'' };
        const crestSize = isCurrent ? 60 : 50;
        const reward = REWARD_ICON_SVG[rew.icon] ? REWARD_ICON_SVG[rew.icon] : REWARD_ICON_SVG.sparkle;

        const rung = document.createElement('div');
        rung.className = 'rung ' + state;
        rung.setAttribute('role','button');
        rung.setAttribute('tabindex','0');
        rung.setAttribute('aria-label', r.name + ' tier ' + (i + 1) + ' of 10' + (isCurrent ? ' (current)' : isAchieved ? ' (achieved)' : ' (locked)'));
        if (isCurrent) rung.setAttribute('aria-current','true');
        rung.style.setProperty('--rg', r.glow);

        const xpRange = r.max === Infinity ? (r.min.toLocaleString() + '+ XP') : (r.min.toLocaleString() + ' – ' + r.max.toLocaleString() + ' XP');

        // Right side content
        let rightHTML = '';
        if (isLocked) {
          const toEnter = Math.max(0, r.min - xp);
          const prevR = coreState.RANKS[i - 1] || { min: 0 };
          const span = r.min - prevR.min;
          const into = Math.max(0, xp - prevR.min);
          const pct = Math.max(0, Math.min(100, Math.round((into / span) * 100)));
          rightHTML = '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">' +
            '<span>' + toEnter.toLocaleString() + ' XP →</span>' +
            (i === me.idx + 1 ? '<div class="rung-progress-mini"><div class="rung-progress-mini-fill" style="width:' + pct + '%;"></div></div>' : '') +
          '</div>';
        } else if (isAchieved) {
          rightHTML = '<span class="achieved-stamp">Reached</span><span class="chev">›</span>';
        }

        const tagHTML = isCurrent
          ? '<span class="current-tag">You</span>'
          : '';

        rung.innerHTML =
          '<div class="rung-crest">' + buildCrest(r, crestSize, { dim: isLocked }) + '</div>' +
          '<div class="rung-info">' +
            '<div class="rung-line1">' +
              '<span class="rung-name">' + r.name.toUpperCase() + '</span>' +
              tagHTML +
              '<span class="rung-tier-num">TIER ' + String(i + 1).padStart(2,'0') + '</span>' +
            '</div>' +
            '<div class="rung-meta">' + xpRange + '</div>' +
            (isCurrent || isAchieved
              ? '<div class="reward-tile"><div class="reward-icon"><svg viewBox="0 0 24 24">' + reward + '</svg></div><div class="reward-text">' + rew.text + '</div></div>'
              : '<div class="reward-tile"><div class="reward-icon"><svg viewBox="0 0 24 24">' + reward + '</svg></div><div class="reward-text">' + rew.text + '</div></div>'
            ) +
          '</div>' +
          (rightHTML ? '<div class="rung-right">' + rightHTML + '</div>' : '');

        // Tap → open the dedicated rank detail page. Every tier is clickable
        // (achieved, current, locked) — each shows its own perks + progress.
        rung.style.cursor = 'pointer';
        rung.addEventListener('click', () => {
          if (window.coreTrack) coreTrack('rank_card_tapped', { rank: r.name, state });
          window.location.href = '46-rank-detail.html?rank=' + encodeURIComponent(r.name);
        });
        rung.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); rung.click(); }
        });

        list.appendChild(rung);
      });

      /* ── Week rail ─── */
      document.getElementById('wrXp').innerHTML = weekly.xpThisWeek.toLocaleString() + '<span class="unit">XP</span>';
      document.getElementById('wrAvg').innerHTML = weekly.daily + '<span class="unit">/day</span>';
      // Friends rank — stub until friends graph is wired
      const friendsCount = (s.friends && s.friends.length) || 0;
      document.getElementById('wrFriends').innerHTML = friendsCount > 0 ? '#3' : '—';

      const zone = deriveZone(s, me, nextR, weekly);
      const zEl = document.getElementById('wrZone');
      zEl.className = 'wr-zone ' + (zone.state === 'promote' ? '' : zone.state === 'demote' ? 'demote' : zone.state === 'neutral' ? 'neutral' : 'neutral');
      document.getElementById('wrZoneLabel').textContent = zone.label;
      document.getElementById('wrZoneText').textContent = zone.text;
      const zIconBig = document.getElementById('wrZoneIconBig');
      if (zone.icon === 'up') zIconBig.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
      else if (zone.icon === 'down') zIconBig.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>';
      else if (zone.icon === 'crown') zIconBig.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 8l4 5 5-7 5 7 4-5-2 13H5z"/></svg>';

      // Analytics
      if (window.coreTrack) coreTrack('ranks_rendered', { rank: me.name, idx: me.idx, xp });
    } catch(e){ console.error('renderRanks error', e); }
  }

  /* ════════════════════════════════════════════════════════════════════
     History drawer
     ════════════════════════════════════════════════════════════════════ */
  function openHistory(focusRank){
    const drawer = document.getElementById('historyDrawer');
    const list = document.getElementById('historyList');
    const s = coreState.read();
    const history = deriveHistory(s);

    if (!history.length) {
      list.innerHTML =
        '<div class="hi-empty">' +
          '<div class="hi-empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>' +
          'No rank-ups yet.<br/>Climb past Iron to see your history.' +
        '</div>';
    } else {
      list.innerHTML = history.map(h => {
        const rank = coreState.RANKS.find(r => r.name === h.rankName) || coreState.RANKS[0];
        const tsLabel = h.ts ? new Date(h.ts).toLocaleDateString(undefined, { month:'short', day:'numeric' }) : 'Achieved';
        return '<div class="history-item">' +
          '<div class="hi-crest">' + buildCrest(Object.assign({ idx: coreState.RANKS.indexOf(rank) }, rank), 36) + '</div>' +
          '<div class="hi-info">' +
            '<div class="hi-name">' + rank.name.toUpperCase() + '</div>' +
            '<div class="hi-meta">' + tsLabel + ' · ' + h.xp.toLocaleString() + ' XP</div>' +
          '</div>' +
          '<div class="hi-xp">TIER ' + String(coreState.RANKS.indexOf(rank) + 1).padStart(2,'0') + '</div>' +
        '</div>';
      }).join('');
    }
    drawer.classList.add('open');
    drawer.setAttribute('aria-hidden','false');
    if (window.coreTrack) coreTrack('rank_history_opened', { focus: focusRank || null, count: history.length });
  }
  function closeHistory(){
    const drawer = document.getElementById('historyDrawer');
    drawer.classList.remove('open');
    drawer.setAttribute('aria-hidden','true');
  }
  window.openHistory = openHistory;
  window.closeHistory = closeHistory;

  // ESC to close drawer
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeHistory();
  });

  /* ════════════════════════════════════════════════════════════════════
     Init
     ════════════════════════════════════════════════════════════════════ */
  // Star field
  (function(){
    const sl = document.getElementById('stars');
    if (!sl) return;
    for (let i = 0; i < 48; i++){
      const s = document.createElement('div');
      const r = Math.random();
      s.className = 'star ' + (r < 0.7 ? 's1' : 's2');
      s.style.left = (Math.random() * 100) + '%';
      s.style.top  = (Math.random() * 100) + '%';
      s.style.setProperty('--d',   (2.5 + Math.random() * 5) + 's');
      s.style.setProperty('--del', (Math.random() * 5) + 's');
      s.style.setProperty('--min', (0.08 + Math.random() * 0.15).toFixed(2));
      s.style.setProperty('--max', (0.40 + Math.random() * 0.30).toFixed(2));
      sl.appendChild(s);
    }
  })();

  // Live status bar time
  (function(){
    const el = document.getElementById('sbTime');
    function tick(){
      try {
        const d = new Date();
        let h = d.getHours(); const m = d.getMinutes();
        if (h === 0) h = 12; else if (h > 12) h -= 12;
        el.textContent = h + ':' + String(m).padStart(2,'0');
      } catch(e){}
    }
    tick();
    setInterval(tick, 30000);
  })();

  // Hide watermark on phone-size viewport
  (function(){
    const wm = document.getElementById('watermark');
    if (window.innerWidth <= 460 && wm) wm.style.display = 'none';
  })();

  renderRanks();
  window.addEventListener('coreStateChange', renderRanks);
  if (window.coreTrack) coreTrack('screen_view', { screen: 'ranks' });
</script>
</body>
</html>
