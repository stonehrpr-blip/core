<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Friends</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root { --bg-base:#02020A; --bg-card:rgba(255,255,255,0.035); --bg-card-2:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.08); --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --accent:#4A8FFF; --grad-a:#4A8FFF; --grad-b:#6F70FF; --good:#34D399; --danger:#FF6B6B; }
  * { box-sizing:border-box; } html,body{ margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:60; }
  .bg { position:absolute; inset:0; z-index:0; background: radial-gradient(60% 30% at 50% 8%, rgba(74,143,255,0.10), transparent 65%), linear-gradient(180deg, #060620 0%, #02020A 55%, #050510 100%); }
  .frame { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }
  .hdr { display:flex; align-items:center; gap:12px; padding:2px 18px 10px; }
  .back { width:38px; height:38px; border-radius:50%; border:none; background:rgba(255,255,255,0.06); color:var(--text); display:flex; align-items:center; justify-content:center; text-decoration:none; flex:none; } .back svg{ width:19px; height:19px; }
  .hdr .ttl { font-size:19px; font-weight:900; } .hdr .sub{ font-size:11px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); }
  .scroll { flex:1; overflow-y:auto; padding:6px 18px 110px; } .scroll::-webkit-scrollbar{ display:none; }
  .sec { margin:22px 4px 11px; font-size:12.5px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }

  /* your id card */
  .mecard{ border-radius:20px; padding:18px; background:linear-gradient(160deg, rgba(74,143,255,0.16), rgba(159,143,255,0.06)); border:1px solid rgba(120,160,255,0.28); }
  .mecard .l{ font-size:10px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .mecard .id{ font-size:24px; font-weight:900; letter-spacing:.02em; margin-top:6px; font-variant-numeric:tabular-nums; }
  .acts{ display:flex; gap:9px; margin-top:14px; }
  .btn{ flex:1; display:flex; align-items:center; justify-content:center; gap:7px; min-height:44px; padding:12px; border-radius:13px; border:1px solid var(--border); background:rgba(0,0,0,0.25); color:var(--text); font:inherit; font-size:13px; font-weight:800; cursor:pointer; transition:.2s; }
  .btn svg{ width:16px; height:16px; } .btn:active{ transform:scale(.98); } .btn.primary{ background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); border-color:transparent; color:#fff; } .btn.ok{ color:var(--good); border-color:rgba(52,211,153,.4); }
  .add{ display:flex; gap:9px; margin-top:13px; }
  .add input{ flex:1; min-height:46px; padding:13px 14px; border-radius:13px; border:1px solid var(--border); background:rgba(0,0,0,0.3); color:var(--text); font:inherit; font-size:14px; letter-spacing:.06em; text-transform:uppercase; outline:none; } .add input:focus{ border-color:rgba(120,160,255,.5); } .add input::placeholder{ color:var(--dim); text-transform:none; letter-spacing:0; }
  .add .ab{ flex:none; padding:0 20px; }

  .fr{ display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:15px; background:var(--bg-card); border:1px solid var(--border); margin-bottom:9px; }
  .fr .av{ width:42px; height:42px; flex:none; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:900; color:#fff; background:linear-gradient(150deg,var(--c1,#4A8FFF),var(--c2,#6F70FF)); }
  .fr .fb{ flex:1; min-width:0; } .fr .fn{ font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; } .fr .fs{ font-size:11.5px; color:var(--muted); margin-top:1px; }
  .fr .rm{ flex:none; width:34px; height:34px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.03); color:var(--dim); cursor:pointer; display:flex; align-items:center; justify-content:center; } .fr .rm svg{ width:16px; height:16px; } .fr .rm.arm{ color:var(--danger); border-color:rgba(255,107,107,.4); }
  .empty{ padding:26px 20px; border-radius:18px; text-align:center; background:var(--bg-card); border:1px dashed rgba(255,255,255,0.14); }
  .empty svg{ width:34px; height:34px; color:var(--dim); margin-bottom:10px; } .empty .t{ font-size:14px; font-weight:800; } .empty .s{ font-size:12.5px; color:var(--muted); margin-top:4px; }

  .fr{ cursor:pointer; transition:transform .18s, border-color .2s; } .fr:hover{ border-color:rgba(120,160,255,.3); } .fr:active{ transform:scale(.99); }
  .fr .go{ flex:none; color:var(--dim); display:flex; } .fr .go svg{ width:17px; height:17px; }
  .fr .fpow{ color:var(--accent); font-weight:800; }

  /* ── you-vs-friend comparison sheet ── */
  .cmp{ position:absolute; inset:0; z-index:88; display:none; } .cmp.open{ display:block; }
  .cmp .cscrim{ position:absolute; inset:0; background:rgba(2,2,8,0.72); backdrop-filter:blur(8px); }
  .cmp .csheet{ position:absolute; left:0; right:0; bottom:0; max-height:92%; overflow-y:auto; border-radius:30px 30px 0 0; background:linear-gradient(180deg,#0c0e1a,#05060e); border-top:1px solid var(--border); padding:14px 20px 30px; animation:rise .3s cubic-bezier(.2,.8,.2,1); } .cmp .csheet::-webkit-scrollbar{ display:none; }
  @keyframes rise{ from{ transform:translateY(60px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .cmp .grab{ width:42px; height:5px; border-radius:999px; background:rgba(255,255,255,0.18); margin:2px auto 14px; }
  .cmp .ctop{ display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:4px; }
  .cmp .pl{ text-align:center; } .cmp .pl .av{ width:46px; height:46px; margin:0 auto 7px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:900; color:#fff; } .cmp .pl.you .av{ background:linear-gradient(150deg,#4A8FFF,#6F70FF); } .cmp .pl .nm{ font-size:12px; font-weight:800; } .cmp .pl .pw{ font-size:10.5px; font-weight:800; color:var(--muted); margin-top:2px; }
  .cmp .vs{ font-size:13px; font-weight:900; letter-spacing:.1em; color:var(--dim); }
  .cmp .verdict{ text-align:center; font-size:12px; font-weight:800; letter-spacing:.04em; color:var(--muted); margin:10px 0 18px; } .cmp .verdict b{ color:var(--text); }
  .cmprow{ margin-bottom:13px; }
  .cmprow .ch{ display:flex; align-items:center; gap:7px; font-size:12px; font-weight:800; margin-bottom:6px; } .cmprow .ch .cemo{ font-size:13px; } .cmprow .ch .cnm{ flex:1; } .cmprow .ch .cwin{ font-size:8.5px; font-weight:900; letter-spacing:.08em; padding:2px 7px; border-radius:999px; } .cmprow .ch .cwin.you{ color:#bfe0ff; background:rgba(74,143,255,.18); } .cmprow .ch .cwin.them{ color:#ffd2a6; background:rgba(255,138,61,.18); } .cmprow .ch .cwin.tie{ color:var(--dim); background:rgba(255,255,255,.06); }
  .cmprow .cbar{ display:flex; height:9px; border-radius:999px; overflow:hidden; background:rgba(0,0,0,.4); } .cmprow .cyou{ width:50%; background:linear-gradient(90deg,#6F70FF,#4A8FFF); transition:width .9s cubic-bezier(.2,.85,.25,1); } .cmprow .cthem{ width:50%; background:linear-gradient(90deg,var(--tc,#FF8A3D),color-mix(in srgb,var(--tc,#FF8A3D) 55%,#fff)); transition:width .9s cubic-bezier(.2,.85,.25,1); }
  .cmprow .cnums{ display:flex; justify-content:space-between; font-size:11px; font-weight:900; margin-top:5px; font-variant-numeric:tabular-nums; } .cmprow .cnums .ny{ color:#8FB4FF; } .cmprow .cnums .nt{ color:var(--tc,#FF8A3D); }
  .cmp .cclose{ margin-top:8px; width:100%; min-height:46px; border-radius:14px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font:inherit; font-size:14px; font-weight:800; cursor:pointer; } .cmp .cclose:active{ transform:scale(.99); }
  .cmp .note{ text-align:center; font-size:10.5px; color:var(--dim); margin-top:12px; }

  .nav { position:absolute; left:0; right:0; bottom:0; z-index:50; padding:10px 12px 26px; display:flex; justify-content:space-around; align-items:flex-end; background:linear-gradient(180deg, rgba(5,6,14,0) 0%, rgba(5,6,14,0.88) 34%, #04040c 100%); backdrop-filter:blur(14px); }
  .nav a{ display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 8px; min-width:48px; min-height:44px; text-decoration:none; color:var(--dim); } .nav svg{ width:23px; height:23px; } .nav .nl{ font-size:10px; font-weight:800; }
  .nav .item.active{ color:var(--text); } .nav .item.active svg{ color:var(--accent); filter:drop-shadow(0 0 8px rgba(74,143,255,.75)); }
  .toast{ position:absolute; left:50%; bottom:100px; transform:translateX(-50%) translateY(14px); z-index:90; background:rgba(20,22,34,0.96); border:1px solid var(--border); border-radius:14px; padding:11px 16px; font-size:13px; font-weight:700; opacity:0; pointer-events:none; transition:.3s; } .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="phone">
    <div class="bg"></div><div class="notch"></div>
    <div class="frame">
      <div class="hdr"><a class="back" href="23-profile.html" aria-label="Back" onclick="event.preventDefault();if(history.length>1){history.back();}else{location.href=this.getAttribute('href');}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 6l-6 6 6 6"/></svg></a><div><div class="ttl">Friends</div><div class="sub" id="frCount">0 friends</div></div></div>
      <div class="scroll">
        <div class="mecard">
          <div class="l">Your Player ID</div>
          <div class="id" id="myId">CORE-XXXX-XXXX</div>
          <div class="acts">
            <button class="btn" id="copyId" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg><span>Copy ID</span></button>
            <button class="btn primary" id="shareId" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg><span>Share</span></button>
          </div>
          <div class="add"><input id="addInput" maxlength="14" placeholder="Add by ID (CORE-XXXX-XXXX)" aria-label="Friend ID" /><button class="btn primary ab" id="addBtn" type="button">Add</button></div>
        </div>
        <div class="sec">Your friends</div>
        <div id="list"></div>
      </div>
      <nav class="nav" aria-label="Primary">
        <a class="item" href="20-dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 11l9-7 9 7M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/></svg><span class="nl">Home</span></a>
        <a class="item" href="21-quests.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 6h11M9 12h11M9 18h11M4 6l1 1 2-2M4 12l1 1 2-2M4 18l1 1 2-2"/></svg><span class="nl">Quests</span></a>
        <a class="item" href="27-shop.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M6 2L3 6v13a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"/></svg><span class="nl">Shop</span></a>
        <a class="item active" href="23-profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="nl">Profile</span></a>
        <a class="item active" href="24-more.html" aria-current="page"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg><span class="nl">More</span></a>
      </nav>
      <div class="home-indicator"></div>
    </div>
    <!-- you-vs-friend comparison sheet -->
    <div class="cmp" id="cmp" role="dialog" aria-modal="true">
      <div class="cscrim" id="cmpScrim"></div>
      <div class="csheet">
        <div class="grab"></div>
        <div class="ctop">
          <div class="pl you"><div class="av">YOU</div><div class="nm">You</div><div class="pw" id="cmpYouPw">CORE Power —</div></div>
          <div class="vs">VS</div>
          <div class="pl"><div class="av" id="cmpThemAv">F</div><div class="nm" id="cmpThemNm">Friend</div><div class="pw" id="cmpThemPw">CORE Power —</div></div>
        </div>
        <div class="verdict" id="cmpVerdict"></div>
        <div id="cmpRows"></div>
        <div class="note">Friend stats are illustrative until live sync is connected.</div>
        <button class="cclose" id="cmpClose" type="button">Close</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>
  <script src="_lib/core-state.js"></script>
  <script>
  (function(){
    var qs=function(s){return document.querySelector(s);};
    function pget(k,d){ try{var v=localStorage.getItem(k); return v===null?d:v;}catch(e){return d;} }
    function pset(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
    function pjson(k,d){ try{var v=JSON.parse(localStorage.getItem(k)); return v||d;}catch(e){return d;} }
    function ensureId(){ var id=pget('corePlayerId',null); if(!id){ var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',a='',b=''; for(var i=0;i<4;i++){a+=c.charAt(Math.floor(Math.random()*c.length));b+=c.charAt(Math.floor(Math.random()*c.length));} id='CORE-'+a+'-'+b; pset('corePlayerId',id);} return id; }
    var pid=ensureId(); qs('#myId').textContent=pid;
    var toastT; function toast(m){ var t=qs('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},1500); }
    function copyText(t,cb){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(cb,fb);} else fb(); function fb(){ try{var ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);}catch(e){} cb&&cb(); } }
    function inlineOk(b,l){ var sp=b.querySelector('span')||b,p=sp.textContent; sp.textContent=l; b.classList.add('ok'); setTimeout(function(){ sp.textContent=p; b.classList.remove('ok'); },1400); }
    var COL=[['#4A8FFF','#6F70FF'],['#34D399','#0f766e'],['#FF8A3D','#b3431a'],['#B388FF','#5b1aa0'],['#5eead4','#0f5a52'],['#FFD24D','#8b5a00']];
    var STAT_EMO={ strength:'⚔️', focus:'🧠', wealth:'💰', health:'❤️', social:'👥', purpose:'🎯' };
    var S=window.coreState||{}; var STAT_DEFS=S.STAT_DEFS||[]; var RANKS_L=S.RANKS||[];

    // Friends have no live backend yet, so derive STABLE pseudo-stats from the ID hash.
    // Same ID always yields the same profile — clearly illustrative (noted in the sheet).
    function hashStr(s){ var h=2166136261>>>0; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619)>>>0; } return h>>>0; }
    function friendProfile(id){ var h=hashStr(id), stats={}, sum=0;
      STAT_DEFS.forEach(function(d,k){ var v=35+((h>>>((k*5)%27))%61); stats[d.key]=v; sum+=v; }); // >>> unsigned: keeps modulo positive
      var power=STAT_DEFS.length?Math.round(sum/STAT_DEFS.length):0;
      var idx=Math.max(0, Math.min(RANKS_L.length-1, Math.floor((power/101)*RANKS_L.length)));
      var rank=(RANKS_L.length&&RANKS_L[idx])?RANKS_L[idx].name:'Player';
      return { stats:stats, power:power, rank:rank }; }

    function render(){
      var fr=pjson('coreFriends',[]);
      qs('#frCount').textContent=fr.length+' friend'+(fr.length===1?'':'s');
      var host=qs('#list');
      if(!fr.length){ host.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="8" r="3.5"/><path d="M2 21a7 7 0 0 1 14 0M17 7a3.5 3.5 0 0 1 0 7M22 21a6 6 0 0 0-4-5.6"/></svg><div class="t">No friends yet</div><div class="s">Share your Player ID or add a friend by theirs.</div></div>'; return; }
      host.innerHTML=fr.map(function(id,i){ var c=COL[i%COL.length]; var ini=(id.replace('CORE-','')[0]||'C'); var p=friendProfile(id);
        return '<div class="fr" data-cid="'+id+'" role="button" tabindex="0" aria-label="Compare with '+id+'"><div class="av" style="--c1:'+c[0]+';--c2:'+c[1]+'">'+ini+'</div><div class="fb"><div class="fn">'+id+'</div><div class="fs">'+p.rank+' · <span class="fpow">'+p.power+'</span> Power</div></div><span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></span><button class="rm" data-id="'+id+'" aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>'; }).join('');
      host.querySelectorAll('.fr').forEach(function(row){
        row.addEventListener('click', function(e){ if(e.target.closest('.rm')) return; openCompare(row.dataset.cid); });
        row.addEventListener('keydown', function(e){ if((e.key==='Enter'||e.key===' ')&&!e.target.closest('.rm')){ e.preventDefault(); openCompare(row.dataset.cid); } });
      });
      host.querySelectorAll('.rm').forEach(function(b){ var armed=false,rt; b.addEventListener('click', function(e){ e.stopPropagation();
        if(!armed){ armed=true; b.classList.add('arm'); clearTimeout(rt); rt=setTimeout(function(){ armed=false; b.classList.remove('arm'); },2500); toast('Tap again to remove'); return; }
        var arr=pjson('coreFriends',[]).filter(function(x){return x!==b.dataset.id;}); pset('coreFriends',JSON.stringify(arr)); toast('Removed'); render(); }); });
    }
    // you-vs-friend stat comparison
    function openCompare(id){ if(!STAT_DEFS.length){ toast('Stats unavailable'); return; }
      var fp=friendProfile(id), ini=(id.replace('CORE-','')[0]||'F'), myWins=0, total=STAT_DEFS.length, myAvg=0, thAvg=0;
      var rows=STAT_DEFS.map(function(d){
        var you=Math.round((S.statValue&&S.statValue(d.key))||0), them=fp.stats[d.key]||0; myAvg+=you; thAvg+=them;
        var win = you>them?'you':(them>you?'them':'tie'); if(win==='you') myWins++;
        var sum=(you+them)||1, yw=Math.round(you/sum*100), tw=100-yw;
        var emo=STAT_EMO[d.key]||'⭐';
        var lbl= win==='you'?'<span class="cwin you">YOU</span>':(win==='them'?'<span class="cwin them">THEM</span>':'<span class="cwin tie">TIE</span>');
        return '<div class="cmprow" style="--tc:'+d.color+'"><div class="ch"><span class="cemo">'+emo+'</span><span class="cnm">'+d.name+'</span>'+lbl+'</div>'+
          '<div class="cbar"><div class="cyou" data-w="'+yw+'"></div><div class="cthem" data-w="'+tw+'"></div></div>'+
          '<div class="cnums"><b class="ny">You '+you+'</b><b class="nt">'+them+' Them</b></div></div>'; }).join('');
      myAvg=Math.round(myAvg/total); thAvg=Math.round(thAvg/total);
      qs('#cmpRows').innerHTML=rows;
      qs('#cmpThemAv').textContent=ini; qs('#cmpThemNm').textContent=id;
      qs('#cmpYouPw').textContent='CORE Power '+myAvg; qs('#cmpThemPw').textContent='CORE Power '+thAvg;
      var loss=total-myWins-STAT_DEFS.filter(function(d){ return Math.round((S.statValue&&S.statValue(d.key))||0)===(fp.stats[d.key]||0); }).length;
      var v = myWins>loss ? 'You lead <b>'+myWins+' of '+total+'</b> stats' : (myWins<loss ? 'They lead <b>'+loss+' of '+total+'</b> stats' : 'Neck and neck — <b>'+myWins+'/'+total+'</b>');
      qs('#cmpVerdict').innerHTML=v;
      var c=qs('#cmp'); c.classList.add('open');
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ c.querySelectorAll('.cyou,.cthem').forEach(function(el){ el.style.width=(el.getAttribute('data-w')||50)+'%'; }); }); }); }
    function closeCompare(){ qs('#cmp').classList.remove('open'); }
    qs('#cmpScrim').addEventListener('click', closeCompare); qs('#cmpClose').addEventListener('click', closeCompare);

    qs('#copyId').addEventListener('click', function(){ var b=this; copyText(pid,function(){ inlineOk(b,'Copied'); }); });
    qs('#shareId').addEventListener('click', function(){ var txt='Add me on CORE: '+pid+'.'; if(navigator.share){ navigator.share({text:txt}).catch(function(){}); } else { var b=this; copyText(txt,function(){ inlineOk(b,'Copied'); }); } });
    function add(){ var inp=qs('#addInput'), v=(inp.value||'').trim().toUpperCase(); if(!v){ inp.focus(); return; } if(v===pid){ toast("That's your own ID"); return; } var fr=pjson('coreFriends',[]); if(fr.indexOf(v)>=0){ toast('Already added'); inp.value=''; return; } fr.push(v); pset('coreFriends',JSON.stringify(fr)); inp.value=''; toast('Friend added'); try{window.coreState.syncProgress();}catch(e){} render(); }
    qs('#addBtn').addEventListener('click', add);
    qs('#addInput').addEventListener('keydown', function(e){ if(e.key==='Enter') add(); });

    // preview seeding: ?demo=1 populates sample friends so the list + comparison are visible
    try{ if(/[?&]demo=1/.test(location.search)){ if(S.seedDemo) S.seedDemo(); if(!pjson('coreFriends',[]).length){ pset('coreFriends',JSON.stringify(['CORE-K7Q2-9XMP','CORE-B3FW-RT81','CORE-Z9LC-4HVD'])); } } }catch(e){}

    render();
    // screenshot/deep-link hook: ?cmp=1 opens the first friend, ?cmp=CORE-XXXX-XXXX opens that one
    try{ var cm=location.search.match(/[?&]cmp=([^&]+)/); if(cm){ var arr=pjson('coreFriends',[]); var who=cm[1]==='1'?arr[0]:decodeURIComponent(cm[1]); if(who) openCompare(who); } }catch(e){}
  })();
  </script>
</body>
</html>
