<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
  <meta charset="utf-8" />
  <title>Core — Enter your code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    :root {
      --bg-base:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
      --accent:#0A84FF; --accent-hi:#0A84FF; --indigo:#5B6AE6;
      --border:rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; }
    body {
      min-height:100vh; background:#0A0A14;
      display:flex; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
      color:var(--text); padding:24px; overflow:hidden;
    }
    .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
    .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
    .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }

    .bg {
      position:absolute; inset:0; z-index:0;
      background:
        radial-gradient(50% 30% at 50% 18%, color-mix(in srgb, var(--accent) 20%, transparent) 0%, transparent 65%),
        radial-gradient(60% 35% at 50% 100%, rgba(255,255,255,0.05) 0%, transparent 60%),
        linear-gradient(180deg, #050518 0%, #02020A 55%, #050510 100%);
    }
    .aurora { position:absolute; inset:0; pointer-events:none; opacity:0.4; mix-blend-mode:screen; }
    .aurora::before {
      content:""; position:absolute; width:70%; height:35%; left:-10%; top:8%; border-radius:50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent) 30%, transparent), transparent 65%);
      filter: blur(60px); animation: aDrift 18s ease-in-out infinite;
    }
    @keyframes aDrift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-12px); } }
    .stars { position:absolute; inset:0; pointer-events:none; }
    .star { position:absolute; border-radius:50%; background:#fff; animation: twk var(--d,4s) ease-in-out var(--del,0s) infinite; }
    .star.s1 { width:1px;   height:1px;   opacity:0.4; }
    .star.s2 { width:1.5px; height:1.5px; opacity:0.55; }
    .star.s3 { width:2px;   height:2px;   opacity:0.7;  box-shadow: 0 0 4px rgba(255,255,255,0.6); }
    @keyframes twk { 0%,100% { opacity: var(--min,0.15); transform:scale(0.7); } 50% { opacity: var(--max,0.85); transform:scale(1.15); } }

    .frame { position:absolute; inset:0; padding: 60px 0 28px; display:flex; flex-direction:column; z-index:10; }

    .topbar { display:flex; align-items:center; padding: 0 22px 12px; gap:14px; }
    .back {
      -webkit-appearance: none !important; appearance: none !important;
      width: 38px !important; height: 38px !important;
      min-width: 38px !important; min-height: 38px !important;
      max-width: 38px !important; max-height: 38px !important;
      aspect-ratio: 1 / 1;
      flex: 0 0 38px;
      align-self: center;
      border-radius: 50% !important;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      display: flex !important; align-items: center !important; justify-content: center !important;
      cursor: pointer; padding: 0;
      font-family: inherit;
      box-sizing: border-box;
      transition: background .15s, border-color .15s, transform .12s;
    }
    .back:active { transform: scale(0.94); }
    .back:hover { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.14); }
    .back svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .brand-mark { display:flex; align-items:center; gap:8px; flex:1; justify-content:center; padding-right:36px; }
    .brand-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation: pulse 2.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.25); opacity:0.85; } }
    .brand-text { font-size:12px; font-weight:700; letter-spacing:0.42em; color:#fff; padding-left:0.42em; }

    .hero { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 0 32px; text-align:center; }

    /* Envelope icon with breathing glow */
    .icon-wrap {
      width: 88px; height: 88px; border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px;
      animation: breathe 4s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    .icon-wrap svg { width: 38px; height: 38px; stroke: var(--accent); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    .eyebrow { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.12; margin: 0; }
    .sub { margin: 10px 0 0; color: var(--muted); font-size: 14px; line-height: 21px; max-width: 290px; }
    .sub strong { color: #fff; font-weight: 600; }

    /* OTP boxes */
    .otp-row {
      display: flex; justify-content: center; gap: 8px;
      padding: 22px 24px 0;
    }
    .otp-box {
      width: 44px; height: 56px; border-radius: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: #fff; font-size: 22px; font-weight: 700; text-align: center;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      outline: none; -webkit-appearance: none; appearance: none;
      transition: border-color .2s, background .2s, box-shadow .2s, transform .12s;
      caret-color: var(--accent);
    }
    .otp-box:focus {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent);
      transform: translateY(-1px);
    }
    .otp-box.filled { border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 6%, transparent); }
    .otp-row.error .otp-box { border-color: #E5677A; animation: shake 0.32s cubic-bezier(.36,.07,.19,.97); }
    .otp-row.ok .otp-box { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 6%, transparent); }
    @keyframes shake { 10%,90% { transform: translateX(-1px); } 20%,80% { transform: translateX(2px); } 30%,50%,70% { transform: translateX(-3px); } 40%,60% { transform: translateX(3px); } }

    .otp-msg { text-align: center; margin-top: 14px; padding: 0 28px; font-size: 12px; color: var(--muted); letter-spacing:-0.05px; min-height: 16px; }
    .otp-msg.err { color: #E5677A; }
    .otp-msg.ok  { color: var(--accent); }

    /* Resend block */
    .resend-row { padding: 16px 28px 4px; text-align: center; }
    .resend-row .resend-link {
      display: inline-block; padding: 6px 12px; border-radius: 8px;
      font-size: 13px; color: var(--accent-hi); font-weight: 600; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .resend-row .resend-link:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); color: #fff; }
    .resend-row .resend-link.disabled { color: var(--dim); cursor: not-allowed; pointer-events: none; }
    .resend-row .countdown { font-size: 11px; color: var(--dim); margin-top: 4px; letter-spacing: 0.04em; }

    .alt-line { text-align: center; margin-top: 8px; font-size: 12px; color: var(--muted); letter-spacing:-0.05px; }
    .alt-line a { color: var(--accent-hi); text-decoration: none; font-weight: 600; cursor: pointer; }

    .footer { padding: 14px 28px 0; text-align: center; font-size: 11px; color: var(--text-secondary); line-height: 16px; letter-spacing:-0.05px; }

    .preview-label { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#4A5060; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-family:ui-monospace,"SF Mono",Menlo,monospace; }

    @media (max-width: 460px) {
      .notch, .home-indicator, .preview-label { display:none; }
      h1 { font-size: 24px; }
    }
    @media (max-width: 360px) {
      .otp-row { gap: 6px; padding: 18px 14px 0; }
      .otp-box { width: 40px; height: 50px; font-size: 20px; }
    }
    @media (max-width: 320px) {
      .otp-row { gap: 5px; padding: 16px 10px 0; }
      .otp-box { width: 36px; height: 46px; font-size: 18px; }
    }
    @media (max-height: 700px) {
      .frame { padding-top: 50px; padding-bottom: 18px; }
      .icon-wrap { width: 64px; height: 64px; margin-bottom: 14px; }
      .icon-wrap svg { width: 30px; height: 30px; }
      h1 { font-size: 22px; }
      .sub { font-size: 13px; margin-top: 6px; }
      .otp-row { padding: 16px 24px 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .icon-wrap, .brand-dot, .star, .aurora::before { animation: none !important; }
    }
  </style>

<body>
  <div class="phone" data-bg-skip>
    <div class="bg"></div>
    <div class="aurora"></div>
    <div class="stars" id="stars"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="frame">
      <div class="topbar">
        <button class="back" type="button" onclick="coreBack('05-sign-in-email.html')" aria-label="Back">
          <svg viewBox="0 0 24 24"><path d="M15 18L9 12l6-6"/></svg>
        </button>
        <div class="brand-mark"><span class="brand-dot"></span><span class="brand-text">CORE</span></div>
      </div>

      <div class="hero">
        <div class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <path d="M3 7l9 6 9-6"/>
          </svg>
        </div>
        <div class="eyebrow">Check your inbox</div>
        <h1>Enter your 6-digit code</h1>
        <p class="sub">We sent it to <strong id="targetEmail">your email</strong>. Code expires in 10 minutes.</p>
      </div>

      <div class="otp-row" id="otpRow" role="group" aria-label="6-digit code">
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" aria-label="Digit 1" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 2" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 3" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 4" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 5" />
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 6" />
      </div>
      <div class="otp-msg" id="otpMsg">Paste your code or type it in.</div>

      <div class="resend-row">
        <span class="resend-link disabled" id="resendBtn" onclick="resend()">Resend code</span>
        <div class="countdown" id="countdown">You can resend in 30s</div>
      </div>

      <div class="alt-line">
        Wrong email? <a onclick="window.location.href='05-sign-in-email.html'">Change it</a>
      </div>

      <div class="footer">
        Didn't get it? Check spam, or use a different method on the
        <a href="04-sign-in.html" style="color:var(--accent-hi); text-decoration:none;">sign-in screen</a>.
      </div>
    </div>
  </div>

  <div class="preview-label">core · sign-in-otp · v1</div>

<script>
  // Back button — explicit handler. history.back() with same-origin
  // referrer check; otherwise fall back to the email entry page.
  function goBack() {
    if (window.coreTrack) try { coreTrack('back_pressed', { from: 'sign-in-otp' }); } catch(e){}
    if (history.length > 1 && document.referrer && document.referrer.indexOf(location.origin) === 0) {
      history.back();
    } else {
      location.href = '05-sign-in-email.html';
    }
  }
  window.goBack = goBack;

  // Star field
  (function() {
    const sl = document.getElementById('stars');
    for (let i = 0; i < 14; i++) {
      const s = document.createElement('div');
      const r = Math.random();
      s.className = 'star ' + (r < 0.55 ? 's1' : r < 0.85 ? 's2' : 's3');
      s.style.left = (Math.random()*100) + '%';
      s.style.top  = (Math.random()*100) + '%';
      s.style.setProperty('--d',   (2.5 + Math.random()*5) + 's');
      s.style.setProperty('--del', (Math.random()*5) + 's');
      s.style.setProperty('--min', (0.10 + Math.random()*0.20).toFixed(2));
      s.style.setProperty('--max', (0.55 + Math.random()*0.40).toFixed(2));
      sl.appendChild(s);
    }
  })();

  // Read the pending email; bounce back if no flow in progress
  const pending = (function() {
    try { return localStorage.getItem('corePendingEmail') || ''; } catch(e) { return ''; }
  })();
  if (!pending) {
    window.location.replace('05-sign-in-email.html');
  } else {
    document.getElementById('targetEmail').textContent = pending;
  }

  // Wire up the 6 OTP boxes
  const otpRow = document.getElementById('otpRow');
  const otpMsg = document.getElementById('otpMsg');
  const boxes  = Array.from(otpRow.querySelectorAll('.otp-box'));

  function currentCode() { return boxes.map(b => b.value).join(''); }
  function setMsg(text, kind) {
    otpMsg.textContent = text;
    otpMsg.className = 'otp-msg' + (kind ? ' ' + kind : '');
  }

  boxes.forEach((box, i) => {
    box.addEventListener('input', (e) => {
      const v = (e.target.value || '').replace(/\D/g, '');
      e.target.value = v.slice(-1);
      if (e.target.value) {
        box.classList.add('filled');
        if (i < boxes.length - 1) boxes[i+1].focus();
      } else {
        box.classList.remove('filled');
      }
      const code = currentCode();
      if (code.length === 6) attemptVerify(code);
      else if (otpRow.classList.contains('error')) {
        otpRow.classList.remove('error');
        setMsg('Paste your code or type it in.', '');
      }
    });
    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) {
        boxes[i-1].focus();
        boxes[i-1].value = '';
        boxes[i-1].classList.remove('filled');
      }
      if (e.key === 'ArrowLeft' && i > 0) boxes[i-1].focus();
      if (e.key === 'ArrowRight' && i < boxes.length - 1) boxes[i+1].focus();
    });
    box.addEventListener('paste', (e) => {
      e.preventDefault();
      const data = (e.clipboardData || window.clipboardData).getData('text') || '';
      const digits = data.replace(/\D/g, '').slice(0, 6).split('');
      digits.forEach((d, k) => {
        if (boxes[k]) {
          boxes[k].value = d;
          boxes[k].classList.add('filled');
        }
      });
      const next = Math.min(digits.length, boxes.length - 1);
      boxes[next].focus();
      if (digits.length === 6) attemptVerify(digits.join(''));
    });
  });

  // Auto-focus first box
  setTimeout(() => boxes[0].focus(), 250);

  function attemptVerify(code) {
    // In production this hits POST /api/auth/email/verify
    // For preview we accept any 6-digit code; flip the onboarding flag and head to dashboard.
    if (window.coreTrack) coreTrack('sign_in_otp_attempt', {});

    // Disable inputs during verification
    boxes.forEach(b => b.disabled = true);
    setMsg('Verifying…', '');

    function finishLocal() {
      // LOCAL backend — accept any 6-digit code in preview mode.
      otpRow.classList.add('ok');
      let isNew = true; let account = null;
      try {
        const r = window.coreAccounts.findOrCreate({
          provider: 'email',
          identifier: pending,
          displayName: pending.split('@')[0],
        });
        account = r.account; isNew = r.isNew;
        window.coreAccounts.signIn(account.id);
        window.coreAccounts.updateCurrent(acc => {
          acc.signedInWith = 'email';
          acc.signedInAt = Date.now();
          if (!acc.trialState) acc.trialState = {};
          acc.trialState.signedInEmail = pending;
        });
      } catch (e) {}
      cleanup();
      try { if (account && account.subscribed) localStorage.setItem('coreSubscribed', '1'); } catch (e) {}
      if (window.coreTrack) coreTrack('sign_in', { method: 'email', mode: 'local', isNew, onboarded: !!(account && account.onboarded) });
      route(isNew || !(account && account.onboarded));
    }

    async function finishReal() {
      try {
        const { account, isNew } = await window.coreAccounts.verifyEmailOtp(pending, code);
        otpRow.classList.add('ok');
        // Mark sign-in source for the dashboard greeting.
        await window.coreAccounts.updateCurrent(acc => {
          acc.signedInWith = 'email';
          acc.signedInAt = Date.now();
        });
        cleanup();
        try { if (account && account.subscribed) localStorage.setItem('coreSubscribed', '1'); } catch (e) {}
        if (window.coreTrack) coreTrack('sign_in', { method: 'email', mode: 'real', isNew, onboarded: !!(account && account.onboarded) });
        route(isNew || !(account && account.onboarded));
      } catch (err) {
        otpRow.classList.add('err');
        setMsg('That code didn\'t work. Try again.', 'err');
        boxes.forEach((b, i) => { b.disabled = false; if (i === 0) b.focus(); });
        if (window.coreTrack) coreTrack('sign_in_otp_failed', { error: err && err.message });
      }
    }

    function cleanup() {
      try {
        localStorage.removeItem('corePendingEmail');
        localStorage.removeItem('corePendingEmailAt');
      } catch (e) {}
    }
    function route(goTrial) {
      // Honour a ?next= handoff (e.g. end-of-trial email verification → rank reveal).
      var nextDest = '';
      try {
        var np = new URLSearchParams(location.search).get('next') || '';
        if (/^[A-Za-z0-9_-]+\.html$/.test(np)) nextDest = np;
      } catch (e) {}
      var dest = nextDest || (goTrial ? '07-trial.html' : '20-dashboard.html');
      setMsg(nextDest ? 'Email verified. Continuing…' : (goTrial ? 'Account ready. Let\'s set you up…' : 'Welcome back. Taking you to your dashboard…'), 'ok');
      setTimeout(() => { window.location.href = dest; }, 600);
    }

    if (window.coreAccounts && window.coreAccounts.isReal()) {
      finishReal();
    } else {
      setTimeout(finishLocal, 600);
    }
  }

  // Resend countdown — 30s cooldown
  const resendBtn = document.getElementById('resendBtn');
  const countEl   = document.getElementById('countdown');
  let cooldown    = 30;
  function tick() {
    if (cooldown <= 0) {
      resendBtn.classList.remove('disabled');
      countEl.textContent = 'Tap to resend a fresh code';
      return;
    }
    countEl.textContent = 'You can resend in ' + cooldown + 's';
    cooldown -= 1;
    setTimeout(tick, 1000);
  }
  tick();

  function resend() {
    if (resendBtn.classList.contains('disabled')) return;
    resendBtn.classList.add('disabled');
    cooldown = 30;
    setMsg('A new code is on the way.', 'ok');
    try {
      localStorage.setItem('corePendingEmailAt', String(Date.now()));
      if (window.coreTrack) coreTrack('sign_in_otp_resend', {});
    } catch(e){}
    tick();
    setTimeout(() => setMsg('Paste your code or type it in.', ''), 2400);
  }

  if (window.coreTrack) coreTrack('screen_view', { screen: 'sign-in-otp' });
</script>
</body>
