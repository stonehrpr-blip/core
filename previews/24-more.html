<style>
  :root{ --bg-base:#02020A; --bg-card:rgba(255,255,255,0.035); --border:rgba(255,255,255,0.08); --text:#F8FAFE; --muted:#9AA1B7; --dim:#6B7390; --accent:#4A8FFF; --grad-a:#4A8FFF; --grad-b:#6F70FF; --good:#34D399; }
  *{ box-sizing:border-box; } html,body{ margin:0; padding:0; height:100%; }
  body{ min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone{ position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch{ position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:60; }
  .bg{ position:absolute; inset:0; z-index:0; background:
      radial-gradient(60% 36% at 50% 6%, rgba(74,143,255,0.16) 0%, transparent 64%),
      radial-gradient(60% 35% at 50% 98%, rgba(111,112,255,0.08) 0%, transparent 65%),
      linear-gradient(180deg, #060a1c 0%, #02020A 58%, #050510 100%); }
  .stars{ position:absolute; inset:-2%; pointer-events:none; z-index:1; }
  .star{ position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,4s) ease-in-out var(--del,0s) infinite; }
  @keyframes twinkle{ 0%,100%{opacity:0.14;transform:scale(0.7);} 50%{opacity:0.75;transform:scale(1.1);} }
  @media (prefers-reduced-motion: reduce){ .star{ animation:none!important; } }

  .frame{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }
  .topbar{ position:relative; display:flex; align-items:center; justify-content:space-between; padding:6px 18px 4px; }
  .back{ width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--border); color:var(--text); text-decoration:none; } .back svg{ width:20px; height:20px; }
  .topbar .ttl{ position:absolute; left:50%; transform:translateX(-50%); font-size:13px; font-weight:800; letter-spacing:0.2em; text-transform:uppercase; }
  .topbar .sp{ width:38px; }

  .scroll{ flex:1; overflow-y:auto; padding:10px 16px 112px; } .scroll::-webkit-scrollbar{ display:none; }
  .sec{ font-size:11px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin:18px 4px 10px; }
  .menu{ display:flex; flex-direction:column; gap:9px; }
  .row{ display:flex; align-items:center; gap:13px; padding:14px 15px; border-radius:16px; background:var(--bg-card); border:1px solid var(--border); text-decoration:none; color:var(--text); min-height:44px; transition:transform .14s, border-color .2s, background .2s; }
  .row:active{ transform:scale(.985); }
  .row:hover{ border-color:color-mix(in srgb,var(--ic,#4A8FFF) 45%,transparent); background:rgba(255,255,255,0.05); }
  .row .ic{ width:42px; height:42px; flex:none; border-radius:12px; display:flex; align-items:center; justify-content:center; background:color-mix(in srgb,var(--ic,#4A8FFF) 15%,transparent); border:1px solid color-mix(in srgb,var(--ic,#4A8FFF) 32%,transparent); }
  .row .ic svg{ width:22px; height:22px; color:var(--ic,#4A8FFF); }
  .row .tx{ flex:1; min-width:0; } .row .tx b{ font-size:14.5px; font-weight:800; } .row .tx span{ display:block; font-size:11.5px; color:var(--muted); margin-top:2px; line-height:1.35; }
  .row .chev{ flex:none; color:var(--dim); } .row .chev svg{ width:18px; height:18px; }
  .ver{ text-align:center; font-size:11px; font-weight:700; color:var(--dim); margin-top:22px; letter-spacing:.04em; }

  .nav{ position:absolute; left:0; right:0; bottom:0; z-index:50; padding:10px 12px 26px; display:flex; justify-content:space-around; align-items:flex-end; background:linear-gradient(180deg, rgba(5,6,14,0) 0%, rgba(5,6,14,0.88) 34%, #04040c 100%); backdrop-filter:blur(14px); }
  .nav a{ background:none; border:none; font:inherit; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 8px; min-width:48px; min-height:44px; text-decoration:none; color:var(--dim); transition:color .2s; }
  .nav svg{ width:23px; height:23px; } .nav .nl{ font-size:10px; font-weight:800; }
  .nav .item.active{ color:var(--text); } .nav .item.active svg{ color:var(--accent); filter:drop-shadow(0 0 8px rgba(74,143,255,.75)); }
</style>

  <script>
    (function(){ var h=document.getElementById('stars'); if(!h) return; var f=document.createDocumentFragment();
      for(var i=0;i<46;i++){ var d=document.createElement('span'); d.className='star'; var sz=(i%7===0)?2.2:(i%3===0)?1.6:1.0;
        d.style.width=sz+'px'; d.style.height=sz+'px'; d.style.left=((i*41)%100)+'%'; d.style.top=((i*53)%100)+'%';
        d.style.setProperty('--d',(3+(i%5))+'s'); d.style.setProperty('--del',((i%9)*0.4)+'s'); f.appendChild(d); }
