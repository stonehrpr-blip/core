<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Open Chest</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root {
    --bg-base:#02020A;
    --bg-card:rgba(255,255,255,0.022);
    --border:rgba(255,255,255,0.07);
    --text:#F8FAFE;
    --muted:#9AA1B7;
    --dim:#4F5570;
    --accent:#0A84FF;
    --good:#0A84FF;
    --gold:#0A84FF;
    /* rarity of THIS chest — overwritten by JS once the pull is rolled */
    --rar:#0A84FF;
    --rarA:rgba(10,132,255,0.5);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    min-height:100vh; background:#0A0A14;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
    color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden;
  }
  .phone {
    position:relative; width:390px; height:844px; background:var(--bg-base);
    border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38;
  }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:60; }

  /* deep spotlight stage — darker than the rest of the app on purpose */
  .bg {
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(58% 40% at 50% 40%, color-mix(in srgb, var(--rar) 18%, transparent) 0%, transparent 66%),
      radial-gradient(70% 50% at 50% 100%, rgba(10,12,24,0) 0%, #04040c 70%),
      linear-gradient(180deg, #06061a 0%, #02020A 52%, #050510 100%);
    transition:background .6s ease;
  }
  /* spotlight cone behind the chest */
  .cone {
    position:absolute; left:50%; top:8%; width:260px; height:430px; transform:translateX(-50%); z-index:1; pointer-events:none;
    background:radial-gradient(50% 45% at 50% 38%, color-mix(in srgb, var(--rar) 26%, transparent), transparent 70%);
    filter:blur(8px); opacity:.7; transition:opacity .5s ease;
  }
  body.phase-opening .cone{ opacity:1; }
  .stars { position:absolute; inset:-2%; pointer-events:none; z-index:2; }
  .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,4s) ease-in-out var(--del,0s) infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.12;transform:scale(0.7);} 50%{opacity:0.7;transform:scale(1.1);} }
  @media (prefers-reduced-motion: reduce){ .star{animation:none;} }

  /* full-screen white flash at the moment the lid bursts */
  .flash { position:absolute; inset:0; z-index:55; pointer-events:none; opacity:0; background:#fff; }
  body.phase-opening .flash{ animation:flash .9s 1.55s ease-out; }
  body.phase-opening.rare-pull .flash{ animation:flashRare .9s 1.55s ease-out; }
  @keyframes flash { 0%{opacity:0;} 18%{opacity:.55;} 100%{opacity:0;} }
  @keyframes flashRare { 0%{opacity:0;} 14%{opacity:.92;} 100%{opacity:0;} }

  .frame { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:56px 22px 26px; }

  /* top bar */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:6px 2px 0; height:34px; }
  .brand { display:flex; align-items:center; gap:8px; }
  .brand .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
  .brand .wm { font-size:12px; font-weight:800; letter-spacing:0.34em; }
  .close { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
           background:var(--bg-card); border:1px solid var(--border); color:var(--muted); text-decoration:none; }
  .close svg{ width:16px; height:16px; }
  body.phase-opening .close{ opacity:0; pointer-events:none; transition:opacity .3s; }

  /* main stage */
  .stage { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; }

  /* chest label above the chest */
  .chest-tag { display:inline-flex; align-items:center; gap:7px; height:28px; padding:0 14px; border-radius:999px; margin-bottom:4px;
               background:color-mix(in srgb, var(--rar) 14%, transparent); border:1px solid var(--rarA); color:var(--rar);
               font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; }
  .chest-tag .rdot{ width:6px; height:6px; border-radius:50%; background:var(--rar); box-shadow:0 0 8px var(--rar); }
  body.phase-reveal .chest-tag{ display:none; }

  /* the chest */
  .chest-area { position:relative; width:260px; height:250px; display:flex; align-items:center; justify-content:center; margin:6px 0 2px; }
  body.phase-reveal .chest-area{ display:none; }
  .halo { position:absolute; width:220px; height:220px; border-radius:50%;
          background:radial-gradient(circle, color-mix(in srgb, var(--rar) 40%, transparent), color-mix(in srgb, var(--rar) 14%, transparent) 46%, transparent 70%);
          filter:blur(6px); animation:haloPulse 3.2s ease-in-out infinite; }
  @keyframes haloPulse { 0%,100%{opacity:.5;transform:scale(.92);} 50%{opacity:.9;transform:scale(1.05);} }
  body.phase-opening .halo{ animation:haloBuild 1.65s ease-in forwards; }
  @keyframes haloBuild { 0%{opacity:.5;transform:scale(.92);} 60%{opacity:1;transform:scale(1.16);} 100%{opacity:1;transform:scale(1.5);} }

  /* rays that spin out as the chest charges (rare+ pulls) */
  .rays { position:absolute; width:300px; height:300px; pointer-events:none; opacity:0;
          background:conic-gradient(from 0deg, transparent 0 8deg, color-mix(in srgb, var(--rar) 32%, transparent) 8deg 14deg, transparent 14deg 30deg);
          -webkit-mask:radial-gradient(circle, transparent 38%, #000 42%, #000 70%, transparent 74%);
                  mask:radial-gradient(circle, transparent 38%, #000 42%, #000 70%, transparent 74%); }
  body.phase-opening.rare-pull .rays{ animation:raysIn 1.6s ease-in forwards, raysSpin 9s linear infinite; }
  @keyframes raysIn { 0%{opacity:0;} 100%{opacity:.6;} }
  @keyframes raysSpin { to{ transform:rotate(360deg); } }

  .chest-svg { position:relative; z-index:3; width:172px; height:auto; filter:drop-shadow(0 18px 30px rgba(0,0,0,0.55)); }
  body.phase-ready .chest-svg{ animation:chestIdle 3.4s ease-in-out infinite; }
  @keyframes chestIdle { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
  body.phase-opening .chest-svg{ animation:chestShake .12s linear 0s 12; }
  @keyframes chestShake { 0%{transform:translate(0,0) rotate(0);} 25%{transform:translate(-3px,1px) rotate(-2deg);} 50%{transform:translate(3px,-1px) rotate(2deg);} 75%{transform:translate(-2px,2px) rotate(-1deg);} 100%{transform:translate(2px,0) rotate(1deg);} }
  .chest-lid { transform-box:fill-box; transform-origin:50% 100%; }
  body.phase-opening .chest-lid{ animation:lidOpen .5s 1.5s cubic-bezier(.3,1.2,.4,1) forwards; }
  @keyframes lidOpen { 0%{transform:translateY(0) rotate(0);} 100%{transform:translateY(-16px) rotate(-15deg);} }
  .chest-inner { opacity:0; }
  body.phase-opening .chest-inner{ animation:innerGlow 1s 1.5s ease-out forwards; }
  @keyframes innerGlow { 0%{opacity:0;} 40%{opacity:1;} 100%{opacity:.6;} }

  /* ── photographic chest art (assets/chests/<rar>.png) on a lit vault pedestal ──
     The renders sit on a white background; a near-white pedestal + multiply blend
     keys that white out while keeping the chest, and the pedestal reads as a lit
     display case glowing in the chest's rarity colour. */
  .chest-photo{ position:relative; z-index:3; width:212px; height:212px; display:flex; align-items:center; justify-content:center; }
  .chest-photo::before{ content:""; position:absolute; inset:-6px; border-radius:50%; z-index:0;
    background:radial-gradient(circle at 50% 48%, color-mix(in srgb, var(--rar) 42%, transparent) 0%, color-mix(in srgb, var(--rar) 14%, transparent) 42%, transparent 70%); }
  .chest-photo img{ position:relative; z-index:1; width:196px; height:auto; object-fit:contain;
    filter:drop-shadow(0 16px 26px rgba(0,0,0,0.6)) drop-shadow(0 0 22px color-mix(in srgb, var(--rar) 50%, transparent)); }
  body.phase-ready .chest-photo{ animation:chestIdle 3.4s ease-in-out infinite; }
  /* charge-up: an escalating rumble that builds tension before the burst */
  body.phase-opening .chest-photo{ animation:photoCharge 1.5s cubic-bezier(.4,0,.7,1) forwards; }
  @keyframes photoCharge {
    0%{transform:translate(0,0) scale(1) rotate(0);}
    20%{transform:translate(-2px,1px) scale(1.02) rotate(-1deg);}
    40%{transform:translate(2px,-1px) scale(1.03) rotate(1deg);}
    60%{transform:translate(-3px,1px) scale(1.05) rotate(-1.5deg);}
    78%{transform:translate(3px,-2px) scale(1.07) rotate(1.5deg);}
    90%{transform:translate(-2px,1px) scale(1.06) rotate(-1deg);}
    100%{transform:translate(0,-4px) scale(1.1) rotate(0);}
  }
  /* burst: the chest snaps bigger then blows apart into light */
  body.phase-opening .chest-photo img{ animation:photoBurst .72s 1.5s cubic-bezier(.2,.8,.3,1) forwards; }
  @keyframes photoBurst { 0%{transform:scale(1);opacity:1;} 22%{transform:scale(1.26) translateY(-6px);opacity:1;} 100%{transform:scale(1.7) translateY(-14px);opacity:0;} }
  /* the rarity glow swells then flares out with the burst */
  body.phase-opening .chest-photo::before{ animation:glowCharge 1.55s ease-in forwards, glowFlare .8s 1.5s ease-out forwards; }
  @keyframes glowCharge { 0%{opacity:.55;transform:scale(.96);} 100%{opacity:1;transform:scale(1.2);} }
  @keyframes glowFlare { 0%{opacity:1;transform:scale(1.2);} 30%{opacity:1;transform:scale(1.7);} 100%{opacity:0;transform:scale(2.4);} }
  @media (prefers-reduced-motion: reduce){ .chest-photo,.chest-photo img,.chest-photo::before{ animation:none!important; } }
  /* light beam that shoots up out of the open lid */
  .beam { position:absolute; left:50%; top:18%; width:54px; height:0; transform:translateX(-50%);
          background:linear-gradient(180deg, transparent, color-mix(in srgb, var(--rar) 80%, white) 30%, var(--rar)); z-index:2;
          filter:blur(2px); opacity:0; border-radius:40px; }
  body.phase-opening .beam{ animation:beamUp .7s 1.6s ease-out forwards; }
  @keyframes beamUp { 0%{height:0;opacity:0;} 40%{height:240px;opacity:.9;} 100%{height:180px;opacity:0;} }

  /* particle burst */
  .particles { position:absolute; left:50%; top:46%; width:0; height:0; z-index:4; pointer-events:none; }
  .pt { position:absolute; left:0; top:0; width:6px; height:6px; border-radius:50%; opacity:0; }
  body.phase-opening .pt{ animation:burst 1.1s 1.6s cubic-bezier(.15,.7,.3,1) forwards; }
  @keyframes burst { 0%{opacity:0; transform:translate(0,0) scale(.4);} 14%{opacity:1;} 100%{opacity:0; transform:translate(var(--tx),var(--ty)) scale(1);} }

  /* "tap to open" prompt */
  .tap { display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:10px;
         opacity:0; animation:rise .6s .35s cubic-bezier(.2,.8,.2,1) forwards; }
  .tap .tt { font-size:15px; font-weight:800; letter-spacing:0.02em; }
  .tap .ts { font-size:12px; color:var(--muted); }
  .tap .hand { width:30px; height:30px; color:var(--rar); margin-top:2px; animation:tapBob 1.4s ease-in-out infinite; }
  @keyframes tapBob { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(5px); } }
  body.phase-opening .tap, body.phase-reveal .tap{ display:none; }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }
  @media (prefers-reduced-motion: reduce){ .tap .hand{ animation:none; } }

  /* ── REVEAL ── */
  .reveal { display:none; flex-direction:column; align-items:center; width:100%; }
  body.phase-reveal .reveal{ display:flex; }
  body.phase-reveal .stage{ justify-content:flex-start; padding-top:6px; }

  .pull-banner { font-size:12px; font-weight:900; letter-spacing:0.24em; text-transform:uppercase; color:var(--rar);
                 text-shadow:0 0 16px var(--rarA); margin:4px 0 2px; opacity:0; }
  body.phase-reveal .pull-banner.on{ animation:rise .6s .05s cubic-bezier(.2,.8,.2,1) forwards; }
  .reveal-eyebrow { font-size:11px; font-weight:800; letter-spacing:0.22em; text-transform:uppercase; color:var(--accent); margin:2px 0 16px;
                    opacity:0; animation:rise .5s .1s cubic-bezier(.2,.8,.2,1) forwards; }

  .reveals { display:flex; flex-direction:column; gap:11px; width:100%; max-width:300px; }
  .rv { display:flex; align-items:center; gap:13px; padding:13px 15px; border-radius:16px; text-align:left;
        background:linear-gradient(120deg, color-mix(in srgb, var(--rc, #fff) 10%, rgba(255,255,255,0.02)), rgba(255,255,255,0.02));
        border:1px solid color-mix(in srgb, var(--rc, var(--border)) 45%, transparent);
        box-shadow:0 0 22px -8px var(--rc, transparent);
        opacity:0; transform:translateY(18px) scale(.95); }
  .rv.show { animation:rvIn .5s cubic-bezier(.2,.9,.3,1.3) forwards; }
  @keyframes rvIn { to { opacity:1; transform:translateY(0) scale(1); } }
  .rv .rvi { width:42px; height:42px; flex:none; border-radius:13px; display:flex; align-items:center; justify-content:center;
             background:color-mix(in srgb, var(--rc,#fff) 16%, transparent); border:1px solid color-mix(in srgb, var(--rc,var(--border)) 55%, transparent); }
  .rv .rvi svg{ width:23px; height:23px; color:var(--rc,#fff); }
  .rv .rvb { flex:1; min-width:0; }
  .rv .rvname { font-size:15px; font-weight:800; letter-spacing:-0.01em; }
  .rv .rvr { font-size:9px; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; color:var(--rc,var(--muted)); margin-top:3px; }
  /* hero (the actual item) — taller, glowing ring, star */
  .rv.hi { padding:16px 15px; background:linear-gradient(120deg, color-mix(in srgb, var(--rc,#fff) 16%, rgba(255,255,255,0.02)), rgba(255,255,255,0.02));
           box-shadow:0 0 34px -6px var(--rc); }
  .rv.hi .rvi{ width:50px; height:50px; }
  .rv.hi .rvi svg{ width:27px; height:27px; }
  .rv.hi .rvname{ font-size:17px; }
  .rv.hi .rvname::after{ content:""; }
  .rv.hi .added{ display:inline-flex; align-items:center; gap:4px; font-size:9px; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; color:var(--good); margin-top:5px; }
  .rv.hi .added svg{ width:11px; height:11px; }

  /* primary buttons — same family as the rest of the app */
  .cta-wrap { width:100%; }
  .btn { display:flex; align-items:center; justify-content:center; gap:9px; width:100%; padding:18px 24px; border:none;
         border-radius:999px; font-family:inherit; font-size:17px; font-weight:800; letter-spacing:-0.32px; color:#fff; cursor:pointer;
         text-decoration:none; background:var(--accent); background-size:160% 160%;
         box-shadow:0 14px 36px rgba(10,132,255,0.35), 0 1px 0 rgba(255,255,255,0.18) inset;
         transition:transform .12s cubic-bezier(0.4,0,0.2,1), filter .2s; -webkit-tap-highlight-color:transparent; }
  .btn:hover{ filter:brightness(1.08); }
  .btn:active{ transform:scale(0.985); }
  .btn:focus-visible{ outline:2px solid #fff; outline-offset:3px; }
  .btn svg{ width:18px; height:18px; }
  /* the open button glows in the chest's rarity colour */
  .btn.open { color:#fff; background:var(--accent);
              box-shadow:0 14px 36px color-mix(in srgb, var(--rar) 40%, transparent), 0 1px 0 rgba(255,255,255,0.18) inset; text-shadow:0 1px 2px rgba(0,0,0,0.4); }
  .btn.equipped-done{ color:var(--good); background:rgba(10,132,255,0.14); border:1px solid rgba(10,132,255,0.4); box-shadow:none; text-shadow:none; cursor:default; }
  body.phase-opening .open-cta{ opacity:0; pointer-events:none; transition:opacity .3s; }
  body.phase-reveal .open-cta{ display:none; }
  .open-cta{ opacity:0; transform:translateY(10px); animation:rise .6s .45s cubic-bezier(.2,.8,.2,1) forwards; }

  .reveal-cta { width:100%; margin-top:20px; display:none; }
  body.phase-reveal .reveal-cta{ display:block; opacity:0; transform:translateY(10px); animation:rise .6s cubic-bezier(.2,.8,.2,1) forwards; }
  .nextsub { display:block; text-align:center; margin-top:11px; font-size:12px; font-weight:600; color:var(--muted); }
  .nextsub b{ color:var(--accent); font-weight:700; }
</style>

<body class="phase-ready">
  <div class="phone">
    <div class="bg"></div>
    <div class="cone"></div>
    <div class="stars" id="stars"></div>
    <div class="notch"></div>
    <div class="flash"></div>

    <div class="frame">
      <div class="topbar">
        <div class="brand"><span class="dot"></span><span class="wm">CORE</span></div>
        <div style="display:flex;align-items:center;gap:9px">
          <button class="close" data-sfx-toggle type="button"></button>
          <a class="close" id="closeBtn" href="20-dashboard.html" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </a>
        </div>
      </div>

      <div class="stage">
        <span class="chest-tag" id="chestTag"><span class="rdot"></span><span id="chestTagName">Chest</span></span>

        <div class="chest-area" id="chestArea">
          <div class="halo"></div>
          <div class="rays"></div>
          <div class="beam"></div>
          <div class="particles" id="particles"></div>
          <svg class="chest-svg" viewBox="0 0 160 150" fill="none" aria-label="Reward chest">
            <defs>
              <linearGradient id="cBody" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#252c3e"/><stop offset="1" stop-color="#0d111b"/></linearGradient>
              <linearGradient id="cLid"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2e3650"/><stop offset="1" stop-color="#161b2a"/></linearGradient>
            </defs>
            <!-- interior glow (revealed as lid lifts) -->
            <rect class="chest-inner" x="34" y="58" width="92" height="24" rx="6" fill="var(--rar)"/>
            <!-- body -->
            <rect x="26" y="64" width="108" height="66" rx="16" fill="url(#cBody)" stroke="color-mix(in srgb, var(--rar) 30%, rgba(150,180,240,0.18))" stroke-width="1.5"/>
            <rect x="70" y="64" width="20" height="66" fill="rgba(255,255,255,0.05)"/>
            <!-- lid -->
            <g class="chest-lid">
              <path d="M26 78 V58 a24 24 0 0 1 24 -24 h60 a24 24 0 0 1 24 24 V78 a8 8 0 0 1 -8 8 H34 a8 8 0 0 1 -8 -8 Z"
                    fill="url(#cLid)" stroke="color-mix(in srgb, var(--rar) 32%, rgba(150,180,240,0.2))" stroke-width="1.5"/>
              <rect x="34" y="74" width="92" height="6" rx="3" fill="var(--rar)" opacity="0.9"/>
              <!-- latch -->
              <rect x="70" y="68" width="20" height="22" rx="6" fill="#11151f" stroke="color-mix(in srgb, var(--rar) 45%, rgba(150,180,240,0.3))" stroke-width="1.5"/>
              <circle cx="80" cy="79" r="3.4" fill="var(--rar)"/>
            </g>
          </svg>
          <div class="chest-photo" id="chestPhoto" hidden><img id="chestImg" alt="" /></div>
        </div>

        <div class="tap" id="tapPrompt">
          <span class="tt">Tap to Open</span>
          <span class="ts" id="tapSub">Your reward is waiting</span>
          <svg class="hand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 11V5.5a1.5 1.5 0 0 1 3 0V11M12 11V4.5a1.5 1.5 0 0 1 3 0V11M15 11V6.5a1.5 1.5 0 0 1 3 0V14a6 6 0 0 1-6 6h-2.2a5 5 0 0 1-3.5-1.5L4 15.5a1.6 1.6 0 0 1 2.3-2.3L9 15.5V8a1.5 1.5 0 0 1 3 0"/>
          </svg>
        </div>

        <!-- ── REVEAL ── -->
        <div class="reveal" id="reveal">
          <div class="pull-banner" id="pullBanner"></div>
          <div class="reveal-eyebrow">Rewards Unlocked</div>
          <div class="reveals" id="reveals"></div>
        </div>
      </div>

      <!-- OPEN trigger -->
      <div class="cta-wrap open-cta" id="openCta">
        <button class="btn open" id="openBtn" type="button">
          OPEN CHEST
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>

      <!-- CONTINUE -->
      <div class="cta-wrap reveal-cta" id="revealCta">
        <button class="btn open" id="equipBtn" type="button" style="display:none; margin-bottom:11px;">
          EQUIP NOW
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l7 3v5c0 4.5-3 7.6-7 9-4-1.4-7-4.5-7-9V6l7-3Z"/><path d="M9 12l2 2 4-4.5"/></svg>
        </button>
        <a class="btn" id="continueBtn" href="20-dashboard.html">
          CONTINUE
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
        <span class="nextsub" id="nextSub">Added to your <b>Inventory</b>.</span>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>

  <script src="_lib/core-sfx.js"></script>
  <script src="_lib/core-state.js"></script>
  <script>
  (function(){
    var S = window.coreState, body = document.body;
    var qs = function(s){ return document.querySelector(s); };
    var REDUCED = false; try{ REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}
    function SFX(name){ try{ if(typeof window.coreSfx==='function') window.coreSfx(name); }catch(e){} }
    function startOfToday(){ var d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
    function hexA(hex,a){ var h=String(hex).replace('#',''); if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; var n=parseInt(h,16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }

    // ── star field ──────────────────────────────────────────────────────────
    (function stars(){
      var host=document.getElementById('stars'); if(!host) return; var frag=document.createDocumentFragment();
      for(var i=0;i<12;i++){ var d=document.createElement('span'); d.className='star';
        var sz=(i%7===0)?2.2:(i%3===0)?1.6:1.0; d.style.width=sz+'px'; d.style.height=sz+'px';
        d.style.left=((i*37)%100)+'%'; d.style.top=((i*53)%100)+'%';
        d.style.setProperty('--d',(3+(i%5))+'s'); d.style.setProperty('--del',((i%9)*0.4)+'s');
        if(i%11===0) d.style.boxShadow='0 0 6px rgba(150,195,255,0.8)'; frag.appendChild(d); }
      host.appendChild(frag);
    })();

    // ── particle burst geometry (colours set per-pull at open time) ───────────
    var PARTS=[];
    (function particles(){
      var host=document.getElementById('particles'); if(!host) return; var frag=document.createDocumentFragment();
      for(var i=0;i<40;i++){ var p=document.createElement('span'); p.className='pt';
        var ang=(Math.PI*2)*(i/40)+(Math.random()*0.4), dist=70+Math.random()*120;
        p.style.setProperty('--tx', Math.cos(ang)*dist+'px');
        p.style.setProperty('--ty', (Math.sin(ang)*dist-30)+'px');
        var sz=3+Math.random()*8; p.style.width=sz+'px'; p.style.height=sz+'px';
        frag.appendChild(p); PARTS.push(p); }
      host.appendChild(frag);
    })();

    // ── resolve which chest this is (from Shop / Dashboard / Rank entry) ───────
    var params = new URLSearchParams(location.search);
    var from   = params.get('from') || 'dashboard';
    var source = params.get('source') || (from==='shop' ? 'shop' : 'daily');
    var chestId = params.get('chest') || '';                  // shop item id, e.g. chest_rare
    var rarityParam = (params.get('rarity')||'').toLowerCase();
    var noUp = params.get('noup')==='1';

    var CHEST_META = {
      chest_common:   { rar:'common',    name:'Common Chest' },
      chest_rare:     { rar:'rare',      name:'Rare Chest' },
      chest_epic:     { rar:'epic',      name:'Epic Chest' },
      chest_legendary:{ rar:'legendary', name:'Legendary Chest' },
      chest_mythic:   { rar:'mythic',    name:'Mythic Chest' }
    };
    var meta = CHEST_META[chestId] || null;
    var floorRar = meta ? meta.rar : (rarityParam || 'common');
    var chestName = meta ? meta.name
                  : (source==='daily' ? 'Daily Chest'
                  : (floorRar.charAt(0).toUpperCase()+floorRar.slice(1)+' Chest'));
    var BACK = { shop:'27-shop.html', dashboard:'20-dashboard.html', profile:'23-profile.html', ranks:'24-ranks.html', inventory:'22-inventory.html' };
    var backHref = BACK[from] || '20-dashboard.html';

    qs('#closeBtn').href = backHref;
    qs('#continueBtn').href = backHref;
    qs('#nextSub').innerHTML = from==='shop'
      ? 'Added to your <b>Inventory</b>. Back to the Shop.'
      : 'Added to your <b>Inventory</b>.';

    // Each chest tier wears its own rarity colour (shared ladder with the rest of
    // the app) so a Legendary chest reads gold, a Mythic one rose, etc.
    var RARCOL = { common:'#9AA1B7', rare:'#0A84FF', epic:'#9F8FFF', legendary:'#FFC857', mythic:'#FF6B7E' };
    function paintRarity(rar){
      var c = RARCOL[String(rar||'').toLowerCase()] || '#0A84FF';
      body.style.setProperty('--rar', c);
      body.style.setProperty('--rarA', hexA(c, 0.5));
      return c;
    }
    paintRarity(floorRar);
    qs('#chestTagName').textContent = chestName;

    // Use the photographic chest art when we have it for this tier (mythic falls
    // back to the inline SVG chest, tinted rose). Keeps the lid SVG as a safety net.
    (function setChestArt(){
      var ART = { common:1, rare:1, epic:1, legendary:1, mythic:1 };   // assets/chests/*-cut.png we ship
      var key = String(floorRar||'common').toLowerCase();
      var photo = qs('#chestPhoto'), img = qs('#chestImg'), svg = qs('.chest-svg');
      if (ART[key]) {
        img.onload = function(){ photo.hidden = false; if (svg) svg.style.display = 'none'; };
        img.onerror = function(){ photo.hidden = true; if (svg) svg.style.display = ''; };
        img.src = 'assets/chests/' + key + '-cut.png';
      }
    })();

    // ── reveal one reward card at a time — the dopamine beat ───────────────────
    // Mythic-pull celebration — same flash+confetti language as a boss win.
    function mythicFlash(){
      var phone=document.querySelector('.phone'); if(!phone) return;
      var fl=document.createElement('div');
      fl.style.cssText='position:absolute;inset:0;z-index:95;pointer-events:none;background:radial-gradient(60% 45% at 50% 42%,rgba(10,132,255,0.45),rgba(10,132,255,0.18) 45%,transparent 72%)';
      phone.appendChild(fl);
      if(REDUCED){ setTimeout(function(){ fl.remove(); },500); return; }
      fl.animate([{opacity:0},{opacity:1,offset:.15},{opacity:0}],{duration:950,easing:'ease-out'}).onfinish=function(){ fl.remove(); };
      var cols=['#FF6B7E','#FFC857','#F8FAFE','#9F8FFF','#FF6B7E'];
      for(var i=0;i<30;i++){ (function(){ var c=document.createElement('span'),col=cols[i%cols.length];
        c.style.cssText='position:absolute;left:50%;top:40%;width:8px;height:8px;border-radius:2px;z-index:96;pointer-events:none;background:'+col+';box-shadow:0 0 8px '+col;
        phone.appendChild(c);
        var a=(Math.PI*2)*(i/30)+Math.random()*0.4, d=100+Math.random()*150, dx=Math.cos(a)*d, dy=Math.sin(a)*d-30, rot=Math.random()*720-360;
        c.animate([{transform:'translate(0,0) rotate(0) scale(1)',opacity:1},{transform:'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg) scale(.4)',opacity:0}],{duration:1000+Math.random()*500,easing:'cubic-bezier(.15,.7,.3,1)'}).onfinish=function(){ c.remove(); };
      })(); }
    }
    function showReveals(roll){
      if(roll && roll.rar==='mythic') mythicFlash();
      var host = qs('#reveals'); host.innerHTML='';
      var nodes = roll.reveals.map(function(r){
        var rc = RARCOL[String(r.r||'').toLowerCase()] || (r.hi ? '#0A84FF' : '#9AA1B7');
        var el = document.createElement('div');
        el.className = 'rv'+(r.hi?' hi':'');
        el.style.setProperty('--rc', rc);
        // Currency drops read as a reward type, not a rarity word ("Reward" not "Common").
        var CURLBL = { xp:'Experience', coins:'Coins', shards:'Shards', tickets:'Tickets' };
        var sub = CURLBL[r.kind] || (r.r.charAt(0).toUpperCase()+r.r.slice(1));
        el.innerHTML =
          '<div class="rvi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">'+r.ic+'</svg></div>'+
          '<div class="rvb"><div class="rvname">'+r.n+'</div><div class="rvr">'+sub+
          (r.hi ? '</div><div class="added"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4 4 10-11"/></svg>Added to Inventory</div>'
                : '</div>')+
          '</div>';
        host.appendChild(el);
        return el;
      });
      // pop them in sequentially
      if(REDUCED){ nodes.forEach(function(n){ n.classList.add('show'); }); return; }
      nodes.forEach(function(n,i){
        setTimeout(function(){
          n.classList.add('show');
          var hero = n.classList.contains('hi');
          SFX(hero ? (roll.tier>=3 ? 'rare_drop' : 'reward_pop_hero') : 'reward_pop');
        }, 260 + i*420);
      });
    }

    // ── grant + consume exactly once ──────────────────────────────────────────
    var granted = false, grantedItem = null;
    function bankRewards(roll){
      if(granted) return; granted = true;
      try{ if(S.grantChest) grantedItem = S.grantChest(roll, source); }catch(e){}
      // consume the chest so the Shop / Dashboard won't offer it again
      if(source==='daily'){
        try{ localStorage.setItem('coreDashChestDay', String(startOfToday())); }catch(e){}
      } else if(source==='shopfree'){
        // Shop's 8h free chest — start its cooldown (mirrors FREE_COOLDOWN_MS)
        try{ localStorage.setItem('coreFreeChestNextAt', String(Date.now()+8*60*60*1000)); }catch(e){}
      } else if(source==='rank'){
        // rank-up reward chest — mark this rank's chest claimed so it can't re-grant
        var ri = params.get('rank');
        if(ri!=null){ try{ localStorage.setItem('coreRankChestClaimed_'+ri, '1'); }catch(e){} }
      } else if(chestId){
        try{
          var owned = JSON.parse(localStorage.getItem('coreOwnedChests')||'[]'); if(!Array.isArray(owned)) owned=[];
          var idx = owned.indexOf(chestId); if(idx>=0){ owned.splice(idx,1); localStorage.setItem('coreOwnedChests', JSON.stringify(owned)); }
        }catch(e){}
      }
    }

    // ── quick-equip the won item straight from the reveal ─────────────────────
    function setupEquip(roll){
      var btn = qs('#equipBtn'); if(!btn) return;
      var slot = roll && roll.item && roll.item.slot;   // frame / aura / badge — common 'item' has none
      if(!slot || !grantedItem || !S.equipItem){ btn.style.display='none'; return; }
      btn.style.display='';
      btn.onclick = function(){
        if(btn.dataset.done==='1') return;
        try{ S.equipItem(grantedItem.id, slot); }catch(e){}
        SFX('equip'); S.syncProgress && S.syncProgress();
        btn.dataset.done='1'; btn.classList.add('equipped-done');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12l4 4 10-11"/></svg> EQUIPPED';
      };
    }

    // ── the opening cinematic ─────────────────────────────────────────────────
    var opening = false;
    function open(){
      if(opening) return; opening = true;
      var roll = (S && S.rollChest) ? S.rollChest(floorRar, noUp) : null;
      if(!roll){ // safety: no engine -> just go back
        bankRewards(roll); location.href = backHref; return;
      }
      var rarePull = roll.tier >= 3;                       // legendary / mythic
      var pullColor = paintRarity(roll.rar);               // chest may have rolled UP — recolour to the pull
      // tint the burst particles to the pull colour
      PARTS.forEach(function(p){ p.style.background = 'radial-gradient(circle, #ffffff, '+pullColor+')'; p.style.boxShadow='0 0 8px '+pullColor; });

      // pull banner for big drops
      var pb = qs('#pullBanner');
      if(rarePull){ pb.textContent = (roll.rar==='mythic' ? 'MYTHIC PULL' : 'LEGENDARY PULL'); pb.classList.add('on'); }
      else { pb.textContent=''; pb.classList.remove('on'); }

      body.className = 'phase-opening' + (rarePull ? ' rare-pull' : '');

      // bank the rewards as soon as the chest commits to opening (survives an early exit)
      bankRewards(roll);
      setupEquip(roll);

      if(REDUCED){
        body.className = 'phase-reveal' + (rarePull ? ' rare-pull' : '');
        showReveals(roll); return;
      }

      // sound beats matched to the CSS keyframe timings
      SFX('chest_shake');
      setTimeout(function(){ SFX('chest_leak'); }, 850);
      setTimeout(function(){ SFX(rarePull ? 'chest_burst_rare' : 'chest_burst'); }, 1550);

      // after the burst, swap to the reveal layout and pop rewards in one by one
      setTimeout(function(){
        body.className = 'phase-reveal' + (rarePull ? ' rare-pull' : '');
        SFX('chest_open');
        showReveals(roll);
      }, rarePull ? 2350 : 2100);
    }

    qs('#openBtn').addEventListener('click', open);
    // tapping the chest itself opens it too (FIFA-pack feel)
    qs('#chestArea').addEventListener('click', function(){ if(body.classList.contains('phase-ready')) open(); });
    // deep-link: ?auto=1 opens immediately (e.g. a "your chest is ready" notification tap)
    if(params.get('auto')==='1'){ setTimeout(open, 400); }
  })();
  </script>
</body>
</html>
