<meta charset="utf-8"/>
<title>CORE — Community</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<style>
:root {
  --bg-base:#02020A;--bg-card:rgba(255,255,255,0.035);--bg-card-2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--text:#F8FAFE;--muted:#9AA1B7;--dim:#4F5570;
  --blue:#0A84FF;--purple:#9F8FFF;--green:#34D399;--gold:#FFC857;
  --ch:#0A84FF;--ch-rgb:10,132,255;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0A0A14;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
  color:var(--text);-webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}

/* ── Phone frame ── */
.phone{position:relative;width:390px;height:844px;background:var(--bg-base);border-radius:56px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:60;}

/* ── Ambient ── */
#ambBg{position:absolute;inset:0;z-index:0;
  background:radial-gradient(60% 35% at 50% 30%,rgba(10,132,255,0.14) 0%,transparent 55%),
    radial-gradient(50% 30% at 50% 100%,rgba(255,255,255,0.04) 0%,transparent 65%),
    linear-gradient(180deg,#070713 0%,#02020A 50%,#050510 100%);}
#ambAurora{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.32;mix-blend-mode:screen;}
#ambAurora::before,#ambAurora::after{content:"";position:absolute;border-radius:50%;filter:blur(40px);will-change:transform,opacity;transform:translateZ(0);}
#ambAurora::before{width:80%;height:45%;left:-10%;top:8%;background:radial-gradient(circle,rgba(10,132,255,0.40),transparent 70%);animation:auroraDriftA 24s ease-in-out infinite;}
#ambAurora::after{width:70%;height:40%;right:-10%;bottom:16%;background:radial-gradient(circle,rgba(255,255,255,0.10),transparent 70%);animation:auroraDriftB 30s ease-in-out -15s infinite;}
@keyframes auroraDriftA{0%,100%{transform:translate(0,0) scale(1);opacity:.45;}50%{transform:translate(40px,-22px) scale(1.12);opacity:.75;}}
@keyframes auroraDriftB{0%,100%{transform:translate(0,0) scale(1);opacity:.40;}50%{transform:translate(-30px,18px) scale(1.10);opacity:.70;}}
#ambStars{position:absolute;inset:-2%;pointer-events:none;z-index:2;}
#ambCelestial{position:absolute;inset:0;pointer-events:none;z-index:3;}
#ambOverlay{position:absolute;inset:0;pointer-events:none;z-index:4;}
@media(prefers-reduced-motion:reduce){#ambAurora::before,#ambAurora::after{animation:none!important;}}

/* ── Frame layout ── */
.frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding-top:54px;}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 20px 8px;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;}
.brand .dot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 10px var(--blue);}
.brand .wm{font-size:12px;font-weight:800;letter-spacing:0.34em;}
.ch-label{display:flex;align-items:center;gap:6px;}
.ch-label-icon{font-size:16px;line-height:1;transition:color .25s;display:inline-flex;color:var(--ch);}
.ch-label-icon svg{width:1em;height:1em;}
.ch-label-name{font-size:15px;font-weight:800;letter-spacing:-.01em;transition:color .25s;color:var(--ch);}
.ch-online{font-size:10px;font-weight:600;color:var(--dim);margin-left:2px;}

/* ── Channel switcher ── */
.ch-switcher-wrap{flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.05);}
.ch-switcher{display:flex;gap:7px;padding:8px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.ch-switcher::-webkit-scrollbar{display:none;}
.ch-pill{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;
  border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;color:var(--muted);}
.ch-pill .pill-icon{font-size:13px;line-height:1;display:inline-flex;}
.ch-pill .pill-icon svg{width:1em;height:1em;}
.ch-pill.active{color:var(--ch);border-color:var(--ch);background:rgba(var(--ch-rgb),.13);
  box-shadow:0 0 10px rgba(var(--ch-rgb),.18);}
.ch-pill .pill-dot{width:5px;height:5px;border-radius:50%;background:var(--ch);margin-left:2px;display:none;}
.ch-pill.has-unread .pill-dot{display:block;}

/* ── Moderation banner ── */
.mod-banner{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;
  background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;
  font-size:11px;color:var(--muted);}
.mod-banner.hidden{display:none;}
.mod-link{color:var(--ch);text-decoration:none;font-weight:700;}
.mod-dismiss{background:none;border:none;font:inherit;color:var(--dim);cursor:pointer;
  font-size:13px;padding:0 2px;line-height:1;transition:color .15s;display:inline-flex;align-items:center;}
.mod-dismiss svg{width:14px;height:14px;}
.mod-dismiss:hover{color:var(--text);}

/* ── Message area ── */
.msg-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.msg-area::-webkit-scrollbar{display:none;}
.msg-list{display:flex;flex-direction:column;padding:10px 0 6px;}

/* ── Messages ── */
.msg{display:flex;gap:9px;padding:6px 14px;position:relative;transition:background .15s;}
.msg:hover{background:rgba(255,255,255,0.015);}
.msg.mine{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;flex:none;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-top:2px;}
.msg-body{display:flex;flex-direction:column;max-width:75%;}
.msg.mine .msg-body{align-items:flex-end;}
.msg-meta{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap;}
.msg.mine .msg-meta{flex-direction:row-reverse;}
.msg-name{font-size:11px;font-weight:700;color:var(--text);}
.msg.mine .msg-name{color:var(--ch);}
.msg-rank{font-size:9px;font-weight:800;padding:2px 6px;border-radius:999px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);}
.msg-stat{font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px;
  background:rgba(var(--ch-rgb),.1);border:1px solid rgba(var(--ch-rgb),.22);color:var(--ch);}
.msg-time{font-size:9.5px;color:var(--dim);margin-left:auto;white-space:nowrap;}
.msg.mine .msg-time{margin-left:0;margin-right:auto;}
.msg-more{background:none;border:none;font:inherit;color:var(--dim);cursor:pointer;
  font-size:14px;padding:0 3px;line-height:1;opacity:0;transition:opacity .15s;margin-left:2px;display:inline-flex;align-items:center;}
.msg-more svg{width:16px;height:16px;}
.msg:hover .msg-more{opacity:1;}
.msg-bubble{border-radius:16px 16px 16px 4px;padding:8px 12px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.msg.mine .msg-bubble{border-radius:16px 16px 4px 16px;
  background:rgba(var(--ch-rgb),.12);border-color:rgba(var(--ch-rgb),.28);}
.msg-text{font-size:13px;line-height:1.45;color:var(--text);}
.msg-footer{display:flex;align-items:center;gap:8px;margin-top:4px;}
.msg.mine .msg-footer{justify-content:flex-end;}
.msg-reactions{font-size:10px;color:var(--muted);display:inline-flex;align-items:center;gap:4px;}
.msg-reactions svg{width:12px;height:12px;color:var(--muted);}
.msg.reported .msg-bubble{opacity:0.45;}
.msg.reported::after{content:'Reported';position:absolute;top:10px;right:14px;
  font-size:9px;font-weight:700;color:var(--dim);background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);padding:2px 7px;border-radius:999px;}
.msg.mine.reported::after{right:auto;left:14px;}

/* ── Empty state ── */
.msg-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:40px 24px;text-align:center;gap:12px;}
.msg-empty-icon{font-size:40px;line-height:1;opacity:.5;display:inline-flex;color:var(--ch);}
.msg-empty-icon svg{width:1em;height:1em;}
.msg-empty-title{font-size:15px;font-weight:700;color:var(--text);}
.msg-empty-sub{font-size:12px;color:var(--muted);line-height:1.5;}

/* ── Composer ── */
.composer-wrap{flex-shrink:0;padding:8px 14px 6px;
  background:rgba(3,3,14,0.4);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.07);}
.composer{display:flex;align-items:center;gap:9px;}
.composer-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);
  border-radius:22px;padding:10px 16px;font:inherit;font-size:13px;color:var(--text);
  outline:none;transition:border-color .2s;}
.composer-input::placeholder{color:var(--dim);}
.composer-input:focus{border-color:rgba(var(--ch-rgb),.45);}
.composer-send{width:38px;height:38px;flex:none;border:none;border-radius:50%;cursor:pointer;
  background:var(--ch);display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .2s,background .25s;
  box-shadow:0 4px 14px rgba(var(--ch-rgb),.35);}
.composer-send:active{transform:scale(.92);}
.composer-send svg{width:16px;height:16px;color:#fff;}
.word-warn{font-size:11px;color:#FF6B6B;padding:4px 4px 0;min-height:0;transition:all .2s;overflow:hidden;}
.word-warn:empty{padding:0;}

/* ── Nav ── */
.nav{flex-shrink:0;
  padding:10px 12px 26px;
  display:flex;justify-content:space-around;align-items:flex-end;
  background:rgba(3,3,14,0.42);
  backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);
  border-top:1px solid rgba(255,255,255,0.07);}
.nav a{background:none;border:none;font:inherit;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;
  min-width:48px;text-decoration:none;color:var(--dim);transition:color .2s;}
.nav svg{width:23px;height:23px;}
.nl{font-size:10px;font-weight:800;}
.nav a.active{color:var(--text);}
.nav a.active svg{color:var(--ch);filter:drop-shadow(0 0 8px rgba(var(--ch-rgb),.75));transition:color .25s,filter .25s;}
.nav a.active::before{content:"";position:absolute;top:-2px;width:5px;height:5px;
  border-radius:50%;background:var(--ch);box-shadow:0 0 8px var(--ch);transition:background .25s,box-shadow .25s;}

/* ── Context menu ── */
.ctx-menu{position:absolute;z-index:80;
  background:rgba(14,14,28,0.97);border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;padding:6px;min-width:140px;
  box-shadow:0 16px 40px rgba(0,0,0,.6);display:none;}
.ctx-menu.show{display:block;}
.ctx-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;
  font:inherit;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;
  padding:10px 12px;border-radius:9px;transition:background .12s;}
.ctx-btn:hover{background:rgba(255,255,255,.06);}
.ctx-btn svg{width:16px;height:16px;flex:none;}
.ctx-btn.ctx-danger{color:#FF6B6B;}
.ctx-btn.ctx-cancel{color:var(--muted);border-top:1px solid rgba(255,255,255,.06);margin-top:4px;padding-top:12px;}

/* ── Toast ── */
.toast{position:absolute;left:50%;bottom:110px;transform:translateX(-50%) translateY(14px);z-index:90;
  background:rgba(20,22,34,.96);border:1px solid var(--border);border-radius:14px;padding:11px 16px;
  font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.3s;
  box-shadow:0 12px 30px rgba(0,0,0,.5);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Message enter animation ── */
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.msg{animation:msgIn .22s cubic-bezier(.2,.8,.2,1);}
@media(prefers-reduced-motion:reduce){.msg{animation:none;}.ch-pill,.composer-send,.composer-input{transition:none!important;}}
</style>

  /* ── Load / save ── */
  function loadMsgs() {
    var base = {};
    CHANNELS.forEach(function(ch) { base[ch.id] = (SEEDS[ch.id] || []).map(function(m){ return Object.assign({},m); }); });
    try {
      var saved = JSON.parse(localStorage.getItem('coreCommunity.v1') || '{}');
      CHANNELS.forEach(function(ch) {
        var userMsgs = saved[ch.id] || [];
        if (!Array.isArray(userMsgs)) return;
        var ids = new Set(base[ch.id].map(function(m){ return m.id; }));
        userMsgs.forEach(function(m){ if (m && !ids.has(m.id)) base[ch.id].push(m); });
        base[ch.id].sort(function(a,b){ return a.ts - b.ts; });
      });
    } catch(e) {}
    return base;
  }

  function saveMsgs() {
    var toSave = {};
    CHANNELS.forEach(function(ch) {
      toSave[ch.id] = msgs[ch.id].filter(function(m){ return m.mine; });
    });
    try { localStorage.setItem('coreCommunity.v1', JSON.stringify(toSave)); } catch(e) {}
  }

  /* ── Helpers ── */
  function formatTime(ts) {
    var diff = Date.now() - ts;
    var min = Math.floor(diff / 60000);
    if (min < 1) return 'now';
    if (min < 60) return min + 'm ago';
    var hr = Math.floor(min / 60);
    if (hr < 24) return hr + 'h ago';
    var d = new Date(ts);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2800);
  }

  function hasBanned(text) {

    var frag = document.createDocumentFragment();
    chMsgs.forEach(function(msg) {
      var isMine = !!msg.mine;

    if (ww) ww.textContent = '';

    var newMsg = {
      id: 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      user: ME.name,
      rank: ME.rankName,
      text: text,
      ts: Date.now(),
      mine: true,
      reactions: 0,
    };

    msgs[activeChannelId] = msgs[activeChannelId] || [];
    msgs[activeChannelId].push(newMsg);
    saveMsgs();

    inp.value = '';

    // Append single message to DOM (faster than full re-render)
    var list = document.getElementById('msgList');
    var area = document.getElementById('msgArea');

    var empty = list ? list.querySelector('.msg-empty') : null;
    if (empty) list.innerHTML = '';

    appendMessage(list, newMsg, ch);
    if (area) { requestAnimationFrame(function(){ area.scrollTop = area.scrollHeight; }); }
  }

    if (ctxMenu) ctxMenu.classList.remove('show');
    ctxTargetId = null;
  }

  function reportMsg(id) {
    if (!id) return;
    reported.add(id);
    saveReported();
    var el = document.querySelector('.msg[data-id="' + id + '"]');
    if (el) el.classList.add('reported');
    showToast('Reported — thanks for keeping CORE safe');
    closeCtx();
  }

  document.addEventListener('click', function(e) {
    var moreBtn = e.target.closest('.msg-more');
    if (moreBtn) { e.stopPropagation(); openCtx(moreBtn.dataset.msgId, moreBtn); return; }
    if (ctxMenu && !ctxMenu.contains(e.target)) closeCtx();
  });

  var ctxReport = document.getElementById('ctxReport');
  var ctxFlag = document.getElementById('ctxFlag');
  var ctxCancel = document.getElementById('ctxCancel');
  if (ctxReport) ctxReport.addEventListener('click', function(){ reportMsg(ctxTargetId); });
  if (ctxFlag) ctxFlag.addEventListener('click', function(){ reportMsg(ctxTargetId); });
  if (ctxCancel) ctxCancel.addEventListener('click', closeCtx);

  /* ── Composer wiring ── */
  var composerSend = document.getElementById('composerSend');
  var composerInput = document.getElementById('composerInput');
  var wordWarn = document.getElementById('wordWarn');

  if (composerSend) composerSend.addEventListener('click', sendMessage);
  if (composerInput) {
    composerInput.addEventListener('keydown', function(e){
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    composerInput.addEventListener('input', function(){
      if (wordWarn && wordWarn.textContent && !hasBanned(composerInput.value)) {
        wordWarn.textContent = '';
      }
    });
  }

  /* ── Moderation banner ── */
  var BANNER_KEY = 'coreCommBannerDismissed';
  var modBanner = document.getElementById('modBanner');
  var modDismiss = document.getElementById('modDismiss');

  if (localStorage.getItem(BANNER_KEY) === '1' && modBanner) {
    modBanner.classList.add('hidden');
  }
  if (modDismiss) {
    modDismiss.addEventListener('click', function(){
      if (modBanner) modBanner.classList.add('hidden');
      try { localStorage.setItem(BANNER_KEY, '1'); } catch(e) {}
    });
  }

  /* ── Init ── */
  msgs = loadMsgs();
  reported = loadReported();

  // Mark existing reported messages
  CHANNELS.forEach(function(ch) {
    msgs[ch.id].forEach(function(m) {
      if (reported.has(m.id)) m.isReported = true;
    });
  });

  renderSwitcher();
  applyTheme(CHANNELS[0]);
  renderMessages('general');

  // Init ambient
  if (window.dashAmbient) { window.dashAmbient.init(); }

})();
</script>
</body>
</html>
