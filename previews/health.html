<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#07071A">
<title>Health · CORE</title>
<link rel="stylesheet" href="_lib/stat-kit.css">
<style>
  html,body{margin:0;min-height:100%;background:#050510;}
  body{overflow-x:hidden;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;}
</style>
</head>
<body>
<div id="app"></div>
<script src="_lib/core-state.js"></script>
<script src="_lib/stat-kit.js"></script>
<script>
StatKit.mount(document.getElementById('app'), {
  key: 'health', model: 'lungs', name: 'Health', sub: 'Lungs', color: '#34D399',
  greet: 'Recover and recharge.',
  states: [{ min: 80, label: 'Vital' }, { min: 60, label: 'Healthy' }, { min: 35, label: 'Run-down' }, { min: 0, label: 'Depleted' }],
  actions: [
    { id: 'water', name: 'Water', unit: 'glasses', step: 1, def: 1, gain: 2, icon: '<path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11z"/>' },
    { id: 'sleep', name: 'Sleep', unit: 'hrs', step: 1, def: 8, gain: 4, icon: '<path d="M20 14a8 8 0 1 1-9-9 7 7 0 0 0 9 9z"/>' },
    { id: 'steps', name: 'Steps', unit: 'steps', step: 1000, def: 8000, gain: 3, icon: '<path d="M7 13c-1-3-1.2-6 .8-7s3.2 1 3.2 4 .8 5-.2 6-3 0-3.8-3z"/><path d="M14.5 20c0-2 1-3 2.2-3s2 1 2 2-1 2-2.2 2-2 0-2-1z"/>' },
    { id: 'meal', name: 'Clean meal', unit: 'meals', step: 1, def: 1, gain: 3, icon: '<path d="M5 3v8M5 11a2 2 0 0 0 2-2V3M9 3v18M16 3c-1.5 0-3 2-3 5s1.5 4 3 4v9"/>' }
  ],
  scan: { label: 'Water Counter', unit: 'glasses', act: 'water' }
});
</script>
</body>
</html>
