<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
  <meta charset="utf-8" />
  <title>CORE — Quests</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
<style>
  :root {
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.022); --bg-card-2:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.07); --border-hi:rgba(255,255,255,0.14);
    --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
    --accent:#0A84FF; --grad-a:#0A84FF; --grad-b:#0A84FF; --grad-c:#0A84FF;
    --good:#0A84FF; --gold:#9AA1B7; --coin:#9AA1B7; --coin2:#C7CDDC; --bad:#9AA1B7;
    --r-common:#9AA1B7; --r-uncommon:#9AA1B7; --r-rare:#0A84FF; --r-epic:#9AA1B7; --r-legendary:#9AA1B7; --r-mythic:#9AA1B7;
    --apple-font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter",sans-serif;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center;
    font-family:var(--apple-font); color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:60; }

  .bg { position:absolute; inset:0; z-index:0; background:
      radial-gradient(60% 35% at 50% 6%, rgba(10,132,255,0.14) 0%, transparent 65%),
      radial-gradient(60% 35% at 50% 96%, rgba(10,132,255,0.07) 0%, transparent 65%),
      linear-gradient(180deg, #060a18 0%, #02020A 55%, #050510 100%); }
  .aurora { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.22; mix-blend-mode:screen; }
  .aurora::before, .aurora::after { content:""; position:absolute; border-radius:50%; filter:blur(70px); animation:auroraDrift 22s ease-in-out infinite; }
  .aurora::before { width:70%; height:40%; left:-10%; top:4%; background:radial-gradient(circle, rgba(10,132,255,0.20), transparent 65%); }
  .aurora::after { width:60%; height:35%; right:-8%; bottom:12%; background:radial-gradient(circle, rgba(10,132,255,0.12), transparent 65%); animation-delay:-11s; }
  @keyframes auroraDrift { 0%,100%{transform:translate(0,0) scale(1);opacity:0.4;} 50%{transform:translate(18px,-14px) scale(1.06);opacity:0.62;} }
  .stars { position:absolute; inset:-2%; pointer-events:none; z-index:2; }
  .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,4s) ease-in-out var(--del,0s) infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.14;transform:scale(0.7);} 50%{opacity:0.75;transform:scale(1.1);} }
  @media (prefers-reduced-motion: reduce){ .aurora::before,.aurora::after,.star,.orb i,.orb .core,.xpfill,.shine,.coach::after,.mainq::before,.quest.r-mythic::before,.qbtn.claim,.rwd-chest.shake,.rwd-chest .glow,.rwd-row.in,.rwd-done,.msg.typing i{animation:none!important;} .rwd-row.in,.rwd-done{opacity:1!important;transform:none!important;} }

  .frame { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:52px 0 0; }
  .scroll { flex:1; overflow-y:auto; overflow-x:hidden; padding:6px 16px 108px; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar { display:none; }

  .topbar{ position:relative; display:flex; align-items:center; justify-content:space-between; padding:2px 18px 6px; }
  .topbar .ttl{ position:absolute; left:50%; transform:translateX(-50%); font-size:13px; font-weight:800; letter-spacing:.2em; text-transform:uppercase; }
  .chip{ display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 12px; border-radius:999px; font-size:13px; font-weight:900; }
  .chip svg{ width:15px; height:15px; }
  .chip.coin{ background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--coin2); } .chip.coin svg{ color:var(--coin); }
  .chip.xp{ background:rgba(10,132,255,0.12); border:1px solid rgba(10,132,255,0.3); color:#bcd4ff; } .chip.xp svg{ color:var(--accent); }
  .chip.mute{ background:none; border:none; color:var(--muted); cursor:pointer; padding:0 6px; height:34px; } .chip.mute svg{ color:var(--muted); width:17px; height:17px; }
  .topgrp{ display:inline-flex; align-items:center; gap:6px; }

  .intro{ padding:6px 2px 0; }
  .intro .kick{ font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .intro h1{ margin:4px 0 0; font-size:27px; font-weight:900; letter-spacing:-0.02em; }

  /* CORE COACH */
  .coach{ position:relative; margin-top:14px; border-radius:24px; padding:18px 16px 16px; overflow:hidden;
    background:transparent;
    border:none; box-shadow:none; }
  .coach::after{ content:""; position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,0.012) 3px 4px); mix-blend-mode:overlay; opacity:.5; }
  .coachtop{ display:flex; align-items:center; gap:13px; position:relative; z-index:2; }
  .orb{ position:relative; width:58px; height:58px; flex:none; }
  .orb .core{ position:absolute; inset:14px; border-radius:50%; background:radial-gradient(circle at 38% 32%, #cfe2ff, var(--accent) 46%, #0a4fa8 78%); box-shadow:0 0 18px rgba(10,132,255,0.7), inset 0 0 10px rgba(255,255,255,0.4); animation:orbpulse 3s ease-in-out infinite; }
  @keyframes orbpulse{ 0%,100%{transform:scale(.92); filter:brightness(1);} 50%{transform:scale(1.05); filter:brightness(1.2);} }
  .orb i{ position:absolute; inset:0; border-radius:50%; border:1.5px solid rgba(120,170,255,0.5); }
  .orb i:nth-child(2){ inset:3px; border-color:rgba(120,170,255,0.28); border-style:dashed; animation:orbspin 8s linear infinite; }
  .orb i:nth-child(3){ inset:-3px; border-color:rgba(120,170,255,0.18); animation:orbspin 14s linear reverse infinite; }
  @keyframes orbspin{ to{ transform:rotate(360deg); } }
  .coachtop .ci{ flex:1; min-width:0; }
  .coachtop .cn{ font-size:9.5px; font-weight:900; letter-spacing:.18em; text-transform:uppercase; color:#8fb6ff; display:flex; align-items:center; gap:6px; }
  .coachtop .cn .live{ width:6px; height:6px; border-radius:50%; background:var(--good); box-shadow:0 0 8px var(--good); animation:blink 2s ease-in-out infinite; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.4;} }
  .coachtop .cg{ font-size:15px; font-weight:800; margin-top:4px; line-height:1.32; }
  .coachtop .cg b{ color:#bcd4ff; }
  .coachmeta{ display:flex; gap:8px; margin-top:13px; position:relative; z-index:2; }
  .cm{ flex:1; border-radius:13px; padding:9px 10px; background:rgba(0,0,0,0.26); border:1px solid var(--border); }
  .cm .k{ font-size:8.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:#7B8398; }
  .cm .v{ font-size:15px; font-weight:900; margin-top:3px; } .cm .v small{ font-size:10px; color:var(--muted); font-weight:700; }
  .coachactions{ display:flex; gap:8px; margin-top:13px; position:relative; z-index:2; }
  .ca{ border:none; font:inherit; cursor:pointer; border-radius:13px; padding:12px; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:7px; transition:filter .2s, transform .12s; }
  .ca:active{ transform:scale(.97); } .ca svg{ width:15px; height:15px; }
  .ca.talk{ flex:1; color:#fff; background:var(--accent); box-shadow:0 8px 20px rgba(10,132,255,.34); }
  .ca.gen{ flex:none; padding:12px 14px; color:#bcd4ff; background:rgba(10,132,255,0.12); border:1px solid rgba(10,132,255,0.3); }
  .qchips{ display:flex; gap:7px; overflow-x:auto; margin-top:11px; padding-bottom:2px; position:relative; z-index:2; } .qchips::-webkit-scrollbar{display:none;}
  .qc{ flex:none; border:none; font:inherit; cursor:pointer; font-size:11.5px; font-weight:800; color:var(--muted); padding:7px 12px; min-height:44px; border-radius:999px; background:rgba(255,255,255,0.05); border:1px solid var(--border); white-space:nowrap; display:inline-flex; align-items:center; gap:6px; }
  .qc:active{ transform:scale(.96); } .qc svg{ width:12px; height:12px; color:var(--accent); }

  .sec{ margin-top:24px; }
  .sechd{ display:flex; align-items:center; justify-content:space-between; margin:0 2px 11px; }
  .sechd .l{ display:flex; align-items:center; gap:9px; }
  .sechd .l svg{ width:17px; height:17px; color:var(--accent); }
  .sechd h2{ margin:0; font-size:16px; font-weight:900; letter-spacing:-0.01em; }
  .sechd .ct{ font-size:11px; font-weight:800; color:#7B8398; }
  .sechd .more{ font-size:11.5px; font-weight:800; color:var(--accent); background:none; border:none; cursor:pointer; font-family:inherit; min-height:44px; padding:0 6px; margin-right:-6px; display:inline-flex; align-items:center; }

  .mainq{ position:relative; border-radius:22px; padding:17px 16px; overflow:hidden;
    background:transparent;
    border:none; box-shadow:none; }
  .mainq::before{ content:""; position:absolute; top:-40%; left:-30%; width:50%; height:180%; transform:rotate(20deg); background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); animation:shine 7s ease-in-out infinite; pointer-events:none; }
  @keyframes shine{ 0%,100%{transform:translateX(0) rotate(20deg);} 55%{transform:translateX(330px) rotate(20deg);} }
  .mainq .mtag{ display:inline-flex; align-items:center; gap:6px; font-size:9.5px; font-weight:900; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); position:relative; z-index:1; }
  .mainq .mtag svg{ width:13px; height:13px; }
  .mainq .mt{ font-size:21px; font-weight:900; letter-spacing:-0.02em; margin-top:8px; position:relative; z-index:1; }
  .mainq .mwhy{ font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; position:relative; z-index:1; }
  .mainq .mbar{ height:9px; border-radius:999px; background:rgba(0,0,0,0.4); overflow:hidden; margin-top:14px; position:relative; z-index:1; }
  .mainq .mfill{ height:100%; border-radius:999px; background:var(--accent); box-shadow:none; transition:width .6s cubic-bezier(.2,.8,.2,1); }
  .mainq .mprog{ display:flex; align-items:center; justify-content:space-between; margin-top:8px; font-size:11px; font-weight:800; color:var(--muted); position:relative; z-index:1; }
  .mainq .mprog b{ color:var(--gold); }
  .mainq .mile{ display:flex; gap:7px; margin-top:13px; position:relative; z-index:1; }
  .mainq .ms{ flex:1; border-radius:11px; padding:9px 8px; background:rgba(0,0,0,0.26); border:1px solid var(--border); text-align:center; }
  .mainq .ms.done{ border-color:rgba(10,132,255,0.4); background:rgba(10,132,255,0.08); }
  .mainq .ms .mn{ font-size:9px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--dim); }
  .mainq .ms.done .mn{ color:var(--good); }
  .mainq .ms .mv{ font-size:11px; font-weight:800; margin-top:4px; }
  .mainq .mrew{ display:flex; align-items:center; gap:9px; margin-top:13px; padding-top:12px; border-top:1px solid var(--border); position:relative; z-index:1; font-size:11.5px; font-weight:800; color:var(--muted); }
  .mainq .mrew .rwd{ display:inline-flex; align-items:center; gap:5px; color:var(--gold); } .mainq .mrew svg{ width:13px; height:13px; }

  .qgrid{ display:flex; flex-direction:column; gap:11px; }
  .quest{ position:relative; border-radius:18px; padding:15px 15px 14px; overflow:hidden;
    background:transparent; border:none; transition:border-color .2s, box-shadow .3s, transform .15s; }
  .quest.r-uncommon{ border-color:color-mix(in srgb,var(--r-uncommon) 32%,transparent); box-shadow:0 0 20px -12px var(--r-uncommon); }
  .quest.r-rare{ border-color:color-mix(in srgb,var(--r-rare) 36%,transparent); box-shadow:0 0 20px -11px var(--r-rare); }
  .quest.r-epic{ border-color:color-mix(in srgb,var(--r-epic) 40%,transparent); box-shadow:0 0 22px -10px var(--r-epic); }
  .quest.r-legendary{ border-color:color-mix(in srgb,var(--r-legendary) 46%,transparent); box-shadow:0 0 26px -8px var(--r-legendary); }
  .quest.r-mythic{ border-color:color-mix(in srgb,var(--r-mythic) 52%,transparent); box-shadow:0 0 28px -6px var(--r-mythic); }
  .quest.r-mythic::before{ content:""; position:absolute; inset:0; border-radius:18px; padding:1px; pointer-events:none; z-index:1;
    background:linear-gradient(120deg,var(--r-mythic),transparent,var(--r-epic),transparent,var(--r-mythic)); background-size:300% 300%;
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; animation:mythShift 4s linear infinite; }
  @keyframes mythShift{ to{ background-position:300% 0; } }
  .quest.done{ opacity:.62; }
  .quest.claimed{ border-color:rgba(10,132,255,0.4); background:linear-gradient(160deg, rgba(10,132,255,0.06), rgba(255,255,255,0.012)); opacity:.9; }
  .quest.boss{ background:linear-gradient(160deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)); }
  .qhead{ display:flex; align-items:flex-start; gap:11px; position:relative; z-index:2; }
  .qicon{ width:40px; height:40px; flex:none; border-radius:12px; display:flex; align-items:center; justify-content:center; background:color-mix(in srgb,var(--rc,#4A8FFF) 16%,transparent); border:1px solid color-mix(in srgb,var(--rc,#4A8FFF) 34%,transparent); }
  .qicon svg{ width:21px; height:21px; color:var(--rc,#4A8FFF); }
  .qmid{ flex:1; min-width:0; }
  .qtitle{ font-size:14.5px; font-weight:800; line-height:1.2; }
  .qtags{ display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
  .tg{ font-size:8.5px; font-weight:900; letter-spacing:.05em; text-transform:uppercase; padding:3px 7px; border-radius:999px; display:inline-flex; align-items:center; gap:4px; }
  .tg.rar{ color:var(--rc); border:1px solid color-mix(in srgb,var(--rc) 45%,transparent); } .tg.rar .rd{ width:5px; height:5px; border-radius:50%; background:currentColor; }
  .tg.meta{ color:var(--muted); background:rgba(0,0,0,0.26); border:1px solid var(--border); } .tg.meta svg{ width:9px; height:9px; }
  .tg.proof{ color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); } .tg.proof svg{ width:9px; height:9px; }
  .tg.stat{ color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); } .tg.stat svg{ width:10px; height:10px; }
  .tg.diff{ color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); }
  .tg.diff.easy{ background:rgba(255,255,255,0.05); }
  .tg.diff.med{ background:rgba(255,255,255,0.05); color:var(--muted); }
  .tg.diff.hard{ background:rgba(255,255,255,0.05); color:var(--muted); }
  .qdesc{ font-size:12px; color:var(--muted); margin-top:9px; line-height:1.42; position:relative; z-index:2; }
  .qwhy{ display:flex; gap:8px; margin-top:10px; padding:9px 10px; border-radius:11px; background:rgba(10,132,255,0.07); border:1px solid rgba(10,132,255,0.16); position:relative; z-index:2; }
  .qwhy .wi{ width:15px; height:15px; flex:none; color:#8fb6ff; margin-top:1px; } .qwhy .wi svg{ width:100%; height:100%; }
  .qwhy .wt{ font-size:11px; color:#cfe0ff; line-height:1.4; } .qwhy .wt b{ color:#8fb6ff; font-weight:800; }
  .qprog{ margin-top:11px; position:relative; z-index:2; }
  .qprog .pl{ display:flex; align-items:center; justify-content:space-between; font-size:10px; font-weight:800; color:#7B8398; margin-bottom:5px; }
  .qprog .pb{ height:6px; border-radius:999px; background:rgba(0,0,0,0.4); overflow:hidden; } .qprog .pf{ height:100%; border-radius:999px; background:var(--accent); box-shadow:none; }
  .qfoot{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:13px; position:relative; z-index:2; }
  .qrew{ display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .rw{ display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:900; }
  .rw svg{ width:13px; height:13px; }
  .rw.xp{ color:#bcd4ff; } .rw.xp svg{ color:var(--accent); }
  .rw.coin{ color:var(--coin2); } .rw.coin svg{ color:var(--coin); }
  .rw.item{ color:var(--r-epic); } .rw.chest{ color:var(--gold); }
  .qbtn{ border:none; font:inherit; cursor:pointer; font-weight:800; border-radius:12px; padding:10px 15px; font-size:12.5px; display:inline-flex; align-items:center; gap:6px; transition:filter .2s, transform .12s; white-space:nowrap; }
  .qbtn:active{ transform:scale(.96); } .qbtn svg{ width:14px; height:14px; }
  .qbtn.go{ color:#fff; background:var(--accent); box-shadow:0 6px 16px rgba(10,132,255,.34); }
  .qbtn.boss{ color:#fff; background:var(--accent); box-shadow:0 6px 16px rgba(10,132,255,.34); }
  .qbtn.claim{ color:#fff; background:var(--accent); box-shadow:0 6px 16px rgba(10,132,255,.34); animation:claimpulse 1.6s ease-in-out infinite; }
  @keyframes claimpulse{ 0%,100%{box-shadow:0 6px 16px rgba(10,132,255,.34);} 50%{box-shadow:0 6px 22px rgba(10,132,255,.6);} }
  .qbtn.done{ color:var(--accent); background:rgba(10,132,255,0.12); cursor:default; }
  .qcoach{ display:flex; gap:8px; margin-top:11px; padding:9px 10px; border-radius:11px; background:rgba(255,255,255,0.03); border:1px solid var(--border); position:relative; z-index:2; }
  .qcoach .qo{ width:20px; height:20px; flex:none; border-radius:50%; background:radial-gradient(circle at 38% 32%, #cfe2ff, var(--accent) 60%); box-shadow:0 0 8px rgba(10,132,255,0.6); }
  .qcoach .qm{ font-size:10.5px; color:var(--muted); line-height:1.4; font-style:italic; }

  /* today progress + claim-all (master-prompt additions) */
  .todaybar{ margin:0 2px 12px; }
  .todaybar .tbtop{ display:flex; align-items:center; justify-content:space-between; font-size:11px; font-weight:800; color:var(--muted); margin-bottom:6px; }
  .todaybar .tbtop b{ color:#bcd4ff; font-variant-numeric:tabular-nums; }
  .todaybar .tbtrack{ height:7px; border-radius:999px; background:rgba(0,0,0,.42); overflow:hidden; }
  .todaybar .tbfill{ height:100%; border-radius:999px; background:var(--accent); box-shadow:none; transition:width .55s cubic-bezier(.2,.8,.2,1); }
  .claimall{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin:0 0 12px; min-height:44px; border:none; cursor:pointer; font:inherit; font-size:13.5px; font-weight:800; color:#fff; padding:12px; border-radius:13px; background:var(--accent); box-shadow:0 6px 16px rgba(10,132,255,.34); animation:claimpulse 1.6s ease-in-out infinite; transition:transform .12s; }
  .claimall:active{ transform:scale(.98); } .claimall svg{ width:15px; height:15px; }
  @media (prefers-reduced-motion: reduce){ .claimall{ animation:none!important; } .todaybar .tbfill{ transition:none!important; } }

  .chain{ border-radius:18px; padding:14px 15px; background:transparent; border:none; }
  .chain .chd{ display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:900; }
  .chain .chd svg{ width:15px; height:15px; color:var(--muted); }
  .chain .csteps{ display:flex; align-items:center; gap:4px; margin-top:12px; }
  .chain .cstep{ flex:1; text-align:center; }
  .chain .cdot{ width:30px; height:30px; margin:0 auto; border-radius:10px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:var(--dim); }
  .chain .cdot svg{ width:15px; height:15px; }
  .chain .cstep.done .cdot{ background:rgba(10,132,255,0.14); border-color:rgba(10,132,255,0.4); color:var(--accent); }
  .chain .cln{ font-size:9px; font-weight:800; color:var(--muted); margin-top:5px; }
  .chain .carrow{ flex:0 0 12px; color:var(--dim); }
  .chain .crew{ margin-top:13px; font-size:11px; font-weight:800; color:var(--muted); display:flex; align-items:center; gap:6px; padding-top:11px; border-top:1px solid var(--border); }
  .chain .crew svg{ width:13px; height:13px; }
