<!doctype html>
<html lang="en" data-font="apple">
<head>
<meta charset="utf-8" />
<title>CORE — Review your answers</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<link rel="stylesheet" href="_lib/core-responsive.css?v=20260619d">
<style>
  :root {
    --bg-base:#08090C; --text:#fff; --muted:rgba(255,255,255,.72);
    --dim:rgba(255,255,255,.45); --accent:#AEB6C4; --accent-hi:#C4C9D2;
    --border:rgba(255,255,255,.08); --bg-card:rgba(255,255,255,.022);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    min-height:100vh;background:#000;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;overflow-y:auto;
  }
  .phone{
    position:relative;width:min(390px,92vw);height:min(844px,96vh);max-height:844px;
    background:var(--bg-base);border-radius:56px;overflow-y:auto;overflow-x:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,.85),0 0 0 10px #060608,0 0 0 11px #1b1b22;
    padding:28px 24px 32px;
  }
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:30}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(255,255,255,.55);border-radius:999px;z-index:30}
  
  .kicker{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px}
  .title{font-size:26px;font-weight:700;letter-spacing:-.6px;line-height:1.15;margin-bottom:4px}
  .title .g{color:var(--accent-hi);font-weight:800;text-shadow:0 0 20px rgba(196,201,210,.3)}
  .sub{color:#fff;font-size:13px;line-height:1.5;margin-bottom:24px;text-shadow:0 0 10px rgba(255,255,255,.12)}
  
  .review-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  .review-item{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 16px;border-radius:14px;
    background:var(--bg-card);border:1px solid var(--border);
    cursor:pointer;transition:all .2s ease;
  }
  .review-item:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.14);transform:translateX(2px)}
  .review-item:active{transform:scale(.98)}
  .review-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;min-width:60px}
  .review-value{font-size:14px;color:#fff;font-weight:600;text-align:right;flex:1}
  .review-edit{font-size:10px;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;opacity:0;transition:opacity .2s}
  .review-item:hover .review-edit{opacity:1}
  
  .cta{
    width:100%;padding:16px;border-radius:14px;border:none;
    background:var(--accent);color:#1a1409;font-size:15px;font-weight:700;
    letter-spacing:-.2px;cursor:pointer;transition:all .2s ease;
    box-shadow:0 8px 30px rgba(174,182,196,.25);
  }
  .cta:hover{background:var(--accent-hi);transform:translateY(-1px);box-shadow:0 12px 40px rgba(174,182,196,.35)}
  .cta:active{transform:scale(.98)}
  
  .back-link{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--dim);text-decoration:none}
  .back-link:hover{color:#fff}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="kicker">Before we continue</div>
  <h1 class="title">Here's what you <span class="g">told us.</span></h1>
  <p class="sub">Tap any answer to change it — you'll go right back.</p>
  
  <div class="review-list" id="reviewList"></div>
  
  <button class="cta" id="continueBtn">Looks good — let's go</button>
  <a href="07-trial.html" class="back-link">← Back to trial</a>
  <div class="home-indicator"></div>
</div>

<script>
(function(){
  var labels={
    name:'Your name', profile:'Profile', habit:'Tackling',
    duration:'Duration', amount:'Amount per day', why:'Your why',
    promise:'Your promise'
  };
  var list=document.getElementById('reviewList');
  var answers={};
  try{answers=JSON.parse(localStorage.getItem('coreTrialAnswers')||'{}');}catch(e){}
  
  if(Object.keys(answers).length===0){
    list.innerHTML='<div style="color:var(--dim);text-align:center;padding:20px">No answers yet.</div>';
    return;
  }
  
  Object.keys(labels).forEach(function(key){
    var val=answers[key]||'—';
    var item=document.createElement('div');
    item.className='review-item';
    item.innerHTML='<span class="review-label">'+labels[key]+'</span><span class="review-value">'+val+'</span><span class="review-edit">Edit</span>';
    item.addEventListener('click',function(){
      try{localStorage.setItem('coreTrialEditStep',key);}catch(e){}
      window.location.href='07-trial.html?edit='+key;
    });
    list.appendChild(item);
  });
  
  document.getElementById('continueBtn').addEventListener('click',function(){
    try{localStorage.setItem('coreTrialReviewed','1');}catch(e){}
    window.location.href='07-trial.html?reviewed=1';
  });
})();
</script>
</body>
</html>
