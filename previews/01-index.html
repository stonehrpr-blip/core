  <style>
    /* ===============================================================
       CORE — 02-index v9 (Apple system font + cinematic flow)
       Influences:
         - The Lock In: cinematic onboarding, softened transitions,
           typewriter animation, minimal cards
         - Reload: "Reset & Lock In" verb framing, 60-day clarity
         - Apple Health / Apple Music: SF Pro, generous whitespace,
           single dominant CTA, type-driven hero
       Apple system font stack — no web fonts, no Chakra Petch on
       this page. The OS font wins.
       =============================================================== */
    :root {
      --apple-font: -apple-system, BlinkMacSystemFont,
                    "SF Pro Display", "SF Pro Text",
                    "Helvetica Neue", "Helvetica", Arial,
                    "Segoe UI", Roboto, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #0A0A14;
      color: var(--text-primary);
      font-family: var(--apple-font);
      font-feature-settings: "ss01", "cv11", "tnum";
      display: flex; align-items: center; justify-content: center;
      padding: 24px; overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .phone {
      position: relative;
      width: 390px; height: 844px;
      background: var(--bg-page);
      border-radius: 56px;
      overflow: hidden;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.7),
        0 0 0 1px var(--border-subtle),
        0 0 0 10px #0a0a12,
        0 0 0 11px #2b2b38;
    }
    .notch {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 124px; height: 32px; background: var(--bg-page);
      border-radius: 20px; z-index: 30;
    }
    .home-indicator {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px; background: rgba(245,247,251,0.55);
      border-radius: 999px; z-index: 30;
    }

    /* ── Atmosphere ──
       Deep navy → black vertical gradient base.
       Soft blue halo where the hero sits.
       Subtle violet at bottom.
       Dense star field on top. */
    .bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(60% 35% at 50% 30%, rgba(47,143,255,0.18) 0%, transparent 55%),
        radial-gradient(50% 30% at 50% 100%, rgba(159,143,255,0.10) 0%, transparent 65%),
        linear-gradient(180deg, #060B26 0%, #02020A 50%, #050510 100%);
    }
    /* Nebula — slow rotating mesh gradient layer.
       Adds dimensional motion behind the stars without competing for focus. */
    .nebula {
      position: absolute; inset: -25%; z-index: 1;
      background:
        radial-gradient(circle at 25% 30%, rgba(47,143,255,0.30) 0%, transparent 35%),
        radial-gradient(circle at 75% 70%, rgba(159,143,255,0.24) 0%, transparent 38%),
        radial-gradient(circle at 80% 25%, rgba(91,177,255,0.20) 0%, transparent 30%);
      filter: blur(28px);
      opacity: 0.65;
      mix-blend-mode: screen;
      animation: nebulaSpin 80s linear infinite;
      will-change: transform;
      transform: translateZ(0) rotate(0deg);
      pointer-events: none;
    }
    @keyframes nebulaSpin {
      to { transform: translateZ(0) rotate(360deg); }
    }
    /* Aurora ribbon — drifts across the upper field slowly */
    .aurora {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      opacity: 0.45;
      mix-blend-mode: screen;
    }
    .aurora::before, .aurora::after {
      content: ""; position: absolute; border-radius: 50%;
      filter: blur(40px);
      will-change: transform, opacity;
      transform: translateZ(0);
    }
    .aurora::before {
      width: 80%; height: 45%; left: -10%; top: 8%;
      background: radial-gradient(circle, rgba(47,143,255,0.55), transparent 70%);
      animation: auroraDriftA 24s ease-in-out infinite;
    }
    .aurora::after {
      width: 70%; height: 40%; right: -10%; bottom: 16%;
      background: radial-gradient(circle, rgba(159,143,255,0.50), transparent 70%);
      animation: auroraDriftB 30s ease-in-out -15s infinite;
    }
    @keyframes auroraDriftA {
      0%, 100% { transform: translate(0,0) scale(1); opacity: 0.45; }
      50%      { transform: translate(40px,-22px) scale(1.12); opacity: 0.75; }
    }
    @keyframes auroraDriftB {
      0%, 100% { transform: translate(0,0) scale(1); opacity: 0.40; }
      50%      { transform: translate(-30px,18px) scale(1.10); opacity: 0.70; }
    }
    .stars {
      position: absolute; inset: 0; z-index: 3; pointer-events: none;
    }
    /* Floating particles — large soft dots drifting upward slowly */
    .particles {
      position: absolute; inset: 0; z-index: 3; pointer-events: none;
    }
    .particles i {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(91,177,255,0.85), transparent 70%);
      bottom: -10px;
      animation: floatUp var(--d, 14s) linear var(--del, 0s) infinite;
      opacity: 0;
      will-change: transform, opacity;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)    scale(0.6); opacity: 0; }
      15%  { opacity: 0.85; }
      85%  { opacity: 0.85; }
      100% { transform: translateY(-100vh) scale(1.1); opacity: 0; }
    }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--d, 4s) ease-in-out var(--del, 0s) infinite;
    }
    .star.s1 { width: 1px;   height: 1px;   opacity: 0.40; }
    .star.s2 { width: 1.5px; height: 1.5px; opacity: 0.55; }
    .star.s3 { width: 2px;   height: 2px;   opacity: 0.75; box-shadow: 0 0 4px rgba(255,255,255,0.65); }
    .star.s4 { width: 2.5px; height: 2.5px; opacity: 0.90; box-shadow: 0 0 8px rgba(255,255,255,0.80); }
    @keyframes twinkle {
      0%, 100% { opacity: var(--min, 0.12); transform: scale(0.7); }
      50%      { opacity: var(--max, 0.85); transform: scale(1.20); }
    }
    /* Two shooting stars (was 3 — dropped for perf) with angled trails.
       filter: blur was nuked — replaced with soft box-shadow on the trail
       and a glowing head dot. GPU-cheap. */
    .shooting {
      position: absolute;
      width: 160px; height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(180,210,255,0.0) 8%,
        rgba(180,210,255,0.25) 40%,
        rgba(220,235,255,0.65) 75%,
        rgba(255,255,255,0.95) 94%,
        rgba(255,255,255,1) 100%);
      border-radius: 999px;
      box-shadow: 0 0 4px rgba(180,210,255,0.55);
      opacity: 0;
      z-index: 3;
      pointer-events: none;
      will-change: transform, opacity;
      transform-origin: 100% 50%;
    }
    .shooting::after {
      /* Glowing head — sits at the leading edge of the streak */
      content: ""; position: absolute;
      right: -2px; top: 50%;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,255,255,1) 0%,
        rgba(200,225,255,0.9) 35%,
        rgba(91,177,255,0.5) 65%,
        transparent 80%);
      transform: translate(0, -50%);
      box-shadow:
        0 0 8px rgba(255,255,255,0.95),
        0 0 18px rgba(91,177,255,0.65);
    }
    .shooting.s1 { top: 10%; left: -18%; animation: shootA 18s cubic-bezier(0.22, 0.6, 0.36, 1) infinite; }
    .shooting.s2 { top: 24%; left: -18%; animation: shootB 22s cubic-bezier(0.22, 0.6, 0.36, 1) -7s infinite; }
    .shooting.s3 { top: 40%; left: -18%; animation: shootC 28s cubic-bezier(0.22, 0.6, 0.36, 1) -14s infinite; }
    @keyframes shootA {
      0%, 88%  { opacity: 0; transform: rotate(28deg) translate3d(0,0,0); }
      90%      { opacity: 0.6; }
      93%      { opacity: 1; }
      98%      { opacity: 0.5; }
      100%     { opacity: 0; transform: rotate(28deg) translate3d(620px,0,0); }
    }
    @keyframes shootB {
      0%, 86% { opacity: 0; transform: rotate(33deg) translate3d(0,0,0); }
      89%     { opacity: 0.55; }
      92%     { opacity: 1; }
      97%     { opacity: 0.45; }
      100%    { opacity: 0; transform: rotate(33deg) translate3d(680px,0,0); }
    }
    @keyframes shootC {
      0%, 84% { opacity: 0; transform: rotate(24deg) translate3d(0,0,0); }
      87%     { opacity: 0.6; }
      91%     { opacity: 1; }
      97%     { opacity: 0.4; }
      100%    { opacity: 0; transform: rotate(24deg) translate3d(560px,0,0); }
    }

    /* ── Frame ── */
    .frame {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      padding: 60px 28px 36px;
    }

    /* Top bar — brand left, sign-in right */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      opacity: 0; animation: fadeUp 700ms 80ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .brand {
      display: flex; align-items: center; gap: 9px;
      user-select: none;
    }
    .brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--core-blue-500);
      box-shadow: 0 0 12px var(--core-blue-500);
      animation: dotPulse 2.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.25); opacity: 0.85; }
    }
    .brand .wm {
      font-family: var(--apple-font);
      font-size: 13px; font-weight: 600; letter-spacing: 0.30em;
      color: var(--text-primary);
    }
    .signin {
      width: 36px; height: 36px;
      min-width: 36px; min-height: 36px;
      max-width: 36px; max-height: 36px;
      aspect-ratio: 1 / 1;            /* lock circle — defeats any stretch */
      flex: 0 0 36px;
      align-self: center;             /* defeat parent flex stretch */
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
      color: var(--text-primary);
      font-family: inherit;
      transition: background 200ms cubic-bezier(0.4, 0, 0.2, 1), transform 100ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .signin:hover { background: rgba(91,177,255,0.10); border-color: rgba(91,177,255,0.32); }
    .signin:active { transform: scale(0.94); }
    .signin svg {
      width: 16px; height: 16px;
      stroke: var(--text-primary); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Logo mark — Apple About-screen style, above hero ── */
    .logo-mark {
      display: flex; justify-content: center;
      margin-top: 56px;
      opacity: 0;
      animation: logoEnter 1000ms 220ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      position: relative;
    }
    .logo-mark::before {
      /* Halo glow behind logo — pulses */
      content: ""; position: absolute;
      width: 140px; height: 140px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(47,143,255,0.30) 0%, transparent 65%);
      animation: haloPulse 3.5s ease-in-out infinite;
      pointer-events: none; z-index: -1;
    }
    @keyframes haloPulse {
      0%, 100% { opacity: 0.55; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 1.00; transform: translate(-50%, -50%) scale(1.18); }
    }
    .logo-mark img {
      width: 76px; height: 76px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10) inset,
        0 0 36px rgba(47,143,255,0.30),
        0 0 64px rgba(47,143,255,0.16);
      animation: logoFloat 4s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-4px) rotate(1deg); }
    }
    @keyframes logoEnter {
      0%   { opacity: 0; transform: translateY(14px) scale(0.92); }
      60%  { opacity: 1; transform: translateY(-2px) scale(1.04); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Hero — Apple About-screen typography ──
       Display weight, ultra-tight tracking, generous line-height.
       Two lines, gradient on second line. */
    .hero {
      margin-top: 28px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 900ms 450ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .hero .prop {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--core-blue-300);
      margin-bottom: 14px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .hero .prop .pill-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--core-blue-300);
      box-shadow: 0 0 6px var(--core-blue-300);
    }
    .hero h1 {
      font-family: var(--apple-font);
      font-size: 60px; font-weight: 700;
      letter-spacing: -2.6px; line-height: 0.96;
      color: var(--text-primary);
    }
    .hero h1 .g {
      background: var(--grad-wordmark);
      background-size: 200% 200%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradShift 6s ease infinite;
    }
    @keyframes gradShift {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* ── Cinematic typewriter sub-line (Lock In influence) ──
       Types in character by character after hero settles.
       Block-shaped cursor blinks at the end. */
    .sub {
      margin-top: 22px;
      display: flex; justify-content: center; align-items: baseline;
      gap: 2px;
      font-family: var(--apple-font);
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-secondary);
      opacity: 0;
      animation: fadeUp 500ms 1000ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      min-height: 18px;
    }
    .sub .typed { display: inline-block; }
    .sub .cursor {
      display: inline-block;
      width: 6px; height: 12px;
      background: var(--core-blue-300);
      margin-left: 2px;
      animation: blink 0.9s steps(1) infinite;
      transform: translateY(1px);
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* ── CTA — Apple Music-style large pill ──
       Solid gradient, prominent shadow, generous padding.
       Bottom of screen with safe-area cushion. */
    .cta-wrap {
      margin-top: auto;
      opacity: 0;
      animation: fadeUp 900ms 1000ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    /* "Tap anywhere to continue" — text-only cue; whole screen is the CTA */
    .tap-hint {
      display: flex; justify-content: center;
      padding: 10px 0 4px; user-select: none; -webkit-user-select: none; cursor: pointer;
      transition: transform .25s cubic-bezier(0.22,1,0.36,1), opacity .25s;
    }
    /* Premium text — small, refined; slow shine sweep + soft breathing glow */
    .tap-text {
      position: relative;
      font-family: var(--apple-font); font-size: 11.5px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; padding-left: 0.22em;
      background: linear-gradient(100deg, rgba(255,255,255,0.38) 0%, #ffffff 47%, rgba(255,255,255,0.38) 60%, rgba(255,255,255,0.38) 100%);
      background-size: 240% 100%;
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
      animation: tapShine 4.6s ease-in-out infinite, tapGlow 3.4s ease-in-out infinite;
    }
    @keyframes tapShine { 0% { background-position: 120% 0; } 55%,100% { background-position: -25% 0; } }
    @keyframes tapGlow {
      0%,100% { filter: drop-shadow(0 0 5px rgba(122,160,255,0.22)); opacity: 0.82; }
      50%     { filter: drop-shadow(0 0 11px rgba(140,170,255,0.5)); opacity: 1; }
    }
    .tap-hint:active { transform: scale(0.97); }
    .tap-hint.going { opacity: 0; transform: translateY(-6px); }
    @media (prefers-reduced-motion: reduce) {
      .tap-text { animation: none; -webkit-text-fill-color: rgba(255,255,255,0.92); color: rgba(255,255,255,0.92); filter: none; }
    }
    /* ── CTA v10: Brand wordmark gradient ──
       Same 135° cyan→violet→pink gradient as the "your core." text in
       the hero. Visually links hero copy to action. Animated shift so
       the gradient slowly slides — same gradShift used on the wordmark. */
    .cta-shell {
      position: relative;
      width: 100%;
      isolation: isolate;
    }
    /* Breathing aurora halo — sits behind the button, pulses 3s in/out.
       Wider than the pill so glow bleeds beyond the edges and feels
       atmospheric, not just a drop-shadow. */
    .cta-shell::before {
      content: "";
      position: absolute;
      inset: -22px -16px;
      border-radius: var(--radius-pill);
      background: radial-gradient(60% 75% at 50% 50%,
        rgba(0,122,255,0.55) 0%,
        rgba(47,143,255,0.28) 35%,
        rgba(91,177,255,0.10) 60%,
        transparent 78%);
      filter: blur(20px);
      opacity: 0.7;
      z-index: -1;
      pointer-events: none;
      animation: ctaBreath 3s cubic-bezier(0.42, 0, 0.58, 1) 1300ms infinite;
    }
    @keyframes ctaBreath {
      0%, 100% { opacity: 0.55; transform: scale(0.96); }
      50%      { opacity: 1.00; transform: scale(1.06); }
    }
    /* CTA v13 — Apple system blue solid with breathing aurora halo */
    .cta {
      width: 100%;
      padding: 19px 26px;
      border-radius: var(--radius-pill);
      border: none;
      color: #FFFFFF;
      font-family: var(--apple-font);
      font-size: 18px; font-weight: 600;
      letter-spacing: -0.32px;
      /* Apple-style vertical gradient fill for depth */
      background: linear-gradient(180deg, #3A9BFF 0%, #0A84FF 52%, #0067E6 100%);
      display: flex; align-items: center; justify-content: center; gap: 9px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 140ms cubic-bezier(0.22, 1, 0.36, 1),
                  filter 200ms ease, box-shadow 220ms ease;
      box-shadow:
        0 14px 34px rgba(0,122,255,0.45),
        0 3px 8px rgba(0,60,160,0.30),
        0 0 0 1px rgba(255,255,255,0.20) inset,
        0 1.5px 0 rgba(255,255,255,0.55) inset,
        0 -1px 0 rgba(0,0,0,0.18) inset;
    }
    .cta:hover {
      filter: brightness(1.07) saturate(1.05);
      box-shadow:
        0 20px 46px rgba(0,122,255,0.58),
        0 3px 8px rgba(0,60,160,0.32),
        0 0 0 1px rgba(255,255,255,0.24) inset,
        0 1.5px 0 rgba(255,255,255,0.6) inset,
        0 -1px 0 rgba(0,0,0,0.18) inset;
    }
    .cta:active { transform: scale(0.975); filter: brightness(0.95); }
    /* glossy top sheen (clipped by overflow:hidden to the pill) */
    .cta::before {
      content: ""; position: absolute; left: 0; right: 0; top: 0; height: 52%;
      background: linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0) 100%);
      pointer-events: none; z-index: 0;
    }
    /* slow premium light sweep across the button */
    .cta::after {
      content: ""; position: absolute; top: 0; bottom: 0; left: -65%; width: 42%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-18deg); pointer-events: none; z-index: 0;
      animation: ctaSweep 5s ease-in-out 1800ms infinite;
    }
    @keyframes ctaSweep {
      0%   { left: -65%; }
      16%  { left: 135%; }
      100% { left: 135%; }
    }
    .cta-label, .cta-spinner { position: relative; z-index: 1; }
    .cta-arrow {
      position: relative; z-index: 1; font-size: 18px; line-height: 1;
      transition: transform 260ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .cta:hover .cta-arrow { transform: translateX(5px); }
    .cta.loading .cta-arrow { display: none; }
    /* Loading state — spinner replaces label, button disabled */
    .cta-spinner { display: none; }
    .cta.loading { cursor: progress; pointer-events: none; }
    .cta.loading .cta-label { display: none; }
    .cta.loading .cta-spinner {
      display: inline-flex; align-items: center; justify-content: center;
      animation: spin 700ms linear infinite;
    }
    .cta-spinner svg { width: 20px; height: 20px; stroke: #FFFFFF; fill: none; }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    /* Legal line — tiny, below CTA */
    .legal {
      margin: 14px 12px 0;
      font-size: 11px; line-height: 16px;
      color: var(--text-soft);
      text-align: center;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeUp 700ms 1100ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .legal a { color: var(--core-blue-300); text-decoration: none; }
    .legal a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 460px) {
      body { padding: 0; }
      .phone { width: 100vw; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .notch, .home-indicator { display: none; }
    }
    @media (max-width: 380px), (max-height: 720px) {
      .frame { padding: 52px 22px 28px; }
      .logo-mark { margin-top: 40px; }
      .logo-mark img { width: 64px; height: 64px; border-radius: 17px; }
      .hero { margin-top: 22px; }
      .hero h1 { font-size: 46px; letter-spacing: -1.8px; }
      .sub { margin-top: 16px; font-size: 12px; letter-spacing: 0.16em; }
      .cta { padding: 16px 20px; font-size: 15px; }
    }
    @media (max-width: 340px) {
      .hero h1 { font-size: 38px; letter-spacing: -1.5px; }
      .logo-mark img { width: 56px; height: 56px; border-radius: 15px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .star, .shooting, .shooting::after, .brand .dot, .cta, .cta-shell, .cta::after,
      .cta-shell::before, .hero h1 .g,
      .topbar, .logo-mark, .logo-mark img, .hero, .sub, .cta-wrap, .sub .cursor,
      .nebula, .aurora::before, .aurora::after, .particles i, .legal {
        animation: none !important; opacity: 1 !important; transform: none !important;
      }
      .cta::after { display: none !important; }
      /* Hide layers that exist purely as motion */
      .particles, .shooting { display: none !important; }
      .nebula, .aurora { opacity: 0.35 !important; }
    }
  </style>
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body data-font="apple" style='font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, "Segoe UI", Roboto, sans-serif !important;'>
  <div class="phone">
    <div class="bg"></div>
    <div class="nebula" aria-hidden="true"></div>
    <div class="aurora" aria-hidden="true"></div>
    <div class="stars" id="stars"></div>
    <div class="particles" id="particles" aria-hidden="true"></div>
    <div class="shooting s1" aria-hidden="true"></div>
    <div class="shooting s2" aria-hidden="true"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="frame">
      <div class="topbar">
        <div class="brand" aria-label="CORE">
          <span class="dot" aria-hidden="true"></span>
          <span class="wm">CORE</span>
        </div>
        <button class="signin" id="signinBtn" aria-label="Sign in">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 21c0-4 4-7 8-7s8 3 8 7"/>
          </svg>
        </button>
      </div>

      <div class="logo-mark" aria-hidden="true">
        <img src="assets/logo.png" alt="Core" />
      </div>

      <div class="hero">
        <h1>Become<br/><span class="g">your core.</span></h1>
        <div class="sub" id="sub">
          <span class="typed" id="subTyped"></span><span class="cursor" id="subCursor" aria-hidden="true"></span>
        </div>
      </div>

      <div class="cta-wrap">
        <div class="tap-hint" id="tapHint" role="button" tabindex="0" aria-label="Tap anywhere to continue">
          <span class="tap-text">Tap anywhere to continue</span>
        </div>
        <p class="legal">By continuing, you agree to our <a href="82-legal.html#terms">Terms</a> and <a href="82-legal.html#privacy">Privacy Policy</a>.</p>
      </div>
    </div>
  </div>

<script>
  // ── Dense star field — 120 stars, 4 brightness tiers ──
  (function spawnStars() {
    const wrap = document.getElementById('stars');
    if (!wrap) return;
    for (let i = 0; i < 80; i++) {
      const r = Math.random();
      const tier = r < 0.55 ? 's1' : r < 0.82 ? 's2' : r < 0.96 ? 's3' : 's4';
      const s = document.createElement('div');
      s.className = 'star ' + tier;
      s.style.left = (Math.random() * 100) + '%';
      s.style.top  = (Math.random() * 100) + '%';
      s.style.setProperty('--d',   (2.5 + Math.random() * 5) + 's');
      s.style.setProperty('--del', (Math.random() * 5) + 's');
      s.style.setProperty('--min', (0.10 + Math.random() * 0.20).toFixed(2));
      s.style.setProperty('--max', (0.55 + Math.random() * 0.40).toFixed(2));
      wrap.appendChild(s);
    }
  })();

  // ── Floating particles — 14 soft dots drift upward continuously ──
  (function spawnParticles() {
    const wrap = document.getElementById('particles');
    if (!wrap) return;
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('i');
      p.style.left = (Math.random() * 100) + '%';
      p.style.setProperty('--d',   (12 + Math.random() * 10) + 's');
      p.style.setProperty('--del', (Math.random() * 14) + 's');
      // Random small size variation
      const size = 2 + Math.random() * 3;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      wrap.appendChild(p);
    }
  })();

  // ── Cinematic typewriter — cycles through short Apple-style quotes ──
  (function typewriter() {
    const target = document.getElementById('subTyped');
    if (!target) return;
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const QUOTES = [
      'Day one.',
      'Become.',
      'Your move.',
      'Begin again.'
    ];
    let qIdx = 0;
    if (reduce) { target.textContent = QUOTES[0]; return; }

    function typeOut(text, done) {
      let i = 0;
      (function tick() {
        if (i > text.length) { done && done(); return; }
        target.textContent = text.slice(0, i);
        i++;
        setTimeout(tick, 32);  // was 65 — snappier
      })();
    }
    function deleteOut(done) {
      let len = target.textContent.length;
      (function tick() {
        if (len < 0) { done && done(); return; }
        target.textContent = target.textContent.slice(0, len);
        len--;
        setTimeout(tick, 20);  // was 38 — snappier
      })();
    }
    function loop() {
      const next = QUOTES[qIdx];
      typeOut(next, () => {
        setTimeout(() => {
          deleteOut(() => {
            qIdx = (qIdx + 1) % QUOTES.length;
            setTimeout(loop, 180);  // was 250
          });
        }, 1400);  // hold 1.4s, was 2.2s
      });
    }
    setTimeout(loop, 1200);  // was 1700 — start earlier
  })();

  // ── Analytics ──
  function track(name, props) {
    try { if (window.coreTrack) window.coreTrack(name, props || {}); } catch (e) {}
  }
  window.addEventListener('load', function () { track('index_viewed', {}); });

  // ── CTAs ──
  // Loading state for ~450ms so the user gets responsive feedback
  // before the navigation kicks in (matches Apple onboarding feel).
  // Tap anywhere to continue (replaces the Start journey button).
  var _started = false;
  function startJourney() {
    if (_started) return;
    _started = true;
    track('index_cta_tapped', { cta: 'start_trial' });
    try { localStorage.setItem('coreOnboardStartedAt', String(Date.now())); } catch (e) {}
    var hint = document.getElementById('tapHint');
    if (hint) hint.classList.add('going');
    setTimeout(function () { window.location.href = '07-trial.html'; }, 340);
  }
  document.addEventListener('click', function (e) {
    if (e.target.closest('#signinBtn')) return;  // avatar still goes to sign-in
    if (e.target.closest('a')) return;           // legal links open normally
    startJourney();
  });
  // Keyboard affordance for the focusable tap hint
  var _tapHint = document.getElementById('tapHint');
  if (_tapHint) _tapHint.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startJourney(); }
  });
  document.getElementById('signinBtn').addEventListener('click', function () {
    track('index_cta_tapped', { cta: 'sign_in' });
    window.location.href = '04-sign-in.html';
  });

  // ── Owner Easter egg: long-press anywhere (file:// only) → gallery ──
  (function () {
    if (location.protocol !== 'file:') return;
    var timer = null;
    function start() {
      clearTimeout(timer);
      timer = setTimeout(function () {
        try { localStorage.setItem('coreStoneAccess', '1'); } catch (e) {}
        track('index_owner_egg', {});
        window.location.href = '97-gallery.html';
      }, 1500);
    }
    function cancel() { clearTimeout(timer); }
    document.addEventListener('touchstart', start, { passive: true });
    document.addEventListener('mousedown',  start);
    document.addEventListener('touchend',   cancel);
    document.addEventListener('mouseup',    cancel);
    document.addEventListener('touchmove',  cancel, { passive: true });
    document.addEventListener('mouseleave', cancel);
  })();
</script>
