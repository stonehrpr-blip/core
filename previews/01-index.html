  <style>
    /* ===============================================================
       CORE — index v10 · "Quiet System"
       Premium matte-black launch screen.
         - Deep matte black, near-zero gradient
         - Sparse, low-opacity starfield (a quiet universe)
         - White type, monochrome accents, only a whisper of blue glow
         - Logo centered with a soft, restrained halo
       No bright gradients. No galaxy wallpaper. Controlled and elite.
       =============================================================== */
    :root {
      --apple-font: -apple-system, BlinkMacSystemFont,
                    "SF Pro Display", "SF Pro Text",
                    "Helvetica Neue", "Helvetica", Arial,
                    "Segoe UI", Roboto, sans-serif;
      /* Monochrome system — white ink, a single restrained blue glow */
      --ink:        #ffffff;
      --ink-soft:   rgba(255,255,255,0.56);
      --ink-faint:  rgba(255,255,255,0.34);
      --hair:       rgba(255,255,255,0.08);
      --hair-2:     rgba(255,255,255,0.14);
      --glow:       rgba(206,212,222,0.55);   /* subtle blue, highlights only */
      --glow-soft:  rgba(206,212,222,0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body, body[data-font="apple"] {
      min-height: 100vh;
      background: #000 !important;
      color: var(--ink);
      font-family: var(--apple-font);
      font-feature-settings: "ss01", "cv11", "tnum";
      display: flex; align-items: center; justify-content: center;
      padding: 24px; overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .phone {
      position: relative;
      width: 390px; height: 844px;
      background: #000;
      border-radius: 56px;
      overflow: hidden;
      box-shadow:
        0 40px 120px rgba(0,0,0,0.85),
        0 0 0 1px rgba(255,255,255,0.06),
        0 0 0 10px #060608,
        0 0 0 11px #1b1b22;
    }
    .notch {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 124px; height: 32px; background: #000;
      border-radius: 20px; z-index: 30;
    }
    .home-indicator {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px; background: rgba(255,255,255,0.40);
      border-radius: 999px; z-index: 30;
    }

    /* ── Atmosphere ──
       Matte black with a single, almost-invisible cool halo where the
       logo sits, and a soft floor vignette. No nebula, no aurora. */
    .phone[data-bg-skip] { background: #000 !important; }
    /* This splash is a controlled matte-black "Quiet System" — kill the shared
       electric-blue HUD rim + horizon line (core-theme.css .phone::before /
       ::after) that otherwise bleeds a blue outline around the edges. */
    .phone[data-bg-skip]::before,
    .phone[data-bg-skip]::after { display: none !important; }
    .phone[data-bg-skip] .bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        /* cool halo behind the mark */
        radial-gradient(56% 40% at 50% 33%, rgba(206,212,222,0.055) 0%, rgba(255,255,255,0.018) 30%, transparent 62%),
        /* a soft horizon of light rising from the floor — depth */
        radial-gradient(135% 46% at 50% 118%, rgba(206,212,222,0.085) 0%, rgba(206,212,222,0.02) 38%, transparent 64%),
        /* cinematic edge vignette */
        radial-gradient(108% 108% at 50% 46%, transparent 56%, rgba(0,0,0,0.5) 100%),
        #000 !important;
    }
    /* fine film grain — premium matte texture, self-contained SVG noise */
    .phone[data-bg-skip] .bg::after {
      content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      opacity: 0.045; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='150' height='150' filter='url(%23n)'/></svg>");
      background-size: 150px 150px;
    }
    /* Sparse starfield — tiny, low-opacity, slow twinkle. Quiet universe. */
    .stars { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--d, 5s) ease-in-out var(--del, 0s) infinite;
    }
    .star.s1 { width: 1px;   height: 1px;   opacity: 0.22; }
    .star.s2 { width: 1.5px; height: 1.5px; opacity: 0.30; }
    .star.s3 { width: 1.5px; height: 1.5px; opacity: 0.45; box-shadow: 0 0 3px rgba(255,255,255,0.45); }
    .star.s4 { width: 2px;   height: 2px;   opacity: 0.55; box-shadow: 0 0 5px rgba(255,255,255,0.5); }
    @keyframes twinkle {
      0%, 100% { opacity: var(--min, 0.06); transform: scale(0.7); }
      50%      { opacity: var(--max, 0.42); transform: scale(1.08); }
    }

    /* ── Frame ── */
    .frame {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      padding: max(60px, calc(env(safe-area-inset-top, 0px) + 26px))
               max(28px, env(safe-area-inset-right, 0px))
               max(34px, calc(env(safe-area-inset-bottom, 0px) + 18px))
               max(28px, env(safe-area-inset-left, 0px));
    }

    /* Top bar — brand left, sign-in right */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      opacity: 0; animation: fadeUp 700ms 80ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .brand {
      display: flex; align-items: center; gap: 9px;
      user-select: none;
    }
    .brand .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px var(--glow);
      animation: dotPulse 3s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.9; box-shadow: 0 0 7px var(--glow-soft); }
      50%      { opacity: 1; box-shadow: 0 0 12px var(--glow); }
    }
    .brand .wm {
      font-family: var(--apple-font);
      font-size: 13px; font-weight: 600; letter-spacing: 0.34em;
      color: var(--ink);
    }
    /* Sign-in — minimal circle, subtle blue glow on hover */
    .signin {
      width: 38px; height: 38px;
      min-width: 38px; min-height: 38px;
      max-width: 38px; max-height: 38px;
      aspect-ratio: 1 / 1;
      flex: 0 0 38px;
      align-self: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--hair);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
      color: var(--ink);
      font-family: inherit;
      transition: background 220ms cubic-bezier(0.4,0,0.2,1),
                  border-color 220ms ease,
                  box-shadow 260ms ease,
                  transform 120ms cubic-bezier(0.4,0,0.2,1);
    }
    .signin:hover {
      background: rgba(255,255,255,0.06);
      border-color: var(--hair-2);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 0 20px var(--glow-soft);
    }
    .signin:active { transform: scale(0.94); }
    .signin svg {
      width: 17px; height: 17px;
      stroke: var(--ink); fill: none;
      stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Logo mark — centered, clean, softly glowing ── */
    .logo-mark {
      display: flex; justify-content: center;
      margin-top: 64px;
      opacity: 0;
      animation: logoEnter .7s .15s cubic-bezier(0.34,1.56,0.64,1) forwards;
      position: relative;
    }
    .logo-mark::before {
      /* Restrained halo — barely-there cool glow, slow breathing */
      content: ""; position: absolute;
      width: 190px; height: 190px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(206,212,222,0.12) 0%, rgba(255,255,255,0.03) 38%, transparent 66%);
      animation: haloPulse 5s ease-in-out infinite;
      pointer-events: none; z-index: -1;
    }
    @keyframes haloPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }
    }
    /* App icon */
    .logo-img {
      width: 120px; height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 18px 40px rgba(0,0,0,0.6)) drop-shadow(0 0 26px rgba(206,212,222,0.12));
      animation: logoFloat 6s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    @keyframes logoEnter {
      0%   { opacity: 0; transform: translateY(18px) scale(0.88); }
      60%  { opacity: 1; transform: translateY(-4px) scale(1.04); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* ── cinematic "power-on": two rings ripple out from the mark on load ── */
    .power-ring {
      position: absolute; top: 50%; left: 50%;
      width: 124px; height: 124px; margin: -62px 0 0 -62px; border-radius: 50%;
      border: 1.5px solid rgba(206,212,222,0.5); opacity: 0; pointer-events: none; z-index: -1;
    }
    .power-ring.pr1 { animation: powerRing 2.6s cubic-bezier(.16,1,.3,1) .55s forwards; }
    .power-ring.pr2 { animation: powerRing 2.6s cubic-bezier(.16,1,.3,1) .95s forwards; }
    @keyframes powerRing {
      0%   { opacity: 0;    transform: scale(0.55); }
      14%  { opacity: 0.65; }
      100% { opacity: 0;    transform: scale(3.4); border-color: rgba(206,212,222,0); }
    }
    /* ── light sweep across the mark, once, just after it lands ── */
    .logo-shine {
      position: absolute; top: 50%; left: 50%;
      width: 120px; height: 120px; margin: -60px 0 0 -60px; 
      pointer-events: none; overflow: hidden; opacity: 0;
      background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,0.55) 50%, transparent 62%);
      background-size: 260% 100%; mix-blend-mode: screen;
      animation: logoShine 1.5s cubic-bezier(.4,0,.2,1) 1.25s 1;
    }
    @keyframes logoShine {
      0%   { opacity: 0;   background-position: 135% 0; }
      28%  { opacity: 0.9; }
      100% { opacity: 0;   background-position: -35% 0; }
    }
    /* ── occasional shooting star (spawned by JS) — quiet motion ── */
    .shoot { position: absolute; width: 2px; height: 2px; border-radius: 50%;
      background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.9); opacity: 0; z-index: 1; pointer-events: none; }
    .shoot::after { content: ""; position: absolute; right: 1px; top: 50%; width: 56px; height: 1px;
      transform: translateY(-50%); background: linear-gradient(90deg, rgba(255,255,255,0.55), transparent); }
    @keyframes shootFly {
      0%   { opacity: 0;    transform: translate(0,0) rotate(var(--ang)); }
      10%  { opacity: 0.85; }
      100% { opacity: 0;    transform: translate(var(--sx), var(--sy)) rotate(var(--ang)); }
    }
    @media (prefers-reduced-motion: reduce) {
      .power-ring, .logo-shine, .shoot { animation: none !important; opacity: 0 !important; }
    }

    /* ── Hero — clean white display type ── */
    .hero {
      margin-top: 30px;
      text-align: center;
      opacity: 0;
      animation: fadeUp .6s .35s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .hero h1 {
      font-family: var(--apple-font);
      font-size: 60px; font-weight: 700;
      letter-spacing: -2.6px; line-height: 0.96;
      color: var(--ink);
    }
    /* brushed-steel display word with a slow metallic sheen sweeping across */
    .hero h1 .g {
      background: linear-gradient(104deg,
        #c4c9d2 0%, #ffffff 19%, #eaedf2 32%, #c8cdd6 50%,
        #ffffff 70%, #d2d7e0 86%, #c4c9d2 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35)) drop-shadow(0 0 26px rgba(206,212,222,0.22));
      animation: coreSheen 7.5s ease-in-out infinite;
    }
    @keyframes coreSheen {
      0%, 100% { background-position: 118% 0; }
      50%      { background-position: -18% 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .hero h1 .g { animation: none; background-position: 50% 0; }
    }

    /* ── Typewriter sub-line ── */
    .sub {
      margin-top: 22px;
      display: flex; justify-content: center; align-items: baseline;
      gap: 2px;
      font-family: var(--apple-font);
      font-size: 12.5px; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-soft);
      opacity: 0;
      animation: fadeUp 500ms 1000ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      min-height: 18px;
    }
    .sub .typed { display: inline-block; }
    .sub .cursor {
      display: inline-block;
      width: 6px; height: 12px;
      background: #fff;
      box-shadow: 0 0 8px var(--glow);
      margin-left: 2px;
      animation: blink 0.9s steps(1) infinite;
      transform: translateY(1px);
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* ── CTA region — "tap anywhere", refined ── */
    .cta-wrap {
      margin-top: auto;
      opacity: 0;
      animation: fadeUp 900ms 1000ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .tap-hint {
      display: flex; justify-content: center;
      padding: 14px 0 6px; user-select: none; -webkit-user-select: none; cursor: pointer;
      transition: transform .25s cubic-bezier(0.22,1,0.36,1), opacity .25s;
    }
    .tap-hint { position:relative; }
    .tap-hint::before,.tap-hint::after{content:'';position:absolute;left:50%;top:50%;width:100px;height:100px;
      margin:-50px 0 0 -50px;border-radius:50%;border:1px solid rgba(206,212,222,0.18);opacity:0;
      animation:tapRipple 2.4s ease-out infinite;pointer-events:none;}
    .tap-hint::after{animation-delay:1.2s;}
    @keyframes tapRipple{0%{opacity:0.6;transform:scale(0.4);}100%{opacity:0;transform:scale(1.8);}}
    .tap-text {
      position: relative; z-index:1;
      font-family: var(--apple-font); font-size: 11.5px; font-weight: 700; letter-spacing: 0.24em;
      text-transform: uppercase; padding-left: 0.24em;
      background: linear-gradient(100deg, rgba(255,255,255,0.34) 0%, #ffffff 47%, rgba(255,255,255,0.34) 60%, rgba(255,255,255,0.34) 100%);
      background-size: 240% 100%;
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
      animation: tapShine 3s ease-in-out infinite;
    }
    @keyframes tapShine { 0% { background-position: 120% 0; } 55%,100% { background-position: -25% 0; } }
    .tap-hint:hover .tap-text { opacity: 1; }
    .tap-hint:active { transform: scale(0.97); }
    .tap-hint.going { opacity: 0; transform: translateY(-6px); }
    @media (prefers-reduced-motion: reduce) {
      .tap-hint::before,.tap-hint::after{animation:none;display:none;}
      .tap-text { animation: none; -webkit-text-fill-color: rgba(255,255,255,0.92); color: rgba(255,255,255,0.92); filter: none; }
    }

    /* Legal line — tiny, below CTA */
    .legal {
      margin: 14px 12px 0;
      font-size: 11px; line-height: 16px;
      color: var(--ink-faint);
      text-align: center;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeUp 700ms 1100ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .legal a { color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--hair); }
    .legal a:hover { color: #fff; border-bottom-color: var(--hair-2); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes exitBurst { 0%{opacity:1;transform:translate(0,0) scale(1.2);} 100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0);} }

    /* ── Tap-to-enter transition — premium "warp into" the trial ── */
    .leave-veil {
      position: absolute; inset: 0; z-index: 40; pointer-events: none;
      opacity: 0; transform: scale(1.04);
      background: radial-gradient(circle at 50% 42%, rgba(206,212,222,0.14) 0%, rgba(0,0,0,0) 36%, #000 70%);
      transition: opacity .46s ease, transform .46s cubic-bezier(0.4,0,0.2,1);
    }
    .frame { transition: opacity .42s ease, transform .46s cubic-bezier(0.4,0,0.2,1); }
    body.leaving .frame { opacity: 0; transform: scale(1.07); }
    body.leaving .leave-veil { opacity: 1; transform: scale(1); }
    body.leaving .logo-img { transform: scale(1.16); filter: drop-shadow(0 0 44px rgba(206,212,222,0.55)) brightness(1.18); transition: transform .46s cubic-bezier(0.34,1.56,0.4,1), filter .46s ease; }
    /* Layered exit — the words lift away a beat faster than the frame so the
       logo appears to pull the eye "into" the app. */
    body.leaving .topbar,
    body.leaving .hero,
    body.leaving .sub,
    body.leaving .cta-wrap { opacity: 0; transform: translateY(-9px); transition: opacity .28s ease, transform .42s cubic-bezier(0.4,0,0.2,1); }
    body.leaving #stars .star { animation: none; opacity: 0.9 !important; transition: opacity .4s; }
    @media (prefers-reduced-motion: reduce) {
      .leave-veil, .frame, body.leaving .logo-img { transition: opacity .2s ease !important; }
      body.leaving .frame { transform: none; }
      body.leaving .logo-img { transform: none; filter: none; }
      body.leaving .topbar,
      body.leaving .hero,
      body.leaving .sub,
      body.leaving .cta-wrap { transform: none; transition: opacity .2s ease; }
    }

    /* Responsive */
    @media (max-width: 460px) {
      .notch, .home-indicator { display: none; }
    }
    @media (max-width: 380px), (max-height: 720px) {
      .frame { padding: 52px 22px 28px; }
      .logo-mark { margin-top: 46px; }
      .logo-img { width: 104px; height: 104px;  }
      .hero { margin-top: 24px; }
      .hero h1 { font-size: 46px; letter-spacing: -1.8px; }
      .sub { margin-top: 16px; font-size: 12px; letter-spacing: 0.18em; }
    }
    @media (max-width: 340px) {
      .hero h1 { font-size: 38px; letter-spacing: -1.5px; }
      .logo-img { width: 90px; height: 90px;  }
    }

    @media (prefers-reduced-motion: reduce) {
      .star, .brand .dot,
      .topbar, .logo-mark, .logo-img, .hero, .sub, .cta-wrap, .sub .cursor, .legal {
        animation: none !important; opacity: 1 !important; transform: none !important;
      }
    }
  </style>

      </div>

      <div class="logo-mark" aria-hidden="true">
        <span class="power-ring pr1"></span>
        <span class="power-ring pr2"></span>
        <img class="logo-img" src="assets/logo.png?v=3" alt="CORE" />
        <span class="logo-shine"></span>
      </div>

      <div class="hero">
        <h1>Become<br/><span class="g">your core.</span></h1>
        <div class="sub" id="sub">
          <span class="typed" id="subTyped"></span><span class="cursor" id="subCursor" aria-hidden="true"></span>
        </div>
      </div>

      <div class="cta-wrap">
        <div class="tap-hint" id="tapHint" role="button" tabindex="0" aria-label="Tap anywhere to continue">
          <span class="tap-text">Tap anywhere to continue</span>
        </div>
        <p class="legal">By continuing, you agree to our <a href="82-legal.html#terms">Terms</a> and <a href="82-legal.html#privacy">Privacy Policy</a>.</p>
      </div>
    </div>
  </div>

<script>
  // ── Star field — denser but still low-opacity, gentle twinkle ──
  (function spawnStars() {
    const wrap = document.getElementById('stars');
    if (!wrap) return;
    const small = Math.min(window.innerWidth || 390, window.innerHeight || 800) <= 480;
    const count = small ? 40 : 64;
    for (let i = 0; i < count; i++) {
      const r = Math.random();
      const tier = r < 0.58 ? 's1' : r < 0.84 ? 's2' : r < 0.96 ? 's3' : 's4';
      const s = document.createElement('div');
      s.className = 'star ' + tier;
      s.style.left = (Math.random() * 100) + '%';
      s.style.top  = (Math.random() * 100) + '%';
      s.style.setProperty('--d',   (4 + Math.random() * 6) + 's');
      s.style.setProperty('--del', (Math.random() * 6) + 's');
      s.style.setProperty('--min', (0.04 + Math.random() * 0.10).toFixed(2));
      s.style.setProperty('--max', (0.30 + Math.random() * 0.25).toFixed(2));
      wrap.appendChild(s);
    }
  })();

  // ── Occasional shooting star — quiet motion, on-brand (not the shared lib) ──
  (function shootingStars() {
    const wrap = document.getElementById('stars');
    if (!wrap) return;
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) return;
    function shoot() {
      const s = document.createElement('div');
      s.className = 'shoot';
      s.style.left = (16 + Math.random() * 60) + '%';
      s.style.top  = (8 + Math.random() * 36) + '%';
      const dx = -(70 + Math.random() * 90);            // travel down-left
      const dy =  (70 + Math.random() * 90);
      const ang = Math.atan2(dy, dx) * 180 / Math.PI;
      s.style.setProperty('--sx', dx.toFixed(0) + 'px');
      s.style.setProperty('--sy', dy.toFixed(0) + 'px');
      s.style.setProperty('--ang', ang.toFixed(1) + 'deg');
      s.style.animation = 'shootFly ' + (0.9 + Math.random() * 0.5).toFixed(2) + 's cubic-bezier(.3,.5,.3,1) forwards';
      wrap.appendChild(s);
      setTimeout(function () { s.remove(); }, 1700);
    }
    function loop() { shoot(); setTimeout(loop, 5500 + Math.random() * 6000); }
    setTimeout(loop, 2600);
  })();

  // ── Cinematic typewriter — cycles through short Apple-style quotes ──
  (function typewriter() {
    const target = document.getElementById('subTyped');
    if (!target) return;
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const QUOTES = [
      'Day one.',
      'Become.',
      'Your move.',
      'Begin again.'
    ];
    let qIdx = 0;
    if (reduce) { target.textContent = QUOTES[0]; return; }

    function typeOut(text, done) {
      let i = 0;
      (function tick() {
        if (i > text.length) { done && done(); return; }
        target.textContent = text.slice(0, i);
        i++;
        setTimeout(tick, 32);  // was 65 — snappier
      })();
    }
    function deleteOut(done) {
      let len = target.textContent.length;
      (function tick() {
        if (len < 0) { done && done(); return; }
        target.textContent = target.textContent.slice(0, len);
        len--;
        setTimeout(tick, 20);  // was 38 — snappier
      })();
    }
    function loop() {
      const next = QUOTES[qIdx];
      typeOut(next, () => {
        setTimeout(() => {
          deleteOut(() => {
            qIdx = (qIdx + 1) % QUOTES.length;
            setTimeout(loop, 180);  // was 250
          });
        }, 1400);  // hold 1.4s, was 2.2s
      });
    }
    setTimeout(loop, 1200);  // was 1700 — start earlier
  })();

  // ── Analytics ──
  function track(name, props) {
    try { if (window.coreTrack) window.coreTrack(name, props || {}); } catch (e) {}
  }
  window.addEventListener('load', function () { track('index_viewed', {}); });

  // ── CTAs ──
  // Loading state for ~450ms so the user gets responsive feedback
  // before the navigation kicks in (matches Apple onboarding feel).
  // Tap anywhere to continue (replaces the Start journey button).
  var _started = false;
  function startJourney() {
    if (_started) return;
    _started = true;
    track('index_cta_tapped', { cta: 'start_trial' });
    try { localStorage.setItem('coreOnboardStartedAt', String(Date.now())); } catch (e) {}
    var hint = document.getElementById('tapHint');
    if (hint) hint.classList.add('going');
    // Particle burst on exit
    var phone = document.querySelector('.phone'), n=14;
    for(var i=0;i<n;i++){
      var p=document.createElement('span');
      var a=(i/n)*Math.PI*2, d=50+Math.random()*70;
      p.style.cssText='position:absolute;z-index:99;pointer-events:none;width:3px;height:3px;border-radius:50%;'
        +'background:#fff;left:50%;top:42%;'
        +'--sx:'+(Math.cos(a)*d)+'px;--sy:'+(Math.sin(a)*d)+'px;'
        +'animation:exitBurst .7s cubic-bezier(.22,1,.36,1) forwards;'
        +'animation-delay:'+(i*0.02)+'s;';
      phone.appendChild(p);setTimeout(function(){p.remove();},800);
    }
    document.body.classList.add('leaving');
    try { if (navigator.vibrate) navigator.vibrate(12); } catch (e) {}
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    setTimeout(function () { window.location.href = '07-trial.html'; }, reduce ? 200 : 460);
  }
  document.addEventListener('click', function (e) {
    if (e.target.closest('#signinBtn')) return;  // avatar still goes to sign-in
    if (e.target.closest('a')) return;           // legal links open normally
    startJourney();
  });
  // Keyboard affordance for the focusable tap hint
  var _tapHint = document.getElementById('tapHint');
  if (_tapHint) _tapHint.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startJourney(); }
  });
  document.getElementById('signinBtn').addEventListener('click', function () {
    track('index_cta_tapped', { cta: 'sign_in' });
    window.location.href = '04-sign-in.html';
  });

  // ── Owner Easter egg: long-press anywhere (file:// only) -> gallery ──
  (function () {
    if (location.protocol !== 'file:') return;
    var timer = null;
    function start() {
      clearTimeout(timer);
      timer = setTimeout(function () {
        try { localStorage.setItem('coreStoneAccess', '1'); } catch (e) {}
        track('index_owner_egg', {});
        window.location.href = '97-gallery.html';
      }, 1500);
    }
    function cancel() { clearTimeout(timer); }
    document.addEventListener('touchstart', start, { passive: true });
    document.addEventListener('mousedown',  start);
    document.addEventListener('touchend',   cancel);
    document.addEventListener('mouseup',    cancel);
    document.addEventListener('touchmove',  cancel, { passive: true });
    document.addEventListener('mouseleave', cancel);
  })();
</script>

:root, .phone {

  --peri:#B6BCC8; --peri-soft:rgba(206,212,222,0.18);
  --glow:rgba(206,212,222,0.6); --glow-soft:rgba(206,212,222,0.18); --green:#C4C9D2;
}
</style>
