<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Social</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root{
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.035); --bg-card-2:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08); --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
    --accent:#4A8FFF; --grad-a:#4A8FFF; --grad-b:#6F70FF; --good:#34D399; --danger:#FF6B6B; --gold:#F5C518;
  }
  *{ box-sizing:border-box; } html,body{ margin:0; padding:0; height:100%; }
  body{ min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text);
    -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone{ position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch{ position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:60; }
  .bg{ position:absolute; inset:0; z-index:0;
    background: radial-gradient(60% 30% at 50% 6%, rgba(74,143,255,0.14), transparent 64%),
                radial-gradient(50% 24% at 84% 30%, rgba(111,112,255,0.10), transparent 70%),
                linear-gradient(180deg, #060622 0%, #02020A 52%, #050510 100%); }
  .frame{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }

  /* header */
  .hdr{ display:flex; align-items:center; gap:12px; padding:2px 18px 8px; }
  .back{ width:38px; height:38px; border-radius:50%; border:none; background:rgba(255,255,255,0.06); color:var(--text);
    display:flex; align-items:center; justify-content:center; text-decoration:none; flex:none; cursor:pointer; }
  .back svg{ width:19px; height:19px; }
  .hdr .htxt{ flex:1; min-width:0; }
  .hdr .ttl{ font-size:19px; font-weight:900; letter-spacing:-.01em; }
  .hdr .sub{ font-size:10.5px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin-top:1px; }
  .hdr .live{ flex:none; display:flex; align-items:center; gap:6px; font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--good);
    padding:6px 10px; border-radius:999px; background:rgba(52,211,153,.10); border:1px solid rgba(52,211,153,.28); }
  .hdr .live .dot{ width:7px; height:7px; border-radius:50%; background:var(--good); box-shadow:0 0 0 0 rgba(52,211,153,.6); animation:livePulse 2s infinite; }
  @keyframes livePulse{ 0%{ box-shadow:0 0 0 0 rgba(52,211,153,.5);} 70%{ box-shadow:0 0 0 7px rgba(52,211,153,0);} 100%{ box-shadow:0 0 0 0 rgba(52,211,153,0);} }

  .scroll{ flex:1; overflow-y:auto; padding:4px 18px 112px; } .scroll::-webkit-scrollbar{ display:none; }
  .sec{ display:flex; align-items:center; gap:8px; margin:24px 4px 12px; font-size:12px; font-weight:800; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); }
  .sec .ic{ width:16px; height:16px; flex:none; opacity:.9; }
  .sec .meta{ margin-left:auto; font-size:10px; letter-spacing:.1em; color:var(--dim); font-weight:800; }

  /* ── HERO: your CORE Score ── */
  .hero{ position:relative; border-radius:24px; padding:20px 18px 18px; overflow:hidden;
    background:linear-gradient(160deg, rgba(74,143,255,0.18), rgba(111,112,255,0.05) 60%, rgba(255,255,255,0.02));
    border:1px solid rgba(120,160,255,0.26); box-shadow:0 16px 40px rgba(0,0,0,.4); }
  .hero .aura{ position:absolute; inset:-40% -10% auto -10%; height:80%; z-index:0; pointer-events:none;
    background:radial-gradient(60% 60% at 50% 0%, var(--glow,#4A8FFF), transparent 70%); opacity:.22; filter:blur(8px); animation:auraPulse 4.5s ease-in-out infinite; }
  @keyframes auraPulse{ 0%,100%{ opacity:.16; transform:scale(1);} 50%{ opacity:.30; transform:scale(1.06);} }
  .hero .row1{ position:relative; z-index:1; display:flex; align-items:flex-start; gap:14px; }
  .crest{ width:64px; height:64px; flex:none; border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(155deg, var(--c1,#6cc4ff), var(--c2,#0c4a8e)); box-shadow:0 8px 22px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.3), 0 0 22px -2px var(--glow,#4A8FFF);
    position:relative; }
  .crest .rk{ font-size:11px; font-weight:900; letter-spacing:.04em; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.5); }
  .crest .tg{ font-size:8px; font-weight:800; letter-spacing:.1em; color:rgba(255,255,255,.78); margin-top:1px; text-transform:uppercase; }
  .hero .hmid{ flex:1; min-width:0; }
  .hero .hlabel{ font-size:10px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
  .hero .hscore{ font-size:46px; font-weight:900; line-height:1; letter-spacing:-.02em; font-variant-numeric:tabular-nums; margin-top:2px;
    background:linear-gradient(180deg,#fff, #bcd4ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .hero .hsuf{ font-size:14px; font-weight:800; color:var(--dim); -webkit-text-fill-color:var(--dim); }
  .hero .hpos{ display:inline-flex; align-items:center; gap:6px; margin-top:6px; font-size:11.5px; font-weight:800; color:var(--text);
    padding:5px 10px; border-radius:999px; background:rgba(0,0,0,.3); border:1px solid var(--border); }
  .hero .hpos b{ color:var(--accent); }
  /* progress to next rank */
  .hbar{ position:relative; z-index:1; margin-top:15px; height:8px; border-radius:999px; background:rgba(0,0,0,.35); overflow:hidden; border:1px solid rgba(255,255,255,.06); }
  .hbar > i{ position:absolute; inset:0 auto 0 0; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--c2,#0c4a8e),var(--glow,#4A8FFF)); box-shadow:0 0 12px var(--glow,#4A8FFF); transition:width 1.1s cubic-bezier(.2,.8,.2,1); }
  .hnext{ position:relative; z-index:1; display:flex; justify-content:space-between; margin-top:7px; font-size:10.5px; font-weight:800; color:var(--dim); }
  .hnext b{ color:var(--muted); }
  /* mini vitals strip */
  .vitals{ position:relative; z-index:1; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:15px; }
  .vital{ border-radius:13px; padding:10px 8px; background:rgba(0,0,0,.28); border:1px solid var(--border); text-align:center; }
  .vital .vi{ font-size:16px; line-height:1; } .vital .vv{ font-size:15px; font-weight:900; font-variant-numeric:tabular-nums; margin-top:4px; }
  .vital .vl{ font-size:8.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-top:2px; }
  .vital.flame .vv{ color:#FF8A3D; } .vital.heart .vv{ color:var(--good); } .vital.boss .vv{ font-size:11px; }

  /* ── segmented control ── */
  .seg{ display:flex; gap:4px; padding:4px; border-radius:14px; background:rgba(0,0,0,.32); border:1px solid var(--border); margin-bottom:4px; }
  .seg button{ flex:1; min-height:36px; border:none; border-radius:11px; background:transparent; color:var(--muted); font:inherit; font-size:12px; font-weight:800; letter-spacing:.02em; cursor:pointer; transition:.2s; }
  .seg button.on{ background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); color:#fff; box-shadow:0 6px 16px -4px rgba(74,143,255,.6); }

  /* ── leaderboard rows ── */
  .lb{ display:flex; flex-direction:column; gap:9px; }
  .pl{ position:relative; display:flex; align-items:center; gap:12px; padding:12px 13px; border-radius:16px;
    background:var(--bg-card); border:1px solid var(--border); cursor:pointer; transition:transform .18s cubic-bezier(.2,.8,.2,1), background .2s, border-color .2s, opacity .3s; will-change:transform; }
  .pl:active{ transform:scale(.985); }
  .pl.dim{ opacity:.62; } /* low-score = faded */
  .pl.you{ background:linear-gradient(150deg, rgba(74,143,255,0.16), rgba(74,143,255,0.04)); border-color:rgba(120,160,255,.42); }
  .pl.top{ border-color:color-mix(in srgb, var(--glow,#4A8FFF) 50%, transparent); box-shadow:0 0 0 1px color-mix(in srgb,var(--glow,#4A8FFF) 30%, transparent), 0 8px 26px -10px var(--glow,#4A8FFF); }
  .pl.top::before{ content:""; position:absolute; inset:0; border-radius:16px; padding:1px; pointer-events:none;
    background:linear-gradient(120deg, transparent 20%, color-mix(in srgb,var(--glow,#4A8FFF) 70%, transparent), transparent 80%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude;
    background-size:220% 100%; animation:edgeShine 3.2s linear infinite; }
  @keyframes edgeShine{ 0%{ background-position:200% 0; } 100%{ background-position:-120% 0; } }
  .pl.active::after{ content:""; position:absolute; top:11px; right:12px; width:7px; height:7px; border-radius:50%; background:var(--good); box-shadow:0 0 8px var(--good); animation:livePulse 2.4s infinite; }
  .pl .pos{ flex:none; width:24px; text-align:center; font-size:14px; font-weight:900; font-variant-numeric:tabular-nums; color:var(--dim); }
  .pl.top .pos{ color:var(--glow,#4A8FFF); }
  .pl .av{ position:relative; width:44px; height:44px; flex:none; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:900; color:#fff;
    background:linear-gradient(150deg,var(--c1,#4A8FFF),var(--c2,#6F70FF)); box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 0 16px -4px var(--glow,#4A8FFF); }
  .pl .av .bz{ position:absolute; bottom:-5px; left:50%; transform:translateX(-50%); font-size:7.5px; font-weight:900; letter-spacing:.04em; padding:2px 5px; border-radius:6px; white-space:nowrap;
    background:#0b0b16; color:var(--glow,#4A8FFF); border:1px solid color-mix(in srgb,var(--glow,#4A8FFF) 45%, transparent); }
  .pl .pb{ flex:1; min-width:0; }
  .pl .pn{ font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; display:flex; align-items:center; gap:6px; }
  .pl .pn .me{ font-size:8.5px; font-weight:900; letter-spacing:.1em; color:var(--accent); padding:1px 5px; border-radius:5px; background:rgba(74,143,255,.14); }
  .pl .psub{ display:flex; align-items:center; gap:9px; margin-top:3px; font-size:11px; font-weight:700; color:var(--muted); }
  .pl .psub .chip{ display:inline-flex; align-items:center; gap:3px; }
  .pl .psc{ flex:none; text-align:right; }
  .pl .psc .v{ font-size:18px; font-weight:900; font-variant-numeric:tabular-nums; letter-spacing:-.01em; }
  .pl .psc .l{ font-size:8px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); }
  /* habit-boss status pips */
  .boss-pip{ display:inline-flex; align-items:center; gap:3px; font-size:10.5px; font-weight:800; }
  .boss-pip .d{ width:7px; height:7px; border-radius:2px; }
  .bs-r .d{ background:var(--danger); } .bs-r{ color:#ff9d9d; }
  .bs-y .d{ background:var(--gold); } .bs-y{ color:#ffe08a; }
  .bs-g .d{ background:var(--good); } .bs-g{ color:#7ff0c4; }

  /* ── challenges / duels ── */
  .duel{ position:relative; border-radius:18px; padding:15px; background:linear-gradient(155deg, rgba(255,107,107,0.08), rgba(255,255,255,0.02)); border:1px solid rgba(255,107,107,.22); overflow:hidden; }
  .duel.win{ background:linear-gradient(155deg, rgba(52,211,153,0.14), rgba(255,255,255,0.02)); border-color:rgba(52,211,153,.4); }
  .duel .dtop{ display:flex; align-items:center; gap:8px; }
  .duel .dname{ font-size:13.5px; font-weight:900; flex:1; }
  .duel .dtimer{ font-size:10.5px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--gold); padding:4px 9px; border-radius:999px; background:rgba(245,197,24,.12); border:1px solid rgba(245,197,24,.28); }
  .duel.win .dtimer{ color:var(--good); background:rgba(52,211,153,.14); border-color:rgba(52,211,153,.34); }
  .duel .dvs{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; margin-top:13px; }
  .duel .side{ min-width:0; } .duel .side.them{ text-align:right; }
  .duel .sn{ font-size:11.5px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:6px; }
  .duel .side.them .sn{ justify-content:flex-end; }
  .duel .sp{ font-size:10px; font-weight:800; color:var(--muted); margin-top:2px; font-variant-numeric:tabular-nums; }
  .duel .vs{ font-size:12px; font-weight:900; color:var(--dim); letter-spacing:.06em; }
  .dbar{ height:9px; border-radius:999px; background:rgba(0,0,0,.4); overflow:hidden; margin-top:7px; position:relative; border:1px solid rgba(255,255,255,.05); }
  .dbar > i{ position:absolute; inset:0 auto 0 0; width:0%; border-radius:999px; transition:width 1s cubic-bezier(.2,.8,.2,1); }
  .dbar.mine > i{ background:linear-gradient(90deg,var(--grad-a),var(--grad-b)); box-shadow:0 0 10px var(--accent); }
  .dbar.them{ transform:scaleX(-1); } .dbar.them > i{ background:linear-gradient(90deg,#ff8a8a,var(--danger)); box-shadow:0 0 10px var(--danger); }
  .duel .verdict{ margin-top:11px; font-size:11.5px; font-weight:800; color:var(--muted); text-align:center; }
  .duel .verdict b{ color:var(--good); }
  .duel .vtrophy{ position:absolute; top:-8px; right:-8px; font-size:60px; opacity:.12; transform:rotate(12deg); }

  .chal{ display:flex; align-items:center; gap:12px; padding:13px; border-radius:15px; background:var(--bg-card); border:1px solid var(--border); margin-top:9px; }
  .chal .ci{ width:42px; height:42px; flex:none; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:19px; background:rgba(74,143,255,.12); border:1px solid rgba(74,143,255,.22); }
  .chal .cb{ flex:1; min-width:0; } .chal .ct{ font-size:13.5px; font-weight:800; } .chal .cs{ font-size:11px; color:var(--muted); margin-top:2px; }
  .chal button{ flex:none; min-height:38px; padding:0 15px; border-radius:11px; border:1px solid transparent; background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); color:#fff; font:inherit; font-size:12px; font-weight:800; cursor:pointer; transition:.18s; }
  .chal button:active{ transform:scale(.96); }
  .chal button.done{ background:rgba(52,211,153,.14); color:var(--good); border-color:rgba(52,211,153,.34); }

  /* ── discipline feed ── */
  .feed{ display:flex; flex-direction:column; gap:9px; }
  .fitem{ display:flex; align-items:center; gap:11px; padding:12px 13px; border-radius:15px; background:var(--bg-card); border:1px solid var(--border);
    opacity:0; transform:translateY(8px); animation:fadeUp .5s cubic-bezier(.2,.8,.2,1) forwards; }
  @keyframes fadeUp{ to{ opacity:1; transform:none; } }
  .fitem.flash{ animation:fadeUp .5s cubic-bezier(.2,.8,.2,1) forwards, feedFlash 1.4s ease-out; }
  @keyframes feedFlash{ 0%{ background:rgba(74,143,255,.18); } 100%{ background:var(--bg-card); } }
  .fitem .fav{ width:38px; height:38px; flex:none; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:900; color:#fff;
    background:linear-gradient(150deg,var(--c1,#4A8FFF),var(--c2,#6F70FF)); }
  .fitem .ft{ flex:1; min-width:0; font-size:12.5px; font-weight:700; line-height:1.4; color:var(--text); }
  .fitem .ft b{ font-weight:900; } .fitem .ft .em{ font-style:normal; }
  .fitem .fg{ flex:none; font-size:11px; font-weight:900; color:var(--good); font-variant-numeric:tabular-nums; }
  .fitem .fk{ flex:none; font-size:17px; }

  /* ── expand sheet ── */
  .ovl{ position:absolute; inset:0; z-index:80; display:none; }
  .ovl.show{ display:block; }
  .ovl .scrim{ position:absolute; inset:0; background:rgba(2,2,10,.62); backdrop-filter:blur(3px); opacity:0; transition:opacity .25s; }
  .ovl.show .scrim{ opacity:1; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; border-radius:26px 26px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,#0c0c1c,#070710); border-top:1px solid rgba(255,255,255,.1); box-shadow:0 -20px 50px rgba(0,0,0,.6);
    transform:translateY(100%); transition:transform .32s cubic-bezier(.2,.85,.25,1); max-height:86%; overflow-y:auto; }
  .sheet::-webkit-scrollbar{ display:none; } .ovl.show .sheet{ transform:none; }
  .grab{ width:40px; height:5px; border-radius:999px; background:rgba(255,255,255,.2); margin:0 auto 16px; }
  .shead{ display:flex; align-items:center; gap:14px; }
  .shead .av{ width:58px; height:58px; flex:none; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff;
    background:linear-gradient(150deg,var(--c1,#4A8FFF),var(--c2,#6F70FF)); box-shadow:0 0 22px -4px var(--glow,#4A8FFF); }
  .shead .snm{ font-size:18px; font-weight:900; } .shead .srk{ font-size:11.5px; font-weight:800; margin-top:2px; color:var(--glow,#4A8FFF); letter-spacing:.04em; }
  .shead .ssc{ margin-left:auto; text-align:right; } .shead .ssc .v{ font-size:24px; font-weight:900; font-variant-numeric:tabular-nums; } .shead .ssc .l{ font-size:8.5px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); }
  .sgrid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:16px; }
  .scell{ border-radius:14px; padding:12px; background:rgba(255,255,255,.03); border:1px solid var(--border); }
  .scell .sl{ font-size:9.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); display:flex; align-items:center; gap:5px; }
  .scell .sv{ font-size:17px; font-weight:900; font-variant-numeric:tabular-nums; margin-top:5px; }
  .sbar{ height:6px; border-radius:999px; background:rgba(0,0,0,.4); overflow:hidden; margin-top:7px; }
  .sbar > i{ display:block; height:100%; border-radius:999px; }
  .snote{ font-size:11px; color:var(--dim); text-align:center; margin-top:14px; }
  .sheet .saction{ width:100%; min-height:50px; margin-top:16px; border:none; border-radius:15px; background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); color:#fff; font:inherit; font-size:15px; font-weight:900; cursor:pointer; box-shadow:0 12px 26px -8px rgba(74,143,255,.7); transition:.18s; }
  .sheet .saction:active{ transform:scale(.985); } .sheet .saction.you{ background:rgba(255,255,255,.06); color:var(--muted); box-shadow:none; }

  /* victory burst */
  .burst{ position:absolute; inset:0; z-index:90; display:none; align-items:center; justify-content:center; pointer-events:none; }
  .burst.show{ display:flex; }
  .burst .vcard{ text-align:center; transform:scale(.6); opacity:0; animation:vpop .6s cubic-bezier(.2,1.3,.4,1) forwards; }
  @keyframes vpop{ to{ transform:scale(1); opacity:1; } }
  .burst .vk{ font-size:74px; filter:drop-shadow(0 0 24px var(--gold)); }
  .burst .vt{ font-size:24px; font-weight:900; letter-spacing:.04em; margin-top:6px; background:linear-gradient(180deg,#fff,var(--gold)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .burst .vs{ font-size:13px; font-weight:800; color:var(--muted); margin-top:4px; }

  .toast{ position:absolute; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); z-index:95; opacity:0; pointer-events:none;
    padding:11px 18px; border-radius:13px; background:rgba(18,18,30,.96); border:1px solid var(--border); font-size:13px; font-weight:800; transition:.28s; white-space:nowrap; box-shadow:0 12px 30px rgba(0,0,0,.5); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce){
    .hero .aura, .pl.top::before, .hdr .live .dot, .pl.active::after{ animation:none !important; }
    .fitem{ animation-duration:.001s; } *{ transition-duration:.001s !important; }
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="frame">
      <div class="hdr">
        <a class="back" href="24-more.html" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <div class="htxt">
          <div class="ttl">Social</div>
          <div class="sub">Reputation Arena</div>
        </div>
        <div class="live"><span class="dot"></span>Live</div>
      </div>

      <div class="scroll">
        <!-- HERO -->
        <div class="hero" id="hero" role="button" tabindex="0" aria-label="Your CORE profile">
          <div class="aura"></div>
          <div class="row1">
            <div class="crest" id="heroCrest"><div class="rk" id="heroRk">—</div><div class="tg">RANK</div></div>
            <div class="hmid">
              <div class="hlabel">Your CORE Score</div>
              <div class="hscore"><span id="heroScore">0</span><span class="hsuf"> /1000</span></div>
              <div class="hpos">Global <b id="heroPos">#—</b>&nbsp;· top <span id="heroPct">—</span>%</div>
            </div>
          </div>
          <div class="hbar"><i id="heroBar"></i></div>
          <div class="hnext"><span id="heroNextL">—</span><span><b id="heroNextV">—</b> to next</span></div>
          <div class="vitals">
            <div class="vital flame"><div class="vi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M12 3c1.6 3.6 4 4.6 4 8a4 4 0 0 1-8 0c0-1.3.5-2.1 1-2.7C9 11 12 8 12 3z"/></svg></div><div class="vv" id="vStreak">—</div><div class="vl">Streak</div></div>
            <div class="vital heart"><div class="vi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M12 20.5s-7.2-4.6-7.2-9.8A4.6 4.6 0 0 1 12 7a4.6 4.6 0 0 1 7.2 3.7c0 5.2-7.2 9.8-7.2 9.8Z"/></svg></div><div class="vv" id="vHealth">—</div><div class="vl">Health</div></div>
            <div class="vital boss"><div class="vi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/></svg></div><div class="vv" id="vBoss">—</div><div class="vl">Habit Boss</div></div>
          </div>
        </div>

        <!-- LEADERBOARD -->
        <div class="sec">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a14 14 0 0 0 0 18M12 3a14 14 0 0 1 0 18M3.5 9h17M3.5 15h17"/></svg>
          Global Leaderboard <span class="meta" id="lbMeta">who's improving most</span>
        </div>
        <div class="seg" id="lbSeg">
          <button data-scope="global" class="on">Global</button>
          <button data-scope="friends">Friends</button>
          <button data-scope="weekly">Weekly</button>
        </div>
        <div class="lb" id="lb"></div>

        <!-- CHALLENGES -->
        <div class="sec">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 3.5l-4 4M9.5 3.5l4 4M5 9l5 5-2 6-3-3-6 3 3-6zM19 9l-5 5 2 6 3-3 6 3-3-6z"/></svg>
          Challenges &amp; Duels <span class="meta" id="chMeta"></span>
        </div>
        <div id="duels"></div>
        <div id="chalList"></div>

        <!-- FEED -->
        <div class="sec">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1.5 3.5 4 4.5 4 8a4 4 0 0 1-8 0c0-1.2.5-2 1-2.6C9 11 12 8 12 3z"/></svg>
          Discipline Feed <span class="meta">progress only</span>
        </div>
        <div class="feed" id="feed"></div>
      </div>
    </div>

    <!-- player sheet -->
    <div class="ovl" id="ovl">
      <div class="scrim" id="scrim"></div>
      <div class="sheet" id="sheet"></div>
    </div>
    <!-- victory -->
    <div class="burst" id="burst"></div>
    <div class="toast" id="toast"></div>
  </div>

  <script src="_lib/core-state.js"></script>
  <script src="_lib/core-sfx.js"></script>
  <script src="_lib/core-social.js"></script>
  <script>
  (function(){
    "use strict";
    var qs=function(s,r){return (r||document).querySelector(s);};
    var S=window.coreState||{};
    var sfx=function(n){ try{ if(window.coreSfx&&window.coreSfx[n]) window.coreSfx[n](); }catch(e){} };
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
    function pjson(k,d){ try{var v=JSON.parse(localStorage.getItem(k)); return v||d;}catch(e){return d;} }

    /* ── inline monochrome icons (replace emoji) ── */
    function svg(d,o){ o=o||{}; var w=o.size||14; var sw=o.sw||2; var f=o.fill?('fill="'+o.fill+'"'):'fill="none"'; var st=o.fill?'':'stroke="currentColor" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round"'; return '<svg viewBox="0 0 24 24" '+f+' '+st+' style="width:'+w+'px;height:'+w+'px;vertical-align:-2px">'+d+'</svg>'; }
    var ICONS={
      flame:  function(s){ return svg('<path d="M12 3c1.6 3.6 4 4.6 4 8a4 4 0 0 1-8 0c0-1.3.5-2.1 1-2.7C9 11 12 8 12 3z"/>',{size:s}); },
      heart:  function(s){ return svg('<path d="M12 20.5s-7.2-4.6-7.2-9.8A4.6 4.6 0 0 1 12 7a4.6 4.6 0 0 1 7.2 3.7c0 5.2-7.2 9.8-7.2 9.8Z"/>',{size:s}); },
      shield: function(s){ return svg('<path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/>',{size:s}); },
      target: function(s){ return svg('<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.5"/>',{size:s}); },
      brain:  function(s){ return svg('<path d="M9 4a3 3 0 0 0-3 3 3 3 0 0 0-1 5 3 3 0 0 0 1 5 3 3 0 0 0 6 0V4a3 3 0 0 0-3 0zM15 4a3 3 0 0 1 3 3 3 3 0 0 1 1 5 3 3 0 0 1-1 5"/>',{size:s}); },
      trophy: function(s){ return svg('<path d="M8 4h8v4a4 4 0 0 1-8 0zM8 5H5v1a3 3 0 0 0 3 3M16 5h3v1a3 3 0 0 1-3 3M10 12h4M9 20h6M12 14v6"/>',{size:s}); },
      medal:  function(s){ return svg('<path d="M8 3l2.5 6M16 3l-2.5 6"/><circle cx="12" cy="15" r="5"/><path d="M12 13v4M10.5 15h3"/>',{size:s}); },
      noVape: function(s){ return svg('<rect x="3" y="11" width="14" height="4" rx="1"/><path d="M17 11v4M20 11v4M4 5l16 14"/>',{size:s}); },
      star:   function(s){ return svg('<path d="M12 4l2.3 5 5.4.5-4 3.6 1.2 5.3L12 21l-4.9 2.4 1.2-5.3-4-3.6 5.4-.5z"/>',{size:s,fill:'currentColor'}); },
      sq:     function(col,s){ s=s||13; return '<svg viewBox="0 0 24 24" style="width:'+s+'px;height:'+s+'px;vertical-align:-2px"><rect x="4" y="4" width="16" height="16" rx="3" fill="'+col+'"/></svg>'; }
    };

    /* ── canonical elemental rank ladder (from core-state; fallback inline) ── */
    var RANKS = (S.RANKS && S.RANKS.length) ? S.RANKS : [
      {name:'Stone',  color:'#AEB4BD',c1:'#cdd2da',c2:'#4b515b',glow:'#AEB4BD'},
      {name:'Earth',  color:'#C08A4A',c1:'#d79c55',c2:'#5a3b18',glow:'#C08A4A'},
      {name:'Leaf',   color:'#57D964',c1:'#7cf07f',c2:'#176b2d',glow:'#57D964'},
      {name:'Water',  color:'#3FA9F5',c1:'#6cc4ff',c2:'#0c4a8e',glow:'#3FA9F5'},
      {name:'Crystal',color:'#A86BF0',c1:'#c79bff',c2:'#3b1568',glow:'#A86BF0'},
      {name:'Gold',   color:'#F5C518',c1:'#ffe27a',c2:'#7a5300',glow:'#F5C518'},
      {name:'Ember',  color:'#F0463C',c1:'#ff6f63',c2:'#6b1208',glow:'#F0463C'},
      {name:'Wind',   color:'#2BD4C4',c1:'#64f0e2',c2:'#0f5a52',glow:'#2BD4C4'},
      {name:'Aurora', color:'#5B8DEF',c1:'#86b0ff',c2:'#23306b',glow:'#5B8DEF'},
      {name:'Ascend', color:'#A05BE0',c1:'#c48cff',c2:'#4a1a8a',glow:'#A05BE0'},
      {name:'CORE',   color:'#BBD8FF',c1:'#EAF3FF',c2:'#2a4f9b',glow:'#9CC6FF'}
    ];
    // CORE Score (0-1000) thresholds -> elemental rank. Escalating so top tiers stay rare.
    var RANK_MIN = [0,120,230,340,450,560,660,750,830,900,962];
    function rankForScore(score){
      var i=0; for(var k=0;k<RANK_MIN.length;k++){ if(score>=RANK_MIN[k]) i=k; }
      var r=RANKS[i]||RANKS[0];
      var next=RANK_MIN[i+1]!=null?RANK_MIN[i+1]:null;
      var floor=RANK_MIN[i];
      var prog = next!=null ? clamp((score-floor)/(next-floor),0,1) : 1;
      return { idx:i, name:r.name, color:r.color, c1:r.c1, c2:r.c2, glow:r.glow,
               toNext: next!=null?Math.max(0,next-score):0, prog:prog, isMax: next==null };
    }

    /* ── CORE Score engine ──
       Reputation from real discipline signals. Weighted so health + control + streak dominate. */
    function coreScore(p){
      var s = p.health*3.5 + p.control*2.5 + Math.min(p.streak,90)*3
            + Math.min(p.quests,60)*1.5 + Math.min(p.wins,6)*15;
      return clamp(Math.round(s),0,1000);
    }
    // Habit-boss status from control level (0-100): losing / stable / dominated.
    function bossStatus(control){
      if(control>=75) return {cls:'bs-g', label:'Dominated'};
      if(control>=45) return {cls:'bs-y', label:'Stable'};
      return {cls:'bs-r', label:'Losing'};
    }
    var BOSSES=['Vaping','Procrastination','Doomscroll','Junk Food','Late Nights','Impulse Spend','Porn','Drinking'];

    /* ── deterministic seed players (stable across reloads; clearly illustrative) ── */
    function hash(s){ var h=2166136261>>>0; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619)>>>0; } return h>>>0; }
    function rnd(seed,i){ return ((hash(seed+':'+i))%1000)/1000; }
    var NAMES=['Kai','Mara','Dex','Lena','Rohan','Ivy','Sol','Nina','Theo','Zara','Owen','Priya','Jett','Cora','Ash','Bex','Niko','Tara','Vince','Mila','Reed','Hana','Cyrus','Wren'];
    function makePlayer(name){
      var control=Math.round(28+rnd(name,1)*70);
      var health=Math.round(34+rnd(name,2)*64);
      var streak=Math.round(rnd(name,3)*rnd(name,7)*120);
      var quests=Math.round(rnd(name,4)*70);
      var wins=Math.round(rnd(name,5)*6);
      var p={ id:name, name:name, health:health, control:control, streak:streak, quests:quests, wins:wins,
              boss:BOSSES[hash(name)%BOSSES.length], active:rnd(name,6)>0.45, you:false };
      p.score=coreScore(p); return p;
    }

    /* ── "you" from real local CORE state ── */
    function statV(key,fallback){ try{ return S.statValue?S.statValue(key):fallback; }catch(e){ return fallback; } }
    function readMe(){
      var st = (S.read&&S.read()) || {};
      var health = Math.round(statV('health', 0));
      var control = Math.round(statV('purpose', statV('willpower',0)));
      var streak = (st.streak&&st.streak.days!=null)?st.streak.days:0;
      var qs_ = (st.xpLedger||[]).filter(function(e){return (e.reason||'').indexOf('quest')===0;}).length;
      var wins = pjson('coreChallengeWins',[]).length;
      // Unseeded/empty local profile (fresh preview) -> use a believable demo "you"
      // so the arena looks alive. A real user with progress keeps their real stats.
      if(health<=1 && control<=1 && streak<=0){ health=76; control=72; streak=14; qs_=23; }
      if(!wins) wins=2;
      var me={ id:'YOU', name:'You', health:health, control:control, streak:streak, quests:qs_, wins:wins,
               boss:'Vaping', active:true, you:true };
      me.score=coreScore(me); return me;
    }

    /* ── build leaderboard ── */
    var ME=readMe();
    var ALL=NAMES.map(makePlayer).concat([ME]);
    var FRIEND_SET={}; pjson('coreFriends',[]).forEach(function(f){ FRIEND_SET[(f.name||f)]=1; });
    // pick a stable friend subset if none saved, so the Friends tab isn't empty in the demo
    if(!Object.keys(FRIEND_SET).length){ ['Kai','Lena','Sol','Zara','Reed','Mila'].forEach(function(n){FRIEND_SET[n]=1;}); }

    function scopeList(scope){
      var list;
      if(scope==='friends') list=ALL.filter(function(p){ return p.you||FRIEND_SET[p.name]; });
      else if(scope==='weekly') list=ALL.map(function(p){ var w=Object.assign({},p); w.wkScore=Math.round(p.score*(0.35+rnd(p.name,9)*0.4)); return w; });
      else list=ALL.slice();
      list.sort(function(a,b){ return (scope==='weekly'?(b.wkScore-a.wkScore):(b.score-a.score)); });
      return list;
    }

    var curScope='global';
    function rowHTML(p,i,scope){
      var rk=rankForScore(p.score), bs=bossStatus(p.control);
      var shown = scope==='weekly' ? p.wkScore : p.score;
      var cls='pl'; if(p.you) cls+=' you'; if(i<3) cls+=' top'; if(p.active&&!p.you) cls+=' active'; if(p.score<330&&!p.you) cls+=' dim';
      var medal = i<3 ? ICONS.medal(15) : ('#'+(i+1));
      var av=(p.you?'YOU':p.name.slice(0,1).toUpperCase());
      return '<div class="'+cls+'" data-id="'+p.id+'" style="--glow:'+rk.glow+';--c1:'+rk.c1+';--c2:'+rk.c2+'">'
        + '<div class="pos">'+medal+'</div>'
        + '<div class="av">'+av+'<span class="bz">'+rk.name+'</span></div>'
        + '<div class="pb"><div class="pn">'+(p.you?'You':p.name)+(p.you?'<span class="me">YOU</span>':'')+'</div>'
        +   '<div class="psub"><span class="chip">'+ICONS.flame(12)+' '+p.streak+'d</span><span class="chip">'+ICONS.heart(12)+' '+p.health+'</span>'
        +     '<span class="boss-pip '+bs.cls+'"><span class="d"></span>'+bs.label+'</span></div></div>'
        + '<div class="psc"><div class="v">'+shown+'</div><div class="l">score</div></div>'
        + '</div>';
    }

    var lbEl=qs('#lb');
    function captureRects(){ var m={}; Array.prototype.forEach.call(lbEl.children,function(c){ m[c.dataset.id]=c.getBoundingClientRect().top; }); return m; }
    function flip(prev){
      if(reduce) return;
      Array.prototype.forEach.call(lbEl.children,function(c){
        var was=prev[c.dataset.id]; if(was==null) return;
        var now=c.getBoundingClientRect().top, dy=was-now;
        if(!dy) return;
        c.style.transform='translateY('+dy+'px)'; c.style.transition='none';
        requestAnimationFrame(function(){ c.style.transition='transform .5s cubic-bezier(.2,.8,.2,1)'; c.style.transform=''; });
      });
    }
    function renderLB(scope){
      var prev = lbEl.children.length?captureRects():null;
      var list=scopeList(scope);
      lbEl.innerHTML=list.map(function(p,i){ return rowHTML(p,i,scope); }).join('');
      if(prev) flip(prev);
      var meIdx=list.findIndex(function(p){return p.you;});
      qs('#lbMeta').textContent = meIdx>=0 ? 'you · #'+(meIdx+1)+' of '+list.length : list.length+' players';
    }

    /* ── hero render + count-up ── */
    function countUp(el,to,ms){
      if(reduce){ el.textContent=to; return; }
      var from=0,t0=null; function step(t){ if(!t0)t0=t; var k=Math.min(1,(t-t0)/ms); var v=Math.round(from+(to-from)*(1-Math.pow(1-k,3))); el.textContent=v; if(k<1)requestAnimationFrame(step); }
      requestAnimationFrame(step);
    }
    function renderHero(){
      var rk=rankForScore(ME.score), bs=bossStatus(ME.control);
      var sorted=ALL.slice().sort(function(a,b){return b.score-a.score;});
      var pos=sorted.findIndex(function(p){return p.you;})+1;
      var pct=Math.max(1,Math.round(pos/sorted.length*100));
      var hero=qs('#hero'); hero.style.setProperty('--glow',rk.glow); hero.style.setProperty('--c1',rk.c1); hero.style.setProperty('--c2',rk.c2);
      var crest=qs('#heroCrest'); crest.style.setProperty('--c1',rk.c1); crest.style.setProperty('--c2',rk.c2); crest.style.setProperty('--glow',rk.glow);
      qs('#heroRk').textContent=rk.name;
      countUp(qs('#heroScore'),ME.score,1100);
      qs('#heroPos').textContent='#'+pos; qs('#heroPct').textContent=pct;
      setTimeout(function(){ qs('#heroBar').style.width=Math.round(rk.prog*100)+'%'; },120);
      qs('#heroNextL').textContent = rk.isMax?'Max rank — CORE':('Next: '+(RANKS[rk.idx+1]?RANKS[rk.idx+1].name:''));
      qs('#heroNextV').innerHTML = rk.isMax?ICONS.star(13):('+'+rk.toNext);
      qs('#vStreak').textContent=ME.streak+'d'; qs('#vHealth').textContent=ME.health;
      var boss=qs('#vBoss'); boss.textContent=bs.label; boss.className='vv'; boss.style.color = bs.cls==='bs-g'?'var(--good)':bs.cls==='bs-y'?'var(--gold)':'var(--danger)';
    }

    /* ── challenges / duels ── */
    var CHALLENGES=[
      {id:'discipline7', icon:ICONS.shield(19), t:'7-Day Discipline Duel', s:'Most consistent streak wins', days:7},
      {id:'novape',      icon:ICONS.noVape(19), t:'No-Vape Challenge', s:'Highest habit-boss control', days:5},
      {id:'focus',       icon:ICONS.brain(19),  t:'Focus Streak Battle', s:'Most deep-work quests cleared', days:7},
      {id:'health',      icon:ICONS.heart(19),  t:'Health Climb', s:'Biggest health gain this week', days:7}
    ];
    var accepted=pjson('coreDuels',[]); // [{id,opp,mine,theirs,day,days,done,won}]
    function saveDuels(){ try{ localStorage.setItem('coreDuels',JSON.stringify(accepted)); }catch(e){} }
    function oppFor(id){ var pool=ALL.filter(function(p){return !p.you;}); return pool[hash(id+ME.name)%pool.length]; }

    function renderChallenges(){
      var duels=qs('#duels'); duels.innerHTML=accepted.map(function(d){
        var opp=d.opp, rk=rankForScore(opp.score||600);
        var won=d.mine>=d.theirs;
        return '<div class="duel'+(d.done&&won?' win':'')+'" style="--glow:'+rk.glow+'">'
          + (d.done&&won?'<div class="vtrophy">'+ICONS.trophy(60)+'</div>':'')
          + '<div class="dtop"><div class="dname">'+d.title+'</div><div class="dtimer">'+(d.done?(won?'You won':'Lost'):('Day '+d.day+'/'+d.days))+'</div></div>'
          + '<div class="dvs"><div class="side"><div class="sn">'+ICONS.sq('var(--accent)')+' You</div><div class="sp">'+d.mine+'% control</div><div class="dbar mine"><i style="width:'+d.mine+'%"></i></div></div>'
          +   '<div class="vs">VS</div>'
          +   '<div class="side them"><div class="sn">'+opp.name+' '+ICONS.sq('var(--danger)')+'</div><div class="sp">'+d.theirs+'% control</div><div class="dbar them"><i style="width:'+d.theirs+'%"></i></div></div></div>'
          + '<div class="verdict">'+(d.done?(won?'<b>Victory.</b> Reputation +'+d.reward:'Close one — rematch tomorrow.'):(d.mine>=d.theirs?'You\'re ahead by '+(d.mine-d.theirs)+'%':'Behind by '+(d.theirs-d.mine)+'% — push today'))+'</div>'
          + '</div>';
      }).join('');
      var actIds={}; accepted.forEach(function(d){actIds[d.id]=1;});
      qs('#chMeta').textContent = accepted.length?accepted.length+' active':'pick your battle';
      qs('#chalList').innerHTML = CHALLENGES.filter(function(c){return !actIds[c.id];}).map(function(c){
        return '<div class="chal"><div class="ci">'+c.icon+'</div><div class="cb"><div class="ct">'+c.t+'</div><div class="cs">'+c.s+' · '+c.days+' days</div></div>'
          + '<button data-cid="'+c.id+'">Accept</button></div>';
      }).join('');
    }
    function acceptChallenge(cid){
      var c=CHALLENGES.find(function(x){return x.id===cid;}); if(!c) return;
      var opp=oppFor(cid);
      var mine=clamp(ME.control + Math.round(rnd(cid,1)*16-4),5,100);
      var theirs=clamp(opp.control + Math.round(rnd(cid+'b',1)*14-2),5,100);
      var day=Math.min(c.days, 1+ (hash(cid)%Math.max(1,c.days-1)));
      var done=day>=c.days, won=mine>=theirs, reward=40+(hash(cid)%40);
      accepted.unshift({id:cid,title:c.t,days:c.days,day:day,opp:{name:opp.name,score:opp.score,control:opp.control},mine:mine,theirs:theirs,done:done,won:won,reward:reward});
      saveDuels(); renderChallenges(); sfx('tap'); toast('Challenge accepted — '+c.t);
      if(done&&won){ winsBump(); victory(c.t, reward); }
    }
    function winsBump(){ var w=pjson('coreChallengeWins',[]); w.push(Date.now()); try{localStorage.setItem('coreChallengeWins',JSON.stringify(w));}catch(e){} }

    /* ── discipline feed ── */
    var FEED_T=[
      function(p){return '<b>'+p.name+'</b> defeated <span class="em">'+p.boss+'</span> for '+(2+hash(p.name)%9)+' days';},
      function(p){return '<b>'+p.name+'</b> hit a <b>'+p.streak+'-day</b> discipline streak';},
      function(p){return '<b>'+p.name+'</b> reached <b>'+p.health+'%</b> health';},
      function(p){return '<b>'+p.name+'</b> cleared '+(3+hash(p.name+'q')%6)+' quests today';},
      function(p){return '<b>'+p.name+'</b> won a '+['Discipline Duel','Focus Battle','No-Vape Challenge'][hash(p.name)%3];}
    ];
    var FEED_K=[ICONS.flame(17),ICONS.heart(17),ICONS.target(17),ICONS.shield(17),ICONS.trophy(17)];
    function feedItem(p,kind,flash){
      var rk=rankForScore(p.score), idx=kind%FEED_T.length;
      var gain='+'+(8+hash(p.name+idx)%30);
      return '<div class="fitem'+(flash?' flash':'')+'" style="--c1:'+rk.c1+';--c2:'+rk.c2+'">'
        + '<div class="fav">'+p.name.slice(0,1).toUpperCase()+'</div>'
        + '<div class="ft">'+FEED_T[idx](p)+'</div>'
        + '<div class="fk">'+FEED_K[idx]+'</div><div class="fg">'+gain+'</div></div>';
    }
    var feedEl=qs('#feed');
    function seedFeed(){
      var movers=ALL.filter(function(p){return !p.you&&p.active;}).sort(function(a,b){return b.score-a.score;}).slice(0,7);
      feedEl.innerHTML=movers.map(function(p,i){ var h=feedItem(p,hash(p.name)%FEED_T.length,false); return h.replace('class="fitem"','class="fitem" style="animation-delay:'+(i*70)+'ms"'); }).join('');
    }
    function liveFeed(){
      if(reduce) return;
      var pool=ALL.filter(function(p){return !p.you;});
      setInterval(function(){
        if(qs('#ovl').classList.contains('show')) return;
        var p=pool[Math.floor(Math.random()*pool.length)];
        var div=document.createElement('div'); div.innerHTML=feedItem(p,Math.floor(Math.random()*FEED_T.length),true);
        var node=div.firstChild; feedEl.insertBefore(node,feedEl.firstChild);
        while(feedEl.children.length>9) feedEl.removeChild(feedEl.lastChild);
      }, 5200);
    }

    /* ── player sheet ── */
    function openSheet(id){
      var p=ALL.find(function(x){return x.id===id;}); if(!p) return;
      var rk=rankForScore(p.score), bs=bossStatus(p.control);
      var bar=function(v,col){ return '<div class="sbar"><i style="width:'+clamp(v,0,100)+'%;background:'+col+'"></i></div>'; };
      qs('#sheet').innerHTML='<div class="grab"></div>'
        + '<div class="shead"><div class="av" style="--c1:'+rk.c1+';--c2:'+rk.c2+';--glow:'+rk.glow+'">'+(p.you?'YOU':p.name.slice(0,1).toUpperCase())+'</div>'
        +   '<div><div class="snm">'+(p.you?'You':p.name)+'</div><div class="srk" style="color:'+rk.glow+'">'+rk.name+' · '+p.boss+'</div></div>'
        +   '<div class="ssc"><div class="v">'+p.score+'</div><div class="l">CORE</div></div></div>'
        + '<div class="sgrid">'
        +   '<div class="scell"><div class="sl">'+ICONS.heart(12)+' Health</div><div class="sv">'+p.health+'</div>'+bar(p.health,'var(--good)')+'</div>'
        +   '<div class="scell"><div class="sl">'+ICONS.shield(12)+' Boss control</div><div class="sv">'+p.control+'% <span style="font-size:10px;color:var(--dim)">'+bs.label+'</span></div>'+bar(p.control, bs.cls==='bs-g'?'var(--good)':bs.cls==='bs-y'?'var(--gold)':'var(--danger)')+'</div>'
        +   '<div class="scell"><div class="sl">'+ICONS.flame(12)+' Streak</div><div class="sv">'+p.streak+'d</div></div>'
        +   '<div class="scell"><div class="sl">'+ICONS.target(12)+' Quests</div><div class="sv">'+p.quests+'</div></div>'
        + '</div>'
        + (p.you
            ? '<button class="saction you" id="sheetAct">This is you</button>'
            : '<button class="saction" id="sheetAct" data-chal="'+p.id+'">'+ICONS.shield(15)+' Challenge '+p.name+'</button>')
        + '<div class="snote">Stats are illustrative until live sync is connected.</div>';
      qs('#ovl').classList.add('show'); sfx('tap');
      var act=qs('#sheetAct');
      if(act && act.dataset.chal){ act.addEventListener('click',function(){ closeSheet(); acceptChallenge('discipline7'); }); }
    }
    function closeSheet(){ qs('#ovl').classList.remove('show'); }

    /* ── victory burst ── */
    function victory(title,reward){
      var b=qs('#burst');
      b.innerHTML='<div class="vcard"><div class="vk">'+ICONS.trophy(74)+'</div><div class="vt">VICTORY</div><div class="vs">'+title+' · +'+reward+' reputation</div></div>';
      b.classList.add('show'); sfx('success');
      setTimeout(function(){ b.classList.remove('show'); },2100);
    }

    /* ── toast ── */
    var toastT; function toast(m){ var t=qs('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},1600); }

    /* ── wire ── */
    qs('#lbSeg').addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b)return;
      Array.prototype.forEach.call(this.children,function(x){x.classList.remove('on');}); b.classList.add('on');
      curScope=b.dataset.scope; renderLB(curScope); sfx('tap'); });
    lbEl.addEventListener('click',function(e){ var r=e.target.closest('.pl'); if(r) openSheet(r.dataset.id); });
    document.addEventListener('click',function(e){ var b=e.target.closest('[data-cid]'); if(b) acceptChallenge(b.dataset.cid); });
    qs('#scrim').addEventListener('click',closeSheet);
    qs('#hero').addEventListener('click',function(){ openSheet('YOU'); });
    qs('#burst').addEventListener('click',function(){ this.classList.remove('show'); });

    /* ── init ── */
    renderHero(); renderLB('global'); renderChallenges(); seedFeed(); liveFeed();
  })();
  </script>
</body>
</html>
