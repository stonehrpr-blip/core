<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Life Score</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root {
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.035); --bg-card-2:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08); --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
    --accent:#4A8FFF; --grad-a:#4A8FFF; --grad-b:#6F70FF; --grad-c:#B388FF; --good:#34D399; --coin:#FFCB3D; --coin2:#FFE07A;
    --sc:#4A8FFF;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
    color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:60; }

  .bg { position:absolute; inset:0; z-index:0; background:
      radial-gradient(60% 35% at 50% 6%, color-mix(in srgb,var(--sc) 18%,transparent) 0%, transparent 62%),
      radial-gradient(60% 35% at 50% 94%, rgba(159,143,255,0.08) 0%, transparent 65%),
      linear-gradient(180deg, #07071a 0%, #02020A 55%, #050510 100%); }
  .aurora { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.30; mix-blend-mode:screen; }
  .aurora::before { content:""; position:absolute; width:70%; height:40%; left:-10%; top:0; border-radius:50%; filter:blur(72px);
    background:radial-gradient(circle, color-mix(in srgb,var(--sc) 30%,transparent), transparent 65%); animation:drift 22s ease-in-out infinite; }
  @keyframes drift { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(16px,-12px) scale(1.06);} }
  .stars { position:absolute; inset:-2%; pointer-events:none; z-index:2; }
  .star { position:absolute; border-radius:50%; background:#fff; animation:tw var(--d,4s) ease-in-out var(--del,0s) infinite; }
  @keyframes tw { 0%,100%{opacity:0.15;transform:scale(0.7);} 50%{opacity:0.8;transform:scale(1.1);} }
  @media (prefers-reduced-motion: reduce){ .aurora::before,.star,.ringfill{ animation:none!important; } }

  .frame { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }
  .scroll { flex:1; overflow-y:auto; padding:4px 18px 110px; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar{ display:none; }

  .topbar { position:relative; display:flex; align-items:center; justify-content:space-between; padding:6px 18px 8px; }
  .back { width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--border); color:var(--text); text-decoration:none; }
  .back svg{ width:20px; height:20px; }
  .topbar .ttl { position:absolute; left:50%; transform:translateX(-50%); font-size:13px; font-weight:800; letter-spacing:0.2em; text-transform:uppercase; color:var(--text); }
  .coinchip { display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 13px; border-radius:999px; background:linear-gradient(135deg, rgba(255,203,61,0.16), rgba(255,160,60,0.06)); border:1px solid rgba(255,203,61,0.3); font-size:13.5px; font-weight:900; color:var(--coin2); }
  .coinchip svg{ width:16px; height:16px; color:var(--coin); }

  /* hero ring */
  .hero { position:relative; margin-top:10px; border-radius:26px; padding:22px 18px 20px; overflow:hidden; text-align:center;
    background:radial-gradient(120% 80% at 50% -10%, color-mix(in srgb,var(--sc) 16%,transparent), transparent 60%), linear-gradient(160deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012));
    border:1.5px solid color-mix(in srgb,var(--sc) 45%,transparent);
    box-shadow:0 22px 54px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08), 0 0 28px color-mix(in srgb,var(--sc) 20%,transparent); }
  .ringwrap{ position:relative; width:172px; height:172px; margin:2px auto 0; }
  .ringwrap svg{ width:172px; height:172px; transform:rotate(-90deg); }
  .ringbg{ fill:none; stroke:rgba(255,255,255,0.07); stroke-width:11; }
  .ringfill{ fill:none; stroke:var(--sc); stroke-width:11; stroke-linecap:round; filter:drop-shadow(0 0 7px color-mix(in srgb,var(--sc) 75%,transparent)); transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1); }
  .ringctr{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ringctr .ic{ width:30px; height:30px; color:var(--sc); margin-bottom:4px; }
  .ringctr .ic svg{ width:30px; height:30px; }
  .ringctr .sv{ font-size:40px; font-weight:900; line-height:1; letter-spacing:-0.02em; }
  .ringctr .sv small{ font-size:16px; font-weight:800; color:var(--dim); }
  .hname{ margin-top:14px; font-size:23px; font-weight:900; letter-spacing:-0.01em; }
  .hname .hsub{ font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:color-mix(in srgb,var(--sc,#4A8FFF) 70%,#cfd6e6); vertical-align:middle; margin-left:5px; }
  .hlvl{ display:inline-block; margin-top:7px; font-size:9.5px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--sc); padding:4px 11px; border-radius:999px; border:1px solid color-mix(in srgb,var(--sc) 40%,transparent); background:color-mix(in srgb,var(--sc) 8%,transparent); }
  .hblurb{ margin:11px auto 0; max-width:280px; font-size:13px; line-height:1.5; color:var(--muted); }

  /* stat switcher */
  .switch{ display:flex; gap:8px; overflow-x:auto; padding:2px 0 4px; margin-top:16px; } .switch::-webkit-scrollbar{ display:none; }
  .sw{ flex:none; display:inline-flex; align-items:center; gap:7px; padding:8px 12px; border-radius:999px; font-size:12px; font-weight:800; color:var(--muted); background:var(--bg-card); border:1px solid var(--border); cursor:pointer; text-decoration:none; white-space:nowrap; transition:.18s; }
  .sw svg{ width:14px; height:14px; }
  .sw.on{ color:#04040c; background:var(--swc); border-color:transparent; box-shadow:0 6px 16px color-mix(in srgb,var(--swc) 35%,transparent); }

  .sec { display:flex; align-items:center; justify-content:space-between; margin:20px 2px 11px; }
  .sec h2 { margin:0; font-size:12.5px; font-weight:800; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); }
  .sec .meta { font-size:12px; font-weight:800; color:var(--dim); }

  /* how to raise */
  .raise{ display:flex; flex-direction:column; gap:9px; }
  .ract{ display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:15px; background:var(--bg-card); border:1px solid var(--border); text-decoration:none; color:inherit; transition:border-color .2s, transform .12s; }
  .ract:active{ transform:scale(.99); }
  .ract .ri{ width:34px; height:34px; flex:none; border-radius:10px; display:flex; align-items:center; justify-content:center; background:color-mix(in srgb,var(--sc) 14%,transparent); border:1px solid color-mix(in srgb,var(--sc) 30%,transparent); }
  .ract .ri svg{ width:18px; height:18px; color:var(--sc); }
  .ract .rt{ flex:1; min-width:0; } .ract .rt b{ font-size:13.5px; font-weight:800; display:block; }
  .ract .rt span{ font-size:11.5px; color:var(--muted); }
  .ract .rg{ font-size:11px; font-weight:900; color:var(--sc); padding:4px 9px; border-radius:999px; background:color-mix(in srgb,var(--sc) 12%,transparent); border:1px solid color-mix(in srgb,var(--sc) 28%,transparent); white-space:nowrap; }

  /* recent gains */
  .gains{ display:flex; flex-direction:column; gap:8px; }
  .gain{ display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:13px; background:var(--bg-card); border:1px solid var(--border); }
  .gain .gd{ width:8px; height:8px; border-radius:50%; background:var(--sc); box-shadow:0 0 8px var(--sc); flex:none; }
  .gain .gt{ flex:1; min-width:0; font-size:13px; font-weight:700; }
  .gain .gw{ font-size:11px; color:var(--dim); }
  .gain .gv{ font-size:12.5px; font-weight:900; color:var(--good); }
  .empty{ text-align:center; padding:26px 18px; border-radius:16px; background:var(--bg-card); border:1px dashed var(--border); }
  .empty .et{ font-size:13.5px; font-weight:800; } .empty .ed{ font-size:12px; color:var(--muted); margin-top:5px; }

  /* nav */
  .nav { position:absolute; left:0; right:0; bottom:0; z-index:50; padding:10px 12px 26px; display:flex; justify-content:space-around; align-items:flex-end; background:linear-gradient(180deg, rgba(5,6,14,0) 0%, rgba(5,6,14,0.88) 34%, #04040c 100%); backdrop-filter:blur(14px); }
  .nav a { background:none; border:none; font:inherit; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 8px; min-width:48px; min-height:44px; text-decoration:none; color:var(--dim); transition:color .2s; }
  .nav svg{ width:23px; height:23px; } .nav .nl{ font-size:10px; font-weight:800; }
  .nav .item.active{ color:var(--text); } .nav .item.active svg{ color:var(--accent); filter:drop-shadow(0 0 8px rgba(74,143,255,.75)); }
</style>
</head>
<body>
  <div class="phone">
    <div class="bg"></div><div class="aurora"></div><div class="stars" id="stars"></div><div class="notch"></div>

    <div class="frame">
      <div class="topbar">
        <a class="back" data-fallback="20-dashboard.html" href="20-dashboard.html" aria-label="Back to dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
        <span class="ttl">Life Score</span>
        <a class="coinchip" href="27-shop.html" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4"/></svg><span id="coinTop">0</span></a>
      </div>

      <div class="scroll">
        <div class="hero" id="hero">
          <div class="ringwrap">
            <svg viewBox="0 0 172 172"><circle class="ringbg" cx="86" cy="86" r="74"/><circle class="ringfill" id="ring" cx="86" cy="86" r="74"/></svg>
            <div class="ringctr"><div class="ic" id="heroIc"></div><div class="sv"><span id="heroVal">0</span><small>/100</small></div></div>
          </div>
          <div class="hname" id="heroName">Stat</div>
          <div class="hlvl" id="heroLvl">Level 1</div>
          <div class="hblurb" id="heroBlurb"></div>
        </div>

        <div class="switch" id="switch"></div>

        <div class="sec"><h2>How to raise it</h2><span class="meta">+ score on complete</span></div>
        <div class="raise" id="raise"></div>

        <div class="sec"><h2>Recent gains</h2></div>
        <div class="gains" id="gains"></div>
      </div>

      <nav class="nav" aria-label="Primary">
        <a class="item active" href="20-dashboard.html" aria-current="page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 11l9-7 9 7M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/></svg>
          <span class="nl">Home</span>
        </a>
        <a class="item" href="21-quests.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 5h11M9 12h11M9 19h11M4 5l1 1 2-2M4 12l1 1 2-2M4 19l1 1 2-2"/></svg>
          <span class="nl">Quests</span>
        </a>
        <a class="item" href="coach.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
          <span class="nl">Coach</span>
        </a>
        <a class="item" href="community.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M7 8h10M7 11h7M7 14h5" stroke-linecap="round"/></svg>
          <span class="nl">Community</span>
        </a>
        <a class="item" href="24-more.html">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2.5"/><circle cx="12" cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/></svg>
          <span class="nl">More</span>
        </a>
      </nav>
      <div class="home-indicator"></div>
    </div>
  </div>

  <script src="_lib/core-state.js"></script>
  <script src="_lib/core-back.js"></script>
  <script>
  (function(){
    var S=window.coreState, qs=function(s){return document.querySelector(s);};
    try{ if(/[?&]demo=1/.test(location.search)) S.seedDemo(); }catch(e){}

    (function(){ var h=document.getElementById('stars'); if(!h) return; var f=document.createDocumentFragment();
      for(var i=0;i<46;i++){ var d=document.createElement('span'); d.className='star'; var sz=(i%7===0)?2.2:(i%3===0)?1.6:1.0;
        d.style.width=sz+'px'; d.style.height=sz+'px'; d.style.left=((i*37)%100)+'%'; d.style.top=((i*53)%100)+'%';
        d.style.setProperty('--d',(3+(i%5))+'s'); d.style.setProperty('--del',((i%9)*0.4)+'s'); f.appendChild(d); }
      h.appendChild(f); })();

    var ICONS={
      strength:'<path d="M6 7v10M3 9.5v5M18 7v10M21 9.5v5M6 12h12"/>',
      focus:'<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.2"/><path d="M12 1.5v3M12 19.5v3M22.5 12h-3M4.5 12h-3"/>',
      wealth:'<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v9M9.6 10h4a1.6 1.6 0 0 1 0 3.2h-3.2a1.6 1.6 0 0 0 0 3.2h4.2"/>',
      health:'<path d="M12 20.5s-7.2-4.6-7.2-9.8A4.6 4.6 0 0 1 12 7a4.6 4.6 0 0 1 7.2 3.7c0 5.2-7.2 9.8-7.2 9.8Z"/>',
      social:'<circle cx="9" cy="8" r="3.2"/><path d="M3.4 20a5.6 5.6 0 0 1 11.2 0M16 5.2a3.2 3.2 0 0 1 0 6M18.7 20a5.6 5.6 0 0 0-3.1-5"/>',
      purpose:'<circle cx="12" cy="12" r="8.5"/><path d="M15.6 8.4l-2.1 5.1-5.1 2.1 2.1-5.1z"/>'
    };
    // what raises each stat — drives the "How to raise it" list (links to quests)
    var ACTIONS={
      strength:[{t:'Complete a workout',d:'Train, lift or move your body',g:3},{t:'Hit a step goal',d:'10k steps or a long walk',g:1}],
      focus:[{t:'A focused work session',d:'25–60 min, no distractions',g:2},{t:'Read 10 pages',d:'Learn something new',g:1}],
      wealth:[{t:'Step toward your income',d:'One real action that earns',g:2},{t:'Track or save money',d:'Log spend or move to savings',g:1}],
      health:[{t:'Hydrate & take a break',d:'Water + a genuine reset',g:2},{t:'Sleep on time tonight',d:'Protect your recovery',g:2}],
      social:[{t:'Reach out to someone',d:'Message or call a person you value',g:2},{t:'Show up in person',d:'Real-world connection',g:3}],
      purpose:[{t:'Improve your future',d:'One task your future self thanks you for',g:3},{t:'Plan tomorrow tonight',d:'Write your top 3',g:1}]
    };
    var REASON={ strength:'Strength quest', focus:'Focus quest', wealth:'Wealth quest', health:'Health quest', social:'Social quest', purpose:'Purpose quest' };

    function param(){ try{ var m=location.search.match(/[?&]s=([a-z]+)/i); return m?m[1].toLowerCase():''; }catch(e){ return ''; } }
    var defs=S.STAT_DEFS||[];
    function pick(){ var p=param(); var d=defs.filter(function(x){return x.key===p;})[0]; return d||defs[0]; }
    var cur=pick();

    function statLevel(v){ return Math.floor((v||0)/15)+1; }
    function timeAgo(ts){ var s=Math.max(1,Math.floor((Date.now()-ts)/1000)); if(s<60)return s+'s ago'; var m=Math.floor(s/60); if(m<60)return m+'m ago'; var h=Math.floor(m/60); if(h<24)return h+'h ago'; return Math.floor(h/24)+'d ago'; }

    function render(){
      cur=pick();
      var color=cur.color, v=S.statValue(cur.key), lvl=statLevel(v);
      document.documentElement.style.setProperty('--sc',color);
      qs('#coinTop').textContent=(S.read().coins||0).toLocaleString();

      qs('#heroIc').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+(cur.icon||ICONS[cur.key]||'')+'</svg>';
      qs('#heroName').innerHTML=cur.name+(cur.sub?' <span class="hsub">'+cur.sub+'</span>':'');
      qs('#heroLvl').textContent='Level '+lvl;
      qs('#heroBlurb').textContent=cur.blurb;

      // ring
      var R=74, C=2*Math.PI*R, ring=qs('#ring'); ring.style.strokeDasharray=C.toFixed(1);
      ring.style.strokeDashoffset=C.toFixed(1);
      requestAnimationFrame(function(){ ring.style.strokeDashoffset=(C*(1-Math.max(0,Math.min(100,v))/100)).toFixed(1); });
      // count up value
      var ve=qs('#heroVal'), from=0, st=null, dur=900;
      function step(t){ if(!st)st=t; var p=Math.min(1,(t-st)/dur); ve.textContent=Math.round(from+(v-from)*(1-Math.pow(1-p,3))); if(p<1) requestAnimationFrame(step); }
      requestAnimationFrame(step);

      // switcher
      var sw=qs('#switch'); sw.innerHTML='';
      defs.forEach(function(d){ var a=document.createElement('a'); a.className='sw'+(d.key===cur.key?' on':''); a.href=(d.page || ('stat.html?s='+d.key)); /* data-driven off STAT_DEFS; don't hardcode per-stat ternaries */
        a.style.setProperty('--swc',d.color);
        a.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+(d.icon||ICONS[d.key]||'')+'</svg>'+d.name;
        sw.appendChild(a); });
      var on=sw.querySelector('.sw.on'); if(on) on.scrollIntoView({inline:'center',block:'nearest'});

      // how to raise
      var raise=qs('#raise'); raise.innerHTML='';
      (ACTIONS[cur.key]||[]).forEach(function(a){
        var el=document.createElement('a'); el.className='ract'; el.href='21-quests.html';
        el.innerHTML='<div class="ri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+(cur.icon||ICONS[cur.key]||'')+'</svg></div>'+
          '<div class="rt"><b>'+a.t+'</b><span>'+a.d+'</span></div><div class="rg">+'+a.g+'</div>';
        raise.appendChild(el);
      });

      // recent gains (from statLedger, filtered to this stat's model key)
      var model=cur.model, led=(S.read().statLedger||[]).filter(function(e){return e.stat===model && e.delta>0;}).slice(0,8);
      var g=qs('#gains');
      if(!led.length){ g.innerHTML='<div class="empty"><div class="et">No gains yet</div><div class="ed">Complete a '+cur.name+' quest to raise this score.</div></div>'; }
      else { g.innerHTML=''; led.forEach(function(e){ var el=document.createElement('div'); el.className='gain';
        el.innerHTML='<span class="gd"></span><div class="gt">'+(REASON[cur.key]||'Quest')+'</div><div class="gw">'+timeAgo(e.ts)+'</div><div class="gv">+'+e.delta+'</div>';
        g.appendChild(el); }); }
    }

    window.addEventListener('core:progress-updated', render);
    window.addEventListener('storage', function(e){ if(!e.key || /^core/.test(e.key)) render(); });
    render();
  })();
  </script>
</body>
</html>
