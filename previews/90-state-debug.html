<body>
  <h1>CORE state debug</h1>
  <div class="sub">Edit any <code>core*</code> localStorage key directly. Changes broadcast to every open tab via the storage event.</div>

  <div class="bar">
    <button class="primary" onclick="addKey()">+ Add key</button>
    <button onclick="refresh()">↻ Refresh</button>
    <button onclick="resetCoreState()">Reset coreState.v1 to defaults</button>
    <button class="danger" onclick="wipeAll()">⚠ Wipe ALL core* keys</button>
    <button onclick="window.location.href='97-gallery.html'">← Gallery</button>
  </div>

  <table id="kvTable">
    <thead><tr><th style="width:38%;">key</th><th>value</th><th style="width:120px;">actions</th></tr></thead>
    <tbody></tbody>
  </table>

  <div class="section-h">coreState.v1 (parsed)</div>
  <pre id="stateDump">{}</pre>

  <div class="note">file:// only · this screen is blocked on any deployed origin.</div>

<script>
  function listKeys() {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (k.toLowerCase().startsWith('core')) out.push(k);
    }
    out.sort();
    return out;
  }
  function refresh() {
    const tbody = document.querySelector('#kvTable tbody');
    tbody.innerHTML = '';
    listKeys().forEach((k) => {
      const tr = document.createElement('tr');
      const v = localStorage.getItem(k) || '';
      tr.innerHTML = '<td class="key">' + k + '</td>' +
        '<td class="val"><input class="edit" data-key="' + k + '" value="' + escapeAttr(v) + '"/></td>' +
        '<td class="actions">' +
          '<button class="small" data-save="' + k + '">save</button>' +
          '<button class="small danger" data-del="' + k + '">delete</button>' +
        '</td>';
      tbody.appendChild(tr);
    });
    // wire buttons
    tbody.querySelectorAll('button[data-save]').forEach(b => {
      b.onclick = () => {
        const k = b.dataset.save;
        const v = tbody.querySelector('input[data-key="' + k + '"]').value;
        localStorage.setItem(k, v);
        refresh();
      };
    });
    tbody.querySelectorAll('button[data-del]').forEach(b => {
      b.onclick = () => {
        if (!confirm('Delete ' + b.dataset.del + '?')) return;
        localStorage.removeItem(b.dataset.del);
        refresh();
      };
    });
    // state dump
    let dump;
    try { dump = JSON.stringify(JSON.parse(localStorage.getItem('coreState.v1') || '{}'), null, 2); }
    catch(e) { dump = '(invalid JSON in coreState.v1)'; }
    document.getElementById('stateDump').textContent = dump;
  }
  function escapeAttr(v) { return String(v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function addKey() {
    const k = prompt('Key name (must start with "core"):');
    if (!k) return;
    if (!k.toLowerCase().startsWith('core')) { alert('Key must start with "core"'); return; }
    localStorage.setItem(k, '');
    refresh();
  }
  function resetCoreState() {
    if (!confirm('Reset coreState.v1 to defaults? (other core* keys preserved)')) return;
    if (window.coreState) coreState.resetAll();
    refresh();
  }
  function wipeAll() {
    if (!confirm('Wipe every core* key from localStorage? This cannot be undone.')) return;
    listKeys().forEach(k => localStorage.removeItem(k));
    refresh();
  }
  window.addEventListener('storage', refresh);
  refresh();
</script>
</body>
