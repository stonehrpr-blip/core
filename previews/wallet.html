<!doctype html>

<meta charset="utf-8" />
<title>CORE — Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root {
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.035); --bg-card-2:rgba(255,255,255,0.07);
    --border:rgba(255,255,255,0.08); --text:#F8FAFE; --muted:#9AA1B7; --dim:#5A6075;
    --blue:#0A84FF; --blue-3:#5BB1FF; --good:#34D399;
    --coin:#FFCB52; --coin-2:#FFE08A; --shard:#3FE0D0; --shard-2:#9BF3EA; --ticket:#FF8A4C; --ticket-2:#FFB58A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{min-height:100vh;background:#0A0A14;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}
  .phone{position:relative;width:390px;height:844px;background:var(--bg-base);border-radius:56px;overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:60;}

  #ambBg{position:absolute;inset:0;z-index:0;background:
      radial-gradient(60% 35% at 50% 30%,rgba(47,143,255,0.18) 0%,transparent 55%),
      radial-gradient(50% 30% at 50% 100%,rgba(159,143,255,0.10) 0%,transparent 65%),
      linear-gradient(180deg,#060B26 0%,#02020A 50%,#050510 100%);transition:background 2.4s ease;}
  #ambAurora{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.20;mix-blend-mode:screen;}
  #ambAurora::before,#ambAurora::after{content:"";position:absolute;border-radius:50%;filter:blur(40px);will-change:transform,opacity;}
  #ambAurora::before{width:80%;height:45%;left:-10%;top:8%;background:radial-gradient(circle,rgba(47,143,255,0.38),transparent 70%);animation:auroraDriftA 24s ease-in-out infinite;}
  #ambAurora::after{width:70%;height:40%;right:-10%;bottom:16%;background:radial-gradient(circle,rgba(47,143,255,0.30),transparent 70%);animation:auroraDriftB 30s ease-in-out -15s infinite;}
  @keyframes auroraDriftA{0%,100%{transform:translate(0,0) scale(1);opacity:.45;}50%{transform:translate(40px,-22px) scale(1.12);opacity:.75;}}
  @keyframes auroraDriftB{0%,100%{transform:translate(0,0) scale(1);opacity:.40;}50%{transform:translate(-30px,18px) scale(1.10);opacity:.70;}}
  #ambStars{position:absolute;inset:-2%;pointer-events:none;z-index:2;}
  #ambCelestial{position:absolute;inset:0;pointer-events:none;z-index:3;}
  @media(prefers-reduced-motion:reduce){#ambAurora::before,#ambAurora::after{animation:none!important;}}

  .frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:54px 0 0;}
  .scroll{flex:1;overflow-y:auto;padding:0 18px 112px;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}

  .topbar{position:relative;display:flex;align-items:center;gap:9px;padding:2px 18px 10px;}
  .iconbtn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg-card);border:1px solid var(--border);color:var(--text);text-decoration:none;cursor:pointer;flex:none;transition:.16s;}
  .iconbtn:hover{background:var(--bg-card-2);} .iconbtn svg{width:19px;height:19px;}
  .topbar .ttl{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.30em;text-transform:uppercase;}
  .topbar .ttl .dot{width:6px;height:6px;border-radius:50%;background:var(--blue);box-shadow:0 0 9px var(--blue);}
  .helpbtn{font-size:14px;font-weight:800;color:var(--muted);} .helpbtn:hover{background:rgba(10,132,255,0.14);color:var(--blue);border-color:rgba(10,132,255,0.35);}
  .spacer{flex:1;}

  /* segmented currency switch */
  .seg{display:flex;gap:4px;margin:2px 0 4px;padding:4px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
  .seg button{flex:1;border:none;background:none;font:inherit;cursor:pointer;padding:9px 4px;border-radius:10px;font-size:12.5px;font-weight:800;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px;transition:.18s;}
  .seg button svg{width:15px;height:15px;}
  .seg button.on.coins{color:#1c1402;background:linear-gradient(135deg,var(--coin-2),var(--coin));}
  .seg button.on.shards{color:#04211d;background:linear-gradient(135deg,var(--shard-2),var(--shard));}
  .seg button.on.tickets{color:#2b1206;background:linear-gradient(135deg,var(--ticket-2),var(--ticket));}

  /* hero balance card */
  .hero{position:relative;margin-top:14px;border-radius:24px;padding:22px;overflow:hidden;border:none;background:transparent;backdrop-filter:none;}
  .hero::after{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;background:radial-gradient(70% 60% at 50% 0%,var(--accentglow,rgba(255,203,82,0.18)),transparent 70%);}
  .hero .hl{position:relative;z-index:1;display:flex;align-items:center;gap:10px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
  .hero .hic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
  .hero .hic svg{width:20px;height:20px;}
  .hero .hbal{position:relative;z-index:1;font-size:42px;font-weight:900;letter-spacing:-0.02em;margin-top:14px;font-variant-numeric:tabular-nums;}
  .hero .hsub{position:relative;z-index:1;font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.4;}
  .hero.coins .hic{background:rgba(255,203,82,0.15);color:var(--coin);} .hero.coins .hbal{color:var(--coin-2);}
  .hero.shards .hic{background:rgba(63,224,208,0.15);color:var(--shard);} .hero.shards .hbal{color:var(--shard-2);}
  .hero.tickets .hic{background:rgba(255,138,76,0.15);color:var(--ticket);} .hero.tickets .hbal{color:var(--ticket-2);}

  .sec{margin:22px 2px 11px;display:flex;align-items:center;justify-content:space-between;}
  .sec .st{font-size:14px;font-weight:900;display:flex;align-items:center;gap:8px;}
  .sec .st svg{width:15px;height:15px;color:var(--muted);}
  .sec .ss{font-size:11px;font-weight:700;color:var(--dim);}

  .panel{border-radius:18px;padding:15px;background:transparent;border:none;backdrop-filter:none;}

  /* coin packs */
  .packs{display:flex;gap:9px;}
  .pack{flex:1;border-radius:16px;padding:15px 11px;background:rgba(255,255,255,0.022);border:1px solid var(--border);text-align:center;position:relative;cursor:pointer;transition:transform .15s,border-color .2s;}
  .pack:active{transform:scale(.97);} .pack.best{border-color:rgba(255,203,82,0.4);}
  .pack .bestpill{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#2b1f06;background:linear-gradient(135deg,var(--coin-2),var(--coin));padding:3px 8px;border-radius:999px;white-space:nowrap;}
  .pack .pc{width:34px;height:34px;margin:2px auto 0;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,203,82,0.14);color:var(--coin);}
  .pack .pc.shards{background:rgba(70,199,190,0.14);color:var(--shard);} .pack .pc.tickets{background:rgba(229,137,78,0.14);color:var(--ticket);}
  .pack .pc svg{width:20px;height:20px;}
  .pack .pamt{font-size:15px;font-weight:900;color:var(--text);margin-top:9px;font-variant-numeric:tabular-nums;}
  /* coins -> currency exchange rows */
  .exch{display:flex;flex-direction:column;gap:8px;}
  .exrow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:13px;background:rgba(255,255,255,0.022);border:1px solid var(--border);cursor:pointer;transition:background .15s;}
  .exrow:active{background:var(--card-2);} .exrow.off{opacity:.5;}
  .exrow .exc{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;}
  .exrow .exc svg{width:15px;height:15px;}
  .exrow .exc.coins{color:var(--coin);} .exrow .exc.shards{color:var(--shard);} .exrow .exc.tickets{color:var(--ticket);}
  .exrow .exar{width:16px;height:16px;color:var(--dim);}
  .exrow .exbonus{font-size:9.5px;font-weight:800;color:var(--good);background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.28);border-radius:6px;padding:2px 6px;}
  .exrow .exbtn{margin-left:auto;font-size:11.5px;font-weight:800;color:var(--blue);}
  .exrow.off .exbtn{color:var(--dim);} .exrow.off .exbonus{opacity:.5;}
  .pack .pbonus{font-size:9.5px;font-weight:800;color:var(--good);margin-top:3px;}
  .pack .pusd{font-size:12px;font-weight:800;color:var(--text);margin-top:9px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:999px;padding:6px 0;}

  /* earned-only notice */
  .earnedonly{display:flex;gap:11px;align-items:flex-start;}
  .earnedonly .eic{width:38px;height:38px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);}
  .earnedonly .eic svg{width:19px;height:19px;color:var(--muted);}
  .earnedonly .et{font-size:13px;font-weight:800;}
  .earnedonly .ed{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5;}

  /* gift */
  .friends{display:flex;gap:9px;overflow-x:auto;padding:2px 0 6px;} .friends::-webkit-scrollbar{display:none;}
  .friend{flex:none;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;width:62px;}
  .friend .fav{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#cdd6e6;background:linear-gradient(150deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));border:2px solid var(--border);transition:.18s;}
  .friend.on .fav{border-color:var(--blue);box-shadow:0 0 16px rgba(10,132,255,0.4);}
  .friend .fn{font-size:9.5px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;}
  .friend.on .fn{color:var(--text);}
  .amtrow{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .stepper{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;flex:1;background:rgba(255,255,255,0.03);}
  .stepper button{border:none;background:none;color:var(--text);font:inherit;font-size:20px;font-weight:800;width:44px;height:48px;cursor:pointer;}
  .stepper button:active{background:rgba(255,255,255,0.06);}
  .stepper input{flex:1;border:none;background:none;color:var(--text);font:inherit;font-size:17px;font-weight:900;text-align:center;-moz-appearance:textfield;}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .quick{display:flex;gap:7px;margin-top:11px;}
  .quick button{flex:1;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);font:inherit;font-size:12px;font-weight:800;padding:8px 0;border-radius:10px;cursor:pointer;}
  .quick button:active{background:rgba(255,255,255,0.08);}

  .btn{border:none;cursor:pointer;font:inherit;font-weight:800;border-radius:13px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:filter .2s,transform .12s,opacity .2s;padding:14px;font-size:14px;width:100%;}
  .btn:active{transform:scale(.985);} .btn svg{width:16px;height:16px;}
  .btn.send{margin-top:14px;color:#fff;background:linear-gradient(135deg,var(--blue),#3F8BFF);box-shadow:0 8px 20px rgba(10,132,255,.32);}
  .btn.send:disabled{background:rgba(255,255,255,0.06);color:var(--dim);box-shadow:none;cursor:default;}
  .btn.ghost{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border);}

  /* how to earn */
  .earn-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
  .earn-row:last-child{border-bottom:none;padding-bottom:0;} .earn-row:first-child{padding-top:0;}
  .earn-row .ei{width:30px;height:30px;flex:none;border-radius:9px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);color:var(--blue-3);}
  .earn-row .ei svg{width:16px;height:16px;}
  .earn-row .en{font-size:12.5px;font-weight:700;line-height:1.4;} .earn-row .en b{color:var(--text);}

  /* ledger */
  .ledger .lrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;}
  .ledger .lrow:last-child{border-bottom:none;}
  .ledger .lic{width:26px;height:26px;flex:none;border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .ledger .lic svg{width:13px;height:13px;}
  .ledger .lic.coins{background:rgba(255,203,82,0.12);color:var(--coin);}
  .ledger .lic.shards{background:rgba(63,224,208,0.12);color:var(--shard);}
  .ledger .lic.tickets{background:rgba(255,138,76,0.12);color:var(--ticket);}
  .ledger .ll{flex:1;min-width:0;} .ledger .ln{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .ledger .lt{font-size:10px;color:var(--dim);margin-top:2px;}
  .ledger .ld{font-weight:900;font-variant-numeric:tabular-nums;} .ledger .ld.pos{color:var(--good);} .ledger .ld.neg{color:var(--muted);}
  .ledger .empty{font-size:12px;color:var(--dim);text-align:center;padding:14px 0;}

  /* nav */
  .nav{position:absolute;left:0;right:0;bottom:0;z-index:50;padding:10px 12px 26px;display:flex;justify-content:space-around;align-items:flex-end;background:linear-gradient(180deg,rgba(5,6,14,0) 0%,rgba(5,6,14,0.88) 34%,#04040c 100%);backdrop-filter:blur(14px);}
  .nav a{background:none;border:none;font:inherit;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;min-width:48px;min-height:44px;text-decoration:none;color:var(--dim);transition:color .2s;}
  .nav svg{width:23px;height:23px;} .nav .nl{font-size:10px;font-weight:800;}
  .nav .item.active{color:var(--text);} .nav .item.active svg{color:var(--blue);}

  .toast{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(16px);z-index:70;background:rgba(20,22,34,0.97);border:1px solid var(--border);border-radius:14px;padding:12px 18px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:.32s cubic-bezier(.2,.9,.3,1);box-shadow:0 12px 34px rgba(0,0,0,.55);white-space:nowrap;display:flex;align-items:center;gap:8px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.good{border-color:rgba(52,211,153,0.4);} .toast.good svg{width:15px;height:15px;color:var(--good);}
  .toast.warn{border-color:rgba(255,138,76,0.4);} .toast.warn svg{width:15px;height:15px;color:var(--ticket);}

  /* confirm sheet */
  .scrim{position:absolute;inset:0;z-index:80;background:rgba(2,2,10,0.62);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .26s;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:81;border-radius:26px 26px 0 0;background:#0B0D18;border:1px solid var(--border);border-bottom:none;padding:8px 20px 28px;transform:translateY(110%);transition:transform .3s cubic-bezier(.2,.9,.3,1);}
  .sheet.open{transform:translateY(0);}
  .grip{width:38px;height:5px;border-radius:999px;background:rgba(255,255,255,0.18);margin:0 auto 12px;}
  .sheet h3{margin:0;font-size:18px;font-weight:900;}
  .sheet .cb{font-size:13px;color:var(--muted);line-height:1.55;margin:14px 0 18px;} .sheet .cb b{color:var(--text);}
  .sheet-actions{display:flex;gap:10px;margin-top:6px;} .sheet-actions .btn{flex:1;}
</style>

    <div id="ambBg"></div><div id="ambAurora"></div><div id="ambStars"></div><div id="ambCelestial"></div>
    <div class="notch"></div>

    <div class="frame">
      <div class="topbar">
        <a class="iconbtn back" href="27-shop.html" data-fallback="27-shop.html" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
        <span class="ttl"><span class="dot"></span>Wallet</span>

        <a class="item" href="21-quests.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 5h11M9 12h11M9 19h11M4 5l1 1 2-2M4 12l1 1 2-2M4 19l1 1 2-2"/></svg><span class="nl">Quests</span></a>
        <a class="item" href="coach.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="nl">Coach</span></a>
        <a class="item" href="community.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="nl">Community</span></a>
        <a class="item active" href="24-more.html" aria-current="page"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2.5"/><circle cx="12" cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/></svg><span class="nl">More</span></a>
      </nav>
      <div class="home-indicator"></div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="scrim" id="scrim"></div>
    <div class="sheet" id="sheet"></div>
  </div>

  <script>
  (function(){
    var S=window.coreState, qs=function(s){return document.querySelector(s);};
    function lget(k,d){ try{ var v=localStorage.getItem(k); return (v===null||v==='')?d:v; }catch(e){ return d; } }
    function lset(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
    function ig(k,d){ var v=parseInt(lget(k,''),10); return isNaN(v)?d:v; }
    function jget(k,d){ try{ var v=JSON.parse(localStorage.getItem(k)||'null'); return v==null?d:v; }catch(e){ return d; } }
    function jset(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
    function SFX(n){ try{ if(typeof window.coreSfx==='function') window.coreSfx(n); }catch(e){} }

    function coins(){ return (S.read().coins)||0; }
    function shards(){ return (S.read().shards)||0; }
    function tickets(){ return ig('coreTickets',0); }
    function bal(c){ return c==='shards'?shards():c==='tickets'?tickets():coins(); }
    function dispatch(){ try{ window.dispatchEvent(new CustomEvent('core:progress-updated',{detail:{source:'wallet'}})); }catch(e){} }

    var LEDGER_KEY='coreCoinLedger.v1';
    function rec(cur,delta,label){ var a=jget(LEDGER_KEY,[]); if(!Array.isArray(a)) a=[]; a.unshift({ts:Date.now(),cur:cur,delta:delta,label:label}); if(a.length>60) a.length=60; jset(LEDGER_KEY,a); }
    function timeAgo(ts){ var s=Math.floor((Date.now()-ts)/1000); if(s<60) return 'just now'; var m=Math.floor(s/60); if(m<60) return m+'m ago'; var h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }

    function ICOIN(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4"/></svg>'; }
    function ISHARD(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M6 3h12l3 6-9 12L3 9z"/><path d="M3 9h18M9 3l3 18M15 3l-3 6"/></svg>'; }
    function ITICKET(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4z"/><path d="M14 6v12" stroke-dasharray="2 2.4"/></svg>'; }
    function curSvg(c){ return c==='shards'?ISHARD():c==='tickets'?ITICKET():ICOIN(); }
    function CIicon(){ return ICOIN(); }

    var META={
      coins:  { label:'Coins',   sub:'Grind currency. Earned from quests & streaks — or topped up below.', glow:'rgba(255,203,82,0.18)' },
      shards: { label:'Shards',  sub:'Prestige currency. Earn it, convert coins, or top up below.', glow:'rgba(63,224,208,0.18)' },
      tickets:{ label:'Tickets', sub:'Loot currency for opening chests. Earn it, convert coins, or top up below.', glow:'rgba(255,138,76,0.18)' }
    };
    // real-money packs (amt = amount of THAT currency) — Apple Pay, confirm-gated
    var PACKS={
      coins:  [{amt:600,usd:'0.99',label:'Pouch'},{amt:3500,usd:'3.99',label:'Stack',bonus:'+10% bonus',best:true},{amt:10000,usd:'9.99',label:'Vault',bonus:'+25% bonus'}],
      shards: [{amt:50,usd:'1.99',label:'Handful'},{amt:150,usd:'4.99',label:'Pouch',bonus:'+15% bonus',best:true},{amt:400,usd:'9.99',label:'Trove',bonus:'+30% bonus'}],
      tickets:[{amt:5,usd:'0.99',label:'Few'},{amt:15,usd:'2.99',label:'Roll',bonus:'+10% bonus',best:true},{amt:40,usd:'6.99',label:'Crate',bonus:'+25% bonus'}]
    };
    // in-game exchange: spend coins to get shards / tickets. Bigger tiers give a
    // better rate (a real bonus), but it stays priced so it never out-earns a chest.
    var EXCHANGE={
      shards: [{coins:500,amt:10},{coins:1500,amt:33,bonus:'+10%'},{coins:4000,amt:100,bonus:'+25%'}],
      tickets:[{coins:400,amt:2},{coins:1500,amt:9,bonus:'+15%'},{coins:3000,amt:20,bonus:'+33%'}]
    };
    var EXCHANGE_CONFIRM_AT=1500;   // small conversions are one-tap; big ones confirm first

    var EARN={
      coins:[['Daily quests','<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>'],['Keep your streak','<path d="M12 2c1 3-1 4-1 6 0 1 1 2 1 2s2-1 2-3c2 2 3 4 3 7a5 5 0 0 1-10 0c0-3 2-5 3-7Z"/>'],['Level up your rank','<path d="M13 2L3 14h7l-1 8 10-12h-7l1-8Z"/>'],['Daily login bonus','<circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/>']],
      shards:[['Rank milestones','<path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/>'],['Long streak milestones (7 / 30 / 100)','<path d="M12 2c1 3-1 4-1 6 0 1 1 2 1 2s2-1 2-3c2 2 3 4 3 7a5 5 0 0 1-10 0c0-3 2-5 3-7Z"/>'],['Achievements','<path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6z"/><path d="M9 11.5l2 2 4-4.5"/>'],['CORE Plus monthly grant','<path d="M5 16l-2-9 6 4 3-6 3 6 6-4-2 9z"/>']],
      tickets:[['Claim the free chest','<path d="M3 9l2-4h14l2 4M3 9v9a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9M3 9h18M12 9v3"/>'],['Streak rewards','<path d="M12 2c1 3-1 4-1 6 0 1 1 2 1 2s2-1 2-3c2 2 3 4 3 7a5 5 0 0 1-10 0c0-3 2-5 3-7Z"/>'],['Daily login','<circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/>'],['Open Epic+ chests','<path d="M3 9l2-4h14l2 4M3 9v9h18V9M3 9h18M12 9v3"/>'],['CORE Plus monthly grant','<path d="M5 16l-2-9 6 4 3-6 3 6 6-4-2 9z"/>']]
    };

    function friends(){ var f=jget('coreFriends',[]); return Array.isArray(f)?f:[]; }
    function friendName(id){ return String(id).replace(/^CORE-/,''); }

    var cur = (location.search.match(/[?&]cur=(coins|shards|tickets)/)||[])[1] || 'coins';
    var giftFriend=null, giftAmt=0;

    var toastT; function toast(m,kind){ var t=qs('#toast'); var ic=kind==='good'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4 4 10-11"/></svg>':kind==='warn'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>':''; t.className='toast show'+(kind?' '+kind:''); t.innerHTML=ic+'<span>'+m+'</span>'; clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},2000); }

    // ── sheet ──
    var pending=null;
    function showSheet(html){ qs('#sheet').innerHTML=html; qs('#scrim').classList.add('open'); qs('#sheet').classList.add('open'); }
    function closeSheet(){ qs('#scrim').classList.remove('open'); qs('#sheet').classList.remove('open'); pending=null; }
    qs('#scrim').addEventListener('click', closeSheet);
    qs('#sheet').addEventListener('click', function(e){ var b=e.target.closest('[data-s]'); if(!b) return; var a=b.dataset.s; if(a==='cancel') closeSheet(); else if(a==='confirm'){ var fn=pending; closeSheet(); if(fn) fn(); } });
    function confirmSheet(o){ showSheet('<div class="grip"></div><h3>'+o.title+'</h3><p class="cb">'+o.body+'</p><div class="sheet-actions"><button class="btn ghost" data-s="cancel">Cancel</button><button class="btn send" data-s="confirm">'+o.cta+'</button></div>'); pending=o.onConfirm; }

    // ── credit / spend (any currency, persisted to the keys the app reads) ──
    function creditCur(c,amount){
      if(c==='coins'){ try{ S.earnCoins(amount,'topup'); }catch(e){} lset('coreCoins',String(coins())); }
      else if(c==='shards'){ S.update(function(s){ s.shards=(s.shards||0)+amount; return s; }); }
      else if(c==='tickets'){ lset('coreTickets',String(tickets()+amount)); }
    }
    function deduct(c,amount){
      if(c==='coins'){ var r=S.spendCoins(amount,'wallet'); if(!r||!r.ok) return false; lset('coreCoins',String(coins())); return true; }
      if(c==='shards'){ if(shards()<amount) return false; S.update(function(s){ s.shards=(s.shards||0)-amount; return s; }); return true; }
      if(c==='tickets'){ if(tickets()<amount) return false; lset('coreTickets',String(tickets()-amount)); return true; }
      return false;
    }

    // ── real-money pack (Apple Pay) — works for coins / shards / tickets ──
    function buyPack(c,p){
      var lab=META[c].label;
      var rows='<div class="cap-row"><span>'+p.amt.toLocaleString()+' '+lab+'</span><strong>CORE</strong></div>'+
               (p.bonus?'<div class="cap-row"><span>Bonus</span><strong>'+p.bonus+'</strong></div>':'')+
               '<div class="cap-row total"><span>Total</span><strong style="color:#fff;">$'+p.usd+'</strong></div>';
      function done(){ creditCur(c,p.amt); rec(c,p.amt,lab+' pack ($'+p.usd+')'); SFX('coin'); toast('Added '+p.amt.toLocaleString()+' '+lab.toLowerCase(),'good'); S.syncProgress(); dispatch(); render(); }
      if(window.coreApplePay){ coreApplePay.open({ rows:rows, onAuthorized:done }); }
      else { confirmSheet({ title:'Buy '+p.amt.toLocaleString()+' '+lab.toLowerCase()+'?', body:'You’ll be charged <b>$'+p.usd+'</b>. Preview — no real charge.', cta:'Confirm $'+p.usd, onConfirm:done }); }
    }
    // ── coins -> shards / tickets exchange ──
    function applyExchange(c,ex){ if(!deduct('coins',ex.coins)){ toast('Not enough coins','warn'); return; } creditCur(c,ex.amt); rec('coins',-ex.coins,'Convert to '+META[c].label.toLowerCase()); rec(c,ex.amt,'Converted from coins'); SFX('coin'); toast('Got '+ex.amt+' '+META[c].label.toLowerCase(),'good'); S.syncProgress(); dispatch(); render(); }
    function doExchange(c,ex){
      if(coins()<ex.coins){ toast('Not enough coins','warn'); return; }
      // small conversions go straight through; bigger spends ask first
      if(ex.coins>=EXCHANGE_CONFIRM_AT){
        confirmSheet({ title:'Convert coins?', body:'Spend <b>'+ex.coins.toLocaleString()+' coins</b> for <b>'+ex.amt+' '+META[c].label.toLowerCase()+'</b>?', cta:'Convert', onConfirm:function(){ applyExchange(c,ex); } });
      } else { applyExchange(c,ex); }
    }

    // ── gift ──
    function sendGift(){
      if(!giftFriend){ toast('Pick a friend first','warn'); return; }
      if(!giftAmt || giftAmt<=0){ toast('Enter an amount','warn'); return; }
      if(bal(cur)<giftAmt){ toast('Not enough '+cur,'warn'); return; }
      confirmSheet({ title:'Send gift?', body:'Send <b>'+giftAmt.toLocaleString()+' '+META[cur].label+'</b> to <b>'+friendName(giftFriend)+'</b>? This can’t be undone.', cta:'Send',
        onConfirm:function(){ if(!deduct(cur,giftAmt)){ toast('Not enough '+cur,'warn'); return; } rec(cur,-giftAmt,'Gift to '+friendName(giftFriend)); SFX('confirm'); toast('Sent '+giftAmt.toLocaleString()+' to '+friendName(giftFriend),'good'); giftAmt=0; S.syncProgress(); dispatch(); render(); } });
    }

    // ── render ──
    function render(){
      // seg
      var seg=qs('#seg'); seg.innerHTML='';
      ['coins','shards','tickets'].forEach(function(c){ var b=document.createElement('button'); b.className=(c===cur?'on '+c:''); b.innerHTML='<span style="width:15px;height:15px;display:inline-flex">'+curSvg(c)+'</span>'+META[c].label; b.onclick=function(){ if(cur!==c){ cur=c; giftFriend=null; giftAmt=0; render(); } }; seg.appendChild(b); });

      // hero
      var hero=qs('#hero'); hero.className='hero '+cur; hero.style.setProperty('--accentglow',META[cur].glow);
      hero.innerHTML='<div class="hl"><span class="hic">'+curSvg(cur)+'</span>'+META[cur].label+'</div>'+
        '<div class="hbal">'+bal(cur).toLocaleString()+'</div><div class="hsub">'+META[cur].sub+'</div>';

      // buy zone
      var bz=qs('#buyZone');
      function packCard(c,p,i){ return '<div class="pack'+(p.best?' best':'')+'" data-pack="'+c+':'+i+'">'+(p.best?'<span class="bestpill">Best value</span>':'')+'<span class="pc '+c+'">'+curSvg(c)+'</span><div class="pamt">'+p.amt.toLocaleString()+'</div>'+(p.bonus?'<div class="pbonus">'+p.bonus+'</div>':'<div class="pbonus">&nbsp;</div>')+'<div class="pusd">$'+p.usd+'</div></div>'; }
      var packsHTML='<div class="packs">'+PACKS[cur].map(function(p,i){ return packCard(cur,p,i); }).join('')+'</div>';
      var html='';
      if(cur!=='coins' && EXCHANGE[cur]){
        // coins -> currency exchange first (keeps it fair / free of real money)
        html+='<div class="sec"><div class="st">'+CIicon()+'Convert from coins</div><div class="ss">In-game</div></div>'+
          '<div class="exch">'+EXCHANGE[cur].map(function(ex,i){ var can=coins()>=ex.coins;
            return '<div class="exrow'+(can?'':' off')+'" data-ex="'+i+'"><span class="exc coins">'+ICOIN()+ex.coins.toLocaleString()+'</span>'+
              '<svg class="exar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'+
              '<span class="exc '+cur+'">'+curSvg(cur)+ex.amt+'</span>'+(ex.bonus?'<span class="exbonus">'+ex.bonus+'</span>':'')+'<span class="exbtn">'+(can?'Convert':'Need coins')+'</span></div>'; }).join('')+'</div>';
      }
      html+='<div class="sec"><div class="st">'+(cur==='coins'?CIicon():'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V6l-3-4z"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0"/></svg>')+'Top up '+META[cur].label.toLowerCase()+'</div><div class="ss">Apple Pay</div></div>'+packsHTML;
      bz.innerHTML=html;

      // gift
      qs('#giftSs').textContent='Balance '+bal(cur).toLocaleString();
      var fr=friends();
      var gp=qs('#giftPanel');
      if(!fr.length){
        gp.innerHTML='<div class="earnedonly"><span class="eic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M17 9h4M19 7v4" stroke-linecap="round"/></svg></span><div><div class="et">No friends yet</div><div class="ed">Add friends to gift them '+META[cur].label.toLowerCase()+'.</div></div><a class="btn ghost" style="width:auto;padding:10px 14px;margin-left:auto" href="26-friends.html">Add</a></div>';
      } else {
        var fhtml=fr.map(function(id){ return '<div class="friend'+(id===giftFriend?' on':'')+'" data-friend="'+id+'"><div class="fav">'+(friendName(id)[0]||'C')+'</div><div class="fn">'+friendName(id)+'</div></div>'; }).join('');
        gp.innerHTML='<div class="friends">'+fhtml+'</div>'+
          '<div class="amtrow"><div class="stepper"><button data-step="-1">−</button><input id="giftInput" type="number" min="0" value="'+(giftAmt||'')+'" placeholder="0"/><button data-step="1">+</button></div></div>'+
          '<div class="quick"><button data-q="10">10</button><button data-q="50">50</button><button data-q="100">100</button><button data-q="max">Max</button></div>'+
          '<button class="btn send" id="sendBtn"'+(giftFriend&&giftAmt>0&&bal(cur)>=giftAmt?'':' disabled')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>'+(giftFriend?'Send '+(giftAmt>0?giftAmt.toLocaleString()+' ':'')+'to '+friendName(giftFriend):'Send gift')+'</button>';
      }

      // how to earn
      qs('#earnPanel').innerHTML=EARN[cur].map(function(r){ return '<div class="earn-row"><span class="ei"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+r[1]+'</svg></span><div class="en">'+r[0]+'</div></div>'; }).join('');

      // ledger (filtered to this currency)
      var led=jget(LEDGER_KEY,[]); if(!Array.isArray(led)) led=[];
      led=led.filter(function(e){ return e.cur===cur; });
      var lh=qs('#ledger');
      if(!led.length){ lh.innerHTML='<div class="empty">No '+META[cur].label.toLowerCase()+' activity yet.</div>'; }
      else lh.innerHTML=led.slice(0,8).map(function(e){ var pos=e.delta>0; return '<div class="lrow"><span class="lic '+e.cur+'">'+curSvg(e.cur)+'</span><div class="ll"><div class="ln">'+e.label+'</div><div class="lt">'+timeAgo(e.ts)+'</div></div><div class="ld '+(pos?'pos':'neg')+'">'+(pos?'+':'−')+Math.abs(e.delta).toLocaleString()+'</div></div>'; }).join('');

      bind();
    }

    function bind(){
      document.querySelectorAll('[data-pack]').forEach(function(b){ b.onclick=function(){ var parts=b.dataset.pack.split(':'); var c=parts[0], p=(PACKS[c]||[])[+parts[1]]; if(p) buyPack(c,p); }; });
      document.querySelectorAll('[data-ex]').forEach(function(b){ b.onclick=function(){ var ex=(EXCHANGE[cur]||[])[+b.dataset.ex]; if(ex) doExchange(cur,ex); }; });
      document.querySelectorAll('[data-friend]').forEach(function(b){ b.onclick=function(){ giftFriend=(giftFriend===b.dataset.friend)?null:b.dataset.friend; render(); }; });
      document.querySelectorAll('[data-step]').forEach(function(b){ b.onclick=function(){ var inp=qs('#giftInput'); var v=Math.max(0,(parseInt(inp.value,10)||0)+(+b.dataset.step)*(cur==='coins'?50:1)); inp.value=v; giftAmt=v; updateSend(); }; });
      document.querySelectorAll('[data-q]').forEach(function(b){ b.onclick=function(){ var q=b.dataset.q; var v=q==='max'?bal(cur):(parseInt(q,10)||0); var inp=qs('#giftInput'); if(inp){ inp.value=v; } giftAmt=v; updateSend(); }; });
      var inp=qs('#giftInput'); if(inp) inp.oninput=function(){ giftAmt=Math.max(0,parseInt(inp.value,10)||0); updateSend(); };
      var sb=qs('#sendBtn'); if(sb) sb.onclick=sendGift;
    }
    function updateSend(){ var sb=qs('#sendBtn'); if(!sb) return; var ok=giftFriend&&giftAmt>0&&bal(cur)>=giftAmt; sb.disabled=!ok; sb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>'+(giftFriend?'Send '+(giftAmt>0?giftAmt.toLocaleString()+' ':'')+'to '+friendName(giftFriend):'Send gift'); }

    // help
    try{ if(window.coreHelp){ window.coreHelp.attach('helpBtn',{ title:'Your Wallet', bullets:[
      'Coins can be topped up with Apple Pay. Shards & tickets are earned-only — never sold.',
      'Switch the currency with the tabs up top to buy, earn or gift it.',
      'Gift any currency to a friend — you confirm before anything leaves your balance.',
      'See exactly how to earn each currency, and a running history of every change.'
    ]}); } }catch(e){}

    // demo seeding (screenshots) — deterministic, no daily-login drift
    try{
      if(/[?&]demo=1/.test(location.search)){
        var _s=S.read(); if(!_s.xp && !(_s.stats&&(_s.stats.body||_s.stats.brain))){ if(S.seedDemo) S.seedDemo(); }
        try{ lset('coreLastDailyBonus', new Date().toDateString()); }catch(e){}
        if(ig('coreTickets',-1)<0) lset('coreTickets','11');
        S.update(function(s){ s.coins=4200; s.shards=240; return s; });
        if(!friends().length) jset('coreFriends',['CORE-K7Q2-9XMP','CORE-B3FW-RT81','CORE-Z9LC-4HVD']);
        if(!jget(LEDGER_KEY,[]).length){ var n=Date.now(); jset(LEDGER_KEY,[
          {ts:n-4*60000,cur:'coins',delta:120,label:'Daily quests'},
          {ts:n-30*60000,cur:'tickets',delta:2,label:'Streak reward'},
          {ts:n-3*3600000,cur:'shards',delta:60,label:'Rank milestone: Crystal'},
          {ts:n-9*3600000,cur:'coins',delta:600,label:'Coin pack ($0.99)'},
          {ts:n-26*3600000,cur:'coins',delta:-250,label:'Blue Frame'}
        ]); }
      }
    }catch(e){}

    try{ if(window.dashAmbient) window.dashAmbient.init(); }catch(e){}
    render();
    window.addEventListener('coreStateChange', render);
    window.addEventListener('core:progress-updated', render);
  })();
  </script>
  <script src="_lib/core-back.js"></script>
  <script src="_lib/core-pagefx.js"></script>
</body>
</html>
