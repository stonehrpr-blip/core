<!doctype html>
<html lang="en">

<meta charset="utf-8" />
<title>CORE — Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root{
    --bg:#06070D; --card:#0E0F17; --card-2:#13141E; --line:rgba(255,255,255,0.07);
    --text:#F4F6FB; --muted:#8A90A2; --dim:#565C6E;
    --blue:#AEB6C4; --blue-soft:rgba(10,132,255,0.14); --good:#34D399;
    --coin:#E9B949; --shard:#46C7BE; --ticket:#E5894E;
    --common:rgba(255,255,255,0.72); --rare:#4F9BFF; --epic:#A98BFF; --legendary:#E9B949; --mythic:#FF6F8B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{min-height:100vh;background:#0A0A12;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}
  .phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:56px;overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.05),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.4);border-radius:999px;z-index:60;}

  /* calm, minimal backdrop — no bright auroras */
  .bg{position:absolute;inset:0;z-index:0;background:
      radial-gradient(80% 50% at 50% -8%, rgba(10,132,255,0.08), transparent 60%),
      linear-gradient(180deg,#080912 0%,#06070D 60%,#05060B 100%);}

  .frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:54px 0 0;}
  .scroll{flex:1;overflow-y:auto;padding:0 18px 112px;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}

  /* header */
  .top{display:flex;align-items:center;gap:10px;padding:2px 18px 12px;}
  .ic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--line);color:var(--text);text-decoration:none;cursor:pointer;flex:none;}
  .ic svg{width:18px;height:18px;}
  .top h1{flex:1;margin:0;font-size:19px;font-weight:800;letter-spacing:-0.01em;}
  .top .ic.q{font-size:14px;font-weight:800;color:var(--muted);}

  /* balance row */
  .bal{display:flex;gap:8px;margin-bottom:16px;}
  .b{flex:1;display:flex;align-items:center;gap:8px;padding:11px 12px;border-radius:14px;background:var(--card);border:1px solid var(--line);cursor:pointer;}
  .b:active{background:var(--card-2);}
  .b .bi{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none;}
  .b .bi svg{width:15px;height:15px;}
  .b.coins .bi{background:rgba(233,185,73,0.14);color:var(--coin);}
  .b.shards .bi{background:rgba(70,199,190,0.14);color:var(--shard);}
  .b.tickets .bi{background:rgba(229,137,78,0.14);color:var(--ticket);}
  .b .bv{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
  .b .bl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-top:3px;}

  /* segmented tabs */
  .seg{display:flex;gap:2px;padding:3px;border-radius:12px;background:var(--card);border:1px solid var(--line);margin-bottom:14px;}
  .seg button{flex:1;border:none;background:none;font:inherit;cursor:pointer;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted);transition:.16s;}
  .seg button.on{color:var(--text);background:var(--card-2);box-shadow:0 1px 0 rgba(255,255,255,0.04) inset;}

  /* item rows */
  .list{display:flex;flex-direction:column;gap:9px;}
  .row{display:flex;align-items:center;gap:13px;padding:13px 13px;border-radius:15px;background:transparent;border:none;cursor:pointer;transition:background .16s;}
  .row:active{background:var(--card-2);}
  /* premium tiers (epic+) get a subtle rarity wash + tinted edge so they read richer */
  .row.prem{border-color:color-mix(in srgb,var(--rc) 32%,var(--line));background:linear-gradient(100deg,color-mix(in srgb,var(--rc) 7%,var(--card)),var(--card) 62%);}
  .row .pv{width:50px;height:50px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
    background:radial-gradient(circle at 50% 44%,color-mix(in srgb,var(--rc,rgba(255,255,255,0.72)) 16%,var(--card-2)),var(--card-2) 76%);}
  .row.prem .pv{box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--rc) 26%,transparent);
    background:radial-gradient(circle at 50% 44%,color-mix(in srgb,var(--rc) 28%,var(--card-2)),var(--card-2) 72%);}
  .row .pv .av{width:21px;height:21px;color:#c3ccdd;}
  .row .pv img{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 2px 5px rgba(0,0,0,.55)) drop-shadow(0 0 6px color-mix(in srgb,var(--rc,transparent) 45%,transparent));}
  .row .mid{flex:1;min-width:0;}
  .row .nm{font-size:14.5px;font-weight:700;line-height:1.25;}
  .row .sub{font-size:11.5px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:7px;line-height:1.3;}
  .row .rr{display:inline-flex;align-items:center;gap:5px;font-weight:700;color:var(--muted);flex:none;}
  .row .rr .dot{width:7px;height:7px;border-radius:50%;flex:none;box-shadow:0 0 6px currentColor;}
  .row .desc{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .row .end{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:none;}
  .price{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;}
  .price svg{width:13px;height:13px;}
  .price.coins{color:var(--coin);} .price.shards{color:var(--shard);} .price.tickets{color:var(--ticket);} .price.free{color:var(--good);}
  .tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--card-2);color:var(--muted);border:1px solid var(--line);}
  .tag.eq{color:var(--good);border-color:rgba(52,211,153,0.3);}
  .tag.lk{color:var(--dim);}
  .chev{color:var(--dim);display:flex;} .chev svg{width:15px;height:15px;}
  .row.dim{opacity:.6;}

  .sech{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin:20px 2px 10px;}

  /* CORE Plus minimal */
  .plus{margin-top:18px;display:flex;align-items:center;gap:13px;padding:15px;border-radius:16px;background:linear-gradient(135deg,rgba(10,132,255,0.1),rgba(169,139,255,0.06));border:1px solid rgba(10,132,255,0.22);cursor:pointer;}
  .plus .pi{width:40px;height:40px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;background:rgba(10,132,255,0.16);color:var(--blue);}
  .plus .pi svg{width:21px;height:21px;}
  .plus .pt{flex:1;} .plus .ptt{font-size:14px;font-weight:800;} .plus .pts{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .plus .pp{font-size:13px;font-weight:800;white-space:nowrap;}

  /* nav */
  .nav{position:absolute;left:0;right:0;bottom:0;z-index:50;padding:10px 12px 26px;display:flex;justify-content:space-around;align-items:flex-end;background:linear-gradient(180deg,rgba(6,7,13,0) 0%,rgba(6,7,13,0.9) 36%,#05060B 100%);backdrop-filter:blur(12px);}
  .nav a{background:none;border:none;font:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;min-width:48px;text-decoration:none;color:var(--dim);}
  .nav svg{width:23px;height:23px;} .nav .nl{font-size:10px;font-weight:700;}
  .nav .item.active{color:var(--text);} .nav .item.active svg{color:var(--blue);}

  /* toast */
  .toast{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(16px);z-index:90;background:#171823;border:1px solid var(--line);border-radius:13px;padding:12px 17px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.3s cubic-bezier(.2,.9,.3,1);box-shadow:0 12px 30px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;max-width:320px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.good svg{width:15px;height:15px;color:var(--good);} .toast.warn svg{width:15px;height:15px;color:var(--ticket);}

  /* sheet */
  .scrim{position:absolute;inset:0;z-index:80;background:rgba(4,5,11,0.66);opacity:0;pointer-events:none;transition:opacity .24s;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:81;border-radius:24px 24px 0 0;background:#0D0E16;border:1px solid var(--line);border-bottom:none;padding:10px 20px 26px;transform:translateY(110%);transition:transform .3s cubic-bezier(.2,.9,.3,1);max-height:88%;overflow-y:auto;}
  .sheet::-webkit-scrollbar{display:none;}
  .sheet.open{transform:translateY(0);}
  .grip{width:36px;height:5px;border-radius:999px;background:rgba(255,255,255,0.16);margin:0 auto 16px;}
  .sh-hero{display:flex;align-items:center;gap:14px;}
  .sh-pv{width:60px;height:60px;border-radius:15px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--card-2);overflow:hidden;}
  .sh-pv .av{width:26px;height:26px;color:#c3ccdd;} .sh-pv img{width:58px;height:58px;object-fit:contain;}
  .sh-hero .hn{font-size:18px;font-weight:800;}
  .sh-hero .hr{font-size:12px;margin-top:4px;display:inline-flex;align-items:center;gap:6px;color:var(--muted);}
  .sh-hero .hr .dot{width:8px;height:8px;border-radius:50%;}
  /* in-sheet preview card — see a cosmetic (esp. a title) the way it'll appear */
  .pc{margin:16px 0 2px;padding:22px 18px;border-radius:18px;background:radial-gradient(circle at 50% 24%,color-mix(in srgb,var(--rc) 12%,var(--card-2)),var(--card-2) 78%);border:1px solid color-mix(in srgb,var(--rc) 22%,var(--line));display:flex;flex-direction:column;align-items:center;}
  .pc-av{position:relative;width:66px;height:66px;border-radius:19px;border:2.5px solid var(--fc,#8a90a0);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);}
  .pc-av .pc-glow{position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--ac) 55%,transparent),transparent 70%);}
  .pc-av .av{width:30px;height:30px;color:#dbe4f2;position:relative;}
  .pc-badge{position:absolute;bottom:-7px;right:-7px;width:26px;height:26px;border-radius:50%;background:#0D0E16;display:flex;align-items:center;justify-content:center;border:2px solid var(--bc);}
  .pc-badge svg{width:14px;height:14px;color:var(--bc);}
  .pc-name{font-size:17px;font-weight:800;margin-top:14px;}
  .pc-title{margin-top:8px;font-size:9px;font-weight:800;letter-spacing:.14em;color:#bcd8ff;padding:4px 12px;border-radius:999px;border:1px solid rgba(10,132,255,0.4);}
  .sh-desc{font-size:13px;color:var(--muted);line-height:1.5;margin:14px 0 4px;}
  .sh-price{display:flex;align-items:center;gap:7px;margin:14px 0 4px;font-size:15px;font-weight:800;}
  .sh-eff{display:flex;align-items:center;gap:9px;margin-top:12px;padding:11px 13px;border-radius:12px;background:var(--blue-soft);font-size:12.5px;font-weight:600;color:#bcd8ff;}
  .sh-eff svg{width:16px;height:16px;flex:none;color:var(--blue);}
  .sh-actions{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
  .btn{border:none;cursor:pointer;font:inherit;font-weight:700;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;font-size:15px;transition:filter .18s,transform .1s,opacity .18s;width:100%;}
  .btn:active{transform:scale(.99);} .btn svg{width:17px;height:17px;}
  .btn.primary{background:var(--blue);color:#fff;} .btn.primary:disabled{background:var(--card-2);color:var(--dim);cursor:default;}
  .btn.ghost{background:var(--card-2);color:var(--text);border:1px solid var(--line);}
  .btn.equipped{background:var(--card-2);color:var(--good);cursor:default;}
  .sh-note{font-size:11px;color:var(--dim);text-align:center;margin-top:13px;line-height:1.5;}

  /* gift picker */
  .gift-h{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);margin:4px 0 11px;}
  .friends{display:flex;gap:11px;overflow-x:auto;padding-bottom:4px;} .friends::-webkit-scrollbar{display:none;}
  .friend{flex:none;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;width:60px;}
  .friend .fa{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#cdd6e6;background:var(--card-2);border:2px solid var(--line);transition:.16s;}
  .friend.on .fa{border-color:var(--blue);} .friend .fn{font-size:9.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px;}
  .friend.on .fn{color:var(--text);}
  .empty-f{font-size:12.5px;color:var(--muted);padding:8px 0 4px;line-height:1.5;}
</style>

  <script>
  (function(){
    var S=window.coreState, qs=function(s){return document.querySelector(s);};
    function lget(k,d){ try{ var v=localStorage.getItem(k); return (v===null||v==='')?d:v; }catch(e){ return d; } }
    function lset(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
    function ig(k,d){ var v=parseInt(lget(k,''),10); return isNaN(v)?d:v; }
    function jget(k,d){ try{ var v=JSON.parse(localStorage.getItem(k)||'null'); return v==null?d:v; }catch(e){ return d; } }
    function jset(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
    function pushUniq(k,val){ var a=jget(k,[]); if(!Array.isArray(a)) a=[]; if(a.indexOf(val)<0){ a.push(val); jset(k,a); } }
    function SFX(n){ try{ if(typeof window.coreSfx==='function') window.coreSfx(n); }catch(e){} }

    // ── balances (the single source the rest of the app reads) ──
    function coins(){ return (S.read().coins)||0; }
    function shards(){ return (S.read().shards)||0; }
    function bal(c){ return c==='shards'?shards():coins(); }
    function rankIdx(){ try{ return S.rankFor(S.read().xp||0).idx; }catch(e){ return 0; } }
    function needIdx(n){ try{ var i=S.RANKS.findIndex(function(r){return r.name===n;}); return i<0?99:i; }catch(e){ return 99; } }
    function dispatch(){ try{ window.dispatchEvent(new CustomEvent('core:progress-updated',{detail:{source:'shop'}})); }catch(e){} }

    var LEDGER='coreCoinLedger.v1';
    function rec(cur,delta,label){ var a=jget(LEDGER,[]); if(!Array.isArray(a)) a=[]; a.unshift({ts:Date.now(),cur:cur,delta:delta,label:label}); if(a.length>60) a.length=60; jset(LEDGER,a); }

    // ── icons ──
    function CI(c){ return c==='shards'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M6 3h12l3 6-9 12L3 9z"/><path d="M3 9h18"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4"/></svg>'; }
    var AV='<svg class="av" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="3.2"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>';

    // ── rarity (one calm cue: a small dot + word) ──
    var RAR={ Common:'rgba(255,255,255,0.72)', Rare:'#4F9BFF', Epic:'#A98BFF', Legendary:'#E9B949', Mythic:'#FF6F8B' };
    function rarHTML(r){ return '<span class="rr"><span class="dot" style="background:'+RAR[r]+'"></span>'+r+'</span>'; }

    var FRAME_C={ Default:'#8a90a0', Blue:'#4F9BFF', Gold:'#E9B949', Crystal:'#A98BFF', Aurora:'#5B8DEF', CORE:'#BBD8FF' };
    var AURA_C={ aura_blue:'#4F9BFF', aura_ember:'#E5894E', aura_wind:'#46C7BE', aura_core:'#A98BFF', aura_frost:'#7EC8FF', aura_solar:'#E9B949' };
    var BOOST_IC={
      xpboost1:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8Z"/></svg>',
      xpboost2:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 2L3 13h5l-1 9 7-11H9l2-9Z"/><path d="M18 4l-2 4h3l-2 5 4-6h-2l1-3z"/></svg>',
      chesthunter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 9l2-4h14l2 4M3 9v9a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9M3 9h18M12 9v3"/></svg>',
      momentum:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6z"/><path d="M9 11.5l2 2 4-4.5"/></svg>',
      powercore:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 2l8.5 5v10L12 22l-8.5-5V7z"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/></svg>'
    };
    function previewHTML(it){
      if(it.kind==='frame'){ return '<span style="width:30px;height:30px;border-radius:8px;border:2px solid '+(FRAME_C[it.frameKey]||'#8a90a0')+';display:flex;align-items:center;justify-content:center">'+AV+'</span>'; }
      if(it.kind==='aura'){ var c=AURA_C[it.id]||'#4F9BFF'; return '<span style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px '+c+';border:1px solid '+c+'">'+AV+'</span>'; }
      if(it.kind==='badge'){ return '<svg viewBox="0 0 24 24" fill="none" stroke="'+RAR[it.rar]+'" stroke-width="1.7" stroke-linejoin="round" style="width:24px;height:24px"><path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6z"/><path d="M9 11.5l2 2 4-4.5"/></svg>'; }
      if(it.kind==='title'){ return '<svg viewBox="0 0 24 24" fill="none" stroke="'+RAR[it.rar]+'" stroke-width="1.7" stroke-linejoin="round" style="width:24px;height:24px"><path d="M4 5h16v8l-8 4.5L4 13z"/><path d="M8 5v5.5l4 2.2 4-2.2V5"/></svg>'; }
      if(it.kind==='boost'){ return '<span style="color:var(--blue);width:24px;height:24px;display:flex">'+(BOOST_IC[it.id]||BOOST_IC.xpboost1)+'</span>'; }
      if(it.kind==='chest'){ return '<img src="assets/chests/'+it.floor+'-cut.png" alt="" loading="lazy">'; }
      return AV;
    }

    // ── catalog ──
    var COSMETICS=[
      {id:'frame_blue',    cat:'Frames', name:'Blue Frame',    rar:'Common', cost:250,  cur:'coins',  kind:'frame', frameKey:'Blue',    desc:'A cool electric-blue profile border.'},
      {id:'frame_gold',    cat:'Frames', name:'Gold Frame',    rar:'Rare',   cost:1000, cur:'coins',  kind:'frame', frameKey:'Gold',    lockRank:'Gold', desc:'A premium gold border. Unlocks at Gold rank.'},
      {id:'frame_crystal', cat:'Frames', name:'Crystal Frame', rar:'Epic',   cost:45,   cur:'shards', kind:'frame', frameKey:'Crystal', desc:'A shimmering crystal border.'},
      {id:'frame_aurora',  cat:'Frames', name:'Aurora Frame',  rar:'Legendary', cost:140, cur:'shards', kind:'frame', frameKey:'Aurora', desc:'A glowing aurora border for standout cards.'},
      {id:'aura_blue',  cat:'Auras', name:'Blue Aura',  rar:'Rare', cost:1200, cur:'coins', kind:'aura', desc:'A subtle blue glow around your card.'},
      {id:'aura_frost', cat:'Auras', name:'Frost Aura', rar:'Rare', cost:1300, cur:'coins', kind:'aura', desc:'A crisp wintry glow.'},
      {id:'aura_wind',  cat:'Auras', name:'Wind Aura',  rar:'Epic', cost:55,   cur:'shards', kind:'aura', desc:'A flowing teal wind aura.'},
      {id:'aura_core',  cat:'Auras', name:'CORE Aura',  rar:'Legendary', cost:170, cur:'shards', kind:'aura', lockRank:'CORE', desc:'The ultimate aura. Requires CORE rank.'},
      {id:'title_queststarter', cat:'Titles', name:'Quest Starter', rar:'Common', cost:300, cur:'coins',  kind:'title', titleName:'QUEST STARTER', desc:'Show you have begun your journey.'},
      {id:'title_disciplined',  cat:'Titles', name:'Disciplined',   rar:'Rare',   cost:700, cur:'coins',  kind:'title', titleName:'DISCIPLINED', desc:'For the consistently disciplined.'},
      {id:'title_unbreakable',  cat:'Titles', name:'Unbreakable',   rar:'Epic',   cost:60,  cur:'shards', kind:'title', titleName:'UNBREAKABLE', desc:'Nothing breaks your momentum.'},
      {id:'badge_focus',      cat:'Badges', name:'Focus Badge',      rar:'Common', cost:500, cur:'coins',  kind:'badge', desc:'For disciplined focus sessions.'},
      {id:'badge_discipline', cat:'Badges', name:'Discipline Badge', rar:'Rare',   cost:750, cur:'coins',  kind:'badge', desc:'Proof of consistent discipline.'},
      {id:'badge_boss',       cat:'Badges', name:'Boss Slayer',      rar:'Epic',   cost:70,  cur:'shards', kind:'badge', lockRank:'Ember', desc:'Unlocked when Boss Quests open.'}
    ];
    var BOOSTS=[
      {id:'xpboost1', name:'XP Boost I',  rar:'Rare', cost:800,  cur:'coins',  kind:'boost', effect:'+5% XP from every quest, permanently.', desc:'Earn more XP on everything you complete.'},
      {id:'xpboost2', name:'XP Boost II', rar:'Epic', cost:60,   cur:'shards', kind:'boost', effect:'+10% XP — stacks with Boost I to +15%.', desc:'A bigger, permanent XP multiplier.'},
      {id:'chesthunter', name:'Chest Hunter', rar:'Rare', cost:1000, cur:'coins', kind:'boost', effect:'Better up-roll odds on every chest.', desc:'Improves the odds your chests roll up a tier.'},
      {id:'momentum', name:'Momentum', rar:'Rare', cost:1200, cur:'coins', kind:'boost', effect:'Banks a streak shield.', desc:'Protects your streak if you miss a day.', shield:true},
      {id:'powercore', name:'Power Core', rar:'Legendary', cost:140, cur:'shards', kind:'boost', effect:'+100 CORE Power.', desc:'A permanent boost up the leaderboard.'}
    ];
    var CHESTS=[
      {id:'chest_common',    name:'Common Chest',    rar:'Common',    floor:'common',    cost:5,   cur:'shards', kind:'chest', desc:'Coins, XP & a surprise drop.'},
      {id:'chest_rare',      name:'Rare Chest',      rar:'Rare',      floor:'rare',      cost:15,  cur:'shards', kind:'chest', desc:'Guarantees at least a Rare drop.'},
      {id:'chest_epic',      name:'Epic Chest',      rar:'Epic',      floor:'epic',      cost:30,  cur:'shards', kind:'chest', desc:'Epic floor — bigger shard payouts.'},
      {id:'chest_legendary', name:'Legendary Chest', rar:'Legendary', floor:'legendary', cost:60,  cur:'shards', kind:'chest', lockRank:'Ascend', desc:'Legendary floor. Requires Ascend rank.'},
      {id:'chest_mythic',    name:'Mythic Chest',    rar:'Mythic',    floor:'mythic',    cost:120, cur:'shards', kind:'chest', lockRank:'CORE', desc:'Guarantees a Mythic pull. Requires CORE rank.'}
    ];
    var byId={}; COSMETICS.concat(BOOSTS,CHESTS).forEach(function(it){ byId[it.id]=it; });
    // Giftable = cosmetics + boosts. Chests are opened by you (my pick — not giftable).
    function giftable(it){ return it.kind!=='chest'; }

    // ── friends ──
    function friends(){ var f=jget('coreFriends',[]); return Array.isArray(f)?f:[]; }
    function fname(id){ return String(id).replace(/^CORE-/,''); }

    // ── ownership / state ──
    function lockedReason(it){ if(!it.lockRank) return null; if(rankIdx()>=needIdx(it.lockRank)) return null; return 'Unlocks at '+it.lockRank; }
    function owned(it){
      if(it.kind==='chest') return false;
      if(it.kind==='boost') return S.hasUpgrade(it.id) || jget('coreOwnedShopItems',[]).indexOf(it.id)>=0;
      return jget('coreOwnedShopItems',[]).indexOf(it.id)>=0;
    }
    function equipped(it){
      if(it.kind==='frame') return lget('coreProfileTheme','Default')===it.frameKey;
      if(it.kind==='aura')  return lget('coreEquippedAura','')===it.id;
      if(it.kind==='badge') return lget('coreEquippedBadge','')===it.id;
      if(it.kind==='title') return lget('coreProfileTitle','')===it.titleName;
      return false;
    }
    function equippable(it){ return it.kind==='frame'||it.kind==='aura'||it.kind==='badge'||it.kind==='title'; }
    function afford(it,who){ return bal(it.cur) >= it.cost; }

    // ── spend / grant / equip — all persisted to the keys the app reads ──
    function spend(cur,amt,reason){
      if(cur==='coins'){ var r=S.spendCoins(amt,reason); if(!r||!r.ok) return false; lset('coreCoins',String(coins())); return true; }
      if(cur==='shards'){ if(shards()<amt) return false; S.update(function(s){ s.shards=(s.shards||0)-amt; return s; }); return true; }
      return false;
    }
    function grant(it){
      if(it.kind==='boost'){
        // buyUpgrade writes to state.upgrades — honored by xpMultiplier / rollChest / corePower
        var r=S.buyUpgrade(it.id, 0, it.cur);   // already paid; grant at 0
        pushUniq('coreOwnedShopItems', it.id);
        pushUniq('coreUnlockedPerks', it.name);
        if(it.shield){ lset('coreStreakShields', String(ig('coreStreakShields',0)+1)); }
        return;
      }
      pushUniq('coreOwnedShopItems', it.id);
      if(it.kind==='badge'){ try{ S.addItem({ id:it.id, name:it.name, type:'badge', rarity:it.rar.toLowerCase(), source:'Shop' }); }catch(e){} }
    }
    function equip(it){
      if(it.kind==='frame'){ lset('coreProfileTheme', it.frameKey); lset('coreEquippedFrame', it.frameKey); }
      else if(it.kind==='aura'){ lset('coreEquippedAura', it.id); }
      else if(it.kind==='badge'){ lset('coreEquippedBadge', it.id); }
      else if(it.kind==='title'){ lset('coreProfileTitle', it.titleName); }
      else return;
      S.syncProgress(); dispatch();
    }

    var toastT; function toast(m,kind){ var t=qs('#toast'); var ic=kind==='good'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4 4 10-11"/></svg>':kind==='warn'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>':''; t.className='toast show'+(kind?' '+kind:''); t.innerHTML=ic+'<span>'+m+'</span>'; clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},2000); }

    // ── purchase actions ──
    function buyForSelf(it){
      if(lockedReason(it)){ toast(lockedReason(it),'warn'); return false; }
      if(owned(it)){ return false; }
      if(bal(it.cur)<it.cost){ toast('Not enough '+it.cur,'warn'); return false; }
      if(!spend(it.cur,it.cost,'shop:'+it.id)){ toast('Not enough '+it.cur,'warn'); return false; }
      grant(it);
      rec(it.cur,-it.cost,it.name);
      S.syncProgress(); dispatch();   // saves + lets every page pick it up
      SFX('coin'); toast((it.kind==='boost'?'Boost active — ':'Bought — ')+it.name,'good');
      return true;
    }
    function giftTo(it,friend){
      if(bal(it.cur)<it.cost){ toast('Not enough '+it.cur,'warn'); return false; }
      if(!spend(it.cur,it.cost,'gift:'+it.id)){ toast('Not enough '+it.cur,'warn'); return false; }
      rec(it.cur,-it.cost,'Gift: '+it.name+' → '+fname(friend));
      // log the outgoing gift so it persists / can be delivered when friends sync
      var gifts=jget('coreGiftsSent',[]); if(!Array.isArray(gifts)) gifts=[];
      gifts.unshift({ to:friend, item:it.id, name:it.name, cur:it.cur, cost:it.cost, ts:Date.now() }); if(gifts.length>50) gifts.length=50; jset('coreGiftsSent',gifts);
      S.syncProgress(); dispatch();
      SFX('confirm'); toast('Gifted '+it.name+' to '+fname(friend),'good');
      return true;
    }
    function openChest(it){
      if(lockedReason(it)){ toast(lockedReason(it),'warn'); return; }
      if(shards()<it.cost){ toast('Need '+it.cost+' shards','warn'); return; }
      if(!spend('shards',it.cost,'chest:'+it.id)){ toast('Need '+it.cost+' shards','warn'); return; }
      rec('shards',-it.cost,it.name);
      pushUniq('coreOwnedChests', it.id);   // consumed by 28-chest.html
      SFX('confirm');
      location.href='28-chest.html?chest='+encodeURIComponent(it.id)+'&from=shop';
    }

    // ── sheet ──
    var giftMode=false, giftPick=null, sheetItem=null;
    function showSheet(html){ qs('#sheet').innerHTML=html; qs('#scrim').classList.add('open'); qs('#sheet').classList.add('open'); }
    function closeSheet(){ qs('#scrim').classList.remove('open'); qs('#sheet').classList.remove('open'); giftMode=false; giftPick=null; sheetItem=null; }
    qs('#scrim').addEventListener('click', closeSheet);

    function priceLine(it){ return '<span class="price '+it.cur+'">'+CI(it.cur)+it.cost.toLocaleString()+'</span>'; }

    function openItem(it){
      sheetItem=it; giftMode=false; giftPick=null;
      renderSheet();
    }
    // a mini profile card showing a cosmetic the way it'll appear (frame / aura / title / badge)
    function previewCard(it){
      if(!equippable(it)) return '';
      var frameKey = it.kind==='frame'?it.frameKey:lget('coreProfileTheme','Default');
      var auraId   = it.kind==='aura' ?it.id      :lget('coreEquippedAura','');
      var titleNm  = it.kind==='title'?it.titleName:lget('coreProfileTitle','');
      var badge    = it.kind==='badge'?it : null;
      var fc=FRAME_C[frameKey]||'#8a90a0', ac=AURA_C[auraId]||'';
      var glow = ac ? '<span class="pc-glow"></span>' : '';
      var bdg  = badge ? '<span class="pc-badge" style="--bc:'+RAR[badge.rar]+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6z"/><path d="M9 11.5l2 2 4-4.5"/></svg></span>' : '';
      var ttl  = titleNm ? '<div class="pc-title">'+titleNm+'</div>' : '';
      return '<div class="pc" style="--rc:'+RAR[it.rar]+'"><div class="pc-av" style="--fc:'+fc+';--ac:'+ac+'">'+glow+AV+bdg+'</div><div class="pc-name">You</div>'+ttl+'</div>';
    }
    function renderSheet(){
      var it=sheetItem; if(!it) return;
      var lock=lockedReason(it), own=owned(it), eq=equipped(it);
      var heroIcon = it.kind==='chest' ? '<div class="sh-pv" style="--rc:'+RAR[it.rar]+';background:radial-gradient(circle at 50% 44%,color-mix(in srgb,'+RAR[it.rar]+' 26%,var(--card-2)),var(--card-2) 76%)">'+previewHTML(it)+'</div>' : '<div class="sh-pv">'+previewHTML(it)+'</div>';
      var hero='<div class="grip"></div><div class="sh-hero">'+heroIcon+
        '<div><div class="hn">'+it.name+'</div><div class="hr"><span class="dot" style="background:'+RAR[it.rar]+'"></span>'+it.rar+'</div></div></div>'+
        (giftMode?'':previewCard(it))+
        '<div class="sh-desc">'+it.desc+'</div>'+
        (it.kind==='boost'?'<div class="sh-eff"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l4 4 10-11"/></svg>'+it.effect+'</div>':'')+
        '<div class="sh-price">'+priceLine(it)+'</div>';

      var actions='';
      if(giftMode){
        var fr=friends();
        if(!fr.length){
          actions='<div class="gift-h">Gift to a friend</div><div class="empty-f">No friends yet. Add some to send gifts.</div>'+
            '<div class="sh-actions"><a class="btn ghost" href="26-friends.html">Add friends</a><button class="btn ghost" data-act="ungift">Back</button></div>';
        } else {
          var chips=fr.map(function(id){ return '<div class="friend'+(id===giftPick?' on':'')+'" data-friend="'+id+'"><div class="fa">'+(fname(id)[0]||'C')+'</div><div class="fn">'+fname(id)+'</div></div>'; }).join('');
          actions='<div class="gift-h">Send '+it.name+' to</div><div class="friends">'+chips+'</div>'+
            '<div class="sh-actions"><button class="btn primary" data-act="sendgift"'+(giftPick&&afford(it)?'':' disabled')+'>'+(giftPick?'Gift to '+fname(giftPick)+' · '+it.cost.toLocaleString():'Pick a friend')+'</button>'+
            '<button class="btn ghost" data-act="ungift">Back</button></div>'+
            '<div class="sh-note">Your '+it.cur+' is spent now; the gift is saved and delivered when your friend next syncs.</div>';
        }
      } else if(lock){
        actions='<div class="sh-actions"><button class="btn primary" disabled>'+lock+'</button></div>';
      } else if(it.kind==='chest'){
        if(shards()>=it.cost){
          actions='<div class="sh-actions"><button class="btn primary" data-act="open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l2-4h14l2 4M3 9v9h18V9M3 9h18M12 9v3"/></svg>Open for '+it.cost+' shards</button></div>';
        } else {
          var short=it.cost-shards();
          actions='<div class="sh-actions"><button class="btn primary" disabled>Need '+short+' more shard'+(short===1?'':'s')+'</button>'+
            '<button class="btn ghost" data-act="getshards"><span style="width:16px;height:16px;display:inline-flex">'+CI('shards')+'</span>Get shards</button></div>'+
            '<div class="sh-note">You have '+shards()+' of '+it.cost+' shards. Top up or convert coins in your Wallet.</div>';
        }
      } else if(own){
        var line = equippable(it) ? (eq?'<button class="btn equipped" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4 4 10-11"/></svg>Equipped</button>':'<button class="btn primary" data-act="equip">Equip</button>')
                                  : '<button class="btn equipped" disabled>Owned</button>';
        actions='<div class="sh-actions">'+line+ (giftable(it)?'<button class="btn ghost" data-act="gift">Gift one to a friend</button>':'') +'</div>';
      } else {
        var can=afford(it);
        actions='<div class="sh-actions"><button class="btn primary" data-act="self"'+(can?'':' disabled')+'>'+(can?'Buy for myself · '+it.cost.toLocaleString():'Not enough '+it.cur)+'</button>'+
          (giftable(it)?'<button class="btn ghost" data-act="gift">Gift to a friend</button>':'')+'</div>';
      }
      showSheet(hero+actions);
    }

    qs('#sheet').addEventListener('click', function(e){
      var b=e.target.closest('[data-act],[data-friend]'); if(!b) return;
      if(b.dataset.friend!=null){ giftPick=(giftPick===b.dataset.friend)?null:b.dataset.friend; renderSheet(); return; }
      var act=b.dataset.act, it=sheetItem;
      if(act==='gift'){ giftMode=true; giftPick=null; renderSheet(); }
      else if(act==='ungift'){ giftMode=false; giftPick=null; renderSheet(); }
      else if(act==='self'){ if(buyForSelf(it)){ closeSheet(); render(); } }
      else if(act==='equip'){ equip(it); closeSheet(); render(); }
      else if(act==='open'){ closeSheet(); openChest(it); }
      else if(act==='getshards'){ SFX('confirm'); location.href='wallet.html?cur=shards'; }
      else if(act==='sendgift'){ if(giftPick && giftTo(it,giftPick)){ closeSheet(); render(); } }
    });

    // ── render ──
    var TABS=[{id:'cosmetics',label:'Cosmetics'},{id:'boosts',label:'Boosts'},{id:'chests',label:'Chests'}];
    var tab='cosmetics';
    function renderBal(){
      var host=qs('#bal');
      function chip(c,lab,v){ return '<div class="b '+c+'" data-wallet="'+c+'"><span class="bi">'+CI(c)+'</span><div><div class="bv">'+v.toLocaleString()+'</div><div class="bl">'+lab+'</div></div></div>'; }
      host.innerHTML=chip('coins','Coins',coins())+chip('shards','Shards',shards());
    }
    function rowHTML(it){
      var lock=lockedReason(it), own=owned(it), eq=equipped(it);
      var end;
      if(lock) end='<span class="tag lk">Locked</span>';
      else if(it.kind==='chest') end=priceLine(it);
      else if(own) end = (equippable(it)&&eq) ? '<span class="tag eq">Equipped</span>' : (equippable(it)?'<span class="tag">Owned</span>':'<span class="tag">Owned</span>');
      else end=priceLine(it);
      var sub = it.kind==='boost' ? rarHTML(it.rar)+'<span class="desc">· '+it.effect+'</span>'
              : rarHTML(it.rar)+'<span class="desc">· '+it.desc+'</span>';
      var prem=(it.rar==='Epic'||it.rar==='Legendary'||it.rar==='Mythic')?' prem':'';
      return '<div class="row'+(lock?' dim':'')+prem+'" data-item="'+it.id+'" style="--rc:'+RAR[it.rar]+'"><div class="pv">'+previewHTML(it)+'</div>'+
        '<div class="mid"><div class="nm">'+it.name+'</div><div class="sub">'+sub+'</div></div>'+
        '<div class="end">'+end+'<span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div></div>';
    }
    function render(){
      renderBal();
      var seg=qs('#seg'); seg.innerHTML=TABS.map(function(t){ return '<button data-tab="'+t.id+'" class="'+(t.id===tab?'on':'')+'">'+t.label+'</button>'; }).join('');
      var items = tab==='cosmetics'?COSMETICS : tab==='boosts'?BOOSTS : CHESTS;
      var groups='';
      if(tab==='cosmetics'){
        ['Frames','Auras','Titles','Badges'].forEach(function(cat){
          var sub=items.filter(function(i){return i.cat===cat;}); if(!sub.length) return;
          groups+='<div class="sech">'+cat+'</div><div class="list">'+sub.map(rowHTML).join('')+'</div>';
        });
      } else {
        groups='<div class="list">'+items.map(rowHTML).join('')+'</div>';
      }
      qs('#content').innerHTML=groups;
    }

    // delegated taps (robust — every row & balance works)
    qs('#scroll').addEventListener('click', function(e){
      var t=e.target.closest('[data-tab]'); if(t){ tab=t.dataset.tab; render(); return; }
      var w=e.target.closest('[data-wallet]'); if(w){ SFX('confirm'); location.href='wallet.html?cur='+w.dataset.wallet; return; }
      var p=e.target.closest('[data-plus]'); if(p){ SFX('confirm'); location.href='29-core-plus.html?from=shop'; return; }
      var r=e.target.closest('[data-item]'); if(r){ var it=byId[r.dataset.item]; if(it) openItem(it); return; }
    });

    // help (minimal) — includes a one-line rarity guide
    try{ if(window.coreHelp){ window.coreHelp.attach('helpBtn',{ title:'Shop', bullets:[
      'Tap any item to buy it for yourself — or gift it to a friend.',
      'Tap a balance up top to open your Wallet — top up or convert coins & shards, or gift them.',
      'Boosts apply the moment you buy them and are saved to your account.',
      'Rarity, low to high: Common · Rare · Epic · Legendary · Mythic — shown by the coloured dot.',
      'Chests are opened with shards — bigger chests pay out more.'
    ]}); } }catch(e){}

    // demo seeding — deterministic
    try{
      if(/[?&]demo=1/.test(location.search)){
        var _s=S.read(); if(!_s.xp && !(_s.stats&&(_s.stats.body||_s.stats.brain))){ if(S.seedDemo) S.seedDemo(); }
        try{ lset('coreLastDailyBonus', new Date().toDateString()); }catch(e){}
        S.update(function(s){ s.coins=4200; s.shards=240; return s; });
        if(!friends().length) jset('coreFriends',['CORE-K7Q2-9XMP','CORE-B3FW-RT81','CORE-Z9LC-4HVD']);
      }
    }catch(e){}

    render();
    window.addEventListener('coreStateChange', render);
    window.addEventListener('core:progress-updated', render);
    window.addEventListener('storage', function(e){ if(!e.key||/^core/.test(e.key)) render(); });

    try{ var m=location.search.match(/tab=(\w+)/); if(m){ var f=TABS.filter(function(x){return x.id===m[1].toLowerCase();})[0]; if(f){ tab=f.id; render(); } } }catch(e){}
  })();
  </script>
  <script src="_lib/core-back.js"></script>
  <script src="_lib/core-background.js?v=20260619d"></script>
  <script src="_lib/dash-ambient.js"></script>
  <script>if(window.dashAmbient)try{window.dashAmbient.init();}catch(e){}</script>
  <script src="_lib/core-pagefx.js"></script>
</body>
