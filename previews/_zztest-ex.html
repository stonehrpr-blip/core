<!doctype html><html><head><meta charset="utf-8"><style>
body{background:#0a0a14;color:#fff;font-family:monospace;font-size:20px;padding:24px;line-height:1.7}.pass{color:#34D399}.fail{color:#FF6B7E}b{color:#5BB1FF}</style></head>
<body><div id="out">running…</div>
<iframe id="f" src="wallet.html?demo=1&cur=tickets" style="position:absolute;left:-9999px;width:390px;height:844px"></iframe>
<script>
var f=document.getElementById('f'),L=[],ran=false;
function log(ok,m){L.push('<div class="'+(ok?'pass':'fail')+'">'+(ok?'✔':'✘')+' '+m+'</div>');}
f.onload=function(){ if(ran)return;ran=true; setTimeout(function(){ try{
 var w=f.contentWindow,d=f.contentDocument;
 function coins(){return (JSON.parse(w.localStorage.getItem('coreState.v1')||'{}').coins)||0;}
 function tix(){return parseInt(w.localStorage.getItem('coreTickets')||'0',10)||0;}
 function shd(){return (JSON.parse(w.localStorage.getItem('coreState.v1')||'{}').shards)||0;}
 // EXCHANGE coins -> tickets (600 coins -> 3 tickets)
 var c0=coins(),t0=tix();
 d.querySelector('[data-ex="0"]').click();                 // open confirm
 d.querySelector('[data-s="confirm"]').click();            // confirm
 var c1=coins(),t1=tix();
 log(c1===c0-600&&t1===t0+3,'Convert coins→tickets: coins <b>'+c0+'→'+c1+'</b> (−600), tickets <b>'+t0+'→'+t1+'</b> (+3)');
 // switch to shards, exchange 500 -> 10 shards
 d.querySelector('[data-tab]')||0; // (seg uses onclick buttons)
 // click the Shards seg
 Array.prototype.slice.call(d.querySelectorAll('#seg button')).forEach(function(b){ if(/Shards/.test(b.textContent)) b.click(); });
 var c2=coins(),s0=shd();
 d.querySelector('[data-ex="0"]').click(); d.querySelector('[data-s="confirm"]').click();
 var c3=coins(),s1=shd();
 log(c3===c2-500&&s1===s0+10,'Convert coins→shards: coins <b>'+c2+'→'+c3+'</b> (−500), shards <b>'+s0+'→'+s1+'</b> (+10)');
 // ledger recorded both sides
 var led=JSON.parse(w.localStorage.getItem('coreCoinLedger.v1')||'[]');
 log(led.length>=4,'Ledger recorded conversions ('+led.length+' entries)');
 document.getElementById('out').innerHTML='<div style="font-size:24px;margin-bottom:12px">WALLET — top-up exchange</div>'+L.join('');
 }catch(e){document.getElementById('out').innerHTML='EXCEPTION: '+e.message+'<br>'+L.join('');} },700);
};
</script></body></html>
