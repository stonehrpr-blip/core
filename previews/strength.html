<!doctype html>
<html lang="en">
<head>
<script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Strength</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root{
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.022); --border:rgba(255,255,255,0.07);
    --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
    --accent:#0A84FF; --grad-a:#0A84FF; --grad-b:#0A84FF; --grad-c:#0A84FF; --good:#0A84FF; --str:#0A84FF; --str2:#0A84FF;
    --m-chest:#8A90A6; --m-back:#8A90A6; --m-shoulders:#8A90A6; --m-arms:#8A90A6; --m-legs:#8A90A6; --m-core:#8A90A6;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{ min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone{ position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38; }
  .notch{ position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.5); border-radius:999px; z-index:60; }
  .bg{ position:absolute; inset:0; z-index:0; background:
      radial-gradient(60% 30% at 50% 3%, color-mix(in srgb,var(--accent) 11%,transparent) 0%, transparent 60%),
      linear-gradient(180deg,#060610 0%,#02020A 55%,#050510 100%); }
  .aurora{ position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.16; mix-blend-mode:screen; }
  .aurora::before{ content:""; position:absolute; width:72%; height:38%; left:-12%; top:-2%; border-radius:50%; filter:blur(74px);
    background:radial-gradient(circle, color-mix(in srgb,var(--accent) 22%,transparent), transparent 64%); animation:drift 20s ease-in-out infinite; }
  @keyframes drift{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(18px,-12px) scale(1.07);} }
  @media (prefers-reduced-motion:reduce){ .aurora::before,.bodyfig .fill{ animation:none!important; } }

  .frame{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }
  .ghead{ padding:6px 20px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .ghead h1{ margin:0; font-size:30px; font-weight:800; letter-spacing:-1.2px; line-height:1; }
  .ghead .sub{ margin-top:6px; font-size:12.5px; color:var(--muted); }
  .xppill{ display:flex; align-items:center; gap:7px; padding:7px 11px; border-radius:999px; background:color-mix(in srgb,var(--accent) 12%,transparent); border:1px solid color-mix(in srgb,var(--accent) 35%,transparent); }
  .xppill b{ font-size:13px; font-variant-numeric:tabular-nums; } .xppill .rk{ font-size:9px; color:var(--muted); letter-spacing:1.4px; text-transform:uppercase; font-weight:700; }

  .scroll{ flex:1; overflow-y:auto; padding:2px 18px 130px; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar{ display:none; }

  /* progression strip */
  .prog{ display:flex; gap:8px; margin:6px 0 14px; }
  .prog .pcard{ flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:11px 8px; text-align:center; }
  .prog .pnum{ font-size:19px; font-weight:800; letter-spacing:-0.5px; font-variant-numeric:tabular-nums; }
  .prog .pcard.s .pnum{ color:var(--str); }
  .prog .plbl{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:3px; font-weight:700; }

  /* body diagram */
  .bodywrap{ background:var(--bg-card); border:1px solid var(--border); border-radius:24px; padding:14px 10px 12px; margin-bottom:14px; position:relative; overflow:hidden; }
  .bodywrap .glowbg{ position:absolute; inset:0; background:radial-gradient(60% 50% at 50% 35%, color-mix(in srgb,var(--accent) 7%,transparent), transparent 70%); pointer-events:none; }
  .bodytabs{ display:flex; justify-content:center; gap:6px; margin-bottom:6px; position:relative; }
  .btab{ font-size:11px; font-weight:700; padding:5px 14px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--muted); cursor:pointer; }
  .btab.on{ color:var(--text); border-color:color-mix(in srgb,var(--accent) 45%,transparent); background:color-mix(in srgb,var(--accent) 12%,transparent); }
  .figs{ display:flex; justify-content:center; gap:6px; position:relative; }
  .bodyfig{ width:150px; height:300px; }
  .bodyfig .frameln{ fill:none; stroke:rgba(255,255,255,0.10); stroke-width:1; }
  .bodyfig .skin{ fill:#15161F; }
  .reg{ cursor:pointer; }
  .reg .fill{ fill:#5A607A; transition:opacity .5s ease, fill .5s ease; }
  .reg[data-lvl="none"] .fill{ fill:#3A3D4A; opacity:.32; }
  .reg[data-lvl="low"]  .fill{ opacity:.42; }
  .reg[data-lvl="mid"]  .fill{ opacity:.72; }
  .reg[data-lvl="high"] .fill{ fill:var(--accent); opacity:1; }
  .reg.glow{ filter:drop-shadow(0 0 5px color-mix(in srgb,var(--accent) 70%,transparent)); }
  .reg:active .fill{ opacity:.85; }
  .figlabel{ text-align:center; font-size:9.5px; color:var(--dim); text-transform:uppercase; letter-spacing:1.4px; font-weight:700; margin-top:2px; }

  .legend{ display:flex; align-items:center; justify-content:center; gap:12px; margin:8px 0 2px; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; font-weight:700; }
  .legend i{ display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:4px; vertical-align:-1px; }

  .sechead{ display:flex; align-items:center; justify-content:space-between; margin:16px 2px 10px; }
  .sechead .kick{ font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--str); font-weight:800; }
  .sechead .hint{ font-size:11px; color:var(--dim); }

  /* muscle chips */
  .mchips{ display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:6px; }
  .mchip{ display:flex; align-items:center; gap:10px; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:11px 12px; cursor:pointer; transition:transform .14s ease, border-color .2s; }
  .mchip:active{ transform:scale(0.96); }
  .mchip .dot{ width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--muted); background:rgba(255,255,255,0.04); box-shadow:inset 0 0 0 1px var(--border); }
  .mchip.glow .dot{ color:var(--accent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 70%,transparent), 0 0 12px color-mix(in srgb,var(--accent) 45%,transparent); }
  .mchip .mn{ font-size:13px; font-weight:700; letter-spacing:-0.2px; }
  .mchip .ml{ font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:1px; }
  .mchip .arrow{ margin-left:auto; color:var(--dim); font-size:16px; }
  .lvlbar{ height:4px; border-radius:999px; background:rgba(255,255,255,0.07); overflow:hidden; margin-top:5px; }
  .lvlbar i{ display:block; height:100%; background:var(--accent); border-radius:999px; transition:width .6s ease; }

  /* camera CTA */
  .camcta{ display:flex; align-items:center; gap:13px; width:100%; margin:16px 0 4px; padding:15px 16px; border-radius:20px; cursor:pointer;
    background:color-mix(in srgb,var(--accent) 12%,transparent); border:1px solid color-mix(in srgb,var(--accent) 35%,transparent); transition:transform .14s ease; }
  .camcta:active{ transform:scale(0.98); }
  .camcta .ci{ width:44px; height:44px; flex:none; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--accent); background:rgba(0,0,0,0.3); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 40%,transparent); }
  .camcta .ct{ flex:1; } .camcta .ct b{ font-size:14.5px; font-weight:800; letter-spacing:-0.3px; } .camcta .ct span{ display:block; font-size:11px; color:var(--muted); margin-top:2px; }
  .camcta .live{ font-size:8.5px; font-weight:800; color:var(--accent); letter-spacing:1px; padding:3px 7px; border-radius:6px; background:color-mix(in srgb,var(--accent) 14%,transparent); }

  /* onboarding overlay */
  .scrim{ position:absolute; inset:0; z-index:80; background:rgba(2,2,10,0.74); backdrop-filter:blur(8px); opacity:0; pointer-events:none; transition:opacity .3s; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .obcard{ position:absolute; left:18px; right:18px; top:50%; transform:translateY(-50%) scale(0.94); z-index:81; background:#10101F; border:1px solid rgba(255,255,255,0.10); border-radius:28px; padding:24px 22px 22px; opacity:0; pointer-events:none; transition:opacity .32s, transform .32s cubic-bezier(.16,1,.3,1); }
  .obcard.show{ opacity:1; pointer-events:auto; transform:translateY(-50%) scale(1); }
  .obkick{ font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--str); font-weight:800; }
  .obq{ font-size:21px; font-weight:800; letter-spacing:-0.5px; margin:8px 0 4px; }
  .obsub{ font-size:12px; color:var(--muted); margin-bottom:16px; }
  .obdots{ display:flex; gap:6px; margin-bottom:18px; }
  .obdots i{ height:4px; flex:1; border-radius:999px; background:rgba(255,255,255,0.10); }
  .obdots i.on{ background:var(--str); }
  .opts{ display:flex; flex-direction:column; gap:9px; }
  .opt{ display:flex; align-items:center; gap:12px; padding:14px; border-radius:16px; border:1px solid var(--border); background:rgba(255,255,255,0.03); cursor:pointer; transition:transform .12s, border-color .2s, background .2s; }
  .opt:active{ transform:scale(0.97); }
  .opt.sel{ border-color:color-mix(in srgb,var(--accent) 55%,transparent); background:color-mix(in srgb,var(--accent) 12%,transparent); }
  .opt .oe{ font-size:22px; } .opt .ot{ font-size:14px; font-weight:700; } .opt .od{ font-size:11px; color:var(--muted); margin-top:1px; }
  .obnext{ width:100%; margin-top:18px; border:none; border-radius:16px; padding:15px; font-size:15px; font-weight:800; color:#fff; background:var(--accent); cursor:pointer; transition:transform .12s, opacity .2s; }
  .obnext:active{ transform:scale(0.97); } .obnext:disabled{ opacity:0.4; }

  .bigbtn{ width:100%; border:none; border-radius:18px; padding:16px; font-size:15px; font-weight:800; cursor:pointer; color:#fff; background:var(--accent); transition:transform .12s; }
  .bigbtn:active{ transform:scale(0.97); }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="bg"></div><div class="aurora"></div>

    <div class="frame">
      <header class="ghead">
        <div><h1>Strength</h1><div class="sub">Train your body. Watch it grow.</div></div>
        <div class="xppill"><b id="xpVal">0</b> <span class="rk" id="rkVal">XP</span></div>
      </header>

      <div class="scroll">
        <div class="prog">
          <div class="pcard"><div class="pnum" id="pWk">0</div><div class="plbl">Workouts</div></div>
          <div class="pcard"><div class="pnum" id="pSets">0</div><div class="plbl">Total Sets</div></div>
          <div class="pcard s"><div class="pnum" id="pStr">0</div><div class="plbl">Strength</div></div>
        </div>

        <div class="bodywrap">
          <div class="glowbg"></div>
          <div class="bodytabs">
            <div class="btab on" data-view="front">Front</div>
            <div class="btab" data-view="back">Back</div>
          </div>
          <div class="figs" id="figs"><!-- svg figure injected --></div>
          <div class="legend">
            <span><i style="background:#3A3D4A"></i>Untrained</span>
            <span><i style="background:#5A607A;opacity:.6"></i>Low</span>
            <span><i style="background:#0A84FF"></i>Trained</span>
            <span><i style="background:#0A84FF;box-shadow:0 0 6px rgba(10,132,255,0.7)"></i>Glowing</span>
          </div>
        </div>

        <div class="camcta" id="camCta">
          <div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M4 7h3l2-2h6l2 2h3v12H4z"/><circle cx="12" cy="13" r="3.5"/></svg></div>
          <div class="ct"><b>Live Rep Camera</b><span>Do real reps <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;vertical-align:0"><path d="M9 6l6 6-6 6"/></svg> earn Strength live</span></div>
          <div class="live">LIVE</div>
        </div>

        <div class="sechead"><span class="kick">Muscle Groups</span><span class="hint">tap to train</span></div>
        <div class="mchips" id="mchips"></div>
      </div>
    </div>

    <!-- ONBOARDING -->
    <div class="scrim" id="obScrim"></div>
    <div class="obcard" id="obCard"></div>

    <div class="home-indicator"></div>
  </div>

  <script src="_lib/core-sfx.js"></script>
  <script src="_lib/core-state.js"></script>
  <script src="_lib/core-gym-data.js"></script>
  <script src="_lib/core-strength.js"></script>
  <script>
  (function(){
    "use strict";
    var $=function(s,r){ return (r||document).querySelector(s); };
    var S=window.CoreStrength, G=window.CoreGym;
    function sfx(n){ S.sfx(n); }
    function haptic(){ try{ navigator.vibrate && navigator.vibrate(8); }catch(e){} }
    function ic(d,s){ s=s||16; return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:'+s+'px;height:'+s+'px;vertical-align:-2px">'+d+'</svg>'; }
    var GI={
      flame:    ic('<path d="M12 3c1.6 3.6 4 4.6 4 8a4 4 0 0 1-8 0c0-1.3.5-2.1 1-2.7C9 11 12 8 12 3z"/>',13),
      flame2:   ic('<path d="M12 3c1.6 3.6 4 4.6 4 8a4 4 0 0 1-8 0c0-1.3.5-2.1 1-2.7C9 11 12 8 12 3z"/>',22),
      chevron:  ic('<path d="M9 6l6 6-6 6"/>',16),
      dumbbell: ic('<path d="M4 9v6M7 7v10M17 7v10M20 9v6M7 12h10"/>',22),
      sword:    ic('<path d="M14 4l6 0 0 6-9 9-3-3zM5 19l3-3M9 11l-5 5 2 2 5-5"/>',22),
      sprout:   ic('<path d="M12 21v-8M12 13c0-3-2-5-5-5 0 3 2 5 5 5zM12 11c0-2.5 2-4 4.5-4 0 2.5-2 4-4.5 4z"/>',22),
      bolt:     ic('<path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>',22),
      trophy:   ic('<path d="M8 4h8v4a4 4 0 0 1-8 0zM8 5H5v1a3 3 0 0 0 3 3M16 5h3v1a3 3 0 0 1-3 3M10 12h4M9 20h6M12 14v6"/>',22),
      stadium:  ic('<ellipse cx="12" cy="12" rx="9" ry="6"/><path d="M7 12a5 3 0 0 1 10 0M9 9l-1 6M15 9l1 6"/>',22),
      home:     ic('<path d="M4 11l8-7 8 7M6 10v9h12v-9"/>',22),
      shuffle:  ic('<path d="M4 7h4l8 10h4M4 17h4l3-3.5M14 7h6M17 4l3 3-3 3M17 14l3 3-3 3"/>',22)
    };

    /* ---------- body figures (stylised, clickable regions) ---------- */
    function figFront(){
      return '<svg class="bodyfig" viewBox="0 0 110 250" fill="none" data-view="front">'+
        '<circle class="skin" cx="55" cy="18" r="12"/>'+
        '<rect class="skin" x="50" y="28" width="10" height="8" rx="3"/>'+
        // shoulders
        '<g class="reg" data-m="shoulders"><ellipse class="fill" cx="33" cy="46" rx="12" ry="9"/><ellipse class="fill" cx="77" cy="46" rx="12" ry="9"/></g>'+
        // chest
        '<g class="reg" data-m="chest"><rect class="fill" x="37" y="40" width="16" height="22" rx="7"/><rect class="fill" x="57" y="40" width="16" height="22" rx="7"/></g>'+
        // arms
        '<g class="reg" data-m="arms"><rect class="fill" x="22" y="50" width="11" height="42" rx="5"/><rect class="fill" x="77" y="50" width="11" height="42" rx="5"/><rect class="fill" x="20" y="92" width="10" height="36" rx="5"/><rect class="fill" x="80" y="92" width="10" height="36" rx="5"/></g>'+
        // core
        '<g class="reg" data-m="core"><rect class="fill" x="42" y="64" width="26" height="46" rx="8"/></g>'+
        // legs
        '<g class="reg" data-m="legs"><rect class="fill" x="40" y="112" width="13" height="54" rx="6"/><rect class="fill" x="57" y="112" width="13" height="54" rx="6"/><rect class="fill" x="41" y="168" width="11" height="50" rx="5"/><rect class="fill" x="58" y="168" width="11" height="50" rx="5"/></g>'+
      '</svg>';
    }
    function figBack(){
      return '<svg class="bodyfig" viewBox="0 0 110 250" fill="none" data-view="back">'+
        '<circle class="skin" cx="55" cy="18" r="12"/>'+
        '<rect class="skin" x="50" y="28" width="10" height="8" rx="3"/>'+
        '<g class="reg" data-m="shoulders"><ellipse class="fill" cx="33" cy="46" rx="12" ry="9"/><ellipse class="fill" cx="77" cy="46" rx="12" ry="9"/><path class="fill" d="M44 38 h22 l-4 12 h-14 z"/></g>'+
        // back (lats)
        '<g class="reg" data-m="back"><path class="fill" d="M38 50 h34 l-3 40 q-14 6 -28 0 z"/></g>'+
        '<g class="reg" data-m="arms"><rect class="fill" x="22" y="50" width="11" height="42" rx="5"/><rect class="fill" x="77" y="50" width="11" height="42" rx="5"/><rect class="fill" x="20" y="92" width="10" height="36" rx="5"/><rect class="fill" x="80" y="92" width="10" height="36" rx="5"/></g>'+
        // lower back
        '<g class="reg" data-m="core"><rect class="fill" x="44" y="92" width="22" height="20" rx="6"/></g>'+
        // legs (hamstrings/glutes)
        '<g class="reg" data-m="legs"><rect class="fill" x="40" y="112" width="13" height="20" rx="6"/><rect class="fill" x="57" y="112" width="13" height="20" rx="6"/><rect class="fill" x="40" y="134" width="13" height="34" rx="6"/><rect class="fill" x="57" y="134" width="13" height="34" rx="6"/><rect class="fill" x="41" y="170" width="11" height="48" rx="5"/><rect class="fill" x="58" y="170" width="11" height="48" rx="5"/></g>'+
      '</svg>';
    }
    var view='front';
    function renderFig(){
      $('#figs').innerHTML = (view==='front'?figFront():figBack()) ;
      paintBody();
      Array.prototype.forEach.call(document.querySelectorAll('.reg'), function(g){
        g.addEventListener('click', function(){ go(g.getAttribute('data-m')); });
      });
    }
    function paintBody(){
      G.MUSCLES.forEach(function(m){
        var li=S.levelInfo(m.id);
        Array.prototype.forEach.call(document.querySelectorAll('[data-m="'+m.id+'"]'), function(g){
          g.style.setProperty('--c', li.color);
          g.setAttribute('data-lvl', li.level);
          g.classList.toggle('glow', li.glow);
        });
      });
    }
    function go(muscle){ sfx('tick'); haptic(); location.href='muscle-detail.html?muscle='+muscle; }

    /* ---------- muscle chips ---------- */
    var LVL_LABEL={ none:'Untrained', low:'Warming up', mid:'Trained', high:'Glowing '+GI.flame };
    function renderChips(){
      var html=G.MUSCLES.map(function(m){
        var li=S.levelInfo(m.id);
        var pct=Math.round(Math.min(1, li.score/60)*100);
        return '<div class="mchip'+(li.glow?' glow':'')+'" data-m="'+m.id+'" style="--mc:var(--m-'+m.id+')">'+
          '<div class="dot">'+m.emoji+'</div>'+
          '<div style="flex:1;min-width:0"><div class="mn">'+m.name+'</div><div class="ml">'+LVL_LABEL[li.level]+'</div>'+
            '<div class="lvlbar"><i style="width:'+pct+'%"></i></div></div>'+
          '<div class="arrow">'+GI.chevron+'</div>'+
        '</div>';
      }).join('');
      $('#mchips').innerHTML=html;
      Array.prototype.forEach.call(document.querySelectorAll('.mchip'), function(c){
        c.addEventListener('click', function(){ go(c.getAttribute('data-m')); });
      });
    }

    /* ---------- header / progression ---------- */
    function syncHeader(){
      $('#xpVal').textContent=fmt(S.xp());
      $('#rkVal').textContent=(S.rank()&&S.rank().name)?S.rank().name:'XP';
      var st=S.stats();
      $('#pWk').textContent=st.workouts; $('#pSets').textContent=st.sets; $('#pStr').textContent=S.strength();
    }
    function fmt(n){ n=Math.round(n); return n>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':''+n; }

    /* ---------- onboarding ---------- */
    var OB=[
      { kick:'About you', q:"What's your goal?", sub:'We tune your workouts around this.', key:'goal',
        opts:[{v:'muscle',e:GI.dumbbell,t:'Build muscle',d:'Size, shape, strength'},{v:'fat',e:GI.flame2,t:'Lose fat',d:'Lean out, stay strong'},{v:'strong',e:GI.sword,t:'Get stronger',d:'Raw power and PRs'}] },
      { kick:'Experience', q:'Experience level?', sub:'Sets how hard we push.', key:'level',
        opts:[{v:'beginner',e:GI.sprout,t:'Beginner',d:'New or returning'},{v:'intermediate',e:GI.bolt,t:'Intermediate',d:'Train regularly'},{v:'advanced',e:GI.trophy,t:'Advanced',d:'Years under the bar'}] },
      { kick:'Setup', q:'Where do you train?', sub:'We filter exercises to your gear.', key:'place',
        opts:[{v:'gym',e:GI.stadium,t:'Gym',d:'Full equipment'},{v:'home',e:GI.home,t:'Home',d:'Minimal or bodyweight'},{v:'both',e:GI.shuffle,t:'Both',d:'Mix it up'}] }
    ];
    var obStep=0, obAns={};
    function renderOb(){
      var s=OB[obStep];
      var dots=OB.map(function(_,i){ return '<i class="'+(i<=obStep?'on':'')+'"></i>'; }).join('');
      var opts=s.opts.map(function(o){ var sel=obAns[s.key]===o.v;
        return '<div class="opt'+(sel?' sel':'')+'" data-v="'+o.v+'"><div class="oe">'+o.e+'</div><div><div class="ot">'+o.t+'</div><div class="od">'+o.d+'</div></div></div>';
      }).join('');
      $('#obCard').innerHTML='<div class="obkick">'+s.kick+'</div><div class="obq">'+s.q+'</div><div class="obsub">'+s.sub+'</div>'+
        '<div class="obdots">'+dots+'</div><div class="opts">'+opts+'</div>'+
        '<button class="obnext" id="obNext"'+(obAns[s.key]?'':' disabled')+'>'+(obStep<OB.length-1?'Next':'Start training '+ic('<path d="M9 6l6 6-6 6"/>',15))+'</button>';
      Array.prototype.forEach.call(document.querySelectorAll('#obCard .opt'), function(o){
        o.addEventListener('click', function(){ obAns[s.key]=o.getAttribute('data-v'); sfx('tick'); haptic(); renderOb(); });
      });
      $('#obNext').addEventListener('click', function(){
        if(!obAns[s.key]) return;
        sfx('confirm');
        if(obStep<OB.length-1){ obStep++; renderOb(); }
        else{ S.setProfile(obAns); closeOb(); sfx('reward'); }
      });
    }
    function openOb(){ renderOb(); $('#obScrim').classList.add('show'); $('#obCard').classList.add('show'); }
    function closeOb(){ $('#obScrim').classList.remove('show'); $('#obCard').classList.remove('show'); }

    /* ---------- init ---------- */
    function init(){
      renderFig(); renderChips(); syncHeader();
      Array.prototype.forEach.call(document.querySelectorAll('.btab'), function(t){
        t.addEventListener('click', function(){ view=t.getAttribute('data-view'); sfx('tick');
          Array.prototype.forEach.call(document.querySelectorAll('.btab'), function(x){ x.classList.toggle('on', x===t); });
          renderFig(); });
      });
      $('#camCta').addEventListener('click', function(){ sfx('tick'); location.href='strength-camera.html'; });
      if(!S.hasProfile()) setTimeout(openOb, 350);
    }
    if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
