<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Streak milestone</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="stylesheet" href="_lib/core-buttons.css" />
<script src="_lib/core-state.js"></script>
<script src="_lib/analytics.js"></script>
  <script src="_lib/core-back.js"></script>
<style>
  :root { --bg-base:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --accent:#4A8FFF; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }
  .bg {
    position:absolute; inset:0;
    background:
      radial-gradient(70% 40% at 50% 18%, rgba(179,136,255,0.30), transparent 65%),
      radial-gradient(50% 30% at 50% 95%, rgba(74,143,255,0.20), transparent 60%),
      linear-gradient(180deg, #160a3d 0%, #02020A 60%, #050510 100%);
  }
  .rays {
    position:absolute; left:50%; top:42%; transform:translate(-50%,-50%);
    width: 600px; height:600px;
    background: conic-gradient(from 0deg, rgba(179,136,255,0.18) 0deg, transparent 30deg, rgba(91,177,255,0.18) 60deg, transparent 90deg, rgba(255,107,170,0.18) 120deg, transparent 150deg, rgba(255,122,69,0.18) 180deg, transparent 210deg, rgba(179,136,255,0.18) 240deg, transparent 270deg, rgba(91,177,255,0.18) 300deg, transparent 330deg, rgba(255,107,170,0.18) 360deg);
    filter: blur(20px); animation: spin 24s linear infinite; opacity: 0.85;
  }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* confetti pieces */
  .conf { position:absolute; width:8px; height:14px; opacity:0; animation: fall var(--d,5s) linear var(--del,0s) infinite; pointer-events:none; border-radius:2px; }
  .conf.c1 { background:#FF6BAA; }
  .conf.c2 { background:#B388FF; }
  .conf.c3 { background:#FFD05C; }
  .conf.c4 { background:#5CE1E6; }
  .conf.c5 { background:#FF7A45; }
  @keyframes fall {
    0% { transform: translateY(-30px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.95; }
    100% { transform: translateY(900px) rotate(720deg); opacity: 0; }
  }

  .frame { position:absolute; inset:0; padding: 60px 0 26px; display:flex; flex-direction:column; z-index:10; }
  .topbar { display:flex; align-items:center; justify-content:flex-end; padding: 0 22px; }
  .close { width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.10); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .close svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* hero number */
  .hero { padding: 18px 26px 0; text-align:center; position:relative; z-index:10; }
  .kicker { font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:#5BB1FF; font-weight:800; margin-bottom: 8px; animation: fadeIn .6s .2s both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .num-wrap { position:relative; display:inline-block; }
  .num {
    font-size: 180px; font-weight: 800; letter-spacing: -8px; line-height: 0.9;
    background: linear-gradient(180deg, #fff 0%, #B388FF 90%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    animation: pop .8s cubic-bezier(.2,1.3,.4,1) both;
  }
  @keyframes pop { from { transform: scale(0.7); opacity:0; } to { transform: scale(1); opacity:1; } }
  .num-suffix { font-size: 22px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight:700; margin-top: 6px; }
  .title { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.1; margin-top: 24px; animation: fadeIn .6s .5s both; }
  .title .g { background: linear-gradient(135deg, #4A8FFF 0%, #6F70FF 50%, #B388FF 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .copy { color: var(--muted); font-size: 14px; line-height: 21px; max-width: 320px; margin: 12px auto 0; animation: fadeIn .6s .7s both; }

  /* share card preview */
  .preview-card {
    position: relative; margin: 24px auto 0;
    width: 320px; height: 184px; border-radius: 20px; overflow: hidden;
    background: linear-gradient(135deg, #07071F 0%, #100828 60%, #050510 100%);
    border: 1px solid rgba(91,177,255,0.30);
    padding: 18px;
    animation: fadeIn .7s .85s both;
    box-shadow: 0 20px 50px rgba(91,177,255,0.20);
  }
  .preview-card .brand { display:flex; align-items:center; gap: 6px; }
  .preview-card .brand .dot { width:6px; height:6px; border-radius:50%; background:#4A8FFF; box-shadow:0 0 8px #4A8FFF; }
  .preview-card .brand .wm { font-size:9px; letter-spacing:0.32em; font-weight:700; color: rgba(255,255,255,0.85); }
  .preview-card .pn-num { font-size: 72px; font-weight: 800; letter-spacing:-4px; line-height: 0.95; margin-top: 8px; background: linear-gradient(180deg, #fff, #B388FF); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .preview-card .pn-lbl { font-size: 11px; letter-spacing: 0.24em; color: rgba(255,255,255,0.55); text-transform:uppercase; font-weight:700; margin-top:4px; }
  .preview-card .pn-bot { position:absolute; left:18px; right:18px; bottom: 12px; display:flex; align-items:center; justify-content:space-between; font-size: 10px; }
  .preview-card .pn-bot .name { color: #fff; font-weight:700; }
  .preview-card .pn-bot .host { color: rgba(255,255,255,0.50); letter-spacing:2px; }

  /* xp / unlock chips */
  .chips { display:flex; gap:8px; justify-content:center; margin-top: 18px; animation: fadeIn .6s 1s both; flex-wrap: wrap; padding: 0 16px; }
  .chip { display:inline-flex; align-items:center; gap:6px; padding: 7px 12px; border-radius:999px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); font-size: 12px; color: #fff; }
  .chip strong { color:#5BB1FF; font-weight: 700; }
  .chip .dot { width:6px; height:6px; border-radius:50%; background: var(--c); box-shadow: 0 0 8px var(--c); }

  .footer { margin-top:auto; padding: 16px 26px 0; animation: fadeIn .6s 1.2s both; }
</style>
  <link rel="stylesheet" href="_lib/core-responsive.css">
  <link rel="stylesheet" href="_lib/core-theme.css">
  <script src="_lib/core-theme.js" defer></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="rays"></div>
    <div id="confetti"></div>

    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="frame">
      <div class="topbar">
        <div class="close" onclick="window.location.href='20-dashboard.html'"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
      </div>

      <div class="hero">
        <div class="kicker">Milestone unlocked</div>
        <div class="num-wrap"><div class="num" id="num">14</div></div>
        <div class="num-suffix" id="suffix">Days clean · Quit Vape</div>
        <h1 class="title"><span class="g" id="bigTitle">Two weeks in.</span></h1>
        <p class="copy" id="bigCopy">Lung capacity is measurably recovering. Your Coach noticed. Your friends will too.</p>
      </div>

      <div class="preview-card">
        <div class="brand"><span class="dot"></span><span class="wm">CORE</span></div>
        <div class="pn-num" id="pnNum">14</div>
        <div class="pn-lbl">Day streak · vape</div>
        <div class="pn-bot"><span class="name" id="pnName">@stone</span><span class="host">CORE · core.app</span></div>
      </div>

      <div class="chips">
        <div class="chip"><span class="dot" style="--c:#5BB1FF;"></span><strong>+ <span id="xpEarned">100</span> XP</strong> bonus</div>
        <div class="chip"><span class="dot" style="--c:#B388FF;"></span>Flow III achievement</div>
        <div class="chip"><span class="dot" style="--c:#5CE1E6;"></span>1 freeze refreshed</div>
      </div>

      <div class="footer">
        <button id="nextGoalBtn" class="btn secondary pill block" style="display:none; margin-bottom:8px;" onclick="window.location.href='48-goal-set.html'">
          Pick my next mountain →
        </button>
        <button class="btn primary shine pill block lg" onclick="postToFeed()">
          Post to feed
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 12h14M13 5l7 7-7 7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn secondary pill block" style="margin-top:8px;" onclick="openCardGen()">Customize share card →</button>
        <button class="btn ghost block" style="margin-top:4px;" onclick="window.location.href='20-dashboard.html'">Just take me home</button>
      </div>
    </div>
  </div>

<script>
  const MILESTONE_COPY = {
    7:   { title: "One week clean.",   copy: "Cravings peak then fall. You just rode the wave. Keep going." },
    14:  { title: "Two weeks in.",     copy: "Lung capacity is measurably recovering. Your Coach noticed. Your friends will too." },
    30:  { title: "One month clean.",  copy: "The hard re-wiring starts here. Most people quit when it gets boring — don't be most people." },
    60:  { title: "Two months in.",    copy: "The neural pathways are rebuilding. You're not 'on a streak' anymore — you're someone who doesn't vape." },
    100: { title: "Triple digits.",    copy: "Inner-circle territory. Founder DM unlocked — drop us a line if you want." },
    365: { title: "One full year.",    copy: "Year one. The version of you who downloaded this app would not recognize this version of you." },
  };
  const XP_BY_DAYS = { 7: 50, 14: 100, 30: 250, 60: 500, 100: 1000, 365: 5000 };
  function pickMilestone(d) {
    const tiers = Object.keys(MILESTONE_COPY).map(Number).sort((a,b)=>b-a);
    return tiers.find(t => d >= t) || 7;
  }

  (function init(){
    const s = coreState.read();
    const param = new URLSearchParams(location.search).get('days');
    const days = param ? parseInt(param, 10) : (s.streak.days || 14);
    const ms = pickMilestone(days);
    document.getElementById('num').textContent = days;
    document.getElementById('pnNum').textContent = days;
    document.getElementById('bigTitle').textContent = MILESTONE_COPY[ms].title;
    document.getElementById('bigCopy').textContent = MILESTONE_COPY[ms].copy;
    document.getElementById('xpEarned').textContent = XP_BY_DAYS[ms] || 100;
    try {
      const t = JSON.parse(localStorage.getItem('coreOnboardTrial') || '{}');
      if (t.name) document.getElementById('pnName').textContent = '@' + t.name.toLowerCase();
    } catch(e){}

    // confetti
    const layer = document.getElementById('confetti');
    const classes = ['c1','c2','c3','c4','c5'];
    for (let i=0;i<60;i++) {
      const el = document.createElement('div');
      el.className = 'conf ' + classes[i % classes.length];
      el.style.left = (Math.random()*100) + '%';
      el.style.setProperty('--d', (4 + Math.random()*4) + 's');
      el.style.setProperty('--del', (Math.random()*3) + 's');
      layer.appendChild(el);
    }

    if (window.coreTrack) coreTrack('milestone_celebrated', { days, milestone: ms });

    // From day 30 onward, surface the "pick next mountain" CTA above the share button.
    if (days >= 30 && !localStorage.getItem('coreNextGoalPicked')) {
      const ng = document.getElementById('nextGoalBtn');
      if (ng) ng.style.display = '';
    }
  })();

  function postToFeed() {
    if (window.coreTrack) coreTrack('milestone_share_sheet', {});
    location.href = '53-streak-share.html';
  }
  function openCardGen() {
    const s = coreState.read();
    const days = s.streak.days || 14;
    let name = 'stone';
    try { const t = JSON.parse(localStorage.getItem('coreOnboardTrial') || '{}'); if (t.name) name = t.name; } catch(e){}
    location.href = '55-share-card-generator.html?streak=' + days + '&stat=streak&score=' + days + '&name=' + encodeURIComponent(name) + '&line=' + encodeURIComponent('Day ' + days + ' clean. Quit Vape.');
  }
</script>
</body>
</html>
