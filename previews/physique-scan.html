<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CORE — Physique Scan</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
:root{ --bg:#02020A; --card:rgba(255,255,255,0.035); --border:rgba(255,255,255,0.08);
  --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --blue:#0A84FF; --blue-3:#5BB1FF;
  --green:#34D399; --orange:#FF7A45; --pink:#FF6B7E; --grad-b:#6F70FF; }
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{min-height:100vh;background:#0A0A14;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;color:var(--text);
  -webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}
.phone{position:relative;width:390px;height:844px;background:var(--bg);border-radius:56px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
.amb{position:absolute;inset:0;z-index:0;background:
  radial-gradient(60% 35% at 50% 25%,rgba(47,143,255,.18),transparent 55%),
  radial-gradient(50% 30% at 50% 100%,rgba(159,143,255,.10),transparent 65%),
  linear-gradient(180deg,#060B26,#02020A 50%,#050510);}
.frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:54px 18px 12px;}
.tb-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--card);
  display:flex;align-items:center;justify-content:center;cursor:pointer;}
.tb-btn svg{width:18px;height:18px;color:var(--muted);}
.tb-title{font-size:16px;font-weight:800;letter-spacing:.2px;}
.scroll{flex:1;overflow-y:auto;padding:0 18px 28px;}
.scroll::-webkit-scrollbar{display:none;}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:12px;}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.h1{font-size:25px;font-weight:800;letter-spacing:-.4px;line-height:1.15;}
.muted{color:var(--muted);font-size:13px;line-height:1.5;}
.btn{width:100%;padding:15px;border-radius:15px;border:none;font:inherit;font-size:15px;font-weight:800;
  cursor:pointer;color:#02030A;background:var(--blue);box-shadow:0 8px 22px rgba(10,132,255,.32);}
.btn:active{transform:scale(.98);}
.link{background:none;border:none;color:var(--muted);font:inherit;font-size:13px;font-weight:700;cursor:pointer;padding:14px;}

/* consent */
.crow{display:flex;gap:13px;padding:14px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid var(--border);margin-bottom:10px;text-align:left;}
.crow .ic{width:34px;height:34px;flex:none;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:rgba(10,132,255,.10);border:1px solid rgba(10,132,255,.22);}
.crow b{display:block;font-size:14px;font-weight:800;margin-bottom:3px;}
.crow span{color:var(--muted);font-size:12.5px;line-height:1.45;}

/* camera */
.cam{flex:1;margin:8px 18px 0;border-radius:24px;overflow:hidden;border:1px solid rgba(10,132,255,.25);position:relative;
  background:radial-gradient(120% 80% at 50% 20%,#0e1430,#06070f);}
.cam video{width:100%;height:100%;object-fit:cover;}
.guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);
  box-shadow:0 0 14px var(--blue);animation:scan 3s ease-in-out infinite;}
@keyframes scan{0%,100%{top:14%;}50%{top:82%;}}
.camfoot{display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 0 24px;}
.tips{color:var(--muted);font-size:12px;}
.shutter{width:74px;height:74px;border-radius:50%;border:3px solid var(--blue);background:rgba(10,132,255,.12);
  display:flex;align-items:center;justify-content:center;cursor:pointer;}
.shutter .in{width:56px;height:56px;border-radius:50%;background:#F8FAFE;}
.spin{width:42px;height:42px;border-radius:50%;border:3px solid rgba(10,132,255,.25);border-top-color:var(--blue);animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* results */
.rank{display:flex;flex-direction:column;align-items:center;padding:24px;border-radius:22px;
  background:rgba(10,132,255,.06);border:1px solid rgba(10,132,255,.22);}
.rank .tier{color:var(--blue);font-size:12px;font-weight:900;letter-spacing:3px;}
.rank .score{font-size:62px;font-weight:900;letter-spacing:-2px;line-height:1;margin-top:4px;}
.rank .lbl{color:var(--dim);font-size:10px;font-weight:800;letter-spacing:2.4px;margin-top:2px;}
.sec{font-size:10.5px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:22px 0 10px;}
.mapcard{display:flex;align-items:center;gap:8px;padding:14px;border-radius:20px;background:rgba(255,255,255,.025);border:1px solid var(--border);}
.legend{display:flex;gap:14px;margin-top:10px;}
.legend i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;}
.legend span{font-size:11px;color:var(--muted);font-weight:600;}
.summary{padding:15px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:13.5px;color:#D7DCEA;line-height:1.5;}
.weak{display:flex;align-items:center;gap:12px;padding:13px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid var(--border);margin-bottom:8px;}
.weak .dot{width:10px;height:10px;border-radius:50%;background:var(--orange);flex:none;}
.weak b{font-size:14px;font-weight:800;}.weak span{display:block;color:var(--muted);font-size:12px;margin-top:2px;}
.plan{padding:16px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid var(--border);}
.plan h4{margin:0 0 10px;font-size:14px;font-weight:800;}
.ex{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid rgba(255,255,255,.05);font-size:13.5px;color:#D7DCEA;}
.ex span{color:var(--blue-3);font-weight:700;font-size:12px;}
.disc{color:var(--dim);font-size:11px;text-align:center;margin:16px 0;line-height:1.5;}
.notice{position:absolute;left:18px;right:18px;bottom:20px;background:rgba(20,22,34,.96);border:1px solid var(--border);
  border-radius:12px;padding:9px 12px;font-size:11px;color:var(--muted);text-align:center;z-index:30;}
.hide{display:none!important;}
@media(prefers-reduced-motion:reduce){.scanline,.spin{animation:none!important;}}
</style>
</head>
<body>
<div class="phone">
  <div class="amb"></div>
  <div class="frame">
    <div class="topbar">
      <div class="tb-btn" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></div>
      <div class="tb-title">Physique Scan</div>
      <div class="tb-btn" id="privacyBtn" title="Privacy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V5z"/></svg></div>
    </div>
    <div id="app" style="flex:1;display:flex;flex-direction:column;min-height:0;"></div>
  </div>
  <div class="notice" id="notice"></div>
</div>

<script>
(function(){
  // Point this at your deployed function to do a REAL scan. Until then the flow
  // gracefully falls back to a deterministic demo result so the UX is fully usable.
  var FUNCTION_URL = ""; // e.g. "https://tqjpgknkbfaayrjuwoet.supabase.co/functions/v1/physique-scan"
  var MUSCLES = ["chest","back","shoulders","arms","legs","core"];
  var LABEL = {chest:"Chest",back:"Back",shoulders:"Shoulders",arms:"Arms",legs:"Legs",core:"Core"};
  var WHY = {chest:"Build pressing strength and upper-body shape.",back:"Fixes posture and balances your frame.",
    shoulders:"Caps that widen the upper body.",arms:"Visible, functional arm size.",
    legs:"Your biggest muscles — they drive overall strength.",core:"Stability every lift relies on."};
  var POOL = {chest:["Push-ups / bench","Incline press"],back:["Rows","Pull-ups / lat pulldown"],
    shoulders:["Overhead press","Lateral raises"],arms:["Curls","Tricep dips"],
    legs:["Squats","Lunges"],core:["Plank","Hanging knee raises"]};
  var app=document.getElementById("app");
  function notice(m){ var n=document.getElementById("notice"); if(!m){n.style.display="none";return;} n.textContent=m; n.style.display="block"; }

  // muscle map (mirrors the RN BodyMap)
  function statusColor(s){ return s==="weak"?"#FF7A45":s==="strong"?"#34D399":"#0A84FF"; }
  function op(level){ return (0.28+(level/100)*0.62).toFixed(2); }
  function bodyMap(muscles,size){
    function f(k){ var m=muscles[k]||{level:50,status:"ok"}; return 'fill="'+statusColor(m.status)+'" opacity="'+op(m.level)+'"'; }
    return '<svg width="'+size+'" height="'+(size*1.6)+'" viewBox="0 0 100 160">'+
      '<circle cx="50" cy="14" r="9" fill="#11131f" stroke="rgba(255,255,255,.1)"/>'+
      '<path d="M30 30 Q50 24 70 30 L66 40 Q50 34 34 40 Z" '+f("shoulders")+'/>'+
      '<path d="M35 40 Q50 36 65 40 L63 58 Q50 64 37 58 Z" '+f("chest")+'/>'+
      '<ellipse cx="27" cy="52" rx="6.5" ry="18" '+f("arms")+'/><ellipse cx="73" cy="52" rx="6.5" ry="18" '+f("arms")+'/>'+
      '<path d="M38 60 L62 60 L60 84 Q50 90 40 84 Z" '+f("core")+'/>'+
      '<path d="M40 86 Q50 92 60 86 L58 140 L52 140 L50 100 L48 140 L42 140 Z" '+f("legs")+'/>'+
      '<circle cx="50" cy="30" r="2.4" '+f("back")+'/>'+
      '<path d="M30 30 Q50 24 70 30 L66 42 Q73 44 73 52 Q73 66 66 70 L62 84 L58 140 L52 140 L50 102 L48 140 L42 140 L38 84 L34 70 Q27 66 27 52 Q27 44 34 42 Z" fill="none" stroke="rgba(255,255,255,.16)" stroke-linejoin="round"/></svg>';
  }

  // deterministic demo result (used when no deployed function / no real photo)
  function demoResult(){
    var m={}; var seed=[72,38,64,81,28,55];
    MUSCLES.forEach(function(k,i){ var lv=seed[i]; m[k]={level:lv,status:lv<45?"weak":lv<72?"ok":"strong"}; });
    return {isBody:true,rank:{tier:"Athletic",score:62},muscles:m,weakPoints:["legs","back"],
      summary:"Solid upper body — prioritize legs and back to balance your frame and unlock overall strength."};
  }

  function saveMuscles(res){ try{
    var store=JSON.parse(localStorage.getItem("corePhysique.v1")||"{}");
    store.muscles=res.muscles; store.lastScore=res.rank.score; store.lastTier=res.rank.tier; store.ts=Date.now();
    localStorage.setItem("corePhysique.v1",JSON.stringify(store));
  }catch(e){} }

  // ── screens ──
  var ICON={
    device:'M7 2.5h10a1.5 1.5 0 0 1 1.5 1.5v16a1.5 1.5 0 0 1-1.5 1.5H7A1.5 1.5 0 0 1 5.5 20V4A1.5 1.5 0 0 1 7 2.5ZM10.5 18.5h3',
    lock:'M6.5 10.5V7a5.5 5.5 0 0 1 11 0v3.5M5.5 10.5h13v9h-13z',
    fitness:'M6 7v10M3 9.5v5M18 7v10M21 9.5v5M6 12h12',
    shield:'M12 2.5 4.5 5.3v6c0 4.7 3.2 7.6 7.5 8.7 4.3-1.1 7.5-4 7.5-8.7v-6Z'
  };
  function svgIcon(name,color){ return '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="'+(color||'#0A84FF')+'" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="'+ICON[name]+'"/></svg>'; }
  function consent(){
    notice("");
    var pts=[["device","Stays on your device","Your photo is saved only here. It's never uploaded or shared."],
      ["lock","Private analysis","To rate it, the image is sent securely to our own AI, analyzed in memory, and discarded right after."],
      ["fitness","Fitness, not medical","Training guidance to help you improve — not a medical or body-composition diagnosis."],
      ["shield","18+ and optional","You're in control. Delete every scan any time."]];
    app.innerHTML='<div class="scroll"><div class="eyebrow" style="margin-top:6px">BEFORE YOUR FIRST SCAN</div>'+
      '<div class="h1" style="margin:6px 0 14px">How your photo is handled</div>'+
      pts.map(function(p){return '<div class="crow"><div class="ic">'+svgIcon(p[0])+'</div><div><b>'+p[1]+'</b><span>'+p[2]+'</span></div></div>';}).join("")+
      '<div style="height:10px"></div><button class="btn" id="go">I understand — continue</button>'+
      '<div style="text-align:center"><button class="link" onclick="history.back()">Not now</button></div></div>';
    document.getElementById("go").onclick=camera;
  }

  function camera(){
    notice("");
    // Blank camera frame (no live feed) + a button that opens the OS popup to
    // take a photo OR upload one. The native file picker handles the access prompt.
    app.innerHTML='<div class="cam" id="cam">'+
      '<div class="guide"><svg width="58%" height="82%" viewBox="0 0 100 160"><path d="M50 6 a8 8 0 1 1 -.1 0 M34 30 Q50 22 66 30 L62 84 L58 150 L52 150 L50 100 L48 150 L42 150 L38 84 Z" fill="none" stroke="rgba(74,143,255,.55)" stroke-width="1.4" stroke-dasharray="4 3" stroke-linejoin="round"/></svg></div></div>'+
      '<div class="camfoot"><div class="tips">Full body in frame · good lighting · fitted clothing</div>'+
      '<div style="width:100%;padding:0 18px"><button class="btn" id="takeBtn">Take or upload a photo</button></div></div>'+
      '<input type="file" id="fileInput" accept="image/*" style="display:none">';
    var input=document.getElementById("fileInput");
    document.getElementById("takeBtn").onclick=function(){ input.click(); };
    input.onchange=function(e){
      var file=e.target.files&&e.target.files[0]; if(!file) return;
      var reader=new FileReader();
      reader.onload=function(){ var b64=String(reader.result).split(",")[1]||""; analyze(b64); };
      reader.readAsDataURL(file);
    };
  }

  function analyze(base64){
    app.innerHTML='<div class="center"><div class="spin"></div><div style="font-size:16px;font-weight:700;margin-top:16px">Analyzing your physique…</div><div class="muted">Private · your photo never leaves this device after analysis.</div></div>';
    var done=function(res,real){ saveMuscles(res); results(res,real); };
    if(FUNCTION_URL && base64){
      fetch(FUNCTION_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({image:base64})})
        .then(function(r){return r.json();})
        .then(function(j){ if(j&&j.isBody===false){ notbody(); } else if(j&&j.rank){ done(j,true);} else { done(demoResult(),false);} })
        .catch(function(){ done(demoResult(),false); });
    } else {
      // no deployed function in this preview → demo result so the flow completes
      setTimeout(function(){ done(demoResult(),false); }, 1100);
    }
  }

  function notbody(){
    app.innerHTML='<div class="center"><svg viewBox="0 0 24 24" width="44" height="44" fill="none" stroke="#9AA1B7" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5a2.4 2.4 0 1 0 0 4.8 2.4 2.4 0 0 0 0-4.8ZM12 8v8m0-5-5 2m5-2 5 2M9 21l3-5 3 5"/></svg><div class="h1">Couldn\'t detect a full body</div><div class="muted">Line your whole body up in the frame with good lighting, then try again.</div><div style="height:8px"></div><button class="btn" id="retry">Try again</button></div>';
    document.getElementById("retry").onclick=camera;
  }

  function results(res,real){
    notice(real?"":"Demo result — deploy physique-scan + set FUNCTION_URL for a real AI rating.");
    var routine=(res.weakPoints.length?res.weakPoints:["legs","back","chest"]).slice(0,3);
    var exHtml=routine.map(function(k){return POOL[k].map(function(n){return '<div class="ex"><span style="color:#D7DCEA;font-weight:400">'+n+'</span><span>3 × 8-12</span></div>';}).join("");}).join("");
    app.innerHTML='<div class="scroll">'+
      '<div class="rank"><div class="tier">'+res.rank.tier.toUpperCase()+'</div><div class="score">'+res.rank.score+'</div><div class="lbl">PHYSIQUE SCORE</div></div>'+
      '<div class="sec">Muscle Map</div>'+
      '<div class="mapcard">'+bodyMap(res.muscles,150)+
        '<div style="flex:1"><div class="legend" style="flex-direction:column;gap:8px">'+
        '<div><i style="background:#FF7A45"></i><span>Needs work</span></div>'+
        '<div><i style="background:#0A84FF"></i><span>Solid</span></div>'+
        '<div><i style="background:#34D399"></i><span>Strong</span></div></div></div></div>'+
      '<div class="sec">Summary</div><div class="summary">'+res.summary+'</div>'+
      '<div class="sec">What to work on</div>'+
      res.weakPoints.map(function(k){return '<div class="weak"><div class="dot"></div><div><b>'+LABEL[k]+'</b><span>'+WHY[k]+'</span></div></div>';}).join("")+
      '<div class="sec">Your routine</div><div class="plan"><h4>Weak-point focus: '+routine.map(function(k){return LABEL[k];}).join(" · ")+'</h4>'+exHtml+'</div>'+
      '<div class="disc">Visual fitness guidance only — not a medical or body-composition assessment.</div>'+
      '<button class="btn" onclick="history.back()">Done</button>'+
      '<div style="text-align:center"><button class="link" id="rescan">Scan again</button></div></div>';
    document.getElementById("rescan").onclick=camera;
  }

  document.getElementById("privacyBtn").onclick=function(){
    if(confirm("Photos stay on this device and are never uploaded. Delete all saved scans?")){
      try{ localStorage.removeItem("corePhysique.v1"); }catch(e){} notice("All scans deleted.");
    }
  };

  // start: skip consent if already given (?demo=1 always starts at consent for screenshots)
  var seen=false; try{ seen=localStorage.getItem("corePhysiqueConsent")==="1"; }catch(e){}
  if(/[?&]start=camera/.test(location.search)) camera();
  else if(/[?&]start=result/.test(location.search)) results(demoResult(),false);
  else consent();
  // mark consent on continue
  var _c=consent; // ensure continue persists consent
})();
</script>
</body>
</html>
