<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
:root {
  --bg-base:#02020A; --bg-card:rgba(255,255,255,0.035); --bg-card-2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08); --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
  --blue:#0A84FF; --blue-2:#2F8FFF; --blue-3:#5BB1FF; --sky:#7BC4FF;
  --purple:#9F8FFF; --green:#34D399; --gold:#FFC857; --orange:#FF7A45; --pink:#FF6B7E;
  --accent:var(--blue); --grad-a:var(--blue); --grad-b:#6F70FF; --grad-c:#B388FF;
  --good:var(--green);
  --r-common:#9AA1B7; --r-rare:#0A84FF; --r-epic:#9F8FFF; --r-legendary:#FFC857; --r-mythic:#FF6B7E;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{min-height:100vh;background:#0A0A14;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
  color:var(--text);-webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}
.phone{position:relative;width:390px;height:844px;background:var(--bg-base);border-radius:56px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:60;}

/* ── Ambient ── */
#ambBg{position:absolute;inset:0;z-index:0;
  background:radial-gradient(60% 35% at 50% 14%,rgba(91,177,255,0.14) 0%,transparent 65%),
             radial-gradient(60% 35% at 50% 92%,rgba(159,143,255,0.08) 0%,transparent 65%),
             linear-gradient(180deg,#050518 0%,#02020A 55%,#050510 100%);
  transition:background 2.4s ease;}
#ambAurora{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.44;mix-blend-mode:screen;}
#ambAurora::before,#ambAurora::after{content:"";position:absolute;border-radius:50%;filter:blur(72px);
  animation:auroraDrift 22s ease-in-out infinite;will-change:transform;}
#ambAurora::before{width:70%;height:40%;left:-10%;top:6%;
  background:radial-gradient(circle,color-mix(in srgb,var(--aurora-a,#0A84FF) 28%,transparent),transparent 65%);}
#ambAurora::after{width:60%;height:35%;right:-8%;bottom:14%;
  background:radial-gradient(circle,color-mix(in srgb,var(--aurora-b,#9F8FFF) 24%,transparent),transparent 65%);
  animation-delay:-11s;}
@keyframes auroraDrift{0%,100%{transform:translate(0,0) scale(1);opacity:0.5;}50%{transform:translate(18px,-14px) scale(1.06);opacity:0.74;}}
#ambStars{position:absolute;inset:-2%;pointer-events:none;z-index:2;}
#ambCelestial{position:absolute;inset:0;pointer-events:none;z-index:3;}
#ambOverlay{position:absolute;inset:0;pointer-events:none;z-index:4;}
@media(prefers-reduced-motion:reduce){#ambAurora::before,#ambAurora::after,.amb-star{animation:none!important;}}

/* ── Frame ── */
.frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:54px 0 0;}
.scroll{flex:1;overflow-y:auto;padding:0 0 110px;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 20px 10px;}
.brand{display:flex;align-items:center;gap:8px;}
.brand .dot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 10px var(--blue);}
.brand .wm{font-size:12px;font-weight:800;letter-spacing:0.34em;}
.chips{display:flex;gap:7px;align-items:center;}
.chip{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border-radius:999px;
  background:var(--bg-card);border:1px solid var(--border);font-size:13px;font-weight:800;text-decoration:none;color:inherit;}
.chip svg{width:14px;height:14px;}
.chip.flame{color:#FFC857;}.chip.flame svg{color:#FF8A3D;}
.chip.coin{color:#FFE07A;}.chip.coin svg{color:#FFCB3D;}
.chip.shard{color:#C7B3FF;}.chip.shard svg{color:#9F8FFF;}

/* ── Adaptive header ── */
.dash-header{padding:0 20px 14px;}
.dash-greeting{font-size:25px;font-weight:800;letter-spacing:-0.02em;}
.dash-subrow{display:flex;align-items:center;gap:9px;margin-top:5px;}
.dash-time{font-size:13px;font-weight:600;color:var(--muted);}
.dash-weather-glyph{font-size:17px;line-height:1;}
.dash-gear{margin-left:auto;width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:.2s;
  flex-shrink:0;}
.dash-gear:hover{background:var(--bg-card-2);}
.dash-gear svg{width:16px;height:16px;color:var(--muted);}

/* ── Widget shell ── */
.widget-wrap{padding:0 18px;margin-bottom:18px;}
.widget-label{font-size:10.5px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding:0 2px;display:block;}
.widget-body{border-radius:22px;background:rgba(255,255,255,0.028);border:1px solid var(--border);overflow:hidden;}

/* ── Quote ── */
.w-quote{padding:18px 20px 16px;}
.w-quote-mark{width:18px;height:18px;color:var(--blue);opacity:0.55;margin-bottom:10px;display:block;}
.w-quote-text{margin:0;font-size:14.5px;font-weight:500;line-height:1.6;color:rgba(248,250,254,0.88);font-style:italic;}

/* ── Life Score ── */
.w-ls-hero{display:flex;flex-direction:column;align-items:center;padding:24px 20px 18px;
  background:linear-gradient(160deg,rgba(10,132,255,0.10),rgba(159,143,255,0.05) 60%,rgba(255,255,255,0.01));
  border-bottom:1px solid var(--border);}
.w-ls-score-num{font-size:60px;font-weight:900;letter-spacing:-0.04em;line-height:1;
  background:linear-gradient(180deg,#fff 0%,#c7d6ff 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.w-ls-score-label{font-size:10px;font-weight:800;letter-spacing:0.20em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.w-ls-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);}
.w-ls-card{display:block;text-decoration:none;color:inherit;padding:13px 14px 11px;background:#02020A;transition:background .14s;}
.w-ls-card:active{background:rgba(255,255,255,0.04);}
.w-ls-card-head{display:flex;align-items:center;gap:8px;}
.w-ls-icon{width:26px;height:26px;flex:none;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--sc,#0A84FF) 13%,transparent);border:1px solid color-mix(in srgb,var(--sc,#0A84FF) 26%,transparent);}
.w-ls-icon svg{width:14px;height:14px;color:var(--sc,#0A84FF);}
.w-ls-name{font-size:12px;font-weight:700;flex:1;min-width:0;}
.w-ls-val{font-size:17px;font-weight:900;color:var(--sc,#0A84FF);}
.w-ls-bar{height:3px;border-radius:999px;background:rgba(255,255,255,.07);margin-top:9px;overflow:hidden;}
.w-ls-fill{height:100%;border-radius:999px;background:var(--sc,#0A84FF);transition:width .7s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 5px color-mix(in srgb,var(--sc,#0A84FF) 55%,transparent);}
.w-ls-lvl{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-top:5px;}

/* ── Tasks ── */
.w-tasks-header{display:flex;align-items:center;gap:10px;padding:13px 16px 11px;border-bottom:1px solid var(--border);}
.w-tasks-progress{font-size:13px;font-weight:800;}
.w-tasks-budget{font-size:11px;font-weight:700;color:var(--muted);flex:1;}
.w-tasks-viewall{font-size:12px;font-weight:700;color:var(--blue);text-decoration:none;flex-shrink:0;}
.w-task-row{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .13s;}
.w-task-row:last-child{border-bottom:none;}
.w-task-row.done{opacity:0.48;}
.w-task-check{width:26px;height:26px;flex:none;border-radius:50%;border:1.5px solid rgba(255,255,255,.22);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s;padding:0;margin-top:1px;}
.w-task-check svg{width:14px;height:14px;color:var(--muted);}
.w-task-check.checked{background:var(--green);border-color:var(--green);}
.w-task-check.checked svg{color:#02020A;}
.w-task-body{flex:1;min-width:0;}
.w-task-title{display:block;font-size:14px;font-weight:600;line-height:1.35;margin-bottom:5px;}
.w-task-row.done .w-task-title{text-decoration:line-through;color:var(--muted);}
.w-task-meta{display:flex;align-items:center;gap:7px;}
.w-task-chip{font-size:10px;font-weight:800;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);padding:2px 7px;border-radius:999px;}
.w-task-xp{font-size:10px;font-weight:900;color:var(--blue);}

/* ── Streak ── */
.w-streak{padding:15px 16px;}
.w-streak-inner{display:flex;align-items:center;gap:13px;}
.w-streak-fire{width:46px;height:46px;flex:none;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,138,61,.13);border:1px solid rgba(255,138,61,.26);}
.w-streak-body{flex:1;}
.w-streak-days{display:block;font-size:19px;font-weight:900;}.w-streak-days small{font-size:12px;font-weight:600;color:var(--muted);}
.w-streak-next{font-size:11px;color:var(--muted);margin-top:2px;display:block;}
.w-streak-best{text-align:center;padding:8px 12px;border-radius:12px;background:rgba(0,0,0,.22);border:1px solid var(--border);}
.w-streak-best-n{font-size:17px;font-weight:900;}
.w-streak-best-l{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-top:2px;}

/* ── CORE Power ── */
.w-power{padding:16px 18px;display:flex;flex-direction:column;gap:10px;}
.w-power-top{display:flex;align-items:center;justify-content:space-between;}
.w-power-label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.w-power-val{font-size:30px;font-weight:900;color:var(--blue);}
.w-power-meta{display:flex;gap:7px;}
.w-power-pill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;background:var(--bg-card);border:1px solid var(--border);}

/* ── Quick actions ── */
.w-qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.w-qa-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;
  text-decoration:none;color:var(--muted);background:#02020A;transition:background .13s;font-size:10px;font-weight:700;}
.w-qa-btn:active{background:rgba(255,255,255,.04);color:var(--text);}
.w-qa-btn svg{width:20px;height:20px;color:var(--blue);}

/* ── Weather ── */
.w-weather{display:flex;align-items:center;gap:12px;padding:14px 18px;}
.w-weather-icon{font-size:28px;}
.w-weather-label{font-size:14px;font-weight:700;flex:1;}
.w-weather-time{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  background:var(--bg-card);border:1px solid var(--border);padding:3px 8px;border-radius:999px;}

/* ── Friends ── */
.w-friends-list{display:flex;flex-direction:column;}
.w-friend-item{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--border);}
.w-friend-item:last-child{border-bottom:none;}
.w-friend-avatar{width:34px;height:34px;flex:none;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;}
.w-friend-info{flex:1;}.w-friend-name{display:block;font-size:13px;font-weight:700;}.w-friend-rank{font-size:10px;font-weight:700;color:var(--muted);}
.w-friend-power{font-size:13px;font-weight:900;color:var(--blue);}

/* ── Recent activity ── */
.w-activity-list{display:flex;flex-direction:column;}
.w-activity-item{display:flex;align-items:center;gap:9px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px;}
.w-activity-item:last-child{border-bottom:none;}
.w-activity-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex:none;}
.w-activity-label{flex:1;font-weight:600;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.w-activity-xp{font-weight:900;color:var(--blue);white-space:nowrap;}
.w-activity-time{color:var(--dim);font-size:10px;white-space:nowrap;}

/* ── Empty ── */
.w-empty{padding:20px 18px;font-size:13px;color:var(--muted);line-height:1.55;text-align:center;}

/* ── Edit mode ── */
.edit-scrim{position:absolute;inset:0;z-index:50;background:rgba(2,2,10,.72);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .28s;}
.edit-scrim.show{opacity:1;pointer-events:auto;}
.edit-panel{position:absolute;left:0;right:0;bottom:0;z-index:55;
  background:linear-gradient(180deg,#0d0e1c,#07080f);border-top:1px solid var(--border);
  border-radius:28px 28px 0 0;padding:16px 18px 30px;transform:translateY(102%);
  transition:transform .32s cubic-bezier(.2,.8,.2,1);max-height:76%;display:flex;flex-direction:column;}
.edit-panel.show{transform:translateY(0);}
.edit-grip{width:38px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);margin:0 auto 16px;}
.edit-title{font-size:16px;font-weight:900;margin-bottom:4px;}
.edit-scroll{flex:1;overflow-y:auto;}.edit-scroll::-webkit-scrollbar{display:none;}
.edit-sec-label{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;}
.edit-row{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;
  background:var(--bg-card);border:1px solid var(--border);margin-bottom:7px;user-select:none;}
.edit-row.on{border-color:rgba(10,132,255,.4);background:rgba(10,132,255,.06);}
.edit-icon{width:34px;height:34px;flex:none;border-radius:10px;background:rgba(10,132,255,.11);
  border:1px solid rgba(10,132,255,.22);display:flex;align-items:center;justify-content:center;}
.edit-icon svg{width:17px;height:17px;color:var(--blue);}
.edit-row .edit-name{flex:1;font-size:13.5px;font-weight:700;}
.edit-handle{display:flex;gap:5px;}
.edit-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.14s;}
.edit-btn:hover{background:var(--bg-card-2);}
.edit-btn.rm{color:var(--pink);border-color:rgba(255,107,126,.3);}
.edit-add{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;
  border:1px dashed rgba(255,255,255,.1);margin-bottom:7px;cursor:pointer;transition:border-color .14s,background .14s;}
.edit-add:hover{border-color:rgba(10,132,255,.45);background:rgba(10,132,255,.04);}
.edit-add .edit-icon{background:rgba(255,255,255,.03);border-color:var(--border);}
.edit-add .edit-icon svg{color:var(--muted);}
.edit-add .edit-name{color:var(--muted);}
.edit-add-plus{font-size:20px;color:var(--blue);font-weight:900;line-height:1;flex-shrink:0;}
.edit-done{width:100%;padding:14px;border-radius:14px;border:none;font:inherit;font-size:15px;font-weight:800;
  cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--blue),var(--grad-b));
  box-shadow:0 8px 22px rgba(10,132,255,.38);margin-top:14px;}
.edit-done:active{transform:scale(.98);}

/* widget enter/exit */
.widget-wrap{animation:wIn .28s cubic-bezier(.2,.8,.2,1);}
@keyframes wIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(prefers-reduced-motion:reduce){.widget-wrap{animation:none;}}

/* wobble in edit mode */
body.edit-active .widget-body{
  box-shadow:0 0 0 1.5px rgba(10,132,255,.28);
  animation:wobble .6s ease-in-out infinite;}
@keyframes wobble{0%,100%{transform:rotate(-0.3deg);}50%{transform:rotate(0.3deg);}}
@media(prefers-reduced-motion:reduce){body.edit-active .widget-body{animation:none;}}

/* ── Nav ── */
.nav{position:absolute;left:0;right:0;bottom:0;z-index:50;padding:10px 12px 26px;
  display:flex;justify-content:space-around;align-items:flex-end;
  background:linear-gradient(180deg,rgba(5,6,14,0) 0%,rgba(5,6,14,.88) 34%,#04040c 100%);
  backdrop-filter:blur(14px);}
.nav a,.nav button{background:none;border:none;font:inherit;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;
  min-width:48px;min-height:44px;text-decoration:none;color:var(--dim);transition:color .2s;}
.nav svg{width:23px;height:23px;}.nav .nl{font-size:10px;font-weight:800;}
.nav .item.active{color:var(--text);}.nav .item.active svg{color:var(--blue);filter:drop-shadow(0 0 8px rgba(10,132,255,.75));}
.nav .item.active::before{content:"";position:absolute;top:-2px;width:5px;height:5px;
  border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue);}

/* ── Toast ── */
.toast{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(14px);z-index:70;
  background:rgba(20,22,34,.96);border:1px solid var(--border);border-radius:14px;padding:11px 16px;
  font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.3s;
  box-shadow:0 12px 30px rgba(0,0,0,.5);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="phone">
  <!-- Ambient layers -->
  <div id="ambBg"></div>
  <div id="ambAurora"></div>
  <div id="ambStars"></div>
  <div id="ambCelestial"></div>
  <div id="ambOverlay"></div>

  <div class="notch"></div>
  <div class="home-indicator"></div>

  <div class="frame">
    <!-- Topbar -->
    <div class="topbar">
      <div class="brand"><span class="dot"></span><span class="wm">CORE</span></div>
      <div class="chips">
        <a class="chip flame" href="26-streak.html" aria-label="View streak">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 3-1 4-1 6 0 1 1 2 1 2s2-1 2-3c2 2 3 4 3 7a5 5 0 0 1-10 0c0-3 2-5 3-7 1 2 2 2 2 2s0-3 0-7Z"/></svg>
          <span id="cStreak">0</span>
        </a>
        <a class="chip coin" href="27-shop.html" aria-label="Open shop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4"/></svg>
          <span id="cCoins">0</span>
        </a>
        <span class="chip shard">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l4 7-4 13-4-13z"/></svg>
          <span id="cShards">0</span>
        </span>
      </div>
    </div>

    <!-- Adaptive header -->
    <div class="dash-header">
      <div class="dash-greeting" id="dashGreeting">Good morning</div>
      <div class="dash-subrow">
        <span class="dash-time" id="dashTime"></span>
        <span class="dash-weather-glyph" id="dashWeatherGlyph">☀️</span>
        <button class="dash-gear" id="gearBtn" aria-label="Customize dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>

  <!-- Customize panel -->
  <div class="edit-scrim" id="editScrim"></div>
  <div class="edit-panel" id="editPanel">
    <div class="edit-grip"></div>
    <div class="edit-title">Customize Dashboard</div>
    <div class="edit-scroll" id="editScroll"></div>
    <button class="edit-done" id="editDone">Done</button>
  </div>

  <div class="toast" id="toast"></div>
</div><!-- .phone -->

<script src="_lib/core-sfx.js"></script>
<script src="_lib/core-state.js"></script>
<script src="_lib/core-social.js"></script>
<script src="_lib/core-tasks.js"></script>
<script src="_lib/dash-ambient.js"></script>
<script src="_lib/dash-widgets.js"></script>
<script>
(function(){
  var S  = window.coreState;
  var WS = window.dashWidgets;

  function qs(s){ return document.querySelector(s); }

  // ── count-up animator ──
  function animCount(el, to){
    if(!el) return;
    var from = parseInt((el.textContent||'0').replace(/\D/g,''),10)||0;
    if(from===to){ el.textContent=to.toLocaleString(); return; }
    var start=null, dur=600; if(el._raf) cancelAnimationFrame(el._raf);
    function step(ts){ if(!start) start=ts; var p=Math.min(1,(ts-start)/dur);
      el.textContent=Math.round(from+(to-from)*(1-Math.pow(1-p,3))).toLocaleString();
      if(p<1) el._raf=requestAnimationFrame(step); }
    el._raf=requestAnimationFrame(step);
  }

  var toastT;
  function toast(m){ var t=qs('#toast'); t.textContent=m; t.className='toast show';
    clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); },1700); }

  // ── time-of-day greeting ──
  function updateHeader(){
    var h=new Date().getHours();
    var g = h>=5&&h<12?'Good morning':h>=12&&h<17?'Good afternoon':h>=17&&h<21?'Good evening':'Good night';
    var s = S ? S.read() : {};
    var name = (s.profile&&s.profile.name) ? s.profile.name.split(' ')[0] : '';
    qs('#dashGreeting').textContent = g + (name ? ', '+name : '');
    var now=new Date(), hh=now.getHours(), mm=String(now.getMinutes()).padStart(2,'0');
    var ap=hh>=12?'PM':'AM', h12=hh%12||12;
    qs('#dashTime').textContent = h12+':'+mm+' '+ap;
  }
  updateHeader();
  setInterval(updateHeader,30000);

  // weather glyph from ambient
  var GLYPHS={clear:'☀️',cloudy:'☁️',rain:'🌧️',snow:'❄️',fog:'🌫️',sunrise:'🌅',sunset:'🌇',night:'🌙'};
  window.addEventListener('dashAmbientChange',function(e){
    var g=qs('#dashWeatherGlyph');
    var glyph = GLYPHS[e.detail.weather] || (e.detail.time==='night'?'🌙':e.detail.time==='sunrise'?'🌅':'☀️');
    if(g) g.textContent=glyph;
  });

  // ── chips ──
  function renderChips(){
    if(!S) return;
    var s=S.read();
    animCount(qs('#cStreak'),(s.streak&&s.streak.days)||0);
    animCount(qs('#cCoins'),s.coins||0);
    animCount(qs('#cShards'),s.shards||0);
  }
  renderChips();
  window.addEventListener('coreStateChange',renderChips);

  // ── widget renderer ──
  var scroll=qs('#widgetScroll');

  function cleanupHost(host){
    if(host && host._cleanup) host._cleanup();
  }

  function buildWidget(id){
    var def=WS.getWidget(id);
    if(!def) return null;
    var wrap=document.createElement('div');
    wrap.className='widget-wrap';
    wrap.dataset.wid=id;
    var lbl=document.createElement('div');
    lbl.className='widget-label';
    lbl.textContent=def.title;
    var body=document.createElement('div');
    body.className='widget-body';
    try{ def.render(body); }catch(e){ console.error('Widget error:',id,e); body.innerHTML='<div class="w-empty">Error loading widget.</div>'; }
    wrap.appendChild(lbl);
    wrap.appendChild(body);
    return wrap;
  }

  function renderAll(){
    Array.from(scroll.querySelectorAll('.widget-body')).forEach(cleanupHost);
    scroll.innerHTML='';
    WS.readLayout().forEach(function(id){
      var w=buildWidget(id);
      if(w) scroll.appendChild(w);
    });
  }
  renderAll();

  // ── customize mode ──
  var editScrim=qs('#editScrim'), editPanel=qs('#editPanel'), editScrollEl=qs('#editScroll');

  function openEdit(){
    document.body.classList.add('edit-active');
    editScrim.classList.add('show');
    editPanel.classList.add('show');
    renderEditPanel();
  }

  function closeEdit(){
    document.body.classList.remove('edit-active');
    editScrim.classList.remove('show');
    editPanel.classList.remove('show');
    renderAll();
  }

  function renderEditPanel(){
    editScrollEl.innerHTML='';
    var layout=WS.readLayout();
    var all=WS.getAll();

    var lbl=document.createElement('div');
    lbl.className='edit-sec-label';
    lbl.textContent='Your widgets';
    editScrollEl.appendChild(lbl);

    layout.forEach(function(id,idx){
      var def=WS.getWidget(id); if(!def) return;
      var row=document.createElement('div');
      row.className='edit-row on';
      row.innerHTML=
        '<div class="edit-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">'+def.icon+'</svg></div>'+
        '<span class="edit-name">'+def.title+'</span>'+
        '<div class="edit-handle">'+
          '<button class="edit-btn up" data-i="'+idx+'" aria-label="Move up">↑</button>'+
          '<button class="edit-btn dn" data-i="'+idx+'" aria-label="Move down">↓</button>'+
          '<button class="edit-btn rm" data-id="'+id+'" aria-label="Remove">✕</button>'+
        '</div>';
      row.querySelector('.up').addEventListener('click',function(){
        var i=+this.dataset.i, l=WS.readLayout(); if(i<=0) return;
        var t=l[i]; l[i]=l[i-1]; l[i-1]=t; WS.saveLayout(l); renderEditPanel();
      });
      row.querySelector('.dn').addEventListener('click',function(){
        var i=+this.dataset.i, l=WS.readLayout(); if(i>=l.length-1) return;
        var t=l[i]; l[i]=l[i+1]; l[i+1]=t; WS.saveLayout(l); renderEditPanel();
      });
      row.querySelector('.rm').addEventListener('click',function(){
        var rmId=this.dataset.id;
        WS.saveLayout(WS.readLayout().filter(function(x){ return x!==rmId; }));
        renderEditPanel();
      });
      editScrollEl.appendChild(row);
    });

    var available=all.filter(function(w){ return layout.indexOf(w.id)===-1; });
    if(available.length){
      var lbl2=document.createElement('div');
      lbl2.className='edit-sec-label';
      lbl2.textContent='Add widgets';
      editScrollEl.appendChild(lbl2);
      available.forEach(function(def){
        var row=document.createElement('div');
        row.className='edit-add';
        row.innerHTML=
          '<div class="edit-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">'+def.icon+'</svg></div>'+
          '<span class="edit-name">'+def.title+'</span>'+
          '<span class="edit-add-plus">+</span>';
        row.addEventListener('click',function(){
          var l=WS.readLayout(); l.push(def.id); WS.saveLayout(l); renderEditPanel();
        });
        editScrollEl.appendChild(row);
      });
    }
  }

  qs('#gearBtn').addEventListener('click',openEdit);
  qs('#editDone').addEventListener('click',closeEdit);
  qs('#editScrim').addEventListener('click',closeEdit);

  // ── seed + state bootstrap ──
  try{ if(/[?&]demo=1/.test(location.search) && S) S.seedDemo(); }catch(e){}
  try{ if(S && S.applyStatTick) S.applyStatTick(); }catch(e){}

  if(S && S.ensureDailyQuests){
    S.ensureDailyQuests(function(){
      return [
        {id:'body',       title:'Complete a workout',                  kind:'STRENGTH QUEST',  xp:35, diff:'hard',   time:'30 min', stat:'strength', statGain:3},
        {id:'discipline', title:'Complete one focused work session',   kind:'FOCUS QUEST',     xp:30, diff:'medium', time:'15 min', stat:'focus',    statGain:2},
        {id:'health',     title:'Drink water and take a real break',   kind:'HEALTH QUEST',    xp:15, diff:'easy',   time:'5 min',  stat:'health',   statGain:2},
        {id:'wealth',     title:'Take one step toward your income',    kind:'WEALTH QUEST',    xp:30, diff:'medium', time:'15 min', stat:'wealth',   statGain:2},
        {id:'social',     title:'Reach out to someone you care about', kind:'SOCIAL QUEST',    xp:20, diff:'easy',   time:'10 min', stat:'social',   statGain:2},
        {id:'growth',     title:'Do one thing that improves your future', kind:'PURPOSE QUEST',xp:40, diff:'medium', time:'20 min', stat:'purpose',  statGain:3}
      ];
    });
  }

  // ── ambient init ──
  if(window.dashAmbient) window.dashAmbient.init();

  // restore scroll position
  try{ var m=location.search.match(/scrollY=(\d+)/); if(m){ scroll.scrollTop=+m[1]; } }catch(e){}
})();
</script>
</body>
