<!doctype html><html><head><meta charset="utf-8"><style>
body{background:#0a0a14;color:#fff;font-family:monospace;font-size:20px;padding:24px;line-height:1.7}
.pass{color:#34D399}.fail{color:#FF6B7E}b{color:#5BB1FF}</style></head>
<body><div id="out">running…</div>
<iframe id="f" src="27-shop.html?demo=1&tab=cosmetics" style="position:absolute;left:-9999px;width:390px;height:844px"></iframe>
<script>
var f=document.getElementById('f'),L=[],ran=false;
function log(ok,m){L.push('<div class="'+(ok?'pass':'fail')+'">'+(ok?'✔':'✘')+' '+m+'</div>');}
f.onload=function(){ if(ran)return; ran=true; setTimeout(function(){ try{
 var w=f.contentWindow,d=f.contentDocument;
 function st(){return JSON.parse(w.localStorage.getItem('coreState.v1')||'{}');}
 function owned(){return JSON.parse(w.localStorage.getItem('coreOwnedShopItems')||'[]');}
 function click(s){var b=d.querySelector(s);if(!b)return 'NOBTN';b.click();return 'OK';}

 // BUY cosmetic for self (Crystal Frame, 45 shards)
 var sh0=st().shards||0;
 click('[data-item="frame_crystal"]');                 // open sheet
 var r=click('[data-act="self"]');                     // Buy for myself
 var sh1=st().shards||0;
 log(r==='OK'&&sh1===sh0-45,'Buy cosmetic: shards <b>'+sh0+'→'+sh1+'</b> (−45) ['+r+']');
 log(owned().indexOf('frame_crystal')>=0,'Crystal Frame saved to coreOwnedShopItems');

 // EQUIP it (re-open, equip) → persists to coreProfileTheme (read by 12 pages)
 click('[data-item="frame_crystal"]'); click('[data-act="equip"]');
 log(w.localStorage.getItem('coreProfileTheme')==='Crystal','Equip saved: coreProfileTheme=Crystal');

 // BUY a boost (XP Boost I) → must actually apply (xpMultiplier)
 d.querySelector('[data-tab="boosts"]').click();
 var c0=st().coins||0, m0=w.coreState.xpMultiplier(st());
 click('[data-item="xpboost1"]'); click('[data-act="self"]');
 var c1=st().coins||0, m1=w.coreState.xpMultiplier(st());
 log(c1===c0-800,'Buy boost: coins <b>'+c0+'→'+c1+'</b> (−800)');
 log(w.coreState.hasUpgrade('xpboost1')&&Math.abs(m1-1.05)<0.001,'Boost APPLIES: xpMultiplier '+m0.toFixed(2)+'→<b>'+m1.toFixed(2)+'</b>');

 // GIFT a boost (Momentum) → spends my coins, logs gift, does NOT grant me the upgrade
 var c2=st().coins||0;
 click('[data-item="momentum"]'); click('[data-act="gift"]');
 d.querySelector('[data-friend]').click(); click('[data-act="sendgift"]');
 var c3=st().coins||0, gifts=JSON.parse(w.localStorage.getItem('coreGiftsSent')||'[]');
 log(c3===c2-1200,'Gift boost: coins <b>'+c2+'→'+c3+'</b> (−1200)');
 log(gifts.length>0&&gifts[0].item==='momentum','Gift saved to coreGiftsSent ('+gifts.length+')');

 document.getElementById('out').innerHTML='<div style="font-size:24px;margin-bottom:12px">SHOP E2E — buy / equip / boost / gift</div>'+L.join('');
 }catch(e){ document.getElementById('out').innerHTML='EXCEPTION: '+e.message+'<br>'+L.join(''); }
 },700);
};
</script></body></html>
