<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Streak</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
:root {
  --bg-base:#02020A; --bg-card:rgba(255,255,255,0.022); --bg-card-2:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.07); --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
  --blue:#0A84FF; --blue-2:#2F8FFF; --blue-3:#5BB1FF; --sky:#7BC4FF;
  --purple:#9AA1B7; --green:#9AA1B7; --gold:#9AA1B7; --orange:#9AA1B7; --pink:#9AA1B7;
  --accent:var(--blue); --grad-a:var(--blue); --grad-b:var(--blue); --grad-c:var(--blue);
  --good:#9AA1B7;
  --tc:#6B7186; --tc2:#4F5570; --tglow:#6B7186;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{min-height:100vh;background:#0A0A14;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
  color:var(--text);-webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}
.phone{position:relative;width:390px;height:844px;background:var(--bg-base);border-radius:56px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:60;}

/* ── Ambient — exact mirror of dashboard ── */
#ambBg{position:absolute;inset:0;z-index:0;
  background:radial-gradient(60% 35% at 50% 14%,rgba(91,177,255,0.14) 0%,transparent 65%),
             radial-gradient(60% 35% at 50% 92%,rgba(159,143,255,0.08) 0%,transparent 65%),
             linear-gradient(180deg,#050518 0%,#02020A 55%,#050510 100%);
  transition:background 2.4s ease;}
#ambAurora{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.44;mix-blend-mode:screen;}
#ambAurora::before,#ambAurora::after{content:"";position:absolute;border-radius:50%;filter:blur(72px);
  animation:auroraDrift 22s ease-in-out infinite;will-change:transform;}
#ambAurora::before{width:70%;height:40%;left:-10%;top:6%;
  background:radial-gradient(circle,color-mix(in srgb,var(--aurora-a,#0A84FF) 24%,transparent),transparent 65%);}
#ambAurora::after{width:60%;height:35%;right:-8%;bottom:14%;
  background:radial-gradient(circle,color-mix(in srgb,var(--aurora-b,#5BB1FF) 18%,transparent),transparent 65%);
  animation-delay:-11s;}
@keyframes auroraDrift{0%,100%{transform:translate(0,0) scale(1);opacity:0.5;}50%{transform:translate(18px,-14px) scale(1.06);opacity:0.74;}}
#ambStars{position:absolute;inset:-2%;pointer-events:none;z-index:2;}
#ambCelestial{position:absolute;inset:0;pointer-events:none;z-index:3;}
#ambOverlay{position:absolute;inset:0;pointer-events:none;z-index:4;}
/* tier glow sits above ambient, below frame */
#tierGlow{position:absolute;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(62% 38% at 50% 0%,color-mix(in srgb,var(--tglow) 18%,transparent) 0%,transparent 65%);
  transition:background 0.9s ease;}
@media(prefers-reduced-motion:reduce){#ambAurora::before,#ambAurora::after,.amb-star{animation:none!important;}}

/* ── Frame ── */
.frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:54px 0 0;}
.scroll{flex:1;overflow-y:auto;padding:2px 18px 112px;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 8px;}
.back{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--bg-card);border:1px solid var(--border);color:var(--text);text-decoration:none;flex:none;}
.back svg{width:18px;height:18px;}
.topbar .ttl{font-size:13px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;}
.topbar .best{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 12px;border-radius:999px;
  background:var(--bg-card);border:1px solid var(--border);font-size:12px;font-weight:800;color:#cfe0ff;}
.topbar .best svg{width:13px;height:13px;color:var(--blue);}

/* ── Hero ── */
.hero{position:relative;margin-top:8px;border-radius:26px;overflow:hidden;display:flex;flex-direction:column;
  align-items:center;text-align:center;
  background:linear-gradient(165deg,color-mix(in srgb,var(--tc) 18%,rgba(255,255,255,0.025)),rgba(255,255,255,0.018) 70%);
  border:1px solid color-mix(in srgb,var(--tc) 32%,rgba(255,255,255,0.06));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 20px 60px rgba(0,0,0,0.45),inset 0 0 50px color-mix(in srgb,var(--tglow) 6%,transparent);
  transition:border-color .8s,box-shadow .8s,background .8s;}
.hero .auraLayer{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(58% 50% at 50% 38%,color-mix(in srgb,var(--tglow) 28%,transparent),transparent 72%);
  animation:breathe 4.4s ease-in-out infinite;transition:background .8s;}
@keyframes breathe{0%,100%{transform:scale(.95);opacity:.65;}50%{transform:scale(1.06);opacity:1;}}
/* rings only t30+ */
.hero .rings{position:absolute;inset:0;z-index:0;pointer-events:none;display:none;}
.hero.t30 .rings,.hero.t60 .rings,.hero.t100 .rings{display:block;}
.hero .rings i{position:absolute;left:50%;top:40%;border-radius:50%;border:1.5px solid color-mix(in srgb,var(--tglow) 44%,transparent);transform:translate(-50%,-50%);}
.hero .rings i:nth-child(1){width:200px;height:200px;animation:ringSpin 14s linear infinite;}
.hero .rings i:nth-child(2){width:270px;height:270px;border-style:dashed;animation:ringSpin 22s linear infinite reverse;opacity:.55;}
.hero .rings i:nth-child(3){width:340px;height:340px;opacity:.25;animation:ringSpin 30s linear infinite;}
@keyframes ringSpin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.hero .heroParticles{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.hero .hp{position:absolute;bottom:-6%;width:5px;height:5px;border-radius:50%;
  background:radial-gradient(circle,#fff,color-mix(in srgb,var(--tglow) 80%,transparent));
  opacity:0;box-shadow:0 0 7px color-mix(in srgb,var(--tglow) 80%,transparent);
  animation:hpRise var(--hd,6s) ease-in var(--hdl,0s) infinite;}
@keyframes hpRise{0%{opacity:0;transform:translate(0,0) scale(.5);}14%{opacity:.9;}80%{opacity:.5;}100%{opacity:0;transform:translate(var(--hx,0),-310px) scale(.15);}}
/* rainbow only t100 */
.hero .rainbow{position:absolute;inset:0;border-radius:26px;padding:2px;z-index:2;pointer-events:none;display:none;
  background:linear-gradient(120deg,#5BB1FF,#0A84FF,#2F8FFF,#0A84FF,#5BB1FF,#5BB1FF);background-size:300% 300%;
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
  animation:rainbowShift 5s linear infinite;}
.hero.t100 .rainbow{display:block;}
@keyframes rainbowShift{to{background-position:300% 0;}}
.hero .heroInner{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;padding:22px 18px 18px;}
.hero .flame{width:40px;height:40px;color:color-mix(in srgb,var(--tglow) 82%,#fff);
  filter:drop-shadow(0 0 12px color-mix(in srgb,var(--tglow) 65%,transparent));
  animation:flameFlick 3s ease-in-out infinite;}
@keyframes flameFlick{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.06) translateY(-2px);}}
.hero .tierName{margin-top:2px;font-size:10px;font-weight:900;letter-spacing:.22em;text-transform:uppercase;
  color:color-mix(in srgb,var(--tglow) 72%,#fff);}
.hero .bignum{font-size:96px;font-weight:900;line-height:0.86;letter-spacing:-0.04em;margin:2px 0 0;
  background:linear-gradient(180deg,#fff,color-mix(in srgb,var(--tglow) 58%,#fff));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px color-mix(in srgb,var(--tglow) 50%,transparent));transition:filter .4s;}
.hero .bignum.pop{animation:numPop .8s cubic-bezier(.2,.9,.3,1.4);}
@keyframes numPop{0%{transform:scale(1);}35%{transform:scale(1.18);filter:drop-shadow(0 0 36px color-mix(in srgb,var(--tglow) 90%,#fff));}100%{transform:scale(1);}}
.hero .daylab{font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.hero .multbadge{margin-top:11px;display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:999px;
  font-size:12.5px;font-weight:900;
  color:color-mix(in srgb,var(--tglow) 78%,#fff);
  background:color-mix(in srgb,var(--tglow) 12%,rgba(0,0,0,.35));
  border:1px solid color-mix(in srgb,var(--tglow) 36%,transparent);
  box-shadow:0 0 18px color-mix(in srgb,var(--tglow) 16%,transparent);}
.hero .multbadge svg{width:13px;height:13px;}
.hero .multbadge .mnext{font-size:9.5px;font-weight:700;opacity:.65;margin-left:1px;}
.hero .motivate{margin-top:9px;font-size:13px;font-weight:600;color:#dfe6f5;max-width:260px;min-height:18px;transition:opacity .5s;}
.hero .statusPill{margin-top:10px;display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;font-size:11px;font-weight:800;white-space:nowrap;}
.hero .statusPill svg{width:13px;height:13px;flex:none;}
.hero .statusPill.on{color:var(--blue-3);background:rgba(10,132,255,.12);border:1px solid rgba(10,132,255,.32);}
.hero .statusPill.off{color:var(--muted);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);}
.recover[hidden]{display:none!important;}

/* ── CTA ── */
.cta{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:11px;width:100%;min-height:44px;padding:14px;
  border-radius:16px;border:none;cursor:pointer;font:inherit;font-size:15px;font-weight:800;color:#fff;text-decoration:none;
  background:linear-gradient(135deg,var(--grad-a),var(--grad-b));box-shadow:0 10px 26px rgba(10,132,255,.36);transition:transform .12s;}
.cta:active{transform:scale(.985);}
.cta svg{width:16px;height:16px;}
.cta.secured{color:var(--blue-3);background:rgba(10,132,255,.1);border:1px solid rgba(10,132,255,.32);box-shadow:none;cursor:default;}

/* ── Recovery ── */
.recover{display:flex;align-items:center;gap:12px;margin-top:11px;border-radius:18px;padding:13px 14px;
  background:rgba(255,107,107,0.07);backdrop-filter:blur(10px);border:1px solid rgba(255,107,107,0.26);}
.recover .ri{width:38px;height:38px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.28);}
.recover .ri svg{width:20px;height:20px;color:#FF6B6B;}
.recover .rb{flex:1;min-width:0;}.recover .rt{font-size:13px;font-weight:900;}.recover .rd{font-size:10.5px;color:var(--muted);margin-top:2px;}
.recover .rbtn{flex:none;border:none;cursor:pointer;font:inherit;font-size:12px;font-weight:800;color:#fff;padding:9px 13px;
  border-radius:11px;background:linear-gradient(135deg,var(--grad-a),var(--grad-b));box-shadow:0 5px 14px rgba(10,132,255,.34);}

/* ── Section labels ── */
.sec{margin:20px 2px 9px;display:flex;align-items:center;justify-content:space-between;}
.sec h2{margin:0;font-size:10.5px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
.sec .smeta{font-size:11px;font-weight:700;color:var(--dim);}
.sec a.smeta{text-decoration:none;color:var(--blue);}

/* ── History card ── */
.histcard{border-radius:22px;background:rgba(255,255,255,0.028);border:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);overflow:hidden;}
.hist-tabs{display:flex;border-bottom:1px solid var(--border);}
.hist-tab{flex:1;padding:11px 0;text-align:center;font-size:11px;font-weight:800;color:var(--dim);cursor:pointer;transition:color .18s,background .18s;}
.hist-tab.active{color:var(--text);background:rgba(255,255,255,0.04);}
.hist-content{padding:13px 13px 12px;}
/* week strip */
.weekrow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.wd{display:flex;flex-direction:column;align-items:center;gap:5px;}
.wd .wl{font-size:9px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--dim);}
.wd .wc{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:var(--dim);}
.wd .wc svg{width:13px;height:13px;}
.wd.done .wc{background:linear-gradient(150deg,color-mix(in srgb,var(--blue) 24%,transparent),color-mix(in srgb,var(--blue) 7%,transparent));
  border-color:color-mix(in srgb,var(--blue) 44%,transparent);color:#cfe0ff;
  box-shadow:0 0 10px color-mix(in srgb,var(--blue) 22%,transparent);}
.wd.today .wc{border:2px solid var(--blue);color:#fff;box-shadow:0 0 12px rgba(10,132,255,.45);animation:nowPulse 2.2s ease-in-out infinite;}
@keyframes nowPulse{0%,100%{box-shadow:0 0 7px rgba(10,132,255,.36);}50%{box-shadow:0 0 16px rgba(10,132,255,.65);}}
.wd.missed .wc{color:#FF6B6B;border-color:rgba(255,107,107,.22);}
.wd.future .wc{opacity:.32;}
.histmeta{margin-top:9px;font-size:10px;font-weight:700;color:var(--dim);text-align:center;}

/* ── Milestone roadmap ── */
.roadmap-wrap{border-radius:22px;background:rgba(255,255,255,0.028);border:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:14px 0 10px;overflow:hidden;}
.roadmap-scroll{overflow-x:auto;padding:0 14px;-webkit-overflow-scrolling:touch;}
.roadmap-scroll::-webkit-scrollbar{display:none;}
.roadmap-track{display:flex;align-items:flex-start;gap:0;position:relative;padding:2px 0 10px;}
.roadmap-line{position:absolute;top:17px;left:18px;right:18px;height:2px;border-radius:999px;
  background:linear-gradient(90deg,var(--blue) var(--rp,0%),rgba(255,255,255,.07) var(--rp,0%));z-index:0;}
.rm-node{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:5px;flex:none;min-width:52px;padding:0 2px;cursor:default;}
.rm-node.claimable,.rm-node.reached{cursor:pointer;}
.rm-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);transition:.3s;}
.rm-dot svg{width:14px;height:14px;color:var(--dim);}
.rm-node.reached .rm-dot{background:color-mix(in srgb,var(--rc,var(--blue)) 18%,transparent);
  border-color:color-mix(in srgb,var(--rc,var(--blue)) 50%,transparent);}
.rm-node.reached .rm-dot svg{color:var(--rc,var(--blue));}
.rm-node.current .rm-dot{border-color:color-mix(in srgb,var(--rc,var(--blue)) 80%,transparent);
  box-shadow:0 0 14px color-mix(in srgb,var(--rc,var(--blue)) 45%,transparent);
  animation:rmPulse 2s ease-in-out infinite;}
@keyframes rmPulse{0%,100%{box-shadow:0 0 10px color-mix(in srgb,var(--rc,var(--blue)) 35%,transparent);}50%{box-shadow:0 0 20px color-mix(in srgb,var(--rc,var(--blue)) 65%,transparent);}}
.rm-node.claimable .rm-dot{border-color:var(--blue);animation:rmPulse2 1.7s ease-in-out infinite;}
.rm-node.claimable .rm-dot svg{color:var(--blue);}
@keyframes rmPulse2{0%,100%{box-shadow:0 0 8px rgba(10,132,255,.38);}50%{box-shadow:0 0 18px rgba(10,132,255,.68);}}
.rm-node.locked .rm-dot{opacity:.38;}
.rm-label{font-size:8.5px;font-weight:800;color:var(--dim);text-align:center;letter-spacing:.02em;}
.rm-node.reached .rm-label,.rm-node.current .rm-label{color:var(--muted);}
.rm-node.claimable .rm-label{color:var(--blue-3);}
.rm-claim-row{padding:2px 14px 0;display:none;}
.rm-claim-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:13px;
  border:none;cursor:pointer;font:inherit;font-size:12.5px;font-weight:800;color:#fff;
  background:var(--blue);
  box-shadow:0 5px 14px rgba(10,132,255,.32);animation:claimPulse 1.7s ease-in-out infinite;}
@keyframes claimPulse{0%,100%{box-shadow:0 5px 14px rgba(10,132,255,.32);}50%{box-shadow:0 5px 22px rgba(10,132,255,.58);}}
.rm-claim-btn:active{transform:scale(.97);}
.rm-claim-btn svg{width:14px;height:14px;}

/* chest visuals */
.chestv{position:relative;width:26px;height:24px;}.chestv svg{width:100%;height:100%;}
.chestv.bronze{color:#9AA1B7;}.chestv.silver{color:#C6CDDA;}.chestv.gold{color:#F8FAFE;}.chestv.legendary{color:#5BB1FF;}

/* ── Friends strip ── */
.friends-strip{border-radius:22px;background:rgba(255,255,255,0.028);border:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 0 11px;overflow:hidden;}
.friends-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 14px;-webkit-overflow-scrolling:touch;}
.friends-scroll::-webkit-scrollbar{display:none;}
.fr-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:none;text-decoration:none;color:inherit;}
.fr-av{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;
  background:linear-gradient(150deg,var(--c1,#3A4055),var(--c2,#2A2F40));
  border:1.5px solid rgba(255,255,255,.10);}
.fr-streak{display:inline-flex;align-items:center;gap:2px;font-size:11.5px;font-weight:900;color:var(--muted);}.fr-streak svg{width:11px;height:11px;}
.fr-name{font-size:8.5px;font-weight:800;letter-spacing:.02em;color:var(--dim);max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fr-empty{padding:4px 14px;font-size:12px;color:var(--dim);font-weight:700;}

/* ── Stats slim row ── */
.stats-row{display:flex;gap:11px;}
.stat{flex:1;border-radius:18px;padding:14px 13px 12px;background:rgba(255,255,255,0.028);border:1px solid var(--border);backdrop-filter:blur(12px);}
.stat .sic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--sc,var(--blue)) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--sc,var(--blue)) 24%,transparent);margin-bottom:9px;}
.stat .sic svg{width:17px;height:17px;color:var(--sc,var(--blue));}
.stat .sv{font-size:24px;font-weight:900;letter-spacing:-.02em;line-height:1;}
.stat .sl{font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-top:5px;}

/* ── Shields slim row ── */
.shieldrow{display:flex;align-items:center;gap:12px;border-radius:22px;padding:13px 15px;
  background:rgba(255,255,255,0.028);border:1px solid var(--border);backdrop-filter:blur(12px);}
.shieldrow .shi{width:36px;height:36px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:rgba(10,132,255,0.1);border:1px solid rgba(10,132,255,.2);}
.shieldrow .shi svg{width:20px;height:20px;color:var(--blue);filter:drop-shadow(0 0 6px rgba(10,132,255,.5));
  animation:shGlow 3.2s ease-in-out infinite;}
@keyframes shGlow{0%,100%{filter:drop-shadow(0 0 5px rgba(10,132,255,.38));}50%{filter:drop-shadow(0 0 13px rgba(10,132,255,.82));}}
.shieldrow.locked .shi{background:rgba(255,255,255,.04);border-color:var(--border);}
.shieldrow.locked .shi svg{color:var(--dim);animation:none;}
.shieldrow .shb{flex:1;min-width:0;}
.shieldrow .shcount{font-size:15px;font-weight:900;}.shieldrow .shcount span{font-size:10.5px;font-weight:700;color:var(--muted);}
.shieldrow .shd{font-size:10px;color:var(--muted);margin-top:2px;}
.shdots{display:flex;gap:5px;margin-top:8px;}
.shdot{flex:1;height:5px;border-radius:999px;background:rgba(0,0,0,.28);border:1px solid var(--border);}
.shdot.on{background:linear-gradient(90deg,var(--blue),var(--grad-b));border-color:transparent;box-shadow:0 0 9px rgba(10,132,255,.42);}

/* ── Celebration overlay ── */
.celebrate{position:absolute;inset:0;z-index:80;display:none;align-items:center;justify-content:center;flex-direction:column;
  background:radial-gradient(60% 50% at 50% 42%,color-mix(in srgb,var(--cpc,var(--blue)) 20%,transparent),rgba(2,2,10,.95) 72%);
  backdrop-filter:blur(3px);}
.celebrate.show{display:flex;}
.celebrate .cflash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;}
.celebrate.show .cflash{animation:cFlash .6s ease;}
@keyframes cFlash{0%{opacity:0;}18%{opacity:.8;}100%{opacity:0;}}
.celebrate .cglow{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(44% 34% at 50% 40%,color-mix(in srgb,var(--cpc,var(--blue)) 80%,transparent),transparent 70%);opacity:0;}
.celebrate.show .cglow{animation:cGlow 2.4s ease forwards;}
@keyframes cGlow{0%{opacity:0;}25%{opacity:.9;}100%{opacity:.22;}}
.celebrate .crewic{position:relative;z-index:2;width:120px;height:110px;display:flex;align-items:center;justify-content:center;transform:scale(.4);opacity:0;}
.celebrate.show .crewic{animation:cReward .7s cubic-bezier(.2,.9,.3,1.5) .25s forwards;}
@keyframes cReward{to{transform:scale(1);opacity:1;}}
.celebrate .crewic > svg{width:88px;height:88px;color:var(--cpc,var(--blue));filter:drop-shadow(0 8px 24px color-mix(in srgb,var(--cpc,var(--blue)) 60%,transparent));}
.celebrate .crewic .chestv{width:88px;height:82px;}
.celebrate .ceyebrow{z-index:2;margin-top:16px;font-size:10px;font-weight:900;letter-spacing:.22em;text-transform:uppercase;color:var(--cpc,var(--blue));opacity:0;}
.celebrate .ctitle{z-index:2;font-size:22px;font-weight:900;margin-top:4px;opacity:0;text-align:center;padding:0 28px;}
.celebrate .creward{z-index:2;font-size:12.5px;font-weight:700;color:#dfe6f5;margin-top:5px;opacity:0;text-align:center;padding:0 34px;}
.celebrate .cxp{z-index:2;margin-top:8px;font-size:13px;font-weight:900;color:var(--good);opacity:0;}
.celebrate.show .ceyebrow{animation:cFade .5s ease .55s forwards;}.celebrate.show .ctitle{animation:cFade .5s ease .65s forwards;}
.celebrate.show .creward{animation:cFade .5s ease .8s forwards;}.celebrate.show .cxp{animation:cFade .5s ease .95s forwards;}
@keyframes cFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.celebrate .cbtn{z-index:2;margin-top:24px;width:200px;padding:14px;border-radius:14px;border:none;cursor:pointer;
  font:inherit;font-size:15px;font-weight:900;color:#fff;
  background:linear-gradient(135deg,var(--grad-a),var(--grad-b));box-shadow:0 10px 26px rgba(10,132,255,.42);opacity:0;}
.celebrate.show .cbtn{animation:cFade .5s ease 1.1s forwards;}.celebrate .cbtn:active{transform:scale(.98);}

.spark{position:absolute;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:78;}

/* ── Nav — exact dashboard ── */
.nav{position:absolute;left:0;right:0;bottom:0;z-index:50;padding:10px 12px 26px;
  display:flex;justify-content:space-around;align-items:flex-end;
  background:linear-gradient(180deg,rgba(5,6,14,0) 0%,rgba(5,6,14,.88) 34%,#04040c 100%);
  backdrop-filter:blur(14px);}
.nav a{background:none;border:none;font:inherit;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;
  min-width:48px;min-height:44px;text-decoration:none;color:var(--dim);transition:color .2s;}
.nav svg{width:23px;height:23px;}.nav .nl{font-size:10px;font-weight:800;}
.nav .item.active{color:var(--text);}
.nav .item.active svg{color:var(--blue);filter:drop-shadow(0 0 8px rgba(10,132,255,.75));}
.nav .item.active::before{content:"";position:absolute;top:-2px;width:5px;height:5px;
  border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue);}

.toast{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(14px);z-index:70;
  background:rgba(20,22,34,.96);border:1px solid var(--border);border-radius:14px;padding:11px 16px;
  font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.3s;
  box-shadow:0 12px 30px rgba(0,0,0,.5);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(prefers-reduced-motion:reduce){
  .hero .auraLayer,.hero .hp,.hero .rings i,.hero .rainbow,.hero .flame,
  .hero .bignum,.shieldrow .shi svg,.wd.today .wc,.spark,
  .celebrate .cflash,.celebrate .cglow,.celebrate .crewic,
  .rm-node.current .rm-dot,.rm-node.claimable .rm-dot,.rm-claim-btn{animation:none!important;}
}

<script>
(function(){
  var S=window.coreState, qs=function(s){return document.querySelector(s);};
  try{ if(/[?&]demo=1/.test(location.search) && S.seedDemo) S.seedDemo(); }catch(e){}
  var REDUCED=false; try{ REDUCED=window.matchMedia('(prefers-reduced-motion:reduce)').matches; }catch(e){}
  function SFX(n){ try{ if(typeof window.coreSfx==='function') window.coreSfx(n); }catch(e){} }

  // ── storage helpers (preserved) ──────────────────────────────────────────────
  function lget(k,d){ try{ var v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
  var _qToasted=false;
  function lset(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return _onQ(e,function(){ try{localStorage.setItem(k,v);}catch(e2){} }); } }
  function ig(k,d){ var v=parseInt(lget(k,''),10); return isNaN(v)?d:v; }
  function jget(k,d){ try{ var v=JSON.parse(localStorage.getItem(k)||'null'); return Array.isArray(v)?v:(v||d); }catch(e){ return d; } }
  function jset(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); return true; }catch(e){ return _onQ(e,function(){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e2){} }); } }
  function _onQ(e,retry){ try{ var h=jget('coreStreakHistory',[]); if(h.length>200){ try{localStorage.setItem('coreStreakHistory',JSON.stringify(h.slice(-200)));}catch(e2){} } retry(); if(!_qToasted){ _qToasted=true; toast('Storage full — trimmed history'); } }catch(e3){} return false; }
  function pushUniq(k,val){ var a=jget(k,[]); if(a.indexOf(val)<0){ a.push(val); jset(k,a); } }
  function dkey(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  function todayKey(){ return dkey(new Date()); }
  function addDays(d,n){ var x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
  function cleanHistory(){ var raw=jget('coreStreakHistory',[]), tk=todayKey(), seen={}, out=[];
    for(var i=0;i<raw.length;i++){ var k=raw[i]; if(typeof k==='string'&&k<=tk&&!seen[k]){ seen[k]=1; out.push(k); } }
    out.sort(); if(out.length!==raw.length) jset('coreStreakHistory',out); return out; }
  function bumpPerfect(){ var n=ig('corePerfectDaysCount',0)+1; lset('corePerfectDaysCount',String(n)); return n; }
  function perfectDays(){ return Math.max(ig('corePerfectDaysCount',0), cleanHistory().length); }
  function clockOk(){ var now=Date.now(), seen=ig('coreLastSeenEpoch',0); if(now<seen-60000){ lset('coreClockSuspect','1'); return false; } if(now>seen) lset('coreLastSeenEpoch',String(now)); return true; }
  function dispatch(){ try{ window.dispatchEvent(new CustomEvent('core:progress-updated',{detail:{source:'streak'}})); }catch(e){} }
  var toastT; function toast(m){ var t=qs('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); },1800); }
  function waterIdx(){ try{ var i=S.RANKS.findIndex(function(r){return r.name==='Water';}); return i<0?3:i; }catch(e){ return 3; } }
  function questDoneToday(s){ try{ var today=new Date().toDateString(); if(s.quests&&s.quests.dateKey===today){ return (s.quests.daily||[]).some(function(q){return q.done;}); } }catch(e){} return lget('coreTodayActive','0')==='1'; }

  // ── self-healing streak repair (preserved) ───────────────────────────────────
  function consecutiveFrom(hist, active){
    var set={}; for(var i=0;i<hist.length;i++) set[hist[i]]=1;
    var today=new Date(), tk=dkey(today), start;
    if(set[tk]||active){ start=today; }
    else { var y=addDays(today,-1); if(set[dkey(y)]) start=y; else return 0; }
    var count=0, cur=start;
    while(set[dkey(cur)]||(dkey(cur)===tk&&active)){ count++; cur=addDays(cur,-1); }
    return count;
  }
  function longestRun(hist){
    var set={}; for(var i=0;i<hist.length;i++) set[hist[i]]=1; var best=0;
    for(var j=0;j<hist.length;j++){ var p=hist[j].split('-'); var d=new Date(+p[0],+p[1]-1,+p[2]);
      if(!set[dkey(addDays(d,-1))]){ var c=0, cur=d; while(set[dkey(cur)]){ c++; cur=addDays(cur,1); } if(c>best) best=c; } }
    return best;
  }
  function repairStreak(){
    var hist=cleanHistory(); var s=S.read(), active=questDoneToday(s);
    var real=consecutiveFrom(hist,active), lr=Math.max(real,longestRun(hist)), changed=false;
    if(((s.streak&&s.streak.days)||0)>real+2){ S.update(function(st){ st.streak.days=real; return st; }); lset('coreStreak',String(real)); changed=true; }
    var bestStored=Math.max((S.read().bestStreak||0),ig('coreBestStreak',0));
    if(bestStored>lr+30){ S.update(function(st){ st.bestStreak=lr; return st; }); lset('coreBestStreak',String(lr)); changed=true; }
    if(changed){ try{ S.syncProgress(); }catch(e){} }
  }
  function migrate(){
    if(lget('coreStreakSchemaV','')==='2'){ cleanHistory(); repairStreak(); return; }
    cleanHistory();
    var cl=jget('coreStreakRewardsClaimed',[]).map(function(x){return +x;}).filter(function(x){return !isNaN(x);}); jset('coreStreakRewardsClaimed',cl);
    if(ig('corePerfectDaysCount',0)===0) lset('corePerfectDaysCount',String(jget('coreStreakHistory',[]).length));
    if(ig('coreLastSeenEpoch',0)===0) lset('coreLastSeenEpoch',String(Date.now()));
    repairStreak(); lset('coreStreakSchemaV','2');
  }

  // ── sparks ───────────────────────────────────────────────────────────────────
  function burstAt(cx,cy,color,n){ if(REDUCED) return; var ph=qs('.phone'),pr=ph.getBoundingClientRect(); n=n||12;
    for(var i=0;i<n;i++){ (function(){ var sp=document.createElement('span'); sp.className='spark';
      sp.style.cssText='background:'+color+';box-shadow:0 0 8px '+color+';left:'+(cx-pr.left)+'px;top:'+(cy-pr.top)+'px;';
      ph.appendChild(sp);
      var a=Math.random()*Math.PI*2,dist=30+Math.random()*70;
      sp.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:'translate('+(Math.cos(a)*dist)+'px,'+(Math.sin(a)*dist-16)+'px) scale(.2)',opacity:0}],
        {duration:700+Math.random()*600,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=function(){ sp.remove(); };
    })(); } }

  function countUp(el,to){ if(!el) return; var from=parseInt((el.textContent||'0').replace(/[^0-9]/g,''),10)||0; if(from===to){ el.textContent=to.toLocaleString(); return; }
    var start=null,dur=850; if(el._raf) cancelAnimationFrame(el._raf);
    (function step(ts){ if(!start) start=ts; var p=Math.min(1,(ts-start)/dur); el.textContent=Math.round(from+(to-from)*(1-Math.pow(1-p,3))).toLocaleString(); if(p<1) el._raf=requestAnimationFrame(step); })(0);
    el._raf=requestAnimationFrame(function step(ts){ if(!start) start=ts; var p=Math.min(1,(ts-start)/dur); el.textContent=Math.round(from+(to-from)*(1-Math.pow(1-p,3))).toLocaleString(); if(p<1) el._raf=requestAnimationFrame(step); }); }

  // ── streak engine (preserved — local-date maintenance) ───────────────────────
  function logShield(r){ try{ var l=jget('coreShieldLog',[]); l.unshift({ts:Date.now(),reason:r}); if(l.length>30) l=l.slice(0,30); jset('coreShieldLog',l); }catch(e){} }
  function maintain(){
    var s=S.read(), todayK=todayKey(), yK=dkey(addDays(new Date(),-1));
    var last=lget('coreLastActiveDate',null); if(last==='') last=null;
    var active=questDoneToday(s), days=(s.streak&&s.streak.days)||0;
    var changed=false, usedShield=false, justLost=false, okClock=clockOk();
    if(active){
      lset('coreTodayActive','1');
      if(last!==todayK&&okClock){
        if(last===yK){ days++; }
        else if(last===null){ days=Math.max(days,1); }
        else { var sh=ig('coreStreakShields',0); if(sh>0){ sh--; lset('coreStreakShields',String(sh)); days++; usedShield=true; logShield('gap-protected'); } else days=1; }
        S.update(function(st){ st.streak.days=days; if(days>(st.bestStreak||0)) st.bestStreak=days; st.streak.lastCleanAt=Date.now(); st.streak.lostAt=null; return st; });
        lset('coreLastActiveDate',todayK);
        var hist=cleanHistory(); if(hist.indexOf(todayK)<0){ hist.push(todayK); hist.sort(); if(hist.length>800) hist=hist.slice(-800); jset('coreStreakHistory',hist); bumpPerfect(); }
        changed=true;
      }
    } else {
      lset('coreTodayActive','0');
      if(last&&last!==todayK&&last!==yK&&okClock){
        var sh2=ig('coreStreakShields',0);
        if(sh2>0&&days>0){ sh2--; lset('coreStreakShields',String(sh2)); logShield('miss-protected'); S.update(function(st){ st.streak.lastCleanAt=Date.now(); return st; }); lset('coreLastActiveDate',yK); usedShield=true; changed=true; }
        else if(days>0){ S.update(function(st){ st.streak.previousDays=days; st.streak.days=0; st.streak.lostAt=Date.now(); return st; }); days=0; changed=true; justLost=true; }
      }
    }
    var best=Math.max(ig('coreBestStreak',0),(S.read().bestStreak||0),days);
    lset('coreStreak',String(days)); lset('coreBestStreak',String(best));
    if(usedShield) toast('Shield used — streak protected');
    if(changed){ S.syncProgress(); dispatch(); }
    var st2=S.read().streak||{}, recoverable=false;
    try{ recoverable=typeof S.isStreakRecoverable==='function'?S.isStreakRecoverable(S.read()):!!(st2.lostAt&&(st2.previousDays||0)>0&&(Date.now()-st2.lostAt)/3600000<=48); }catch(e){}
    return { days:days, active:active, lost:justLost, recoverable:recoverable, prevDays:(st2.previousDays||0) };
  }

  // ── tier + multiplier ─────────────────────────────────────────────────────────
  function evo(days){
    if(days>=100) return {cls:'t100',name:'Prestige',  tc:'#7BC4FF',tc2:'#0A84FF',glow:'#5BB1FF',p:28};
    if(days>=60)  return {cls:'t60', name:'Inferno',   tc:'#5BB1FF',tc2:'#0A84FF',glow:'#5BB1FF',p:22};
    if(days>=30)  return {cls:'t30', name:'Surge',     tc:'#5BB1FF',tc2:'#0A84FF',glow:'#2F8FFF',p:18};
    if(days>=14)  return {cls:'t14', name:'Blazing',   tc:'#2F8FFF',tc2:'#0A84FF',glow:'#2F8FFF',p:10};
    if(days>=7)   return {cls:'t7',  name:'Charged',   tc:'#2F8FFF',tc2:'#0A84FF',glow:'#0A84FF',p:6};
    if(days>=1)   return {cls:'t1',  name:'Kindled',   tc:'#5BB1FF',tc2:'#2F8FFF',glow:'#2F8FFF',p:4};
    return             {cls:'t0',  name:'Dormant',   tc:'#6B7186',tc2:'#4F5570',glow:'#6B7186',p:0};

    if(tg) tg.style.background='radial-gradient(62% 38% at 50% 0%,color-mix(in srgb,'+e.glow+' 18%,transparent) 0%,transparent 65%)';
    var aur=document.getElementById('ambAurora');
    if(aur){ aur.style.setProperty('--aurora-a',e.tc); aur.style.setProperty('--aurora-b',e.glow); }

    var hero=qs('#hero'); hero.className='hero '+e.cls;
    qs('#tierName').textContent=e.name+' Streak';
    buildParticles(e.p);
    qs('#bestN').textContent=best;
    if(!initialDone){ countUp(qs('#streakN'),days); initialDone=true; }
    else qs('#streakN').textContent=days;
    if(lastDays!==null&&days>lastDays){
      var nEl=qs('#streakN'); nEl.classList.remove('pop'); void nEl.offsetWidth; nEl.classList.add('pop');
      if(!REDUCED){ var hr=hero.getBoundingClientRect(); burstAt(hr.left+hr.width/2,hr.top+hr.height*0.4,e.glow,20); }
      SFX('streak_grow');
    }
    lastDays=days;

    // mult badge
    var mult=multFor(days), nm=nextMult(days);
    qs('#multTxt').textContent=mult.toFixed(2)+'x XP';
    var nxt=qs('#multNext'); if(nxt) nxt.textContent=nm?'· next at '+nm.at+'d':'';

    // CTA
    var cta=qs('#cta');
    if(active){
      cta.className='cta secured'; cta.removeAttribute('href');
      cta.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M5 12l4 4 10-11"/></svg>Locked in for today';
    } else {
      cta.className='cta'; cta.setAttribute('href','21-quests.html');
      cta.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8Z"/></svg>'+(days>0?'Keep your streak alive':'Light your streak')+'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg>';
    }

    startMotivate(days);
    startPillClock(active);
    renderHist(hist, active);
    renderRoadmap(days, claimed);
    renderFriends();

    // stats row — 2 cards
    var sr=qs('#statsRow');
    if(sr){
      var perf=perfectDays();
      sr.innerHTML=
        '<div class="stat" style="--sc:#0A84FF"><div class="sic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5Z"/></svg></div><div class="sv" id="svBest">0</div><div class="sl">Best streak</div></div>'+
        '<div class="stat" style="--sc:#5BB1FF"><div class="sic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/></svg></div><div class="sv" id="svPerf">0</div><div class="sl">Perfect days</div></div>';
      countUp(qs('#svBest'),best); countUp(qs('#svPerf'),perf);
    }

    renderShields(rankIdx);
  }

  // ── wiring ────────────────────────────────────────────────────────────────────
  migrate();
  var renderT; function scheduleRender(){ clearTimeout(renderT); renderT=setTimeout(render,60); }
  var SK=/^core(Streak|LastActiveDate|TodayActive|BestStreak|StreakShields|StreakRewardsClaimed|OwnedChests|Coins|Xp|Rank|PerfectDays|ShieldLog)/i;
  window.addEventListener('coreStateChange',scheduleRender);
  window.addEventListener('core:progress-updated',scheduleRender);
  window.addEventListener('storage',function(ev){ if(!ev.key||SK.test(ev.key)) scheduleRender(); });
  var midT; function scheduleMidnight(){ var n=new Date(), next=new Date(n.getFullYear(),n.getMonth(),n.getDate()+1,0,0,8)-n; clearTimeout(midT); midT=setTimeout(function(){ lastDays=null; render(); scheduleMidnight(); },Math.max(1000,Math.min(next,2147483647))); }
  scheduleMidnight();
  window.addEventListener('pagehide',function(){ if(motTimer) clearInterval(motTimer); if(pillTimer) clearInterval(pillTimer); clearTimeout(midT); clearTimeout(renderT); });

  render();
  if(window.dashAmbient) window.dashAmbient.init();
  try{ var mm=location.search.match(/scrollY=(\d+)/); if(mm){ var sc=qs('.scroll'); if(sc) sc.scrollTop=+mm[1]; } }catch(e){}
})();
</script>
</body>
</html>
