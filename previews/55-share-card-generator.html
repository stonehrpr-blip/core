<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Share card</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="stylesheet" href="_lib/core-buttons.css" />
<script src="_lib/core-state.js"></script>
<script src="_lib/analytics.js"></script>
<style>
  :root { --bg-base:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --accent:#4A8FFF; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; min-height:100%; background:#0A0A14; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; }
  .page { max-width: 720px; margin: 0 auto; padding: 30px 24px 60px; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.8px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  .controls { display:flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; align-items: center; }
  .ctrl { display:flex; flex-direction: column; gap: 4px; }
  .ctrl label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .ctrl input, .ctrl select { background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.10); color: #fff; padding: 8px 10px; border-radius: 8px; font-family: inherit; font-size: 13px; min-width: 90px; }
  .ctrl input:focus, .ctrl select:focus { outline:none; border-color: #5BB1FF; }

  /* The card itself — square 1290×1290 at 1:1 zoom; we scale-down via CSS to fit. */
  .stage { display:flex; justify-content:center; padding: 20px; background: #050510; border-radius: 18px; border:1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden; }
  .card-wrap { transform-origin: top center; }
  .card {
    width: 1290px; height: 1290px; position: relative; overflow: hidden;
    background: radial-gradient(70% 50% at 50% 12%, rgba(91,177,255,0.30), transparent 60%), radial-gradient(60% 50% at 50% 100%, rgba(179,136,255,0.18), transparent 60%), linear-gradient(180deg, #0a0833 0%, #02020A 60%, #050510 100%);
    color: #fff; padding: 110px 110px;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
  }
  .card .brand { display:flex; align-items:center; gap: 16px; }
  .card .brand .dot { width: 16px; height:16px; border-radius:50%; background: #4A8FFF; box-shadow: 0 0 18px #4A8FFF; }
  .card .brand .wm { font-size: 30px; font-weight: 700; letter-spacing: 14px; color: #fff; }
  .card .kicker { margin-top: 90px; font-size: 30px; letter-spacing: 8px; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 700; }
  .card .num { font-size: 460px; font-weight: 800; letter-spacing: -28px; line-height: 0.85; background: linear-gradient(180deg, #fff 0%, #B388FF 80%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .card .num .unit { font-size: 100px; letter-spacing: 0; color: rgba(255,255,255,0.45); -webkit-text-fill-color: rgba(255,255,255,0.45); font-weight: 600; margin-left: 14px; }
  .card .tagline { font-size: 56px; font-weight: 600; letter-spacing: -1.5px; line-height: 1.05; margin-top: 24px; max-width: 880px; }
  .card .stat-row { position: absolute; left: 110px; right: 110px; bottom: 240px; display: flex; gap: 18px; }
  .card .stat-chip { flex:1; padding: 22px 24px; border-radius: 22px; background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.10); display:flex; align-items:center; gap: 14px; }
  .card .chip-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--c); box-shadow: 0 0 18px var(--c); }
  .card .chip-num { font-size: 56px; font-weight: 800; letter-spacing: -2px; color:#fff; }
  .card .chip-name { font-size: 18px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 700; }
  .card .footer-row { position: absolute; left: 110px; right: 110px; bottom: 110px; display:flex; align-items:center; justify-content:space-between; font-size: 26px; }
  .card .name { color: #fff; font-weight: 700; }
  .card .url { color: rgba(255,255,255,0.6); letter-spacing: 4px; }

  .actions { display:flex; gap: 10px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .url-bar { margin-top: 18px; padding: 12px 14px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: #9AA1B7; word-break: break-all; }
</style>
  <link rel="stylesheet" href="_lib/core-theme.css">
  <script src="_lib/core-theme.js" defer></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="page">
    <h1>Share card generator</h1>
    <div class="sub">1290×1290 milestone card. Edit the params or pass them on the URL: <code>?streak=14&amp;stat=brain&amp;score=78&amp;name=Stone&amp;line=Day+14+clean</code></div>

    <div class="controls">
      <div class="ctrl"><label>Streak</label><input id="iStreak" type="number" min="0" value="14"/></div>
      <div class="ctrl"><label>Big stat</label><select id="iStat"><option value="lifeScore">Life Score</option><option value="brain">Brain</option><option value="lungs">Lungs</option><option value="wallet">Wallet</option><option value="willpower">Willpower</option><option value="body">Body</option></select></div>
      <div class="ctrl"><label>Score</label><input id="iScore" type="number" min="0" max="100" value="78"/></div>
      <div class="ctrl"><label>Name</label><input id="iName" type="text" value="Stone"/></div>
      <div class="ctrl" style="flex:1;min-width:260px;"><label>Tagline</label><input id="iLine" type="text" value="Day 14 clean. Brain on the climb."/></div>
    </div>

    <div class="stage">
      <div class="card-wrap" id="cardWrap" style="transform: scale(0.5);">
        <div class="card" id="card">
          <div class="brand"><div class="dot"></div><div class="wm">CORE</div></div>
          <div class="kicker" id="ckicker">Day streak</div>
          <div class="num" id="cnum">14<span class="unit">/ days</span></div>
          <div class="tagline" id="ctag">Day 14 clean. Brain on the climb.</div>
          <div class="stat-row">
            <div class="stat-chip" style="--c:#FF6BAA;"><div class="chip-dot"></div><div><div class="chip-name">Lungs</div><div class="chip-num" data-stat="lungs">64</div></div></div>
            <div class="stat-chip" style="--c:#B388FF;"><div class="chip-dot"></div><div><div class="chip-name">Brain</div><div class="chip-num" data-stat="brain">78</div></div></div>
            <div class="stat-chip" style="--c:#FF7A45;"><div class="chip-dot"></div><div><div class="chip-name">Will</div><div class="chip-num" data-stat="willpower">81</div></div></div>
          </div>
          <div class="footer-row">
            <div class="name" id="cname">@stone</div>
            <div class="url">CORE · core.app</div>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary pill" onclick="copyShareUrl()">Copy share URL</button>
      <button class="btn secondary pill" onclick="download()">Download PNG (1290×1290)</button>
      <button class="btn ghost" onclick="window.location.href='20-dashboard.html'">← Back to dashboard</button>
      <button class="btn primary pill" onclick="window.location.href='01-index.html'">Start my 7-day free trial →</button>
    </div>

    <div class="url-bar" id="urlBar"></div>
  </div>

<script>
  function read(name, def) {
    const p = new URLSearchParams(location.search);
    return p.get(name) !== null ? p.get(name) : def;
  }
  function paramsFromInputs() {
    return {
      streak: document.getElementById('iStreak').value,
      stat:   document.getElementById('iStat').value,
      score:  document.getElementById('iScore').value,
      name:   document.getElementById('iName').value,
      line:   document.getElementById('iLine').value,
    };
  }
  const STAT_NAMES = {
    lifeScore: 'Life Score',
    brain: 'Brain', lungs: 'Lungs', wallet: 'Wallet', willpower: 'Willpower', body: 'Body',
  };
  function render() {
    const p = paramsFromInputs();
    const isStreak = p.stat === 'streak';
    // Decide hero metric: if streak chosen, show streak. Otherwise show the stat with /100 unit.
    const useStreak = !p.stat || p.stat === 'streak';
    if (useStreak) {
      document.getElementById('ckicker').textContent = 'Day streak';
      document.getElementById('cnum').innerHTML = (p.streak||'0') + '<span class="unit">/ days</span>';
    } else {
      document.getElementById('ckicker').textContent = STAT_NAMES[p.stat] || p.stat;
      document.getElementById('cnum').innerHTML = (p.score||'0') + '<span class="unit">/ 100</span>';
    }
    document.getElementById('ctag').textContent = p.line || '';
    document.getElementById('cname').textContent = '@' + (p.name || 'stone').toLowerCase();
    // also reflect coreState into stat chips if no override
    try {
      const s = coreState.read();
      document.querySelector('[data-stat="lungs"]').textContent = s.stats.lungs;
      document.querySelector('[data-stat="brain"]').textContent = s.stats.brain;
      document.querySelector('[data-stat="willpower"]').textContent = s.stats.willpower;
    } catch(e){}
    // update URL bar
    const url = location.origin + location.pathname + '?streak=' + encodeURIComponent(p.streak) + '&stat=' + encodeURIComponent(p.stat) + '&score=' + encodeURIComponent(p.score) + '&name=' + encodeURIComponent(p.name) + '&line=' + encodeURIComponent(p.line);
    document.getElementById('urlBar').textContent = url;
    // responsive scale of the 1290px card
    fitScale();
  }
  function fitScale() {
    const stage = document.querySelector('.stage');
    const wrap = document.getElementById('cardWrap');
    const w = stage.clientWidth - 40;
    const scale = Math.min(0.6, w / 1290);
    wrap.style.transform = 'scale(' + scale + ')';
    wrap.style.height = (1290 * scale) + 'px';
    wrap.style.width  = (1290 * scale) + 'px';
  }
  function copyShareUrl() {
    const url = document.getElementById('urlBar').textContent;
    navigator.clipboard.writeText(url).then(() => alert('Copied'), () => prompt('Copy:', url));
    if (window.coreTrack) coreTrack('share_card_url_copied', {});
  }
  // Render the card to a 1290×1290 canvas and download it as PNG. No external libs.
  function download() {
    if (window.coreTrack) coreTrack('share_card_download_requested', {});
    const p = paramsFromInputs();
    const W = 1290, H = 1290;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const x = c.getContext('2d');

    // Background — black + cosmic gradients
    x.fillStyle = '#05050F';
    x.fillRect(0, 0, W, H);
    const g1 = x.createRadialGradient(W/2, H*0.14, 0, W/2, H*0.14, W*0.7);
    g1.addColorStop(0, 'rgba(91,177,255,0.30)');
    g1.addColorStop(1, 'rgba(91,177,255,0)');
    x.fillStyle = g1; x.fillRect(0, 0, W, H);
    const g2 = x.createRadialGradient(W/2, H, 0, W/2, H, W*0.6);
    g2.addColorStop(0, 'rgba(159,143,255,0.20)');
    g2.addColorStop(1, 'rgba(159,143,255,0)');
    x.fillStyle = g2; x.fillRect(0, 0, W, H);

    // Brand row
    x.fillStyle = '#4A8FFF';
    x.beginPath(); x.arc(116, 122, 9, 0, Math.PI*2); x.fill();
    x.shadowColor = '#4A8FFF'; x.shadowBlur = 20;
    x.beginPath(); x.arc(116, 122, 9, 0, Math.PI*2); x.fill();
    x.shadowBlur = 0;
    x.fillStyle = '#fff';
    x.font = '700 32px -apple-system, "SF Pro Display", Inter, sans-serif';
    x.fillText('C O R E', 144, 132);

    // Kicker
    x.fillStyle = 'rgba(255,255,255,0.55)';
    x.font = '700 26px -apple-system, "SF Pro Display", Inter, sans-serif';
    const kicker = (!p.stat || p.stat === 'streak') ? 'DAY STREAK' : (p.stat.toUpperCase());
    x.fillText(kicker, 110, 290);

    // Big number — gradient text via fillStyle linearGradient
    const ng = x.createLinearGradient(0, 320, 0, 760);
    ng.addColorStop(0, '#ffffff');
    ng.addColorStop(0.85, '#9F8FFF');
    x.fillStyle = ng;
    x.font = '800 440px -apple-system, "SF Pro Display", Inter, sans-serif';
    const useStreak = !p.stat || p.stat === 'streak';
    const big = useStreak ? p.streak : p.score;
    x.textBaseline = 'top';
    x.fillText(String(big || 0), 110, 320);
    // Unit suffix
    x.fillStyle = 'rgba(255,255,255,0.45)';
    x.font = '600 92px -apple-system, "SF Pro Display", Inter, sans-serif';
    const unit = useStreak ? '/ days' : '/ 100';
    const numW = x.measureText(String(big || 0)).width;
    x.fillText(unit, 110 + Math.max(numW + 60, 320), 470);

    // Tagline (wrap to ~30 chars per line)
    x.fillStyle = '#fff';
    x.font = '600 54px -apple-system, "SF Pro Display", Inter, sans-serif';
    const tag = (p.line || '').trim();
    const words = tag.split(/\s+/);
    let line = '', y = 800;
    words.forEach(w => {
      const test = line ? line + ' ' + w : w;
      if (x.measureText(test).width > W - 220) {
        x.fillText(line, 110, y);
        line = w; y += 64;
      } else { line = test; }
    });
    if (line) x.fillText(line, 110, y);

    // Stat chips row (only if there's room)
    const STATS = ['lungs','brain','willpower'];
    const colors = { lungs:'#FF6BAA', brain:'#9F8FFF', willpower:'#FF7A45' };
    let state = null;
    try { state = coreState.read().stats; } catch(e) { state = { lungs:64, brain:78, willpower:81 }; }
    const chipY = H - 380, chipH = 110, gap = 18, chipW = (W - 220 - gap*2) / 3;
    STATS.forEach((k, i) => {
      const cx = 110 + i * (chipW + gap);
      x.fillStyle = 'rgba(255,255,255,0.05)';
      roundRect(x, cx, chipY, chipW, chipH, 22, true);
      x.strokeStyle = 'rgba(255,255,255,0.10)'; x.lineWidth = 2;
      roundRect(x, cx, chipY, chipW, chipH, 22, false, true);
      x.shadowColor = colors[k]; x.shadowBlur = 16;
      x.fillStyle = colors[k];
      x.beginPath(); x.arc(cx + 28, chipY + chipH/2, 10, 0, Math.PI*2); x.fill();
      x.shadowBlur = 0;
      x.fillStyle = 'rgba(255,255,255,0.55)';
      x.font = '700 18px -apple-system, "SF Pro Display", Inter, sans-serif';
      x.fillText(k.toUpperCase(), cx + 56, chipY + 30);
      x.fillStyle = '#fff';
      x.font = '800 50px -apple-system, "SF Pro Display", Inter, sans-serif';
      x.fillText(String(state[k]), cx + 56, chipY + 50);
    });

    // Footer row — name + host
    x.fillStyle = '#fff';
    x.font = '700 28px -apple-system, "SF Pro Display", Inter, sans-serif';
    x.fillText('@' + (p.name || 'stone').toLowerCase(), 110, H - 130);
    x.fillStyle = 'rgba(255,255,255,0.55)';
    x.font = '600 24px -apple-system, "SF Pro Display", Inter, sans-serif';
    const host = 'CORE · core.app';
    const hostW = x.measureText(host).width;
    x.fillText(host, W - 110 - hostW, H - 130);

    // Trigger download
    c.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'core-' + (p.stat || 'streak') + '-' + (big || 0) + '.png';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  }
  function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
    if (fill)   ctx.fill();
    if (stroke) ctx.stroke();
  }
  // wire inputs
  ['iStreak','iStat','iScore','iName','iLine'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
  });
  // seed inputs from URL params on load
  (function seed(){
    const ids = ['streak','stat','score','name','line'];
    const map = { streak:'iStreak', stat:'iStat', score:'iScore', name:'iName', line:'iLine' };
    ids.forEach(k => {
      const v = read(k, null);
      if (v !== null) {
        const el = document.getElementById(map[k]);
        if (el) el.value = v;
      }
    });
  })();
  window.addEventListener('resize', fitScale);
  render();
</script>
</body>
</html>
