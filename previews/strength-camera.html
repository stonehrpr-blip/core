<!doctype html>
<html lang="en">
<head>
<script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Live Reps</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root{
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.022); --border:rgba(255,255,255,0.07);
    --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --good:#0A84FF; --str:#0A84FF; --str2:#0A84FF; --accent:#0A84FF;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{ min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone{ position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38; }
  .notch{ position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.5); border-radius:999px; z-index:60; }
  .frame{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; }

  /* ── Ambient (static — matches dashboard) ── */
  #ambBg{ position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(60% 35% at 50% 30%,rgba(47,143,255,0.18) 0%,transparent 55%),
      radial-gradient(50% 30% at 50% 100%,rgba(159,143,255,0.10) 0%,transparent 65%),
      linear-gradient(180deg,#060B26 0%,#02020A 50%,#050510 100%); transition:background 2.4s ease; }
  #ambAurora{ position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.45; mix-blend-mode:screen; }
  #ambAurora::before,#ambAurora::after{ content:""; position:absolute; border-radius:50%;
    filter:blur(40px); will-change:transform,opacity; transform:translateZ(0); }
  #ambAurora::before{ width:80%; height:45%; left:-10%; top:8%;
    background:radial-gradient(circle,rgba(47,143,255,0.55),transparent 70%); animation:auroraDriftA 24s ease-in-out infinite; }
  #ambAurora::after{ width:70%; height:40%; right:-10%; bottom:16%;
    background:radial-gradient(circle,rgba(159,143,255,0.50),transparent 70%); animation:auroraDriftB 30s ease-in-out -15s infinite; }
  @keyframes auroraDriftA{ 0%,100%{transform:translate(0,0) scale(1);opacity:0.45;} 50%{transform:translate(40px,-22px) scale(1.12);opacity:0.75;} }
  @keyframes auroraDriftB{ 0%,100%{transform:translate(0,0) scale(1);opacity:0.40;} 50%{transform:translate(-30px,18px) scale(1.10);opacity:0.70;} }
  #ambCelestial{ position:absolute; inset:0; pointer-events:none; z-index:2; }
  @media (prefers-reduced-motion:reduce){ #ambAurora::before,#ambAurora::after{ animation:none!important; } }

  /* ── Help button ── */
  .help-btn{ width:30px; height:30px; flex:none; border-radius:50%; border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.04); color:var(--muted); font-size:14px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .16s,color .16s,border-color .16s; }
  .help-btn:hover{ background:rgba(10,132,255,0.14); color:var(--accent); border-color:rgba(10,132,255,0.35); }

  /* ── Nav (canonical) ── */
  .nav{ position:absolute; left:0; right:0; bottom:0; z-index:50; padding:10px 12px 26px; display:flex; justify-content:space-around; align-items:flex-end;
    background:rgba(3,3,14,0.42); backdrop-filter:blur(28px) saturate(1.6); -webkit-backdrop-filter:blur(28px) saturate(1.6); border-top:1px solid rgba(255,255,255,0.07); }
  .nav a{ background:none; border:none; font:inherit; cursor:pointer; position:relative; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 8px; min-width:48px; min-height:44px; text-decoration:none; color:var(--dim); transition:color .2s; }
  .nav svg{ width:23px; height:23px; } .nav .nl{ font-size:10px; font-weight:800; }
  .nav .item.active{ color:var(--text); } .nav .item.active svg{ color:var(--accent); }

  .top{ display:flex; align-items:center; gap:12px; padding:54px 20px 6px; position:relative; z-index:12; }
  .back{ width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.06); color:var(--text); font-size:20px; cursor:pointer; }
  .top h1{ margin:0; font-size:20px; font-weight:800; letter-spacing:-0.6px; flex:1; }
  .plusbadge{ font-size:9px; font-weight:800; letter-spacing:0.8px; padding:4px 9px; border-radius:999px; background:var(--accent); color:#fff; }
  .plusbadge.off{ background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid var(--border); }

  /* ----- select screen ----- */
  .pick{ position:relative; z-index:12; padding:14px 20px 104px; flex:1; overflow-y:auto; }
  .pick::-webkit-scrollbar{ display:none; }
  .pick .lead{ font-size:13px; color:var(--muted); margin:4px 2px 16px; line-height:1.5; }
  .exsel{ display:flex; flex-direction:column; gap:11px; }
  .exo{ display:flex; align-items:center; gap:14px; padding:16px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card); cursor:pointer; transition:transform .14s, border-color .2s; }
  .exo:active{ transform:scale(0.97); }
  .exo .ei{ width:54px; height:54px; flex:none; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--muted); background:rgba(255,255,255,0.04); box-shadow:inset 0 0 0 1px var(--border); }
  .exo .et{ flex:1; } .exo .et b{ font-size:16px; font-weight:800; letter-spacing:-0.3px; } .exo .et span{ display:block; font-size:11.5px; color:var(--muted); margin-top:2px; }
  .exo .ego{ color:var(--dim); font-size:20px; }
  .ratebar{ margin-top:18px; display:flex; align-items:center; gap:10px; padding:13px 15px; border-radius:16px; background:color-mix(in srgb,var(--accent) 9%,transparent); border:1px solid color-mix(in srgb,var(--accent) 30%,transparent); }
  .ratebar .rr{ font-size:12px; color:var(--text); } .ratebar .rr b{ color:var(--accent); }

  /* ----- live screen ----- */
  /* live camera is an immersive mode — sits above the floating nav */
  .live{ position:absolute; inset:0; z-index:70; display:none; flex-direction:column; }
  .live.on{ display:flex; }
  .cam{ position:absolute; inset:0; z-index:0; background:#06060d; overflow:hidden; }
  .cam video{ width:100%; height:100%; object-fit:cover; transform:scaleX(-1); opacity:0.55; transition:opacity .3s; }
  /* Skeleton overlay — sized to the video's intrinsic resolution and given the
     SAME object-fit/mirror as the video so landmarks line up exactly. */
  #pose{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); z-index:1; pointer-events:none; }
  .cam.tracking video{ opacity:0.95; }
  .cam .silho{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .cam .scan{ position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); box-shadow:0 0 14px color-mix(in srgb,var(--accent) 70%,transparent); animation:scan 3s ease-in-out infinite; }
  @keyframes scan{ 0%,100%{top:14%;} 50%{top:80%;} }
  .camgrad{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(2,2,10,0.5) 0%, transparent 25%, transparent 55%, rgba(2,2,10,0.85) 100%); }
  .livetop{ position:relative; z-index:5; display:flex; align-items:center; justify-content:space-between; padding:56px 20px 0; }
  .livetop .pill{ font-size:11px; font-weight:700; padding:6px 12px; border-radius:999px; background:rgba(0,0,0,0.5); border:1px solid var(--border); }
  .livetop .pill .d{ display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent); margin-right:6px; animation:pulse 1.2s infinite; vertical-align:1px; } @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .counter{ position:relative; z-index:5; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .counter .clbl{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; font-weight:700; }

  /* speed multiplier bar — fills the faster you rep */
  .multi{ display:flex; align-items:center; gap:9px; width:188px; margin-bottom:14px; }
  .multibar{ flex:1; height:7px; border-radius:999px; background:rgba(255,255,255,0.10); overflow:hidden; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06); }
  .multibar i{ display:block; height:100%; width:0%; border-radius:999px;
    background:linear-gradient(90deg,#0A84FF,#5BB1FF 60%,#FFCB3D); transition:width .18s ease; }
  .multilbl{ font-size:13px; font-weight:900; font-variant-numeric:tabular-nums; color:#FFCB3D; min-width:34px; text-align:right; text-shadow:0 0 12px rgba(255,203,61,0.4); }
  .multilbl.hot{ animation:multipulse .5s ease; } @keyframes multipulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.22);} }

  .cwrap{ position:relative; display:flex; flex-direction:column; align-items:center; }
  .counter .cnum{ font-size:124px; font-weight:800; letter-spacing:-5px; line-height:0.9; font-variant-numeric:tabular-nums; text-shadow:0 0 44px rgba(10,132,255,0.45); }
  .counter .cnum.bump{ animation:bump .28s cubic-bezier(.2,1.5,.4,1); } @keyframes bump{ 0%{transform:scale(1);} 40%{transform:scale(1.22);} 100%{transform:scale(1);} }
  .counter .pts{ font-size:17px; font-weight:800; color:#fff; margin-top:2px; font-variant-numeric:tabular-nums; letter-spacing:-0.2px; }
  .counter .pts b{ color:var(--accent); } .counter .pts .u{ color:var(--muted); font-size:12px; font-weight:700; }
  .counter .cgain{ font-size:13px; color:var(--accent); font-weight:700; margin-top:5px; opacity:.9; }

  /* particle + floating "+N" layer, centred on the number */
  .poplayer{ position:absolute; left:50%; top:42%; width:0; height:0; pointer-events:none; z-index:9; }
  .floatN{ position:absolute; left:0; top:0; transform:translate(-50%,-50%); font-size:34px; font-weight:900; letter-spacing:-1px;
    color:#FFCB3D; text-shadow:0 2px 18px rgba(255,203,61,0.55); white-space:nowrap; animation:floatN 1s cubic-bezier(.2,.9,.3,1) forwards; }
  @keyframes floatN{ 0%{ opacity:0; transform:translate(-50%,-30%) scale(.5);} 18%{ opacity:1; transform:translate(-50%,-90%) scale(1.1);} 100%{ opacity:0; transform:translate(-50%,-200%) scale(.95);} }
  .pcl{ position:absolute; left:0; top:0; width:9px; height:9px; border-radius:50%; will-change:transform,opacity;
    transform:translate(-50%,-50%); animation:pcl .72s ease-out forwards; }
  @keyframes pcl{ 0%{ opacity:1; transform:translate(-50%,-50%) translate(0,0) scale(1);} 100%{ opacity:0; transform:translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(.3);} }

  /* clean popup cues */
  .cuewrap{ position:absolute; left:0; right:0; top:46%; z-index:8; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; }
  .cue{ display:inline-flex; align-items:center; gap:8px; padding:10px 16px; border-radius:16px; font-size:14.5px; font-weight:800; letter-spacing:-0.2px;
    background:rgba(10,12,22,0.74); border:1px solid rgba(255,255,255,0.12); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    color:#fff; box-shadow:0 12px 34px rgba(0,0,0,0.45); animation:cueIn .9s cubic-bezier(.16,1,.3,1) forwards; }
  .cue svg{ width:17px; height:17px; }
  .cue.good{ border-color:rgba(52,211,153,0.5); color:#34D399; box-shadow:0 12px 34px rgba(52,211,153,0.18); }
  .cue.warn{ border-color:rgba(255,159,69,0.55); color:#FF9F45; box-shadow:0 12px 34px rgba(255,159,69,0.18); }
  .cue.bonus{ border-color:rgba(255,203,61,0.6); color:#FFCB3D; box-shadow:0 12px 36px rgba(255,203,61,0.25); }
  @keyframes cueIn{ 0%{ opacity:0; transform:translateY(14px) scale(.86);} 14%{ opacity:1; transform:translateY(0) scale(1);} 80%{ opacity:1; transform:translateY(0) scale(1);} 100%{ opacity:0; transform:translateY(-10px) scale(.96);} }

  .livebtns{ position:relative; z-index:5; padding:0 20px 36px; display:flex; flex-direction:column; gap:11px; }
  .row2{ display:flex; gap:11px; } .row2 .gb{ flex:1; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text); border-radius:16px; padding:15px; font-size:14px; font-weight:700; cursor:pointer; transition:transform .12s; } .row2 .gb:active{ transform:scale(0.96); }
  .row2 .gb.fin{ background:var(--accent); border-color:transparent; color:#fff; }
  @media (prefers-reduced-motion:reduce){ .floatN,.pcl,.cue,.cnum.bump,.multilbl.hot{ animation-duration:.01ms!important; } }

  /* summary */
  .scrim{ position:absolute; inset:0; z-index:80; background:rgba(2,2,10,0.7); backdrop-filter:blur(8px); opacity:0; pointer-events:none; transition:.3s; } .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:81; background:#0E0E1B; border-top-left-radius:30px; border-top-right-radius:30px; border-top:1px solid rgba(255,255,255,0.09); transform:translateY(102%); transition:transform .42s cubic-bezier(.16,1,.3,1); } .sheet.show{ transform:translateY(0); }
  .grab{ width:40px; height:5px; border-radius:999px; background:rgba(255,255,255,0.18); margin:11px auto 4px; }
  .sb{ padding:6px 22px 28px; }
  .sumhead{ text-align:center; } .sumhead .ring{ width:84px; height:84px; margin:6px auto 12px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--accent); background:radial-gradient(circle at 50% 40%, color-mix(in srgb,var(--accent) 26%,transparent), color-mix(in srgb,var(--accent) 4%,transparent)); box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 40%,transparent); animation:pop .5s cubic-bezier(.2,1.4,.4,1) both; } @keyframes pop{ from{transform:scale(.3); opacity:0;} to{transform:scale(1); opacity:1;} }
  .sumhead h2{ margin:0; font-size:23px; font-weight:800; letter-spacing:-0.6px; } .sumhead p{ margin:5px 0 0; font-size:12.5px; color:var(--muted); }
  .big3{ display:flex; gap:9px; margin:18px 0; } .big3 .b{ flex:1; border-radius:18px; padding:16px 8px; text-align:center; border:1px solid var(--border); background:var(--bg-card); } .big3 .bn{ font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; } .big3 .bl{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:3px; font-weight:700; } .big3 .b.str .bn{ color:var(--accent); } .big3 .b.xp .bn{ color:var(--accent); }
  .bigbtn{ width:100%; border:none; border-radius:18px; padding:16px; font-size:15px; font-weight:800; cursor:pointer; color:#fff; background:var(--accent); transition:transform .12s; } .bigbtn:active{ transform:scale(0.97); }
  .againbtn{ width:100%; margin-top:9px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text); border-radius:16px; padding:13px; font-size:13px; font-weight:700; cursor:pointer; }
  @media (prefers-reduced-motion:reduce){ .scan{ animation:none!important; } }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div id="ambBg"></div><div id="ambAurora"></div><div id="ambCelestial"></div>

    <div class="frame">
      <div class="top">
        <button class="back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M15 6l-6 6 6 6"/></svg></button>
        <h1>Live Rep Counter</h1>
        <span class="plusbadge off" id="plusBadge">1× RATE</span>
        <button class="help-btn" id="helpBtn" aria-label="Live rep counter help">?</button>
      </div>

      <!-- SELECT -->
      <div class="pick" id="pick">
        <div class="lead">Pick an exercise, turn on your camera, and start repping. Every rep feeds your <b style="color:var(--accent)">Strength</b> stat live.</div>
        <div class="exsel" id="exsel"></div>
        <div class="ratebar"><span style="display:inline-flex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg></span><div class="rr">You earn <b id="rateTxt">0.01</b> Strength per rep. <span id="plusHint"></span></div></div>
      </div>

      <!-- LIVE -->
      <div class="live" id="live">
        <div class="cam" id="cam">
          <video id="vid" autoplay playsinline muted></video>
          <canvas id="pose"></canvas>
          <div class="silho" id="silho"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:64px;height:64px"><circle cx="12" cy="5" r="2.5"/><path d="M12 8v7M12 15l-3 6M12 15l3 6M7 11h10"/></svg></div>
          <div class="scan"></div>
        </div>
        <div class="camgrad"></div>
        <div class="livetop">
          <span class="pill"><span class="d"></span><span id="liveEx">Push-ups</span></span>
          <span class="pill" id="camState">Camera off</span>
        </div>
        <div class="counter">
          <div class="multi"><div class="multibar"><i id="multiFill"></i></div><span class="multilbl" id="multiLbl">×1.0</span></div>
          <div class="clbl">Reps</div>
          <div class="cwrap">
            <div class="cnum" id="cnum">0</div>
            <div class="poplayer" id="popLayer"></div>
          </div>
          <div class="pts"><b id="pts">0</b> <span class="u">pts</span></div>
          <div class="cgain" id="cgain">+0.00 Strength</div>
        </div>
        <div class="cuewrap" id="cueWrap"></div>
        <div class="livebtns">
          <div class="row2"><button class="gb" id="camToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;vertical-align:-2px"><path d="M4 7h3l2-2h6l2 2h3v12H4z"/><circle cx="12" cy="13" r="3.5"/></svg> Camera</button><button class="gb fin" id="finBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;vertical-align:-2px"><path d="M5 12l4 4 10-11"/></svg> Finish</button></div>
        </div>
      </div>

      <nav class="nav" aria-label="Primary">
        <a class="item" href="20-dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 11l9-7 9 7M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/></svg><span class="nl">Home</span></a>
        <a class="item" href="21-quests.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 5h11M9 12h11M9 19h11M4 5l1 1 2-2M4 12l1 1 2-2M4 19l1 1 2-2"/></svg><span class="nl">Quests</span></a>
        <a class="item" href="coach.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="nl">Coach</span></a>
        <a class="item" href="community.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="nl">Community</span></a>
        <a class="item" href="24-more.html"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2.5"/><circle cx="12" cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/></svg><span class="nl">More</span></a>
      </nav>
    </div>

    <div class="scrim" id="sumScrim"></div>
    <div class="sheet" id="sumSheet"><div class="grab"></div><div class="sb" id="sumBody"></div></div>
    <div class="home-indicator"></div>
  </div>

  <script src="_lib/core-sfx.js"></script>
  <script src="_lib/core-state.js"></script>
  <script src="_lib/core-gym-data.js"></script>
  <script src="_lib/core-strength.js"></script>
  <script src="_lib/dash-ambient.js"></script>
  <script src="_lib/core-help.js"></script>
  <!-- Pose model loader (ES module, lazy). Pulls MediaPipe Tasks-Vision +
       the lightweight pose model from a CDN only when auto-tracking is first
       enabled. All inference runs on-device; no frames ever leave the phone.
       If the CDN/model can't load, the page falls back to manual rep tapping. -->
  <script type="module">
    let _p = null;
    async function load(){
      if (_p) return _p;
      _p = (async () => {
        const V = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";
        const m = await import(V);
        const fileset = await m.FilesetResolver.forVisionTasks(V + "/wasm");
        let landmarker;
        try {
          landmarker = await m.PoseLandmarker.createFromOptions(fileset, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task", delegate: "GPU" },
            runningMode: "VIDEO", numPoses: 1,
          });
        } catch (e) {
          // Some devices have no WebGL/GPU delegate — retry on CPU.
          landmarker = await m.PoseLandmarker.createFromOptions(fileset, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task", delegate: "CPU" },
            runningMode: "VIDEO", numPoses: 1,
          });
        }
        return { landmarker, PoseLandmarker: m.PoseLandmarker, DrawingUtils: m.DrawingUtils };
      })();
      return _p;
    }
    window.PoseKit = { load };
  </script>
  <script>
  (function(){
    "use strict";
    var $=function(s){ return document.querySelector(s); };
    var S=window.CoreStrength;
    if(window.dashAmbient) try{ window.dashAmbient.init(); }catch(e){}
    function sfx(n){ S.sfx(n); } function haptic(){ try{ navigator.vibrate&&navigator.vibrate(10); }catch(e){} }
    function ic(d,s,st){ s=s||14; return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+(st||2)+'" stroke-linecap="round" stroke-linejoin="round" style="width:'+s+'px;height:'+s+'px;vertical-align:-2px">'+d+'</svg>'; }
    var GI={
      flame:    ic('<path d="M12 3c1.6 3.6 4 4.6 4 8a4 4 0 0 1-8 0c0-1.3.5-2.1 1-2.7C9 11 12 8 12 3z"/>',14),
      dumbbell: ic('<path d="M4 9v6M7 7v10M17 7v10M20 9v6M7 12h10"/>',14),
      bolt:     ic('<path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>',14),
      spark:    ic('<path d="M12 3v6M12 15v6M3 12h6M15 12h6M6 6l3 3M15 15l3 3M18 6l-3 3M9 15l-3 3"/>',14),
      chevron:  ic('<path d="M9 6l6 6-6 6"/>',20,2),
      camera:   ic('<path d="M4 7h3l2-2h6l2 2h3v12H4z"/><circle cx="12" cy="13" r="3.5"/>',15),
      person:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:64px;height:64px"><circle cx="12" cy="5" r="2.5"/><path d="M12 8v7M12 15l-3 6M12 15l3 6M7 11h10"/></svg>',
      pushup:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px"><circle cx="5" cy="8" r="1.6"/><path d="M5 10l4 3 7-1M9 13l5 4M3 18h18"/></svg>',
      legs:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px"><path d="M9 3v8l-2 10M15 3v8l2 10M9 7h6"/></svg>',
      pullup:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px"><path d="M4 4h16M8 4v3M16 4v3"/><circle cx="12" cy="11" r="2"/><path d="M12 13v5M12 18l-2 3M12 18l2 3"/></svg>',
      dot:      '<svg viewBox="0 0 24 24" style="width:9px;height:9px;vertical-align:1px"><circle cx="12" cy="12" r="7" fill="currentColor"/></svg>'
    };

    var EXOS=[
      { id:'pushups', name:'Push-ups', emoji:GI.pushup, muscle:'chest', c:'#FF6B6B', diff:'easy', sub:'Chest · triceps · core' },
      { id:'squats',  name:'Squats',   emoji:GI.legs,   muscle:'legs',  c:'#34D399', diff:'medium', sub:'Quads · glutes' },
      { id:'pullups', name:'Pull-ups', emoji:GI.pullup, muscle:'back',  c:'#4A8FFF', diff:'hard', sub:'Back · biceps' }
    ];
    var FEEDS=['Keep going '+GI.dumbbell,'Nice rep!','Stay tight','You\'ve got this '+GI.flame,'Strong! '+GI.spark,'Don\'t stop','Looking good','Push! '+GI.bolt];

    var plus=S.isPlus(), rate=S.perRep();
    var cur=null, reps=0, stream=null;

    // ── Pose tracking + scoring state ────────────────────────────────────
    // BlazePose 33-landmark indices: 11/12 shoulders, 13/14 elbows, 15/16
    // wrists, 23/24 hips, 25/26 knees, 27/28 ankles.
    var poseRunning=false, pk=null, ctx=null, draw=null;
    var phase='up', repMin=180, repMax=0, lastRepAt=0, lastTrack='';
    var BASE_PTS=10;                                  // points per rep at ×1.0
    var points=0, ptsShown=0;                         // target vs animated display
    var mult=1, lastRepTime=0;                        // speed multiplier + cadence
    var downAt=0, holdReady=false, holdScored=false;  // hold-for-bonus
    var lastCueTxt='', lastCueAt=0, uiRunning=false;

    function angleAt(L,a,b,c,W,H){
      var ax=L[a].x*W, ay=L[a].y*H, bx=L[b].x*W, by=L[b].y*H, cx=L[c].x*W, cy=L[c].y*H;
      var v1x=ax-bx, v1y=ay-by, v2x=cx-bx, v2y=cy-by;
      var m1=Math.hypot(v1x,v1y), m2=Math.hypot(v2x,v2y);
      if(m1===0||m2===0) return null;
      var cos=Math.max(-1,Math.min(1,(v1x*v2x+v1y*v2y)/(m1*m2)));
      return Math.acos(cos)*180/Math.PI;
    }
    // Average the named joint angle over whichever side(s) are clearly visible.
    function exAngle(L,cfg,W,H){
      var vals=[];
      cfg.joints.forEach(function(j){
        var vis=Math.min(L[j[0]].visibility,L[j[1]].visibility,L[j[2]].visibility);
        if(vis>0.5){ var a=angleAt(L,j[0],j[1],j[2],W,H); if(a!=null) vals.push(a); }
      });
      if(!vals.length) return null;
      return vals.reduce(function(s,x){return s+x;},0)/vals.length;
    }
    // Torso lean from vertical (0° = upright). Used for squat "chest up" cue.
    function torsoLean(L,W,H){
      if(Math.min(L[11].visibility,L[12].visibility,L[23].visibility,L[24].visibility)<0.4) return null;
      var sx=(L[11].x+L[12].x)/2*W, sy=(L[11].y+L[12].y)/2*H;
      var hx=(L[23].x+L[24].x)/2*W, hy=(L[23].y+L[24].y)/2*H;
      return Math.abs(Math.atan2(sx-hx, -(sy-hy)))*180/Math.PI;
    }

    // Per-exercise rep + form model. A rep = a full flex→extend cycle: the
    // tracked joint angle drops below `down`, then rises back above `up`.
    var POSE_CFG={
      pushups:{ joints:[[12,14,16],[11,13,15]], down:95, up:155, label:'arms',
        summary:function(mn){ return mn>108 ? {t:'Go lower — full range',ok:false} : {t:'Clean rep',ok:true}; },
        live:function(L,W,H){ var a=angleAt(L,12,24,26,W,H); if(a!=null&&a<150) return {t:'Keep hips in line with your back',ok:false}; return null; } },
      squats:{  joints:[[24,26,28],[23,25,27]], down:100, up:160, label:'legs',
        summary:function(mn){ return mn>112 ? {t:'Squat deeper next rep',ok:false} : {t:'Good depth',ok:true}; },
        live:function(L,W,H){ var t=torsoLean(L,W,H); if(t!=null&&t>48) return {t:'Chest up — sit back',ok:false}; return null; } },
      pullups:{ joints:[[12,14,16],[11,13,15]], down:80, up:150, label:'arms',
        summary:function(mn,mx){ return mx<145 ? {t:'Lower to a full hang',ok:false} : (mn>92?{t:'Pull a little higher',ok:false}:{t:'Strong pull',ok:true}); },
        live:function(){ return null; } }
    };
    function resetRange(){ repMin=180; repMax=0; }
    function setTrack(t){ if(t!==lastTrack){ lastTrack=t; $('#camState').innerHTML=t; } }

    // Clean popup cue — throttled so an identical cue doesn't spam.
    function cue(txt, kind, force){
      var now=performance.now();
      if(!force && txt===lastCueTxt && now-lastCueAt<1400) return;
      lastCueTxt=txt; lastCueAt=now;
      var wrap=$('#cueWrap'); if(!wrap) return;
      var el=document.createElement('div');
      el.className='cue'+(kind?' '+kind:''); el.innerHTML=txt;
      wrap.appendChild(el);
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 950);
    }
    // Particle burst + floating "+N" over the number.
    function burst(label, gold){
      var layer=$('#popLayer'); if(!layer) return;
      var col=(cur&&cur.c)||'#5BB1FF';
      var f=document.createElement('div'); f.className='floatN'; f.textContent=label;
      if(!gold) f.style.color=col;
      layer.appendChild(f); setTimeout(function(){ if(f.parentNode) f.parentNode.removeChild(f); }, 1000);
      var n=gold?16:11;
      for(var i=0;i<n;i++){
        var p=document.createElement('i'); p.className='pcl';
        var a=Math.random()*Math.PI*2, d=30+Math.random()*60;
        p.style.setProperty('--dx',(Math.cos(a)*d).toFixed(0)+'px');
        p.style.setProperty('--dy',(Math.sin(a)*d-20).toFixed(0)+'px');
        p.style.background=gold?(Math.random()<0.5?'#FFCB3D':'#FFE08A'):col;
        layer.appendChild(p);
        (function(el){ setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 780); })(p);
      }
    }
    // Speed multiplier from rep cadence: faster reps push it toward ×3.
    function bumpMult(){
      var now=performance.now();
      if(lastRepTime){
        var gap=now-lastRepTime;                          // ms between reps
        var fast=Math.max(0,Math.min(1,(2600-gap)/2100)); // ≥2.6s apart → 0
        mult=Math.min(3, mult*0.55 + (1+fast*2)*0.45);
      }
      lastRepTime=now;
      var ml=$('#multiLbl'); ml.classList.remove('hot'); void ml.offsetWidth; ml.classList.add('hot');
    }
    // One rAF loop while live: eases the points number + decays the multiplier.
    function startUI(){ if(uiRunning) return; uiRunning=true; requestAnimationFrame(uiLoop); }
    function stopUI(){ uiRunning=false; }
    function uiLoop(){
      if(!uiRunning) return;
      if(Math.abs(points-ptsShown)>0.5){ ptsShown += (points-ptsShown)*0.18; $('#pts').textContent=Math.round(ptsShown).toLocaleString(); }
      else if(ptsShown!==points){ ptsShown=points; $('#pts').textContent=points.toLocaleString(); }
      if(lastRepTime && performance.now()-lastRepTime>1100){ mult += (1-mult)*0.04; if(mult<1.02) mult=1; }
      $('#multiFill').style.width=Math.max(0,Math.min(100,(mult-1)/2*100))+'%';
      $('#multiLbl').textContent='×'+mult.toFixed(1);
      requestAnimationFrame(uiLoop);
    }

    function initSelect(){
      $('#plusBadge').textContent = plus ? '5× CORE+' : '1× RATE';
      $('#plusBadge').classList.toggle('off', !plus);
      $('#rateTxt').textContent = rate.toFixed(2);
      $('#plusHint').innerHTML = plus ? '<b style="color:#FFCB3D">CORE+ 5× active.</b>' : 'CORE+ earns <b style="color:#FFCB3D">5×</b> (0.05/rep).';
      $('#exsel').innerHTML = EXOS.map(function(e){
        return '<div class="exo" data-id="'+e.id+'" style="--c:'+e.c+'"><div class="ei">'+e.emoji+'</div><div class="et"><b>'+e.name+'</b><span>'+e.sub+'</span></div><div class="ego">'+GI.chevron+'</div></div>';
      }).join('');
      Array.prototype.forEach.call(document.querySelectorAll('.exo'), function(x){ x.addEventListener('click', function(){ startSession(x.getAttribute('data-id')); }); });
    }

    function startSession(id){
      cur=EXOS.find(function(e){ return e.id===id; });
      reps=0; points=0; ptsShown=0; mult=1; lastRepTime=0; lastRepAt=0; phase='up'; resetRange();
      sfx('confirm'); haptic();
      document.documentElement.style.setProperty('--str', cur.c);
      $('#liveEx').textContent=cur.name; $('#silho').innerHTML=cur.emoji;
      $('#cnum').textContent='0'; $('#pts').textContent='0'; $('#cgain').textContent='+0.00 Strength';
      $('#multiFill').style.width='0%'; $('#multiLbl').textContent='×1.0';
      $('#cueWrap').innerHTML=''; $('#popLayer').innerHTML='';
      $('#pick').style.display='none'; $('#live').classList.add('on');
      startUI();
      toggleCam(); // auto-start the camera — we're inside the tap gesture
    }

    // Count n reps (n=2 on a held bottom) and award points × current multiplier.
    function countRep(n, held){
      reps += n;
      bumpMult();
      var gain=Math.round(BASE_PTS*n*mult);
      points += gain;
      sfx(held?'coin':(reps%10===0?'coin':'tick')); haptic();
      var num=$('#cnum'); num.textContent=reps; num.classList.remove('bump'); void num.offsetWidth; num.classList.add('bump');
      $('#cgain').textContent='+'+(reps*rate).toFixed(2)+' Strength';
      burst('+'+gain, held);
    }

    async function toggleCam(){
      if(stream){ stopCam(); return; }
      try{
        stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false });
        $('#vid').srcObject=stream; $('#silho').style.display='none';
        lastTrack=''; setTrack(GI.dot+' Live'); $('#camToggle').innerHTML=GI.camera+' Camera on';
        startPose();
      }catch(e){
        setTrack('Camera blocked'); cue('Allow camera access to auto-track', 'warn', true); sfx('warn');
      }
    }
    function stopCam(){ stopPose(); if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream=null; } $('#vid').srcObject=null; $('#silho').style.display='flex'; lastTrack=''; setTrack('Camera off'); $('#camToggle').innerHTML=GI.camera+' Turn on camera'; }

    function finish(){
      stopCam(); stopUI();
      var res=S.addReps(cur.muscle, reps, { diff:cur.diff });
      S.commitRepStrength(res.gain);
      var xpGain=Math.round(res.gain*20);
      sfx('reward');
      $('#sumBody').innerHTML='<div class="sumhead"><div class="ring">'+cur.emoji+'</div><h2>'+reps+' reps done</h2><p>'+cur.name+' · '+points.toLocaleString()+' pts</p></div>'+
        '<div class="big3"><div class="b"><div class="bn">'+reps+'</div><div class="bl">Total Reps</div></div>'+
          '<div class="b str"><div class="bn">+'+res.gain.toFixed(2)+'</div><div class="bl">Strength</div></div>'+
          '<div class="b xp"><div class="bn">+'+xpGain+'</div><div class="bl">XP</div></div></div>'+
        '<button class="bigbtn" id="sumDone">Done</button>'+
        '<button class="againbtn" id="sumAgain">Go again</button>';
      $('#sumScrim').classList.add('show'); $('#sumSheet').classList.add('show');
      $('#sumDone').addEventListener('click', function(){ location.href='gym.html'; });
      $('#sumAgain').addEventListener('click', function(){ $('#sumScrim').classList.remove('show'); $('#sumSheet').classList.remove('show'); $('#live').classList.remove('on'); $('#pick').style.display='block'; cur=null; reps=0; points=0; ptsShown=0; });
    }

    // ── Pose loop ────────────────────────────────────────────────────────
    var poseStarting=false;
    async function startPose(){
      if(poseRunning||poseStarting) return;
      if(!window.PoseKit){ $('#camHint').textContent='Auto-tracking not supported here — tap +1 REP'; return; }
      poseStarting=true;
      setTrack(GI.dot+' Loading…');
      try{ pk=await window.PoseKit.load(); }
      catch(e){ pk=null; poseStarting=false; setTrack('● Live'); cue('Auto-tracking unavailable here', 'warn', true); return; }
      poseStarting=false;
      if(!stream){ return; } // user turned camera off while the model loaded
      var cv=$('#pose'); ctx=cv.getContext('2d'); draw=new pk.DrawingUtils(ctx);
      $('#cam').classList.add('tracking');
      poseRunning=true; phase='up'; resetRange();
      requestAnimationFrame(poseLoop);
    }
    function stopPose(){
      poseRunning=false; var cv=$('#pose'); if(cv&&ctx){ ctx.clearRect(0,0,cv.width,cv.height); }
      $('#cam').classList.remove('tracking'); lastTrack='';
    }
    function poseLoop(){
      if(!poseRunning||!stream||!pk){ return; }
      var v=$('#vid'), cv=$('#pose');
      if(v.readyState>=2 && v.videoWidth){
        if(cv.width!==v.videoWidth){ cv.width=v.videoWidth; cv.height=v.videoHeight; }
        try{
          var res=pk.landmarker.detectForVideo(v, performance.now());
          handlePose(res, cv);
        }catch(e){ /* skip this frame */ }
      }
      requestAnimationFrame(poseLoop);
    }
    function handlePose(res, cv){
      var W=cv.width, H=cv.height;
      ctx.clearRect(0,0,W,H);
      var L=res&&res.landmarks&&res.landmarks[0];
      if(!L){ setTrack('Step into frame'); return; }
      // Thick skeleton — soft glow underlay + bright limb lines + joint dots.
      // (Canvas shares the video's object-fit + mirror via CSS, so landmarks
      // line up with the person on screen.)
      var col=(cur&&cur.c)||'#0A84FF';
      draw.drawConnectors(L, pk.PoseLandmarker.POSE_CONNECTIONS, { color:'rgba(10,132,255,0.35)', lineWidth:14 });
      draw.drawConnectors(L, pk.PoseLandmarker.POSE_CONNECTIONS, { color:'#FFFFFF', lineWidth:6 });
      draw.drawLandmarks(L, { color:'#02030A', fillColor:col, radius:7, lineWidth:2 });

      var cfg=POSE_CFG[cur&&cur.id]; if(!cfg) { setTrack('● Live'); return; }
      var ang=exAngle(L,cfg,W,H);
      if(ang==null){ setTrack('Turn so your '+cfg.label+' show'); return; }
      setTrack('● Tracking');
      repMin=Math.min(repMin,ang); repMax=Math.max(repMax,ang);
      // Live posture cue → clean popup.
      var lc=cfg.live(L,W,H); if(lc) cue(lc.t, 'warn');
      // Rep state machine + hold-for-bonus.
      if(phase==='up' && ang<cfg.down){
        phase='down'; downAt=performance.now(); holdReady=true; holdScored=false;
        cue('Hold for +2', 'bonus');
      } else if(phase==='down'){
        if(holdReady && !holdScored && performance.now()-downAt>700){ holdScored=true; cue('Hold it — nice!', 'good'); }
        if(ang>cfg.up){
          var now=performance.now();
          if(now-lastRepAt>420){ lastRepAt=now; finishRep(cfg, holdScored); }
          phase='up';
        }
      }
    }
    function finishRep(cfg, held){
      countRep(held?2:1, held);
      if(held){ cue('HOLD BONUS +2', 'bonus', true); }
      else { var s=cfg.summary(repMin,repMax); if(s) cue(s.t, s.ok?'good':'warn'); }
      resetRange();
    }

    function init(){
      initSelect();
      // "?" help sheet
      try{
        if(window.coreHelp){
          window.coreHelp.attach('helpBtn',{
            title:'Live Rep Counter',
            bullets:[
              'Pick an exercise — CORE turns on the camera and tracks your joints automatically. No buttons to tap.',
              'A thick skeleton overlay shows what the tracker sees; every rep counts itself with a particle pop.',
              'Rep faster to fill the speed multiplier (up to ×3) and bank more points. Hold the bottom of a rep for a +2 bonus.',
              'Form cues pop up live (e.g. "squat deeper", "chest up") so you can fix your technique on the fly.',
              'All tracking runs on your device — camera frames never leave your phone. Reps log to your Strength when you Finish.'
            ]
          });
        }
      }catch(e){}
      $('#camToggle').addEventListener('click', toggleCam);
      $('#finBtn').addEventListener('click', function(){ if(reps===0){ stopCam(); stopUI(); location.href='gym.html'; return; } finish(); });
      $('#backBtn').addEventListener('click', function(){ stopCam(); stopUI(); sfx('tick'); if($('#live').classList.contains('on') && reps>0){ if(!confirm('Leave without saving these reps?')) return; } location.href='gym.html'; });
      window.addEventListener('pagehide', function(){ stopCam(); stopUI(); });
    }
    if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
