<!doctype html>
<html lang="en">
<head>
<script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Live Reps</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root{
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.022); --border:rgba(255,255,255,0.07);
    --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --good:#0A84FF; --str:#0A84FF; --str2:#0A84FF; --accent:#0A84FF;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{ min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone{ position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38; }
  .notch{ position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.5); border-radius:999px; z-index:60; }
  .frame{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; }

  /* ── Ambient (static — matches dashboard) ── */
  #ambBg{ position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(60% 35% at 50% 30%,rgba(47,143,255,0.18) 0%,transparent 55%),
      radial-gradient(50% 30% at 50% 100%,rgba(159,143,255,0.10) 0%,transparent 65%),
      linear-gradient(180deg,#060B26 0%,#02020A 50%,#050510 100%); transition:background 2.4s ease; }
  #ambAurora{ position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.45; mix-blend-mode:screen; }
  #ambAurora::before,#ambAurora::after{ content:""; position:absolute; border-radius:50%;
    filter:blur(40px); will-change:transform,opacity; transform:translateZ(0); }
  #ambAurora::before{ width:80%; height:45%; left:-10%; top:8%;
    background:radial-gradient(circle,rgba(47,143,255,0.55),transparent 70%); animation:auroraDriftA 24s ease-in-out infinite; }
  #ambAurora::after{ width:70%; height:40%; right:-10%; bottom:16%;
    background:radial-gradient(circle,rgba(159,143,255,0.50),transparent 70%); animation:auroraDriftB 30s ease-in-out -15s infinite; }
  @keyframes auroraDriftA{ 0%,100%{transform:translate(0,0) scale(1);opacity:0.45;} 50%{transform:translate(40px,-22px) scale(1.12);opacity:0.75;} }
  @keyframes auroraDriftB{ 0%,100%{transform:translate(0,0) scale(1);opacity:0.40;} 50%{transform:translate(-30px,18px) scale(1.10);opacity:0.70;} }
  #ambCelestial{ position:absolute; inset:0; pointer-events:none; z-index:2; }
  @media (prefers-reduced-motion:reduce){ #ambAurora::before,#ambAurora::after{ animation:none!important; } }

  /* ── Help button ── */
  .help-btn{ width:30px; height:30px; flex:none; border-radius:50%; border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.04); color:var(--muted); font-size:14px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .16s,color .16s,border-color .16s; }
  .help-btn:hover{ background:rgba(10,132,255,0.14); color:var(--accent); border-color:rgba(10,132,255,0.35); }

  /* ── Nav (canonical) ── */
  .nav{ position:absolute; left:0; right:0; bottom:0; z-index:50; padding:10px 12px 26px; display:flex; justify-content:space-around; align-items:flex-end;
    background:rgba(3,3,14,0.42); backdrop-filter:blur(28px) saturate(1.6); -webkit-backdrop-filter:blur(28px) saturate(1.6); border-top:1px solid rgba(255,255,255,0.07); }
  .nav a{ background:none; border:none; font:inherit; cursor:pointer; position:relative; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 8px; min-width:48px; min-height:44px; text-decoration:none; color:var(--dim); transition:color .2s; }
  .nav svg{ width:23px; height:23px; } .nav .nl{ font-size:10px; font-weight:800; }
  .nav .item.active{ color:var(--text); } .nav .item.active svg{ color:var(--accent); }

  .top{ display:flex; align-items:center; gap:12px; padding:54px 20px 6px; position:relative; z-index:12; }
  .back{ -webkit-appearance:none; appearance:none; width:36px; height:36px; flex:none; padding:0; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.06); color:var(--text); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .top h1{ margin:0; font-size:20px; font-weight:800; letter-spacing:-0.6px; flex:1; }
  .plusbadge{ font-size:9px; font-weight:800; letter-spacing:0.8px; padding:4px 9px; border-radius:999px; background:var(--accent); color:#fff; }
  .plusbadge.off{ background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid var(--border); }

  /* ----- select screen ----- */
  .pick{ position:relative; z-index:12; padding:14px 20px 104px; flex:1; overflow-y:auto; }
  .pick::-webkit-scrollbar{ display:none; }
  .pick .lead{ font-size:13px; color:var(--muted); margin:4px 2px 16px; line-height:1.5; }
  .exsel{ display:flex; flex-direction:column; gap:11px; }
  .exo{ display:flex; align-items:center; gap:14px; padding:16px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card); cursor:pointer; transition:transform .14s, border-color .2s; }
  .exo:active{ transform:scale(0.97); }
  .exo .ei{ position:relative; width:58px; height:58px; flex:none; border-radius:17px; display:flex; align-items:center; justify-content:center; font-size:28px; overflow:hidden;
    background:#0a0c13;
    box-shadow:inset 0 0 0 1.5px color-mix(in srgb, currentColor 55%, transparent), 0 4px 14px rgba(0,0,0,0.32); }
  .exo .ei::after{ content:""; position:absolute; inset:0; border-radius:inherit; background:radial-gradient(80% 60% at 50% 120%, color-mix(in srgb, currentColor 30%, transparent), transparent 70%); pointer-events:none; }
  .formdemo{ display:block; width:100%; height:100%; }
  .exo .ei .formdemo{ position:relative; z-index:1; width:46px; height:46px; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.45)); }
  .cam .silho .formdemo{ width:132px; height:132px; opacity:.92; filter:drop-shadow(0 4px 16px rgba(0,0,0,.5)); }
  .cam .silho .fd-cap{ position:absolute; left:18px; right:18px; bottom:26%; text-align:center; font-size:11.5px; font-weight:700; letter-spacing:.04em; line-height:1.35; color:rgba(255,255,255,.58); }
  .exo .et{ flex:1; } .exo .et b{ font-size:16px; font-weight:800; letter-spacing:-0.3px; } .exo .et span{ display:block; font-size:11.5px; color:var(--muted); margin-top:2px; }
  .exo .ego{ color:var(--dim); font-size:20px; display:flex; align-items:center; }
  /* variant-screen header */
  .varhead{ display:flex; align-items:center; gap:12px; margin:2px 0 14px; }
  .vback{ -webkit-appearance:none; appearance:none; width:40px; height:40px; flex:none; padding:0; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .12s; }
  .vback:active{ transform:scale(0.94); }
  .vh-t{ flex:1; min-width:0; } .vh-t b{ display:block; font-size:19px; font-weight:800; letter-spacing:-0.4px; } .vh-t span{ font-size:12px; color:var(--muted); }
  .vh-ic{ width:48px; height:48px; flex:none; border-radius:14px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.04); box-shadow:inset 0 0 0 1px var(--border); }
  .ratebar{ margin-top:18px; display:flex; align-items:center; gap:10px; padding:13px 15px; border-radius:16px; background:color-mix(in srgb,var(--accent) 9%,transparent); border:1px solid color-mix(in srgb,var(--accent) 30%,transparent); }
  .ratebar .rr{ font-size:12px; color:var(--text); } .ratebar .rr b{ color:var(--accent); }

  /* ----- live screen ----- */
  /* live camera is an immersive mode — sits above the floating nav */
  .live{ position:absolute; inset:0; z-index:70; display:none; flex-direction:column; }
  .live.on{ display:flex; }
  .cam{ position:absolute; inset:0; z-index:0; background:#06060d; overflow:hidden; }
  .cam{ --zoom:1; --fit:cover; }   /* default = fill the screen fully (cover) */
  .cam video{ width:100%; height:100%; object-fit:var(--fit); transform:scaleX(-1) scale(var(--zoom)); transform-origin:center center; opacity:0.55; transition:opacity .3s, transform .25s ease; }
  /* Skeleton overlay — sized to the video's intrinsic resolution and given the
     SAME object-fit/mirror/zoom as the video so landmarks line up exactly. */
  #pose{ position:absolute; inset:0; width:100%; height:100%; object-fit:var(--fit); transform:scaleX(-1) scale(var(--zoom)); transform-origin:center center; z-index:1; pointer-events:none; transition:transform .25s ease; }
  .cam.tracking video{ opacity:0.95; }
  /* zoom meter (iPhone-style 0.5× / 1×) */
  .zoom{ position:absolute; left:50%; transform:translateX(-50%); bottom:118px; z-index:6; display:flex; gap:5px; padding:5px; border-radius:999px;
    background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.12); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  .zoom button{ border:none; background:none; color:var(--muted); font:inherit; font-size:12px; font-weight:800; width:44px; height:30px; border-radius:999px; cursor:pointer; transition:background .15s,color .15s; }
  .zoom button.on{ background:rgba(255,255,255,0.18); color:#fff; }
  /* big guide text */
  .guide{ position:absolute; left:0; right:0; top:30%; z-index:6; text-align:center; pointer-events:none;
    font-size:36px; font-weight:900; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.94);
    text-shadow:0 2px 26px rgba(0,0,0,0.65); opacity:0; transform:translateY(8px) scale(.96);
    transition:opacity .2s ease, transform .26s cubic-bezier(.16,1,.3,1); }
  .guide.show{ opacity:1; transform:translateY(0) scale(1); }
  .guide.warn{ color:#FF8A3D; }
  .cam .silho{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .cam .scan{ position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); box-shadow:0 0 14px color-mix(in srgb,var(--accent) 70%,transparent); animation:scan 3s ease-in-out infinite; }
  @keyframes scan{ 0%,100%{top:14%;} 50%{top:80%;} }
  .camgrad{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(2,2,10,0.5) 0%, transparent 25%, transparent 55%, rgba(2,2,10,0.85) 100%); }
  .livetop{ position:relative; z-index:5; display:flex; align-items:center; justify-content:space-between; padding:56px 20px 0; }
  /* AI coach hologram — top-right */
  .holo{ position:absolute; top:104px; right:14px; z-index:7; width:128px; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px 8px 9px; border-radius:16px; background:rgba(6,12,24,0.45); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(91,200,255,0.30); box-shadow:0 0 22px rgba(40,160,255,0.18), inset 0 0 18px rgba(40,160,255,0.06); }
  .holo-hd{ display:flex; align-items:center; gap:5px; font-size:8.5px; font-weight:900; letter-spacing:.18em; color:#7FD4FF; }
  .holo-dot{ width:6px; height:6px; border-radius:50%; background:#34D399; box-shadow:0 0 8px #34D399; animation:holoBlink 1.6s ease-in-out infinite; }
  @keyframes holoBlink{ 0%,100%{opacity:1;} 50%{opacity:.4;} }
  .holo canvas{ width:120px; height:150px; display:block; filter:drop-shadow(0 0 6px rgba(60,180,255,0.5)); }
  .holo-say{ font-size:10px; font-weight:700; line-height:1.3; text-align:center; color:#EaF4ff; min-height:26px;
    display:flex; align-items:center; justify-content:center; padding:0 2px; }
  .holo-say.say-warn{ color:#FFC24B; }
  @media (prefers-reduced-motion:reduce){ .holo-dot{ animation:none; } }
  /* Per-arm effort bars — bottom */
  .armbars{ position:absolute; left:18px; right:18px; bottom:96px; z-index:6; display:flex; flex-direction:column; gap:7px; pointer-events:none; }
  .ab{ display:flex; align-items:center; gap:9px; }
  .ab-k{ flex:none; width:42px; font-size:9.5px; font-weight:900; letter-spacing:.06em; text-shadow:0 1px 4px rgba(0,0,0,.6); }
  .ab-tr{ flex:1; height:7px; border-radius:999px; background:rgba(255,255,255,0.12); overflow:hidden; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.08); }
  .ab-tr i{ display:block; height:100%; width:0%; border-radius:999px; transition:width .45s cubic-bezier(.2,.9,.2,1); }
  .armbars.pulse .ab-tr i{ animation:abPulse .5s ease; }
  @keyframes abPulse{ 0%{filter:brightness(1.8);} 100%{filter:brightness(1);} }
  .livetop .pill{ font-size:11px; font-weight:700; padding:6px 12px; border-radius:999px; background:rgba(0,0,0,0.5); border:1px solid var(--border); }
  .livetop .pill .d{ display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent); margin-right:6px; animation:pulse 1.2s infinite; vertical-align:1px; } @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .counter{ position:relative; z-index:5; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .counter .clbl{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; font-weight:700; }

  /* speed multiplier bar — fills the faster you rep */
  .multi{ display:flex; align-items:center; gap:9px; width:188px; margin-bottom:14px; }
  .multibar{ flex:1; height:7px; border-radius:999px; background:rgba(255,255,255,0.10); overflow:hidden; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06); }
  .multibar i{ display:block; height:100%; width:0%; border-radius:999px;
    background:linear-gradient(90deg,#0A84FF,#5BB1FF 60%,#FFCB3D); transition:width .18s ease; }
  .multilbl{ font-size:13px; font-weight:900; font-variant-numeric:tabular-nums; color:#FFCB3D; min-width:34px; text-align:right; text-shadow:0 0 12px rgba(255,203,61,0.4); }
  .multilbl.hot{ animation:multipulse .5s ease; } @keyframes multipulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.22);} }

  .cwrap{ position:relative; display:flex; flex-direction:column; align-items:center; }
  .counter .cnum{ font-size:124px; font-weight:800; letter-spacing:-5px; line-height:0.9; font-variant-numeric:tabular-nums; text-shadow:0 0 44px rgba(10,132,255,0.45); }
  .counter .cnum.bump{ animation:bump .28s cubic-bezier(.2,1.5,.4,1); } @keyframes bump{ 0%{transform:scale(1);} 40%{transform:scale(1.22);} 100%{transform:scale(1);} }
  .counter .pts{ font-size:17px; font-weight:800; color:#fff; margin-top:2px; font-variant-numeric:tabular-nums; letter-spacing:-0.2px; }
  .counter .pts b{ color:var(--accent); } .counter .pts .u{ color:var(--muted); font-size:12px; font-weight:700; }
  .counter .cgain{ font-size:13px; color:var(--accent); font-weight:700; margin-top:5px; opacity:.9; }

  /* particle + floating "+N" layer, centred on the number */
  .poplayer{ position:absolute; inset:0; pointer-events:none; z-index:9; }
  .floatN{ position:absolute; left:0; top:0; transform:translate(-50%,-50%); font-size:34px; font-weight:900; letter-spacing:-1px;
    color:#FFCB3D; text-shadow:0 2px 18px rgba(255,203,61,0.55); white-space:nowrap; animation:floatN 1s cubic-bezier(.2,.9,.3,1) forwards; }
  @keyframes floatN{ 0%{ opacity:0; transform:translate(-50%,-30%) scale(.5);} 18%{ opacity:1; transform:translate(-50%,-90%) scale(1.1);} 100%{ opacity:0; transform:translate(-50%,-200%) scale(.95);} }
  .pcl{ position:absolute; left:0; top:0; width:9px; height:9px; border-radius:50%; will-change:transform,opacity;
    transform:translate(-50%,-50%); animation:pcl .72s ease-out forwards; }
  @keyframes pcl{ 0%{ opacity:1; transform:translate(-50%,-50%) translate(0,0) scale(1);} 100%{ opacity:0; transform:translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(.3);} }

  /* clean popup cue — a single slot that cross-fades (no stacking) */
  .cuewrap{ position:absolute; left:0; right:0; top:63%; z-index:8; display:flex; justify-content:center; pointer-events:none; }
  .cue{ display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:18px; font-size:14.5px; font-weight:800; letter-spacing:-0.2px;
    background:rgba(8,10,18,0.62); border:1px solid rgba(255,255,255,0.10); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    color:#fff; box-shadow:0 10px 30px rgba(0,0,0,0.4); white-space:nowrap;
    opacity:0; transform:translateY(9px) scale(.96); transition:opacity .24s ease, transform .3s cubic-bezier(.16,1,.3,1); }
  .cue.show{ opacity:1; transform:translateY(0) scale(1); }
  .cue.good{ color:#46E0A8; border-color:rgba(52,211,153,0.4); }
  .cue.warn{ color:#FFB061; border-color:rgba(255,159,69,0.4); }
  .cue.bonus{ color:#FFD45E; border-color:rgba(255,203,61,0.45); }

  /* XP bar (fills with reps; "boosts" when the speed multiplier is high) */
  .xpwrap{ position:relative; z-index:5; display:flex; align-items:center; gap:10px; padding:12px 22px 0; }
  .xplvl{ font-size:10px; font-weight:900; letter-spacing:0.6px; color:var(--muted); white-space:nowrap; } .xplvl b{ color:#fff; }
  .xpbar{ flex:1; height:9px; border-radius:999px; background:rgba(255,255,255,0.08); overflow:hidden; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06); }
  .xpbar i{ display:block; height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,#7C5CFF,#5BB1FF); transition:width .3s cubic-bezier(.16,1,.3,1); }
  .xpwrap.boost .xpbar i{ background:linear-gradient(90deg,#FFCB3D,#FF8A3D); box-shadow:0 0 16px rgba(255,170,60,0.65); }
  .xpwrap.levelup .xpbar{ animation:lvlflash .55s ease; } @keyframes lvlflash{ 0%{filter:brightness(2.2);} 100%{filter:none;} }
  .xpboost{ font-size:9px; font-weight:900; letter-spacing:1px; color:#FFCB3D; opacity:0; transition:opacity .25s; white-space:nowrap; }
  .xpwrap.boost .xpboost{ opacity:1; animation:xpb .85s ease infinite; } @keyframes xpb{ 0%,100%{opacity:1;} 50%{opacity:.45;} }

  .livebtns{ position:relative; z-index:5; padding:0 20px 36px; display:flex; flex-direction:column; gap:11px; }
  .row2{ display:flex; gap:11px; } .row2 .gb{ flex:1; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text); border-radius:16px; padding:15px; font-size:14px; font-weight:700; cursor:pointer; transition:transform .12s; } .row2 .gb:active{ transform:scale(0.96); }
  .row2 .gb.fin{ background:var(--accent); border-color:transparent; color:#fff; }
  @media (prefers-reduced-motion:reduce){ .floatN,.pcl,.cue,.cnum.bump,.multilbl.hot{ animation-duration:.01ms!important; } }

  /* summary */
  .scrim{ position:absolute; inset:0; z-index:80; background:rgba(2,2,10,0.7); backdrop-filter:blur(8px); opacity:0; pointer-events:none; transition:.3s; } .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:81; background:#0E0E1B; border-top-left-radius:30px; border-top-right-radius:30px; border-top:1px solid rgba(255,255,255,0.09); transform:translateY(102%); transition:transform .42s cubic-bezier(.16,1,.3,1); } .sheet.show{ transform:translateY(0); }
  .grab{ width:40px; height:5px; border-radius:999px; background:rgba(255,255,255,0.18); margin:11px auto 4px; }
  .sb{ padding:6px 22px 28px; }
  .sumhead{ text-align:center; } .sumhead .ring{ width:84px; height:84px; margin:6px auto 12px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--accent); background:radial-gradient(circle at 50% 40%, color-mix(in srgb,var(--accent) 26%,transparent), color-mix(in srgb,var(--accent) 4%,transparent)); box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 40%,transparent); animation:pop .5s cubic-bezier(.2,1.4,.4,1) both; } @keyframes pop{ from{transform:scale(.3); opacity:0;} to{transform:scale(1); opacity:1;} }
  .sumhead .rankbadge{ width:96px; height:96px; margin:6px auto 12px; border-radius:26px; display:flex; align-items:center; justify-content:center; font-size:48px; font-weight:900; border:2px solid currentColor; background:radial-gradient(circle at 50% 38%, color-mix(in srgb, currentColor 26%, transparent), color-mix(in srgb, currentColor 5%, transparent)); box-shadow:0 0 30px color-mix(in srgb, currentColor 30%, transparent); animation:pop .5s cubic-bezier(.2,1.4,.4,1) both; }
  .big3 .bn .newmax{ font-size:13px; color:#FFCB3D; vertical-align:super; margin-left:1px; }
  .subline{ text-align:center; font-size:12.5px; color:var(--muted); font-weight:600; margin:-4px 0 16px; }
  .sumhead h2{ margin:0; font-size:23px; font-weight:800; letter-spacing:-0.6px; } .sumhead p{ margin:5px 0 0; font-size:12.5px; color:var(--muted); }

  <!-- Pose model loader (ES module, lazy). Pulls MediaPipe Tasks-Vision +
       the lightweight pose model from a CDN only when auto-tracking is first
       enabled. All inference runs on-device; no frames ever leave the phone.
       If the CDN/model can't load, the page falls back to manual rep tapping. -->
  <script type="module">
    let _p = null;
    async function load(){
      if (_p) return _p;
      _p = (async () => {
        const V = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";
        const m = await import(V);
        const fileset = await m.FilesetResolver.forVisionTasks(V + "/wasm");
        let landmarker;
        try {
          landmarker = await m.PoseLandmarker.createFromOptions(fileset, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task", delegate: "GPU" },
            runningMode: "VIDEO", numPoses: 1,
          });
        } catch (e) {
          // Some devices have no WebGL/GPU delegate — retry on CPU.
          landmarker = await m.PoseLandmarker.createFromOptions(fileset, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task", delegate: "CPU" },
            runningMode: "VIDEO", numPoses: 1,
          });
        }
        return { landmarker, PoseLandmarker: m.PoseLandmarker, DrawingUtils: m.DrawingUtils };
      })();
      return _p;
    }
    window.PoseKit = { load };
  </script>

      var rt=ratingFor(reps, cur.diff);
      sfx('reward');
      $('#sumBody').innerHTML=
        '<div class="sumhead"><div class="rankbadge" style="color:'+rt.c+';border-color:'+rt.c+'">'+rt.l+'</div>'+
          '<h2>'+rt.t+'</h2><p>'+cur.name+' · rank '+rt.l+'</p></div>'+
        '<div class="big3"><div class="b"><div class="bn">'+reps+'</div><div class="bl">Reps</div></div>'+
          '<div class="b"><div class="bn">'+best+(isNew?'<span class="newmax">★</span>':'')+'</div><div class="bl">Max</div></div>'+
          '<div class="b str"><div class="bn">'+points.toLocaleString()+'</div><div class="bl">Score</div></div></div>'+
        '<div class="subline">+'+strGain+' Strength · +'+xpGain+' XP'+(isNew?' · <b style="color:#FFCB3D">New max!</b>':'')+'</div>'+
        '<button class="bigbtn" id="sumDone">Done</button>'+
        '<button class="againbtn" id="sumAgain">Go again</button>';
      $('#sumScrim').classList.add('show'); $('#sumSheet').classList.add('show');
      $('#sumDone').addEventListener('click', function(){ location.href='gym.html'; });
      $('#sumAgain').addEventListener('click', function(){ $('#sumScrim').classList.remove('show'); $('#sumSheet').classList.remove('show'); startSession(lastMode); });
    }

    // ── Pose loop ────────────────────────────────────────────────────────
    var poseStarting=false;
    async function startPose(){
      if(poseRunning||poseStarting) return;
      if(!window.PoseKit){ cue('Auto-tracking not supported here', 'warn', true); return; }
      poseStarting=true;
      setTrack(GI.dot+' Loading…'); setGuide('GET SET');
      try{ pk=await window.PoseKit.load(); }
      catch(e){ pk=null; poseStarting=false; setTrack('● Live'); cue('Auto-tracking unavailable here', 'warn', true); return; }
      poseStarting=false;
      if(!stream){ return; } // user turned camera off while the model loaded
      var cv=$('#pose'); ctx=cv.getContext('2d');
      $('#cam').classList.add('tracking');
      poseRunning=true; phase='up'; angEMA=null; lastDetect=0; seenHi=null; seenLo=null; lastGuide=''; resetRange();
      requestAnimationFrame(poseLoop);
    }
    function stopPose(){
      poseRunning=false; var cv=$('#pose'); if(cv&&ctx){ ctx.clearRect(0,0,cv.width,cv.height); }
      if(holoCtx){ var _h=$('#holoCv'); if(_h) holoCtx.clearRect(0,0,_h.width,_h.height); }
      $('#cam').classList.remove('tracking'); lastTrack='';
    }
    function poseLoop(){
      if(!poseRunning||!stream||!pk){ return; }
      var v=$('#vid'), cv=$('#pose');
      if(v.readyState>=2 && v.videoWidth){
        if(cv.width!==v.videoWidth){ cv.width=v.videoWidth; cv.height=v.videoHeight; }
        var now=performance.now();
        if(now-lastDetect>=DETECT_MS){           // throttle inference → smooth, low-lag
          lastDetect=now;
          try{ handlePose(pk.landmarker.detectForVideo(v, now), cv); }catch(e){ /* skip frame */ }
        }
      }
      requestAnimationFrame(poseLoop);
    }
    function handlePose(res, cv){
      var W=cv.width, H=cv.height;
      ctx.clearRect(0,0,W,H);
      var L=res&&res.landmarks&&res.landmarks[0];
      var cam=$('#cam'); camW=cam.clientWidth; camH=cam.clientHeight;
      if(!L){ setTrack('Step into frame'); setGuide('STEP INTO FRAME'); angEMA=null; lastL=null; return; }
      lastL=L;
      // Glowing colour-coded skeleton (left arm orange, right arm green) + the
      // top-right coach hologram mirror. Canvas shares the video's object-fit.
      drawSkeleton(L,W,H);
      try{ drawHolo(L); }catch(e){}
      // Per-arm effort — track each arm's deepest elbow bend this rep (arm moves only)
      if(isArmFam()){
        var aL=angleAt(L,11,13,15,W,H), aR=angleAt(L,12,14,16,W,H);
        if(aL!=null) armLmin=Math.min(armLmin,aL);
        if(aR!=null) armRmin=Math.min(armRmin,aR);
      }

      var cfg=POSE_CFG[cur&&cur.id]; if(!cfg){ setTrack('● Live'); return; }
      var fam=famOf(cur.id);
      // Anti-fake gate #1 — your core body (both shoulders + both hips) must be
      // in frame, so you can't game it with just an arm. No orientation gate:
      // push-ups viewed from a floor phone read as "vertical" and were wrongly
      // rejected. The real-movement + range gates below stop the actual fakes.
      var coreVis = L[11].visibility>0.5 && L[12].visibility>0.5 && L[23].visibility>0.4 && L[24].visibility>0.4;
      if(!coreVis){ setTrack('Show your whole body'); setGuide('SHOW YOUR WHOLE BODY', true); angEMA=null; phase='up'; resetRange(); return; }
      if(lastGuide==='SHOW YOUR WHOLE BODY'||lastGuide==='STEP INTO FRAME'||lastGuide==='FACE THE CAMERA') setGuide(cfg.gUp);
      var raw=exAngle(L,cfg,W,H);
      if(raw==null){ setTrack('Turn so your '+cfg.label+' show'); setGuide('FACE THE CAMERA'); angEMA=null; return; }
      setTrack('● Tracking');
      angEMA = angEMA==null ? raw : angEMA*0.55 + raw*0.45;   // smooth jitter → reliable counting
      var ang=angEMA;
      repMin=Math.min(repMin,ang); repMax=Math.max(repMax,ang);
      var refY=(L[fam.ref[0]].y+L[fam.ref[1]].y)/2; refLo=Math.min(refLo,refY); refHi=Math.max(refHi,refY);
      // Adaptive calibration: learn this person's real extended/contracted
      // angles and set thresholds from them, so it counts properly for anyone.
      if(seenHi==null){ seenHi=ang; seenLo=ang; }
      seenHi=Math.max(ang, seenHi-0.06); seenLo=Math.min(ang, seenLo+0.06);
      var rng=seenHi-seenLo, downTh=cfg.down, upTh=cfg.up;
      if(rng>=45){ downTh=seenHi-rng*0.55; upTh=seenHi-rng*0.25; }
      var lc=cfg.live(L,W,H); if(lc) cue(lc.t, 'warn');
      // Rep state machine + hold-for-bonus, with big guide text.
      if(phase==='up' && ang<downTh){
        phase='down'; downAt=performance.now(); holdReady=true; holdScored=false;
        setGuide(cfg.gDn);                              // bottom reached → drive back up
        if(reps%4===0) cue('Hold for +2', 'bonus');     // prompt occasionally, not every rep
      } else if(phase==='down'){
        if(holdReady && !holdScored && performance.now()-downAt>650){ holdScored=true; setGuide('HOLD'); cue('Hold it!', 'good'); }
        if(ang>upTh){
          var now=performance.now();
          if(now-lastRepAt>400){
            lastRepAt=now;
            // Anti-fake gate #3 — a real rep needs full range of motion AND
            // real body translation (not just a flicking joint).
            if((repMax-repMin)>=MINROM && (refHi-refLo)>=MINSHIFT){ finishRep(cfg, holdScored); }
            else { cue('Use your whole body — full rep', 'warn', true); resetRange(); }
          }
          phase='up'; setGuide(cfg.gUp);                // locked out → lower for the next rep
        }
      }
    }
    function finishRep(cfg, held){
      countRep(held?2:1, held);
      if(isArmFam()) updateArmBars(cfg);   // refresh the two arm bars each rep
      if(held){ cue('HOLD BONUS +2', 'bonus', true); }
      else { var s=cfg.summary(repMin,repMax); if(s && (!s.ok || reps%5===0)) cue(s.t, s.ok?'good':'warn'); }
      resetRange();
    }

    function init(){
      initSelect();
      // deep-link: ?ex=<id> opens straight into that movement (from Strength quick wins)
      try{ var pm=(location.search.match(/[?&]ex=([a-z]+)/i)||[])[1]; if(pm && EXOS.some(function(e){return e.id===pm;})) startSession(pm); }catch(e){}
      // "?" help sheet
      try{
        if(window.coreHelp){
          window.coreHelp.attach('helpBtn',{
            title:'Live Rep Counter',
            bullets:[
              'Pick an exercise — CORE turns on the camera and tracks your joints automatically. No buttons to tap.',
              'A thick skeleton overlay shows what the tracker sees; every rep counts itself with a particle pop.',
              'Rep faster to fill the speed multiplier (up to ×3) and bank more points. Hold the bottom of a rep for a +2 bonus.',
              'Form cues pop up live (e.g. "squat deeper", "chest up") so you can fix your technique on the fly.',
              'All tracking runs on your device — camera frames never leave your phone. Reps log to your Strength when you Finish.'
            ]
          });
        }
      }catch(e){}
      $('#camToggle').addEventListener('click', toggleCam);
      Array.prototype.forEach.call(document.querySelectorAll('#zoomMeter button'), function(b){
        b.addEventListener('click', function(){
          $('#cam').style.setProperty('--fit', b.getAttribute('data-fit'));
          Array.prototype.forEach.call(document.querySelectorAll('#zoomMeter button'), function(x){ x.classList.toggle('on', x===b); });
          sfx('tick');
        });
      });
      $('#finBtn').addEventListener('click', function(){ if(reps===0){ stopCam(); stopUI(); location.href='gym.html'; return; } finish(); });
      $('#backBtn').addEventListener('click', function(){
        sfx('tick');
        if($('#live').classList.contains('on')){
          if(reps>0 && !confirm('Leave without saving these reps?')) return;
          stopCam(); stopUI(); location.href='gym.html'; return;
        }
        if(pickStage==='var'){ renderCats(); return; }   // variants → movements
        location.href='gym.html';
      });
      window.addEventListener('pagehide', function(){ stopCam(); stopUI(); });
    }
    if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
  <script src="_lib/core-pagefx.js"></script>
