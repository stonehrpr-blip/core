<!DOCTYPE html>
<html lang="en">
<head>

<meta name="theme-color" content="#07071A">
<title>Purpose · CORE</title>
<link rel="stylesheet" href="_lib/stat-kit.css">
<style>
  html,body{margin:0;min-height:100%;background:#050510;}
  body{overflow-x:hidden;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;}
</style>
</head>
<body>
<div id="app"></div>
<script src="_lib/core-state.js"></script>
<script src="_lib/stat-kit.js"></script>
<script>
StatKit.mount(document.getElementById('app'), {
  key: 'purpose', model: 'willpower', name: 'Purpose', sub: 'Willpower', color: '#5EEAD4',
  greet: 'Hold the line.',
  states: [{ min: 80, label: 'Unbreakable' }, { min: 60, label: 'Strong' }, { min: 35, label: 'Wavering' }, { min: 0, label: 'Drained' }],
  actions: [
    { id: 'resist', name: 'Beat an urge', unit: 'wins', step: 1, def: 1, gain: 5, icon: '<path d="M12 3l7 3v5c0 5-3.5 8-7 10-3.5-2-7-5-7-10V6z"/><path d="M9.5 12l2 2 3.5-4"/>' },
    { id: 'breathe', name: 'Breathe', unit: 'breaths', step: 1, def: 10, gain: 2, icon: '<circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M18 6l-2 2M6 18l2-2M18 18l-2-2"/>' },
    { id: 'intention', name: 'Set intention', unit: 'days', step: 1, def: 1, gain: 2, icon: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.6" fill="currentColor"/>' },
    { id: 'cold', name: 'Cold shower', unit: 'times', step: 1, def: 1, gain: 4, icon: '<path d="M12 2v20M4.5 7l15 10M19.5 7l-15 10M9 4l3 3 3-3M9 20l3-3 3 3"/>' }
  ],
  scan: { label: 'Breath Counter', unit: 'breaths', act: 'breathe' }
});
</script>
