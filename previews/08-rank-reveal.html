<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
  <meta charset="utf-8" />
  <title>CORE — Rank reveal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <link rel="stylesheet" href="_lib/core-responsive.css?v=apple" />
  <link rel="stylesheet" href="_lib/core-background.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{min-height:100%;background:#0A0A14;color:#fff;display:flex;align-items:center;justify-content:center;
      padding:24px;overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    .phone{position:relative;width:390px;height:844px;border-radius:56px;overflow:hidden;background:#02020A;
      box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}

    .stage{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;}

    /* ===== Stage 1 — blank screen, tap to reveal ===== */
    #stage1{justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .pre-eyebrow{font-size:11px;font-weight:800;letter-spacing:0.32em;text-transform:uppercase;color:rgba(207,228,255,0.55);}
    .pre-title{margin-top:12px;font-size:30px;font-weight:800;letter-spacing:-0.6px;color:#fff;line-height:1.1;}
    .tap-hint{position:absolute;bottom:74px;left:0;right:0;text-align:center;font-size:14px;font-weight:600;
      color:rgba(255,255,255,0.5);animation:tapPulse 1.8s ease-in-out infinite;}
    @keyframes tapPulse{0%,100%{opacity:0.4;}50%{opacity:0.95;}}
    /* tap -> text pulls back then rushes in toward you, then white, then bang */
    body.charging #stage1{animation:introZoom .45s cubic-bezier(.5,0,.85,.25) forwards;transform-origin:center;}
    @keyframes introZoom{0%{transform:scale(1);opacity:1;}18%{transform:scale(0.86);opacity:1;}100%{transform:scale(7);opacity:0;}}

    /* white flash — covers the text early (before it gets too big), holds ~230ms */
    .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;}
    body.charging .flash{animation:flashIn 0.58s ease-in forwards;}
    @keyframes flashIn{0%{opacity:0;}26%{opacity:0;}58%{opacity:1;}100%{opacity:1;}}
    body.revealed .flash{animation:flashOut .28s ease forwards;}
    @keyframes flashOut{from{opacity:1;}to{opacity:0;}}

    /* ===== Stage 2 — rank + unlocks (all centered) ===== */
    #stage2{opacity:0;pointer-events:none;justify-content:flex-start;padding:54px 0 0;
      overflow-y:auto;scrollbar-width:none;}
    #stage2::-webkit-scrollbar{display:none;}
    body.revealed #stage1{display:none;}
    body.revealed #stage2{opacity:1;pointer-events:auto;}

    .rank-card{width:300px;padding:30px 24px 22px;position:relative;flex-shrink:0;text-align:center;overflow:hidden;
      background:linear-gradient(165deg, color-mix(in srgb, var(--rc) 22%, rgba(8,9,16,0.5)), color-mix(in srgb, var(--rc) 6%, rgba(5,6,11,0.42)));
      -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);
      border:1px solid color-mix(in srgb, var(--rc) 55%, transparent);
      clip-path:polygon(0 0, calc(100% - 26px) 0, 100% 26px, 100% 100%, 26px 100%, 0 calc(100% - 26px));
      box-shadow:0 26px 60px rgba(0,0,0,0.5), 0 0 0 1px color-mix(in srgb, var(--rc) 20%, transparent) inset, 0 0 56px color-mix(in srgb, var(--rc) 26%, transparent);
      animation:cardPop .58s cubic-bezier(.16,1.7,.3,1) both;}
    @keyframes cardPop{0%{transform:scale(0.2);opacity:0;}35%{opacity:1;}65%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
    /* gem mounted in an octagonal metal socket */
    .rank-socket{width:150px;height:150px;margin:0 auto;padding:2px;position:relative;
      background:linear-gradient(135deg, color-mix(in srgb,var(--rc) 88%,transparent), color-mix(in srgb,var(--rc) 26%,transparent));
      clip-path:polygon(26% 0,74% 0,100% 26%,100% 74%,74% 100%,26% 100%,0 74%,0 26%);
      box-shadow:0 0 34px color-mix(in srgb,var(--rc) 50%,transparent);}
    .rank-socket-in{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(circle, color-mix(in srgb,var(--rc) 16%,#05050b), #04040a 74%);
      clip-path:polygon(26% 0,74% 0,100% 26%,100% 74%,74% 100%,26% 100%,0 74%,0 26%);}
    .rank-gem{width:112px;height:112px;
      filter:drop-shadow(0 0 16px color-mix(in srgb, var(--rc) 64%, transparent)) drop-shadow(0 8px 22px color-mix(in srgb, var(--rc) 45%, transparent));
      animation:gemFloat 4s ease-in-out 1s infinite;}
    .rank-gem img{width:100%;height:100%;object-fit:contain;display:block;}
    @keyframes gemFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
    .rank-eyebrow{margin-top:20px;font-size:11px;font-weight:900;font-style:italic;letter-spacing:0.24em;text-transform:uppercase;
      color:color-mix(in srgb,var(--rc) 70%, #ffffff);}
    .rank-name{margin-top:5px;font-size:38px;font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-1.2px;line-height:1;color:#fff;
      text-shadow:0 0 26px color-mix(in srgb,var(--rc) 50%,transparent);}
    .rank-tier{margin-top:7px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,0.5);}
    .rank-divider{height:1px;background:rgba(255,255,255,0.1);margin-top:22px;}
    .rank-rows{display:flex;}
    .rank-row{flex:1;padding:15px 0 0;text-align:center;}
    .rank-row+.rank-row{border-left:1px solid rgba(255,255,255,0.08);}
    .rr-v{font-size:21px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
    .rr-k{margin-top:4px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);}

    /* unlock list — centered, green Apple ticks, slides in one by one */
    .unlocks{width:232px;margin:24px auto 130px;display:flex;flex-direction:column;align-items:stretch;gap:13px;}
    .unlocks-head{font-size:10.5px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;
      color:rgba(255,255,255,0.42);text-align:left;padding-left:2px;margin-bottom:2px;opacity:0;}
    .unlock{display:flex;align-items:center;justify-content:flex-start;gap:12px;opacity:0;text-align:left;}
    .unlock-ic{width:20px;height:20px;flex:none;display:flex;align-items:center;justify-content:center;}
    .unlock-ic svg{width:20px;height:20px;stroke:#248A3D;fill:none;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;}
    .unlock-label{font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.1px;}
    body.revealed .unlocks-head{animation:unlockIn .5s ease .7s both;}
    body.revealed .unlock{animation:unlockIn .55s cubic-bezier(.22,1,.32,1) both;}
    @keyframes unlockIn{from{opacity:0;transform:translateY(14px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}

    .reveal-cta{position:absolute;bottom:46px;left:32px;right:32px;padding:16px;border-radius:16px;border:none;
      background:#fff;color:#06203f;font-family:inherit;font-size:16px;font-weight:700;letter-spacing:-0.2px;cursor:pointer;
      opacity:0;z-index:5;transition:transform .12s;-webkit-tap-highlight-color:transparent;}
    body.revealed .reveal-cta{animation:ctaIn .5s ease 1.75s both;}
    @keyframes ctaIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .reveal-cta:active{transform:scale(0.98);}

    /* ===== celebratory pop — shockwave + particle burst ===== */
    .burst{position:absolute;left:50%;top:34%;width:0;height:0;z-index:3;pointer-events:none;}
    .particle{position:absolute;left:0;top:0;border-radius:50%;will-change:transform,opacity;}
    @keyframes burstFly{0%{transform:translate(0,0) scale(1);opacity:1;}
      100%{transform:translate(var(--tx),var(--ty)) scale(0.25);opacity:0;}}
    /* hard slam — brief screen shake as the rank lands */
    body.revealed .stage{animation:shake .42s cubic-bezier(.36,.07,.19,.97) both;}
    @keyframes shake{0%{transform:translate(0,0);}12%{transform:translate(-6px,3px);}24%{transform:translate(7px,-2px);}
      38%{transform:translate(-5px,2px);}52%{transform:translate(4px,-3px);}68%{transform:translate(-3px,1px);}
      84%{transform:translate(2px,-1px);}100%{transform:translate(0,0);}}
    .shockwave{position:absolute;left:0;top:0;width:84px;height:84px;margin:-42px 0 0 -42px;border-radius:50%;
      border:2px solid #fff;transform:scale(0.1);opacity:0.9;will-change:transform,opacity;}
    @keyframes shock{to{transform:scale(5);opacity:0;}}
    .spark{position:absolute;left:0;top:0;will-change:transform,opacity;}
    @keyframes sparkFly{0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1;}
      100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(0.4);opacity:0;}}
    @media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms !important;} }
  </style>
  <link rel="stylesheet" href="_lib/core-ui.css">
</head>
<body data-font="apple">
  <div class="phone">
    <!-- core-background.js injects the shared atmosphere (same as index/trial) here -->

    <!-- Stage 1: blank tap screen -->
    <div class="stage" id="stage1" role="button" tabindex="0" aria-label="Tap to reveal your rank">
      <div class="pre-eyebrow">Your journey begins</div>
      <div class="pre-title">Reveal your rank</div>
      <div class="tap-hint">Tap anywhere</div>
    </div>

    <!-- Stage 2: rank card + unlocks -->
    <div class="stage" id="stage2">
      <div class="rank-card" id="rankCard">
        <div class="rank-socket"><div class="rank-socket-in"><div class="rank-gem" id="rankGem"></div></div></div>
        <div class="rank-eyebrow">Your rank</div>
        <div class="rank-name" id="rankName">Moonstone</div>
        <div class="rank-tier" id="rankTier">Rank 1 of 10</div>
        <div class="rank-divider"></div>
        <div class="rank-rows">
          <div class="rank-row"><div class="rr-v" id="rPlayer">Player</div><div class="rr-k">Name</div></div>
          <div class="rank-row"><div class="rr-v" id="rScore">0</div><div class="rr-k">Score</div></div>
        </div>
      </div>

      <div class="unlocks" id="unlocks">
        <div class="unlocks-head">Unlocked with this rank</div>
      </div>

      <button class="reveal-cta" id="enterBtn">Continue</button>
    </div>

    <div class="burst" id="burst"></div>
    <div class="flash"></div>
  </div>

  <script src="_lib/core-background.js"></script>
  <script src="_lib/core-ranks.js"></script>
<script>
(function(){
  // 21 ranks across 7 tiers — shared ladder so reveal mirrors the rest of the app.
  var RANKS = window.CORE_RANKS || [];
  // Detailed brilliant-cut gem — balanced octagon, gradient body, full facet pattern + sparkle.
  function gemSvg(color){
    return '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true">'
      + '<defs><linearGradient id="gg" x1="0.15" y1="0" x2="0.5" y2="1">'
      +   '<stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>'
      +   '<stop offset="0.45" stop-color="'+color+'" stop-opacity="0.95"/>'
      +   '<stop offset="1" stop-color="'+color+'"/>'
      + '</linearGradient></defs>'
      + '<path d="M42 9 L22 9 L9 22 L9 42 L22 55 L42 55 L55 42 L55 22 Z" fill="url(#gg)"/>'
      + '<path d="M42 9 L37 24 M42 9 L43 30 M22 9 L27 24 M22 9 L21 30 M9 22 L21 30 M9 22 L21 34 M9 42 L21 34 M9 42 L27 40 M22 55 L27 40 M22 55 L37 40 M42 55 L37 40 M42 55 L43 34 M55 42 L43 34 M55 42 L43 30 M55 22 L43 30 M55 22 L37 24" stroke="#ffffff" stroke-opacity="0.3" stroke-width="0.9" stroke-linejoin="round"/>'
      + '<path d="M22 9 L42 9 L37 24 L27 24 Z" fill="#ffffff" fill-opacity="0.13"/>'
      + '<path d="M9 22 L22 9 L27 24 L21 30 Z" fill="#ffffff" fill-opacity="0.06"/>'
      + '<path d="M37 24 L27 24 L21 30 L21 34 L27 40 L37 40 L43 34 L43 30 Z" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1"/>'
      + '<path d="M42 9 L22 9 L9 22 L9 42 L22 55 L42 55 L55 42 L55 22 Z" stroke="'+color+'" stroke-width="1.7" stroke-linejoin="round"/>'
      + '</svg>';
  }
  function tick(){ return '<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>'; }
  function ls(k,d){ try{ var v=localStorage.getItem(k); return v==null?d:v; }catch(e){ return d; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

  var trial={}; try{ trial=JSON.parse(localStorage.getItem('coreOnboardTrial')||'{}')||{}; }catch(e){}
  var name = ls('coreName',null) || trial.name || 'Player';
  var xp = parseInt(ls('coreXP','0'),10) || 0;
  var idx = 0; for(var i=0;i<RANKS.length;i++){ if(xp>=RANKS[i].xp) idx=i; }
  var rank = RANKS[idx];

  var card=document.getElementById('rankCard');
  card.style.setProperty('--rc', rank.color);
  // Real emblem artwork — keyed transparent PNG per rank.
  document.getElementById('rankGem').innerHTML = '<img src="assets/ranks/'+rank.key+'.png" alt="'+rank.name+'" />';
  document.getElementById('rankName').textContent = rank.name;
  var pad2=function(n){return (n<10?'0':'')+n;};
  document.getElementById('rankTier').textContent = 'Rank '+pad2(idx+1)+' // '+RANKS.length;
  document.getElementById('rPlayer').textContent = name;
  document.getElementById('rScore').textContent = xp.toLocaleString();

  var ul = document.getElementById('unlocks');
  rank.perks.forEach(function(p, i){
    var row = document.createElement('div');
    row.className = 'unlock';
    row.style.animationDelay = (0.95 + i*0.22) + 's';
    row.innerHTML = '<div class="unlock-ic">'+tick()+'</div><div class="unlock-label">'+p+'</div>';
    ul.appendChild(row);
  });

  function persist(){
    lsSet('coreRank', rank.name); lsSet('coreXP', String(xp)); lsSet('coreLevel','1'); lsSet('coreName', name);
    if(!ls('corePlayerId',null)){
      var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', s='CR-';
      for(var i=0;i<8;i++){ if(i===4) s+='-'; s+=c.charAt(Math.floor(Math.random()*c.length)); }
      lsSet('corePlayerId', s);
    }
  }
  persist();

  function spawnBurst(){
    var burst=document.getElementById('burst'); if(!burst) return;
    var colors=[rank.color, '#ffffff', '#FFD60A', rank.color];
    // expanding shockwave ring
    var wv=document.createElement('span'); wv.className='shockwave';
    wv.style.borderColor=rank.color;
    wv.style.animation='shock .75s ease-out forwards';
    burst.appendChild(wv); setTimeout(function(){wv.remove();},900);
    // round particles flying outward
    for(var i=0;i<34;i++){
      var p=document.createElement('span'); p.className='particle';
      var ang=Math.random()*Math.PI*2, dist=70+Math.random()*170;
      p.style.setProperty('--tx',(Math.cos(ang)*dist).toFixed(0)+'px');
      p.style.setProperty('--ty',(Math.sin(ang)*dist).toFixed(0)+'px');
      var sz=(4+Math.random()*7).toFixed(1), col=colors[i%colors.length];
      p.style.width=sz+'px'; p.style.height=sz+'px';
      p.style.background=col; p.style.boxShadow='0 0 9px '+col;
      p.style.animation='burstFly '+(0.7+Math.random()*0.7).toFixed(2)+'s cubic-bezier(.12,.7,.3,1) forwards';
      burst.appendChild(p);
      (function(el){ setTimeout(function(){el.remove();},1600);})(p);
    }
    // a few star sparkles
    for(var j=0;j<10;j++){
      var s=document.createElement('span'); s.className='spark';
      var a2=Math.random()*Math.PI*2, d2=50+Math.random()*150;
      s.style.setProperty('--tx',(Math.cos(a2)*d2).toFixed(0)+'px');
      s.style.setProperty('--ty',(Math.sin(a2)*d2).toFixed(0)+'px');
      s.style.setProperty('--rot',(Math.random()*360).toFixed(0)+'deg');
      s.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="#fff" style="filter:drop-shadow(0 0 6px '+rank.color+')"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4z"/></svg>';
      s.style.animation='sparkFly '+(0.8+Math.random()*0.6).toFixed(2)+'s ease-out forwards';
      burst.appendChild(s);
      (function(el){ setTimeout(function(){el.remove();},1600);})(s);
    }
  }

  var revealed=false;
  function go(){
    if(revealed) return; revealed=true;
    try{ if(navigator.vibrate) navigator.vibrate(40); }catch(e){}
    document.body.classList.add('charging');
    setTimeout(function(){
      document.body.classList.remove('charging');
      document.body.classList.add('revealed');
      spawnBurst();
      try{ if(navigator.vibrate) navigator.vibrate([0,40,30,60]); }catch(e){}
    }, 580);
  }
  var s1=document.getElementById('stage1');
  s1.addEventListener('click', go);
  s1.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } });

  document.getElementById('enterBtn').addEventListener('click', function(){
    lsSet('coreRankRevealComplete','1');
    window.location.href='20-dashboard.html';
  });
})();
</script>
</body>
</html>
