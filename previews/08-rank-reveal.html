<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
  <meta charset="utf-8" />
  <title>CORE — Rank reveal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <link rel="stylesheet" href="_lib/core-responsive.css?v=apple" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{min-height:100%;background:#05060c;color:#fff;display:flex;align-items:center;justify-content:center;
      padding:24px;overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    .phone{position:relative;width:390px;height:844px;border-radius:56px;overflow:hidden;background:#05060c;
      box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
    .reveal-bg{position:absolute;inset:0;
      background:radial-gradient(120% 80% at 50% 36%, #12142c 0%, #06070f 60%, #04040a 100%);}

    .stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}

    /* ===== Stage 1 — tap to reveal ===== */
    #stage1{cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .pre-orb{width:118px;height:118px;border-radius:50%;
      background:radial-gradient(circle at 50% 42%, #ffffff, rgba(150,180,255,0.55) 46%, transparent 72%);
      box-shadow:0 0 64px rgba(122,166,255,0.55);animation:prelude 2.6s ease-in-out infinite;}
    @keyframes prelude{0%,100%{transform:scale(1);opacity:0.86;}50%{transform:scale(1.12);opacity:1;}}
    .pre-eyebrow{margin-top:36px;font-size:11px;font-weight:800;letter-spacing:0.3em;text-transform:uppercase;color:rgba(207,228,255,0.6);}
    .pre-title{margin-top:9px;font-size:25px;font-weight:800;letter-spacing:-0.5px;color:#fff;}
    .tap-hint{position:absolute;bottom:70px;left:0;right:0;text-align:center;font-size:14px;font-weight:600;
      color:rgba(255,255,255,0.5);animation:tapPulse 1.8s ease-in-out infinite;}
    @keyframes tapPulse{0%,100%{opacity:0.4;}50%{opacity:0.92;}}

    /* charge + white flash on tap */
    body.charging .pre-orb{animation:charge 1.05s cubic-bezier(.5,0,.4,1) forwards;}
    @keyframes charge{0%{transform:scale(1);}52%{transform:scale(0.66);}100%{transform:scale(10);opacity:0.95;}}
    body.charging .pre-eyebrow,body.charging .pre-title,body.charging .tap-hint{opacity:0;transition:opacity .3s;}
    .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;}
    body.charging .flash{animation:flashIn 1.5s ease-in forwards;}
    @keyframes flashIn{0%,58%{opacity:0;}82%{opacity:1;}100%{opacity:1;}}

    /* ===== Stage 2 — rank card ===== */
    #stage2{opacity:0;pointer-events:none;}
    body.revealed #stage1{display:none;}
    body.revealed #stage2{opacity:1;pointer-events:auto;}
    body.revealed .flash{animation:flashOut .55s ease forwards;}
    @keyframes flashOut{from{opacity:1;}to{opacity:0;}}

    .rank-card{width:300px;padding:36px 26px 26px;border-radius:32px;position:relative;
      background:linear-gradient(170deg, color-mix(in srgb, var(--rc) 24%, #0b0d15), color-mix(in srgb, var(--rc) 8%, #08090f));
      border:1px solid color-mix(in srgb, var(--rc) 42%, transparent);
      box-shadow:0 30px 70px rgba(0,0,0,0.5), 0 0 0 1px color-mix(in srgb, var(--rc) 20%, transparent) inset, 0 0 56px color-mix(in srgb, var(--rc) 20%, transparent);
      animation:cardPop .72s cubic-bezier(.2,1.45,.3,1) .08s both;}
    @keyframes cardPop{0%{transform:scale(0.35);opacity:0;}55%{opacity:1;}100%{transform:scale(1);opacity:1;}}
    .rank-gem{width:112px;height:112px;margin:0 auto;
      filter:drop-shadow(0 10px 26px color-mix(in srgb, var(--rc) 55%, transparent));
      animation:gemFloat 4s ease-in-out 1s infinite;}
    @keyframes gemFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
    .rank-eyebrow{margin-top:22px;font-size:11px;font-weight:800;letter-spacing:0.26em;text-transform:uppercase;
      color:color-mix(in srgb,var(--rc) 62%, #ffffff);text-align:center;}
    .rank-name{margin-top:6px;font-size:34px;font-weight:800;letter-spacing:-0.8px;color:#fff;text-align:center;}
    .rank-tier{margin-top:5px;font-size:12px;color:rgba(255,255,255,0.5);text-align:center;}
    .rank-divider{height:1px;background:rgba(255,255,255,0.1);margin-top:24px;}
    .rank-rows{display:flex;}
    .rank-row{flex:1;padding:16px 0 0;text-align:center;}
    .rank-row+.rank-row{border-left:1px solid rgba(255,255,255,0.08);}
    .rr-v{font-size:21px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
    .rr-k{margin-top:4px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);}

    .reveal-cta{position:absolute;bottom:52px;left:32px;right:32px;padding:16px;border-radius:16px;border:none;
      background:#fff;color:#06203f;font-family:inherit;font-size:16px;font-weight:700;letter-spacing:-0.2px;cursor:pointer;
      opacity:0;transition:opacity .4s .55s, transform .12s;-webkit-tap-highlight-color:transparent;}
    body.revealed .reveal-cta{opacity:1;}
    .reveal-cta:active{transform:scale(0.98);}
    @media (prefers-reduced-motion: reduce){ *{animation:none !important;} }
  </style>
</head>
<body data-font="apple">
  <div class="phone">
    <div class="reveal-bg"></div>

    <!-- Stage 1: tap -->
    <div class="stage" id="stage1" role="button" tabindex="0" aria-label="Tap anywhere to reveal your rank">
      <div class="pre-orb"></div>
      <div class="pre-eyebrow">Your starting rank</div>
      <div class="pre-title">Ready?</div>
      <div class="tap-hint">Tap anywhere to reveal</div>
    </div>

    <!-- Stage 2: rank card -->
    <div class="stage" id="stage2">
      <div class="rank-card" id="rankCard">
        <div class="rank-gem" id="rankGem"></div>
        <div class="rank-eyebrow">Your rank</div>
        <div class="rank-name" id="rankName">Moonstone</div>
        <div class="rank-tier" id="rankTier">Rank 1 of 10</div>
        <div class="rank-divider"></div>
        <div class="rank-rows">
          <div class="rank-row"><div class="rr-v" id="rPlayer">Player</div><div class="rr-k">Name</div></div>
          <div class="rank-row"><div class="rr-v" id="rScore">0</div><div class="rr-k">Score</div></div>
        </div>
      </div>
      <button class="reveal-cta" id="enterBtn">Continue</button>
    </div>

    <div class="flash"></div>
  </div>

<script>
(function(){
  // 10 gemstone ranks (common -> legendary). Colours fixed; XP thresholds gate them.
  var RANKS = [
    { name:'Moonstone', color:'#C7D0E8', xp:0 },
    { name:'Amber',     color:'#FF9F0A', xp:500 },
    { name:'Topaz',     color:'#FFD60A', xp:1500 },
    { name:'Carnelian', color:'#E0533A', xp:3500 },
    { name:'Jade',      color:'#30D158', xp:7000 },
    { name:'Turquoise', color:'#40D0E0', xp:12000 },
    { name:'Amethyst',  color:'#BF5AF2', xp:20000 },
    { name:'Sapphire',  color:'#0A84FF', xp:32000 },
    { name:'Ruby',      color:'#FF375F', xp:50000 },
    { name:'Diamond',   color:'#EAF2FF', xp:80000 }
  ];
  function gemSvg(color){
    return '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true">'
      + '<path d="M22 7 L42 7 L58 25 L32 60 L6 25 Z" fill="'+color+'" fill-opacity="0.92"/>'
      + '<path d="M6 25 H58 M22 7 L18 25 L32 60 M42 7 L46 25 L32 60 M22 7 L32 25 L42 7" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.3" stroke-linejoin="round"/>'
      + '<path d="M22 7 L42 7 L58 25 L32 60 L6 25 Z" stroke="'+color+'" stroke-width="1.6" stroke-linejoin="round"/>'
      + '</svg>';
  }
  function ls(k,d){ try{ var v=localStorage.getItem(k); return v==null?d:v; }catch(e){ return d; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

  var trial={}; try{ trial=JSON.parse(localStorage.getItem('coreOnboardTrial')||'{}')||{}; }catch(e){}
  var name = ls('coreName',null) || trial.name || 'Player';
  var xp = parseInt(ls('coreXP','0'),10) || 0;
  var idx = 0; for(var i=0;i<RANKS.length;i++){ if(xp>=RANKS[i].xp) idx=i; }
  var rank = RANKS[idx];

  var card=document.getElementById('rankCard');
  card.style.setProperty('--rc', rank.color);
  document.getElementById('rankGem').innerHTML = gemSvg(rank.color);
  document.getElementById('rankName').textContent = rank.name;
  document.getElementById('rankTier').textContent = 'Rank '+(idx+1)+' of '+RANKS.length;
  document.getElementById('rPlayer').textContent = name;
  document.getElementById('rScore').textContent = xp.toLocaleString();

  function persist(){
    lsSet('coreRank', rank.name); lsSet('coreXP', String(xp)); lsSet('coreLevel','1'); lsSet('coreName', name);
    if(!ls('corePlayerId',null)){
      var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', s='CR-';
      for(var i=0;i<8;i++){ if(i===4) s+='-'; s+=c.charAt(Math.floor(Math.random()*c.length)); }
      lsSet('corePlayerId', s);
    }
  }
  persist();

  var revealed=false;
  function go(){
    if(revealed) return; revealed=true;
    try{ if(navigator.vibrate) navigator.vibrate(40); }catch(e){}
    document.body.classList.add('charging');
    setTimeout(function(){
      document.body.classList.remove('charging');
      document.body.classList.add('revealed');
      try{ if(navigator.vibrate) navigator.vibrate([0,30,40,30]); }catch(e){}
    }, 1500);
  }
  var s1=document.getElementById('stage1');
  s1.addEventListener('click', go);
  s1.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } });

  document.getElementById('enterBtn').addEventListener('click', function(){
    lsSet('coreRankRevealComplete','1');
    window.location.href='09-first-chest.html';
  });
})();
</script>
</body>
</html>
