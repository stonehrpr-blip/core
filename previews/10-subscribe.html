<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
  <script>
    // This is an onboarding gate. If the member is already subscribed, skip straight
    // to the dashboard. (Preview/localhost bypasses so it's always viewable.)
    try{(function(){var h=location.hostname;window.__corePreview=(location.protocol==='file:'||h==='localhost'||h==='127.0.0.1'||/[?&]preview=1/.test(location.search));})();}catch(e){}
    if(!window.__corePreview){ try { if (localStorage.getItem('coreSubscribed') === '1') { location.replace('20-dashboard.html'); } } catch(e){} }
  </script>
  <meta charset="utf-8" />
  <title>CORE — Membership</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <link rel="stylesheet" href="_lib/core-responsive.css" />
  <style>
    :root{
      --ink:#ffffff; --ink-soft:rgba(255,255,255,0.58); --ink-faint:rgba(255,255,255,0.34);
      --hair:rgba(255,255,255,0.08); --hair-2:rgba(255,255,255,0.14);
      --glow:rgba(120,160,255,0.6); --glow-soft:rgba(120,160,255,0.18); --blue:#4AA3FF;
      --apple-font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Helvetica,Arial,"Segoe UI",Roboto,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{min-height:100vh;background:#000;color:var(--ink);font-family:var(--apple-font);
      display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    .phone{position:relative;width:390px;height:844px;background:#000;border-radius:56px;overflow:hidden;}
    .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
    .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(255,255,255,0.4);border-radius:999px;z-index:60;}

    .frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:58px 0 0;}
    .scroll{flex:1;overflow-y:auto;padding:6px 24px 26px;-webkit-overflow-scrolling:touch;}
    .scroll::-webkit-scrollbar{display:none;}

    /* hero */
    .crest{width:84px;height:84px;margin:6px auto 0;display:flex;align-items:center;justify-content:center;
      filter:drop-shadow(0 12px 26px rgba(0,0,0,.55)) drop-shadow(0 0 22px rgba(120,160,255,.16));
      animation:bob 4s ease-in-out infinite;}
    .crest img{width:84px;height:84px;border-radius:22px;object-fit:contain;}
    @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
    .htag{text-align:center;margin-top:16px;font-size:10.5px;font-weight:800;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft);}
    .h1{text-align:center;margin:9px 0 0;font-size:30px;font-weight:800;letter-spacing:-0.8px;line-height:1.08;}
    .h1 .g{color:#fff;text-shadow:0 0 26px rgba(120,160,255,.18);}
    .sub{text-align:center;margin:11px auto 0;max-width:290px;font-size:13.5px;color:var(--ink-soft);line-height:1.5;}

    /* value props */
    .feats{margin-top:22px;display:flex;flex-direction:column;gap:4px;}
    .f{display:flex;align-items:center;gap:13px;padding:11px 4px;}
    .f .fk{width:38px;height:38px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);border:1px solid var(--hair);}
    .f .fk svg{width:20px;height:20px;color:#cfe0ff;}
    .f .ft{font-size:14px;font-weight:800;color:#fff;}
    .f .fd{font-size:12px;color:var(--ink-soft);margin-top:2px;line-height:1.35;}

    /* plans */
    .plans{margin-top:22px;display:flex;gap:10px;}
    .plan{flex:1;position:relative;border-radius:18px;padding:15px 14px;background:rgba(255,255,255,0.03);border:1.5px solid var(--hair);cursor:pointer;text-align:left;transition:.18s;}
    .plan.on{border-color:rgba(120,160,255,0.6);background:rgba(120,160,255,0.08);box-shadow:0 0 0 1px rgba(120,160,255,.25),0 0 22px rgba(120,160,255,.12);}
    .plan .pname{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);}
    .plan.on .pname{color:#9fc4ff;}
    .plan .pprice{font-size:23px;font-weight:900;margin-top:7px;letter-spacing:-0.02em;color:#fff;}
    .plan .pper{font-size:12px;color:var(--ink-soft);font-weight:600;}
    .plan .psave{position:absolute;top:-9px;right:12px;font-size:9px;font-weight:900;letter-spacing:.04em;color:#06070c;background:#fff;padding:3px 8px;border-radius:999px;}
    .plan .pradio{position:absolute;top:14px;right:14px;width:18px;height:18px;border-radius:50%;border:2px solid var(--ink-faint);}
    .plan.on .pradio{border-color:#9fc4ff;background:radial-gradient(circle at 50% 50%,#9fc4ff 0 5px,transparent 6px);}

    /* CTA — premium white */
    .cta{width:100%;margin-top:22px;padding:18px;border:none;border-radius:16px;font:inherit;font-size:16.5px;font-weight:800;letter-spacing:-0.2px;color:#07070c;cursor:pointer;
      background:#fff;box-shadow:0 12px 28px rgba(0,0,0,.45),0 0 22px rgba(120,160,255,.14),0 1px 0 rgba(255,255,255,.6) inset;
      display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .12s,box-shadow .22s;}
    .cta:hover{box-shadow:0 12px 32px rgba(0,0,0,.5),0 0 30px rgba(120,160,255,.24),0 1px 0 rgba(255,255,255,.7) inset;}
    .cta:active{transform:scale(.985);}
    .cta:disabled{cursor:progress;}
    .cta .spin{width:19px;height:19px;border-radius:50%;border:2.4px solid rgba(7,7,12,.25);border-top-color:#07070c;animation:spin .7s linear infinite;display:none;}
    .cta.busy .spin{display:inline-block;} .cta.busy .lbl{opacity:.7;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .finesub{text-align:center;margin-top:12px;font-size:11.5px;color:var(--ink-faint);line-height:1.5;}
    .restore-row{text-align:center;margin-top:16px;font-size:13px;color:var(--ink-soft);}
    .restore-row a{color:#9fc4ff;font-weight:700;text-decoration:none;cursor:pointer;}
    .restore-row a:hover{text-decoration:underline;}
    .legal{text-align:center;margin-top:14px;font-size:10.5px;color:var(--ink-faint);}
    .legal a{color:var(--ink-soft);text-decoration:none;}

    /* ===== Multi-step unlock loader (ported from MultiStepLoader) ===== */
    .ul-wrap{position:absolute;inset:0;z-index:90;display:none;align-items:center;justify-content:center;
      background:radial-gradient(circle at 50% 42%,rgba(20,28,60,0.6) 0%,rgba(0,0,0,0.92) 55%,#000 100%);
      -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);opacity:0;transition:opacity .4s ease;}
    .ul-wrap.on{display:flex;opacity:1;}
    .ul-mask{position:relative;height:340px;width:100%;max-width:320px;overflow:hidden;
      -webkit-mask-image:linear-gradient(to bottom,transparent 0%,#000 26%,#000 74%,transparent 100%);
      mask-image:linear-gradient(to bottom,transparent 0%,#000 26%,#000 74%,transparent 100%);}
    .ul-list{position:absolute;left:0;right:0;top:50%;display:flex;flex-direction:column;gap:20px;
      transition:transform .5s cubic-bezier(.4,0,.2,1);padding:0 8px;}
    .ul-step{display:flex;align-items:center;gap:13px;opacity:0.28;transition:opacity .5s ease,transform .5s ease;}
    .ul-step .uic{width:24px;height:24px;flex:none;display:flex;align-items:center;justify-content:center;}
    .ul-step .uic svg{width:24px;height:24px;}
    .ul-step .utx{font-size:16px;font-weight:600;color:#fff;letter-spacing:-0.2px;}
    .ul-step.done{opacity:0.5;}
    .ul-step.current{opacity:1;transform:scale(1.04);}
    .ul-step.current .utx{font-weight:800;}
    /* check (done) */
    .uic .chk{stroke:#4ADE80;}
    /* spinner (current) */
    .uic .cspin{width:22px;height:22px;border-radius:50%;border:2.4px solid rgba(120,160,255,.25);border-top-color:#7aa0ff;animation:spin .7s linear infinite;}
    /* pending dot */
    .uic .pdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);}

    @media (prefers-reduced-motion: reduce){ .crest,.cta .spin,.uic .cspin{animation:none!important;} }
  </style>
  <link rel="stylesheet" href="_lib/core-background.css" />
  <script src="_lib/core-background.js"></script>
  <link rel="stylesheet" href="_lib/core-starfield.css" />
  <script src="_lib/core-starfield.js"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="_lib/core-ui.css" />
</head>
<body>
  <div class="phone" data-bg-skip>
    <div class="notch"></div>

    <div class="frame">
      <div class="scroll">
        <div class="crest"><img src="assets/logo.png?v=3" alt="CORE" /></div>
        <div class="htag">CORE Membership</div>
        <h1 class="h1">Unlock <span class="g">everything.</span></h1>
        <p class="sub">Your plan is built. Activate your membership to open your dashboard, quests, AI coach and rewards.</p>

        <div class="feats" id="feats"></div>
        <div class="plans" id="plans"></div>

        <button class="cta" id="ctaBtn" type="button"><span class="lbl">Subscribe &amp; unlock</span><span class="spin" aria-hidden="true"></span></button>
        <div class="finesub" id="fineSub">7-day free trial, then $44.99/year. Cancel anytime.</div>

        <div class="restore-row">Already a member? <a id="restoreBtn">Log in to restore</a></div>
        <div class="legal">Secured checkout · <a href="82-legal.html#terms">Terms</a> · <a href="refund-policy.html">Refunds</a></div>
      </div>
      <div class="home-indicator"></div>
    </div>

    <!-- Unlock loader overlay -->
    <div class="ul-wrap" id="ulWrap" aria-live="polite" aria-label="Unlocking your membership">
      <div class="ul-mask"><div class="ul-list" id="ulList"></div></div>
    </div>
  </div>

  <script src="_lib/core-sfx.js"></script>
  <script src="_lib/core-state.js"></script>
  <script src="_lib/core-accounts.js"></script>
  <script>
  (function(){
    var qs=function(s){return document.querySelector(s);};
    function SFX(n){ try{ if(typeof window.coreSfx==='function') window.coreSfx(n); }catch(e){} }

    // ── value props ──
    var FEATS=[
      {t:'Your full dashboard', d:'Life Score, trends, widgets and your daily plan.', ic:'<rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/>'},
      {t:'AI coach & scans', d:'Physique, food and voice analysis, plus your coach.', ic:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>'},
      {t:'Quests, streaks & rewards', d:'Daily quests, streak protection and chests.', ic:'<path d="M12 2c1 3-1 4-1 6 0 1 1 2 1 2s2-1 2-3c2 2 3 4 3 7a5 5 0 0 1-10 0c0-3 2-5 3-7 1 2 2 2 2 2s0-3 0-7Z"/>'},
      {t:'Everything, unlimited', d:'No caps. New seasons and features first.', ic:'<circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/>'}
    ];
    qs('#feats').innerHTML=FEATS.map(function(f){
      return '<div class="f"><div class="fk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+f.ic+'</svg></div>'+
             '<div><div class="ft">'+f.t+'</div><div class="fd">'+f.d+'</div></div></div>';
    }).join('');

    // ── plans ──
    var PLANS={
      annual:{ name:'Annual', price:'$44.99', per:'/year', save:'SAVE 53%', fine:'7-day free trial, then $44.99/year (≈$3.75/mo). Cancel anytime.' },
      monthly:{ name:'Monthly', price:'$7.99', per:'/month', save:'', fine:'7-day free trial, then $7.99/month. Cancel anytime.' }
    };
    var sel='annual';
    function renderPlans(){
      qs('#plans').innerHTML=['annual','monthly'].map(function(k){ var p=PLANS[k];
        return '<button class="plan'+(k===sel?' on':'')+'" data-plan="'+k+'" type="button">'+
          (p.save?'<span class="psave">'+p.save+'</span>':'')+'<span class="pradio"></span>'+
          '<div class="pname">'+p.name+'</div><div class="pprice">'+p.price+'</div><div class="pper">'+p.per+'</div></button>';
      }).join('');
      qs('#fineSub').textContent=PLANS[sel].fine;
      document.querySelectorAll('.plan').forEach(function(b){ b.addEventListener('click', function(){ sel=b.dataset.plan; SFX('tick'); renderPlans(); }); });
    }
    renderPlans();

    // ── unlock loader (ported from MultiStepLoader) ──
    var UNLOCKS=[
      'Confirming your membership',
      'Unlocking your dashboard',
      'Activating daily quests',
      'Calibrating your 6 life stats',
      'Waking your AI coach',
      'Unlocking streaks & rewards',
      'Forging your first chest',
      'Welcome to CORE'
    ];
    var CHK='<svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 11-12"/></svg>';
    var ROW=44; // step height + gap for centering math (gap 20 + ~24 icon)
    function buildLoader(){
      qs('#ulList').innerHTML=UNLOCKS.map(function(t,i){
        return '<div class="ul-step" data-i="'+i+'"><span class="uic"><span class="pdot"></span></span><span class="utx">'+t+'</span></div>';
      }).join('');
    }
    function paintStep(i){
      var steps=document.querySelectorAll('.ul-step');
      steps.forEach(function(el,idx){
        var ic=el.querySelector('.uic');
        el.classList.remove('done','current');
        if(idx<i){ el.classList.add('done'); ic.innerHTML=CHK; }
        else if(idx===i){ el.classList.add('current'); ic.innerHTML = (idx===UNLOCKS.length-1) ? CHK : '<span class="cspin"></span>'; }
        else { ic.innerHTML='<span class="pdot"></span>'; }
      });
      // keep current step vertically centered within the mask
      var list=qs('#ulList');
      var cur=steps[i];
      if(list && cur){ var off = cur.offsetTop + cur.offsetHeight/2; list.style.transform='translateY(-'+off+'px)'; }
    }
    function runLoader(done){
      var wrap=qs('#ulWrap'); buildLoader();
      wrap.classList.add('on');
      var i=0; paintStep(0);
      try{ if(navigator.vibrate) navigator.vibrate(12); }catch(e){}
      var step=function(){
        SFX(i===UNLOCKS.length-1?'reward':'tick');
        paintStep(i);
        i++;
        if(i<UNLOCKS.length){ setTimeout(step, 1100); }
        else { setTimeout(function(){ paintStep(UNLOCKS.length-1); setTimeout(done, 1200); }, 200); }
      };
      setTimeout(step, 350);
    }

    // ── mark subscribed + persist to the account ──
    function activateMembership(){
      try{ localStorage.setItem('coreSubscribed','1'); localStorage.setItem('coreSubscribedPlan', sel); localStorage.setItem('coreSubscribedAt', String(Date.now())); }catch(e){}
      try{
        if(window.coreAccounts && window.coreAccounts.updateCurrent){
          window.coreAccounts.updateCurrent(function(acc){ acc.subscribed=true; acc.subscriptionPlan=sel; acc.subscribedAt=Date.now(); });
        }
      }catch(e){}
      try{ if(window.coreState && window.coreState.setCorePlus) window.coreState.setCorePlus(true); }catch(e){}
      try{ if(window.coreTrack) coreTrack('subscription_started', { plan: sel }); }catch(e){}
    }

    // ── subscribe → simulate confirmed payment → unlock loader → dashboard ──
    var paying=false;
    qs('#ctaBtn').addEventListener('click', function(){
      if(paying) return; paying=true;
      var btn=qs('#ctaBtn'); btn.classList.add('busy'); btn.disabled=true;
      btn.querySelector('.lbl').textContent='Confirming payment…';
      SFX('confirm');
      // (Preview: simulated confirmation. Production wires Apple Pay / Stripe here.)
      setTimeout(function(){
        activateMembership();
        btn.classList.remove('busy');
        runLoader(function(){ window.location.href='20-dashboard.html'; });
      }, 1500);
    });

    // ── restore / log in to an existing subscribed account ──
    qs('#restoreBtn').addEventListener('click', function(){
      SFX('tick');
      // If this account is already subscribed (e.g. returning member), unlock now.
      var subbed=false;
      try{
        if(window.coreAccounts && window.coreAccounts.currentSync){ var a=window.coreAccounts.currentSync(); subbed=!!(a&&a.subscribed); }
      }catch(e){}
      if(subbed){ try{ localStorage.setItem('coreSubscribed','1'); }catch(e){} window.location.href='20-dashboard.html'; return; }
      // Otherwise send them to sign-in; coming back subscribed will pass the gate.
      window.location.href='04-sign-in.html?return=10-subscribe.html';
    });
  })();
  </script>
</body>
</html>
