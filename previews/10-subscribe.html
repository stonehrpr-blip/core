<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
  <script>
    try{(function(){var h=location.hostname;window.__corePreview=(location.protocol==='file:'||h==='localhost'||h==='127.0.0.1'||/[?&]preview=1/.test(location.search));})();}catch(e){}
    if(!window.__corePreview){ try { if (localStorage.getItem('coreSubscribed') === '1') { location.replace('20-dashboard.html'); } } catch(e){} }
  </script>
  <meta charset="utf-8" />
  <title>CORE — Start your 7 days free</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <link rel="stylesheet" href="_lib/core-responsive.css" />
  <style>
    :root{
      --ink:#ffffff; --ink-soft:rgba(255,255,255,0.58); --ink-faint:rgba(255,255,255,0.34);
      --hair:rgba(255,255,255,0.08); --hair-2:rgba(255,255,255,0.14);
      --glow:rgba(120,160,255,0.6); --glow-soft:rgba(120,160,255,0.18); --blue:#5AA3FF; --green:#34D399;
      --apple-font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Helvetica,Arial,"Segoe UI",Roboto,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{min-height:100vh;background:#000;color:var(--ink);font-family:var(--apple-font);
      display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    .phone{position:relative;width:390px;height:844px;background:#000;border-radius:56px;overflow:hidden;}
    .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
    .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(255,255,255,0.4);border-radius:999px;z-index:60;}

    .frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:60px 24px 0;}

    /* hero */
    .crest{width:64px;height:64px;margin:6px auto 0;display:flex;align-items:center;justify-content:center;
      filter:drop-shadow(0 10px 22px rgba(0,0,0,.55)) drop-shadow(0 0 20px rgba(120,160,255,.18));animation:bob 4s ease-in-out infinite;}
    .crest img{width:64px;height:64px;border-radius:17px;object-fit:contain;}
    @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
    .htag{text-align:center;margin-top:14px;font-size:10.5px;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--blue);}
    .h1{text-align:center;margin:8px 4px 0;font-size:29px;font-weight:800;letter-spacing:-0.9px;line-height:1.06;}
    .h1 .g{color:#fff;text-shadow:0 0 26px rgba(120,160,255,.2);}
    .sub{text-align:center;margin:10px auto 0;max-width:290px;font-size:13px;color:var(--ink-soft);line-height:1.45;}

    /* 3 honest bullets */
    .bullets{margin:20px auto 0;max-width:300px;display:flex;flex-direction:column;gap:12px;}
    .b{display:flex;align-items:center;gap:11px;}
    .b .bk{width:22px;height:22px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(52,211,153,0.14);border:1px solid rgba(52,211,153,0.3);}
    .b .bk svg{width:13px;height:13px;color:var(--green);}
    .b .bt{font-size:13.5px;font-weight:600;color:#eef2f9;line-height:1.35;}
    .b .bt b{color:#fff;font-weight:800;}

    /* plans */
    .plans{margin-top:24px;display:flex;flex-direction:column;gap:10px;}
    .plan{position:relative;border-radius:16px;padding:15px 16px;background:rgba(255,255,255,0.03);border:1.5px solid var(--hair);cursor:pointer;display:flex;align-items:center;gap:13px;transition:.16s;}
    .plan.on{border-color:rgba(120,160,255,0.6);background:rgba(120,160,255,0.08);box-shadow:0 0 0 1px rgba(120,160,255,.25),0 0 24px rgba(120,160,255,.12);}
    .plan .pradio{width:20px;height:20px;flex:none;border-radius:50%;border:2px solid var(--ink-faint);transition:.16s;}
    .plan.on .pradio{border-color:var(--blue);background:radial-gradient(circle at 50% 50%,var(--blue) 0 6px,transparent 7px);}
    .plan .pbd{flex:1;}
    .plan .pname{font-size:14.5px;font-weight:800;color:#fff;}
    .plan .pdesc{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
    .plan .pright{text-align:right;}
    .plan .pprice{font-size:17px;font-weight:900;color:#fff;}
    .plan .pper{font-size:10.5px;color:var(--ink-soft);}
    .plan .psave{position:absolute;top:-10px;left:14px;font-size:9px;font-weight:900;letter-spacing:.06em;color:#06070c;background:linear-gradient(90deg,#fff,#cfe0ff);padding:3px 9px;border-radius:999px;}

    /* sticky CTA dock */
    .dock{position:absolute;left:0;right:0;bottom:0;z-index:30;padding:14px 24px calc(18px + env(safe-area-inset-bottom));
      background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0.82) 30%,#000 66%);}
    .reassure{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px;font-size:12px;font-weight:700;color:#cfe0ff;}
    .reassure svg{width:14px;height:14px;color:var(--green);}
    .cta{width:100%;padding:18px;border:none;border-radius:16px;font:inherit;font-size:17px;font-weight:800;letter-spacing:-0.2px;color:#07070c;cursor:pointer;
      background:#fff;box-shadow:0 12px 30px rgba(0,0,0,.5),0 0 26px rgba(120,160,255,.18),0 1px 0 rgba(255,255,255,.6) inset;
      display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .12s,box-shadow .22s;animation:ctaPulse 2.6s ease-in-out infinite;}
    @keyframes ctaPulse{0%,100%{box-shadow:0 12px 30px rgba(0,0,0,.5),0 0 22px rgba(120,160,255,.16),0 1px 0 rgba(255,255,255,.6) inset;}50%{box-shadow:0 12px 34px rgba(0,0,0,.55),0 0 40px rgba(120,160,255,.34),0 1px 0 rgba(255,255,255,.7) inset;}}
    .cta:active{transform:scale(.985);}
    .cta .spin{width:19px;height:19px;border-radius:50%;border:2.4px solid rgba(7,7,12,.25);border-top-color:#07070c;animation:spin .7s linear infinite;display:none;}
    .cta.busy{animation:none;} .cta.busy .spin{display:inline-block;} .cta.busy .lbl{opacity:.7;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .finesub{text-align:center;margin-top:9px;font-size:10.5px;color:var(--ink-faint);line-height:1.45;}
    .finesub a{color:var(--ink-soft);}
    .restore{display:block;width:100%;text-align:center;margin-top:8px;font-size:12.5px;color:var(--ink-soft);background:none;border:none;font:inherit;cursor:pointer;}
    .restore b{color:#9fc4ff;font-weight:700;}

    /* unlock loader */
    .ul-wrap{position:absolute;inset:0;z-index:90;display:none;align-items:center;justify-content:center;
      background:radial-gradient(circle at 50% 42%,rgba(20,28,60,0.6) 0%,rgba(0,0,0,0.92) 55%,#000 100%);
      -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);opacity:0;transition:opacity .4s ease;}
    .ul-wrap.on{display:flex;opacity:1;}
    .ul-mask{position:relative;height:340px;width:100%;max-width:320px;overflow:hidden;
      -webkit-mask-image:linear-gradient(to bottom,transparent 0%,#000 26%,#000 74%,transparent 100%);
      mask-image:linear-gradient(to bottom,transparent 0%,#000 26%,#000 74%,transparent 100%);}
    .ul-list{position:absolute;left:0;right:0;top:50%;display:flex;flex-direction:column;gap:20px;transition:transform .5s cubic-bezier(.4,0,.2,1);padding:0 8px;}
    .ul-step{display:flex;align-items:center;gap:13px;opacity:0.28;transition:opacity .5s ease,transform .5s ease;}
    .ul-step .uic{width:24px;height:24px;flex:none;display:flex;align-items:center;justify-content:center;}
    .ul-step .uic svg{width:24px;height:24px;}
    .ul-step .utx{font-size:16px;font-weight:600;color:#fff;letter-spacing:-0.2px;}
    .ul-step.done{opacity:0.5;} .ul-step.current{opacity:1;transform:scale(1.04);} .ul-step.current .utx{font-weight:800;}
    .uic .chk{stroke:#4ADE80;} .uic .cspin{width:22px;height:22px;border-radius:50%;border:2.4px solid rgba(120,160,255,.25);border-top-color:#7aa0ff;animation:spin .7s linear infinite;}
    .uic .pdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);}

    @media (prefers-reduced-motion: reduce){ .crest,.cta,.uic .cspin{animation:none!important;} }
  </style>
  <link rel="stylesheet" href="_lib/core-background.css" />
  <script src="_lib/core-background.js"></script>
  <link rel="stylesheet" href="_lib/core-starfield.css" />
  <script src="_lib/core-starfield.js"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="_lib/core-ui.css" />
</head>
<body>
  <div class="phone" data-bg-skip>
    <div class="notch"></div>

    <div class="frame">
      <div class="crest"><img src="assets/logo.png?v=3" alt="CORE" /></div>
      <div class="htag">7 days free</div>
      <h1 class="h1" id="heroH1">Start your<br/><span class="g">7 days free.</span></h1>
      <p class="sub">Everything in CORE, unlocked. No charge today — cancel anytime.</p>

      <div class="bullets">
        <div class="b"><span class="bk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 11-12"/></svg></span><span class="bt">Full access to everything — <b>free for 7 days</b></span></div>
        <div class="b"><span class="bk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 11-12"/></svg></span><span class="bt">Then just <b>$1 for your first month</b></span></div>
        <div class="b"><span class="bk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 11-12"/></svg></span><span class="bt">We'll remind you before billing · <b>cancel anytime</b></span></div>
      </div>

      <div class="plans" id="plans"></div>
    </div>

    <!-- sticky CTA -->
    <div class="dock">
      <div class="reassure"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>No payment due now</div>
      <button class="cta" id="ctaBtn" type="button"><span class="lbl">Start my 7 days free</span><span class="spin" aria-hidden="true"></span></button>
      <div class="finesub" id="fineSub"></div>
      <button class="restore" id="restoreBtn" type="button">Already a member? <b>Log in to restore</b></button>
    </div>

    <!-- unlock loader -->
    <div class="ul-wrap" id="ulWrap" aria-live="polite" aria-label="Unlocking your membership">
      <div class="ul-mask"><div class="ul-list" id="ulList"></div></div>
    </div>
  </div>

  <script src="_lib/core-sfx.js"></script>
  <script src="_lib/core-state.js"></script>
  <script src="_lib/core-accounts.js"></script>
  <script>
  (function(){
    var qs=function(s){return document.querySelector(s);};
    function SFX(n){ try{ if(typeof window.coreSfx==='function') window.coreSfx(n); }catch(e){} }

    try{ var t=JSON.parse(localStorage.getItem('coreOnboardTrial')||'{}'); var nm=(t&&t.name||'').trim().split(' ')[0];
      if(nm) qs('#heroH1').innerHTML = nm.replace(/[<>&]/g,'')+", start your<br/><span class=\"g\">7 days free.</span>"; }catch(e){}

    // plans — $4.99/mo with $1 first month; annual adjusted to match
    var PLANS={
      monthly:{ name:'Monthly', desc:'$1 first month, then $4.99/mo', price:'$1', per:'first month', save:'$1 FIRST MONTH',
                fine:'7-day free trial, then $1 for your first month, then $4.99/month. Cancel anytime.' },
      annual:{ name:'Annual', desc:'Billed yearly · best value', price:'$39.99', per:'/yr · save 33%', save:'',
               fine:'7-day free trial, then $39.99/year (≈$3.33/mo). Cancel anytime.' }
    };
    var sel='monthly';
    function renderPlans(){
      qs('#plans').innerHTML=['monthly','annual'].map(function(k){ var p=PLANS[k];
        return '<button class="plan'+(k===sel?' on':'')+'" data-plan="'+k+'" type="button">'+
          (p.save?'<span class="psave">'+p.save+'</span>':'')+
          '<span class="pradio"></span>'+
          '<span class="pbd"><span class="pname">'+p.name+'</span><span class="pdesc">'+p.desc+'</span></span>'+
          '<span class="pright"><span class="pprice">'+p.price+'</span><br/><span class="pper">'+p.per+'</span></span>'+
          '</button>';
      }).join('');
      qs('#fineSub').textContent=PLANS[sel].fine;
      document.querySelectorAll('.plan').forEach(function(b){ b.addEventListener('click', function(){ sel=b.dataset.plan; SFX('tick'); try{if(navigator.vibrate)navigator.vibrate(8);}catch(e){} renderPlans(); }); });
    }
    renderPlans();

    // ── unlock loader ──
    var UNLOCKS=['Confirming your membership','Unlocking your dashboard','Activating daily quests','Calibrating your 6 life stats','Waking your AI coach','Unlocking streaks & rewards','Forging your first chest','Welcome to CORE'];
    var CHK='<svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 11-12"/></svg>';
    function buildLoader(){ qs('#ulList').innerHTML=UNLOCKS.map(function(t,i){ return '<div class="ul-step" data-i="'+i+'"><span class="uic"><span class="pdot"></span></span><span class="utx">'+t+'</span></div>'; }).join(''); }
    function paintStep(i){
      var steps=document.querySelectorAll('.ul-step');
      steps.forEach(function(el,idx){ var ic=el.querySelector('.uic'); el.classList.remove('done','current');
        if(idx<i){ el.classList.add('done'); ic.innerHTML=CHK; }
        else if(idx===i){ el.classList.add('current'); ic.innerHTML=(idx===UNLOCKS.length-1)?CHK:'<span class="cspin"></span>'; }
        else { ic.innerHTML='<span class="pdot"></span>'; } });
      var list=qs('#ulList'), cur=steps[i]; if(list&&cur){ list.style.transform='translateY(-'+(cur.offsetTop+cur.offsetHeight/2)+'px)'; }
    }
    function runLoader(done){
      var wrap=qs('#ulWrap'); buildLoader(); wrap.classList.add('on'); var i=0; paintStep(0);
      try{ if(navigator.vibrate) navigator.vibrate(12); }catch(e){}
      var step=function(){ SFX(i===UNLOCKS.length-1?'reward':'tick'); paintStep(i); i++;
        if(i<UNLOCKS.length){ setTimeout(step,1050); } else { setTimeout(function(){ paintStep(UNLOCKS.length-1); setTimeout(done,1200); },200); } };
      setTimeout(step,350);
    }

    function activateMembership(){
      try{ localStorage.setItem('coreSubscribed','1'); localStorage.setItem('coreSubscribedPlan',sel); localStorage.setItem('coreSubscribedAt',String(Date.now())); }catch(e){}
      try{ if(window.coreAccounts&&window.coreAccounts.updateCurrent){ window.coreAccounts.updateCurrent(function(acc){ acc.subscribed=true; acc.subscriptionPlan=sel; acc.subscribedAt=Date.now(); }); } }catch(e){}
      try{ if(window.coreState&&window.coreState.setCorePlus) window.coreState.setCorePlus(true); }catch(e){}
      try{ if(window.coreTrack) coreTrack('subscription_started',{plan:sel,trial:true}); }catch(e){}
    }

    var paying=false;
    qs('#ctaBtn').addEventListener('click', function(){
      if(paying) return; paying=true;
      var btn=qs('#ctaBtn'); btn.classList.add('busy'); btn.querySelector('.lbl').textContent='Confirming…';
      SFX('confirm'); try{if(navigator.vibrate)navigator.vibrate(18);}catch(e){}
      setTimeout(function(){ activateMembership(); runLoader(function(){ window.location.href='20-dashboard.html'; }); }, 1400);
    });

    qs('#restoreBtn').addEventListener('click', function(){
      SFX('tick'); var subbed=false;
      try{ if(window.coreAccounts&&window.coreAccounts.currentSync){ var a=window.coreAccounts.currentSync(); subbed=!!(a&&a.subscribed); } }catch(e){}
      if(subbed){ try{ localStorage.setItem('coreSubscribed','1'); }catch(e){} window.location.href='20-dashboard.html'; return; }
      window.location.href='04-sign-in.html?return=10-subscribe.html';
    });
  })();
  </script>
</body>
</html>
