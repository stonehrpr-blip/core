<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#07071A">
<title>Strength · CORE</title>
<link rel="stylesheet" href="_lib/stat-kit.css">
<style>
  html,body{margin:0;min-height:100%;background:#050510;}
  body{overflow-x:hidden;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;}
</style>
</head>
<body>
<div id="app"></div>
<script src="_lib/core-state.js"></script>
<script src="_lib/stat-kit.js"></script>
<script>
StatKit.mount(document.getElementById('app'), {
  key: 'strength', model: 'body', name: 'Strength', sub: 'Body', color: '#FF6B6B',
  greet: "Let's build something.",
  states: [{ min: 80, label: 'Peak' }, { min: 60, label: 'Strong' }, { min: 35, label: 'Building' }, { min: 0, label: 'Dormant' }],
  actions: [
    { id: 'pushups', name: 'Push-ups', unit: 'reps', step: 5, def: 20, gain: 3, icon: '<path d="M3 16v2M3 16a2 2 0 0 1 2-2h2l3-3h4l3 3h2a2 2 0 0 1 2 2v2"/><circle cx="8" cy="6" r="2"/>' },
    { id: 'squats', name: 'Squats', unit: 'reps', step: 5, def: 25, gain: 3, icon: '<circle cx="12" cy="4.5" r="2"/><path d="M9 21v-4l-2-3 1-5h6l1 5-2 3v4"/>' },
    { id: 'pullups', name: 'Pull-ups', unit: 'reps', step: 2, def: 8, gain: 4, icon: '<path d="M4 5h16"/><path d="M8 5v2.5M16 5v2.5"/><circle cx="12" cy="11" r="2"/><path d="M12 13v4M9 21l3-4 3 4"/>' },
    { id: 'workout', name: 'Workout', unit: 'min', step: 5, def: 30, gain: 5, icon: '<path d="M6 8v8M3 10v4M18 8v8M21 10v4M6 12h12"/>' }
  ],
  scan: { label: 'Rep Scanner', unit: 'reps', act: 'pushups' }
});
</script>
</body>
</html>
