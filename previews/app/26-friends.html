<style>
  :root { --bg-base:#040408; --bg-card:rgba(255,255,255,0.022); --bg-card-2:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.07); --text:#ffffff; --muted:rgba(255,255,255,0.72); --dim:rgba(255,255,255,0.45); --accent:#AEB6C4; --grad-a:#AEB6C4; --grad-b:#AEB6C4; --good:rgba(255,255,255,0.72); --danger:#FF6B6B; }
  * { box-sizing:border-box; } html,body{ margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#000; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }

  .frame { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }
  .hdr { display:flex; align-items:center; gap:12px; padding:2px 18px 10px; }
  .back { width:38px; height:38px; border-radius:50%; border:none; background:rgba(255,255,255,0.06); color:var(--text); display:flex; align-items:center; justify-content:center; text-decoration:none; flex:none; } .back svg{ width:19px; height:19px; }
  .hdr .ttl { font-size:19px; font-weight:900; } .hdr .sub{ font-size:11px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); }

  /* your id card */

  .btn svg{ width:16px; height:16px; } .btn:active{ transform:scale(.98); } .btn.primary{ background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); border-color:transparent; color:#fff; } .btn.ok{ color:var(--good); border-color:rgba(52,211,153,.4); }

  .fr .rm{ flex:none; width:34px; height:34px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.03); color:var(--dim); cursor:pointer; display:flex; align-items:center; justify-content:center; } .fr .rm svg{ width:16px; height:16px; } .fr .rm.arm{ color:var(--danger); border-color:rgba(255,107,107,.4); }

  .cmp .grab{ width:42px; height:5px; border-radius:999px; background:rgba(255,255,255,0.18); margin:2px auto 14px; }

  .cmprow .cbar{ display:flex; height:9px; border-radius:999px; overflow:hidden; background:rgba(0,0,0,.4); } .cmprow .cyou{ width:50%; background:#AEB6C4; transition:width .9s cubic-bezier(.2,.85,.25,1); } .cmprow .cthem{ width:50%; background:rgba(255,255,255,0.22); transition:width .9s cubic-bezier(.2,.85,.25,1); }
  .cmprow .cnums{ display:flex; justify-content:space-between; font-size:11px; font-weight:900; margin-top:5px; font-variant-numeric:tabular-nums; } .cmprow .cnums .ny{ color:#5BAAFF; } .cmprow .cnums .nt{ color:var(--muted); }
  .cmp .cclose{ margin-top:8px; width:100%; min-height:46px; border-radius:14px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font:inherit; font-size:14px; font-weight:800; cursor:pointer; } .cmp .cclose:active{ transform:scale(.99); }
  .cmp .note{ text-align:center; font-size:10.5px; color:var(--dim); margin-top:12px; }

  /* ── friend card (their card, your eyes) ── */
  .cmp .fcard{ position:relative; border-radius:18px; padding:16px 16px 15px; margin-bottom:16px; text-align:center; overflow:hidden;
    background:radial-gradient(120% 70% at 50% 0%, color-mix(in srgb,var(--fc,#AEB6C4) 16%,transparent), transparent 62%), linear-gradient(180deg, color-mix(in srgb,var(--fc,#AEB6C4) 6%,rgba(255,255,255,.03)), rgba(255,255,255,.01));
    border:1.5px solid color-mix(in srgb,var(--fc,#AEB6C4) 38%,transparent); box-shadow:0 18px 50px rgba(0,0,0,.5); }
  .cmp .fcard .gem{ width:92px; height:92px; margin:2px auto 8px; color:var(--fc,#AEB6C4); } .cmp .fcard .gem img, .cmp .fcard .gem svg{ width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 3px 10px rgba(0,0,0,.5)) drop-shadow(0 0 9px color-mix(in srgb,var(--fc,#AEB6C4) 35%,transparent)); }
  .cmp .fcard .frk{ font-size:22px; font-weight:900; color:var(--text); letter-spacing:.01em; } .cmp .fcard .fid{ font-size:11px; font-weight:800; color:var(--muted); letter-spacing:.04em; margin-top:3px; font-variant-numeric:tabular-nums; }
  .cmp .fcard .fpw{ display:inline-block; margin-top:9px; font-size:11.5px; font-weight:900; padding:5px 13px; border-radius:999px; background:rgba(0,0,0,.32); border:1px solid var(--border); color:var(--text); letter-spacing:.03em; }
  .cmp .fcard .fstats{ display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:13px; }
  .cmp .fcard .fs2{ background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:10px; padding:7px 6px; } .cmp .fcard .fs2 .v{ font-size:14px; font-weight:900; color:var(--mc,rgba(255,255,255,0.72)); line-height:1; font-variant-numeric:tabular-nums; } .cmp .fcard .fs2 .k{ font-size:7px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--dim); margin-top:4px; }

  /* ── leaderboard ── */
  .lbrow{ display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:14px; background:var(--bg-card); border:1px solid var(--border); margin-bottom:8px; }
  .lbrow.you{ border-color:rgba(10,132,255,.5); background:linear-gradient(135deg,rgba(10,132,255,.13),rgba(255,255,255,.02)); }
  .lbrow .pos{ width:26px; text-align:center; font-size:14px; font-weight:900; color:var(--dim); font-variant-numeric:tabular-nums; } .lbrow .pos .medal{ display:inline-flex; align-items:center; justify-content:center; } .lbrow .pos .medal svg{ width:18px; height:18px; }
  .lbrow .lav{ width:34px; height:34px; flex:none; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:#fff; background:linear-gradient(150deg,var(--c1,#3A4055),var(--c2,#2A2F40)); }
  .lbrow .lbb{ flex:1; min-width:0; } .lbrow .lbn{ font-size:13.5px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-variant-numeric:tabular-nums; } .lbrow .lbr{ font-size:11px; color:var(--muted); margin-top:1px; }
  .lbrow .lbp{ font-size:16px; font-weight:900; color:var(--accent); font-variant-numeric:tabular-nums; text-align:right; } .lbrow .lbp small{ display:block; font-size:7.5px; font-weight:800; letter-spacing:.06em; color:var(--dim); }

  .nav { position:absolute; left:0; right:0; bottom:0; z-index:50; padding:10px 12px 26px; display:flex; justify-content:space-around; align-items:flex-end; background:linear-gradient(180deg, rgba(5,6,14,0) 0%, rgba(5,6,14,0.88) 34%, #04040c 100%); backdrop-filter:blur(14px); }
  .nav a{ display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 8px; min-width:48px; min-height:44px; text-decoration:none; color:var(--dim); } .nav svg{ width:23px; height:23px; } .nav .nl{ font-size:10px; font-weight:800; }
  .nav .item.active{ color:var(--text); } .nav .item.active svg{ color:var(--accent); }
  .toast{ position:absolute; left:50%; bottom:100px; transform:translateX(-50%) translateY(14px); z-index:90; background:rgba(20,22,34,0.96); border:1px solid var(--border); border-radius:14px; padding:11px 16px; font-size:13px; font-weight:700; opacity:0; pointer-events:none; transition:.3s; } .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    };
    function statSvg(path,size){ return '<svg viewBox="0 0 24 24" width="'+(size||14)+'" height="'+(size||14)+'" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+(path||'')+'</svg>'; }
    var S=window.coreState||{}; var STAT_DEFS=S.STAT_DEFS||[]; var RANKS_L=S.RANKS||[];

    // Friends have no live backend yet, so derive STABLE pseudo-stats from the ID hash.
    // Same ID always yields the same profile — clearly illustrative (noted in the sheet).
    function hashStr(s){ var h=2166136261>>>0; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619)>>>0; } return h>>>0; }
    var realProfiles={}; // filled by coreSocial.fetchProfiles when the backend + migration are live
    function friendProfile(id){ if(realProfiles[id]) return realProfiles[id]; var h=hashStr(id), stats={}, sum=0;
      STAT_DEFS.forEach(function(d,k){ var v=35+((h>>>((k*5)%27))%61); stats[d.key]=v; sum+=v; }); // >>> unsigned: keeps modulo positive
      var power=STAT_DEFS.length?Math.round(sum/STAT_DEFS.length):0;
      var idx=Math.max(0, Math.min(RANKS_L.length-1, Math.floor((power/101)*RANKS_L.length)));
      var rank=(RANKS_L.length&&RANKS_L[idx])?RANKS_L[idx].name:'Player';
      return { stats:stats, power:power, rank:rank }; }

    function powerRank(power){ var idx=Math.max(0,Math.min(RANKS_L.length-1,Math.floor((power/101)*RANKS_L.length))); return (RANKS_L.length&&RANKS_L[idx])?RANKS_L[idx].name:'Player'; }
    function renderLeaderboard(){ var fr=pjson('coreFriends',[]); var sec=qs('#lbSec'), host=qs('#lb'); if(!host) return;
      if(!fr.length){ if(sec) sec.style.display='none'; host.innerHTML=''; return; }
      if(sec) sec.style.display='';
      var myPow=Math.round(STAT_DEFS.reduce(function(a,d){ return a+Math.round((S.statValue&&S.statValue(d.key))||0); },0)/(STAT_DEFS.length||1));
      var rows=[{id:pid,you:true,power:myPow,rank:powerRank(myPow),ini:'YOU'}];
      fr.forEach(function(id){ var p=friendProfile(id); rows.push({id:id,you:false,power:p.power,rank:p.rank,ini:(id.replace('CORE-','')[0]||'C')}); });
      rows.sort(function(a,b){ return b.power-a.power; });
      // monochrome medal icons (gold/silver/bronze) for the top 3 \u2014 no emoji
      function medalSvg(col){ return '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 3l3.5 6 3.5-6"/><circle cx="12" cy="15.5" r="5.5"/><path d="M12 13l.9 1.8 2 .3-1.45 1.4.35 2-1.8-.95-1.8.95.35-2L9.1 15.1l2-.3z"/></svg>'; }
      var medals=[medalSvg('#ffffff'),medalSvg('rgba(255,255,255,0.72)'),medalSvg('#6B7186')];
      host.innerHTML=rows.map(function(r,i){ var c=r.you?['#AEB6C4','#AEB6C4']:COL[(i+1)%COL.length]; var pos=medals[i]?'<span class="medal">'+medals[i]+'</span>':(i+1);
        return '<div class="lbrow'+(r.you?' you':'')+'"><div class="pos">'+pos+'</div><div class="lav" style="--c1:'+c[0]+';--c2:'+c[1]+'">'+r.ini+'</div><div class="lbb"><div class="lbn">'+(r.you?'You':r.id)+'</div><div class="lbr">'+r.rank+'</div></div><div class="lbp">'+r.power+'<small>POWER</small></div></div>'; }).join('');
    }
    function render(){
      var fr=pjson('coreFriends',[]);
      qs('#frCount').textContent=fr.length+' friend'+(fr.length===1?'':'s');
      renderLeaderboard();
      var host=qs('#list');
      if(!fr.length){ host.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="8" r="3.5"/><path d="M2 21a7 7 0 0 1 14 0M17 7a3.5 3.5 0 0 1 0 7M22 21a6 6 0 0 0-4-5.6"/></svg><div class="t">No friends yet</div><div class="s">Share your Player ID or add a friend by theirs.</div></div>'; return; }
      host.innerHTML=fr.map(function(id,i){ var c=COL[i%COL.length]; var ini=(id.replace('CORE-','')[0]||'C'); var p=friendProfile(id);
        return '<div class="fr" data-cid="'+id+'" role="button" tabindex="0" aria-label="Compare with '+id+'"><div class="av" style="--c1:'+c[0]+';--c2:'+c[1]+'">'+ini+'</div><div class="fb"><div class="fn">'+id+'</div><div class="fs">'+p.rank+' · <span class="fpow">'+p.power+'</span> Power</div></div><span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></span><button class="rm" data-id="'+id+'" aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>'; }).join('');
      host.querySelectorAll('.fr').forEach(function(row){
        row.addEventListener('click', function(e){ if(e.target.closest('.rm')) return; openCompare(row.dataset.cid); });
        row.addEventListener('keydown', function(e){ if((e.key==='Enter'||e.key===' ')&&!e.target.closest('.rm')){ e.preventDefault(); openCompare(row.dataset.cid); } });
      });
      host.querySelectorAll('.rm').forEach(function(b){ var armed=false,rt; b.addEventListener('click', function(e){ e.stopPropagation();
        if(!armed){ armed=true; b.classList.add('arm'); clearTimeout(rt); rt=setTimeout(function(){ armed=false; b.classList.remove('arm'); },2500); toast('Tap again to remove'); return; }
        var arr=pjson('coreFriends',[]).filter(function(x){return x!==b.dataset.id;}); pset('coreFriends',JSON.stringify(arr)); toast('Removed'); render(); }); });
    }
    // you-vs-friend stat comparison
    function openCompare(id){ if(!STAT_DEFS.length){ toast('Stats unavailable'); return; }
      var fp=friendProfile(id), ini=(id.replace('CORE-','')[0]||'F'), myWins=0, total=STAT_DEFS.length, myAvg=0, thAvg=0;
      // friend's-eye card: their rank gem + 6 stats, exactly like your own card
      var fc=qs('#cmpCard');
      if(fc){
        var fcol='#AEB6C4';
        fc.style.setProperty('--fc',fcol);
        fc.innerHTML='<div class="gem">'+(function(){var G=window.coreGems;if(!G)return '';var f=G.img||G.svg;return f?f.call(G,fp.rank||'Sand',{tier:3}):'';})()+'</div>'+
          '<div class="frk">'+fp.rank+'</div><div class="fid">'+id+'</div>'+
          '<div class="fpw">'+fp.power+' CORE POWER</div>'+
          '<div class="fstats">'+STAT_DEFS.map(function(d){ return '<div class="fs2" style="--mc:rgba(255,255,255,0.72)"><div class="v">'+(fp.stats[d.key]||0)+'</div><div class="k">'+d.name+'</div></div>'; }).join('')+'</div>'; }
      var rows=STAT_DEFS.map(function(d){
        var you=Math.round((S.statValue&&S.statValue(d.key))||0), them=fp.stats[d.key]||0; myAvg+=you; thAvg+=them;
        var win = you>them?'you':(them>you?'them':'tie'); if(win==='you') myWins++;
        var sum=(you+them)||1, yw=Math.round(you/sum*100), tw=100-yw;
        var ico=statSvg(d.icon||STAT_ICON[d.key]||'',14);
        var lbl= win==='you'?'<span class="cwin you">YOU</span>':(win==='them'?'<span class="cwin them">THEM</span>':'<span class="cwin tie">TIE</span>');
        return '<div class="cmprow" style="--tc:rgba(255,255,255,0.72)"><div class="ch"><span class="cemo">'+ico+'</span><span class="cnm">'+d.name+'</span>'+lbl+'</div>'+
          '<div class="cbar"><div class="cyou" data-w="'+yw+'"></div><div class="cthem" data-w="'+tw+'"></div></div>'+
          '<div class="cnums"><b class="ny">You '+you+'</b><b class="nt">'+them+' Them</b></div></div>'; }).join('');
      myAvg=Math.round(myAvg/total); thAvg=Math.round(thAvg/total);
      qs('#cmpRows').innerHTML=rows;
      qs('#cmpThemAv').textContent=ini; qs('#cmpThemNm').textContent=id;
      qs('#cmpYouPw').textContent='CORE Power '+myAvg; qs('#cmpThemPw').textContent='CORE Power '+thAvg;
      var loss=total-myWins-STAT_DEFS.filter(function(d){ return Math.round((S.statValue&&S.statValue(d.key))||0)===(fp.stats[d.key]||0); }).length;
      var v = myWins>loss ? 'You lead <b>'+myWins+' of '+total+'</b> stats' : (myWins<loss ? 'They lead <b>'+loss+' of '+total+'</b> stats' : 'Neck and neck — <b>'+myWins+'/'+total+'</b>');
      qs('#cmpVerdict').innerHTML=v;
      var c=qs('#cmp'); c.classList.add('open');
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ c.querySelectorAll('.cyou,.cthem').forEach(function(el){ el.style.width=(el.getAttribute('data-w')||50)+'%'; }); }); }); }
    function closeCompare(){ qs('#cmp').classList.remove('open'); }
    qs('#cmpScrim').addEventListener('click', closeCompare); qs('#cmpClose').addEventListener('click', closeCompare);

    qs('#copyId').addEventListener('click', function(){ var b=this; copyText(pid,function(){ inlineOk(b,'Copied'); }); });
    qs('#shareId').addEventListener('click', function(){ var txt='Add me on CORE: '+pid+'.'; if(navigator.share){ navigator.share({text:txt}).catch(function(){}); } else { var b=this; copyText(txt,function(){ inlineOk(b,'Copied'); }); } });
    function add(){ var inp=qs('#addInput'), v=(inp.value||'').trim().toUpperCase(); if(!v){ inp.focus(); return; } if(v===pid){ toast("That's your own ID"); return; } var fr=pjson('coreFriends',[]); if(fr.indexOf(v)>=0){ toast('Already added'); inp.value=''; return; } fr.push(v); pset('coreFriends',JSON.stringify(fr)); inp.value='';
      // Social stat source — grant once per unique friend (anti-farm), capped via coreSocialRewarded.
      var granted=false; try{ var rew=pjson('coreSocialRewarded',[]); if(rew.indexOf(v)<0){ rew.push(v); pset('coreSocialRewarded',JSON.stringify(rew)); if(window.coreState&&coreState.addStat){ coreState.addStat('social',2,'friend-added'); granted=true; } } }catch(e){}
      toast(granted?'Friend added · +2 Social':'Friend added'); try{ if(window.coreSfx) coreSfx('confirm'); }catch(e){}
      try{window.coreState.syncProgress();}catch(e){} render(); }
    qs('#addBtn').addEventListener('click', add);
    qs('#addInput').addEventListener('keydown', function(e){ if(e.key==='Enter') add(); });

    // preview seeding: ?demo=1 populates sample friends so the list + comparison are visible
    try{ if(/[?&]demo=1/.test(location.search)){ if(S.seedDemo) S.seedDemo(); if(!pjson('coreFriends',[]).length){ pset('coreFriends',JSON.stringify(['CORE-K7Q2-9XMP','CORE-B3FW-RT81','CORE-Z9LC-4HVD'])); } } }catch(e){}

    render();
    // Progressive enhancement: pull REAL friend cards (no-op until migration 0003 + auth),
    // then re-render so derived stats upgrade in place. Also publish our own card.
    function refreshReal(){ if(!window.coreSocial||!coreSocial.ready()) return; var ids=pjson('coreFriends',[]); if(!ids.length) return;
      coreSocial.fetchProfiles(ids).then(function(map){ var ks=Object.keys(map||{}); if(ks.length){ ks.forEach(function(k){ realProfiles[k]=map[k]; }); render(); } }); }
    function publishMine(){ if(!window.coreSocial||!coreSocial.ready()) return;
      try{ var defs=STAT_DEFS, st={}; defs.forEach(function(d){ st[d.key]=Math.round((S.statValue&&S.statValue(d.key))||0); });
        var pow=Math.round(defs.reduce(function(a,d){return a+st[d.key];},0)/(defs.length||1));
        var xp=(S.read&&S.read().xp)||0; var lvl=(S.levelFor&&S.levelFor(xp))||1;
        coreSocial.publishMe({ playerId:pid, name:'', power:pow, rank:powerRank(pow), xp:xp, level:lvl, stats:st }); }catch(e){} }
    refreshReal(); publishMine();
    // screenshot/deep-link hook: ?cmp=1 opens the first friend, ?cmp=CORE-XXXX-XXXX opens that one
    try{ var cm=location.search.match(/[?&]cmp=([^&]+)/); if(cm){ var arr=pjson('coreFriends',[]); var who=cm[1]==='1'?arr[0]:decodeURIComponent(cm[1]); if(who) openCompare(who); } }catch(e){}
  })();
  </script>
