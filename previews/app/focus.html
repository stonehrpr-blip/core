<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#07071A">
<title>Focus · CORE</title>
<link rel="stylesheet" href="_lib/stat-kit.css">
<style>
  html,body{margin:0;min-height:100%;background:#050510;}
  body{overflow-x:hidden;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;}
</style>
</head>
<body>
<div id="app"></div>
<script src="_lib/core-state.js"></script>
<script src="_lib/stat-kit.js"></script>
<script>
StatKit.mount(document.getElementById('app'), {
  key: 'focus', model: 'brain', name: 'Focus', sub: 'Brain', color: '#4A8FFF',
  greet: 'Sharpen your mind.',
  states: [{ min: 80, label: 'Locked in' }, { min: 60, label: 'Sharp' }, { min: 35, label: 'Warming up' }, { min: 0, label: 'Scattered' }],
  actions: [
    { id: 'deepwork', name: 'Deep work', unit: 'min', step: 15, def: 60, gain: 5, icon: '<rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12l3 3 5-6"/>' },
    { id: 'read', name: 'Read', unit: 'min', step: 10, def: 30, gain: 3, icon: '<path d="M3 5s3-1.5 9-1.5S21 5 21 5v13s-3-1.5-9-1.5S3 18 3 18z"/><path d="M12 4.5V17"/>' },
    { id: 'meditate', name: 'Meditate', unit: 'min', step: 5, def: 10, gain: 3, icon: '<circle cx="12" cy="7" r="2.5"/><path d="M5 20c1-5 5-6 7-6s6 1 7 6"/>' },
    { id: 'nophone', name: 'Phone-free', unit: 'min', step: 15, def: 30, gain: 2, icon: '<rect x="7" y="3" width="10" height="18" rx="2"/><path d="M4 4l16 16"/>' }
  ]
});
</script>
</body>
</html>
