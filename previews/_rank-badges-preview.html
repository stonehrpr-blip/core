<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CORE — New rank badges preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{min-height:100vh;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
  .phone{position:relative;width:390px;height:844px;background:#040408;border-radius:56px;overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:60;}
  .frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:54px 0 0;}
  .hdr{padding:2px 20px 12px;}
  .hdr .ttl{font-size:20px;font-weight:900;letter-spacing:-.3px;}
  .hdr .sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;}
  .scroll{flex:1;overflow-y:auto;padding:6px 16px 40px;scrollbar-width:none;}
  .scroll::-webkit-scrollbar{display:none;}
  .tier{margin:18px 4px 10px;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px 10px;border-radius:16px;
    background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);}
  .cell img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));}
  .cell .lbl{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:-.1px;}
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="frame">
      <div class="hdr">
        <div class="ttl">New rank badges</div>
        <div class="sub">Wood → Core · 10 tiers × I/II/III · cropped &amp; centered</div>
      </div>
      <div class="scroll" id="scroll"></div>
    </div>
    <div class="home-indicator"></div>
  </div>
  <script>
    var TIERS = ['wood','silver','fire','water','earth','ice','lightning','dark','light','core'];
    var LABELS = {wood:'Wood',silver:'Silver',fire:'Fire',water:'Water',earth:'Earth',ice:'Ice',lightning:'Lightning',dark:'Dark',light:'Light',core:'Core'};
    var GRADE = ['I','II','III'];
    var wrap = document.getElementById('scroll');
    TIERS.forEach(function(t){
      var h = document.createElement('div');
      h.className = 'tier';
      h.textContent = LABELS[t];
      wrap.appendChild(h);
      var grid = document.createElement('div');
      grid.className = 'grid';
      for (var g = 1; g <= 3; g++) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerHTML = '<img src="assets/ranks/' + t + '-' + g + '.png" alt="' + LABELS[t] + ' ' + GRADE[g-1] + '">' +
          '<div class="lbl">' + LABELS[t] + ' ' + GRADE[g-1] + '</div>';
        grid.appendChild(cell);
      }
      wrap.appendChild(grid);
    });
  </script>
</body>
</html>
