<!doctype html>
<html lang="en">
<head>
<script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Muscle</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root{
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.022); --border:rgba(255,255,255,0.07);
    --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
    --accent:#0A84FF; --grad-a:#0A84FF; --grad-b:#0A84FF; --grad-c:#0A84FF; --good:#0A84FF; --str:#0A84FF; --str2:#0A84FF;
    --m-chest:#0A84FF; --m-back:#0A84FF; --m-shoulders:#0A84FF; --m-arms:#0A84FF; --m-legs:#0A84FF; --m-core:#0A84FF;
    --mc:#0A84FF;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{ min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone{ position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38; }
  .notch{ position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.5); border-radius:999px; z-index:60; }
  .bg{ position:absolute; inset:0; z-index:0; background:
      radial-gradient(60% 30% at 50% 3%, color-mix(in srgb,var(--mc) 11%,transparent) 0%, transparent 60%),
      linear-gradient(180deg,#060610 0%,#02020A 55%,#050510 100%); }
  .frame{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }

  .top{ display:flex; align-items:center; gap:12px; padding:8px 18px 10px; }
  .back{ width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text); font-size:20px; cursor:pointer; flex:none; }
  .top .tt{ flex:1; } .top h1{ margin:0; font-size:24px; font-weight:800; letter-spacing:-0.8px; }
  .top .ts{ font-size:11px; color:var(--muted); margin-top:2px; }
  .top .orb{ width:46px; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex:none;
    background:color-mix(in srgb,var(--mc) 16%,#0c0c16); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--mc) 40%,transparent); }

  .lvlrow{ margin:0 18px 8px; }
  .lvlrow .lt{ display:flex; justify-content:space-between; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:5px; }
  .lvlrow .bar{ height:7px; border-radius:999px; background:rgba(255,255,255,0.07); overflow:hidden; }
  .lvlrow .bar i{ display:block; height:100%; background:var(--mc); border-radius:999px; transition:width .8s ease; }

  .scroll{ flex:1; overflow-y:auto; padding:6px 18px 150px; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar{ display:none; }

  .grp{ margin-bottom:18px; }
  .grphead{ display:flex; align-items:center; gap:8px; margin:2px 2px 10px; }
  .grphead .gk{ font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--mc); font-weight:800; }
  .grphead .gl{ flex:1; height:1px; background:var(--border); }
  .grphead .gc{ font-size:10px; color:var(--dim); }

  .excard{ display:flex; gap:12px; align-items:center; background:var(--bg-card); border:1px solid var(--border); border-radius:18px; padding:11px; margin-bottom:10px; }
  .exthumb{ width:58px; height:58px; flex:none; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; position:relative; overflow:hidden;
    background:color-mix(in srgb,var(--mc) 14%,#0c0c16); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--mc) 26%,transparent); }
  .exmeta{ flex:1; min-width:0; } .exmeta .en{ font-size:14px; font-weight:700; letter-spacing:-0.3px; }
  .erow{ display:flex; align-items:center; gap:7px; margin-top:5px; }
  .diff{ font-size:9px; font-weight:800; letter-spacing:0.6px; text-transform:uppercase; padding:3px 7px; border-radius:6px; }
  .diff.easy{ color:var(--muted); background:rgba(255,255,255,0.05); } .diff.medium{ color:#C2C8DC; background:rgba(255,255,255,0.07); } .diff.hard{ color:var(--text); background:rgba(255,255,255,0.10); }
  .esets{ font-size:10.5px; color:var(--dim); }
  .exbtns{ display:flex; flex-direction:column; gap:6px; flex:none; }
  .minib{ font-size:11px; font-weight:700; padding:7px 11px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text); cursor:pointer; white-space:nowrap; transition:transform .12s; }
  .minib:active{ transform:scale(0.95); }
  .minib.form{ border-color:color-mix(in srgb,var(--accent) 40%,transparent); color:var(--accent); }
  .minib.add{ background:var(--accent); border-color:transparent; color:#fff; }
  .minib.add.in{ background:color-mix(in srgb,var(--accent) 16%,transparent); border-color:color-mix(in srgb,var(--accent) 40%,transparent); color:var(--accent); }

  .sechead{ display:flex; align-items:center; justify-content:space-between; margin:6px 2px 10px; }
  .sechead .kick{ font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); font-weight:800; }
  .sechead .hint{ font-size:11px; color:var(--dim); }
  .empty{ text-align:center; color:var(--dim); font-size:12.5px; padding:22px 12px; border:1px dashed var(--border); border-radius:18px; }
  .witem{ background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:12px 13px; margin-bottom:9px; }
  .wtop{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .wtop .wn{ font-size:13.5px; font-weight:700; } .wtop .wn small{ display:block; font-size:9.5px; color:var(--muted); font-weight:600; margin-top:2px; text-transform:uppercase; letter-spacing:0.8px; }
  .wdel{ background:none; border:none; color:var(--dim); font-size:18px; cursor:pointer; padding:2px 6px; }
  .steppers{ display:flex; gap:8px; margin-top:11px; }
  .stp{ flex:1; background:rgba(0,0,0,0.28); border:1px solid var(--border); border-radius:12px; padding:7px 6px; text-align:center; }
  .stp .slbl{ font-size:8.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.9px; font-weight:700; }
  .stp .sctrl{ display:flex; align-items:center; justify-content:space-between; margin-top:5px; }
  .stp button{ width:24px; height:24px; border-radius:8px; border:1px solid var(--border); background:rgba(255,255,255,0.06); color:var(--text); font-size:15px; cursor:pointer; transition:transform .1s; }
  .stp button:active{ transform:scale(0.9); } .stp .sval{ font-size:15px; font-weight:800; font-variant-numeric:tabular-nums; min-width:34px; }

  .startbar{ position:absolute; left:0; right:0; bottom:0; z-index:30; padding:14px 18px 30px; background:linear-gradient(180deg,transparent,#02020A 38%); }
  .bigbtn{ width:100%; border:none; border-radius:18px; padding:17px; font-size:16px; font-weight:800; cursor:pointer; color:#fff; background:var(--accent); box-shadow:0 12px 30px rgba(10,132,255,0.30); transition:transform .12s, opacity .2s; display:flex; align-items:center; justify-content:center; gap:9px; }
  .bigbtn:active{ transform:scale(0.97); } .bigbtn:disabled{ opacity:0.4; box-shadow:none; }
  .bigbtn.str{ background:var(--accent); box-shadow:0 12px 30px rgba(10,132,255,0.30); color:#fff; }

  /* modals */
  .scrim{ position:absolute; inset:0; z-index:70; background:rgba(2,2,10,0.62); backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:opacity .28s; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:71; background:#0E0E1B; border-top-left-radius:30px; border-top-right-radius:30px; border-top:1px solid rgba(255,255,255,0.09); transform:translateY(102%); transition:transform .42s cubic-bezier(.16,1,.3,1); max-height:92%; display:flex; flex-direction:column; }
  .sheet.show{ transform:translateY(0); }
  .grab{ width:40px; height:5px; border-radius:999px; background:rgba(255,255,255,0.18); margin:11px auto 4px; flex:none; }
  .sheetbody{ overflow-y:auto; padding:6px 20px 26px; } .sheetbody::-webkit-scrollbar{ display:none; }

  .formhero{ position:relative; border-radius:18px; overflow:hidden; aspect-ratio:16/10; background:#07070f; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
  .repfig{ width:60%; height:78%; }
  .badgeloop{ position:absolute; top:9px; left:9px; font-size:9px; font-weight:800; letter-spacing:1px; text-transform:uppercase; padding:4px 8px; border-radius:7px; background:rgba(0,0,0,0.5); color:#fff; display:flex; gap:5px; align-items:center; }
  .badgeloop .dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.4s infinite; } @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.3;} }
  .formtitle{ font-size:21px; font-weight:800; letter-spacing:-0.6px; margin:15px 0 3px; } .formsub{ font-size:11.5px; color:var(--muted); margin-bottom:14px; }
  .tips{ display:flex; flex-direction:column; gap:9px; margin-bottom:16px; }
  .tip{ display:flex; gap:10px; align-items:flex-start; background:var(--bg-card); border:1px solid var(--border); border-radius:13px; padding:11px 12px; }
  .tip .tnum{ width:20px; height:20px; flex:none; border-radius:50%; background:color-mix(in srgb,var(--accent) 16%,transparent); border:1px solid color-mix(in srgb,var(--accent) 40%,transparent); color:var(--accent); font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .tip .tt{ font-size:12.5px; line-height:1.45; color:#E7ECF6; }
  .yt{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border-radius:14px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text); font-size:13px; font-weight:700; cursor:pointer; text-decoration:none; transition:transform .12s; } .yt:active{ transform:scale(0.97); }

  .sessTop{ display:flex; align-items:center; justify-content:space-between; padding:2px 2px 14px; }
  .timer{ font-size:34px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-1px; }
  .sessmeta{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; font-weight:700; }
  .sprog{ height:6px; border-radius:999px; background:rgba(255,255,255,0.08); overflow:hidden; margin-bottom:18px; } .sprog i{ display:block; height:100%; width:0; background:var(--accent); transition:width .4s; }
  .nowcard{ background:var(--bg-card); border:1px solid var(--border); border-radius:22px; padding:22px; text-align:center; }
  .nowcard .nbig{ width:84px; height:84px; margin:0 auto 14px; border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:42px; background:color-mix(in srgb,var(--mc) 16%,#0c0c16); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--mc) 34%,transparent); }
  .nowcard .nname{ font-size:22px; font-weight:800; letter-spacing:-0.5px; } .nowcard .ntgt{ font-size:13px; color:var(--muted); margin-top:6px; } .nowcard .ntgt b{ color:var(--text); }
  .setdots{ display:flex; gap:7px; justify-content:center; margin:16px 0 4px; } .setdots .sd{ width:13px; height:13px; border-radius:50%; border:2px solid var(--border); transition:.2s; } .setdots .sd.done{ background:var(--accent); border-color:var(--accent); }

  .sumhead{ text-align:center; padding:6px 0 4px; } .sumhead .ring{ width:84px; height:84px; margin:4px auto 12px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--accent); background:radial-gradient(circle at 50% 40%, color-mix(in srgb,var(--accent) 26%,transparent), color-mix(in srgb,var(--accent) 4%,transparent)); box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 40%,transparent); animation:pop .5s cubic-bezier(.2,1.4,.4,1) both; } @keyframes pop{ from{transform:scale(0.3); opacity:0;} to{transform:scale(1); opacity:1;} }
  .sumhead h2{ margin:0; font-size:23px; font-weight:800; letter-spacing:-0.6px; } .sumhead p{ margin:5px 0 0; font-size:12.5px; color:var(--muted); }
  .sumstats{ display:flex; gap:8px; margin:18px 0; } .sumstats .sc{ flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:14px 8px; text-align:center; } .sumstats .scn{ font-size:21px; font-weight:800; font-variant-numeric:tabular-nums; } .sumstats .scl{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:3px; font-weight:700; }
  .rewards{ display:flex; gap:10px; margin-bottom:14px; } .rw{ flex:1; border-radius:18px; padding:16px 10px; text-align:center; } .rw.xp{ background:color-mix(in srgb,var(--accent) 14%,transparent); border:1px solid color-mix(in srgb,var(--accent) 40%,transparent); } .rw.st{ background:rgba(255,255,255,0.04); border:1px solid var(--border); } .rw .rv{ font-size:26px; font-weight:800; font-variant-numeric:tabular-nums; } .rw.xp .rv{ color:var(--accent); } .rw.st .rv{ color:var(--text); } .rw .rl{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px; font-weight:700; }
  .glowup{ display:flex; align-items:center; gap:11px; background:color-mix(in srgb,var(--accent) 10%,transparent); border:1px solid color-mix(in srgb,var(--accent) 32%,transparent); border-radius:16px; padding:13px; margin-bottom:16px; }
  .glowup .gdot{ width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--accent); background:color-mix(in srgb,var(--mc) 20%,#0c0c16); }
  .glowup .gt{ font-size:12.5px; } .glowup .gt b{ color:var(--text); }

  .burst{ position:absolute; left:50%; top:40%; transform:translate(-50%,-50%); z-index:90; pointer-events:none; font-size:30px; font-weight:800; color:var(--accent); text-shadow:0 0 18px rgba(10,132,255,0.6); opacity:0; }
  .burst.go{ animation:burst 1.1s ease forwards; } @keyframes burst{ 0%{opacity:0; transform:translate(-50%,-30%) scale(.6);} 25%{opacity:1; transform:translate(-50%,-50%) scale(1.1);} 70%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-120%) scale(1);} }
  .toast{ position:absolute; left:50%; bottom:120px; transform:translateX(-50%) translateY(18px); z-index:95; background:rgba(20,20,34,0.96); border:1px solid var(--border); color:var(--text); font-size:12.5px; font-weight:600; padding:11px 16px; border-radius:13px; opacity:0; pointer-events:none; transition:.3s; } .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .repfig .barbell,.repfig .torso,.repfig .arm{ transform-origin:center; }
  .a-press .barbell{ animation:press 2.2s ease-in-out infinite; } @keyframes press{ 0%,100%{transform:translateY(14px);} 50%{transform:translateY(-12px);} }
  .a-pull .barbell{ animation:pull 2.2s ease-in-out infinite; } @keyframes pull{ 0%,100%{transform:translateY(-14px);} 50%{transform:translateY(10px);} }
  .a-squat .torso{ animation:squat 2.4s ease-in-out infinite; } @keyframes squat{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(16px);} }
  .a-curl .arm{ animation:curl 1.9s ease-in-out infinite; } @keyframes curl{ 0%,100%{transform:rotate(8deg);} 50%{transform:rotate(-58deg);} }
  .a-core .torso{ animation:crunch 2.2s ease-in-out infinite; } @keyframes crunch{ 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(-22deg);} }
  @media (prefers-reduced-motion:reduce){ .repfig *{ animation:none!important; } }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="bg"></div>
    <div class="frame">
      <div class="top">
        <button class="back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M15 6l-6 6 6 6"/></svg></button>
        <div class="tt"><h1 id="mTitle">Muscle</h1><div class="ts" id="mSub">Train this muscle</div></div>
        <div class="orb" id="mOrb"></div>
      </div>
      <div class="lvlrow">
        <div class="lt"><span id="lvlLabel">Untrained</span><span id="lvlScore">0</span></div>
        <div class="bar"><i id="lvlFill" style="width:0%"></i></div>
      </div>

      <div class="scroll">
        <div id="groups"></div>
        <div class="sechead"><span class="kick">Your Workout</span><span class="hint" id="wkHint">empty</span></div>
        <div id="builder"></div>
      </div>

      <div class="startbar"><button class="bigbtn str" id="startBtn" disabled><svg viewBox="0 0 24 24" fill="currentColor" style="width:15px;height:15px"><path d="M7 5l12 7-12 7z"/></svg> Start Workout</button></div>
    </div>

    <div class="scrim" id="formScrim"></div>
    <div class="sheet" id="formSheet"><div class="grab"></div><div class="sheetbody" id="formBody"></div></div>
    <div class="scrim" id="sessScrim"></div>
    <div class="sheet" id="sessSheet"><div class="grab"></div><div class="sheetbody" id="sessBody"></div></div>
    <div class="scrim" id="sumScrim"></div>
    <div class="sheet" id="sumSheet"><div class="grab"></div><div class="sheetbody" id="sumBody"></div></div>

    <div class="burst" id="burst"></div>
    <div class="toast" id="toast"></div>
    <div class="home-indicator"></div>
  </div>

  <script src="_lib/core-sfx.js"></script>
  <script src="_lib/core-state.js"></script>
  <script src="_lib/core-gym-data.js"></script>
  <script src="_lib/core-strength.js"></script>
  <script>
  (function(){
    "use strict";
    var $=function(s,r){ return (r||document).querySelector(s); };
    var S=window.CoreStrength, G=window.CoreGym;
    function sfx(n){ S.sfx(n); } function haptic(){ try{ navigator.vibrate&&navigator.vibrate(8); }catch(e){} }
    function ic(d,s,st){ s=s||14; return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+(st||2)+'" stroke-linecap="round" stroke-linejoin="round" style="width:'+s+'px;height:'+s+'px;vertical-align:-2px">'+d+'</svg>'; }
    function playIc(s){ s=s||13; return '<svg viewBox="0 0 24 24" fill="currentColor" style="width:'+s+'px;height:'+s+'px;vertical-align:-2px"><path d="M7 5l12 7-12 7z"/></svg>'; }
    var GI={
      flame:   ic('<path d="M12 3c1.6 3.6 4 4.6 4 8a4 4 0 0 1-8 0c0-1.3.5-2.1 1-2.7C9 11 12 8 12 3z"/>',13),
      check:   ic('<path d="M5 12l4 4 10-11"/>',13,2.6),
      chevron: ic('<path d="M9 6l6 6-6 6"/>',14,2.4),
      sparkle: ic('<path d="M12 3l1.6 5.4L19 10l-5.4 1.6L12 17l-1.6-5.4L5 10l5.4-1.6zM18 15l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7z"/>',13,1.6),
      trophy:  ic('<path d="M8 4h8v4a4 4 0 0 1-8 0zM8 5H5v1a3 3 0 0 0 3 3M16 5h3v1a3 3 0 0 1-3 3M10 12h4M9 20h6M12 14v6"/>',40,2)
    };

    var muscle=(new URLSearchParams(location.search)).get('muscle')||'chest';
    if(!G.muscle(muscle)) muscle='chest';
    var mdef=G.muscle(muscle);
    document.documentElement.style.setProperty('--mc','var(--m-'+muscle+')');

    var workout=[]; var session=null;

    function syncHead(){
      $('#mTitle').textContent=mdef.name;
      $('#mSub').textContent='Build your '+mdef.name.toLowerCase();
      $('#mOrb').textContent=mdef.emoji;
      var li=S.levelInfo(muscle);
      var labels={none:'Untrained',low:'Warming up',mid:'Trained',high:'Glowing '+GI.flame};
      $('#lvlLabel').innerHTML=labels[li.level];
      $('#lvlScore').textContent='SCORE '+li.score;
      $('#lvlFill').style.width=Math.round(Math.min(1,li.score/60)*100)+'%';
    }

    function isIn(name){ return workout.some(function(w){ return w.name===name; }); }
    function renderGroups(){
      var html=G.groups(muscle).map(function(grp){
        var items=grp.items.map(function(ex){
          var unit=G.repUnit(ex);
          return '<div class="excard">'+
            '<div class="exthumb">'+ex.emoji+'</div>'+
            '<div class="exmeta"><div class="en">'+ex.name+'</div>'+
              '<div class="erow"><span class="diff '+ex.diff+'">'+ex.diff+'</span><span class="esets">'+ex.sets+'×'+ex.reps+unit+'</span></div></div>'+
            '<div class="exbtns"><button class="minib form" data-form="'+ex.name+'">'+playIc()+' Form</button>'+
              '<button class="minib add'+(isIn(ex.name)?' in':'')+'" data-add="'+ex.name+'">'+(isIn(ex.name)?GI.check:'+ Add')+'</button></div>'+
          '</div>';
        }).join('');
        return '<div class="grp"><div class="grphead"><span class="gk">'+grp.label+'</span><span class="gl"></span><span class="gc">'+grp.items.length+'</span></div>'+items+'</div>';
      }).join('');
      $('#groups').innerHTML=html;
      bind('[data-form]','data-form',function(n){ openForm(n); });
      bind('[data-add]','data-add',function(n,b){ toggleAdd(n,b); });
    }
    function bind(sel,attr,fn){ Array.prototype.forEach.call(document.querySelectorAll(sel), function(b){ b.addEventListener('click', function(){ fn(b.getAttribute(attr), b); }); }); }

    function toggleAdd(name,btn){
      var ix=workout.findIndex(function(w){ return w.name===name; });
      if(ix>=0){ workout.splice(ix,1); sfx('tick'); }
      else{ var ex=G.find(muscle,name); workout.push({ name:ex.name, muscle:muscle, emoji:ex.emoji, diff:ex.diff, anim:ex.anim, sets:ex.sets, reps:ex.reps, weight:0 }); sfx('confirm'); haptic(); }
      if(btn){ btn.classList.toggle('in', isIn(name)); btn.innerHTML=isIn(name)?GI.check:'+ Add'; }
      renderBuilder(); $('#startBtn').disabled=workout.length===0;
    }
    function renderBuilder(){
      var b=$('#builder');
      if(!workout.length){ b.innerHTML='<div class="empty">No exercises yet.<br>Tap <b style="color:#FFA9A9">+ Add</b> on any move above.</div>'; $('#wkHint').textContent='empty'; return; }
      $('#wkHint').textContent=workout.length+' exercise'+(workout.length>1?'s':'');
      b.innerHTML=workout.map(function(w){
        var unit=(w.anim==='core'&&w.reps>=30)?'s':'';
        return '<div class="witem"><div class="wtop"><div class="wn">'+w.emoji+' '+w.name+'<small>'+w.diff+'</small></div><button class="wdel" data-del="'+w.name+'">×</button></div>'+
          '<div class="steppers">'+stp(w.name,'sets',w.sets,'Sets','')+stp(w.name,'reps',w.reps,'Reps',unit)+stp(w.name,'weight',w.weight,'Weight','kg')+'</div></div>';
      }).join('');
      bind('[data-del]','data-del',function(n){ workout=workout.filter(function(w){return w.name!==n;}); sfx('tick'); renderBuilder(); $('#startBtn').disabled=workout.length===0; renderGroups(); });
      Array.prototype.forEach.call(document.querySelectorAll('[data-step]'), function(x){ x.addEventListener('click', function(){ var p=x.getAttribute('data-step').split('|'); step(p[0],p[1],parseInt(p[2],10)); }); });
    }
    function stp(name,field,val,lbl,unit){ var disp=(field==='weight'&&val===0)?'—':(val+(unit||'')); return '<div class="stp"><div class="slbl">'+lbl+'</div><div class="sctrl"><button data-step="'+name+'|'+field+'|-1">−</button><span class="sval">'+disp+'</span><button data-step="'+name+'|'+field+'|1">+</button></div></div>'; }
    function step(name,field,d){ var w=workout.find(function(x){return x.name===name;}); if(!w)return; var min=field==='weight'?0:1; var s=field==='weight'?2.5:1; w[field]=Math.max(min, Math.round((w[field]+d*s)*10)/10); sfx('tick'); renderBuilder(); }

    /* form modal */
    function repFigure(anim,c){
      return '<svg class="repfig a-'+anim+'" viewBox="0 0 120 120" fill="none">'+
        '<circle cx="60" cy="26" r="9" fill="'+c+'" opacity="0.9"/>'+
        '<g class="torso"><rect x="52" y="36" width="16" height="34" rx="7" fill="'+c+'" opacity="0.55"/>'+
        '<g class="arm"><rect x="52" y="40" width="8" height="26" rx="4" fill="'+c+'"/></g>'+
        '<rect x="62" y="40" width="8" height="26" rx="4" fill="'+c+'" opacity="0.8"/></g>'+
        '<rect x="54" y="70" width="6" height="28" rx="3" fill="'+c+'" opacity="0.7"/><rect x="60" y="70" width="6" height="28" rx="3" fill="'+c+'" opacity="0.7"/>'+
        '<g class="barbell"><rect x="34" y="18" width="52" height="6" rx="3" fill="#fff"/><rect x="30" y="13" width="8" height="16" rx="3" fill="'+c+'"/><rect x="82" y="13" width="8" height="16" rx="3" fill="'+c+'"/></g></svg>';
    }
    function openForm(name){
      var ex=G.find(muscle,name); if(!ex)return;
      var col=getComputedStyle(document.documentElement).getPropertyValue('--m-'+muscle).trim()||'#FF6B6B';
      var search='https://www.youtube.com/results?search_query='+encodeURIComponent(ex.name+' proper form');
      var tips=ex.tips.map(function(t,i){ return '<div class="tip"><div class="tnum">'+(i+1)+'</div><div class="tt">'+t+'</div></div>'; }).join('');
      $('#formBody').innerHTML='<div class="formhero"><div class="badgeloop"><span class="dot"></span> Form loop</div>'+repFigure(ex.anim,col)+'</div>'+
        '<div class="formtitle">'+ex.name+'</div><div class="formsub">'+cap(ex.cat)+' · '+ex.diff+' · '+ex.sets+'×'+ex.reps+G.repUnit(ex)+' — quick learn, then go.</div>'+
        '<div class="tips">'+tips+'</div><a class="yt" href="'+search+'" target="_blank" rel="noopener">'+playIc(14)+' Watch a demo on YouTube</a><div style="height:8px"></div>'+
        '<button class="bigbtn" id="formAdd">+ Add to Workout</button>';
      $('#formAdd').addEventListener('click', function(){ if(!isIn(ex.name)) toggleAdd(ex.name,null); renderGroups(); close('form'); toast('Added '+ex.name); });
      open('form'); sfx('equip');
    }

    /* session */
    function start(){ if(!workout.length)return; session={i:0,setDone:0,t0:Date.now(),totalSets:workout.reduce(function(a,w){return a+w.sets;},0),doneSets:0}; sfx('confirm'); haptic(); renderSession(); open('sess'); timerOn(); }
    var ti=null; function timerOn(){ timerOff(); ti=setInterval(function(){ var e=$('#sessTimer'); if(e)e.textContent=clock(Date.now()-session.t0); },1000); } function timerOff(){ if(ti){clearInterval(ti);ti=null;} }
    function clock(ms){ var s=Math.floor(ms/1000),m=Math.floor(s/60); s=s%60; return (m<10?'0':'')+m+':'+(s<10?'0':'')+s; }
    function renderSession(){
      var w=workout[session.i]; var unit=(w.anim==='core'&&w.reps>=30)?'s':'';
      var pct=Math.round((session.doneSets/session.totalSets)*100); var dots='';
      for(var k=0;k<w.sets;k++){ dots+='<div class="sd'+(k<session.setDone?' done':'')+'"></div>'; }
      var last=session.i===workout.length-1 && session.setDone+1>=w.sets;
      $('#sessBody').innerHTML='<div class="sessTop"><div><div class="sessmeta">Exercise '+(session.i+1)+' / '+workout.length+'</div><div class="timer" id="sessTimer">'+clock(Date.now()-session.t0)+'</div></div><button class="minib" id="quit">Quit</button></div>'+
        '<div class="sprog"><i style="width:'+pct+'%"></i></div>'+
        '<div class="nowcard"><div class="nbig">'+w.emoji+'</div><div class="nname">'+w.name+'</div><div class="ntgt">Set <b>'+(session.setDone+1)+'</b> of <b>'+w.sets+'</b> · target <b>'+w.reps+unit+'</b>'+(w.weight>0?' @ <b>'+w.weight+'kg</b>':'')+'</div><div class="setdots">'+dots+'</div></div>'+
        '<div style="height:16px"></div><button class="bigbtn str" id="done">'+(last?GI.check+' Finish Workout':GI.check+' Complete Set')+'</button><div style="height:8px"></div><button class="minib" id="skip" style="width:100%;padding:12px">Skip exercise '+GI.chevron+'</button>';
      $('#done').addEventListener('click', completeSet); $('#skip').addEventListener('click', skipEx);
      $('#quit').addEventListener('click', function(){ if(confirm('Quit this workout? Progress won\'t be saved.')){ timerOff(); close('sess'); session=null; } });
    }
    function completeSet(){ var w=workout[session.i]; session.setDone++; session.doneSets++; sfx('tick'); haptic(); if(session.setDone>=w.sets){ if(session.i>=workout.length-1) return finish(); session.i++; session.setDone=0; sfx('coin'); } renderSession(); }
    function skipEx(){ var w=workout[session.i]; session.doneSets+=(w.sets-session.setDone); if(session.i>=workout.length-1) return finish(); session.i++; session.setDone=0; renderSession(); }

    function finish(){
      timerOff(); var ms=Date.now()-session.t0;
      var beforeScore=S.levelInfo(muscle).score, beforeLvl=S.levelInfo(muscle).level;
      var r=S.completeWorkout(muscle, workout.map(function(w){ return {name:w.name,muscle:muscle,sets:w.sets,reps:w.reps,weight:w.weight,diff:w.diff}; }), {ms:ms});
      var afterLi=S.levelInfo(muscle); var leveled=afterLi.level!==beforeLvl;
      close('sess');
      setTimeout(function(){ renderSummary(r, ms, afterLi, leveled, Math.round((afterLi.score-beforeScore)*10)/10); }, 260);
    }
    function renderSummary(r, ms, li, leveled, gained){
      var labels={none:'Untrained',low:'Warming up',mid:'Trained',high:'Glowing '+GI.flame};
      $('#sumBody').innerHTML='<div class="sumhead"><div class="ring">'+GI.trophy+'</div><h2>Workout Complete</h2><p>'+mdef.name+' trained · logged to CORE</p></div>'+
        '<div class="sumstats"><div class="sc"><div class="scn">'+r.sets+'</div><div class="scl">Sets</div></div><div class="sc"><div class="scn">'+r.reps+'</div><div class="scl">Reps</div></div><div class="sc"><div class="scn">'+clock(ms)+'</div><div class="scl">Time</div></div></div>'+
        '<div class="rewards"><div class="rw xp"><div class="rv" id="rwXp">+0</div><div class="rl">XP Earned</div></div><div class="rw st"><div class="rv" id="rwSt">+0</div><div class="rl">Strength</div></div></div>'+
        '<div class="glowup"><div class="gdot">'+mdef.emoji+'</div><div class="gt"><b>'+mdef.name+'</b> +'+gained+' score '+GI.chevron+' now <b>'+labels[li.level]+'</b>'+(leveled?' '+GI.sparkle:'')+'</div></div>'+
        '<button class="bigbtn" id="sumDone">Done</button>';
      open('sum'); sfx('reward'); countUp($('#rwXp'),r.xp,'+'); countUp($('#rwSt'),r.str,'+'); burst('+'+r.xp+' XP');
      $('#sumDone').addEventListener('click', function(){ close('sum'); workout=[]; renderBuilder(); $('#startBtn').disabled=true; renderGroups(); syncHead(); });
      syncHead();
    }
    function countUp(el,to,p){ var n=0,steps=Math.min(to,28),inc=Math.max(1,Math.round(to/steps)),iv=setInterval(function(){ n+=inc; if(n>=to){n=to;clearInterval(iv);} el.textContent=(p||'')+n; },26); }
    function burst(t){ var b=$('#burst'); b.textContent=t; b.classList.remove('go'); void b.offsetWidth; b.classList.add('go'); }

    function open(w){ $('#'+w+'Scrim').classList.add('show'); $('#'+w+'Sheet').classList.add('show'); }
    function close(w){ $('#'+w+'Scrim').classList.remove('show'); $('#'+w+'Sheet').classList.remove('show'); }
    function toast(m){ var t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){ t.classList.remove('show'); },2000); }
    function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

    function init(){
      syncHead(); renderGroups(); renderBuilder();
      $('#startBtn').addEventListener('click', start);
      $('#backBtn').addEventListener('click', function(){ sfx('tick'); if(history.length>1) history.back(); else location.href='strength.html'; });
      $('#formScrim').addEventListener('click', function(){ close('form'); });
    }
    if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
