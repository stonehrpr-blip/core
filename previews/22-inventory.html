<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Inventory</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root {
    --bg-base:#02020A; --bg-card:rgba(255,255,255,0.035); --bg-card-2:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08); --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
    --accent:#4A8FFF; --grad-a:#4A8FFF; --grad-b:#6F70FF; --grad-c:#B388FF; --good:#34D399;
    --coin:#FFCB3D; --coin2:#FFE07A; --shard:#B388FF;
    --common:#9AA1B7; --rare:#4A8FFF; --epic:#B388FF; --legendary:#FFC56B; --mythic:#FF5C8A;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
    color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:60; }

  .bg { position:absolute; inset:0; z-index:0; background:
      radial-gradient(60% 35% at 50% 8%, rgba(74,143,255,0.12) 0%, transparent 62%),
      radial-gradient(60% 35% at 50% 94%, rgba(159,143,255,0.10) 0%, transparent 65%),
      linear-gradient(180deg, #07071a 0%, #02020A 55%, #050510 100%); }
  .aurora { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.34; mix-blend-mode:screen; }
  .aurora::before, .aurora::after { content:""; position:absolute; border-radius:50%; filter:blur(72px); animation:auroraDrift 22s ease-in-out infinite; will-change:transform; }
  .aurora::before { width:70%; height:40%; left:-10%; top:3%; background:radial-gradient(circle, rgba(74,143,255,0.28), transparent 65%); }
  .aurora::after { width:60%; height:35%; right:-8%; bottom:13%; background:radial-gradient(circle, rgba(159,143,255,0.22), transparent 65%); animation-delay:-11s; }
  @keyframes auroraDrift { 0%,100%{transform:translate(0,0) scale(1);opacity:0.4;} 50%{transform:translate(16px,-12px) scale(1.06);opacity:0.6;} }
  .stars { position:absolute; inset:-2%; pointer-events:none; z-index:2; }
  .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,4s) ease-in-out var(--del,0s) infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.15;transform:scale(0.7);} 50%{opacity:0.8;transform:scale(1.1);} }
  @media (prefers-reduced-motion: reduce){ .aurora::before,.aurora::after,.star,.shimmer,.lo-aura .glow,.lo::after{animation:none!important;} }

  .frame { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }
  .scroll { flex:1; overflow-y:auto; padding:4px 18px 110px; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar{ display:none; }

  /* header */
  .topbar { position:relative; display:flex; align-items:center; justify-content:space-between; padding:6px 18px 8px; }
  .back { width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--border); color:var(--text); text-decoration:none; }
  .back svg{ width:20px; height:20px; }
  .topbar .ttl { position:absolute; left:50%; transform:translateX(-50%); font-size:13px; font-weight:800; letter-spacing:0.2em; text-transform:uppercase; color:var(--text); }
  .coinchip { display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 13px; border-radius:999px; background:linear-gradient(135deg, rgba(255,203,61,0.16), rgba(255,160,60,0.06)); border:1px solid rgba(255,203,61,0.3); font-size:13.5px; font-weight:900; color:var(--coin2); }
  .coinchip svg{ width:16px; height:16px; color:var(--coin); }

  .intro { padding:2px 4px 0; }
  .intro h1 { margin:0; font-size:26px; font-weight:900; letter-spacing:-0.02em; }
  .intro p { margin:5px 0 0; font-size:13.5px; color:var(--muted); }

  /* ── LOADOUT HERO ── */
  .lo { position:relative; margin-top:16px; border-radius:24px; padding:18px 16px 15px; overflow:hidden;
    background:radial-gradient(120% 80% at 50% -10%, color-mix(in srgb,var(--fc,#8a90a0) 16%,transparent), transparent 60%), linear-gradient(160deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012));
    border:1.5px solid color-mix(in srgb,var(--fc,#8a90a0) 50%,transparent);
    box-shadow:0 22px 54px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08), 0 0 26px color-mix(in srgb,var(--fc,#8a90a0) 20%,transparent); }
  .lo::after{ content:""; position:absolute; top:-40%; left:-30%; width:48%; height:180%; transform:rotate(20deg); background:linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent); animation:shine 7s ease-in-out infinite; pointer-events:none; }
  @keyframes shine { 0%,100%{transform:translateX(0) rotate(20deg);} 55%{transform:translateX(330px) rotate(20deg);} }
  .lo .lotag{ position:relative; z-index:2; display:inline-flex; align-items:center; gap:6px; font-size:9.5px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:color-mix(in srgb,var(--fc,#9aa1b7) 70%,#fff); }
  .lo .lotag svg{ width:12px; height:12px; }
  .lorow{ position:relative; z-index:2; display:flex; align-items:center; gap:15px; margin-top:13px; }
  .lo-avwrap{ position:relative; flex:none; width:78px; height:78px; }
  .lo-frame{ position:absolute; inset:0; border-radius:20px; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08), rgba(0,0,0,0.34));
    border:2px solid var(--fc,#8a90a0); box-shadow:0 0 18px color-mix(in srgb,var(--fc,#8a90a0) 55%,transparent), inset 0 0 14px color-mix(in srgb,var(--fc,#8a90a0) 22%,transparent); }
  .lo-aura{ position:absolute; inset:-9px; border-radius:24px; z-index:0; }
  .lo-aura .glow{ position:absolute; inset:0; border-radius:24px; background:radial-gradient(circle, color-mix(in srgb,var(--ac) 55%,transparent), transparent 70%); animation:lopulse 3.2s ease-in-out infinite; }
  @keyframes lopulse{ 0%,100%{opacity:.5; transform:scale(.92);} 50%{opacity:1; transform:scale(1.08);} }
  .lo-av{ position:relative; z-index:1; width:34px; height:34px; color:#dbe4f2; }
  .lo-badge{ position:absolute; z-index:3; right:-7px; bottom:-7px; width:30px; height:30px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(150deg, rgba(20,22,32,0.95), rgba(8,9,14,0.95)); border:1.5px solid color-mix(in srgb,var(--bc,#9aa1b7) 60%,transparent); box-shadow:0 4px 12px rgba(0,0,0,.5), 0 0 12px color-mix(in srgb,var(--bc,#9aa1b7) 40%,transparent); }
  .lo-badge svg{ width:17px; height:17px; color:var(--bc,#9aa1b7); }
  .lo-id{ flex:1; min-width:0; }
  .lo-name{ font-size:18px; font-weight:900; letter-spacing:.01em; }
  .lo-title{ display:inline-block; margin-top:6px; font-size:8.5px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); padding:3px 9px; border-radius:999px; border:1px solid rgba(74,143,255,0.4); background:rgba(74,143,255,0.08); }
  .lo-title.none{ color:var(--dim); border-color:var(--border); background:transparent; }
  .lo-meta{ margin-top:8px; font-size:11px; font-weight:700; color:var(--muted); }

  .slots{ position:relative; z-index:2; display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-top:15px; }
  .slot{ border:none; font:inherit; cursor:pointer; text-align:center; padding:9px 4px; border-radius:12px; background:rgba(0,0,0,0.28); border:1px solid var(--border); transition:.18s; }
  .slot:active{ transform:scale(.96); }
  .slot.filled{ border-color:color-mix(in srgb,var(--sc,#4A8FFF) 45%,transparent); background:color-mix(in srgb,var(--sc,#4A8FFF) 10%,transparent); }
  .slot .sk{ font-size:8px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  .slot .sv{ font-size:10px; font-weight:800; margin-top:4px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .slot.empty .sv{ color:var(--dim); }

  /* ── currency + collection ── */
  .curbar { display:flex; gap:9px; margin-top:15px; }
  .cur { flex:1; border-radius:15px; padding:11px 12px; background:var(--bg-card); border:1px solid var(--border); position:relative; overflow:hidden; }
  .cur .cl{ display:flex; align-items:center; gap:6px; font-size:9.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  .cur .cl svg{ width:13px; height:13px; }
  .cur .cv{ font-size:17px; font-weight:900; margin-top:6px; }
  .cur.coins{ border-color:rgba(255,203,61,0.32); background:linear-gradient(155deg, rgba(255,203,61,0.10), rgba(255,255,255,0.02)); }
  .cur.coins .cl{ color:var(--coin2); } .cur.coins .cl svg{ color:var(--coin); } .cur.coins .cv{ color:var(--coin2); }
  .cur.items{ border-color:rgba(74,143,255,0.3); background:linear-gradient(155deg, rgba(74,143,255,0.09), rgba(255,255,255,0.02)); }
  .cur.items .cl svg{ color:var(--accent); }
  .cur.locked .cv{ color:var(--dim); font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
  .cur.locked .lk{ position:absolute; top:10px; right:11px; } .cur.locked .lk svg{ width:13px; height:13px; color:var(--dim); }

  .collect{ margin-top:13px; border-radius:16px; padding:13px 14px; background:var(--bg-card); border:1px solid var(--border); }
  .collect .ch{ display:flex; align-items:center; justify-content:space-between; }
  .collect .ct{ font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:7px; }
  .collect .ct svg{ width:14px; height:14px; color:var(--accent); }
  .collect .cn{ font-size:12px; font-weight:900; color:var(--text); } .collect .cn b{ color:var(--accent); }
  .collect .cbar{ height:7px; border-radius:999px; background:rgba(0,0,0,0.4); overflow:hidden; margin-top:10px; }
  .collect .cfill{ height:100%; border-radius:999px; background:linear-gradient(90deg,var(--grad-a),var(--grad-c)); box-shadow:0 0 10px rgba(111,112,255,.5); transition:width .5s cubic-bezier(.2,.8,.2,1); }

  /* tabs */
  .tabs { display:flex; gap:8px; overflow-x:auto; padding:2px 0 4px; margin-top:16px; } .tabs::-webkit-scrollbar{ display:none; }
  .tab{ flex:none; display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border-radius:999px; font-size:12.5px; font-weight:800; color:var(--muted); background:var(--bg-card); border:1px solid var(--border); cursor:pointer; transition:.2s; white-space:nowrap; }
  .tab.on{ color:#fff; background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); border-color:transparent; box-shadow:0 6px 16px rgba(74,143,255,.3); }
  .tab .cnt{ font-size:10px; font-weight:900; padding:1px 6px; border-radius:999px; background:rgba(0,0,0,0.32); color:inherit; }
  .tab.on .cnt{ background:rgba(255,255,255,0.22); }

  /* item grid */
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:11px; animation:fadeIn .3s ease; margin-top:4px; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .item{ position:relative; border-radius:18px; padding:14px; background:var(--bg-card); border:1px solid var(--border); display:flex; flex-direction:column; min-height:198px; overflow:hidden; transition:border-color .2s, box-shadow .4s, transform .15s; }
  .item .in{ font-size:14px; font-weight:800; line-height:1.12; }
  .item .it{ font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); margin-top:3px; }
  .item .id2{ font-size:11px; color:var(--muted); margin-top:6px; line-height:1.35; flex:1; }
  .item .ifoot{ margin-top:10px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .item .rtag{ position:absolute; top:13px; right:13px; }
  .item.r-rare{ border-color:rgba(74,143,255,0.35); box-shadow:0 0 20px -10px var(--rare); }
  .item.r-epic{ border-color:rgba(179,136,255,0.4); box-shadow:0 0 20px -9px var(--epic); }
  .item.r-legendary{ border-color:rgba(255,197,107,0.45); box-shadow:0 0 22px -8px var(--legendary); }
  .item.equipped{ border-color:rgba(52,211,153,0.4); background:linear-gradient(160deg, rgba(52,211,153,0.07), rgba(255,255,255,0.015)); }
  .item.locked{ opacity:.6; }
  .item.locked .pv{ filter:grayscale(.6) brightness(.7); }
  .item.locked::after{ content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.045) 50%, transparent 70%); background-size:220% 100%; animation:shimmer 3.6s linear infinite; }
  @keyframes shimmer { 0%{background-position:130% 0;} 100%{background-position:-130% 0;} }
  .item.bought{ animation:bought .6s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes bought { 0%{box-shadow:0 0 0 rgba(52,211,153,0);} 45%{box-shadow:0 0 28px rgba(52,211,153,.5);} 100%{box-shadow:0 0 0 rgba(52,211,153,0);} }
  .item.equipped-now{ animation:equippulse .7s ease; }
  @keyframes equippulse { 0%,100%{box-shadow:0 0 0 rgba(74,143,255,0);} 50%{box-shadow:0 0 26px rgba(74,143,255,.55);} }

  .rtag{ display:inline-flex; align-items:center; gap:5px; font-size:9.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:999px; border:1px solid currentColor; }
  .rtag .rd{ width:6px; height:6px; border-radius:50%; background:currentColor; }
  .qty{ position:absolute; top:12px; left:13px; z-index:3; font-size:11px; font-weight:900; color:var(--text); background:rgba(0,0,0,0.45); border:1px solid var(--border); border-radius:999px; padding:2px 8px; }

  /* buttons */
  .btn{ border:none; cursor:pointer; font:inherit; font-weight:800; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; gap:6px; transition:filter .2s, transform .12s, opacity .2s; padding:8px 12px; font-size:11.5px; width:100%; }
  .btn:active{ transform:scale(.97); } .btn svg{ width:14px; height:14px; }
  .btn.equip{ color:#fff; background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); box-shadow:0 6px 16px rgba(74,143,255,.32); }
  .btn.unequip{ color:var(--good); background:rgba(52,211,153,0.14); border:1px solid rgba(52,211,153,0.32); }
  .btn.active{ color:var(--good); background:rgba(52,211,153,0.12); cursor:default; }
  .btn.open{ color:#1a1206; background:linear-gradient(135deg,#FFD98A,#FF9F45); box-shadow:0 6px 16px rgba(255,150,60,.32); }
  .btn.get{ color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); }

  /* live cosmetic previews (mirrors shop) */
  .pv{ height:66px; display:flex; align-items:center; justify-content:center; margin-bottom:11px; transition:filter .3s; }
  .pv .av{ width:22px; height:22px; color:#cdd6e6; }
  .pv-frame{ width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center;
             background:radial-gradient(circle at 50% 28%, rgba(255,255,255,0.07), rgba(0,0,0,0.32));
             border:2px solid var(--fc); box-shadow:0 0 16px color-mix(in srgb,var(--fc) 55%,transparent), inset 0 0 12px color-mix(in srgb,var(--fc) 22%,transparent); }
  .pv-aura{ position:relative; width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.14); }
  .pv-aura .glow{ position:absolute; inset:-10px; border-radius:50%; background:radial-gradient(circle, color-mix(in srgb,var(--ac) 62%,transparent), transparent 70%); animation:pvpulse 3s ease-in-out infinite; }
  @keyframes pvpulse{ 0%,100%{opacity:.5; transform:scale(.93);} 50%{opacity:1; transform:scale(1.1);} }
  .pv-badge{ width:52px; height:52px; border-radius:15px; display:flex; align-items:center; justify-content:center;
             background:linear-gradient(150deg, rgba(255,255,255,0.06), rgba(0,0,0,0.26)); border:1px solid color-mix(in srgb,var(--bc) 48%,transparent); box-shadow:0 0 15px color-mix(in srgb,var(--bc) 36%,transparent); }
  .pv-badge svg{ width:27px; height:27px; color:var(--bc); }
  .pv-title{ text-align:center; }
  .pv-title .nm{ font-size:13px; font-weight:900; color:#e7edf7; letter-spacing:.01em; }
  .pv-title .tt{ margin-top:4px; font-size:8.5px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); padding:3px 8px; border-radius:999px; border:1px solid rgba(74,143,255,0.4); display:inline-block; }
  .pv-chest{ width:54px; height:54px; border-radius:15px; display:flex; align-items:center; justify-content:center;
             background:linear-gradient(150deg, rgba(255,255,255,0.05), rgba(0,0,0,0.26)); border:1px solid color-mix(in srgb,var(--cc) 42%,transparent); box-shadow:0 0 16px color-mix(in srgb,var(--cc) 36%,transparent); }
  .pv-chest svg{ width:28px; height:28px; color:var(--cc); }
  .pv-boost{ width:52px; height:52px; border-radius:15px; display:flex; align-items:center; justify-content:center; background:linear-gradient(150deg, rgba(255,203,61,0.16), rgba(255,255,255,0.02)); border:1px solid rgba(255,203,61,0.28); box-shadow:0 0 14px rgba(255,180,60,0.2); }
  .pv-boost svg{ width:25px; height:25px; color:var(--coin); }
  @media (prefers-reduced-motion: reduce){ .pv-aura .glow{ animation:none; } }

  /* empty state */
  .empty{ grid-column:1 / -1; text-align:center; padding:34px 18px; border-radius:18px; background:var(--bg-card); border:1px dashed var(--border); }
  .empty svg{ width:34px; height:34px; color:var(--dim); }
  .empty .et{ font-size:14px; font-weight:800; margin-top:10px; }
  .empty .ed{ font-size:12px; color:var(--muted); margin-top:5px; }
  .empty a{ display:inline-flex; align-items:center; gap:6px; margin-top:14px; text-decoration:none; color:#fff; font-weight:800; font-size:12.5px; padding:9px 16px; border-radius:11px; background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); box-shadow:0 6px 16px rgba(74,143,255,.3); }

  /* ── NEW: sticky tab bar ── */
  .tabsbar{ position:sticky; top:-4px; z-index:18; margin:14px -18px 2px; padding:8px 18px 6px; background:linear-gradient(180deg, #05061099 0%, #050610f2 48%, #050610f2 100%); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
  .tabsbar .tabs{ margin-top:0; }
  .tab{ position:relative; } /* allow dot */
  .tab .dot{ position:absolute; top:6px; right:7px; width:7px; height:7px; border-radius:50%; background:#FF5C8A; box-shadow:0 0 8px rgba(255,92,138,.9); }

  /* ── NEW: collection milestones ── */
  .collect .cbarwrap{ position:relative; margin-top:10px; }
  .collect .mstone{ position:absolute; top:50%; width:2px; height:11px; transform:translate(-50%,-50%); background:rgba(255,255,255,0.28); border-radius:2px; z-index:2; }
  .collect .mstone.hit{ background:var(--legendary); box-shadow:0 0 8px var(--legendary); }
  .ms-claim{ margin-top:11px; display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:12px; cursor:pointer; border:1px solid rgba(255,197,107,0.4); background:linear-gradient(135deg, rgba(255,197,107,0.14), rgba(255,255,255,0.02)); animation:msPulse 2.4s ease-in-out infinite; }
  @keyframes msPulse{ 0%,100%{ box-shadow:0 0 0 rgba(255,197,107,0); } 50%{ box-shadow:0 0 18px -4px rgba(255,197,107,0.6); } }
  .ms-claim .mi{ width:30px; height:30px; flex:none; border-radius:9px; display:flex; align-items:center; justify-content:center; background:rgba(255,197,107,0.16); border:1px solid rgba(255,197,107,0.4); }
  .ms-claim .mi svg{ width:16px; height:16px; color:var(--legendary); }
  .ms-claim .mt{ flex:1; min-width:0; } .ms-claim .mt b{ font-size:12.5px; font-weight:900; color:var(--text); display:block; }
  .ms-claim .mt span{ font-size:10.5px; color:var(--muted); }
  .ms-claim .mb{ font-size:11px; font-weight:900; color:#1a1206; padding:6px 12px; border-radius:999px; background:linear-gradient(135deg,#FFD98A,#FF9F45); }

  /* ── NEW: section headers for owned/locked split ── */
  .sect{ grid-column:1 / -1; display:flex; align-items:center; gap:9px; margin:6px 2px -2px; }
  .sect:not(:first-child){ margin-top:8px; }
  .sect .st{ font-size:10.5px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }

      {id:'chest_rare',      cat:'Chests', name:'Rare Chest',      rar:'Rare',   kind:'chest', desc:'A rare reward chest.'},
      {id:'chest_epic',      cat:'Chests', name:'Epic Chest',      rar:'Epic',   kind:'chest', desc:'An epic reward chest.'},
      {id:'chest_legendary', cat:'Chests', name:'Legendary Chest', rar:'Legendary', kind:'chest', desc:'A legendary reward chest.'}
    ];
    function byId(id){ return ITEMS.filter(function(x){return x.id===id;})[0]; }

    // ── ownership / equip state ──
    function ownedChestCount(id){ return jget('coreOwnedChests',[]).filter(function(x){return x===id;}).length; }
    function isOwned(it){
      if(it.kind==='chest') return ownedChestCount(it.id)>0;
      if(it.earned==='starter') return starterOpened();
      if(it.free) return true;
      if(it.kind==='boost') return S.hasUpgrade(it.id) || jget('coreOwnedShopItems',[]).indexOf(it.id)>=0;
      return jget('coreOwnedShopItems',[]).indexOf(it.id)>=0;
    }
    function isEquipped(it){
      if(it.kind==='frame') return lget('coreProfileTheme','Default')===it.frameKey;
      if(it.kind==='badge') return lget('coreEquippedBadge','')===it.id;
      if(it.kind==='aura')  return lget('coreEquippedAura','')===it.id;
      if(it.kind==='title') return lget('coreProfileTitle','')===it.titleName;
      return false;
    }
    function equippable(it){ return it.kind==='frame'||it.kind==='badge'||it.kind==='aura'||it.kind==='title'; }

    var flash={};
    function equip(it){
      if(it.kind==='frame'){ lset('coreProfileTheme', it.frameKey); lset('coreEquippedFrame', it.frameKey); }
      else if(it.kind==='badge'){ lset('coreEquippedBadge', it.id); }
      else if(it.kind==='aura'){ lset('coreEquippedAura', it.id); }
      else if(it.kind==='title'){ lset('coreProfileTitle', it.titleName); }
      else return;
      S.syncProgress(); dispatch(); flash={id:it.id, type:'equipped-now'}; SFX('equip'); toast('Equipped','good'); render();
    }
    function unequip(it){
      if(it.kind==='frame'){ lset('coreProfileTheme','Default'); lset('coreEquippedFrame','Default'); }
      else if(it.kind==='badge'){ lset('coreEquippedBadge',''); }
      else if(it.kind==='aura'){ lset('coreEquippedAura',''); }
      else if(it.kind==='title'){ lset('coreProfileTitle',''); }
      else return;
      S.syncProgress(); dispatch(); flash={id:it.id, type:'bought'}; SFX('tick'); toast('Unequipped'); render();
    }
    // Chests open on the dedicated full-screen opener (28-chest.html); the buttons
    // here route there. Won items then surface in the "Rewards" tab below.

    // ── NEW-item tracking (Shop/chest acquisitions surface here) ──
    function ownedNow(it){ return it.cat==='Chests'? ownedChestCount(it.id)>0 : isOwned(it); }
    function ownedIdsNow(){ return ITEMS.filter(ownedNow).map(function(i){return i.id;}); }
    (function initSeen(){ if(jget('coreInvSeen',null)===null){ jset('coreInvSeen', ownedIdsNow()); } })();
    function isNewItem(it){ return ownedNow(it) && jget('coreInvSeen',[]).indexOf(it.id)<0; }
    function markSeen(id){ var s=jget('coreInvSeen',[]); if(s.indexOf(id)<0){ s.push(id); jset('coreInvSeen',s); } }
    function newCountInCat(cat){ if(cat==='Rewards') return newRpgCount(); return ITEMS.filter(function(i){return i.cat===cat && isNewItem(i);}).length; }

    // ── Won rewards: the RPG items pulled from chests (coreState.inventory) ──
    function rpgItems(){ try{ var a=S.read().inventory; return Array.isArray(a)?a:[]; }catch(e){ return []; } }
    function rpgSeen(){ return jget('coreRpgSeen',[]); }
    function isNewRpg(it){ return rpgSeen().indexOf(it.id)<0; }
    function newRpgCount(){ var seen=rpgSeen(); return rpgItems().filter(function(it){return seen.indexOf(it.id)<0;}).length; }
    function markRpgSeenAll(){ var seen=rpgSeen(); rpgItems().forEach(function(it){ if(seen.indexOf(it.id)<0) seen.push(it.id); }); jset('coreRpgSeen',seen); }
    function rpgEquipped(it){ try{ return it.slot && S.read().equipped && S.read().equipped[it.slot]===it.id; }catch(e){ return false; } }
    var RPG_IC={
      border:'<rect x="4" y="4" width="16" height="16" rx="3"/><rect x="8" y="8" width="8" height="8" rx="1.5"/>',
      effect:'<path d="M12 3l2.5 6.5L21 12l-6.5 2.5L12 21l-2.5-6.5L3 12l6.5-2.5z"/>',
      badge:'<path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6l7-3Z"/><path d="M9 11.5l2 2 4-4.5"/>',
      armour:'<path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6l7-3Z"/>',
      item:'<circle cx="12" cy="12" r="7"/>'
    };

    // ── collection milestones ──
    var MILESTONES=[ {pct:25, coins:100}, {pct:50, coins:250}, {pct:100, coins:1000} ];
    function renderMilestones(pct){
      var marks=document.querySelectorAll('.collect .mstone'); var th=[25,50,100];
      marks.forEach(function(m,i){ m.classList.toggle('hit', pct>=th[i]); });
      var wrap=qs('#msClaim'); if(!wrap) return; wrap.innerHTML='';
      var claimed=jget('coreInvMilestones',[]), due=null;
      for(var i=0;i<MILESTONES.length;i++){ var m=MILESTONES[i]; if(pct>=m.pct && claimed.indexOf(m.pct)<0){ due=m; break; } }
      if(!due) return;
      var el=document.createElement('div'); el.className='ms-claim';
      el.innerHTML='<div class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7C9.5 7 7 6 7 4.2 7 3 8 2 9 2c2 0 3 5 3 5zM12 7c2.5 0 5-1 5-2.8C17 3 16 2 15 2c-2 0-3 5-3 5z"/></svg></div>'+
        '<div class="mt"><b>'+due.pct+'% collection reached</b><span>Tap to claim your reward</span></div>'+
        '<div class="mb">+'+due.coins+'</div>';
      el.onclick=function(){ var c=jget('coreInvMilestones',[]); if(c.indexOf(due.pct)>=0) return; c.push(due.pct); jset('coreInvMilestones',c);
        try{ if(S.earnCoins) S.earnCoins(due.coins,'collection_milestone:'+due.pct); }catch(e){} lset('coreCoins',String(coins()));
        SFX('chest_collect'); burstFromEl(el,'#FFC56B',16); S.syncProgress(); dispatch(); toast('+'+due.coins+' coins claimed','good'); render(); };
      wrap.appendChild(el);
    }

    // ── item detail bottom sheet ──
    function closeSheet(){ var s=qs('#sheet'), b=qs('#sheetBd'); if(s) s.classList.remove('show'); if(b) b.classList.remove('show'); }
    function openSheet(it){
      markSeen(it.id);
      var s=qs('#sheet'), b=qs('#sheetBd'); if(!s) return;
      var owned=ownedNow(it), equ=isEquipped(it), qty=it.cat==='Chests'?ownedChestCount(it.id):0;
      var rc=RARHEX[it.rar]||'#4A8FFF'; s.style.setProperty('--shc', rc);
      var typeLabel = it.cat==='Chests'?'Reward Chest': it.cat.replace(/s$/,'');
      var chips='';
      if(equ) chips+='<span class="schip eq">Equipped</span>';
      else if(it.kind==='boost' && owned) chips+='<span class="schip ow">Active</span>';
      else if(owned && it.cat!=='Chests') chips+='<span class="schip ow">Owned</span>';
      else if(!owned) chips+='<span class="schip lk">Locked</span>';
      var acts;
      if(it.cat==='Chests'){ acts = owned ? '<button class="btn open" data-sheet-act="open">Open Chest'+(qty>1?' · ×'+qty:'')+'</button>' : '<a class="btn get" href="27-shop.html?cat=Chests" style="text-decoration:none">Get in Shop</a>'; }
      else if(!owned){ acts='<a class="btn get" href="27-shop.html?cat='+it.cat+'" style="text-decoration:none">Get in Shop</a>'; }
      else if(it.kind==='boost'){ acts='<button class="btn active" disabled>Active</button>'; }
      else if(equ){ acts='<button class="btn unequip" data-sheet-act="unequip">Unequip</button>'; }
      else { acts='<button class="btn equip" data-sheet-act="equip">Equip</button>'; }
      var effHTML = (it.kind==='boost'&&it.effect) ? '<div class="seffect"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8Z"/></svg>'+it.effect+'</div>' : '';
      var descHTML = (it.desc && it.kind!=='boost') ? '<div class="sdesc">'+it.desc+'</div>' : '';
      s.innerHTML='<div class="grab"></div>'+
        '<div class="shead"><div class="spv">'+previewHTML(it)+'</div>'+
          '<div class="sid"><div class="sname">'+it.name+'</div><div class="stype">'+typeLabel+'</div>'+
          '<div class="srow">'+rtagHTML(it.rar)+chips+'</div></div></div>'+
        effHTML+descHTML+
        '<div class="sacts">'+acts+'<button class="btn ghost" data-sheet-act="close">Close</button></div>';
      s.querySelectorAll('[data-sheet-act]').forEach(function(btn){ btn.addEventListener('click',function(e){ e.stopPropagation();
        var a=btn.dataset.sheetAct;
        if(a==='equip'){ equip(it); openSheet(it); }
        else if(a==='unequip'){ unequip(it); openSheet(it); }
        else if(a==='open'){ location.href='28-chest.html?chest='+encodeURIComponent(it.id)+'&from=inventory'; }
        else { closeSheet(); }
      }); });
      b.classList.add('show'); s.classList.add('show');
    }

    // ── render ──
    var activeCat='Frames';
    function rtagHTML(rar){ return '<span class="rtag" style="color:'+RAR[rar]+'"><span class="rd"></span>'+rar+'</span>'; }

    function renderLoadout(){
      var fk=lget('coreProfileTheme','Default'), fc=FRAME_C[fk]||'#8a90a0';
      var auraId=lget('coreEquippedAura',''), ac=AURA_C[auraId]||null;
      var badgeId=lget('coreEquippedBadge',''), badgeIt=byId(badgeId), bc=badgeIt?(RARHEX[badgeIt.rar]||'#9AA1B7'):null;
      var titleNm=lget('coreProfileTitle','');
      var frameName=(byId('frame_'+fk.toLowerCase())||{}).name || (fk==='Default'?'Default':fk+' Frame');
      var auraName=auraId?(byId(auraId)||{}).name:null;
      var slot=function(key,kind,val){ var filled=!!val; return '<button class="slot '+(filled?'filled':'empty')+'" data-jump="'+kind+'" '+(filled?'style="--sc:'+ (kind==='Auras'&&ac?ac:kind==='Badges'&&bc?bc:kind==='Frames'?fc:'#4A8FFF') +'"':'')+'><div class="sk">'+key+'</div><div class="sv">'+(filled?val:'Empty')+'</div></button>'; };
      qs('#lo').style.setProperty('--fc',fc); qs('#lo').style.setProperty('--ac',ac||'transparent'); qs('#lo').style.setProperty('--bc',bc||'#9aa1b7');
      qs('#lo').innerHTML=
        '<span class="lotag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6z"/></svg>Your Loadout</span>'+
        '<div class="lorow">'+
          '<div class="lo-avwrap">'+(ac?'<div class="lo-aura"><span class="glow"></span></div>':'')+
            '<div class="lo-frame">'+AV.replace('class="av"','class="lo-av"')+'</div>'+
            (bc?'<div class="lo-badge">'+SHIELD+'</div>':'')+'</div>'+
          '<div class="lo-id"><div class="lo-name">'+playerName()+'</div>'+
            (titleNm?'<div class="lo-title">'+titleNm+'</div>':'<div class="lo-title none">No title</div>')+
            '<div class="lo-meta">Level '+level()+' · '+rankName()+'</div></div>'+
        '</div>'+
        '<div class="slots">'+
          slot('Frame','Frames',fk==='Default'?null:frameName)+
          slot('Aura','Auras',auraName)+
          slot('Badge','Badges',badgeIt?badgeIt.name.replace(' Badge',''):null)+
          slot('Title','Titles',titleNm||null)+
        '</div>';
      qs('#lo').querySelectorAll('[data-jump]').forEach(function(b){ b.addEventListener('click',function(){ activeCat=b.dataset.jump; render(); var t=qs('#tabs'); if(t) t.scrollIntoView({behavior:'smooth',block:'nearest'}); }); });
    }

    function collectionStats(){
      var total=0, owned=0;
      ITEMS.forEach(function(it){ if(COLLECT_CATS.indexOf(it.cat)<0) return; total++; if(isOwned(it)) owned++; });
      return { owned:owned, total:total, pct: total? Math.round(owned/total*100):0 };
    }
    function ownedInCat(cat){
      if(cat==='Chests') return jget('coreOwnedChests',[]).length;
      return ITEMS.filter(function(i){return i.cat===cat && isOwned(i);}).length;
    }
    function totalInCat(cat){ return ITEMS.filter(function(i){return i.cat===cat;}).length; }

    function render(){
      animateCoins(coins());
      renderLoadout();

      // owned items count (cosmetics + boosts owned + chests held)
      var ownedCosmetic=ITEMS.filter(function(i){return i.cat!=='Chests' && isOwned(i);}).length;
      var ownedChests=jget('coreOwnedChests',[]).length;
      qs('#curItems').textContent=(ownedCosmetic+ownedChests);

      // collection + milestones
      var cs=collectionStats();
      qs('#collN').innerHTML='<b>'+cs.owned+'</b> / '+cs.total+' · '+cs.pct+'%';
      qs('#collFill').style.width=cs.pct+'%';
      renderMilestones(cs.pct);

      // tabs with owned/total counts + NEW dot
      var tabs=qs('#tabs'); tabs.innerHTML='';
      CATS.forEach(function(c){
        var b=document.createElement('button'); b.className='tab'+(c===activeCat?' on':'');
        var cnt = c==='Rewards' ? String(rpgItems().length) : c==='Chests' ? String(ownedInCat(c)) : ownedInCat(c)+'/'+totalInCat(c);
        var dot = newCountInCat(c)>0 ? '<span class="dot"></span>' : '';
        b.innerHTML=c+'<span class="cnt">'+cnt+'</span>'+dot;
        b.onclick=function(){ activeCat=c; render(); };
        tabs.appendChild(b);
      });

      // grid
      var grid=qs('#grid'); grid.innerHTML='';
      function sectHead(label,count){ var d=document.createElement('div'); d.className='sect'; d.innerHTML='<span class="st">'+label+'</span><span class="sc">'+count+'</span><span class="sl"></span>'; return d; }
      function attachCard(el,it){ el.addEventListener('click',function(){ openSheet(it); }); }

      if(activeCat==='Rewards'){
        var won=rpgItems();
        if(!won.length){
          grid.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3l7 3v5c0 4-3 7-7 9-4-2-7-5-7-9V6l7-3Z"/><path d="M9 11.5l2 2 4-4.5"/></svg><div class="et">No rewards yet</div><div class="ed">Open chests to win cosmetics — they land here.</div><a href="27-shop.html?cat=Chests">Open Shop</a></div>';
        } else {
          won.forEach(function(it){
            var rl=String(it.rarity||'common'), rcap=rl.charAt(0).toUpperCase()+rl.slice(1);
            var equ=rpgEquipped(it), ic=RPG_IC[it.type]||RPG_IC.item;
            var el=document.createElement('div'); el.className='item r-'+rl+(equ?' equipped':'');
            var foot = it.slot
              ? (equ ? '<button class="btn unequip" data-rpg-act="unequip" data-rid="'+it.id+'" data-slot="'+it.slot+'">Unequip</button>'
                     : '<button class="btn equip" data-rpg-act="equip" data-rid="'+it.id+'" data-slot="'+it.slot+'">Equip</button>')
              : '<button class="btn active" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 3l2.4 7.4H20l-6 4.4 2.3 7.2L12 17.6 5.7 22l2.3-7.2-6-4.4h7.6z"/></svg>Trophy</button>';
            el.innerHTML=(isNewRpg(it)?'<span class="newtag">NEW</span>':'')+
              '<span class="rtag" style="color:'+rarColor(rl)+'"><span class="rd"></span>'+rcap+'</span>'+
              '<div class="pv"><div class="pv-badge" style="--bc:'+rarColor(rl)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+ic+'</svg></div></div>'+
              '<div class="in">'+it.name+'</div><div class="it">'+(it.slot?it.slot.charAt(0).toUpperCase()+it.slot.slice(1):'Trophy')+'</div>'+
              '<div class="id2">'+(it.source?'From '+it.source+' chest':'Chest reward')+'</div>'+
              '<div class="ifoot">'+foot+'</div>';
            grid.appendChild(el);
          });
          setTimeout(markRpgSeenAll, 1800); // let the NEW glow show this visit, clear next
        }
      } else if(activeCat==='Chests'){
        var held=jget('coreOwnedChests',[]);
        var uniq={}; held.forEach(function(id){ uniq[id]=(uniq[id]||0)+1; });
        var ids=Object.keys(uniq);
        if(!ids.length){
          grid.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9l2-4h14l2 4M3 9v9a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9M3 9h18M12 9v3"/></svg><div class="et">No chests yet</div><div class="ed">Buy reward chests in the Shop and open them here.</div><a href="27-shop.html?cat=Chests">Open Shop</a></div>';
        } else {
          ids.forEach(function(id){ var it=byId(id); if(!it) return; var n=uniq[id];
            var el=document.createElement('div'); el.className='item r-'+it.rar.toLowerCase()+(flash.id===it.id?' '+flash.type:'');
            el.innerHTML=(isNewItem(it)?'<span class="newtag">NEW</span>':'')+(n>1?'<span class="qty">×'+n+'</span>':'')+rtagHTML(it.rar)+previewHTML(it)+
              '<div class="in">'+it.name+'</div><div class="it">Chest</div>'+
              '<div class="id2">'+(it.desc||'')+'</div>'+
              '<div class="ifoot"><button class="btn open" data-act="open" data-id="'+it.id+'">Open</button></div>';
            attachCard(el,it); grid.appendChild(el);
          });
        }
      } else {
        var inCat=ITEMS.filter(function(i){return i.cat===activeCat;});
        var ownedArr=inCat.filter(isOwned), lockedArr=inCat.filter(function(i){return !isOwned(i);});
        function buildCard(it){
          var owned=isOwned(it), equ=isEquipped(it);
          var cls='item r-'+it.rar.toLowerCase()+(owned&&equ?' equipped':'')+(owned?'':' locked');
          if(flash.id===it.id) cls+=' '+flash.type;
          var sub = it.kind==='boost' ? (it.effect||'') : (it.desc||'');
          var foot;
          if(!owned){
            foot='<a class="btn get" href="27-shop.html?cat='+activeCat+'" data-stop="1" style="text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>In Shop</a>';
          } else if(it.kind==='boost'){
            foot='<button class="btn active" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4 4 10-11"/></svg>Active</button>';
          } else if(equ){
            foot='<button class="btn unequip" data-act="unequip" data-id="'+it.id+'">Unequip</button>';
          } else {
            foot='<button class="btn equip" data-act="equip" data-id="'+it.id+'">Equip</button>';
          }
          var el=document.createElement('div'); el.className=cls;
          el.innerHTML=(isNewItem(it)?'<span class="newtag">NEW</span>':'')+rtagHTML(it.rar)+previewHTML(it)+
            '<div class="in">'+it.name+'</div><div class="it">'+it.cat.replace(/s$/,'')+'</div>'+
            '<div class="id2">'+sub+'</div>'+
            '<div class="ifoot">'+foot+'</div>';
          attachCard(el,it); return el;
        }
        if(ownedArr.length){ grid.appendChild(sectHead('Owned', ownedArr.length+'/'+inCat.length)); ownedArr.forEach(function(it){ grid.appendChild(buildCard(it)); }); }
        if(lockedArr.length){ grid.appendChild(sectHead('Locked · In Shop', String(lockedArr.length))); lockedArr.forEach(function(it){ grid.appendChild(buildCard(it)); }); }
      }
      flash={};

      document.querySelectorAll('[data-act]').forEach(function(b){
        var it=byId(b.dataset.id); if(!it) return;
        b.addEventListener('click', function(e){ e.stopPropagation();
          var act=b.dataset.act;
          if(act==='equip') equip(it);
          else if(act==='unequip') unequip(it);
          else if(act==='open'){ location.href='28-chest.html?chest='+encodeURIComponent(it.id)+'&from=inventory'; }
        });
      });
      // Won-rewards equip/unequip (coreState.equipped[slot] = item id)
      document.querySelectorAll('[data-rpg-act]').forEach(function(b){
        b.addEventListener('click', function(e){ e.stopPropagation();
          var act=b.dataset.rpgAct, rid=b.dataset.rid, slot=b.dataset.slot;
          try{ if(act==='equip') S.equipItem(rid, slot); else if(act==='unequip') S.equipItem(null, slot); }catch(err){}
          SFX(act==='equip'?'equip':'tick'); S.syncProgress&&S.syncProgress(); dispatch(); toast(act==='equip'?'Equipped':'Unequipped'); render();
        });
      });
      document.querySelectorAll('[data-stop]').forEach(function(a){ a.addEventListener('click',function(e){ e.stopPropagation(); }); });
    }

    qs('#sheetBd').addEventListener('click', closeSheet);
    window.addEventListener('coreStateChange', render);
    window.addEventListener('core:progress-updated', render);
    window.addEventListener('storage', function(e){ if(!e.key || /^core/.test(e.key)) render(); });
    render();
    try{ var m=location.search.match(/cat=(\w+)/); if(m){ var c=CATS.filter(function(x){return x.toLowerCase()===m[1].toLowerCase();})[0]; if(c){ activeCat=c; render(); } } }catch(e){}
  })();
  </script>
</body>
</html>
