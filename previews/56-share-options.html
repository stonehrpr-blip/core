<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Share</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="stylesheet" href="_lib/core-buttons.css" />
<script src="_lib/core-state.js"></script>
<script src="_lib/analytics.js"></script>
  <script src="_lib/core-back.js"></script>
<style>
  :root { --bg-base:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --accent:#4A8FFF; --border:rgba(255,255,255,0.08); }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }

  /* dimmed bg of celebration peek */
  .bg-mock { position:absolute; inset:0; background: radial-gradient(60% 35% at 50% 28%, rgba(179,136,255,0.20), transparent 65%), linear-gradient(180deg, #160a3d 0%, #02020A 60%); filter: blur(2px) brightness(0.5); }
  .scrim { position:absolute; inset:0; background: rgba(2,2,10,0.55); backdrop-filter: blur(8px); }

  /* iOS share sheet style — bottom sheet rises */
  .sheet {
    position:absolute; left:0; right:0; bottom:0; z-index:20;
    background: linear-gradient(180deg, #1A1B25 0%, #0F1018 100%);
    border-top-left-radius:24px; border-top-right-radius:24px;
    border-top:1px solid rgba(255,255,255,0.10);
    padding: 16px 18px 32px;
    transform: translateY(40%); opacity:0;
    animation: rise .45s cubic-bezier(.22,1,.36,1) forwards;
    box-shadow: 0 -30px 80px rgba(0,0,0,0.55);
  }
  @keyframes rise { to { transform: translateY(0); opacity:1; } }
  .grab { width:40px; height:4px; border-radius:999px; background: rgba(255,255,255,0.18); margin: 0 auto 14px; }

  .sheet-title { font-size: 16px; font-weight: 600; text-align: center; margin: 0 0 14px; letter-spacing:-0.2px; }

  /* preview chip — mini card */
  .preview {
    margin: 0 auto 16px; width: 160px; height: 160px;
    border-radius: 18px; overflow: hidden;
    background: radial-gradient(70% 50% at 50% 10%, rgba(91,177,255,0.30), transparent 65%), linear-gradient(180deg, #07071F 0%, #02020A 70%);
    border: 1px solid rgba(91,177,255,0.30);
    box-shadow: 0 14px 40px rgba(91,177,255,0.18);
    padding: 14px; position: relative;
  }
  .preview .brand { display:flex; align-items:center; gap:5px; }
  .preview .brand .d { width:5px; height:5px; border-radius:50%; background:#4A8FFF; box-shadow:0 0 6px #4A8FFF; }
  .preview .brand .w { font-size:7px; letter-spacing:0.32em; font-weight:700; color:rgba(255,255,255,0.85); }
  .preview .v { font-size: 56px; font-weight: 800; letter-spacing: -2.4px; margin-top: 14px; background: linear-gradient(180deg, #fff, #9F8FFF); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; line-height: 0.9; }
  .preview .l { font-size: 8px; letter-spacing: 0.18em; color: rgba(255,255,255,0.55); text-transform: uppercase; font-weight:700; margin-top:6px; }
  .preview .h { position:absolute; left:14px; bottom:12px; right:14px; display:flex; justify-content:space-between; font-size:7px; }
  .preview .h .n { color:#fff; font-weight:700; }
  .preview .h .u { color: rgba(255,255,255,0.50); letter-spacing:1px; }

  /* row of icons, iOS style */
  .icons-row {
    display:flex; gap: 12px; overflow-x: auto; padding: 4px 2px 14px;
  }
  .icons-row::-webkit-scrollbar { display:none; }
  .ic-tile {
    flex-shrink: 0; width: 72px; cursor: pointer; background:none; border:none; font-family: inherit; padding: 0;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .ic-tile .ic {
    width: 56px; height: 56px; border-radius: 16px;
    display:flex; align-items:center; justify-content:center;
    background: var(--c, rgba(255,255,255,0.04));
    box-shadow: 0 4px 14px var(--cs, transparent), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .ic-tile .ic svg { width: 26px; height: 26px; stroke: #fff; fill:none; stroke-width: 1.8; stroke-linecap:round; stroke-linejoin:round; }
  .ic-tile .lbl { font-size: 11px; color: #fff; font-weight: 500; letter-spacing:-0.1px; text-align:center; line-height:14px; }
  .ic-tile.tw .ic { background: #000; }
  .ic-tile.tt .ic { background: #000; }
  .ic-tile.story .ic { background: linear-gradient(135deg, #F58529, #DD2A7B, #8134AF, #515BD4); }
  .ic-tile.image .ic { background: linear-gradient(135deg, #5BB1FF, #4A8FFF); }
  .ic-tile.copy .ic { background: rgba(255,255,255,0.10); }

  /* Action list */
  .actions { display:flex; flex-direction:column; gap:0; }
  .a-row {
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 12px; font-size: 14px; color:#fff;
    background: rgba(255,255,255,0.03); border:1px solid var(--border);
    cursor:pointer; transition: background .15s;
  }
  .a-row:hover { background: rgba(255,255,255,0.06); }
  .a-row:first-child { border-top-left-radius:14px; border-top-right-radius:14px; }
  .a-row:last-child  { border-bottom-left-radius:14px; border-bottom-right-radius:14px; }
  .a-row + .a-row { border-top: none; }
  .a-row .l { display:flex; align-items:center; gap:12px; }
  .a-row .l svg { width:18px; height:18px; stroke:#9AA1B7; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .a-row .chev { color: var(--dim); }

  .close-btn { width:100%; margin-top:14px; padding: 16px; border-radius: 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); color: #fff; font-size: 15px; font-weight:600; cursor:pointer; font-family: inherit; }
  .close-btn:hover { background: rgba(255,255,255,0.10); }
</style>
  <link rel="stylesheet" href="_lib/core-responsive.css">
  <link rel="stylesheet" href="_lib/core-theme.css">
  <script src="_lib/core-theme.js" defer></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="bg-mock"></div>
    <div class="scrim"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="sheet">
      <div class="grab"></div>
      <div class="sheet-title">Share</div>

      <div class="preview" aria-hidden="true">
        <div class="brand"><div class="d"></div><div class="w">CORE</div></div>
        <div class="v" id="pvDays">14</div>
        <div class="l">Days clean</div>
        <div class="h"><span class="n" id="pvName">@stone</span><span class="u">core.app</span></div>
      </div>

      <div class="icons-row">
        <button class="ic-tile image" onclick="share('image')">
          <div class="ic" style="--cs: rgba(91,177,255,0.40);">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 16l-5-5L5 21"/></svg>
          </div>
          <div class="lbl">Image</div>
        </button>
        <button class="ic-tile story" onclick="share('story')">
          <div class="ic" style="--cs: rgba(221,42,123,0.40);">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="#fff" stroke="none"/></svg>
          </div>
          <div class="lbl">Story</div>
        </button>
        <button class="ic-tile tw" onclick="share('x')">
          <div class="ic">
            <svg viewBox="0 0 24 24"><path d="M4 4l16 16M20 4L4 20"/></svg>
          </div>
          <div class="lbl">X (Twitter)</div>
        </button>
        <button class="ic-tile tt" onclick="share('tiktok')">
          <div class="ic">
            <svg viewBox="0 0 24 24"><path d="M14 4v9a3 3 0 1 1-3-3"/><path d="M14 4c0 2 2 4 5 4"/></svg>
          </div>
          <div class="lbl">TikTok</div>
        </button>
        <button class="ic-tile copy" onclick="share('copy')">
          <div class="ic">
            <svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>
          </div>
          <div class="lbl">Copy link</div>
        </button>
      </div>

      <div class="actions">
        <div class="a-row" onclick="share('messages')">
          <div class="l"><svg viewBox="0 0 24 24"><path d="M21 12c0 5-4.5 8-9 8a9 9 0 0 1-3.5-.7L3 21l1.7-5.5A9 9 0 0 1 3 12c0-5 4.5-8 9-8s9 3 9 8z"/></svg> Messages</div>
          <div class="chev">›</div>
        </div>
        <div class="a-row" onclick="share('mail')">
          <div class="l"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 7 9-7"/></svg> Mail</div>
          <div class="chev">›</div>
        </div>
        <div class="a-row" onclick="share('save')">
          <div class="l"><svg viewBox="0 0 24 24"><path d="M12 4v12M6 10l6 6 6-6M4 20h16"/></svg> Save image to Photos</div>
          <div class="chev">›</div>
        </div>
      </div>

      <button class="close-btn" onclick="close_()">Done</button>
    </div>
  </div>

<script>
  function share(channel) {
    if (window.coreTrack) coreTrack('share_picked', { channel });
    const ASPECTS = {
      image:    '1290×1290 square',
      story:    '1080×1920 portrait',
      x:        '1200×675 landscape',
      tiktok:   '1080×1920 portrait',
      copy:     'core.app/u/<you> link',
      messages: '1290×1290 square (attached)',
      mail:     '1290×1290 square (attached)',
      save:     'Save 1290×1290 to camera roll'
    };
    alert('Sharing → ' + channel + '\n' + 'Card crop: ' + ASPECTS[channel]);
  }
  function close_() {
    if (window.coreTrack) coreTrack('share_dismissed', {});
    history.length > 1 ? history.back() : (location.href = '51-streak-celebration.html');
  }
  (function() {
    try {
      const s = coreState.read();
      document.getElementById('pvDays').textContent = s.streak.days || 14;
      const t = JSON.parse(localStorage.getItem('coreOnboardTrial')||'{}');
      if (t.name) document.getElementById('pvName').textContent = '@' + t.name.toLowerCase();
    } catch(e){}
    if (window.coreTrack) coreTrack('share_sheet_opened', {});
  })();
</script>
</body>
</html>
