<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>Core — Today's workout</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#02020A" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<style>
  :root {
    --bg-void:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570;
    --accent:#4A8FFF; --accent-hi:#6BA9FF;
    --border:rgba(255,255,255,0.06);
    --ease:cubic-bezier(0.22,1,0.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    min-height:100vh; background:#0A0A14; color:var(--text);
    font-family:'Chakra Petch',-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:24px; overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  .phone{
    position:relative; width:390px; height:844px; background:var(--bg-void);
    border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;
  }
  .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:30;}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:30;}
  .bg{position:absolute;inset:0;z-index:0;background:radial-gradient(60% 30% at 50% 6%, rgba(74,143,255,0.14), transparent 55%),linear-gradient(180deg,#050518 0%,#02020A 55%,#050510 100%);}

  .topbar { position:absolute; top:56px; left:18px; right:18px; z-index:25; display:flex; align-items:center; justify-content:space-between; }
    .back {
      width: 38px !important; height: 38px !important;
      min-width: 38px !important; min-height: 38px !important;
      max-width: 38px !important; max-height: 38px !important;
      aspect-ratio: 1 / 1;
      flex: 0 0 38px;
      align-self: center;
      border-radius: 50% !important;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      display: flex !important; align-items: center !important; justify-content: center !important;
      cursor: pointer; padding: 0;
      font-family: inherit;
      box-sizing: border-box;
      transition: background .15s, border-color .15s, transform .12s;
    }
    .back:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
    .back:active { transform: scale(0.94); }
    .back svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink: 0; }
  .top-meta { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; font-weight: 600; }

  .scroll { position:absolute; inset:0; padding: 104px 22px 100px; overflow-y: auto; z-index:10; }
  .scroll::-webkit-scrollbar { display: none; }

  /* Hero */
  .hero { margin-bottom: 18px; }
  .hero .eye { font-size: 11px; color: var(--accent-hi); font-weight: 600; letter-spacing: 0.04em; }
  .hero h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.08; margin: 6px 0 4px; }
  .hero .sub { font-size: 13.5px; color: var(--muted); line-height: 19px; letter-spacing: -0.05px; }

  /* Session summary card */
  .session {
    padding: 14px 16px; border-radius: 16px;
    background: rgba(255,255,255,0.04); border:1px solid var(--border);
    margin-bottom: 14px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
  }
  .session .ss { text-align: center; }
  .session .ss .v { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.4px; font-variant-numeric: tabular-nums; }
  .session .ss .l { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; margin-top: 3px; }

  /* Section eyebrows */
  .sec-h { font-size: 11px; letter-spacing: 0.04em; color: var(--muted); font-weight: 600; margin: 18px 4px 10px; display: flex; align-items: center; justify-content: space-between; }
  .sec-link { color: var(--accent-hi); font-size: 12px; font-weight: 500; cursor: pointer; }

  /* Exercise list */
  .ex-list {
    border-radius: 16px; overflow: hidden;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  }
  .ex-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer; transition: background 0.15s;
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-row:hover { background: rgba(255,255,255,0.06); }
  .ex-row.done { opacity: 0.55; }
  .ex-row.done .ex-title { text-decoration: line-through; text-decoration-color: rgba(154,161,183,0.5); }

  .ex-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: rgba(74,143,255,0.12); border: 1px solid rgba(74,143,255,0.30);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-hi); font-size: 12px; font-weight: 700;
  }
  .ex-row.done .ex-num { background: rgba(52,211,153,0.18); border-color: #34D399; color: #34D399; }
  .ex-body { flex: 1; min-width: 0; }
  .ex-title { font-size: 14.5px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
  .ex-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
  .ex-meta .dot { margin: 0 5px; color: var(--dim); }
  .ex-chev { color: var(--dim); font-size: 16px; flex-shrink: 0; }

  /* Big start workout CTA */
  .start-cta {
    margin-top: 18px; width: 100%; padding: 16px;
    border: none; border-radius: 16px;
    background: linear-gradient(180deg, #fff, #e8ecf4); color: #050510;
    font-family: inherit; font-size: 15px; font-weight: 700; letter-spacing: -0.2px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; box-shadow: 0 14px 32px rgba(255,255,255,0.18);
    transition: transform 0.12s;
  }
  .start-cta:active { transform: scale(0.985); }
  .start-cta svg { width: 16px; height: 16px; stroke: #050510; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

  /* Exercise detail sheet (slides up from bottom on tap) */
  .ex-sheet-back {
    position: absolute; inset: 0; background: rgba(2,2,10,0.62); backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none; z-index: 70;
    transition: opacity 0.25s var(--ease);
  }
  .ex-sheet-back.on { opacity: 1; pointer-events: auto; }
  .ex-sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 8px 22px calc(34px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(180deg, #0a0a14, #02020A);
    border-top-left-radius: 28px; border-top-right-radius: 28px;
    border-top: 1px solid var(--border);
    box-shadow: 0 -24px 60px rgba(0,0,0,0.6);
    transform: translateY(110%); transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 75; max-height: 88%; overflow-y: auto;
  }
  .ex-sheet::-webkit-scrollbar { display: none; }
  .ex-sheet.on { transform: translateY(0); }
  .sheet-grip { width: 36px; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.20); margin: 0 auto 14px; }

  .form-hero {
    width: 100%; aspect-ratio: 16/10; border-radius: 16px;
    background: linear-gradient(135deg, rgba(74,143,255,0.16), rgba(91,106,230,0.10));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px; position: relative; overflow: hidden;
  }
  .form-hero svg { width: 90px; height: 90px; stroke: var(--accent-hi); fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.85; }
  .form-hero .play {
    position: absolute; right: 14px; top: 14px;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(2,2,10,0.7); border: 1px solid var(--border);
    color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
  }
  .form-hero .play::before { content:""; width: 0; height: 0; border-left: 8px solid #fff; border-top: 5px solid transparent; border-bottom: 5px solid transparent; }

  .sheet-title { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin: 8px 0 4px; }
  .sheet-target { font-size: 12px; color: var(--accent-hi); font-weight: 600; letter-spacing: 0.04em; margin-bottom: 14px; }

  .sheet-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px;
  }
  .sheet-stat {
    padding: 12px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    text-align: center;
  }
  .sheet-stat .v { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.4px; font-variant-numeric: tabular-nums; line-height: 1; }
  .sheet-stat .l { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; margin-top: 4px; }

  .sheet-section { font-size: 11px; letter-spacing: 0.04em; color: var(--muted); font-weight: 600; margin: 16px 0 10px; }
  .form-cues { display: flex; flex-direction: column; gap: 10px; }
  .form-cue {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px; border-radius: 12px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  }
  .form-cue .n {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    background: rgba(74,143,255,0.12); border: 1px solid rgba(74,143,255,0.30);
    color: var(--accent-hi); font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .form-cue .t { flex: 1; font-size: 13.5px; color: #fff; line-height: 1.4; letter-spacing: -0.05px; }
  .form-cue .t b { color: var(--accent-hi); font-weight: 700; }

  .sheet-close-row { display: flex; gap: 10px; margin-top: 14px; }
  .sheet-skip {
    flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 14px;
    background: rgba(255,255,255,0.04); color: var(--muted);
    font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .sheet-done {
    flex: 2; padding: 14px; border: none; border-radius: 14px;
    background: #fff; color: #050510;
    font-family: inherit; font-size: 14.5px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .sheet-done svg { width: 14px; height: 14px; stroke: #050510; fill:none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

  @media (max-width: 460px) {
    body { padding: 0; }
    .phone { width: 100vw; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
    .notch, .home-indicator { display: none; }
  }
  @media (max-width: 380px), (max-height: 720px) {
    .scroll { padding: 90px 18px 90px; }
    .hero h1 { font-size: 24px; }
    .session .ss .v { font-size: 18px; }
    .ex-row { padding: 12px 14px; }
    .ex-title { font-size: 13.5px; }
  }
</style>
<link rel="stylesheet" href="_lib/core-responsive.css">
<link rel="stylesheet" href="_lib/core-theme.css">
<script src="_lib/analytics.js"></script>
<script src="_lib/core-back.js"></script>
<script src="_lib/core-theme.js" defer></script>
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="topbar">
      <button class="back" type="button" onclick="window.location.href='20-dashboard.html'" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M15 18L9 12l6-6"/></svg>
      </button>
      <div class="top-meta" id="topMeta">PUSH DAY · WEEK 3</div>
    </div>

    <div class="scroll">
      <div class="hero">
        <div class="eye">Today's session</div>
        <h1 id="sessionTitle">Push · Chest, Shoulders, Tris</h1>
        <div class="sub">6 exercises · ~52 min total · supersets marked</div>
      </div>

      <!-- At-a-glance -->
      <div class="session">
        <div class="ss"><div class="v">6</div><div class="l">EXERCISES</div></div>
        <div class="ss"><div class="v">52<span style="font-size:12px;color:var(--muted);"> min</span></div><div class="l">DURATION</div></div>
        <div class="ss"><div class="v">14<span style="font-size:12px;color:var(--muted);"> kg ↑</span></div><div class="l">VS LAST WEEK</div></div>
      </div>

      <div class="sec-h"><span>The lift</span><span class="sec-link" id="logBtn">Log session</span></div>
      <div class="ex-list" id="exList"></div>

      <button class="start-cta" onclick="startSession()">
        <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9z" fill="currentColor"/></svg>
        Start workout
      </button>
    </div>

    <!-- Exercise detail bottom sheet -->
    <div class="ex-sheet-back" id="exSheetBack"></div>
    <div class="ex-sheet" id="exSheet" aria-hidden="true">
      <div class="sheet-grip"></div>

      <div class="form-hero" id="formHero">
        <!-- icon injected per exercise -->
      </div>

      <div class="sheet-title" id="sheetTitle">Bench Press</div>
      <div class="sheet-target" id="sheetTarget">CHEST · TRICEPS · FRONT DELTS</div>

      <div class="sheet-stats">
        <div class="sheet-stat"><div class="v" id="sStats1">4×8</div><div class="l">SETS × REPS</div></div>
        <div class="sheet-stat"><div class="v" id="sStats2">90<span style="font-size:11px;color:var(--muted);">s</span></div><div class="l">REST</div></div>
        <div class="sheet-stat"><div class="v" id="sStats3">62.5<span style="font-size:11px;color:var(--muted);"> kg</span></div><div class="l">SUGGESTED</div></div>
      </div>

      <div class="sheet-section">Form cues</div>
      <div class="form-cues" id="formCues"></div>

      <div class="sheet-close-row">
        <button class="sheet-skip" onclick="closeSheet()">Skip</button>
        <button class="sheet-done" onclick="markDone()">
          <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
          Mark complete
        </button>
      </div>
    </div>
  </div>

<script>
  // Today's workout — push day
  const WORKOUT = [
    {
      id: 'bench',
      name: 'Bench Press',
      target: 'Chest · Triceps · Front delts',
      sets: 4, reps: 8, rest: 90, weight: '62.5 kg',
      icon: '<rect x="3" y="11" width="2" height="2" /><rect x="19" y="11" width="2" height="2"/><line x1="5" y1="12" x2="19" y2="12"/><line x1="3.5" y1="6" x2="3.5" y2="18"/><line x1="20.5" y1="6" x2="20.5" y2="18"/>',
      cues: [
        '<b>Plant feet</b> flat — drive through the floor as you press.',
        '<b>Retract scapula</b> — squeeze shoulder blades back and down.',
        '<b>Bar path</b> straight over the lower chest, not the throat.',
        '<b>2-second descent</b> — control the eccentric, then drive up explosively.',
      ],
    },
    {
      id: 'ohp',
      name: 'Overhead Press',
      target: 'Shoulders · Triceps · Upper chest',
      sets: 4, reps: 6, rest: 90, weight: '42.5 kg',
      icon: '<rect x="9" y="3" width="6" height="3" rx="1"/><line x1="12" y1="6" x2="12" y2="16"/><circle cx="12" cy="19" r="2"/><line x1="6" y1="13" x2="18" y2="13"/>',
      cues: [
        '<b>Glutes tight, core braced</b> — protect lumbar.',
        '<b>Bar over mid-foot</b> — lock out directly above the shoulder.',
        '<b>Head through</b> the window once you clear forehead height.',
        '<b>3-second rest</b> at top of each rep — re-stack and re-brace.',
      ],
    },
    {
      id: 'incline-db',
      name: 'Incline DB Press · superset',
      target: 'Upper chest · Front delts',
      sets: 3, reps: 10, rest: 60, weight: '22.5 kg each',
      icon: '<line x1="5" y1="18" x2="11" y2="6"/><line x1="11" y1="6" x2="19" y2="6"/><circle cx="6" cy="13" r="2"/><circle cx="6" cy="17" r="2"/>',
      cues: [
        '<b>30-45° bench angle</b> — steeper bias shifts work to delts.',
        '<b>Soft elbow lockout</b> — keep tension on chest, not joints.',
        '<b>Squeeze at top</b> for a half-second — full contraction.',
      ],
    },
    {
      id: 'cable-fly',
      name: 'Cable Fly · superset',
      target: 'Inner chest · pec finisher',
      sets: 3, reps: 12, rest: 60, weight: '12.5 kg each',
      icon: '<line x1="4" y1="6" x2="12" y2="14"/><line x1="20" y1="6" x2="12" y2="14"/><circle cx="12" cy="16" r="2"/>',
      cues: [
        '<b>Slight forward lean</b> — pec under tension throughout.',
        '<b>Hug a tree</b> motion — palms face each other at the bottom.',
        '<b>Slow eccentric</b> — 3-count back to start.',
      ],
    },
    {
      id: 'tricep-rope',
      name: 'Tricep Rope Pushdown',
      target: 'Triceps · long head',
      sets: 3, reps: 12, rest: 60, weight: '20 kg',
      icon: '<line x1="12" y1="3" x2="12" y2="12"/><line x1="9" y1="12" x2="9" y2="18"/><line x1="15" y1="12" x2="15" y2="18"/>',
      cues: [
        '<b>Elbows pinned</b> at sides — only the forearms move.',
        '<b>Split rope</b> hard at the bottom — full lockout.',
        '<b>2-second stretch</b> at top for the long head.',
      ],
    },
    {
      id: 'lateral-raise',
      name: 'DB Lateral Raise',
      target: 'Side delts · shoulder width',
      sets: 3, reps: 15, rest: 45, weight: '8 kg each',
      icon: '<circle cx="12" cy="6" r="2"/><line x1="3" y1="14" x2="21" y2="14"/><circle cx="4" cy="14" r="2"/><circle cx="20" cy="14" r="2"/>',
      cues: [
        '<b>Lead with elbows</b> — wrists stay below elbows.',
        '<b>Stop at parallel</b> — no shrugging past shoulder height.',
        '<b>Slight forward lean</b> isolates the middle delt.',
      ],
    },
  ];

  function fmt(ex) {
    return `${ex.sets} × ${ex.reps} · ${ex.weight} <span class="dot">·</span> ${ex.rest}s rest`;
  }

  // Render exercise list
  const listEl = document.getElementById('exList');
  listEl.innerHTML = WORKOUT.map((ex, i) => `
    <div class="ex-row" data-i="${i}">
      <div class="ex-num">${i + 1}</div>
      <div class="ex-body">
        <div class="ex-title">${ex.name}</div>
        <div class="ex-meta">${fmt(ex)}</div>
      </div>
      <div class="ex-chev">›</div>
    </div>
  `).join('');

  // Tap a row → open the exercise detail sheet
  listEl.querySelectorAll('.ex-row').forEach(row => {
    row.addEventListener('click', () => openSheet(parseInt(row.dataset.i, 10)));
  });

  let currentEx = null;

  function openSheet(i) {
    const ex = WORKOUT[i]; if (!ex) return;
    currentEx = i;
    document.getElementById('sheetTitle').textContent = ex.name;
    document.getElementById('sheetTarget').textContent = ex.target.toUpperCase();
    document.getElementById('sStats1').textContent = ex.sets + '×' + ex.reps;
    document.getElementById('sStats2').innerHTML = ex.rest + '<span style="font-size:11px;color:var(--muted);">s</span>';
    document.getElementById('sStats3').innerHTML = ex.weight.replace(/(\\d+(?:\\.\\d+)?)/, '$1') + '';
    document.getElementById('sStats3').innerHTML = ex.weight;
    document.getElementById('formHero').innerHTML = `
      <span class="play">Play form</span>
      <svg viewBox="0 0 24 24">${ex.icon}</svg>
    `;
    const cueEl = document.getElementById('formCues');
    cueEl.innerHTML = ex.cues.map((c, n) => `
      <div class="form-cue"><div class="n">${n + 1}</div><div class="t">${c}</div></div>
    `).join('');
    document.getElementById('exSheet').classList.add('on');
    document.getElementById('exSheetBack').classList.add('on');
    document.getElementById('exSheet').setAttribute('aria-hidden', 'false');
    if (window.coreTrack) coreTrack('gym_exercise_opened', { ex: ex.id });
  }

  function closeSheet() {
    document.getElementById('exSheet').classList.remove('on');
    document.getElementById('exSheetBack').classList.remove('on');
    document.getElementById('exSheet').setAttribute('aria-hidden', 'true');
  }
  function markDone() {
    if (currentEx === null) return;
    const row = document.querySelector('.ex-row[data-i="' + currentEx + '"]');
    if (row) row.classList.add('done');
    if (window.coreTrack) coreTrack('gym_exercise_done', { ex: WORKOUT[currentEx].id });
    closeSheet();
  }
  function startSession() {
    if (window.coreTrack) coreTrack('gym_session_start', {});
    openSheet(0);
  }
  document.getElementById('exSheetBack').addEventListener('click', closeSheet);

  if (window.coreTrack) coreTrack('screen_view', { screen: 'gym' });
</script>
</body>
</html>
