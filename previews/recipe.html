<!doctype html>
<html lang="en">
<head>
<script>try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8"/>
<title>CORE — Recipe Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#02020A"/>
<link rel="stylesheet" href="_lib/core-responsive.css">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<style>
:root{ --bg-base:#02020A; --border:rgba(255,255,255,0.08); --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --sc:#FFCB3D; }
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{min-height:100vh;background:#0A0A14;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;color:var(--text);
  -webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}
.phone{position:relative;width:390px;height:844px;background:var(--bg-base);border-radius:56px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:60;}
#ambBg{position:absolute;inset:0;z-index:0;background:
  radial-gradient(60% 35% at 50% 20%, color-mix(in srgb, var(--sc) 18%, transparent) 0%, transparent 55%),
  linear-gradient(180deg,#0b0a08 0%,#02020A 52%,#070611 100%);}
.frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding-top:54px;}
.top{display:flex;align-items:center;gap:10px;padding:6px 18px 8px;}
.top h1{flex:1;text-align:center;font-size:17px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;justify-content:center;gap:7px;}
.top h1 svg{width:17px;height:17px;color:var(--sc);}
.back,.iconbtn{width:38px;height:38px;flex:none;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.05);
  color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;-webkit-appearance:none;appearance:none;}
.back svg,.iconbtn svg{width:18px;height:18px;}
.scroll{flex:1;overflow-y:auto;padding:8px 20px calc(28px + env(safe-area-inset-bottom));}
.scroll::-webkit-scrollbar{display:none;}
.r-hero h2{font-size:26px;font-weight:900;letter-spacing:-.6px;margin-top:6px;}
.r-hero p{font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.5;}
.r-stats{display:flex;gap:9px;margin-top:14px;}
.r-stat{flex:1;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,0.04);padding:11px 12px;}
.r-stat .n{font-size:19px;font-weight:900;letter-spacing:-.5px;}
.r-stat .k{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
.r-sec{font-size:10.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:20px 2px 10px;}
.r-sec .opt{color:var(--dim);letter-spacing:.04em;text-transform:none;font-size:11px;margin-left:5px;}
.r-inwrap{display:flex;gap:9px;}
.r-input{flex:1;border-radius:13px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:#fff;padding:13px 14px;font:inherit;font-size:14px;-webkit-appearance:none;appearance:none;}
.r-input::placeholder{color:var(--dim);}
.r-add{width:48px;flex:none;border-radius:13px;border:none;background:var(--sc);color:#06121f;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;appearance:none;}
.r-add svg{width:20px;height:20px;}
.r-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;}
.r-chip{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:99px;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);color:#cfd6e6;font:inherit;font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;transition:.12s;}
.r-chip.on{border-color:color-mix(in srgb,var(--sc) 55%,transparent);background:color-mix(in srgb,var(--sc) 16%,transparent);color:#fff;}
.r-chip:active{transform:scale(.96);}
.r-chip .x{width:15px;height:15px;color:var(--muted);}
.r-ing{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border-radius:99px;background:color-mix(in srgb,var(--sc) 14%,transparent);
  border:1px solid color-mix(in srgb,var(--sc) 30%,transparent);color:#fff;font-size:13px;font-weight:600;}
.r-ing button{background:none;border:none;color:#fff;cursor:pointer;display:flex;padding:0;-webkit-appearance:none;appearance:none;}
.r-ing button svg{width:14px;height:14px;}
.r-gen{width:100%;margin-top:22px;border:none;border-radius:16px;padding:16px;font:inherit;font-size:15px;font-weight:800;cursor:pointer;
  -webkit-appearance:none;appearance:none;background:linear-gradient(135deg,var(--sc),color-mix(in srgb,var(--sc) 62%,#7a4d00));color:#06121f;
  display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 26px color-mix(in srgb,var(--sc) 38%,transparent);}
.r-gen svg{width:19px;height:19px;}
.r-gen:disabled{opacity:.6;}
.r-results{margin-top:22px;}
.r-rhead{display:flex;align-items:center;justify-content:space-between;}
.r-regen{display:inline-flex;align-items:center;gap:5px;color:var(--sc);background:none;border:none;font:inherit;font-weight:700;font-size:12.5px;cursor:pointer;-webkit-appearance:none;appearance:none;}
.r-regen svg{width:14px;height:14px;}
.r-card{border-radius:18px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,0.055),rgba(255,255,255,0.02));
  box-shadow:0 8px 24px rgba(0,0,0,0.25);padding:15px 16px;margin-top:12px;animation:rIn .4s cubic-bezier(.22,1,.36,1) both;}
@keyframes rIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.r-ctop{display:flex;align-items:flex-start;gap:10px;}
.r-cmeta{flex:1;min-width:0;}
.r-ctitle{font-size:16px;font-weight:800;letter-spacing:-.2px;}
.r-cdesc{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45;}
.r-save{flex:none;width:60px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:#cfd6e6;
  font:inherit;font-size:12px;font-weight:700;padding:8px 0;cursor:pointer;-webkit-appearance:none;appearance:none;}
.r-save.on{border-color:color-mix(in srgb,var(--sc) 55%,transparent);background:color-mix(in srgb,var(--sc) 16%,transparent);color:var(--sc);}
.r-meta{display:flex;gap:14px;margin-top:11px;}
.r-mi{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#cfd6e6;font-weight:600;}
.r-mi svg{width:14px;height:14px;color:var(--sc);}
.r-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
.r-tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;background:rgba(255,255,255,0.06);color:#aab2c5;}
.r-more{margin-top:12px;font-size:12.5px;font-weight:700;color:var(--sc);cursor:pointer;display:inline-flex;align-items:center;gap:5px;background:none;border:none;-webkit-appearance:none;appearance:none;padding:0;}
.r-more svg{width:14px;height:14px;transition:transform .2s;}
.r-detail{display:none;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);}
.r-card.open .r-detail{display:block;animation:rIn .3s ease both;}
.r-card.open .r-more svg{transform:rotate(180deg);}
.r-dh{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:2px 0 8px;}
.r-list{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.r-list li{font-size:13.5px;color:#dfe6f2;line-height:1.45;display:flex;gap:9px;}
.r-list li .b{color:var(--sc);font-weight:800;flex:none;}
.r-empty{text-align:center;color:var(--muted);font-size:13px;padding:34px 20px;line-height:1.6;border:1px dashed var(--border);border-radius:16px;margin-top:8px;}
.r-load{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 0;}
.r-spin{width:42px;height:42px;border-radius:50%;border:3px solid rgba(255,255,255,0.12);border-top-color:var(--sc);animation:rspin .8s linear infinite;}
@keyframes rspin{to{transform:rotate(360deg)}}
.r-panel{position:absolute;inset:0;z-index:120;background:linear-gradient(180deg,#0b0a08,#02020A);display:none;flex-direction:column;}
.r-panel.on{display:flex;animation:rIn .35s ease both;}
.r-ptop{display:flex;align-items:center;gap:10px;padding:54px 18px 10px;}
.r-ptop h2{flex:1;font-size:17px;font-weight:800;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px;}
.r-ptop h2 svg{width:16px;height:16px;color:var(--sc);}
.r-pbody{flex:1;overflow-y:auto;padding:6px 20px calc(28px + env(safe-area-inset-bottom));}
.r-pbody::-webkit-scrollbar{display:none;}
.r-rm{flex:none;width:64px;border-radius:10px;border:1px solid rgba(255,90,90,0.3);background:rgba(255,90,90,0.1);color:#ff6b6b;font:inherit;font-size:12px;font-weight:700;padding:8px 0;cursor:pointer;-webkit-appearance:none;appearance:none;}
.toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);z-index:130;background:rgba(20,22,32,0.96);
  border:1px solid var(--border);border-radius:13px;padding:11px 16px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;max-width:80%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div id="ambBg"></div>
    <div class="frame">
      <div class="top">
        <a class="back" href="coach.html" aria-label="Back to Coach"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></a>
        <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Recipe Generator</h1>
        <button class="iconbtn" id="savedBtn" aria-label="Saved recipes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
      </div>
      <div class="scroll" id="scroll">
        <div class="r-hero">
          <h2>Create Recipes Fast</h2>
          <p>Add ingredients if you want, choose your goal, and generate 3 tailored recipes.</p>
        </div>
        <div class="r-stats">
          <div class="r-stat"><div class="n" id="stSessions">0</div><div class="k">Sessions</div></div>
          <div class="r-stat"><div class="n" id="stSaved">0</div><div class="k">Saved</div></div>
          <div class="r-stat"><div class="n" id="stGen">0</div><div class="k">Generated</div></div>
        </div>

        <div class="r-sec">Ingredients <span class="opt">optional</span></div>
        <div class="r-inwrap">
          <input class="r-input" id="ingInput" type="text" placeholder="e.g. chicken, rice, spinach" autocomplete="off"/>
          <button class="r-add" id="ingAdd" aria-label="Add ingredient"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
        </div>
        <div class="r-chips" id="ingChips"></div>

        <div class="r-sec">Recipe Goal</div>
        <div class="r-chips" id="goalChips"></div>

        <div class="r-sec">Meal Type</div>
        <div class="r-chips" id="mealChips"></div>

        <button class="r-gen" id="genBtn" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v4M3 5h4M6 17v4M4 19h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5z"/></svg>Generate 3 Recipes</button>

        <div class="r-results" id="results"></div>
      </div>
    </div>
    <div class="r-panel" id="savedPanel">
      <div class="r-ptop">
        <button class="back" id="savedBack" type="button" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
        <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>Saved Recipes</h2>
        <span style="width:38px;flex:none"></span>
      </div>
      <div class="r-pbody" id="savedBody"></div>
    </div>
    <div class="home-indicator"></div>
    <div class="toast" id="toast"></div>
  </div>

<script src="_lib/core-config.js"></script>
<script src="_lib/core-ai.js"></script>
<script src="_lib/core-sfx.js"></script>
<script>
(function(){
  var $=function(s){return document.querySelector(s);};
  var GOALS=['Balanced','High Protein','Low Carb','Low Calorie','Muscle Gain','Quick Meals','Vegetarian'];
  var MEALS=['Any','Breakfast','Lunch','Dinner','Snack'];
  var ingredients=[], goal='Balanced', meal='Any', lastRecipes=[];
  function ls(k,d){ try{ var v=localStorage.getItem(k); return v==null?d:v; }catch(e){ return d; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function svg(d){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+d+'</svg>'; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  var toastEl=$('#toast');
  function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(toastEl._t); toastEl._t=setTimeout(function(){ toastEl.classList.remove('show'); },2200); }
  function getSaved(){ try{ return JSON.parse(ls('coreRecipesSaved.v1','[]'))||[]; }catch(e){ return []; } }
  function getStats(){ try{ return JSON.parse(ls('coreRecipeStats.v1','{}'))||{}; }catch(e){ return {}; } }
  function setStats(o){ lsSet('coreRecipeStats.v1', JSON.stringify(o)); }

  function renderStats(){
    var st=getStats(), saved=getSaved();
    $('#stSessions').textContent=st.sessions||0;
    $('#stSaved').textContent=saved.length;
    $('#stGen').textContent=st.generated||0;
  }
  function renderChips(){
    $('#goalChips').innerHTML=GOALS.map(function(g){ return '<button class="r-chip'+(g===goal?' on':'')+'" data-goal="'+esc(g)+'" type="button">'+esc(g)+'</button>'; }).join('');
    $('#mealChips').innerHTML=MEALS.map(function(m){ return '<button class="r-chip'+(m===meal?' on':'')+'" data-meal="'+esc(m)+'" type="button">'+esc(m)+'</button>'; }).join('');
    Array.prototype.forEach.call(document.querySelectorAll('[data-goal]'), function(b){ b.addEventListener('click', function(){ goal=b.getAttribute('data-goal'); renderChips(); }); });
    Array.prototype.forEach.call(document.querySelectorAll('[data-meal]'), function(b){ b.addEventListener('click', function(){ meal=b.getAttribute('data-meal'); renderChips(); }); });
  }
  function renderIngredients(){
    $('#ingChips').innerHTML=ingredients.map(function(it,i){ return '<span class="r-ing">'+esc(it)+'<button data-rm="'+i+'" aria-label="Remove">'+svg('<path d="M6 6l12 12M18 6L6 18"/>')+'</button></span>'; }).join('');
    Array.prototype.forEach.call(document.querySelectorAll('[data-rm]'), function(b){ b.addEventListener('click', function(){ ingredients.splice(+b.getAttribute('data-rm'),1); renderIngredients(); }); });
  }
  function addIngredient(){
    var v=($('#ingInput').value||'').trim();
    if(!v) return;
    v.split(',').forEach(function(part){ var t=part.trim(); if(t && ingredients.indexOf(t)<0 && ingredients.length<12) ingredients.push(t); });
    $('#ingInput').value=''; renderIngredients();
  }

  // ── recipe generation (real text AI, with a graceful curated fallback) ──
  function aiRecipes(){
    return new Promise(function(resolve,reject){
      if(!(window.coreAI && coreAI.chat && coreAI.ready && coreAI.ready())){ reject('no-ai'); return; }
      var prompt='You are a practical chef. Generate exactly 3 distinct, realistic recipes. '
        +'Goal: '+goal+'. Meal type: '+meal+'. '
        +(ingredients.length?('Try to use these ingredients where sensible: '+ingredients.join(', ')+'. '):'')
        +'Reply STRICT JSON only, no markdown: {"recipes":[{"title":"","desc":"one appetising sentence","minutes":0,"calories":0,"protein":0,"tags":["2-3 short tags"],"ingredients":["6-9 items with amounts"],"steps":["4-6 short numbered steps"]}]}. '
        +'Keep it healthy-leaning, accurate and easy to cook at home.';
      coreAI.chat([{ role:'user', content:prompt }], { role:'plan', temperature:0.6, maxTokens:900, json:true })
        .then(function(r){
          if(!r || !r.ok || !r.text || r.fallback){ reject((r&&r.reason)||'ai-fail'); return; }
          try{
            var txt=String(r.text).replace(/^```json\s*|\s*```$/g,'').trim();
            var s=txt.indexOf('{'), e=txt.lastIndexOf('}'); if(s>=0&&e>s) txt=txt.slice(s,e+1);
            var j=JSON.parse(txt);
            if(j && j.recipes && j.recipes.length){ resolve(j.recipes.slice(0,3)); } else reject('parse');
          }catch(err){ reject('parse'); }
        }, function(e){ reject((e&&e.message)||'request'); });
    });
  }
  function fallbackRecipes(){
    var base=[
      {title:'Lemon Herb Roasted Chicken & Veggies',desc:'A simple, flavourful sheet-pan dinner packed with lean protein and vibrant vegetables.',minutes:50,calories:460,protein:42,tags:['High protein','Sheet pan'],
        ingredients:['2 chicken breasts','1 tbsp olive oil','1 lemon (juiced)','1 tsp dried herbs','1 zucchini, sliced','1 red pepper, chopped','Salt & pepper'],
        steps:['Heat oven to 200°C / 400°F.','Toss chicken and veg with oil, lemon, herbs, salt and pepper.','Spread on a tray in one layer.','Roast 25–30 min until chicken is cooked through.','Rest 5 min and serve.']},
      {title:'Quinoa Black Bean Salad with Avocado',desc:'A fresh, fibre-rich bowl with plant protein and a zesty lime dressing.',minutes:25,calories:390,protein:16,tags:['Vegetarian','High fibre'],
        ingredients:['1 cup quinoa','1 can black beans, rinsed','1 avocado, diced','1 cup cherry tomatoes','2 tbsp lime juice','1 tbsp olive oil','Fresh coriander'],
        steps:['Cook quinoa and let it cool.','Combine beans, tomatoes and quinoa.','Whisk lime juice with oil and pour over.','Fold in avocado and coriander.','Season and serve chilled.']},
      {title:'Greek Yogurt Berry Protein Bowl',desc:'A quick, high-protein breakfast or snack that feels like dessert.',minutes:5,calories:280,protein:24,tags:['Quick','Breakfast'],
        ingredients:['1 cup Greek yogurt','1/2 cup mixed berries','1 tbsp honey','2 tbsp granola','1 tbsp chia seeds'],
        steps:['Spoon yogurt into a bowl.','Top with berries and granola.','Drizzle honey and sprinkle chia.','Serve immediately.']}
    ];
    return base;
  }

  function generate(){
    var btn=$('#genBtn'); btn.disabled=true;
    var res=$('#results');
    res.innerHTML='<div class="r-load"><div class="r-spin"></div><div style="color:var(--muted);font-size:13px">Cooking up 3 recipes…</div></div>';
    try{ window.coreSfx&&window.coreSfx('click'); }catch(e){}
    var t0=Date.now();
    aiRecipes().then(function(recipes){ done(recipes,false); }, function(){ done(fallbackRecipes(),true); });
    function done(recipes,isFallback){
      var wait=Math.max(0, 900-(Date.now()-t0));
      setTimeout(function(){
        btn.disabled=false;
        lastRecipes=recipes;
        var st=getStats(); st.sessions=(st.sessions||0)+1; st.generated=(st.generated||0)+recipes.length; setStats(st); renderStats();
        renderResults(recipes,isFallback);
      }, wait);
    }
  }

  function recipeKey(r){ return (r.title||'').toLowerCase().replace(/[^a-z0-9]+/g,'-'); }
  function isSaved(r){ return getSaved().some(function(x){ return recipeKey(x)===recipeKey(r); }); }
  function toggleSave(r){
    var saved=getSaved(), k=recipeKey(r), i=-1;
    for(var n=0;n<saved.length;n++){ if(recipeKey(saved[n])===k){ i=n; break; } }
    if(i>=0){ saved.splice(i,1); toast('Removed from saved'); }
    else { saved.push(r); toast('Saved · '+esc(r.title)); }
    lsSet('coreRecipesSaved.v1', JSON.stringify(saved.slice(-40)));
    renderStats();
  }

  function recipeCard(r,idx){
    var tags=(r.tags||[]).map(function(t){ return '<span class="r-tag">'+esc(t)+'</span>'; }).join('');
    var ings=(r.ingredients||[]).map(function(x){ return '<li><span class="b">·</span>'+esc(x)+'</li>'; }).join('');
    var steps=(r.steps||[]).map(function(x,i){ return '<li><span class="b">'+(i+1)+'</span>'+esc(x)+'</li>'; }).join('');
    var saved=isSaved(r);
    return '<div class="r-card" data-i="'+idx+'">'
      +'<div class="r-ctop"><div class="r-cmeta"><div class="r-ctitle">'+esc(r.title)+'</div><div class="r-cdesc">'+esc(r.desc)+'</div></div>'
        +'<button class="r-save'+(saved?' on':'')+'" data-save="'+idx+'" type="button">'+(saved?'Saved':'Save')+'</button></div>'
      +'<div class="r-meta">'
        +(r.minutes?'<span class="r-mi">'+svg('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>')+esc(r.minutes)+' min</span>':'')
        +(r.calories?'<span class="r-mi">'+svg('<path d="M12 2s4 4 4 8a4 4 0 0 1-8 0c0-1.5 1-3 1-3"/>')+esc(r.calories)+' cal</span>':'')
        +(r.protein?'<span class="r-mi">'+svg('<path d="M4 7h16M4 12h16M4 17h16"/>')+esc(r.protein)+'g protein</span>':'')
      +'</div>'
      +(tags?'<div class="r-tags">'+tags+'</div>':'')
      +'<button class="r-more" data-more="'+idx+'" type="button">View ingredients & steps '+svg('<path d="M6 9l6 6 6-6"/>')+'</button>'
      +'<div class="r-detail">'
        +(ings?'<div class="r-dh">Ingredients</div><ul class="r-list">'+ings+'</ul>':'')
        +(steps?'<div class="r-dh">Steps</div><ul class="r-list">'+steps+'</ul>':'')
      +'</div></div>';
  }
  function renderResults(recipes,isFallback){
    var res=$('#results');
    res.innerHTML='<div class="r-rhead"><div class="r-sec" style="margin:0">Results</div>'
      +'<button class="r-regen" id="regen" type="button">'+svg('<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>')+'Regenerate</button></div>'
      +(isFallback?'<div style="font-size:11.5px;color:var(--muted);margin:8px 2px 0">Showing sample recipes — connect an AI key in Settings for fully tailored results.</div>':'')
      +recipes.map(recipeCard).join('');
    $('#regen').addEventListener('click', generate);
    Array.prototype.forEach.call(res.querySelectorAll('[data-more]'), function(b){ b.addEventListener('click', function(){ b.closest('.r-card').classList.toggle('open'); }); });
    Array.prototype.forEach.call(res.querySelectorAll('[data-save]'), function(b){ b.addEventListener('click', function(){ var r=lastRecipes[+b.getAttribute('data-save')]; toggleSave(r); b.classList.toggle('on'); b.textContent=b.classList.contains('on')?'Saved':'Save'; }); });
    try{ $('#results').scrollIntoView({behavior:'smooth',block:'start'}); }catch(e){}
  }

  // init
  renderChips(); renderIngredients(); renderStats();
  $('#ingAdd').addEventListener('click', addIngredient);
  $('#ingInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); addIngredient(); } });
  $('#genBtn').addEventListener('click', generate);
  function savedCard(r,idx){
    var ings=(r.ingredients||[]).map(function(x){ return '<li><span class="b">·</span>'+esc(x)+'</li>'; }).join('');
    var steps=(r.steps||[]).map(function(x,i){ return '<li><span class="b">'+(i+1)+'</span>'+esc(x)+'</li>'; }).join('');
    var tags=(r.tags||[]).map(function(t){ return '<span class="r-tag">'+esc(t)+'</span>'; }).join('');
    return '<div class="r-card" data-i="'+idx+'">'
      +'<div class="r-ctop"><div class="r-cmeta"><div class="r-ctitle">'+esc(r.title)+'</div><div class="r-cdesc">'+esc(r.desc)+'</div></div>'
        +'<button class="r-rm" data-rm="'+idx+'" type="button">Remove</button></div>'
      +'<div class="r-meta">'
        +(r.minutes?'<span class="r-mi">'+svg('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>')+esc(r.minutes)+' min</span>':'')
        +(r.calories?'<span class="r-mi">'+svg('<path d="M12 2s4 4 4 8a4 4 0 0 1-8 0c0-1.5 1-3 1-3"/>')+esc(r.calories)+' cal</span>':'')
        +(r.protein?'<span class="r-mi">'+svg('<path d="M4 7h16M4 12h16M4 17h16"/>')+esc(r.protein)+'g protein</span>':'')
      +'</div>'
      +(tags?'<div class="r-tags">'+tags+'</div>':'')
      +'<button class="r-more" data-more="'+idx+'" type="button">View ingredients & steps '+svg('<path d="M6 9l6 6 6-6"/>')+'</button>'
      +'<div class="r-detail">'+(ings?'<div class="r-dh">Ingredients</div><ul class="r-list">'+ings+'</ul>':'')+(steps?'<div class="r-dh">Steps</div><ul class="r-list">'+steps+'</ul>':'')+'</div></div>';
  }
  function renderSaved(){
    var saved=getSaved(), body=$('#savedBody');
    if(!saved.length){ body.innerHTML='<div class="r-empty">No saved recipes yet.<br>Tap <b>Save</b> on any recipe to keep it here.</div>'; return; }
    body.innerHTML=saved.slice().reverse().map(function(r,i){ return savedCard(r, saved.length-1-i); }).join('');
    Array.prototype.forEach.call(body.querySelectorAll('[data-more]'), function(b){ b.addEventListener('click', function(){ b.closest('.r-card').classList.toggle('open'); }); });
    Array.prototype.forEach.call(body.querySelectorAll('[data-rm]'), function(b){ b.addEventListener('click', function(){
      var sv=getSaved(); sv.splice(+b.getAttribute('data-rm'),1); lsSet('coreRecipesSaved.v1', JSON.stringify(sv)); renderSaved(); renderStats(); toast('Removed from saved');
    }); });
  }
  function openSaved(){ renderSaved(); $('#savedPanel').classList.add('on'); }
  $('#savedBtn').addEventListener('click', openSaved);
  $('#savedBack').addEventListener('click', function(){ $('#savedPanel').classList.remove('on'); });
})();
</script>
</body>
</html>
