<!doctype html>
<html lang="en">
<head>
<script>try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8"/>
<title>CORE — Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<style>
:root{
  --bg-base:#02020A;--bg-card:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.08);
  --text:#F8FAFE;--muted:#9AA1B7;--dim:#4F5570;--blue:#0A84FF;--green:#34D399;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{min-height:100vh;background:#0A0A14;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
  color:var(--text);-webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}
.phone{position:relative;width:390px;height:844px;background:var(--bg-base);border-radius:56px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:60;}
#ambBg{position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(60% 35% at 50% 22%, color-mix(in srgb, var(--sc,#0A84FF) 20%, transparent) 0%, transparent 55%),
    radial-gradient(50% 30% at 50% 100%, rgba(255,255,255,0.04) 0%, transparent 65%),
    linear-gradient(180deg,#070713 0%,#02020A 50%,#050510 100%);transition:background .4s ease;}

.frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding-top:54px;}
.top{display:flex;align-items:center;gap:12px;padding:6px 18px 4px;flex-shrink:0;}
.back{width:38px;height:38px;flex:none;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.06);
  color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;text-decoration:none;}
.back:active{transform:scale(.94);}.back svg{width:18px;height:18px;}
.top h1{font-size:16px;font-weight:800;letter-spacing:-0.3px;}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 20px 28px;}
.scroll::-webkit-scrollbar{display:none;}

.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 0 8px;}
.hero .ic{width:96px;height:96px;border-radius:28px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;
  color:var(--sc,#0A84FF);
  background:color-mix(in srgb, var(--sc,#0A84FF) 16%, transparent);
  border:1px solid color-mix(in srgb, var(--sc,#0A84FF) 38%, transparent);
  box-shadow:0 0 36px color-mix(in srgb, var(--sc,#0A84FF) 26%, transparent);}
.hero .ic svg{width:46px;height:46px;}
.hero h2{font-size:26px;font-weight:800;letter-spacing:-0.6px;}
.hero p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5;max-width:280px;}
.badge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:10px;font-weight:800;letter-spacing:.08em;
  text-transform:uppercase;padding:5px 11px;border-radius:999px;
  background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.34);color:var(--green);}
.badge .d{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;}

.sec{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:24px 2px 10px;}
.card{border-radius:18px;background:rgba(4,4,18,0.40);border:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:6px 4px;}
.row{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.row:last-child{border-bottom:none;}
.row .ck{width:22px;height:22px;flex:none;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-top:1px;
  color:var(--sc,#0A84FF);background:color-mix(in srgb, var(--sc,#0A84FF) 14%, transparent);}
.row .ck svg{width:13px;height:13px;}
.row span{font-size:13.5px;line-height:1.45;color:#D7DCEA;}

.cta{width:100%;margin-top:22px;border:none;border-radius:18px;padding:16px;font:inherit;font-size:15px;font-weight:800;
  cursor:pointer;color:#02030A;background:var(--sc,#0A84FF);box-shadow:0 12px 30px color-mix(in srgb, var(--sc,#0A84FF) 34%, transparent);
  display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s;}
.cta:active{transform:scale(.98);}.cta svg{width:17px;height:17px;}
.note{text-align:center;font-size:11.5px;color:var(--dim);margin-top:12px;line-height:1.5;}

.last{margin-top:18px;border-radius:18px;border:1px solid var(--border);background:rgba(4,4,18,0.4);padding:14px 16px;
  display:none;align-items:center;gap:14px;}
.last.show{display:flex;}
.last .ls-ring{width:46px;height:46px;flex:none;}
.last .ls-meta{flex:1;}
.last .ls-k{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.last .ls-v{font-size:14px;font-weight:700;margin-top:2px;}

/* ── Camera scanner overlay ─────────────────────────────────────────── */
.cam{position:absolute;inset:0;z-index:90;background:#000;display:none;flex-direction:column;}
.cam.on{display:flex;}
.cam video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}
.cam.front video{transform:scaleX(-1);}
.cam canvas{display:none;}
.cam-shade{position:absolute;inset:0;background:radial-gradient(120% 80% at 50% 42%,transparent 40%,rgba(0,0,0,0.55) 100%);pointer-events:none;}
.cam-top{position:absolute;top:0;left:0;right:0;z-index:3;display:flex;align-items:center;justify-content:space-between;
  padding:58px 18px 0;}
.cam-x{width:38px;height:38px;border-radius:50%;border:none;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
  color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cam-x svg{width:18px;height:18px;}
.cam-tt{font-size:13px;font-weight:800;letter-spacing:.02em;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
  padding:7px 13px;border-radius:999px;}
.cam-flip{width:38px;height:38px;border-radius:50%;border:none;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
  color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cam-flip svg{width:18px;height:18px;}
/* framing guide */
.reticle{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;
  width:230px;height:300px;border-radius:26px;
  box-shadow:0 0 0 2px color-mix(in srgb,var(--sc,#0A84FF) 75%,transparent);}
.reticle.oval{width:220px;height:280px;border-radius:50%;}
.reticle.wide{width:280px;height:200px;border-radius:22px;}
.reticle::before,.reticle::after{content:"";position:absolute;width:26px;height:26px;border:3px solid #fff;}
.reticle::before{left:-2px;top:-2px;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
.reticle::after{right:-2px;bottom:-2px;border-left:none;border-top:none;border-radius:0 0 8px 0;}
.scanline{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;
  width:230px;height:300px;overflow:hidden;border-radius:26px;display:none;}
.scanning .scanline{display:block;}
.scanline i{position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--sc,#0A84FF),transparent);
  box-shadow:0 0 16px 3px color-mix(in srgb,var(--sc,#0A84FF) 70%,transparent);
  animation:sweep 1.5s ease-in-out infinite;}
@keyframes sweep{0%{top:4%;}50%{top:94%;}100%{top:4%;}}
.cam-hint{position:absolute;left:0;right:0;bottom:152px;z-index:3;text-align:center;font-size:13.5px;font-weight:600;
  color:#fff;padding:0 30px;text-shadow:0 1px 10px rgba(0,0,0,0.6);}
/* shutter */
.cam-bottom{position:absolute;left:0;right:0;bottom:46px;z-index:3;display:flex;align-items:center;justify-content:center;}
.shutter{width:74px;height:74px;border-radius:50%;border:4px solid rgba(255,255,255,0.85);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.shutter:active{transform:scale(.92);}
.shutter i{width:56px;height:56px;border-radius:50%;background:#fff;transition:.15s;}
.scanning .shutter{opacity:.4;pointer-events:none;}
/* voice mode */
.cam.voice video,.cam.voice .reticle,.cam.voice .scanline,.cam.voice .cam-shade,.cam.voice .cam-flip{display:none;}
.cam.voice{background:radial-gradient(70% 50% at 50% 38%,color-mix(in srgb,var(--sc,#0A84FF) 22%,#05050d),#04040a);}
.wave{position:absolute;left:0;right:0;top:40%;transform:translateY(-50%);z-index:2;display:none;align-items:flex-end;justify-content:center;gap:5px;height:120px;}
.cam.voice .wave{display:flex;}
.wave b{width:6px;border-radius:3px;background:var(--sc,#0A84FF);height:10px;box-shadow:0 0 10px color-mix(in srgb,var(--sc,#0A84FF) 60%,transparent);}

/* ── Physique 360 capture ── */
#GREEN{--g:#34D399;}
.phyz{position:absolute;inset:0;z-index:2;display:none;}
.cam.physique .reticle,.cam.physique .scanline{display:none!important;}
.cam.physique .phyz{display:block;}
.phyz-ring{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:252px;height:252px;}
.phyz-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
.phyz-svg circle{fill:none;stroke-width:5;}
.pr-bg{stroke:rgba(255,255,255,0.16);}
.pr-fg{stroke:#34D399;stroke-linecap:round;stroke-dasharray:590.6;stroke-dashoffset:590.6;
  transition:stroke-dashoffset .55s cubic-bezier(.22,1,.36,1);filter:drop-shadow(0 0 7px rgba(52,211,153,.7));}
.phyz-guide{position:absolute;inset:16px;border-radius:50%;border:2px dashed rgba(255,255,255,0.34);}
.phyz-body{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:78px;height:118px;color:rgba(255,255,255,0.5);}
.phyz-body svg{width:100%;height:100%;}
.phyz-bar{position:absolute;left:18px;right:18px;height:4px;border-radius:4px;top:18px;display:none;
  background:linear-gradient(90deg,transparent,#34D399,transparent);box-shadow:0 0 18px 4px rgba(52,211,153,.65);}
.cam.phyz-scanning .phyz-bar{display:block;animation:phyzSweep 1.5s ease-in-out infinite;}
@keyframes phyzSweep{0%{top:20px;}50%{top:228px;}100%{top:20px;}}
.cam.phyz-scanning .phyz-guide{border-color:rgba(52,211,153,0.6);}
.phyz-count{position:absolute;left:0;right:0;top:calc(40% + 150px);text-align:center;color:#fff;font-size:34px;font-weight:900;
  text-shadow:0 2px 14px rgba(0,0,0,.6);min-height:42px;}
.phyz-dots{position:absolute;left:0;right:0;bottom:128px;display:flex;justify-content:center;gap:10px;}
.phyz-dots .pd{width:30px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);transition:.3s;}
.phyz-dots .pd.on{background:#34D399;box-shadow:0 0 10px rgba(52,211,153,.7);}
.phyz-flash{position:absolute;inset:0;z-index:4;background:#fff;animation:phyzFlash .25s ease forwards;pointer-events:none;}
@keyframes phyzFlash{from{opacity:.85;}to{opacity:0;}}
/* result snapshot gallery (4 angles) */
.snap-row{display:flex;gap:7px;justify-content:center;margin-bottom:6px;}
.snap-cell{flex:1;max-width:74px;text-align:center;}
.snap-cell img{width:100%;aspect-ratio:.62;object-fit:cover;border-radius:10px;border:1px solid var(--border);background:#05050c;display:block;}
.snap-ph{width:100%;aspect-ratio:.62;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);}
.nb-ic{width:70px;height:70px;margin:8px auto 14px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--sc,#FF6B6B);background:color-mix(in srgb,var(--sc,#FF6B6B) 14%,transparent);border:1px solid color-mix(in srgb,var(--sc,#FF6B6B) 32%,transparent);}
.nb-ic svg{width:34px;height:34px;}
.snap-cell span{display:block;font-size:8.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* analyzing overlay */
.analyze{position:absolute;inset:0;z-index:95;background:rgba(3,4,12,0.86);backdrop-filter:blur(14px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
.analyze.on{display:flex;}
.analyze .ring{width:128px;height:128px;}
.analyze .ring circle{fill:none;stroke-width:8;stroke-linecap:round;}
.analyze .ring .bg{stroke:rgba(255,255,255,0.08);}
.analyze .ring .fg{stroke:var(--sc,#0A84FF);transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset .2s linear;filter:drop-shadow(0 0 8px color-mix(in srgb,var(--sc,#0A84FF) 60%,transparent));}
.analyze .pct{font-size:26px;font-weight:800;}
.analyze .lbl{font-size:13px;color:var(--muted);font-weight:600;}

/* result sheet */
.result{position:absolute;inset:0;z-index:96;background:linear-gradient(180deg,#0c0d16,#06070e);
  display:none;flex-direction:column;padding:64px 22px calc(28px + env(safe-area-inset-bottom));overflow-y:auto;}
.result.on{display:flex;animation:resIn .4s ease both;}
@keyframes resIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.result::-webkit-scrollbar{display:none;}
.res-close{position:absolute;top:58px;right:18px;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:rgba(255,255,255,0.06);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
.res-close:active{transform:scale(.94);}.res-close svg{width:18px;height:18px;}
.res-snap{width:120px;height:120px;border-radius:24px;object-fit:cover;align-self:center;margin-bottom:4px;
  border:1px solid var(--border);background:#05050c;}
.res-score{display:flex;flex-direction:column;align-items:center;margin:6px 0 6px;}
.res-ring{width:172px;height:172px;}
.res-ring circle{fill:none;stroke-width:11;stroke-linecap:round;}
.res-ring .bg{stroke:rgba(255,255,255,0.08);}
.res-ring .fg{stroke:var(--sc,#0A84FF);transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1);filter:drop-shadow(0 0 10px color-mix(in srgb,var(--sc,#0A84FF) 55%,transparent));}
.res-num{font-size:46px;font-weight:900;letter-spacing:-2px;}
.res-num small{font-size:16px;font-weight:700;color:var(--muted);}
.res-grade{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--sc,#0A84FF);margin-top:-6px;}
.res-title{text-align:center;font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-top:8px;}
.res-sub{text-align:center;font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5;}
.res-sec{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:20px 2px 10px;}
.tip{display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:14px;padding:13px 14px;margin-bottom:9px;}
.tip .ti{width:26px;height:26px;flex:none;border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:var(--sc,#0A84FF);background:color-mix(in srgb,var(--sc,#0A84FF) 16%,transparent);}
.tip .ti svg{width:15px;height:15px;}
.tip span{font-size:13.5px;line-height:1.5;color:#E4E8F2;}
.res-actions{display:flex;gap:10px;margin-top:18px;}
.btn{flex:1;border:none;border-radius:16px;padding:15px;font:inherit;font-size:14.5px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .12s;}
.btn:active{transform:scale(.98);}.btn svg{width:16px;height:16px;}
.btn.save{color:#02030A;background:var(--sc,#0A84FF);box-shadow:0 10px 26px color-mix(in srgb,var(--sc,#0A84FF) 30%,transparent);}
.btn.save.done{background:var(--green);box-shadow:none;}
.btn.again{color:var(--text);background:rgba(255,255,255,0.06);border:1px solid var(--border);}
.btn.coach{width:100%;flex:none;margin-top:10px;color:#fff;
  background:color-mix(in srgb, var(--sc,#0A84FF) 22%, rgba(255,255,255,0.04));
  border:1px solid color-mix(in srgb, var(--sc,#0A84FF) 42%, transparent);}

.toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);z-index:120;
  background:rgba(10,12,22,0.94);border:1px solid var(--border);color:var(--text);font-size:12.5px;font-weight:600;
  padding:10px 16px;border-radius:14px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;backdrop-filter:blur(10px);max-width:300px;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(prefers-reduced-motion:reduce){.scanline i,.analyze .ring .fg{animation:none!important;}}
</style>

  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">

<body>
<div class="phone">
    <div id="ambCelestial" style="position:absolute;inset:0;pointer-events:none;z-index:0;"></div>
  <div id="ambBg"></div>
  <div class="notch"></div>
  <div class="home-indicator"></div>

  <div class="frame">
    <div class="top">
      <a class="back" href="coach.html" aria-label="Back to Coach"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></a>
      <h1 id="title">Scanner</h1>
      <button id="helpBtn" aria-label="Help" style="margin-left:auto;width:34px;height:34px;flex:none;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#9AA1B7;font:800 14px -apple-system,sans-serif;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;-webkit-appearance:none;appearance:none;">?</button>
    </div>

    <div class="scroll">
      <div class="hero">
        <div class="ic" id="hero-ic"></div>
        <h2 id="name">Scanner</h2>
        <p id="tag"></p>
        <span class="badge"><span class="d"></span>Live now</span>
      </div>

      <!-- last saved result for this scanner -->
      <div class="last" id="last">
        <svg class="ls-ring" id="lsRing" viewBox="0 0 46 46"></svg>
        <div class="ls-meta"><div class="ls-k">Last scan</div><div class="ls-v" id="lsV">—</div></div>
      </div>

      <div class="sec">What it checks</div>
      <div class="card" id="checks"></div>

      <button class="cta" id="cta" type="button">Start scan</button>
      <div class="note" id="note">Runs on your device — your camera frames never leave the phone.</div>
    </div>
  </div>

  <!-- Camera scanner -->
  <div class="cam" id="cam">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="cam-shade"></div>
    <div class="reticle" id="reticle"></div>
    <div class="scanline"><i></i></div>
    <div class="wave" id="wave"></div>
    <!-- Physique: circular body guide + 360 capture -->
    <div class="phyz" id="phyz">
      <div class="phyz-ring">
        <svg class="phyz-svg" viewBox="0 0 200 200"><circle class="pr-bg" cx="100" cy="100" r="94"/><circle class="pr-fg" id="phyzProg" cx="100" cy="100" r="94"/></svg>
        <div class="phyz-guide"></div>
        <div class="phyz-body"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.6"/><path d="M12 8v7M12 10l-5 3M12 10l5 3M12 15l-3 6M12 15l3 6"/></svg></div>
        <div class="phyz-bar" id="phyzBar"></div>
      </div>
      <div class="phyz-count" id="phyzCount"></div>
      <div class="phyz-dots" id="phyzDots"></div>
    </div>
    <div class="cam-top">
      <button class="cam-x" id="camX" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      <span class="cam-tt" id="camTT">Scan</span>
      <button class="cam-flip" id="camFlip" aria-label="Flip camera"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h5v5"/><path d="M4 9V4h5"/><path d="M20 4l-7 7"/><path d="M9 20H4v-5"/><path d="M20 15v5h-5"/><path d="M4 20l7-7"/></svg></button>
    </div>
    <div class="cam-hint" id="camHint">Position yourself in the frame</div>
    <div class="cam-bottom">
      <button class="shutter" id="shutter" aria-label="Capture"><i></i></button>
    </div>
  </div>

  <!-- Analyzing -->
  <div class="analyze" id="analyze">
    <svg class="ring" viewBox="0 0 128 128">
      <circle class="bg" cx="64" cy="64" r="58"></circle>
      <circle class="fg" id="anFg" cx="64" cy="64" r="58"></circle>
    </svg>
    <div class="pct" id="anPct">0%</div>
    <div class="lbl" id="anLbl">Analyzing…</div>
  </div>

  <!-- Result -->
  <div class="result" id="result"></div>

  <div class="toast" id="toast"></div>
</div>

<script src="_lib/core-config.js"></script>
<script src="_lib/core-ai.js"></script>
<script src="_lib/core-sfx.js"></script>
<script src="_lib/core-state.js"></script>
<script>
(function(){
  "use strict";
  var $=function(s){return document.querySelector(s);};
  function svg(d){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+d+'</svg>';}
  function ls(k,d){try{var v=localStorage.getItem(k);return v==null?d:v;}catch(e){return d;}}
  function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

  var SCANS={
    physique:{ name:'Physique', color:'#FF6B6B', facing:'environment', frame:'',
      tag:'Body composition, symmetry and progress over time.',
      icon:'<path d="M6 7v10M3 9.5v5M18 7v10M21 9.5v5M6 12h12"/>',
      hint:'Stand back so your whole body is in frame',
      checks:['On-device body detection — starts when you’re fully in frame','Guided 360° capture: front, both sides and back','Symmetry, posture & proportion read','Your angle photos saved to track progress'],
      label:'Physique score',
      tips:['Upper body leads your lower — add a dedicated leg day to even out proportions.','Shoulders sit slightly forward (side view) — daily wall-angels + rows will pull them back.','Back width is your quickest win — 2 pull sessions/week widens the V-taper.','Core is defined but could read tighter — drop body-fat ~2% to sharpen it.','Left/right symmetry is good; favour single-arm work to keep it balanced.','Same time + same light each scan makes the week-to-week trend honest.'] },
    food:{ name:'Food', color:'#34D399', facing:'environment', frame:'wide',
      tag:'Point your camera at a meal for an instant health read.',
      icon:'<path d="M12 20.5s-7.2-4.6-7.2-9.8A4.6 4.6 0 0 1 12 7a4.6 4.6 0 0 1 7.2 3.7c0 5.2-7.2 9.8-7.2 9.8Z"/>',
      hint:'Frame the whole plate from above',
      checks:['Calories & macro estimate per plate','A health score for the meal','Smarter swaps and suggestions'],
      label:'Health score',
      tips:['Solid protein on this plate — aim to keep it the largest portion.','Add a fist of greens to lift fibre and slow the sugar curve.','Looks lightly fried — grilled or baked would cut ~120 hidden calories.','Swap the side carb for something whole-grain next time.'] },
    outfit:{ name:'Outfit', color:'#FFCB3D', facing:'environment', frame:'',
      tag:'A quick style and fit check before you head out.',
      icon:'<path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/>',
      hint:'Stand back for a full head-to-toe shot',
      checks:['Fit and proportion feedback','Colour and combo tips','Match the outfit to the occasion'],
      label:'Style score',
      tips:['Strong colour balance — the neutrals let one accent pop.','Try tucking or cropping the top to define your waistline.','Footwear is a touch casual for this combo — clean it up to level the fit.','Roll the sleeves once to sharpen the proportions.'] },
    posture:{ name:'Posture', color:'#4A8FFF', facing:'environment', frame:'oval',
      tag:'Stand in frame for an alignment check and fixes.',
      icon:'<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.2"/><path d="M12 1.5v3M12 19.5v3M22.5 12h-3M4.5 12h-3"/>',
      hint:'Stand side-on, full body in the oval',
      checks:['Head, shoulder and hip alignment','Imbalances flagged clearly','Daily correction drills'],
      label:'Posture score',
      tips:['Slight forward head tilt — tuck your chin and lengthen the back of your neck.','Right shoulder sits a little high; loosen the upper trap with daily rolls.','Set a 45-min reminder to reset your sitting posture.','Add wall-angels: 2 sets of 10 each morning.'] },
    looks:{ name:'Looks', color:'#B388FF', facing:'user', frame:'oval',
      tag:'Skin, symmetry and grooming insights from a selfie.',
      icon:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/><path d="M12 12v4M9 16h6"/>',
      hint:'Center your face in the oval, even light',
      checks:['Skin condition read','Facial symmetry analysis','Hair and grooming tips'],
      label:'Looks score',
      tips:['Good facial symmetry — your strong side is the left, angle to it for photos.','Skin looks a little dry on the forehead — a light moisturiser will even tone.','Tidy the brow line to frame the eyes more sharply.','Drink more water today; it shows on the skin within a day.'] },
    voice:{ name:'Voice', color:'#5EEAD4', facing:'audio', frame:'',
      tag:'Record a clip for speaking and delivery feedback.',
      icon:'<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>',
      hint:'Speak naturally for a few seconds',
      checks:['Pace, clarity and filler words','Tone and confidence read','Drills to sharpen delivery'],
      label:'Delivery score',
      tips:['Clear pace overall — slow the first sentence to land with authority.','A few filler "ums" — pause silently instead; it reads as confidence.','Pitch stays a little flat; vary it to hold attention.','Record one 30-sec take daily this week and compare.'] }
  };

  var type=(new URLSearchParams(location.search).get('type')||'physique').toLowerCase();
  var s=SCANS[type]||SCANS.physique;

  // theme
  document.documentElement.style.setProperty('--sc', s.color);
  $('#ambBg').style.setProperty('--sc', s.color);
  $('#title').textContent=s.name+' Scanner';
  $('#name').textContent=s.name;
  $('#tag').textContent=s.tag;
  $('#hero-ic').innerHTML=svg(s.icon);
  $('#camTT').textContent=s.name+' scan';
  $('#camHint').textContent=s.hint;
  $('#checks').innerHTML=s.checks.map(function(c){
    return '<div class="row"><div class="ck">'+svg('<path d="M5 12l4 4 10-11"/>')+'</div><span>'+c+'</span></div>';
  }).join('');
  var rt=$('#reticle'); if(s.frame) rt.classList.add(s.frame);

  function grade(n){ return n>=90?'Elite':n>=80?'Strong':n>=70?'Solid':n>=60?'Developing':'Needs work'; }
  function miniRing(el,n,color){
    var r=18,c=2*Math.PI*r;
    el.innerHTML='<circle cx="23" cy="23" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="5"/>'
      +'<circle cx="23" cy="23" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="5" stroke-linecap="round" '
      +'stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-n/100))+'" transform="rotate(-90 23 23)"/>';
  }

  // ── last saved result for this scanner ──
  function readScans(){ try{ return JSON.parse(ls('coreScans.v1','[]'))||[]; }catch(e){ return []; } }
  function updateLast(){
    var all=readScans().filter(function(x){return x.type===type;});
    if(!all.length) return;
    var lastR=all[all.length-1];
    miniRing($('#lsRing'), lastR.score, s.color);
    var ago=Math.max(0,Math.round((Date.now()-lastR.ts)/86400000));
    $('#lsV').textContent=lastR.score+' / 100 · '+(ago===0?'today':ago+'d ago');
    $('#last').classList.add('show');
  }
  updateLast();

  // ── camera ──
  var cam=$('#cam'), video=$('#video'), canvas=$('#canvas');
  var stream=null, facing=s.facing==='user'?'user':'environment', isVoice=s.facing==='audio';
  var snapDataUrl=null, audioCtx=null, analyser=null, waveRAF=null;
  var isPhysique=(type==='physique'), shots=[];
  var detector=null, poseRAF=null, gateStable=0;
  var aiResult=null, aiPending=false;
  var ANG=[{k:'front',label:'Face the camera'},{k:'right',label:'Turn to your right side'},
           {k:'back',label:'Turn around — back to camera'},{k:'left',label:'Turn to your left side'}];

  async function startStream(){
    try{
      if(stream){ stream.getTracks().forEach(function(t){t.stop();}); stream=null; }
      if(isVoice){
        stream=await navigator.mediaDevices.getUserMedia({ audio:true });
        setupWave(stream);
      } else {
        stream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:facing }, audio:false });
        video.srcObject=stream; cam.classList.toggle('front', facing==='user');
      }
      return true;
    }catch(e){
      toast('Camera unavailable — running a demo scan');
      return false;
    }
  }

  function setupWave(st){
    try{
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      var src=audioCtx.createMediaStreamSource(st);
      analyser=audioCtx.createAnalyser(); analyser.fftSize=64; src.connect(analyser);
      var wave=$('#wave'); wave.innerHTML=''; var bars=[];
      for(var i=0;i<20;i++){ var b=document.createElement('b'); wave.appendChild(b); bars.push(b); }
      var data=new Uint8Array(analyser.frequencyBinCount);
      (function tick(){
        analyser.getByteFrequencyData(data);
        for(var i=0;i<bars.length;i++){ var v=data[i]||0; bars[i].style.height=(10+v/255*100).toFixed(0)+'px'; }
        waveRAF=requestAnimationFrame(tick);
      })();
    }catch(e){}
  }

  function openCam(){
    cam.classList.add('on');
    cam.classList.toggle('voice', isVoice);
    cam.classList.toggle('physique', isPhysique);
    if(isPhysique){ renderDots(0); setProg(0); $('#phyzCount').textContent=''; $('#camHint').textContent='Starting camera…'; }
    startStream().then(function(ok){ cam._demo=!ok; if(isPhysique) runPhysique(); });
  }
  function stopCam(){
    cam.classList.remove('on','scanning');
    if(poseRAF){ clearTimeout(poseRAF); poseRAF=null; }
    if(detector){ try{ detector.dispose(); }catch(e){} detector=null; }
    gateStable=0;
    if(stream){ try{stream.getTracks().forEach(function(t){t.stop();});}catch(e){} stream=null; }
    if(waveRAF) cancelAnimationFrame(waveRAF);
    if(audioCtx){ try{audioCtx.close();}catch(e){} audioCtx=null; }
    video.srcObject=null;
  }

  // capture current frame -> data url (for the result snapshot)
  function snap(){
    if(isVoice || cam._demo || !video.videoWidth){ snapDataUrl=null; return; }
    try{
      var W=video.videoWidth, H=video.videoHeight, side=Math.min(W,H);
      canvas.width=240; canvas.height=240;
      var cx=(W-side)/2, cy=(H-side)/2, ctx=canvas.getContext('2d');
      if(facing==='user'){ ctx.translate(240,0); ctx.scale(-1,1); }
      ctx.drawImage(video, cx, cy, side, side, 0, 0, 240, 240);
      snapDataUrl=canvas.toDataURL('image/jpeg',0.7);
    }catch(e){ snapDataUrl=null; }
  }

  // ── analyze ──
  var anFg=$('#anFg'), AN_R=58, AN_C=2*Math.PI*AN_R;
  anFg.setAttribute('stroke-dasharray', AN_C);
  function doAnalyze(){
    var an=$('#analyze'); an.classList.add('on');
    var p=0, anPct=$('#anPct'), anLbl=$('#anLbl');
    var labels=isPhysique?['Reading proportions…','Checking symmetry…','Scoring physique…','Finishing up…']
                         :['Analyzing…','Reading details…','Scoring…','Finishing up…'];
    anFg.setAttribute('stroke-dashoffset', AN_C);
    var iv=setInterval(function(){
      p=Math.min(100, p + (4+Math.random()*9));
      anPct.textContent=Math.round(p)+'%';
      anFg.setAttribute('stroke-dashoffset', AN_C*(1-p/100));
      anLbl.textContent=labels[Math.min(labels.length-1, Math.floor(p/26))];
      if(p>=100){ clearInterval(iv); finishAnalyze(an); }
    }, 180);
  }
  function finishAnalyze(an){
    var t0=Date.now();
    (function chk(){
      if(!aiPending || Date.now()-t0>6000){ an.classList.remove('on'); showResult(); return; }
      $('#anLbl').textContent='Scoring with AI…';
      setTimeout(chk, 200);
    })();
  }
  function runAnalyze(){   // single-capture types (food, outfit, looks, posture)
    cam.classList.add('scanning');
    $('#camHint').textContent='Hold still — scanning…';
    setTimeout(function(){ snap(); stopCam(); doAnalyze(); }, 1500);
  }

  // ── Physique: guided 360° capture (front · right · back · left) ──
  function snapPortrait(){
    if(cam._demo||!video.videoWidth) return null;
    try{
      var W=video.videoWidth,H=video.videoHeight, cw2=Math.min(W,H*0.62), ch2=Math.min(H,W/0.62);
      var cx=(W-cw2)/2, cy=(H-ch2)/2, ctx=canvas.getContext('2d');
      canvas.width=150; canvas.height=242;
      if(facing==='user'){ ctx.setTransform(1,0,0,1,0,0); ctx.translate(150,0); ctx.scale(-1,1); } else { ctx.setTransform(1,0,0,1,0,0); }
      ctx.drawImage(video, cx, cy, cw2, ch2, 0,0,150,242);
      return canvas.toDataURL('image/jpeg',0.6);
    }catch(e){ return null; }
  }
  function setProg(n){ var el=$('#phyzProg'); if(el) el.style.strokeDashoffset=(590.6*(1-n/4)).toFixed(1); }
  function renderDots(done){ var d=$('#phyzDots'); if(!d) return; var h=''; for(var i=0;i<4;i++) h+='<span class="pd'+(i<done?' on':'')+'"></span>'; d.innerHTML=h; }
  function phyzFlash(){ var f=document.createElement('div'); f.className='phyz-flash'; cam.appendChild(f); setTimeout(function(){ f.remove(); },260); }
  // Lazy-load TensorFlow.js + MoveNet only when the physique scan needs it.
  function loadPose(cb){
    if(window.poseDetection && window.tf){ cb(true); return; }
    function load(src,next){ var sc=document.createElement('script'); sc.async=true; sc.src=src; sc.onload=next; sc.onerror=function(){ cb(false); }; document.head.appendChild(sc); }
    load('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js', function(){
      load('https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js', function(){ cb(!!window.poseDetection); });
    });
  }
  function kp(p,n){ for(var i=0;i<p.keypoints.length;i++){ if(p.keypoints[i].name===n) return p.keypoints[i]; } return null; }
  function startPoseGate(){
    $('#camHint').textContent='Loading body detection…'; $('#phyzCount').textContent='';
    loadPose(function(ok){
      if(!ok || !window.poseDetection){ simulatedGate(); return; }
      window.poseDetection.createDetector(window.poseDetection.SupportedModels.MoveNet,
        { modelType: window.poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING })
        .then(function(det){ detector=det; cam.classList.add('phyz-scanning'); gateStable=0;
          $('#camHint').textContent='Step back so your whole body is in the ring'; loopGate(); })
        .catch(function(){ simulatedGate(); });
    });
  }
  function loopGate(){
    if(!detector || !cam.classList.contains('on')) return;
    detector.estimatePoses(video,{maxPoses:1}).then(function(poses){
      var Hh=video.videoHeight||1, msg='Step back so your whole body is visible', good=false;
      if(poses && poses.length){
        var p=poses[0];
        var need=['nose','left_shoulder','right_shoulder','left_hip','right_hip','left_knee','right_knee','left_ankle','right_ankle'];
        var miss=0; for(var i=0;i<need.length;i++){ var k=kp(p,need[i]); if(!k||k.score<0.35) miss++; }
        var nose=kp(p,'nose'), la=kp(p,'left_ankle'), ra=kp(p,'right_ankle');
        var ankY=Math.max(la?la.y:0, ra?ra.y:0);
        if(miss>2) msg='Step back — show your full body';
        else if(nose && nose.y>0.34*Hh) msg='Step back — get your head near the top';
        else if(ankY && ankY<0.74*Hh) msg='Step back — I can’t see your feet';
        else if(nose && nose.y<0.03*Hh) msg='Lower the phone slightly';
        else { good=true; msg='Hold still…'; }
      }
      $('#camHint').textContent=msg;
      if(good){ if(!gateStable) gateStable=Date.now(); if(Date.now()-gateStable>1000){ passGate(); return; } }
      else gateStable=0;
      poseRAF=setTimeout(loopGate, 110);
    }).catch(function(){ poseRAF=setTimeout(loopGate, 200); });
  }
  function passGate(){
    if(poseRAF){ clearTimeout(poseRAF); poseRAF=null; }
    if(detector){ try{ detector.dispose(); }catch(e){} detector=null; }
    cam.classList.add('phyz-scanning');
    $('#camHint').textContent=''; $('#phyzCount').textContent='Body detected ✓';
    try{ if(navigator.vibrate) navigator.vibrate(40); }catch(_){}
    setTimeout(function(){ captureAngle(0); }, 800);
  }
  function simulatedGate(){   // fallback when the pose model can't load (offline etc.)
    cam.classList.add('phyz-scanning');
    $('#camHint').textContent='Stand back — fit your whole body in the ring';
    $('#phyzCount').textContent='Detecting body…';
    setTimeout(function(){ $('#phyzCount').textContent='Body detected ✓'; setTimeout(function(){ captureAngle(0); },800); },2400);
  }
  function runPhysique(){
    shots=[]; renderDots(0); setProg(0); $('#phyzCount').textContent='';
    if(cam._demo){ simulatedGate(); return; }   // no real camera → demo path
    startPoseGate();
  }
  function captureAngle(i){
    if(i>=ANG.length){ finishPhysique(); return; }
    var a=ANG[i];
    $('#camHint').textContent=a.label+'  ·  '+(i+1)+' of 4';
    var n=3; $('#phyzCount').textContent=n;
    try{window.coreSfx&&window.coreSfx('tick');}catch(_){}
    var iv=setInterval(function(){
      n--;
      if(n>0){ $('#phyzCount').textContent=n; try{window.coreSfx&&window.coreSfx('tick');}catch(_){} return; }
      clearInterval(iv); $('#phyzCount').textContent='';
      var url=snapPortrait();
      shots.push({k:a.k,label:a.k.charAt(0).toUpperCase()+a.k.slice(1),url:url});
      phyzFlash(); renderDots(shots.length); setProg(shots.length);
      try{window.coreSfx&&window.coreSfx('confirm');}catch(_){}
      try{ if(navigator.vibrate) navigator.vibrate(30); }catch(_){}
      setTimeout(function(){ captureAngle(i+1); }, 650);
    }, 1000);
  }
  function finishPhysique(){
    cam.classList.remove('phyz-scanning','physique');
    stopCam();
    // keep the captured angles in the "backfiles" (latest physique scan)
    try{ lsSet('corePhysiqueShots.v1', JSON.stringify({ ts:Date.now(), shots:shots })); }catch(e){}
    // kick off the real vision-AI scoring in parallel with the analyze animation
    aiResult=null; aiPending=true;
    requestPhysiqueAI().then(function(r){ aiResult=r; aiPending=false; }).catch(function(){ aiResult=null; aiPending=false; });
    doAnalyze();
  }
  // Score the physique from the captured photo using real vision AI.
  // Tries the dedicated Supabase backend AND the shared coreAI bridge (personal
  // key or hosted proxy) in parallel, taking whichever returns a valid read first.
  // Falls back to the simulated score only if every AI path fails.
  function frontImage(){
    for(var i=0;i<shots.length;i++){ if(shots[i].k==='front'&&shots[i].url) return shots[i].url; }
    for(var j=0;j<shots.length;j++){ if(shots[j].url) return shots[j].url; }
    return null;
  }
  function normalizeAI(d){
    if(!d) return null;
    if(d.rank && typeof d.rank.score==='number') return d;            // already in result shape
    var score=(typeof d.score==='number') ? d.score : null;
    return { isBody:d.isBody, summary:d.summary||'', weakPoints:d.weakPoints||[],
             rank: score==null ? null : { score:score, tier:d.tier||grade(Math.round(score)) } };
  }
  function supabasePhysique(img){
    return new Promise(function(resolve,reject){
      var c=window.CORE_CONFIG;
      if(!c||!c.SUPABASE_URL||!c.SUPABASE_ANON_KEY){ reject(); return; }
      fetch(c.SUPABASE_URL+'/functions/v1/physique-scan',{
        method:'POST',
        headers:{ 'content-type':'application/json','authorization':'Bearer '+c.SUPABASE_ANON_KEY,'apikey':c.SUPABASE_ANON_KEY },
        body:JSON.stringify({ image: img, mediaType:'image/jpeg' })
      }).then(function(r){ return r.ok ? r.json() : null; })
        .then(function(d){ if(d && (d.isBody===true || d.isBody===false)) resolve(normalizeAI(d)); else reject(); })
        .catch(reject);
    });
  }
  function coreAIPhysique(img){
    return new Promise(function(resolve,reject){
      if(!(window.coreAI && coreAI.chat && coreAI.ready && coreAI.ready())){ reject(); return; }
      var prompt='You are CORE\'s physique-analysis vision model. Look at this photo of a person\'s body and assess it. '
        +'Reply with STRICT JSON only, no markdown, no extra text: '
        +'{"isBody":true|false,"score":0-100,"tier":"Elite|Strong|Solid|Developing|Needs work","summary":"one honest, specific sentence","weakPoints":["chest"|"back"|"shoulders"|"arms"|"legs"|"core"]}. '
        +'Set isBody=false if this is not a clear photo of a human body. score = overall physique development (muscularity, leanness, proportion) from 0-100. '
        +'weakPoints = up to 3 muscle groups that most need work. Be honest, not flattering.';
      var content=[{ type:'text', text:prompt },{ type:'image_url', image_url:{ url:img, detail:'low' } }];
      coreAI.chat([{ role:'user', content:content }], { role:'vision', temperature:0.3, maxTokens:300 })
        .then(function(r){
          if(!r || !r.ok || !r.text || r.fallback){ reject(); return; }
          try{
            var txt=String(r.text).replace(/^```json\s*|\s*```$/g,'').trim();
            var s=txt.indexOf('{'), e=txt.lastIndexOf('}');
            if(s>=0 && e>s) txt=txt.slice(s,e+1);
            var j=JSON.parse(txt);
            if(typeof j.isBody!=='boolean' && typeof j.score!=='number'){ reject(); return; }
            resolve(normalizeAI(j));
          }catch(err){ reject(); }
        }, reject);
    });
  }
  function firstValid(promises){
    return new Promise(function(resolve,reject){
      var pending=promises.length, settled=false;
      if(!pending){ reject(); return; }
      promises.forEach(function(pr){
        Promise.resolve(pr).then(function(v){ if(!settled && v){ settled=true; resolve(v); } else if(--pending<=0 && !settled){ reject(); } },
          function(){ if(--pending<=0 && !settled){ reject(); } });
      });
    });
  }
  function requestPhysiqueAI(){
    var img=frontImage();
    if(!img) return Promise.reject();
    return firstValid([ supabasePhysique(img), coreAIPhysique(img) ]);
  }

  // ── result ──
  function pick(arr,k){ var a=arr.slice(), out=[]; while(a.length&&out.length<k){ out.push(a.splice(Math.floor(Math.random()*a.length),1)[0]); } return out; }
  function showNotBody(){
    var res=$('#result');
    res.innerHTML='<button class="res-close" id="resClose" type="button" aria-label="Done">'+svg('<path d="M6 6l12 12M18 6L6 18"/>')+'</button>'
      +'<div class="nb-ic">'+svg('<circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>')+'</div>'
      +'<div class="res-title">Couldn’t read a body</div>'
      +'<div class="res-sub">Stand back so your whole body is in frame, in good light, and scan again.</div>'
      +'<div class="res-actions"><button class="btn save" id="btnAgain2" type="button">'+svg('<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>')+'Scan again</button></div>';
    res.classList.add('on');
    $('#resClose').addEventListener('click', function(){ res.classList.remove('on'); });
    $('#btnAgain2').addEventListener('click', function(){ res.classList.remove('on'); openCam(); });
  }
  function showResult(){
    var ai = isPhysique ? aiResult : null;
    if(ai && ai.isBody===false){ showNotBody(); return; }
    var score, tips, gradeTxt, subTxt;
    if(ai && ai.rank && typeof ai.rank.score==='number'){
      score=Math.max(0,Math.min(100,Math.round(ai.rank.score)));
      gradeTxt=ai.rank.tier || grade(score);
      var WP={chest:'Add incline pressing for upper-chest fullness.',back:'2 pull sessions a week to widen your back.',shoulders:'Lateral raises to round out your delts.',arms:'Direct curls + extensions to bring your arms up.',legs:'Prioritise squats — your legs need the volume.',core:'Tighten nutrition and add core work to sharpen the midsection.'};
      tips=[]; if(ai.summary) tips.push(ai.summary);
      (ai.weakPoints||[]).forEach(function(k){ if(WP[k]) tips.push(WP[k]); });
      if(!tips.length) tips=pick(s.tips,3);
      tips=tips.slice(0,4);
      subTxt='Scored by CORE vision AI from your photo.';
    } else {
      score=62+Math.floor(Math.random()*33);
      tips=pick(s.tips,3);
      gradeTxt=grade(score);
      subTxt=cam._demo?'Demo result — allow camera for a real scan.':'Based on your '+s.name.toLowerCase()+' scan just now.';
    }
    // Feed the scan score into CORE stats (physique→Strength, food/posture→Health, looks/outfit/voice→Social)
    try{
      if(window.coreState && coreState.addStat){
        var SM={physique:'strength',food:'health',posture:'health',outfit:'social',looks:'social',voice:'social'};
        var stat=SM[type]||'health', gain=Math.max(1,Math.round(score/40));
        coreState.addStat(stat,gain,s.name+' scan');
        if(coreState.addXp) coreState.addXp(Math.round(gain*8),s.name.toLowerCase()+'-scan');
      }
    }catch(e){}
    var R=78, C=2*Math.PI*R;
    var res=$('#result');
    // physique → gallery of the 4 captured angles; others → single snapshot
    var gallery='';
    if(isPhysique){
      gallery='<div class="snap-row">'+ANG.map(function(a){
        var sh=null; for(var i=0;i<shots.length;i++){ if(shots[i].k===a.k){ sh=shots[i]; break; } }
        var inner=(sh&&sh.url)?'<img src="'+sh.url+'" alt="'+a.k+'"/>':'<div class="snap-ph"></div>';
        return '<div class="snap-cell">'+inner+'<span>'+a.k+'</span></div>';
      }).join('')+'</div>';
    }
    res.innerHTML=
      '<button class="res-close" id="resClose" type="button" aria-label="Done">'+svg('<path d="M6 6l12 12M18 6L6 18"/>')+'</button>'
      +gallery
      +((!isPhysique&&snapDataUrl)?'<img class="res-snap" src="'+snapDataUrl+'" alt="scan"/>':'')
      +'<div class="res-score"><svg class="res-ring" viewBox="0 0 172 172">'
        +'<circle class="bg" cx="86" cy="86" r="'+R+'"></circle>'
        +'<circle class="fg" id="resFg" cx="86" cy="86" r="'+R+'" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle>'
        +'<text x="86" y="80" text-anchor="middle" class="res-num" id="resNum" fill="#fff" style="font:900 46px -apple-system,sans-serif;letter-spacing:-2px">0</text>'
        +'<text x="86" y="104" text-anchor="middle" fill="#9AA1B7" style="font:700 13px -apple-system,sans-serif" id="resOf">/ 100</text>'
      +'</svg>'
      +'<div class="res-grade">'+gradeTxt+'</div></div>'
      +'<div class="res-title">'+s.label+'</div>'
      +'<div class="res-sub">'+subTxt+'</div>'
      +'<div class="res-sec">Coach notes</div>'
      +tips.map(function(t){return '<div class="tip"><div class="ti">'+svg('<path d="M12 2v4M12 18v4M2 12h4M18 12h4"/><circle cx="12" cy="12" r="3.2"/>')+'</div><span>'+t+'</span></div>';}).join('')
      +'<div class="res-actions">'
        +'<button class="btn again" id="btnAgain" type="button">'+svg('<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>')+'Scan again</button>'
        +'<button class="btn save" id="btnSave" type="button">'+svg('<path d="M5 12l4 4 10-11"/>')+'Save to profile</button>'
      +'</div>'
      +'<button class="btn coach" id="btnCoach" type="button">'+svg('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>')+'Discuss with Coach</button>';
    res.classList.add('on');
    // animate the ring + number
    var fg=$('#resFg'); requestAnimationFrame(function(){ fg.setAttribute('stroke-dashoffset', C*(1-score/100)); });
    var numEl=$('#resNum'), n0=0, t0=performance.now();
    (function count(t){ var p=Math.min(1,(t-t0)/1000); numEl.textContent=Math.round(score*(1-Math.pow(1-p,3))); if(p<1) requestAnimationFrame(count); })(t0);
    try{ if(navigator.vibrate) navigator.vibrate([0,30,40,20]); }catch(e){}

    $('#resClose').addEventListener('click', function(){ res.classList.remove('on'); updateLast(); });
    $('#btnAgain').addEventListener('click', function(){ res.classList.remove('on'); openCam(); });
    var saved=false;
    function persist(){
      if(saved) return; saved=true;
      var all=readScans(); all.push({ type:type, name:s.name, score:score, label:s.label, tips:tips, ts:Date.now() });
      lsSet('coreScans.v1', JSON.stringify(all.slice(-60)));
      lsSet('coreLastScan', JSON.stringify({ type:type, score:score, ts:Date.now() }));
      updateLast();
    }
    $('#btnSave').addEventListener('click', function(){
      persist();
      var b=$('#btnSave'); b.classList.add('done'); b.innerHTML=svg('<path d="M5 12l4 4 10-11"/>')+'Saved to profile';
      toast(s.name+' scan saved · '+score+'/100');
    });
    // hand the result to the AI coach to talk through
    $('#btnCoach').addEventListener('click', function(){
      persist();
      lsSet('coreCoachSeed', JSON.stringify({ type:type, name:s.name, label:s.label, score:score, tips:tips, ts:Date.now() }));
      try{ window.coreSfx&&window.coreSfx('click'); }catch(_){}
      location.href='coach.html';
    });
  }

  // ── wire up ──
  $('#cta').addEventListener('click', openCam);
  $('#shutter').addEventListener('click', function(){
    if(isPhysique){ if(detector) passGate(); return; }   // tap = skip detection, start capturing
    if(!cam.classList.contains('scanning')) runAnalyze();
  });
  $('#camX').addEventListener('click', stopCam);
  $('#camFlip').addEventListener('click', function(){ facing=(facing==='user'?'environment':'user'); startStream(); });

  var toastEl=$('#toast');
  function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(toastEl._t); toastEl._t=setTimeout(function(){ toastEl.classList.remove('show'); }, 2200); }

  // be a good citizen: release the camera if the page is hidden/closed
  window.addEventListener('pagehide', stopCam);
  document.addEventListener('visibilitychange', function(){ if(document.hidden && cam.classList.contains('on') && !cam.classList.contains('scanning')) stopCam(); });
})();
</script>
  <script src="_lib/core-pagefx.js"></script>
  <script src="_lib/dash-ambient.js"></script>
  <script>if(window.dashAmbient)try{window.dashAmbient.init();}catch(e){}</script>
  <script src="_lib/core-help.js"></script>
  <script>if(window.coreHelp)window.coreHelp.attach("helpBtn",{"title":"Scanner","bullets":["Point your camera to scan food, physique, outfit, posture or looks.","CORE vision AI scores each scan 0–100 with quick tips.","Physique feeds Strength, food feeds Health, looks & style feed Social."]});</script>
</body>
