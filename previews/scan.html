<!doctype html>
<html lang="en">
<head>
<script>try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8"/>
<title>CORE — Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<style>
:root{
  --bg-base:#040408;--bg-card:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.08);
  --text:#ffffff;--muted:rgba(255,255,255,0.72);--dim:rgba(255,255,255,0.45);--blue:#AEB6C4;--green:#34D399;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{min-height:100vh;background:#000;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
  color:var(--text);-webkit-font-smoothing:antialiased;padding:24px;overflow:hidden;}
.phone{position:relative;width:390px;height:844px;background:var(--bg-base);border-radius:56px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 10px #0a0a12,0 0 0 11px #2b2b38;}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:124px;height:32px;background:#000;border-radius:20px;z-index:60;}
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(245,247,251,0.55);border-radius:999px;z-index:60;}
#ambBg{position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(60% 35% at 50% 30%, color-mix(in srgb, var(--sc,#2F8FFF) 20%, transparent) 0%, transparent 55%),
    radial-gradient(50% 30% at 50% 100%, rgba(159,143,255,0.10) 0%, transparent 65%),
    linear-gradient(180deg,#060B26 0%,#040408 50%,#050510 100%);transition:background 2.4s ease;}
/* Drifting aurora veil — matches the dashboard / strength pages */
#ambAurora{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.45;mix-blend-mode:screen;}
#ambAurora::before,#ambAurora::after{content:"";position:absolute;border-radius:50%;filter:blur(40px);will-change:transform,opacity;transform:translateZ(0);}
#ambAurora::before{width:80%;height:45%;left:-10%;top:8%;background:radial-gradient(circle, color-mix(in srgb, var(--sc,#2F8FFF) 55%, transparent), transparent 70%);animation:auroraDriftA 24s ease-in-out infinite;}
#ambAurora::after{width:70%;height:40%;right:-10%;bottom:16%;background:radial-gradient(circle,rgba(159,143,255,0.50),transparent 70%);animation:auroraDriftB 30s ease-in-out -15s infinite;}
@keyframes auroraDriftA{0%,100%{transform:translate(0,0) scale(1);opacity:0.45;}50%{transform:translate(40px,-22px) scale(1.12);opacity:0.75;}}
@keyframes auroraDriftB{0%,100%{transform:translate(0,0) scale(1);opacity:0.40;}50%{transform:translate(-30px,18px) scale(1.10);opacity:0.70;}}
@media (prefers-reduced-motion:reduce){#ambAurora::before,#ambAurora::after{animation:none!important;}}

.frame{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding-top:54px;}
.top{display:flex;align-items:center;gap:12px;padding:6px 18px 4px;flex-shrink:0;}
.back{width:38px;height:38px;flex:none;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.06);
  color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;text-decoration:none;}
.back:active{transform:scale(.94);}.back svg{width:18px;height:18px;}
.top h1{font-size:16px;font-weight:800;letter-spacing:-0.3px;}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 20px 28px;}
.scroll::-webkit-scrollbar{display:none;}

.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 0 8px;}
.hero .ic{width:96px;height:96px;border-radius:28px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;
  color:var(--sc,#AEB6C4);
  background:color-mix(in srgb, var(--sc,#AEB6C4) 16%, transparent);
  border:1px solid color-mix(in srgb, var(--sc,#AEB6C4) 38%, transparent);
  box-shadow:0 0 36px color-mix(in srgb, var(--sc,#AEB6C4) 26%, transparent);}
.hero .ic svg{width:46px;height:46px;}
.hero h2{font-size:26px;font-weight:800;letter-spacing:-0.6px;}
.hero p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5;max-width:280px;}
.badge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:10px;font-weight:800;letter-spacing:.08em;
  text-transform:uppercase;padding:5px 11px;border-radius:999px;
  background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.34);color:var(--green);}
.badge .d{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;}

.sec{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:24px 2px 10px;}
.card{border-radius:18px;background:rgba(4,4,18,0.40);border:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:6px 4px;}
.row{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.row:last-child{border-bottom:none;}
.row .ck{width:22px;height:22px;flex:none;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-top:1px;
  color:var(--sc,#AEB6C4);background:color-mix(in srgb, var(--sc,#AEB6C4) 14%, transparent);}
.row .ck svg{width:13px;height:13px;}
.row span{font-size:13.5px;line-height:1.45;color:#D7DCEA;}

.cta{width:100%;margin-top:22px;border:none;border-radius:18px;padding:16px;font:inherit;font-size:15px;font-weight:800;
  cursor:pointer;color:#02030A;background:var(--sc,#AEB6C4);box-shadow:0 12px 30px color-mix(in srgb, var(--sc,#AEB6C4) 34%, transparent);
  display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s;}
.cta:active{transform:scale(.98);}.cta svg{width:17px;height:17px;}
.note{text-align:center;font-size:11.5px;color:var(--dim);margin-top:12px;line-height:1.5;}

.last{margin-top:18px;border-radius:18px;border:1px solid var(--border);background:rgba(4,4,18,0.4);padding:14px 16px;
  display:none;align-items:center;gap:14px;}
.last.show{display:flex;}
.last .ls-ring{width:46px;height:46px;flex:none;}
.last .ls-meta{flex:1;}
.last .ls-k{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.last .ls-v{font-size:14px;font-weight:700;margin-top:2px;}

/* ── Camera scanner overlay ─────────────────────────────────────────── */
.cam{position:absolute;inset:0;z-index:90;background:#000;display:none;flex-direction:column;}
.cam.on{display:flex;}
.cam video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}
.cam.front video{transform:scaleX(-1);}
.cam canvas{display:none;}
.cam-shade{position:absolute;inset:0;background:radial-gradient(120% 80% at 50% 42%,transparent 40%,rgba(0,0,0,0.55) 100%);pointer-events:none;}
.cam-top{position:absolute;top:0;left:0;right:0;z-index:3;display:flex;align-items:center;justify-content:space-between;
  padding:58px 18px 0;}
.cam-x{width:38px;height:38px;border-radius:50%;border:none;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
  color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cam-x svg{width:18px;height:18px;}
.cam-tt{font-size:13px;font-weight:800;letter-spacing:.02em;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
  padding:7px 13px;border-radius:999px;}
.cam-flip{width:38px;height:38px;border-radius:50%;border:none;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
  color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cam-flip svg{width:18px;height:18px;}
/* framing guide */
.reticle{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;
  width:230px;height:300px;border-radius:26px;
  box-shadow:0 0 0 2px color-mix(in srgb,var(--sc,#AEB6C4) 75%,transparent);}
.reticle.oval{width:220px;height:280px;border-radius:50%;}
.reticle.wide{width:280px;height:200px;border-radius:22px;}
.reticle::before,.reticle::after{content:"";position:absolute;width:26px;height:26px;border:3px solid #fff;}
.reticle::before{left:-2px;top:-2px;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
.reticle::after{right:-2px;bottom:-2px;border-left:none;border-top:none;border-radius:0 0 8px 0;}
.scanline{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;
  width:230px;height:300px;overflow:hidden;border-radius:26px;display:none;}
.scanning .scanline{display:block;}
.scanline i{position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--sc,#AEB6C4),transparent);
  box-shadow:0 0 16px 3px color-mix(in srgb,var(--sc,#AEB6C4) 70%,transparent);
  animation:sweep 1.5s ease-in-out infinite;}
@keyframes sweep{0%{top:4%;}50%{top:94%;}100%{top:4%;}}
.cam-hint{position:absolute;left:0;right:0;bottom:152px;z-index:3;text-align:center;font-size:13.5px;font-weight:600;
  color:#fff;padding:0 30px;text-shadow:0 1px 10px rgba(0,0,0,0.6);}
/* shutter */
.cam-bottom{position:absolute;left:0;right:0;bottom:46px;z-index:3;display:flex;align-items:center;justify-content:center;}
.shutter{width:74px;height:74px;border-radius:50%;border:4px solid rgba(255,255,255,0.85);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.shutter:active{transform:scale(.92);}
.cam.cam-needstart .shutter{animation:shPulse 1.4s ease-in-out infinite;}
@keyframes shPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.45)}50%{box-shadow:0 0 0 12px rgba(255,255,255,0)}}
.shutter i{width:56px;height:56px;border-radius:50%;background:#fff;transition:.15s;}
.scanning .shutter{opacity:.4;pointer-events:none;}
/* voice mode */
.cam.voice video,.cam.voice .reticle,.cam.voice .scanline,.cam.voice .cam-shade,.cam.voice .cam-flip{display:none;}
.cam.voice{background:radial-gradient(70% 50% at 50% 38%,color-mix(in srgb,var(--sc,#AEB6C4) 22%,#05050d),#04040a);}
.wave{position:absolute;left:0;right:0;top:40%;transform:translateY(-50%);z-index:2;display:none;align-items:flex-end;justify-content:center;gap:5px;height:120px;}
.cam.voice .wave{display:flex;}
.wave b{width:6px;border-radius:3px;background:var(--sc,#AEB6C4);height:10px;box-shadow:0 0 10px color-mix(in srgb,var(--sc,#AEB6C4) 60%,transparent);}

/* ── Physique 360 capture ── */
#GREEN{--g:#34D399;}
.phyz{position:absolute;inset:0;z-index:2;display:none;}
.cam.physique .reticle,.cam.physique .scanline{display:none!important;}
.cam.physique .phyz{display:block;}
.phyz-ring{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:252px;height:252px;}
.phyz-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
.phyz-svg circle{fill:none;stroke-width:5;}
.pr-bg{stroke:rgba(255,255,255,0.16);}
.pr-fg{stroke:#34D399;stroke-linecap:round;stroke-dasharray:590.6;stroke-dashoffset:590.6;
  transition:stroke-dashoffset .55s cubic-bezier(.22,1,.36,1);filter:drop-shadow(0 0 7px rgba(52,211,153,.7));}
.phyz-guide{position:absolute;inset:16px;border-radius:50%;border:2px dashed rgba(255,255,255,0.55);}
.phyz-body{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:78px;height:118px;color:rgba(255,255,255,0.5);}
.phyz-body svg{width:100%;height:100%;}
.phyz-bar{position:absolute;left:18px;right:18px;height:4px;border-radius:4px;top:18px;display:none;
  background:linear-gradient(90deg,transparent,#34D399,transparent);box-shadow:0 0 18px 4px rgba(52,211,153,.65);}
.cam.phyz-scanning .phyz-bar{display:block;animation:phyzSweep 1.5s ease-in-out infinite;}
@keyframes phyzSweep{0%{top:20px;}50%{top:228px;}100%{top:20px;}}
.cam.phyz-scanning .phyz-guide{border-color:rgba(52,211,153,0.6);}
.phyz-count{position:absolute;left:0;right:0;top:calc(40% + 150px);text-align:center;color:#fff;font-size:34px;font-weight:900;
  text-shadow:0 2px 14px rgba(0,0,0,.6);min-height:42px;}
.phyz-dots{position:absolute;left:0;right:0;bottom:128px;display:flex;justify-content:center;gap:10px;}
.phyz-dots .pd{width:30px;height:5px;border-radius:3px;background:rgba(255,255,255,0.22);transition:.3s;}
.phyz-dots .pd.on{background:#34D399;box-shadow:0 0 10px rgba(52,211,153,.7);}
.phyz-flash{position:absolute;inset:0;z-index:4;background:#fff;animation:phyzFlash .25s ease forwards;pointer-events:none;}
@keyframes phyzFlash{from{opacity:.85;}to{opacity:0;}}
/* result snapshot gallery (4 angles) */
.snap-row{display:flex;gap:7px;justify-content:center;margin-bottom:6px;}
.snap-cell{flex:1;max-width:74px;text-align:center;}
.snap-cell img{width:100%;aspect-ratio:.62;object-fit:cover;border-radius:10px;border:1px solid var(--border);background:#05050c;display:block;}
.snap-ph{width:100%;aspect-ratio:.62;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);}
.nb-ic{width:70px;height:70px;margin:8px auto 14px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--sc,#FF6B6B);background:color-mix(in srgb,var(--sc,#FF6B6B) 14%,transparent);border:1px solid color-mix(in srgb,var(--sc,#FF6B6B) 32%,transparent);}
.nb-ic svg{width:34px;height:34px;}
.snap-cell span{display:block;font-size:8.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* analyzing overlay */
.analyze{position:absolute;inset:0;z-index:95;background:rgba(3,4,12,0.86);backdrop-filter:blur(14px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
.analyze.on{display:flex;}
.analyze .ring{width:128px;height:128px;}
.analyze .ring circle{fill:none;stroke-width:8;stroke-linecap:round;}
.analyze .ring .bg{stroke:rgba(255,255,255,0.08);}
.analyze .ring .fg{stroke:var(--sc,#AEB6C4);transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset .2s linear;filter:drop-shadow(0 0 8px color-mix(in srgb,var(--sc,#AEB6C4) 60%,transparent));}
.analyze .pct{font-size:26px;font-weight:800;}
.analyze .lbl{font-size:13px;color:var(--muted);font-weight:600;}

/* result sheet */
.result,.organizer{position:absolute;inset:0;z-index:96;background:linear-gradient(180deg,#0c0d16,#06070e);
  display:none;flex-direction:column;padding:64px 22px calc(28px + env(safe-area-inset-bottom));overflow-y:auto;}
.result.on,.organizer.on{display:flex;animation:resIn .4s ease both;}
.organizer{z-index:97;}
.org-h{text-align:center;font-size:23px;font-weight:900;letter-spacing:-.5px;margin-top:6px;}
.org-sub{text-align:center;font-size:12.5px;color:var(--muted);margin-top:7px;line-height:1.5;}
.org-sub b{color:#cfd6e6;}
.oslots{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:20px;}
.oslot{position:relative;aspect-ratio:.74;border-radius:16px;overflow:hidden;cursor:pointer;font:inherit;color:#fff;
  -webkit-appearance:none;appearance:none;padding:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  transition:transform .12s,border-color .15s;}
.oslot:active{transform:scale(.98);}
.oslot.empty{border:1.5px dashed rgba(255,255,255,0.18);background:rgba(255,255,255,0.03);}
.oslot.empty .plus{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#9aa1b7;animation:slotPulse 2s ease-in-out infinite;}
.oslot.empty .plus svg{width:20px;height:20px;}
@keyframes slotPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}
.oslot.filled{border:1px solid var(--border);background:#05050c;animation:slotIn .45s cubic-bezier(.22,1,.36,1) both;}
@keyframes slotIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.oslot.filled img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.oslot .ok{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:#34d399;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(52,211,153,.5);}
.oslot .ok svg{width:14px;height:14px;color:#04130c;stroke-width:3;}
.oslot .re{position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;}.oslot .re svg{width:13px;height:13px;color:#fff;}
.oslot .ol{position:relative;z-index:2;font-size:11.5px;font-weight:800;letter-spacing:.04em;}
.oslot.filled .ol{position:absolute;left:0;right:0;bottom:0;padding:14px 8px 8px;text-align:center;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.72));}
.org-actions{display:flex;flex-direction:column;gap:10px;margin-top:22px;}
.org-sorting{display:flex;flex-direction:column;align-items:center;gap:14px;padding:50px 0;}
.org-spin{width:42px;height:42px;border-radius:50%;border:3px solid rgba(255,255,255,0.12);border-top-color:var(--sc);animation:ospin .8s linear infinite;}
@keyframes ospin{to{transform:rotate(360deg)}}

/* ── Voice Coach ── */
.vc-intro-hero{text-align:center;margin-top:6px;}
.vc-ic{width:84px;height:84px;border-radius:24px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 30% 20%, color-mix(in srgb,var(--sc) 30%,transparent), color-mix(in srgb,var(--sc) 9%,transparent));
  border:1px solid color-mix(in srgb,var(--sc) 45%,transparent);box-shadow:0 0 50px color-mix(in srgb,var(--sc) 26%,transparent);}
.vc-ic svg{width:38px;height:38px;color:var(--sc);}
.vc-intro-hero h2{font-size:25px;font-weight:900;letter-spacing:-.5px;}
.vc-intro-hero p{font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.5;max-width:300px;margin-left:auto;margin-right:auto;}
.vc-sec{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:22px 2px 11px;}
.vc-sec .all{color:var(--sc);letter-spacing:.02em;text-transform:none;font-size:12.5px;cursor:pointer;background:none;border:none;font-weight:700;-webkit-appearance:none;appearance:none;}
.vc-cards{display:flex;flex-direction:column;gap:10px;}
.vc-card{display:block;width:100%;text-align:left;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,0.04);
  padding:15px 16px;cursor:pointer;font:inherit;color:#fff;-webkit-appearance:none;appearance:none;transition:transform .12s,border-color .15s,background .15s;}
.vc-card:active{transform:scale(.99);background:rgba(255,255,255,0.07);}
.vc-card .t{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:800;}
.vc-card .dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor;}
.vc-card .d{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45;}
.vc-recent{display:flex;flex-direction:column;gap:10px;}
.vc-rcard{display:flex;gap:12px;align-items:center;width:100%;text-align:left;border-radius:16px;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);padding:12px;cursor:pointer;font:inherit;color:#fff;-webkit-appearance:none;appearance:none;}
.vc-rscore{width:50px;height:50px;flex:none;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:19px;}
.vc-rmeta{flex:1;min-width:0;}
.vc-rtitle{font-size:13.5px;color:#e7ecf6;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.vc-rtag{display:inline-block;font-size:10px;font-weight:800;padding:2px 9px;border-radius:99px;margin-top:5px;}
.vc-rtime{font-size:11px;color:var(--muted);margin-top:5px;}
.vc-empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 20px;line-height:1.6;border:1px dashed var(--border);border-radius:16px;}
/* prompt + record stage */
.vc-stage{position:absolute;inset:0;z-index:97;background:linear-gradient(180deg,#0c0d16,#06070e);display:none;flex-direction:column;
  padding:64px 22px calc(28px + env(safe-area-inset-bottom));overflow-y:auto;}
.vc-stage.on{display:flex;animation:resIn .4s ease both;}
.vc-tagrow{display:flex;justify-content:center;margin-top:4px;}
.vc-bigtag{font-size:11px;font-weight:800;letter-spacing:.04em;padding:5px 13px;border-radius:99px;}
.vc-pcard{border-radius:20px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.025));
  box-shadow:0 10px 30px rgba(0,0,0,0.28);padding:18px;margin-top:16px;}
.vc-pcard .ph{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--sc);}
.vc-pcard .ph svg{width:15px;height:15px;}
.vc-ptext{font-size:16px;line-height:1.55;color:#eef2fa;margin-top:11px;font-weight:500;}
.vc-how{margin-top:18px;}
.vc-how .hh{font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.vc-step{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px;}
.vc-step .n{width:24px;height:24px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;
  color:var(--sc);background:color-mix(in srgb,var(--sc) 15%,transparent);border:1px solid color-mix(in srgb,var(--sc) 30%,transparent);}
.vc-step span{font-size:13.5px;color:#cfd6e6;line-height:1.4;padding-top:2px;}
.vc-rec-wrap{margin-top:auto;padding-top:24px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.vc-mic{width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;-webkit-appearance:none;appearance:none;
  display:flex;align-items:center;justify-content:center;background:var(--sc);box-shadow:0 12px 34px color-mix(in srgb,var(--sc) 45%,transparent);transition:transform .12s;}
.vc-mic:active{transform:scale(.94);}
.vc-mic svg{width:38px;height:38px;color:#06121f;}
.vc-mic.rec{background:#ff5a5a;box-shadow:0 0 0 0 rgba(255,90,90,.5);animation:micPulse 1.3s ease-out infinite;}
@keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(255,90,90,.5)}100%{box-shadow:0 0 0 26px rgba(255,90,90,0)}}
.vc-rec-lbl{font-size:13px;font-weight:700;color:#cfd6e6;}.vc-rec-lbl b{color:var(--sc);}
.vc-rec-sub{font-size:11.5px;color:var(--muted);}
.vc-live{width:100%;min-height:38px;margin-top:6px;font-size:13px;color:#aab2c5;text-align:center;line-height:1.5;font-style:italic;}
.vc-newp{background:none;border:none;color:var(--sc);font:inherit;font-weight:700;font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none;display:inline-flex;align-items:center;gap:5px;}
.vc-newp svg{width:14px;height:14px;}
.vc-transcript{border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,0.03);padding:13px 15px;font-size:13px;color:#cfd6e6;line-height:1.6;margin-top:4px;}
@keyframes resIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.result::-webkit-scrollbar{display:none;}
.res-close{position:absolute;top:58px;right:18px;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:rgba(255,255,255,0.06);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
.res-close:active{transform:scale(.94);}.res-close svg{width:18px;height:18px;}
.res-snap{width:120px;height:120px;border-radius:24px;object-fit:cover;align-self:center;margin-bottom:4px;
  border:1px solid var(--border);background:#05050c;}
.res-score{display:flex;flex-direction:column;align-items:center;margin:6px 0 6px;}
.res-ring{width:172px;height:172px;}
.res-ring circle{fill:none;stroke-width:11;stroke-linecap:round;}
.res-ring .bg{stroke:rgba(255,255,255,0.08);}
.res-ring .fg{stroke:var(--sc,#AEB6C4);transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1);filter:drop-shadow(0 0 10px color-mix(in srgb,var(--sc,#AEB6C4) 55%,transparent));}
.res-num{font-size:46px;font-weight:900;letter-spacing:-2px;}
.res-num small{font-size:16px;font-weight:700;color:var(--muted);}
.res-grade{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--sc,#AEB6C4);margin-top:-6px;}
.res-title{text-align:center;font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-top:8px;}
.res-sub{text-align:center;font-size:13px;color:var(--muted);margin-top:5px;line-height:1.5;}
.res-sec{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:20px 2px 10px;}
.tip{display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:14px;padding:13px 14px;margin-bottom:9px;}
.tip .ti{width:26px;height:26px;flex:none;border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:var(--sc,#AEB6C4);background:color-mix(in srgb,var(--sc,#AEB6C4) 16%,transparent);}
.tip .ti svg{width:15px;height:15px;}
.tip span{font-size:13.5px;line-height:1.5;color:#E4E8F2;}
.res-actions{display:flex;gap:10px;margin-top:18px;}
.btn{flex:1;border:none;border-radius:16px;padding:15px;font:inherit;font-size:14.5px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .12s;}
.btn:active{transform:scale(.98);}.btn svg{width:16px;height:16px;}
.btn.save{color:#02030A;background:var(--sc,#AEB6C4);box-shadow:0 10px 26px color-mix(in srgb,var(--sc,#AEB6C4) 30%,transparent);}
.btn.save.done{background:var(--green);box-shadow:none;}
.btn.again{color:var(--text);background:rgba(255,255,255,0.06);border:1px solid var(--border);}
.btn.coach{width:100%;flex:none;margin-top:10px;color:#fff;
  background:color-mix(in srgb, var(--sc,#AEB6C4) 22%, rgba(255,255,255,0.04));
  border:1px solid color-mix(in srgb, var(--sc,#AEB6C4) 42%, transparent);}

.toast{position:absolute;left:50%;bottom:40px;transform:translateX(-50%) translateY(10px);z-index:120;
  background:rgba(10,12,22,0.94);border:1px solid var(--border);color:var(--text);font-size:12.5px;font-weight:600;
  padding:10px 16px;border-radius:14px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;backdrop-filter:blur(10px);max-width:300px;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(prefers-reduced-motion:reduce){.scanline i,.analyze .ring .fg{animation:none!important;}}

/* ── Physique intro (analysis landing) ───────────────────────── */
.pq-card{margin-top:20px;border-radius:20px;background:rgba(255,255,255,0.045);border:1px solid var(--border);padding:16px;}
.pq-prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.pq-prog-top .l{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:#cfd6e6;}
.pq-prog-top .l svg{width:15px;height:15px;color:var(--sc);}
.pq-vh{display:inline-flex;align-items:center;gap:3px;font-size:12.5px;font-weight:700;color:var(--sc);background:none;border:none;cursor:pointer;-webkit-appearance:none;appearance:none;min-height:0;}
.pq-vh svg{width:14px;height:14px;}
.pq-stats{display:flex;align-items:stretch;}
.pq-stat{flex:1;text-align:center;}
.pq-stat .n{font-size:24px;font-weight:900;letter-spacing:-1px;}
.pq-stat.best .n{color:var(--sc);}
.pq-stat .k{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
.pq-stat+.pq-stat{border-left:1px solid rgba(255,255,255,0.07);}
.pq-getsec,.pq-tipsec{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:22px 2px 10px;}
.pq-get{border-radius:20px;background:rgba(255,255,255,0.045);border:1px solid var(--border);overflow:hidden;}
.pq-grow{display:flex;align-items:center;gap:13px;padding:15px 16px;border-bottom:1px solid rgba(255,255,255,0.05);}
.pq-grow:last-child{border-bottom:none;}
.pq-gic{width:40px;height:40px;flex:none;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--sc);
  background:color-mix(in srgb,var(--sc) 15%,transparent);border:1px solid color-mix(in srgb,var(--sc) 30%,transparent);}
.pq-gic svg{width:20px;height:20px;}
.pq-gt{font-size:14.5px;font-weight:700;color:#fff;}
.pq-gd{font-size:12px;color:var(--muted);margin-top:2px;}
.pq-tips{border-radius:18px;background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:15px 16px;}
.pq-tips p{font-size:12.5px;color:var(--muted);line-height:1.75;}
.pq-tips p b{color:#dfe6f2;font-weight:700;}
.pq-btns{margin-top:22px;display:flex;flex-direction:column;gap:10px;}
.pq-take{border:none;border-radius:16px;padding:16px;font:inherit;font-size:15px;font-weight:800;cursor:pointer;-webkit-appearance:none;appearance:none;
  background:var(--sc);color:#06121f;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 26px color-mix(in srgb,var(--sc) 40%,transparent);}
.pq-take svg{width:19px;height:19px;}
.pq-upload{border:1px solid var(--border);border-radius:16px;padding:15px;font:inherit;font-size:14.5px;font-weight:700;cursor:pointer;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,0.05);color:#EAF0FB;display:flex;align-items:center;justify-content:center;gap:9px;}
.pq-upload svg{width:18px;height:18px;}
.pq-disc{font-size:11px;color:var(--dim,#6b7280);text-align:center;margin-top:16px;line-height:1.5;}
.pq-btns button:active{transform:scale(.985);}
/* cleaner landing: section labels, step strip, tips checklist, helper */
.pq-sec{font-size:10.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:22px 2px 11px;}
.pq-sec .h{color:var(--sc);letter-spacing:.04em;}
.pq-steps{display:flex;gap:8px;}
.pq-step{flex:1;text-align:center;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,0.04);padding:13px 6px 11px;}
.pq-step .num{width:30px;height:30px;margin:0 auto 8px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#06121f;}
.pq-step .lb{font-size:11px;font-weight:700;color:#cfd6e6;}
.pq-tips2{border-radius:18px;background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:5px 3px;}
.pq-tip{display:flex;align-items:center;gap:11px;padding:9px 13px;}
.pq-tip .ck{width:22px;height:22px;flex:none;border-radius:7px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,#34D399 16%,transparent);color:#34D399;}
/* Physique = restrained two-colour page: green checks become the blue accent */
body.type-physique .pq-tip .ck{background:color-mix(in srgb,var(--sc) 16%,transparent);color:var(--sc);}
body.type-physique .tip .ti{background:color-mix(in srgb,var(--sc) 15%,transparent);color:var(--sc);}
.pq-tip .ck svg{width:13px;height:13px;}
.pq-tip span{font-size:13px;color:#dfe6f2;font-weight:600;line-height:1.4;}
.pq-help{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600;margin-top:12px;}
.pq-help svg{width:14px;height:14px;color:var(--sc);}
/* Recipe Generator entry (food scanner only) */
.pq-recipe{display:flex;align-items:center;gap:13px;margin-top:14px;padding:14px 15px;border-radius:16px;text-decoration:none;
  border:1px solid color-mix(in srgb,var(--sc) 30%,transparent);background:color-mix(in srgb,var(--sc) 10%,transparent);color:#fff;transition:transform .12s,background .15s;}
.pq-recipe:active{transform:scale(.99);background:color-mix(in srgb,var(--sc) 16%,transparent);}
.pq-recipe-ic{width:40px;height:40px;flex:none;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--sc) 20%,transparent);color:var(--sc);}
.pq-recipe-ic svg{width:20px;height:20px;}
.pq-recipe-tx{flex:1;min-width:0;}
.pq-recipe-tx b{display:block;font-size:14.5px;font-weight:800;}
.pq-recipe-tx span{display:block;font-size:12px;color:var(--muted);margin-top:1px;}
.pq-recipe>svg:last-child{width:18px;height:18px;color:var(--muted);flex:none;}
.pq-stat .n.col{color:var(--sc);}

/* ── Physique history panel ───────────────────────── */
.phist{position:absolute;inset:0;z-index:120;background:linear-gradient(180deg,#080a14,#04050c);display:none;flex-direction:column;}
.phist.on{display:flex;animation:resIn .35s ease both;}
.phist-top{display:flex;align-items:center;gap:10px;padding:54px 16px 8px;}
.phist-top h2{flex:1;text-align:center;font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;}
.phist-top h2 svg{width:17px;height:17px;color:var(--sc);}
.phist-ic{width:38px;height:38px;flex:none;border-radius:50%;min-height:0;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;appearance:none;padding:0;}
.phist-ic svg{width:18px;height:18px;}
.phist-body{flex:1;overflow-y:auto;padding:8px 18px 28px;}
.phist-body::-webkit-scrollbar{display:none;}
.ph-h{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:20px 2px 10px;}
.ph-stats{display:flex;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,0.04);overflow:hidden;}
.ph-st{flex:1;text-align:center;padding:16px 6px;}
.ph-st+.ph-st{border-left:1px solid rgba(255,255,255,0.07);}
.ph-st .k{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.ph-st .k svg{width:13px;height:13px;}
.ph-st .n{font-size:25px;font-weight:900;letter-spacing:-1px;margin-top:5px;}
.ph-tabs{display:flex;gap:4px;margin-top:10px;background:rgba(255,255,255,0.05);border-radius:13px;padding:4px;}
.ph-tab{flex:1;text-align:center;padding:9px;border-radius:10px;font:inherit;font-size:13px;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;-webkit-appearance:none;appearance:none;min-height:0;}
.ph-tab.on{background:rgba(255,255,255,0.10);color:#fff;}
.ph-chart{margin-top:14px;border-radius:18px;border:1px solid var(--border);background:rgba(255,255,255,0.03);padding:14px 14px 10px;}
.ph-chart svg{width:100%;height:150px;display:block;overflow:visible;}
.ph-cx{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:8px;}
.ph-cx b{color:#cfd6e6;font-weight:700;}
.ph-item{display:flex;align-items:center;gap:12px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,0.04);padding:12px;margin-bottom:10px;}
.ph-thumb{width:52px;height:52px;flex:none;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;}
.ph-thumb img{width:100%;height:100%;object-fit:cover;}
.ph-thumb svg{width:22px;height:22px;color:var(--muted);}
.ph-meta{flex:1;min-width:0;}
.ph-name{font-size:14.5px;font-weight:700;color:#fff;}
.ph-time{font-size:12px;color:var(--muted);margin-top:2px;}
.ph-score{flex:none;min-width:54px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;
  color:var(--sc);background:color-mix(in srgb,var(--sc) 14%,transparent);border:1px solid color-mix(in srgb,var(--sc) 28%,transparent);}
.ph-del{flex:none;width:44px;height:44px;min-height:0;border-radius:12px;border:1px solid rgba(255,90,90,0.3);background:rgba(255,90,90,0.1);color:#ff6b6b;
  display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;appearance:none;padding:0;}
.ph-del svg{width:18px;height:18px;}
.ph-empty{text-align:center;color:var(--muted);font-size:13px;padding:46px 20px;line-height:1.6;}

/* ── premium polish (physique) ── */
body.pq .hero .ic{width:104px;height:104px;border-radius:30px;
  background:radial-gradient(120% 120% at 30% 20%, color-mix(in srgb,var(--sc) 30%,transparent), color-mix(in srgb,var(--sc) 10%,transparent));
  border:1px solid color-mix(in srgb,var(--sc) 45%,transparent);
  box-shadow:0 0 60px color-mix(in srgb,var(--sc) 30%,transparent), inset 0 1px 0 rgba(255,255,255,0.12);}
body.pq .hero .ic svg{width:48px;height:48px;filter:drop-shadow(0 4px 12px color-mix(in srgb,var(--sc) 55%,transparent));}
body.pq .hero h2{font-size:28px;background:linear-gradient(180deg,#fff,#bcd4f5);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.pq-card,.pq-get,.pq-tips{background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.025));box-shadow:0 10px 30px rgba(0,0,0,0.28);}
.pq-take{background:linear-gradient(135deg,var(--sc),color-mix(in srgb,var(--sc) 62%,#0a2f63));}
.pq-gic{background:linear-gradient(135deg,color-mix(in srgb,var(--sc) 26%,transparent),color-mix(in srgb,var(--sc) 8%,transparent));}

/* result: gradient ring, grade pill, breakdown bars */
.res-grade{display:inline-block;color:#06121f;background:linear-gradient(90deg,var(--sc),color-mix(in srgb,var(--sc) 50%,#ffffff));
  padding:5px 15px;border-radius:999px;margin-top:10px;font-size:11px;font-weight:900;letter-spacing:.12em;
  box-shadow:0 8px 22px color-mix(in srgb,var(--sc) 32%,transparent);}
.btn.save{background:linear-gradient(135deg,var(--sc),color-mix(in srgb,var(--sc) 62%,#0a2f63));}
.bd{display:flex;flex-direction:column;gap:13px;background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border:1px solid var(--border);border-radius:16px;padding:16px;}
.bd-row{display:flex;align-items:center;gap:12px;}
.bd-k{width:92px;flex:none;font-size:12.5px;font-weight:700;color:#cfd6e6;}
.bd-track{flex:1;height:8px;border-radius:99px;background:rgba(255,255,255,0.09);overflow:hidden;}
.bd-track i{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,color-mix(in srgb,var(--sc) 70%,#0a2f63),var(--sc));
  box-shadow:0 0 10px color-mix(in srgb,var(--sc) 50%,transparent);transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.bd-v{width:26px;flex:none;text-align:right;font-size:13px;font-weight:800;color:#fff;}
.snap-cell img,.snap-cell .snap-ph{aspect-ratio:.62;border-radius:12px;}
.snap-cell img{box-shadow:0 6px 18px rgba(0,0,0,0.35);}

/* ── colour-coded result + percentile ── */
.res-pct{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:12px;font-weight:700;color:#aab2c5;}
.res-pct svg{width:14px;height:14px;color:var(--sc);}.res-pct b{color:#fff;font-weight:900;}
/* glass card surface */
.glass{background:linear-gradient(180deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02))!important;
  border:1px solid rgba(255,255,255,0.09)!important;box-shadow:0 12px 34px rgba(0,0,0,0.32),inset 0 1px 0 rgba(255,255,255,0.06)!important;}
/* bigger ring + glow */
.res-ring{filter:drop-shadow(0 0 18px color-mix(in srgb,var(--sc) 40%,transparent));}
/* letter grade + tier pill row */
.res-letterrow{display:flex;align-items:center;gap:9px;margin-top:2px;}
.res-letter{width:34px;height:34px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#06121f;background:linear-gradient(135deg,var(--sc),color-mix(in srgb,var(--sc) 55%,#fff));
  box-shadow:0 6px 18px color-mix(in srgb,var(--sc) 38%,transparent);}
/* percentile bar */
.res-pctbar{width:210px;max-width:80%;margin-top:13px;}
.res-pctbar-track{position:relative;height:7px;border-radius:99px;background:rgba(255,255,255,0.09);overflow:visible;}
.res-pctbar-track i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,color-mix(in srgb,var(--sc) 50%,#0a2f63),var(--sc));box-shadow:0 0 10px color-mix(in srgb,var(--sc) 50%,transparent);transition:width 1s cubic-bezier(.22,1,.36,1);}
.res-pctbar-dot{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);box-shadow:0 0 0 3px color-mix(in srgb,var(--sc) 60%,transparent);}

      var hk=!!(window.coreAI && coreAI.hasKey && coreAI.hasKey());
      showMessage(hk?'Couldn’t score that one':'Voice scoring isn’t set up',
        hk?((lastAIError?'Error: '+lastAIError+'. ':'')+'Record again with a steady connection.'):'Add your AI key in Settings → AI Setup to score your delivery.');
      return;
    }
    var score=Math.max(0,Math.min(100,Math.round(ai.rank.score))), SC=scoreColor(score), topP=topPctile(score);
    var BD=(ai.breakdown && typeof ai.breakdown.clarity==='number') ? { Clarity:clampb(ai.breakdown.clarity), Confidence:clampb(ai.breakdown.confidence), Structure:clampb(ai.breakdown.structure), Relevance:clampb(ai.breakdown.relevance) } : null;
    var tips=(ai.tips && ai.tips.length)?ai.tips.slice(0,4):(ai.summary?[ai.summary]:[]);
    var R=78, C=2*Math.PI*R, res=$('#result');
    var bdHtml=BD?('<div class="res-sec">Breakdown</div><div class="bd">'+Object.keys(BD).map(function(k){ var v=BD[k], col=scoreColor(v);
      return '<div class="bd-row"><span class="bd-dot" style="background:'+col+'"></span><span class="bd-k">'+k+'</span><div class="bd-track"><i data-w="'+v+'" style="background:linear-gradient(90deg,color-mix(in srgb,'+col+' 55%,#0a2f63),'+col+');box-shadow:0 0 10px color-mix(in srgb,'+col+' 50%,transparent)"></i></div><span class="bd-v" style="color:'+col+'">'+v+'</span></div>'; }).join('')+'</div>'):'';
    res.style.setProperty('--sc', SC);
    res.innerHTML='<button class="res-close" id="resClose" type="button" aria-label="Done">'+svg('<path d="M6 6l12 12M18 6L6 18"/>')+'</button>'
      +'<div class="vc-tagrow" style="margin-top:2px"><span class="vc-bigtag" style="color:'+sc.color+';background:color-mix(in srgb,'+sc.color+' 16%,transparent)">'+sc.name+'</span></div>'
      +'<div class="res-score"><svg class="res-ring" viewBox="0 0 172 172"><defs><linearGradient id="vGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--sc)"/><stop offset="1" stop-color="var(--sc)" stop-opacity="0.5"/></linearGradient></defs>'
        +'<circle class="bg" cx="86" cy="86" r="'+R+'"></circle><circle class="fg" id="resFg" cx="86" cy="86" r="'+R+'" style="stroke:url(#vGrad)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle>'
        +'<text x="86" y="80" text-anchor="middle" id="resNum" fill="#fff" style="font:900 46px -apple-system,sans-serif;letter-spacing:-2px">0</text>'
        +'<text x="86" y="104" text-anchor="middle" fill="rgba(255,255,255,0.72)" style="font:700 13px -apple-system,sans-serif">/ 100</text></svg>'
        +'<div class="res-grade">'+(ai.rank.tier||grade(score))+'</div><div class="res-pct">'+svg('<path d="M3 17l6-6 4 4 7-8"/>')+'Top <b>'+topP+'%</b> · better than <b>'+(100-topP)+'%</b></div></div>'
      +'<div class="res-title">Delivery score</div><div class="res-sub">Scored by CORE voice AI from your answer.</div>'
      +(ai.summary?'<div class="res-lead">'+ai.summary+'</div>':'')
      +bdHtml
      +'<div class="res-sec">Coach notes</div>'
      +tips.map(function(t){ return '<div class="tip"><div class="ti">'+svg('<path d="M20 6L9 17l-5-5"/>')+'</div><span>'+t+'</span></div>'; }).join('')
      +'<div class="res-sec">Your answer</div><div class="vc-transcript">“'+transcript+'”</div>'
      +'<div class="res-actions"><button class="btn again" id="vcAgain" type="button">'+svg('<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>')+'Practice again</button>'
        +'<button class="btn save done" id="vcSaved" type="button">'+svg('<path d="M5 12l4 4 10-11"/>')+'Saved</button></div>'
      +'<button class="btn coach" id="vcCoach" type="button">'+svg('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>')+'Discuss with Coach</button>';
    res.classList.add('on');
    var fg=$('#resFg'); requestAnimationFrame(function(){ fg.setAttribute('stroke-dashoffset', C*(1-score/100)); });
    var numEl=$('#resNum'), t0=performance.now();
    (function count(t){ var pr=Math.min(1,(t-t0)/1000); numEl.textContent=Math.round(score*(1-Math.pow(1-pr,3))); if(pr<1) requestAnimationFrame(count); })(t0);
    requestAnimationFrame(function(){ Array.prototype.forEach.call(res.querySelectorAll('.bd-track i'), function(el){ el.style.width=el.getAttribute('data-w')+'%'; }); });
    try{ if(navigator.vibrate) navigator.vibrate([0,30,40,20]); }catch(e){}
    saveVoiceSession(key, score, ai, transcript, prompt);
    $('#resClose').addEventListener('click', function(){ res.classList.remove('on'); buildVoiceLanding(); });
    $('#vcAgain').addEventListener('click', function(){ res.classList.remove('on'); showScenario(key); });
    var vcb=$('#vcCoach'); if(vcb) vcb.addEventListener('click', function(){ lsSet('coreCoachSeed', JSON.stringify({ type:'voice', name:sc.name, label:sc.name+' practice', score:score, tips:tips, ts:Date.now() })); try{ window.coreSfx&&window.coreSfx('click'); }catch(_){} location.href='coach.html'; });
  }
  function saveVoiceSession(key, score, ai, transcript, prompt){
    try{ var all=readScans();
      all.push({ type:'voice', name:'Voice', scenario:key, label:VOICE_SCENARIOS[key].name, title:prompt.slice(0,90), score:score, grade:(ai.rank&&ai.rank.tier)||grade(score),
        tips:(ai.tips||[]).slice(0,4), transcript:transcript.slice(0,600), breakdown:ai.breakdown||null, ts:Date.now() });
      // keep at most 25 voice sessions
      var voice=all.filter(function(x){ return x.type==='voice'; }), other=all.filter(function(x){ return x.type!=='voice'; });
      if(voice.length>25) voice=voice.slice(-25);
      lsSet('coreScans.v1', JSON.stringify(other.concat(voice).slice(-80)));
      lsSet('coreLastScan', JSON.stringify({ type:'voice', score:score, ts:Date.now() }));
      if(typeof updateLast==='function') updateLast();
    }catch(e){}
  }

  if(!isVoice){
    document.body.classList.add('pq');
    document.body.classList.add('type-'+type);
    $('#title').textContent=s.name+' Scan';
    $('#name').textContent=s.name+' Analysis';
    $('#tag').textContent=s.tag;
    var bd=document.querySelector('.hero .badge'); if(bd) bd.style.display='none';
    ['#last','#checksSec','#checks','#cta','#note'].forEach(function(sel){ var el=$(sel); if(el) el.style.display='none'; });
    buildPqIntro();
    if(isPhysique){ var pf=$('#pqFile'); if(pf) pf.multiple=true; }   // physique upload = all 4 angles
    $('#pqIntro').style.display='block';
    $('#histBtn').style.display='inline-flex';
    var hb=$('#helpBtn'); if(hb) hb.style.display='none';
    var pt=$('#phistTitle'); if(pt) pt.textContent=s.name+' History';
    var pic=$('#phistIcon'); if(pic) pic.innerHTML=s.icon;
    if((location.hash||'')==='#history') openHistory();   // deep-link from a profile card
  } else {
    // Voice Coach: scenario-based practice landing
    document.body.classList.add('pq');
    $('#title').textContent='Voice Coach';
    var vh=document.querySelector('.hero'); if(vh) vh.style.display='none';
    ['#last','#checksSec','#checks','#cta','#note'].forEach(function(sel){ var el=$(sel); if(el) el.style.display='none'; });
    var hbv=$('#helpBtn'); if(hbv) hbv.style.display='none';
    $('#histBtn').style.display='inline-flex';
    var pt2=$('#phistTitle'); if(pt2) pt2.textContent='Voice History';
    var pic2=$('#phistIcon'); if(pic2) pic2.innerHTML=s.icon;
    buildVoiceLanding();
    $('#pqIntro').style.display='block';
  }

  // be a good citizen: release the camera if the page is hidden/closed
  window.addEventListener('pagehide', stopCam);
  document.addEventListener('visibilitychange', function(){ if(document.hidden && cam.classList.contains('on') && !cam.classList.contains('scanning')) stopCam(); });
})();
</script>
  <script src="_lib/core-pagefx.js"></script>
  <script src="_lib/dash-ambient.js"></script>
  <script>if(window.dashAmbient)try{window.dashAmbient.init();}catch(e){}</script>
  <script src="_lib/core-help.js"></script>
  <script>if(window.coreHelp)window.coreHelp.attach("helpBtn",{"title":"Scanner","bullets":["Point your camera to scan food, physique, outfit, posture or looks.","CORE vision AI scores each scan 0–100 with quick tips.","Physique feeds Strength, food feeds Health, looks & style feed Social."]});</script>
