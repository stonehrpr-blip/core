<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Log a slip?</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="stylesheet" href="_lib/core-buttons.css" />
<script src="_lib/core-state.js"></script>
<script src="_lib/analytics.js"></script>
  <script src="_lib/core-back.js"></script>
<style>
  :root { --bg-base:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --accent:#4A8FFF; --border:rgba(255,255,255,0.08); --warn:#FF7A45; --safe:#34D399; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }

  /* dimmed habit page behind */
  .bg-mock { position:absolute; inset:0; background: linear-gradient(180deg, #1a0814 0%, #02020A 60%); filter: blur(3px) brightness(0.45); }
  .scrim { position:absolute; inset:0; background: rgba(2,2,10,0.55); backdrop-filter: blur(12px); }

  /* sheet */
  .sheet {
    position:absolute; left:0; right:0; bottom:0; z-index:20;
    background: linear-gradient(180deg, #0E0E1B 0%, #07071A 100%);
    border-top-left-radius: 28px; border-top-right-radius: 28px;
    border-top: 1px solid rgba(255,255,255,0.10);
    padding: 22px 24px 36px;
    box-shadow: 0 -30px 80px rgba(0,0,0,0.6);
    transform: translateY(20px); opacity:0;
    animation: rise 0.4s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes rise { to { transform: translateY(0); opacity:1; } }
  .grab { width:40px; height:4px; border-radius:999px; background: rgba(255,255,255,0.18); margin: 0 auto 16px; }

  /* hold-to-confirm ring */
  .hold-stage { display:flex; align-items:center; justify-content:center; margin: 8px 0 20px; position:relative; }
  .hold-ring { width:140px; height:140px; }
  .hold-ring .bg-track { fill:none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
  .hold-ring .fg-track {
    fill:none; stroke: url(#confirmGrad); stroke-width: 8;
    stroke-linecap: round; stroke-dasharray: 408; stroke-dashoffset: 408;
    transition: stroke-dashoffset 2.0s linear;
    transform: rotate(-90deg); transform-origin: center;
  }
  .hold-ring.holding .fg-track { stroke-dashoffset: 0; }
  .hold-center {
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    pointer-events:none;
  }
  .hold-icon {
    width:64px; height:64px; border-radius:50%;
    background: radial-gradient(circle at 32% 28%, #FFD3E4, #FF6BAA 55%, #832D50);
    box-shadow: 0 0 24px rgba(255,107,170,0.55), inset 0 1px 3px rgba(255,255,255,0.3);
    display:flex; align-items:center; justify-content:center;
  }
  .hold-icon svg { width:30px; height:30px; stroke:white; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .hold-label { font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color: var(--muted); font-weight:700; }

  .title { font-size:24px; font-weight:700; letter-spacing:-0.6px; line-height:1.1; text-align:center; margin: 0 0 6px; }
  .copy { color: var(--muted); font-size:13px; line-height:19px; margin:0 auto 18px; max-width: 300px; text-align:center; letter-spacing:-0.05px; }

  .hold-cta {
    width:100%; padding: 18px; border-radius: 999px; background: rgba(255,107,170,0.10); border: 1px solid rgba(255,107,170,0.45);
    color: #FF6BAA; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    user-select: none; -webkit-user-select: none;
    transition: background 0.15s, transform 0.15s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .hold-cta:hover { background: rgba(255,107,170,0.16); }
  .hold-cta.holding { background: rgba(255,107,170,0.22); transform: scale(0.99); }
  .hold-cta small { color: rgba(255,107,170,0.7); font-size:11px; letter-spacing:0.04em; font-weight: 500; }

  /* alt action — "I almost did but didn't" */
  .almost {
    margin-top: 10px; padding: 18px; border-radius: 18px; cursor: pointer;
    background: linear-gradient(135deg, rgba(52,211,153,0.10), rgba(74,143,255,0.10));
    border: 1px solid rgba(52,211,153,0.30);
    display:flex; align-items:center; gap:12px;
    transition: border-color 0.18s, transform 0.15s;
  }
  .almost:hover { border-color: rgba(52,211,153,0.55); }
  .almost:active { transform: scale(0.99); }
  .almost-ico { width:36px; height:36px; border-radius:50%; background: linear-gradient(135deg, #34D399, #4A8FFF); box-shadow: 0 0 14px rgba(52,211,153,0.40); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .almost-ico svg { width:18px; height:18px; stroke: white; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .almost-text { flex:1; }
  .almost-title { font-size:14px; font-weight:700; color:#fff; letter-spacing:-0.1px; }
  .almost-sub { font-size:11px; color: var(--muted); margin-top: 2px; line-height: 15px; }
  .almost-xp { background: rgba(52,211,153,0.16); color: #34D399; font-size:11px; font-weight:700; padding: 4px 8px; border-radius:8px; letter-spacing:0.06em; }

  .cancel { display:block; margin: 14px auto 0; text-align:center; background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 8px 12px; font-family: inherit; }
  .cancel:hover { color: #fff; }
</style>
  <link rel="stylesheet" href="_lib/core-responsive.css">
  <link rel="stylesheet" href="_lib/core-theme.css">
  <script src="_lib/core-theme.js" defer></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="bg-mock"></div>
    <div class="scrim"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="sheet">
      <div class="grab"></div>

      <div class="hold-stage">
        <svg class="hold-ring" id="holdRing" viewBox="0 0 140 140">
          <defs>
            <linearGradient id="confirmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FF6BAA"/>
              <stop offset="100%" stop-color="#FF7A45"/>
            </linearGradient>
          </defs>
          <circle class="bg-track" cx="70" cy="70" r="65"/>
          <circle class="fg-track" cx="70" cy="70" r="65"/>
        </svg>
        <div class="hold-center">
          <div class="hold-icon">
            <svg viewBox="0 0 24 24"><path d="M12 4v12M12 16c0 2-1.2 4-3 4-2.5 0-4-2-4-5 0-3 1-7 3-9"/><path d="M12 16c0 2 1.2 4 3 4 2.5 0 4-2 4-5 0-3-1-7-3-9"/></svg>
          </div>
          <div class="hold-label">Lungs · −12 XP</div>
        </div>
      </div>

      <h2 class="title" id="confirmTitle">Hold to log the slip.</h2>
      <p class="copy" id="confirmCopy">Two seconds. We want the tap to be intentional, not accidental.</p>

      <button class="hold-cta" id="holdCta">
        <span id="holdLabel">Hold to confirm</span>
        <small>2s</small>
      </button>

      <div class="almost" id="almostBtn" onclick="openAlmost()">
        <div class="almost-ico">
          <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
        </div>
        <div class="almost-text">
          <div class="almost-title">I almost did but didn't</div>
          <div class="almost-sub">Resisting counts. Log a win instead.</div>
        </div>
        <div class="almost-xp">+5 XP</div>
      </div>

      <!-- Reflect panel (hidden until "I almost did" tapped) -->
      <div id="reflectPanel" style="display:none; margin-top:14px; padding:18px; border-radius:18px; background: linear-gradient(135deg, rgba(52,211,153,0.10), rgba(74,143,255,0.10)); border:1px solid rgba(52,211,153,0.30);">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="#34D399" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
          <div style="font-size:13px; font-weight:700; color:#fff; letter-spacing:-0.1px;">Win logged. How was it?</div>
        </div>
        <div id="moodRow" style="display:flex; gap:6px; margin-bottom:12px;">
          <button class="mood" data-mood="strong"  type="button" title="Felt strong"   style="flex:1; padding:10px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); cursor:pointer; font-size:18px; font-family:inherit; color:#fff;">💪</button>
          <button class="mood" data-mood="ok"      type="button" title="Felt okay"     style="flex:1; padding:10px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); cursor:pointer; font-size:18px; font-family:inherit; color:#fff;">🙂</button>
          <button class="mood" data-mood="shaky"   type="button" title="Felt shaky"    style="flex:1; padding:10px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); cursor:pointer; font-size:18px; font-family:inherit; color:#fff;">😬</button>
          <button class="mood" data-mood="craving" type="button" title="Strong craving" style="flex:1; padding:10px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); cursor:pointer; font-size:18px; font-family:inherit; color:#fff;">🥵</button>
          <button class="mood" data-mood="proud"   type="button" title="Proud"          style="flex:1; padding:10px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); cursor:pointer; font-size:18px; font-family:inherit; color:#fff;">🔥</button>
        </div>
        <textarea id="reflectNote" placeholder="What helped? (optional)" rows="2" style="width:100%; padding:11px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); color:#fff; font-family:inherit; font-size:13px; line-height:18px; outline:none; resize:none;"></textarea>
        <div style="display:flex; gap:8px; margin-top:12px;">
          <button onclick="saveAlmost()" class="btn primary pill" style="flex:1;">Save win · +5 XP</button>
          <button onclick="cancelAlmost()" class="btn ghost">Skip</button>
        </div>
      </div>

      <button class="cancel" onclick="cancel()">Cancel</button>
    </div>
  </div>
  <style>
    .mood:hover { background: rgba(255,255,255,0.07) !important; transform: translateY(-1px); }
    .mood.sel { border-color: #34D399 !important; background: rgba(52,211,153,0.15) !important; box-shadow: 0 0 0 1px rgba(52,211,153,0.4) inset; }
  </style>

<script>
  const cta = document.getElementById('holdCta');
  const ring = document.getElementById('holdRing');
  const habit = (function(){
    try { return new URLSearchParams(location.search).get('habit') || 'vape'; } catch(e){ return 'vape'; }
  })();
  let holdTimer = null;
  let confirmed = false;

  function startHold() {
    if (confirmed) return;
    cta.classList.add('holding');
    ring.classList.add('holding');
    if (window.coreTrack) coreTrack('slip_confirm_hold_start', { habit });
    holdTimer = setTimeout(() => {
      confirmed = true;
      doConfirm();
    }, 2000);
  }
  function endHold() {
    if (confirmed) return;
    cta.classList.remove('holding');
    ring.classList.remove('holding');
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  }
  function doConfirm() {
    if (window.coreTrack) coreTrack('slip_confirmed', { habit });
    coreState.logSlip(habit, { magnitude: 1 });
    // route to recovery quest if we're recoverable, otherwise to habit page
    setTimeout(() => { location.href = '29-recovery-quest.html'; }, 300);
  }
  let selectedMood = null;
  function openAlmost() {
    if (window.coreTrack) coreTrack('slip_almost_started', { habit });
    document.getElementById('reflectPanel').style.display = 'block';
    document.getElementById('almostBtn').style.display = 'none';
    cta.style.opacity = 0.4;
    cta.style.pointerEvents = 'none';
  }
  function cancelAlmost() {
    document.getElementById('reflectPanel').style.display = 'none';
    document.getElementById('almostBtn').style.display = 'flex';
    cta.style.opacity = '';
    cta.style.pointerEvents = '';
    selectedMood = null;
    document.querySelectorAll('#moodRow .mood').forEach(m => m.classList.remove('sel'));
  }
  function saveAlmost() {
    const note = (document.getElementById('reflectNote').value || '').trim();
    if (window.coreTrack) coreTrack('willpower_win', { habit, mood: selectedMood, hasNote: !!note });
    // Reward: willpower +1, xp +5
    coreState.update((s) => { s.stats.willpower = Math.min(100, s.stats.willpower + 1); s.xp += 5; return s; });
    setTimeout(() => { location.href = '26-habit.html#' + habit; }, 200);
  }
  function cancel() {
    if (window.coreTrack) coreTrack('slip_confirm_cancelled', { habit });
    history.length > 1 ? history.back() : (location.href = '26-habit.html#' + habit);
  }
  document.querySelectorAll('#moodRow .mood').forEach(m => {
    m.addEventListener('click', () => {
      document.querySelectorAll('#moodRow .mood').forEach(x => x.classList.remove('sel'));
      m.classList.add('sel');
      selectedMood = m.dataset.mood;
    });
  });
  ['mousedown','touchstart','pointerdown'].forEach(e => cta.addEventListener(e, startHold));
  ['mouseup','touchend','mouseleave','touchcancel','pointerup','pointercancel'].forEach(e => cta.addEventListener(e, endHold));

  // Tone-aware copy
  (function applyTone() {
    try {
      const t = JSON.parse(localStorage.getItem('coreOnboardTrial') || '{}');
      const tone = t.tone || 'balanced';
      const title = {
        gentle:   'Take your time.',
        balanced: 'Hold to log the slip.',
        direct:   'Sure? Hold to log.',
        drill:    'Last call. Hold to log it.'
      }[tone];
      const copy = {
        gentle:   "No rush. Hold when you're sure. Slipping is fine — we just want the tap to be intentional.",
        balanced: 'Two seconds. We want the tap to be intentional, not accidental.',
        direct:   "Two seconds. If you tap fast it doesn't count — it has to be deliberate.",
        drill:    "Two seconds — every time. No half-press. Own the slip or skip it."
      }[tone];
      const hold = {
        gentle:   'Hold gently',
        balanced: 'Hold to confirm',
        direct:   'Hold to log',
        drill:    'Hold. 2 seconds.'
      }[tone];
      if (title) document.getElementById('confirmTitle').textContent = title;
      if (copy)  document.getElementById('confirmCopy').textContent  = copy;
      if (hold)  document.getElementById('holdLabel').textContent    = hold;
    } catch(e){}
  })();
</script>
</body>
</html>
