<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
  <meta charset="utf-8" />
  <title>Core — Food scan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    :root { --bg-base:#02020A; --text-primary:#F8FAFE; --text-muted:#9AA1B7; --text-dim:#4F5570; --accent:#4A8FFF; --stat-body:#5CE1E6; }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; }
    body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text-primary); padding:24px; overflow:hidden; }
    .phone { position:relative; width:390px; height:844px; background:#000; border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
    .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
    .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }

    /* Camera viewfinder (simulated with gradient) */
    .viewfinder {
      position:absolute; inset:0; z-index:1;
      background:
        radial-gradient(circle at 50% 45%, #3a2818 0%, #1a1208 60%, #050202 100%),
        linear-gradient(135deg, #1a0e08 0%, #050202 100%);
    }
    /* Fake food shapes (a bowl) */
    .food {
      position:absolute; top:38%; left:50%; transform:translate(-50%, -50%); z-index:2;
      width: 220px; height: 220px;
    }
    .bowl { position:absolute; bottom:0; left:0; right:0; height:130px; background: linear-gradient(180deg, #6a3a1a 0%, #3a1c08 100%); border-radius: 50% / 80% 80% 30% 30%; box-shadow: 0 12px 40px rgba(0,0,0,0.7), inset 0 -8px 20px rgba(0,0,0,0.4), inset 0 4px 12px rgba(255,255,255,0.08); }
    .rice { position:absolute; bottom:50px; left:30px; right:30px; height:80px; background: radial-gradient(circle at 30% 30%, #fffaef 0%, #e8ddb8 70%, #c8b888 100%); border-radius: 50% / 60% 60% 40% 40%; box-shadow: inset 0 6px 12px rgba(255,255,255,0.4); }
    .veg { position:absolute; border-radius: 50%; }
    .veg.green1 { width:40px; height:40px; top:30px; left:60px; background: radial-gradient(circle at 30% 30%, #88f29a 0%, #2a8a40 100%); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
    .veg.green2 { width:30px; height:30px; top:50px; right:50px; background: radial-gradient(circle at 30% 30%, #6ed882 0%, #1c7030 100%); }
    .veg.red { width:32px; height:32px; top:60px; left:100px; background: radial-gradient(circle at 30% 30%, #ff8478 0%, #c03020 100%); }

    /* Scan frame */
    .frame { position:absolute; inset:80px 32px 200px; z-index:5; border-radius: 24px; border: 2px solid rgba(255,255,255,0.4); }
    .frame::before, .frame::after, .frame > .c1, .frame > .c2 {
      content:""; position:absolute; width: 28px; height: 28px; border: 3px solid white;
    }
    .frame::before { top:-2px; left:-2px; border-right:none; border-bottom:none; border-top-left-radius: 12px; }
    .frame::after  { top:-2px; right:-2px; border-left:none; border-bottom:none; border-top-right-radius: 12px; }
    .frame .c1 { bottom:-2px; left:-2px; border-right:none; border-top:none; border-bottom-left-radius: 12px; }
    .frame .c2 { bottom:-2px; right:-2px; border-left:none; border-top:none; border-bottom-right-radius: 12px; }
    .scan-line { position:absolute; left:0; right:0; height:3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); box-shadow: 0 0 16px var(--accent); animation: scanMove 2.4s ease-in-out infinite; top:50%; }
    @keyframes scanMove { 0% { top:0; } 50% { top:100%; } 100% { top:0; } }

    /* Top bar */
    .topbar { position:absolute; top:60px; left:0; right:0; padding:0 20px; display:flex; align-items:center; justify-content:space-between; z-index:20; }
    .icon-btn { width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.10); backdrop-filter:blur(20px); display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .icon-btn svg { width:16px; height:16px; stroke:white; }
    .topbar-pill { padding:6px 12px; border-radius:999px; background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.10); backdrop-filter:blur(20px); font-size:12px; font-weight:600; letter-spacing:-0.1px; color:white; }

    /* Mode strip */
    .mode-strip { position:absolute; left:0; right:0; bottom:200px; display:flex; justify-content:center; gap:8px; padding: 0 24px; z-index:20; }
    .mode { padding:8px 16px; border-radius:999px; background:rgba(0,0,0,0.50); border:1px solid rgba(255,255,255,0.10); backdrop-filter:blur(20px); font-size:12px; font-weight:600; color:rgba(255,255,255,0.6); cursor:pointer; font-family:inherit; transition:all 0.15s; }
    .mode.active { background:white; color:#000; border-color:white; }

    /* Result card (slides up after capture) */
    .result {
      position:absolute; left:16px; right:16px; bottom:120px; z-index:25;
      padding: 18px; border-radius: 22px;
      background: rgba(2,2,10,0.88); border:1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(24px) saturate(1.4);
      transform: translateY(40px); opacity:0; pointer-events:none;
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
    }
    .result.show { transform: translateY(0); opacity:1; pointer-events:auto; }
    .result-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:10px; }
    .result-name { font-size:18px; font-weight:600; letter-spacing:-0.3px; color: var(--text-primary); }
    .result-conf { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#34D399; font-weight:600; }
    .result-cal-row { display:flex; align-items:baseline; gap:6px; }
    .result-cal { font-size:38px; font-weight:700; letter-spacing:-1.4px; line-height:1; background: linear-gradient(180deg, #FFFFFF 0%, var(--stat-body) 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .result-cal-unit { font-size:13px; color:var(--text-muted); font-weight:500; }

    .macros { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin: 12px 0; }
    .macro { padding:8px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); text-align:center; }
    .macro-val { font-size:16px; font-weight:600; letter-spacing:-0.2px; color: var(--text-primary); }
    .macro-lbl { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); margin-top:2px; }

    .cooked-row { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; background:rgba(52,211,153,0.10); border:1px solid rgba(52,211,153,0.25); margin-bottom:10px; }
    .cooked-row svg { width:14px; height:14px; stroke:#34D399; }
    .cooked-row span { font-size:12px; color:#34D399; font-weight:600; letter-spacing:-0.1px; }

    .stat-impact { display:flex; align-items:center; gap:8px; font-size:12px; color: var(--text-muted); margin-bottom:14px; }
    .stat-impact strong { color: var(--stat-body); font-weight:600; }
    .stat-dot { width:8px; height:8px; border-radius:50%; background: var(--stat-body); box-shadow: 0 0 6px var(--stat-body); }

    .result-actions { display:flex; gap:8px; }
    .r-btn { flex:1; padding:12px; border-radius:999px; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; letter-spacing:-0.2px; transition: transform 0.15s; }
    .r-btn:active { transform: scale(0.98); }
    .r-btn.primary { background:white; color:#000; border:none; }
    .r-btn.secondary { background:transparent; color:var(--text-muted); border:1px solid rgba(255,255,255,0.10); }

    /* Capture button */
    .shutter-wrap { position:absolute; bottom:36px; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:36px; z-index:25; }
    .shutter { width:74px; height:74px; border-radius:50%; background:transparent; border:5px solid white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: transform 0.15s; }
    .shutter:active { transform: scale(0.95); }
    .shutter-inner { width:54px; height:54px; border-radius:50%; background:white; transition: all 0.15s; }
    .shutter:active .shutter-inner { background: var(--stat-body); }
    .gallery, .flip { width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.10); display:flex; align-items:center; justify-content:center; cursor:pointer; backdrop-filter:blur(20px); }
    .gallery svg, .flip svg { width:18px; height:18px; stroke:white; }

    .preview-label { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#4A5060; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-family:ui-monospace,"SF Mono",Menlo,monospace; }
    @media (max-width:460px){ body{padding:0;} .phone{width:100vw; height:100vh; border-radius:0; box-shadow:none;} .notch,.home-indicator{display:none;} .preview-label{display:none;} }
  </style>
  <link rel="stylesheet" href="_lib/core-responsive.css">
  <script src="_lib/core-back.js"></script>
  <link rel="stylesheet" href="_lib/core-theme.css">
  <script src="_lib/core-theme.js" defer></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="viewfinder"></div>
    <div class="food">
      <div class="bowl"></div>
      <div class="rice"></div>
      <div class="veg green1"></div>
      <div class="veg green2"></div>
      <div class="veg red"></div>
    </div>

    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="topbar">
      <div class="icon-btn" onclick="window.location.href='20-dashboard.html'"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M6 6l12 12M6 18L18 6"/></svg></div>
      <div class="topbar-pill">⚡ Scan food</div>
      <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M12 18a3 3 0 0 0 0-6m0 6a3 3 0 0 1 0-6m0 0V4"/><circle cx="12" cy="20" r="1"/></svg></div>
    </div>

    <div class="frame"><div class="c1"></div><div class="c2"></div><div class="scan-line"></div></div>

    <div class="mode-strip">
      <button class="mode active">Food</button>
      <button class="mode" onclick="window.location.href='37-scan-body.html'">Body</button>
      <button class="mode" onclick="window.location.href='38-scan-outfit.html'">Outfit</button>
    </div>

    <div class="result" id="result">
      <div class="result-head">
        <div>
          <div class="result-name">Chicken & rice bowl</div>
          <div class="result-cal-row">
            <span class="result-cal">540</span>
            <span class="result-cal-unit">kcal · est.</span>
          </div>
        </div>
        <div class="result-conf">94% conf</div>
      </div>
      <div class="macros">
        <div class="macro"><div class="macro-val">42g</div><div class="macro-lbl">Protein</div></div>
        <div class="macro"><div class="macro-val">58g</div><div class="macro-lbl">Carbs</div></div>
        <div class="macro"><div class="macro-val">12g</div><div class="macro-lbl">Fat</div></div>
      </div>
      <div class="cooked-row">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg>
        <span>Chicken cooked through · safe to eat</span>
      </div>
      <div class="stat-impact">
        <span class="stat-dot"></span>
        Logs as <strong>+8 Body</strong> · single serving · ~25% of daily protein target
      </div>
      <div class="result-actions">
        <button class="r-btn secondary" onclick="document.getElementById('result').classList.remove('show')">Retake</button>
        <button class="r-btn primary" onclick="window.location.href='20-dashboard.html'">Log meal</button>
      </div>
    </div>

    <div class="shutter-wrap">
      <div class="gallery"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg></div>
      <button class="shutter" onclick="capture()"><div class="shutter-inner"></div></button>
      <div class="flip"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"><path d="M21 12a9 9 0 0 1-9 9 9 9 0 0 1-7.4-3.9M3 12a9 9 0 0 1 16.4-5.1M21 6v5h-5M3 18v-5h5"/></svg></div>
    </div>
  </div>
  <div class="preview-label">core · scan · food · v1</div>
  <script>
    function capture() {
      setTimeout(() => document.getElementById('result').classList.add('show'), 350);
    }
  </script>
</body>
</html>
