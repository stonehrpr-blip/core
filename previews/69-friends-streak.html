<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — Friend streaks</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="stylesheet" href="_lib/core-buttons.css" />
<script src="_lib/core-state.js"></script>
<script src="_lib/analytics.js"></script>
  <script src="_lib/core-back.js"></script>
<style>
  :root { --bg-base:#02020A; --text:#F8FAFE; --muted:#9AA1B7; --dim:#4F5570; --accent:#4A8FFF; --border:rgba(255,255,255,0.08); }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#0A0A14; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif; color:var(--text); padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:30; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:30; }
  .bg { position:absolute; inset:0; background: radial-gradient(60% 30% at 50% 10%, rgba(74,143,255,0.15), transparent 60%), linear-gradient(180deg, #0A0820 0%, #02020A 50%, #050510 100%); }

  .frame { position:absolute; inset:0; padding: 60px 0 28px; display:flex; flex-direction:column; z-index:10; }
  .topbar { padding: 0 22px 8px; display:flex; align-items:center; gap: 14px; }
    .back {
      width: 38px !important; height: 38px !important;
      min-width: 38px !important; min-height: 38px !important;
      max-width: 38px !important; max-height: 38px !important;
      aspect-ratio: 1 / 1;
      flex: 0 0 38px;
      align-self: center;
      border-radius: 50% !important;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      display: flex !important; align-items: center !important; justify-content: center !important;
      cursor: pointer; padding: 0;
      font-family: inherit;
      box-sizing: border-box;
      transition: background .15s, border-color .15s, transform .12s;
    }
    .back:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
    .back:active { transform: scale(0.94); }
    .back svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink: 0; }
  .title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; flex: 1; }

  /* SCROLL CONTAINER */
  .scroll { flex:1; overflow-y:auto; padding: 8px 0 24px; }
  .scroll::-webkit-scrollbar { display:none; }

  /* HORIZONTAL STRIP — also embeddable on dashboard */
  .strip-section { padding: 0 22px; }
  .section-h { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 700; margin: 12px 4px 12px; }

  .strip {
    display:flex; gap: 10px; overflow-x: auto; padding: 4px 22px 16px;
    scroll-snap-type: x mandatory;
  }
  .strip::-webkit-scrollbar { display:none; }

  .friend {
    flex-shrink: 0; width: 96px; padding: 14px 8px;
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
    scroll-snap-align: start;
  }
  .friend:hover { border-color: rgba(255,255,255,0.18); transform: translateY(-1px); }

  /* ring */
  .ring-wrap { position: relative; width: 56px; height: 56px; margin: 0 auto 8px; }
  .ring-bg, .ring-fg {
    position: absolute; inset: 0; border-radius: 50%;
  }
  .ring-bg { background: conic-gradient(rgba(255,255,255,0.08) 0deg 360deg); }
  .ring-fg { background: conic-gradient(from -90deg, var(--c) 0deg, var(--c) calc(var(--pct) * 3.6deg), rgba(255,255,255,0.04) calc(var(--pct) * 3.6deg)); -webkit-mask: radial-gradient(circle 26px at center, transparent 24px, black 25px); mask: radial-gradient(circle 26px at center, transparent 24px, black 25px); box-shadow: 0 0 14px var(--c); }
  .ring-avatar {
    position: absolute; inset: 6px; border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, var(--cl), var(--c) 55%, var(--cd) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    box-shadow: inset 0 1px 3px rgba(255,255,255,0.3);
  }
  .ring-avatar::after { content:""; position:absolute; inset:0; border-radius:50%; background: linear-gradient(160deg, rgba(255,255,255,0.30) 0%, transparent 45%); }

  .friend-name { font-size: 11px; font-weight: 700; color:#fff; letter-spacing: -0.1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .friend-days { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.06em; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .friend.you { background: linear-gradient(135deg, rgba(74,143,255,0.10), rgba(91,177,255,0.05)); border-color: rgba(74,143,255,0.40); }
  .friend.you .friend-name { color: #5BB1FF; }
  .friend.poke {
    border-color: rgba(255,107,170,0.30);
    background: linear-gradient(135deg, rgba(255,107,170,0.08), rgba(255,122,69,0.05));
  }
  .friend.poke::after { content: "?"; position:absolute; top:8px; right:10px; font-size:11px; font-weight:700; color:#FF6BAA; }
  .friend.add { background: rgba(255,255,255,0.02); border-style: dashed; border-color: rgba(255,255,255,0.15); }
  .friend.add .ring-wrap { background: rgba(255,255,255,0.04); border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .friend.add .ring-wrap svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.55); fill: none; stroke-width: 1.8; }

  /* FULL LIST below */
  .list-section { padding: 16px 22px 0; }
  .row {
    display: flex; align-items: center; gap: 14px; padding: 12px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    cursor: pointer;
    transition: background .15s;
  }
  .row:hover { background: rgba(255,255,255,0.06); }
  .row-av {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink:0;
    background: radial-gradient(circle at 32% 28%, var(--cl), var(--c) 55%, var(--cd) 100%);
    display:flex; align-items:center; justify-content:center;
    font-size: 14px; font-weight: 700; color:#fff;
    box-shadow: 0 0 14px var(--c);
    position: relative;
  }
  .row-av::after { content:""; position:absolute; inset:0; border-radius:50%; background:linear-gradient(160deg, rgba(255,255,255,0.30) 0%, transparent 45%); }
  .row-text { flex:1; }
  .row-name { font-size: 14px; font-weight:600; color: #fff; letter-spacing:-0.1px; }
  .row-sub { font-size: 11px; color: var(--muted); margin-top:2px; letter-spacing:0.04em; }
  .row-streak { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .row-days { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.4px; }
  .row-lbl { font-size: 9px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; font-weight:700; }

  .poke-btn { padding: 4px 10px; border-radius: 999px; background: rgba(255,107,170,0.12); border: 1px solid rgba(255,107,170,0.30); color: #FF6BAA; font-size: 10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; cursor:pointer; font-family:inherit; margin-left:8px; }
  .poke-btn:hover { background: rgba(255,107,170,0.20); }

  .footer { padding: 12px 22px 0; }

    .scroll { padding-bottom: 16px !important; }
    .footer { padding: 12px 22px calc(20px + env(safe-area-inset-bottom, 0px)) !important; }
  </style>
  <link rel="stylesheet" href="_lib/core-responsive.css">
  <link rel="stylesheet" href="_lib/core-theme.css">
  <script src="_lib/core-theme.js" defer></script>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_lib/core-background.css">
  <script src="_lib/core-background.js"></script>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="notch"></div>
    <div class="home-indicator"></div>

    <div class="frame">
      <div class="topbar">
        <button class="back" type="button" onclick="window.location.href='20-dashboard.html'" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="title">Accountability buddies</div>
      </div>

      <div class="scroll">
        <div class="strip-section">
          <div class="section-h">Current streaks</div>
        </div>
        <div class="strip" id="friendStrip"></div>

        <div class="list-section">
          <div class="section-h" style="margin-top:0;">Detail</div>
          <div id="friendList"></div>
        </div>
      </div>

      <div class="footer">
        <button class="btn primary pill block" onclick="invite()">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Invite a buddy
        </button>
      </div>
    </div>
  </div>

<script>
  // 4 friends + self + invite
  const FRIENDS = [
    { name: 'You',     days: 14, max: 30, c: '#4A8FFF', cl: '#DCE9FF', cd: '#1453A8', self: true,                handle: '@stone',  status: 'You · Flow III' },
    { name: 'Mia',     days: 21, max: 30, c: '#FF6BAA', cl: '#FFD3E4', cd: '#832D50',                        handle: '@mia',     status: 'Quit Vape · holding strong' },
    { name: 'Jordan',  days: 7,  max: 14, c: '#B388FF', cl: '#E6D7FF', cd: '#4F3A8A',                        handle: '@jordan',  status: 'Quit Vape · just hit 7 days' },
    { name: 'Aisha',   days: 47, max: 60, c: '#5CE1E6', cl: '#C2F3F5', cd: '#1F7478',                        handle: '@aisha',   status: 'Quit Vape · ahead of you all' },
    { name: 'Sam',     days: 2,  max: 7,  c: '#FFD05C', cl: '#FFEEBF', cd: '#876619',  poke: true,           handle: '@sam',     status: 'Slipped Tuesday · 2 days back' },
  ];
  function init(streakDays) {
    // override self.days from coreState
    FRIENDS[0].days = streakDays;
    const strip = document.getElementById('friendStrip');
    const list  = document.getElementById('friendList');
    strip.innerHTML = '';
    list.innerHTML = '';
    FRIENDS.forEach(f => {
      const pct = Math.min(100, Math.round((f.days / f.max) * 100));
      // strip card
      const card = document.createElement('div');
      card.className = 'friend' + (f.self ? ' you' : '') + (f.poke ? ' poke' : '');
      card.style.setProperty('--c', f.c);
      card.style.setProperty('--cl', f.cl);
      card.style.setProperty('--cd', f.cd);
      card.innerHTML = '' +
        '<div class="ring-wrap" style="--c: ' + f.c + '; --pct: ' + pct + ';">' +
          '<div class="ring-bg"></div>' +
          '<div class="ring-fg" style="--c: ' + f.c + '; --pct: ' + pct + ';"></div>' +
          '<div class="ring-avatar" style="--c: ' + f.c + '; --cl: ' + f.cl + '; --cd: ' + f.cd + ';">' + f.name.charAt(0) + '</div>' +
        '</div>' +
        '<div class="friend-name">' + f.name + '</div>' +
        '<div class="friend-days">' + f.days + 'd</div>';
      strip.appendChild(card);

      // list row
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = '' +
        '<div class="row-av" style="--c: ' + f.c + '; --cl: ' + f.cl + '; --cd: ' + f.cd + ';">' + f.name.charAt(0) + '</div>' +
        '<div class="row-text"><div class="row-name">' + f.name + (f.self ? ' <span style="font-size:10px;color:#5BB1FF;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;margin-left:6px;">You</span>' : '') + '</div><div class="row-sub">' + f.status + '</div></div>' +
        '<div class="row-streak"><div class="row-days">' + f.days + '</div><div class="row-lbl">days</div></div>' +
        (f.poke ? '<button class="poke-btn" onclick="event.stopPropagation();poke(\'' + f.name + '\')">Poke</button>' : '');
      row.onclick = () => location.href = f.self ? '62-profile.html' : '63-user-profile.html';
      list.appendChild(row);
    });
    // + Invite at end of strip
    const add = document.createElement('div');
    add.className = 'friend add';
    add.innerHTML = '<div class="ring-wrap"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div><div class="friend-name">Invite</div><div class="friend-days">·</div>';
    add.onclick = invite;
    strip.appendChild(add);
  }
  function poke(name) {
    if (window.coreTrack) coreTrack('friend_poked', { name });
    alert('Sent a nudge to ' + name + '.');
  }
  function invite() {
    if (window.coreTrack) coreTrack('friend_invite_started', {});
    location.href = '74-invite.html';
  }
  (function() {
    let d = 14;
    try { d = coreState.read().streak.days || 14; } catch(e){}
    init(d);
  })();
</script>
<!-- Sub-page: rely on back button only, no bottom tab bar -->
</body>
</html>
