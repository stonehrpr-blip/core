<!doctype html><html><body style="margin:0;background:#0b0b0d;display:flex;gap:34px;align-items:center;justify-content:center;height:100vh">
<div id="t" style="display:flex;gap:34px"></div>
<script>
// 3 stacked strokes = depth shadow + chrome body + top specular highlight
function mark(){return `
 <defs>
  <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#f6f8fb"/>
    <stop offset="16%" stop-color="#c4cad3"/>
    <stop offset="40%" stop-color="#ffffff"/>
    <stop offset="50%" stop-color="#a7adb7"/>
    <stop offset="60%" stop-color="#ffffff"/>
    <stop offset="82%" stop-color="#969ca7"/>
    <stop offset="100%" stop-color="#dfe3e9"/>
  </linearGradient>
  <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="2.2" stdDeviation="2.2" flood-color="#000" flood-opacity="0.55"/>
  </filter>
 </defs>
 <g filter="url(#lift)">
   <!-- depth shadow under the tube -->
   <g transform="translate(0,1.6)" stroke="#2a2d33" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
     <path d="M71 27 A34 34 0 1 0 71 73"/><path d="M30 52 L44 62 L54 50 L76 27"/><path d="M63 27 L77 27 L77 41"/>
   </g>
   <!-- chrome body -->
   <g stroke="url(#chrome)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
     <path d="M71 27 A34 34 0 1 0 71 73"/><path d="M30 52 L44 62 L54 50 L76 27"/><path d="M63 27 L77 27 L77 41"/>
   </g>
   <!-- top specular highlight -->
   <g transform="translate(0,-1)" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.75">
     <path d="M71 27 A34 34 0 1 0 71 73"/><path d="M30 52 L44 62 L54 50 L76 27"/><path d="M63 27 L77 27 L77 41"/>
   </g>
 </g>`;}
const host=document.getElementById('t');
[['#1b1b1e','#0a0a0b'],['#222226','#0e0e10']].forEach(([a,c],i)=>{
 const tile=document.createElement('div');
 tile.style.cssText=`position:relative;width:150px;height:150px;border-radius:34px;background:linear-gradient(157deg,${a},${c});display:flex;align-items:center;justify-content:center;box-shadow:0 18px 44px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.06),inset 0 1.5px 0 rgba(255,255,255,.10),inset 0 -6px 16px rgba(0,0,0,.5)`;
 tile.innerHTML='<svg viewBox="0 0 100 100" width="104" height="104">'+mark()+'</svg>';
 host.appendChild(tile);
});
</script></body></html>
