<!doctype html>
<html lang="en">
<head>
  <script>/*theme-killswitch*/try{localStorage.removeItem("coreTheme");}catch(e){}</script>
<meta charset="utf-8" />
<title>CORE — CORE Plus</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root {
    --bg-base:#040408; --bg-card:rgba(255,255,255,0.022); --border:rgba(255,255,255,0.07);
    --text:#ffffff; --muted:rgba(255,255,255,0.72); --dim:rgba(255,255,255,0.45);
    --accent:#AEB6C4; --grad-a:#AEB6C4; --grad-b:#AEB6C4; --grad-c:#AEB6C4; --good:rgba(255,255,255,0.72); --coin:rgba(255,255,255,0.72);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body { min-height:100vh; background:#000; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
    color:var(--text); -webkit-font-smoothing:antialiased; padding:24px; overflow:hidden; }
  .phone { position:relative; width:390px; height:844px; background:var(--bg-base); border-radius:56px; overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 10px #0a0a12, 0 0 0 11px #2b2b38; }
  .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:124px; height:32px; background:#000; border-radius:20px; z-index:60; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:rgba(245,247,251,0.55); border-radius:999px; z-index:60; }

  .bg { position:absolute; inset:0; z-index:0; background:
      radial-gradient(60% 38% at 50% 6%, rgba(10,132,255,0.12) 0%, transparent 62%),
      radial-gradient(60% 35% at 50% 96%, rgba(10,132,255,0.07) 0%, transparent 65%),
      linear-gradient(180deg, #060a18 0%, #040408 55%, #050510 100%); }
  .aurora { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.22; mix-blend-mode:screen; }
  .aurora::before, .aurora::after { content:""; position:absolute; border-radius:50%; filter:blur(72px); animation:auroraDrift 22s ease-in-out infinite; }
  .aurora::before { width:70%; height:42%; left:-10%; top:0%; background:radial-gradient(circle, rgba(10,132,255,0.18), transparent 65%); }
  .aurora::after { width:60%; height:35%; right:-8%; bottom:12%; background:radial-gradient(circle, rgba(10,132,255,0.12), transparent 65%); animation-delay:-11s; }
  @keyframes auroraDrift { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(16px,-12px) scale(1.06);} }
  .stars { position:absolute; inset:-2%; pointer-events:none; z-index:2; }
  .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,4s) ease-in-out var(--del,0s) infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.14;transform:scale(0.7);} 50%{opacity:0.8;transform:scale(1.1);} }
  @media (prefers-reduced-motion: reduce){ .aurora::before,.aurora::after,.star,.crest{animation:none!important;} }

  .frame { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:54px 0 0; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:6px 18px 4px; }
  .back { width:38px; height:38px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--border); color:var(--text); text-decoration:none; }
  .back svg{ width:20px; height:20px; }
  .restore { font-size:12.5px; font-weight:700; color:var(--muted); background:none; border:none; cursor:pointer; }

  .scroll { flex:1; overflow-y:auto; padding:8px 22px 30px; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar{ display:none; }

  /* hero */
  .crest { width:84px; height:84px; margin:8px auto 0; border-radius:24px; display:flex; align-items:center; justify-content:center;
    background:color-mix(in srgb,var(--accent) 18%,transparent); border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
    box-shadow:none; animation:crestBob 3.6s ease-in-out infinite; }
  @keyframes crestBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .crest svg{ width:44px; height:44px; color:#E6ECFF; }
  .htag { text-align:center; margin-top:14px; font-size:10.5px; font-weight:800; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }
  .h1 { text-align:center; margin:8px 0 0; font-size:27px; font-weight:900; letter-spacing:-0.02em; line-height:1.12; }
  .h1 .g { color:var(--accent); }
  .sub { text-align:center; margin:9px auto 0; max-width:280px; font-size:13.5px; color:var(--muted); line-height:1.45; }

  /* features */
  .feats { margin-top:22px; display:flex; flex-direction:column; gap:11px; }
  .f { display:flex; align-items:center; gap:13px; padding:13px 15px; border-radius:16px; background:transparent; border:none; }
  .f .fk { width:38px; height:38px; flex:none; border-radius:11px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border:1px solid var(--border); }
  .f .fk svg{ width:20px; height:20px; color:var(--muted); }
  .f .fb .ft { font-size:14px; font-weight:800; }
  .f .fb .fd { font-size:12px; color:var(--muted); margin-top:2px; line-height:1.35; }

  /* plan toggle */
  .plans { margin-top:24px; display:flex; gap:10px; }
  .plan { flex:1; position:relative; border-radius:18px; padding:15px 14px; background:var(--bg-card); border:1.5px solid var(--border); cursor:pointer; text-align:left; transition:.2s; }
  .plan.on { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 10%,transparent); box-shadow:none; }
  .plan .pname { font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); }
  .plan.on .pname { color:var(--accent); }
  .plan .pprice { font-size:23px; font-weight:900; margin-top:7px; letter-spacing:-0.02em; }
  .plan .pper { font-size:12px; color:var(--muted); font-weight:600; }
  .plan .psave { position:absolute; top:-9px; right:12px; font-size:9px; font-weight:900; letter-spacing:.04em; color:#fff; background:var(--accent); padding:3px 8px; border-radius:999px; }
  .plan .pradio { position:absolute; top:14px; right:14px; width:18px; height:18px; border-radius:50%; border:2px solid var(--dim); }
  .plan.on .pradio { border-color:var(--accent); background:radial-gradient(circle at 50% 50%, var(--accent) 0 5px, transparent 6px); }

  /* CTA */
  .cta { width:100%; margin-top:20px; padding:17px; border:none; border-radius:999px; font:inherit; font-size:16px; font-weight:900; color:#fff; cursor:pointer;
    background:var(--accent); background-size:160% 160%; box-shadow:0 14px 36px rgba(10,132,255,.35); transition:transform .12s, filter .2s; }
  .cta:active { transform:scale(.985); } .cta:hover { filter:brightness(1.06); }
  .finesub { text-align:center; margin-top:12px; font-size:11.5px; color:var(--dim); line-height:1.5; }
  .legal { text-align:center; margin-top:14px; font-size:10.5px; color:var(--dim); }
  .legal a { color:var(--muted); }

  .toast{ position:absolute; left:50%; bottom:34px; transform:translateX(-50%) translateY(16px); z-index:70; background:rgba(20,22,34,0.97); border:1px solid var(--border); border-radius:14px; padding:12px 18px; font-size:13px; font-weight:800; opacity:0; pointer-events:none; transition:.32s cubic-bezier(.2,.9,.3,1); box-shadow:0 12px 34px rgba(0,0,0,.55); white-space:nowrap; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>

<body>
  <div class="phone">
    <div class="bg"></div><div class="aurora"></div><div class="stars" id="stars"></div><div class="notch"></div>

    <div class="frame">
      <div class="topbar">
        <a class="back" id="backBtn" href="27-shop.html" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
        <button class="restore" id="restoreBtn" type="button">Restore</button>
      </div>

      <div class="scroll">
        <div class="crest"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16l-2-9 6 4 3-6 3 6 6-4-2 9z"/><path d="M5 18h14v2H5z"/></svg></div>
        <div class="htag">CORE Plus <span id="heroPlus" hidden style="display:inline-block;margin-left:6px;padding:2px 8px;border-radius:999px;font-size:9px;letter-spacing:.1em;color:#fff;background:#AEB6C4">ACTIVE</span></div>
        <h1 class="h1">Level up <span class="g">twice as fast.</span></h1>
        <p class="sub">Double rewards, exclusive cosmetics, and a weekly Epic chest. Built for players who are serious about their CORE.</p>

        <div class="feats" id="feats"></div>

        <div class="plans" id="plans"></div>

        <button class="cta" id="ctaBtn" type="button">Start 7-day free trial</button>
        <div class="finesub" id="fineSub">Then $7.99/month. Cancel anytime.</div>

        <div class="legal">Payments aren't enabled in this preview.<br/><a href="82-legal.html">Terms</a> · <a href="82-legal.html">Privacy</a></div>
      </div>
      <div class="home-indicator"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script src="_lib/core-sfx.js"></script>
  <script src="_lib/core-state.js"></script>
  <script>
  (function(){
    var qs=function(s){return document.querySelector(s);};
    var S=window.coreState;
    function SFX(n){ try{ if(typeof window.coreSfx==='function') window.coreSfx(n); }catch(e){} }

    (function(){ var h=qs('#stars'); if(!h) return; var f=document.createDocumentFragment();
      for(var i=0;i<12;i++){ var d=document.createElement('span'); d.className='star'; var sz=(i%7===0)?2.2:(i%3===0)?1.6:1.0;
        d.style.width=sz+'px'; d.style.height=sz+'px'; d.style.left=((i*37)%100)+'%'; d.style.top=((i*53)%100)+'%';
        d.style.setProperty('--d',(3+(i%5))+'s'); d.style.setProperty('--del',((i%9)*0.4)+'s'); f.appendChild(d); }
      h.appendChild(f); })();

    // back target honours ?from=
    try{ var from=new URLSearchParams(location.search).get('from'); if(from==='dashboard') qs('#backBtn').href='20-dashboard.html'; }catch(e){}

    var FEATS=[
      {t:'2× coins & XP',  d:'Every quest, slip recovery and streak pays double.', ic:'<path d="M13 2L3 14h7l-1 8 10-12h-7l1-8Z"/>'},
      {t:'Plus-only cosmetics', d:'Exclusive frames, auras and titles for your card.', ic:'<rect x="4" y="4" width="16" height="16" rx="3"/><rect x="8.5" y="8.5" width="7" height="7" rx="1.5"/>'},
      {t:'Weekly Epic chest', d:'A guaranteed Epic chest drops every week, free.', ic:'<path d="M3 9l2-4h14l2 4M3 9v9h18V9M3 9h18M12 9v3"/>'},
      {t:'Early access', d:'New features and seasons before anyone else.', ic:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'}
    ];
    qs('#feats').innerHTML=FEATS.map(function(f){
      return '<div class="f"><div class="fk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+f.ic+'</svg></div>'+
             '<div class="fb"><div class="ft">'+f.t+'</div><div class="fd">'+f.d+'</div></div></div>';
    }).join('');

    var PLANS={
      annual:{ name:'Annual', price:'$44.99', per:'/year', save:'SAVE 53%', fine:'Then $44.99/year (≈$3.75/mo). Cancel anytime.' },
      monthly:{ name:'Monthly', price:'$7.99', per:'/month', save:'', fine:'Then $7.99/month. Cancel anytime.' }
    };
    var sel='annual';
    function renderPlans(){
      qs('#plans').innerHTML=['annual','monthly'].map(function(k){ var p=PLANS[k];
        return '<button class="plan'+(k===sel?' on':'')+'" data-plan="'+k+'" type="button">'+
          (p.save?'<span class="psave">'+p.save+'</span>':'')+'<span class="pradio"></span>'+
          '<div class="pname">'+p.name+'</div><div class="pprice">'+p.price+'</div><div class="pper">'+p.per+'</div></button>';
      }).join('');
      qs('#fineSub').textContent=PLANS[sel].fine;
      document.querySelectorAll('.plan').forEach(function(b){ b.addEventListener('click', function(){ sel=b.dataset.plan; SFX('tick'); renderPlans(); paintCTA(); }); });
    }

    var toastT; function toast(m){ var t=qs('#toast'); t.innerHTML=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},2400); }
    // The CORE Plus toggle is a DEV affordance (real billing isn't wired). It only
    // works with ?dev=1 so regular preview users just see the "coming soon" CTA.
    var DEV = /[?&]dev=1/.test(location.search);
    function plusActive(){ try{ return !!(S && S.corePlusActive && S.corePlusActive()); }catch(e){ return false; } }
    function paintCTA(){
      var on=plusActive(), btn=qs('#ctaBtn');
      var hp=qs('#heroPlus'); if(hp) hp.hidden=!on;
      if(on){ var dl=0; try{ dl=(S&&S.corePlusDaysLeft)?S.corePlusDaysLeft():0; }catch(e){} btn.innerHTML='CORE Plus active <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.12em;display:inline-block"><path d="M5 12l4 4 10-11"/></svg>'; qs('#fineSub').innerHTML='On in this preview · 2× XP & coins + weekly Epic chest'+(dl?' · <b style="color:#AEB6C4">'+dl+' days left</b>':'')+'.'+(DEV?' <span style="color:#6B7488">Tap to turn off (dev)</span>':''); }
      else { btn.textContent='Start 7-day free trial'; qs('#fineSub').textContent=(DEV?'Dev mode · tap to activate CORE Plus.':PLANS[sel].fine); }
    }
    renderPlans();

    qs('#ctaBtn').addEventListener('click', function(){
      if(!DEV || !S || !S.setCorePlus){ SFX('confirm'); toast('Payments aren’t enabled yet — coming soon.'); return; }
      var on=plusActive();
      S.setCorePlus(!on);
      // dev: ?expire=N shortens the period to N days so the ≤3-day dim/countdown is testable
      try{ if(!on){ var em=location.search.match(/expire=(\d+)/); if(em) localStorage.setItem('corePlusUntil', String(Date.now()+parseInt(em[1],10)*86400000)); } }catch(e){}
      try{ S.syncProgress(); }catch(e){}
      if(!on){ SFX('reward'); toast('CORE Plus on <b style="color:var(--good)">(dev)</b> — 2× rewards + weekly Epic chest added.'); }
      else { SFX('tick'); toast('CORE Plus turned off.'); }
      paintCTA();
    });
    qs('#restoreBtn').addEventListener('click', function(){ SFX('tick'); toast(plusActive()?'CORE Plus already active.':'No purchases to restore.'); });
    paintCTA();
  })();
  </script>
  <script src="_lib/core-back.js"></script>
  <script src="_lib/core-background.js?v=20260619d"></script>
