<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#07071A">
<title>Wealth · CORE</title>
<link rel="stylesheet" href="_lib/stat-kit.css">
<style>
  html,body{margin:0;min-height:100%;background:#050510;}
  body{overflow-x:hidden;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;}
</style>
</head>
<body>
<div id="app"></div>
<script src="_lib/core-state.js"></script>
<script src="_lib/stat-kit.js"></script>
<script>
StatKit.mount(document.getElementById('app'), {
  key: 'wealth', model: 'wallet', name: 'Wealth', sub: 'Wallet', color: '#FFCB3D',
  greet: 'Build your resources.',
  states: [{ min: 80, label: 'Thriving' }, { min: 60, label: 'Stable' }, { min: 35, label: 'Tight' }, { min: 0, label: 'Strained' }],
  actions: [
    { id: 'saved', name: 'Saved', unit: '$', step: 5, def: 20, gain: 4, icon: '<path d="M3 7h13a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h9"/><circle cx="16" cy="12" r="1.4"/>' },
    { id: 'earned', name: 'Earned', unit: '$', step: 10, def: 50, gain: 4, icon: '<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.6 9.5h4a1.6 1.6 0 0 1 0 3.2h-3a1.6 1.6 0 0 0 0 3.2h4"/>' },
    { id: 'nospend', name: 'No-spend day', unit: 'days', step: 1, def: 1, gain: 3, icon: '<circle cx="12" cy="12" r="9"/><path d="M5 5l14 14"/>' },
    { id: 'invested', name: 'Invested', unit: '$', step: 25, def: 100, gain: 5, icon: '<path d="M4 18l5-5 3 3 7-8"/><path d="M16 8h4v4"/>' }
  ]
});
</script>
