project_id = "core"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "core://"
additional_redirect_urls = ["core://**"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[auth.external.apple]
enabled = true

[auth.external.google]
enabled = true

[storage]
enabled = true
file_size_limit = "20MiB"

[edge_runtime]
enabled = true
policy = "oneshot"
