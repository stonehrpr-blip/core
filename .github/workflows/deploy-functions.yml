name: Deploy Supabase functions

# Auto-deploys the Edge Functions (ai-coach, physique-scan) to Supabase whenever
# their source changes on main. Also runnable on demand from the Actions tab.
#
# ── ONE-TIME SETUP (only you can do these) ──────────────────────────────────
# 1. Create a Supabase access token:
#      Supabase dashboard → top-right avatar → Account → Access Tokens → Generate.
# 2. Add it as a GitHub repo secret named  SUPABASE_ACCESS_TOKEN
#      (repo → Settings → Secrets and variables → Actions → New repository secret).
# 3. Add your OpenAI key in Supabase (NOT here):
#      Supabase dashboard → Edge Functions → Secrets → add  OPENAI_API_KEY
#      The function auto-uses OpenAI's gpt-4o-mini whenever this key is present.
# Then push to main (or hit "Run workflow") and the functions deploy themselves.
# ----------------------------------------------------------------------------

on:
  push:
    branches: [main]
    paths: ['supabase/functions/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: tqjpgknkbfaayrjuwoet
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require the access token secret
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it under repo Settings → Secrets → Actions, then re-run."
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        run: |
          supabase functions deploy ai-coach      --project-ref "$PROJECT_REF"
          supabase functions deploy physique-scan --project-ref "$PROJECT_REF"
